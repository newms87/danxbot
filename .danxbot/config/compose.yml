# Danxbot worker for the Danxbot repo (self-referential).
#
# Joins danxbot-net (shared MySQL + dashboard).
# Worker port is sourced from <repo>/.danxbot/.env env.DANXBOT_WORKER_PORT
# (same source used by host mode) — exported by make launch-worker before compose up.
#
# Usage: make launch-worker REPO=danxbot (from danxbot/)

services:
  danxbot-worker:
    # Image: prod injects DANXBOT_WORKER_IMAGE=<ECR URL>; local falls back to the built danxbot:latest.
    image: ${DANXBOT_WORKER_IMAGE:-danxbot:latest}
    container_name: danxbot-worker-danxbot
    restart: always
    stop_grace_period: 120s
    env_file:
      - ../.env
    environment:
      DANXBOT_REPO_NAME: danxbot
      DANXBOT_WORKER_PORT: ${DANXBOT_WORKER_PORT:?Set DANXBOT_WORKER_PORT in repos/danxbot/.danxbot/.env}
      DANXBOT_DB_USER: danxbot
      DANXBOT_DB_PASSWORD: danxbot
      DANXBOT_DB_NAME: danxbot_chat
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_AUTH_MODE: ${CLAUDE_AUTH_MODE:-subscription}
      POLLER_INTERVAL_MS: ${POLLER_INTERVAL_MS:-60000}
      TRELLO_REVIEW_MIN_CARDS: ${TRELLO_REVIEW_MIN_CARDS:-10}
      DANXBOT_GIT_EMAIL: ${DANXBOT_GIT_EMAIL:-danxbot@example.com}
      REPOS: ${REPOS}
    volumes:
      # Repo bind: `../..` goes from .danxbot/config/ to the repo root.
      # Self-hosting caveat: when `repos/danxbot` is a symlink that loops back
      # into the same working tree, Docker Desktop's WSL2 path-cache can't
      # follow the symlink cleanly and the container sees a stale
      # snapshot. `DANXBOT_REPO_ROOT`, when set to an absolute host path
      # (by `make launch-worker`), bypasses the symlink and makes the bind
      # deterministic across every dev layout.
      - ${DANXBOT_REPO_ROOT:-../..}:/danxbot/app/repos/danxbot
      # Claude auth — split mount: file-bind for `.claude.json`,
      # dir-bind for `.claude/`. Trello 0bjFD0a2.
      #
      # `.claude.json` is preferences/session metadata. Mounted as a
      # file-level bind: Docker pins the host inode at compose-up. Host
      # atomic-write rotation creates a new inode; the bind keeps
      # serving the original until the worker restarts. Acceptable —
      # this file is NOT auth-critical, and every deploy restarts the
      # worker.
      #
      # `.credentials.json` is the OAuth bearer token; the host rotates
      # it via atomic write + rename(). A file-level bind on the
      # credentials would pin the original inode and serve stale bytes
      # after rotation — the production bug we paid to fix once
      # (Trello 9ZurZCK2) and again (0bjFD0a2). Mounting the PARENT
      # DIRECTORY `.claude/` as a dir-level bind makes the directory's
      # current file table visible inside the container; rename()
      # inside that dir updates the table; the next open() resolves to
      # the NEW inode. Live, no restart required.
      #
      # DO NOT collapse these back to two file-level binds. DO NOT
      # convert this to `cp` in entrypoint. Both regressions
      # silently break authentication for every dispatched agent.
      #
      # Dev defaults reference `../../claude-auth/{.claude.json,.claude}`
      # — the snapshot dir installed by the setup skill. Override in
      # dev .env with the live host paths:
      #   CLAUDE_CONFIG_FILE=/home/you/.claude.json
      #   CLAUDE_CREDS_DIR=/home/you/.claude
      # CLAUDE_CREDS_DIR points at the host directory that CONTAINS
      # `.credentials.json` (typically `~/.claude/`). Prod deploy
      # injects the provisioned absolute paths via
      # deploy/workers.ts — `${claudeAuthDir}/.claude.json` and
      # `${claudeAuthDir}/.claude` respectively. entrypoint's
      # claude-auth-setup.sh then symlinks
      # /home/danxbot/.claude/.credentials.json at the dir-mount, so
      # dispatched agents always read the current rotation.
      - ${CLAUDE_CONFIG_FILE:-../../claude-auth/.claude.json}:/danxbot/app/claude-auth/.claude.json:ro
      - ${CLAUDE_CREDS_DIR:-../../claude-auth/.claude}:/danxbot/app/claude-auth/.claude:ro
      # Claude Code session logs — this worker writes JSONL here.
      # Default resolves to repos/danxbot/claude-projects/ on the host.
      # The dashboard reads these via the per-repo RO mount added by
      # `make generate-dev-override` (docker-compose.override.yml) or the
      # static prod compose entry — see .claude/rules/docker-runtime.md.
      - ${CLAUDE_PROJECTS_DIR:-../../claude-projects}:/home/danxbot/.claude/projects
    ports:
      - "${DANXBOT_WORKER_PORT}:${DANXBOT_WORKER_PORT}"
    # In docker runtime, src/worker/url-normalizer.ts rewrites dispatcher
    # callback URLs from `localhost` to `host.docker.internal` so the worker
    # can reach services on the docker host. This extra_hosts entry is what
    # makes that alias resolve on Linux; Docker Desktop adds it implicitly.
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - danxbot-net
    healthcheck:
      test: curl -f http://localhost:${DANXBOT_WORKER_PORT}/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  danxbot-net:
    external: true
