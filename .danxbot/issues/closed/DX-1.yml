      ## Needs Help — Layer 3 verification + on-disk repo cleanup require a poller tick this dispatch can't trigger

      **What's done (commit a417f99):**
      - Defect 1: dropped `TRELLO_API_KEY` / `TRELLO_TOKEN` / `TRELLO_BOARD_ID` from `src/poller/inject/workspaces/issue-worker/workspace.yml` `required-placeholders`. Also dropped the now-unused `TRELLO_ENABLED_TOOLS` `optional-placeholders` block.
      - Auto-inject `DANXBOT_WORKER_PORT` in `src/dispatch/core.ts` from `repo.workerPort` so HTTP `/api/launch`, the slack listener, and the poller all dispatch with an empty caller overlay. Removed the duplicate `String(repo.workerPort)` lines at the three caller sites.
      - Pinned the trimmed `required-placeholders` allowlist with a regression test in `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` (uses the `yaml` package; sorted-array equality so any future re-introduction trips the unit test).
      - Defect 2: extracted `injectIssueWorkerAlias` into `src/poller/issue-worker-alias.ts` and taught it to detect a pre-P5 danxbot-authored real `trello-worker/` directory by reading its `workspace.yml` for `name: trello-worker`. When the marker matches, the directory is removed and replaced with a symlink → `issue-worker/`. Operator-authored directories (no manifest / malformed manifest / different `name:` value) are still preserved untouched.
      - Added 9-branch real-fs integration test (`src/poller/issue-worker-alias.test.ts`) covering: fresh install, missing target, correct symlink, relative-target symlink (no churn), stale symlink, pre-P5 convert, malformed manifest, operator no-manifest, operator different-name.
      - Deduped `isSymlink` / `isLinkOrFile` into `src/poller/fs-probe.ts` so the same I/O probe semantics live in exactly one place.
      - Added `dispatch() — caller-overlay-wins` regression test in `src/dispatch/core.test.ts` so a future agent can't silently flip the auto-inject precedence the `DispatchInput.overlay` docstring documents.

      **What's still needed (operator action — none of this is reachable from inside an issue-worker dispatch):**
      1. **Verify AC #4** — re-run `make test-system-yaml-memory` against a host-mode worker on port 5561 (the original verification host). The old failure mode was `missing required placeholder(s): DANXBOT_WORKER_PORT, TRELLO_API_KEY, TRELLO_TOKEN, TRELLO_BOARD_ID`; both halves are now fixed by code + unit tests, but the ground-truth Layer-3 run needs a tick of the poller after this commit lands so the live mirror at `<repo>/.danxbot/workspaces/issue-worker/workspace.yml` picks up the trimmed `required-placeholders` block. The currently-running worker (PID 23459, port 5561) is busy with THIS dispatch (`teamRunning = true`); its next tick fires after `danxbot_complete`. Run `make test-system-yaml-memory` after the worker ticks once.
      2. **Verify AC #5** — confirm `<repo>/.danxbot/workspaces/` on `repos/danxbot`, `repos/gpt-manager`, `repos/platform` shows `issue-worker/` as a real dir AND `trello-worker` as a symlink to it. As of this dispatch only `repos/danxbot` has been ticked into Phase 5 shape (the live workspace.yml mirror is still pre-hotfix); `repos/gpt-manager` and `repos/platform` have never produced an `issue-worker/` dir at all. After this commit lands, one full poll tick on each repo's worker will: (a) mirror the new workspace fixtures and create `issue-worker/`, (b) the new `injectIssueWorkerAlias` will detect each repo's pre-P5 `trello-worker/` (all three carry `name: trello-worker` — verified before commit) and convert it to a symlink. Spot-check after the tick: `ls -la <repo>/.danxbot/workspaces/` should show one real dir + one symlink.

      **Why this needs human/host help:**
      - AC #4 invokes a system test that POSTs `/api/launch` to a worker, which would race against THIS dispatch (already holding `teamRunning`). Running it from inside the dispatch would either deadlock or — if it completed — assert against a stale mirrored workspace fixture (the worker's poll tick mirrors source → target only when `teamRunning = false`).
      - AC #5 directly inspects the on-disk state of three connected repos AFTER a poll tick. The dispatched agent cannot trigger that tick from inside its own session.
      - Both checks are passive — the operator just needs to wait for one tick after this commit and verify. No code changes are expected.

      **Incomplete ACs (verbatim):**
      - `make test-system-yaml-memory` exits 0 against the same host that previously failed (verification log `/tmp/v5-l3.log`).
      - `<repo>/.danxbot/workspaces/` on `repos/danxbot`, `repos/gpt-manager`, `repos/platform` shows `issue-worker/` real dir + `trello-worker` symlink after one tick.

      **Final AC check:** Before Done, every AC must be `checked: true`.
