title: "Fix: Phase 5 hotfix — issue-worker workspace blocks /api/launch + alias skips legacy trello-worker dir"
description: |-
  ## Problem

  Layer 3 verification (`make test-system-yaml-memory`) of Phase 5
  (commits `a2dc586` + `c8e8101`) failed against a host-mode worker on
  port 5561 (verification card `69f772083ebbc515fcf1534e`, log at
  `/tmp/v5-l3.log`). Two distinct defects surfaced:

  ### Defect 1 — stale required-placeholders in `workspace.yml`

  `src/poller/inject/workspaces/issue-worker/workspace.yml` still
  declares:

      required-placeholders:
        - DANXBOT_STOP_URL
        - DANXBOT_WORKER_PORT
        - TRELLO_API_KEY
        - TRELLO_TOKEN
        - TRELLO_BOARD_ID

  Phase 4 (commit `a2dc586`) dropped the trello MCP server entry from
  `.mcp.json` and migrated agents to the YAML / `danx_issue_*` flow.
  Nothing inside `src/poller/inject/workspaces/issue-worker/` references
  `TRELLO_API_KEY`, `TRELLO_TOKEN`, or `TRELLO_BOARD_ID` anymore — in
  fact `workspace-shape.test.ts` lines 38-40 explicitly assert these
  strings DO NOT appear in `.mcp.json`.

  The orphaned required-placeholders block any non-poller dispatch that
  doesn't supply a Trello overlay. Reproducer:

      curl -sS -X POST http://127.0.0.1:5561/api/launch \
        -H 'Content-Type: application/json' \
        -d '{"workspace":"issue-worker","task":"Reply OK","api_token":"system-test-token"}'
      # → {"error":"workspace \"issue-worker\" missing required placeholder(s):
      #     DANXBOT_WORKER_PORT, TRELLO_API_KEY, TRELLO_TOKEN, TRELLO_BOARD_ID"}

  This is exactly what `make test-system-yaml-memory` (`test_yaml_memory`
  in `src/__tests__/system/run-system-tests.sh:864`) does — its launch
  body has no overlay, so the test is currently unrunnable end-to-end.

  ### Defect 2 — `injectIssueWorkerAlias` skips legacy real `trello-worker/` dir

  `src/poller/index.ts:632 injectIssueWorkerAlias` only writes the
  symlink when `trello-worker/` is missing or already a symlink. If the
  directory exists as a real dir (the shape Phase 3 commit `52410c8`
  produced on every previous tick), it returns silently — see the
  `Operator-authored trello-worker/ directory present — leave it alone`
  branch.

  Result on any environment that ran the worker pre-`c8e8101`:
  `<repo>/.danxbot/workspaces/trello-worker/` stays a real directory
  forever. The Phase 5 commit message claims "the alias creates a
  `trello-worker/` symlink alongside" — that's only true for fresh
  P5+ deploys.

  Observed locally on `host:/home/newms/web/danxbot/repos/danxbot/.danxbot/workspaces/`:

      drwxr-xr-x  issue-worker
      drwxrwxr-x  trello-worker     # real dir, NOT symlink

  Identical state on `repos/gpt-manager` and `repos/platform`
  (`trello-worker/` real dir, no `issue-worker/` yet because those
  repos have not had a successful tick produce one — P5 only creates
  `issue-worker/`).

  AC #3 of the verification card (`trello-worker` symlink → `issue-worker`)
  is therefore unsatisfiable on any upgraded environment without manual
  cleanup or code change.

  ## Solution

  ### Defect 1
  Drop `TRELLO_API_KEY`, `TRELLO_TOKEN`, `TRELLO_BOARD_ID` from
  `required-placeholders` in
  `src/poller/inject/workspaces/issue-worker/workspace.yml`. Keep
  `DANXBOT_STOP_URL` and `DANXBOT_WORKER_PORT` — those ARE referenced
  (the stop URL is dispatch-injected; the worker port is in
  `.claude/settings.json.env`). Update / extend
  `workspace-shape.test.ts` to pin the new shape so the next agent
  can't silently re-introduce dead placeholders. If the poller still
  needs these vars for its dispatch path, leave the overlay block in
  `src/poller/index.ts:990-992` alone — that's pure overlay, not a
  workspace requirement.

  ### Defect 2
  Teach `injectIssueWorkerAlias` to detect the specific pre-P5 legacy
  shape (a real `trello-worker/` directory whose contents mirror the
  shipped fixture) and convert it into a symlink — distinct from a
  truly operator-authored directory. Cheapest signal: the legacy
  directory's contents are byte-identical to what `injectDanxWorkspaces`
  would write today, OR the directory is empty / contains only files
  the poller itself wrote (presence of `workspace.yml` with
  `name: trello-worker` is a strong tell, since P3's manifest used
  that name).

  Alternative simpler approach: add an opt-in operator step (one-shot
  `make migrate-workspaces` target) that performs the convert, leaving
  the per-tick path untouched. Decide in the implementation phase.

  Add an integration test that simulates the pre-P5 shape (real
  `trello-worker/` dir present, no `issue-worker/` yet) and asserts
  the next tick produces the canonical `issue-worker/` real dir +
  `trello-worker → issue-worker` symlink.

  ## Acceptance Criteria

  - `src/poller/inject/workspaces/issue-worker/workspace.yml` no longer
    lists `TRELLO_API_KEY`, `TRELLO_TOKEN`, `TRELLO_BOARD_ID` under
    `required-placeholders`.
  - `workspace-shape.test.ts` pins the `required-placeholders` allowlist
    so a re-introduction trips a unit-test failure.
  - On a pre-P5 fixture (real `trello-worker/` dir present), the poller
    converts the legacy directory to a symlink → `issue-worker/`
    on the next tick (or via an explicit migration target — pick one).
    Integration test exercises the conversion.
  - `make test-system-yaml-memory` exits 0 against a worker booted on
    a host that has the pre-P5 legacy `trello-worker/` directory shape.
  - `<repo>/.danxbot/workspaces/` shows `issue-worker/` as a real dir
    AND `trello-worker` as a symlink to it on `repos/danxbot`,
    `repos/gpt-manager`, `repos/platform` after one full poll tick.

  ## Key files

  - `src/poller/inject/workspaces/issue-worker/workspace.yml`
  - `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts`
  - `src/poller/index.ts` (`injectIssueWorkerAlias` ~line 632)
  - `src/__tests__/system/run-system-tests.sh` (`test_yaml_memory` ~line 864 — sanity-check no overlay change needed once defect 1 is fixed)
  - `repos/{danxbot,gpt-manager,platform}/.danxbot/workspaces/` (operator cleanup target)

  ## Out of scope

  - Production deploy (`make deploy TARGET=gpt`) — operator action after
    this hotfix lands.
  - The optional `make test-system-poller` run mentioned on the parent
    verification card.
