      ## Test Review

      Total tests in scope: ~50 (37 prefix-aware + ~13 baseline touched). Good: 47. Missing: 6.

      **Highest-priority gaps (now addressed in commit follow-up):**

      1. **`parent_id` not prefix-checked** — real Phase 2 bug-in-waiting. Validator only enforced `string | null`. Fixed in `src/issue-tracker/yaml.ts` by adding `idRegex.test(v.parent_id)` check; new test `rejects parent_id that does not match the expected prefix shape` plus prefix-aware `parent_id` cases.
      2. **`loadIssuePrefix` readFileSync error branch** — added test that mocks `readFileSync` to throw `EACCES` and asserts the function returns `DEFAULT_ISSUE_PREFIX` without throwing.
      3. **Once-per-stem warn behavior** — added new `warnMismatchedPrefix dedup` describe block with three tests (warns once across repeated calls, no-warn for draft slug filenames, separate warns for distinct cross-prefix stems). Also exported `_resetWarnedStems` test hook.
      4. **Boundary shapes** — added positive tests for `XX` (2 chars) and `ABCD` (4 chars) on both `loadIssuePrefix` and `buildIssueIdRegex`.
      5. **Error message pin** — `parseIssue` error includes the resolved `<PREFIX>-<positive integer>` shape string, pinned via test.
      6. **Barrel re-export** — explicit test imports `buildIssueIdRegex` / `LEGACY_ISS_REGEX` / `ParseIssueOptions` from `issue-tracker/index.js` to guard the public surface.

      Final test counts: 3178 backend tests passing (up from 3162 pre-Phase-1 — 16 net new prefix-aware tests). One pre-existing env-driven failure in `server-boot-seed-error.test.ts` is unrelated to this work.
  - id: 69fd33fa1b7f9336b817fd9b
    author: code-reviewer
    timestamp: 2026-05-08T00:53:14.217Z
    text: |
      <!-- danxbot -->

      ## Code Review

      ### Critical Issues — Must Block Ship
      None. Tests pass conceptually, fail-loud is preserved, and the `DEFAULT_ISSUE_PREFIX` fallback is a deliberate, documented Phase 1 stance.

      ### Should Fix Before Ship — all addressed
      1. **`ISSUE_PREFIX_SHAPE` duplication** — fixed: single source in `src/issue-tracker/yaml.ts`, re-exported from `repo-context.ts`. `id-generator.ts` defines a separate `ANY_PREFIXED_ID_REGEX` with the explicit purpose of "any prefix shape, regardless of repo" so `warnMismatchedPrefix` doesn't get conflated with config-shape validation.
      2. **Three `DEFAULT` constants** — fixed: `DEFAULT_ISSUE_PREFIX` is the single source in `yaml.ts`, imported in `repo-context.ts` (re-exported), `id-generator.ts`, and `validateIssue`'s default. Phase 4 has one symbol to grep.
      3. **Hot-path regex compilation** — fixed: `maxIssueNumber` builds the capturing regex once at the top of the scan and reuses it per file instead of compiling per-entry.
      4. **`buildIssueIdRegex` accepts unvalidated input** — fixed: now asserts `ISSUE_PREFIX_SHAPE.test(prefix)` and throws on violation. New test `buildIssueIdRegex shape validation (fail-loud)` exercises the rejection path.

      ### Nice-to-haves
      5. **`ISSUE_ID_REGEX` deprecated alias trap** — addressed: every poller / worker callsite now imports `buildIssueIdRegex` instead of the alias. Only `index.ts` re-export + `yaml.ts` declaration remain. Phase 4 grep target reduced to one symbol per consumer file.
      7. **Module-level Sets leak** — addressed: `_resetWarnedStems` and `_resetWarnedPrefixPaths` exported as test hooks; the warn-once dedup test uses them in `beforeEach`.

      ### Strengths Worth Calling Out
      - `ParseIssueOptions` interface threading is clean; `idRegex + idShape` passed through `validateChildrenList` / `validateBlocked` / `validateRetro` is the right factoring.
      - `loadIssuePrefix` fail-loud on shape mismatch is preserved.
      - `LEGACY_ISS_REGEX` constant separated from the deprecated `ISSUE_ID_REGEX` alias gives Phase 3 (migration script) a stable name even after Phase 4 drops the alias.
      - Test coverage for prefix-aware paths is thorough.
