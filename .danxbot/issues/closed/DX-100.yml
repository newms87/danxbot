type: Feature
title: "[Issue Prefix > Phase 1] Schema + RepoContext + id-generator/yaml prefix-aware (default ISS fallback)"
description: |
  ## Goal

  Make every prefix-aware code path in the issue-tracker core take the
  prefix as a parameter / from `RepoContext`, defaulting to `"ISS"` so
  no behavior changes for existing repos until later phases.

  Parent: DX-99.

  ## Scope

  ### config.yml schema

  - Add optional `issue_prefix: string` field to
    `<repo>/.danxbot/config/config.yml` schema. Validation:
    `^[A-Z]{2,4}$`. Missing → resolve `"ISS"` with one warn-once log.
  - Update setup skill (`/setup`) to seed `issue_prefix` for new
    connected repos. (No prompt for existing repos in this phase —
    they keep `ISS` until Phase 3 migration.)

  ### RepoContext

  - `src/types.ts` — add `issuePrefix: string` to `RepoContext`.
  - `src/repo-context.ts` — load + validate `issue_prefix` from
    `config.yml`. Throw on shape mismatch (`issue_prefix: "x"` →
    fatal). Default `"ISS"` on absent key.
  - Tests covering: present + valid, present + bad shape, absent.

  ### Issue YAML validator

  - `src/issue-tracker/yaml.ts`:
    - Replace `export const ISSUE_ID_REGEX = /^ISS-\d+$/` with
      `export function buildIssueIdRegex(prefix: string): RegExp`.
    - Keep a `LEGACY_ISS_REGEX = /^ISS-\d+$/` constant exported for
      one release for migration tooling.
    - `parseIssue` / `validateIssue` thread an
      `expectedPrefix: string` through `parseOptions`. Validators on
      `id`, `children[]`, `blocked.by[]` use the runtime regex.
  - Update every callsite of `ISSUE_ID_REGEX` to pass the prefix from
    its `RepoContext`. Hot callsites:
    - `src/poller/yaml-lifecycle.ts`
    - `src/issue-tracker/index.ts` (re-export surface)
    - `src/agent/agent-handle.ts`
    - `src/dispatch/core.ts`
    - `src/poller/local-issues.ts`

  ### id-generator

  - `src/issue-tracker/id-generator.ts`:
    - `nextIssueId(issuesRoot, prefix)` and
      `maxIssueNumber(issuesRoot, prefix)` take the prefix.
    - Internal `parseIssueNumber` builds regex from prefix.
    - Filename scan accepts files matching `<prefix>-<N>.yml` only.
      Files with mismatched prefix are skipped (warn-once) — they're
      from a different repo or pre-migration.

  ### Tests

  - Existing tests pass `"ISS"` explicitly OR rely on the default
    fallback — no behavior regression.
  - New unit tests:
    - `id-generator.test.ts` — prefix `DX`, `SG`, `FD` round-trip.
    - `yaml.test.ts` — parse/validate with `expectedPrefix: "DX"`
      accepts `DX-5`, rejects `DX-5`.
    - `repo-context.test.ts` — `issue_prefix` load + default + bad
      shape.

  ## Out of scope

  - Tracker (Trello) prefix awareness — Phase 2.
  - Filename rename / migration — Phase 3.
  - Dashboard UI — Phase 4.
  - Workspace skill `<PREFIX>-N` rewrite — Phase 4.

  ## Acceptance

  - `RepoContext.issuePrefix` populated from `config.yml`; default
    `"ISS"` if absent.
  - `id-generator` + `yaml` validator + every internal callsite take
    the prefix as a parameter; no `/^ISS-\d+$/` literal regex
    remains in `src/issue-tracker/` or `src/poller/` (except the
    explicitly-named `LEGACY_ISS_REGEX` constant).
  - `npx vitest run` green; `npx tsc --noEmit` green.
  - Running danxbot against the existing `ISS-*` YAMLs continues to
    parse + dispatch identically (no Trello-side changes).
