      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - TDD-first approach: the inner `validateChildrenList` / `validateBlocked` / `validateRetro` helpers were already factored cleanly, so threading `idRegex + idShape` through was a 5-line extension per helper.
      - Backward-compat default of `"ISS"` on every helper meant existing tests stayed green by passing nothing — only the four poller-test signature assertions needed updates.
      - The two-reviewer parallel quality gate caught a real Phase 2 bug-in-waiting (parent_id not prefix-checked) that I would have shipped without it.

      **What went wrong:** - First pass merged three separate `DEFAULT` constants in three files (`DEFAULT_ISSUE_PREFIX`, `DEFAULT_PREFIX`, `DEFAULT_EXPECTED_PREFIX`) — code-reviewer caught it. Should have started with a single `src/issue-tracker/yaml.ts` source from the beginning.
      - Initially scoped Phase 1 as "helpers accept prefix; consumer threading is Phase 2". Re-reading AC #2 carefully ("every callsite threads prefix from RepoContext") forced me to thread the poller + worker callsites in the same dispatch — Step 1.5 ("you fix what you find") nudged correctly.
      - The dashboard `src/dashboard/issues-reader.ts` `parseIssue` call still uses default `"ISS"` since the dashboard is multi-repo at read-time and threading per-repo prefix needs design that fits Phase 4's UI work. Documented as deferred.

      **Action items:** Nothing
      **Commits:** 1b433d3fe38ad2cb8cf970a2c98c5092c8ca1b4e
