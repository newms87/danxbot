    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - The Phase 1 retro's "deferred dashboard `parseIssue` default" pointer was the load-bearing input — closing it in this phase added 30 lines of code, fully unblocked Phase 4's UI work, and surfaced a real cross-prefix-rejection bug that operators would have hit live (Phase 1's poller-side threading was incomplete without the dashboard companion).
      - Test-reviewer's Q3 ("direct unit test for the leaf `load-issue-prefix.ts` module") doubled as the fix for code-reviewer's items 1 + 2 (dead `_resetWarnedPrefixPaths` re-export + lying docstring). One follow-up file closed three findings.
      - Phase 1's well-named constants (`DEFAULT_ISSUE_PREFIX`, `ISSUE_PREFIX_SHAPE`, `LEGACY_ISS_REGEX`) made Phase 2 pure code addition — zero literal regex / string-literal `ISS-` slipped into the new code. Phase 4's grep target stays clean.
      - Step 1.5 ("you fix what you find") caught two pre-existing test-suite failures that had been masked as "environmental flakes" — `server-boot-seed-error.test.ts` (missing `restage-route` mock; Phase 1 retro had acknowledged this as pre-existing) and `dashboard/vitest.config.ts`'s `server.deps.inline` not matching the scoped package name. Both root-caused cleanly and fixed in one pass.

      **What went wrong:** - First survey of "ISS-" usage in `src/dispatch/` / `src/poller/` / `src/agent/` mistakenly counted historical `ISS-N` references in code comments (e.g. "see DX-90") as Phase 2 work. Re-scanned with a tighter regex (`/\bISS-\\d|/\\^ISS|"#ISS-/`) and found the actual hardcoded callsite was a single line in `trello.ts:713`. Lost ~5 minutes — should have started with the targeted regex.
      - Initial implementation imported `loadIssuePrefix` from `src/repo-context.ts` into `src/dashboard/issues-reader.ts`, which immediately broke the test suite via the env-var pull through `src/config.ts`. The `.claude/rules/danx-repo-workflow.md` § "Isolate Pure Helpers From src/poller/index.ts" rule predicts this exact failure mode; should have read the dashboard reader's existing import boundary BEFORE wiring the new dependency. Fix added a leaf module — net better factoring — but cost a test-suite round trip.
      - Initial commit message draft over-claimed completeness ("every prefix-aware code path in the dashboard threaded"). Walked it back to "tracker layer + dashboard reader" since `dispatch-tracker.ts` and `dispatch-liveness.ts` (named in Phase 2's scope) turned out to have no prefix-relevant logic — Phase 2's scope description was wrong about those two files. Documented in the AC verification, not silently dropped.

      **Action items:** Nothing
      **Commits:** 632b40e289e56be42b6eca09a07e36d44b7ac64b
