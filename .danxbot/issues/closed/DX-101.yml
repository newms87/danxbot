      <!-- danxbot -->

      ## Code Review

      ### Critical issues — Must Block Ship

      None. Code is correct, boundary changes well-scoped, all four gates green.

      ### Should fix before ship

      1. **Dead `_resetWarnedPrefixPaths` re-export** in `src/repo-context.ts:32-37` (and the corresponding "tests use this" docstring claim at `src/issue-tracker/load-issue-prefix.ts:38-41`). The symbol is unused — either delete it or wire it into a test. Recommendation: wire it into the new leaf-module test (closes both this and test-review gap #1 in one move).

      2. **`load-issue-prefix.ts` header comment was unclear about the actual blocker** — referenced the rule by quoted title alone; tightened to explain that `repo-context.ts → config.ts` is the import chain to avoid.

      ### Nice-to-haves

      3. **Prefix-shape literal duplicated in three places.** Pre-existing — `yaml.ts:201`, `id-generator.ts:16`, `trello.ts:723`. Phase 2 only ADDS the third occurrence with a docstring referencing the mirror. A shared `ANY_PREFIXED_ID_PATTERN` constant in a future card.
      4. **Per-call `loadIssuePrefix` in dashboard reader** is the right contract — fail-on-stale matches every other read in the dashboard route.
      5. **Test mock duplication** in `server.test.ts` + `server-boot-seed-error.test.ts` — DRY-able into a `mock-worker-routes.ts` helper, but two callsites is the inflection point where the helper starts paying off, not before.

      ### Strengths

      - Empirical verification of the import chain — `load-issue-prefix.ts`'s deps are all leaves; zero transitive pulls of `src/config.ts`. The Phase 2 extraction achieves its stated goal cleanly.
      - `parseCardTitle` docstring at `trello.ts:706-721` says exactly what the function does, why the regex shape was broadened, and where per-card prefix validation lives (in the YAML validator, not here).
      - `server-boot-seed-error.test.ts:24-30` documents WHY the mock was added — matches `danx-comment-style` (failure mode, sibling test reference, rule citation).
      - Cross-prefix rejection tests at `issues-reader.test.ts:633-643` + `:654-662` pin precisely the failure mode Phase 1 leaves dangling without Phase 2.
      - Malformed-prefix fail-loud assertion at `issues-reader.test.ts:686-691` confirms the "Fail Loudly" contract from `CLAUDE.md` is preserved through the dashboard reader path.
