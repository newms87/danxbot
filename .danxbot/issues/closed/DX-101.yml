      <!-- danxbot -->

      ## Review Fixes

      Both reviewer findings addressed in-session before commit:

      **Test gaps closed** (test-reviewer):

      - New file `src/__tests__/issue-tracker/load-issue-prefix.test.ts` —
        4 cases pinning the leaf-module's independent-importability
        contract (the whole reason for the Phase 2 extraction). Exercises
        `_resetWarnedPrefixPaths` directly to make warn-once dedup
        deterministic.
      - mtime-sort regression test added to `issues-reader.test.ts`:
        `preserves mtime-desc ordering of valid survivors when a
        cross-prefix YAML is skipped`.
      - `parseCardTitle` boundary tests added to `trello.test.ts`:
        leading whitespace, empty title body, missing space after colon,
        and `formatCardTitle` empty-title asymmetry pinned.

      **Code quality fixes** (code-reviewer):

      - `_resetWarnedPrefixPaths` is no longer dead — the new leaf test
        wires it into a `beforeEach` and exercises the warn-once dedup
        path explicitly. Code-reviewer items 1 + 2 closed in one move.
      - `load-issue-prefix.ts` header comment tightened to spell out the
        actual blocker (`repo-context.ts → config.ts` import chain),
        instead of relying on the quoted rule title alone.

      **Pre-existing failures fixed in-session** (Step 1.5):

      - `src/worker/server-boot-seed-error.test.ts` was failing in every
        full-suite run (acknowledged in Phase 1 retro as "pre-existing
        env-driven failure"). Root cause: missing
        `vi.mock("./restage-route.js", ...)` — the unmocked module
        transitively pulled `src/dispatch/core.ts → src/config.ts` and
        threw on missing `DANXBOT_DB_USER` at module load. Sibling
        `server.test.ts` already had the mock for the same reason.
      - Three dashboard tests (`App.test.ts`,
        `DashboardHeader.test.ts`, `SettingsPage.test.ts`) were
        failing on `Named export 'parse' not found` from
        `yaml/browser/dist/public-api.js` (vendored by
        `@thehammer/danx-ui`). Root cause:
        `dashboard/vitest.config.ts` had `server.deps.inline: ["danx-ui"]`
        — the bare form did not match the resolved
        `/node_modules/@thehammer/danx-ui/...` import path. Fixed to
        `["@thehammer/danx-ui"]`.

      Final test count: 3226 backend tests + 188 dashboard tests
      passing, `tsc --noEmit` + `vue-tsc --noEmit` green.
