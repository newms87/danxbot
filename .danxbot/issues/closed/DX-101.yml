type: Feature
title: "[Issue Prefix > Phase 2] Tracker layer + dispatch/poller/dashboard reader callsites threaded"
description: |
  ## Goal

  Thread the prefix through every code path that reads or writes
  tracker card titles, dispatch records, and dashboard issue
  projections. Trello title parser accepts ANY `[A-Z]{2,4}-\d+` so
  pre-migration `#ISS-N` titles parse during the changeover.

  Parent: DX-99. Depends on Phase 1 (DX-100).

  ## Scope

  ### Trello title format + parse

  - `src/issue-tracker/trello.ts`:
    - `formatCardName({id, title})` — already prefix-agnostic via
      `id`; verify no hardcoded `ISS-` literal in output path.
    - Inbound title parser: replace `/^#(ISS-\d+):\s*(.*)$/` with
      `/^#([A-Z]{2,4}-\d+):\s*(.*)$/`. Add unit tests for
      `#DX-12: foo`, `#SG-3: bar`, `#FD-99: baz`, plus legacy
      `#DX-5: qux` (still parses for migration window).
    - Memory tracker (`src/issue-tracker/memory.ts`) — verify it uses
      the prefix from context, not a constant.

  ### Dispatch / poller hot paths

  - `src/dispatch/core.ts`, `src/poller/orphan-push.ts`,
    `src/poller/dispatch-reattach.ts`, `src/poller/live-dispatch-guard.ts`,
    `src/poller/dispatch-liveness-yaml.ts`, `src/poller/constants.ts`:
    every regex / string-literal `ISS-` reference is replaced with
    `RepoContext.issuePrefix`-derived equivalents.
  - `src/agent/agent-handle.ts`, `src/agent/claude-invocation.ts`:
    same.

  ### Dashboard reader

  - `src/dashboard/issues-reader.ts`,
    `src/dashboard/dispatch-tracker.ts`,
    `src/dashboard/dispatch-liveness.ts` — consume the prefix from
    `RepoContext` (the dashboard already has access via
    `loadRepoContext` per repo).
  - Frontend `dashboard/src/components/issues/IssueCard.vue`,
    `IssuesPage.vue` already render the `id` field directly — verify
    no hardcoded `ISS` string in templates / labels / chip styling.
    Helper text + placeholders updated to use `<PREFIX>-N` wording.

  ### Workspace MCP / inject

  - `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts`
    — update fixture expectations to take prefix as input.
  - `src/poller/inject/workspaces/issue-worker/.mcp.json` — verify no
    hardcoded prefix.

  ### Tests

  - Add prefix-roundtrip tests for `trello#parseExternalId` /
    `formatCardName` covering DX/SG/FD/ISS.
  - Update every test in `src/__tests__/issue-tracker/`,
    `src/__tests__/dashboard/`, `src/__tests__/integration/` that
    hardcodes `ISS-` to either pass the prefix explicitly or rely on
    the `"ISS"` default fallback.

  ## Out of scope

  - Filename rename / migration — Phase 3.
  - Dashboard Settings UI for editing prefix — Phase 4.
  - Skill prose rewrite — Phase 4.

  ## Acceptance

  - Trello title parser accepts `[A-Z]{2,4}-\d+`; tests cover DX, SG,
    FD, and legacy ISS.
  - No regex / string literal `ISS-` remains in `src/dispatch/`,
    `src/poller/`, `src/dashboard/`, `src/agent/`, `src/issue-tracker/`
    outside the explicitly-named `LEGACY_ISS_REGEX` (Phase 1) and
    documented migration-window callsites.
  - Dashboard renders any prefix correctly for live data; Issues tab
    shows `<PREFIX>-N` chips.
  - Backend + dashboard vitest green; tsc + vue-tsc green.
