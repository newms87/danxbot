      ## Test Review

      ### Test inventory

      | Test File | Test Method | Status |
      |---|---|---|
      | `src/__tests__/issue-tracker/trello.test.ts` | `parses legacy ISS-N` / `DX-N` / `SG-N` / `FD-N` | Good |
      | `src/__tests__/issue-tracker/trello.test.ts` | 2-letter / 4-letter prefix boundary | Good |
      | `src/__tests__/issue-tracker/trello.test.ts` | preserves colons in title (`feat: do the thing`) | Good |
      | `src/__tests__/issue-tracker/trello.test.ts` | negative shapes (lowercase, mixed, numeric, length-bounds) | Good |
      | `src/__tests__/issue-tracker/trello.test.ts` | `formatCardTitle` it.each across 4 prefixes | Good |
      | `src/__tests__/issue-tracker/trello.test.ts` | encode→decode roundtrip across 6 prefixes | Good |
      | `src/__tests__/dashboard/issues-reader.test.ts` | `listIssues` parses DX-N / SG-N | Good |
      | `src/__tests__/dashboard/issues-reader.test.ts` | cross-prefix YAML rejected from list + detail | Good |
      | `src/__tests__/dashboard/issues-reader.test.ts` | fallback to `ISS` when `config.yml` absent / empty | Good |
      | `src/__tests__/dashboard/issues-reader.test.ts` | malformed `issue_prefix` propagates as thrown error | Good |
      | `src/repo-context.test.ts` | 14 cases on `loadIssuePrefix` + 3 on `loadRepoContext` | Good |

      ### Highest-priority gaps (fixed in follow-up)

      1. **Direct unit test for the leaf `load-issue-prefix.ts` module** —
         the WHOLE point of the Phase 2 extraction is that leaf consumers
         (the dashboard reader) can import without transitively pulling
         `src/config.ts`'s required env vars. Phase 1's tests reach
         `loadIssuePrefix` only via the `repo-context.js` re-export — which
         still pulls config. A focused leaf test pins the property the
         extraction was created to deliver.
      2. **mtime-sort with mixed cross-prefix files** — existing
         "skips ISS-N" test had only one survivor, so no sort behavior
         was asserted. Add a multi-survivor case to cover the contract
         every other `listIssues` call obeys.
      3. **`parseCardTitle` boundary inputs** — leading whitespace, empty
         title body, missing space after colon. Pin observable behavior
         so a future tightening / loosening is loud.

      ### Strengths

      - Encode→decode roundtrip table is the strongest contract pin
      - Negative-shape tests cover lowercase, mixed-case, numeric, length boundaries cleanly
      - Cross-prefix rejection tested on BOTH `listIssues` and `readIssueDetail`
      - Phase 1's leaf-prefix tests still pass via re-export — no regression in the back-compat shim

      Final test count: 3226 backend tests + 188 dashboard tests passing. `tsc --noEmit` + `vue-tsc --noEmit` green.
