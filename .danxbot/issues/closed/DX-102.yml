      <!-- danxbot -->

      ## Code Review

      Overall well-structured. Clean separation between pure helpers and
      imperative `migrateRepo`. Atomic temp+rename writes. Working
      journal-based rollback exercised by tests.

      ### Critical findings (FIXED in-session)

      - **Pre-existing destination filename silently overwritten by
        `renameSync`** — POSIX `renameSync` overwrites without notice;
        no journal entry could roll back the destroyed file. **Fix:**
        added a `[collision]` fail-loud guard before any FS mutation
        (`scripts/migrate-issue-prefix.ts:301-306`). Operator must
        resolve the collision manually before re-running.
      - **`config.yml` "missing" branch silently created a one-line
        file** — masked a real misconfiguration (operator hasn't
        connected the repo). **Fix:** branch removed; throws
        `[config] Missing …` instead. Empty-repo test still passes
        because that fixture writes a config.yml; new test covers the
        missing-config throw.

      ### Medium findings (FIXED in-session)

      - **`escapeRegex(prefix)` was duplicated logic.** Prefixes are
        validated to `^[A-Z]{2,4}$` so escaping is a no-op anyway.
        **Fix:** dropped the per-prefix `escapeRegex` calls; now uses
        `buildIssueIdRegex(prefix)` as the canonical shape validator.
        `escapeRegex` retained only for `rewriteFreeText` (defensive
        for future non-letter prefixes — cheap and harmless).
      - **Header doc claimed "Buffer" but used utf-8 string.** **Fix:**
        header now reads "original utf-8 content" and notes that issue
        YAMLs are utf-8 by contract.
      - **Confusing rollback comment** about "remove the new-path file"
        when the code only re-renames. **Fix:** comment rewritten to
        match what the code does (re-rename, idempotent on missing).
      - **Outer error catch erased error category.** `parseIssue` throws
        `IssueParseError`, but the catch stringified to a flat message.
        **Fix:** wrapping errors now carry a `[parse]` / `[rewrite]`
        / `[collision]` / `[config]` tag prefix so operators can
        triage from the summary line.

      ### Low findings (FIXED)

      - `isMain()` used `file://${resolve(...)}` which breaks on paths
        with spaces or on Windows. **Fix:** switched to Node's
        recommended `pathToFileURL(...).href`.

      ### Deferred to Phase 4 (documented)

      - **`LEGACY_ISS_REGEX` in `src/issue-tracker/yaml.ts`** is dead
        code — Phase 1 added it claiming "Phase 3 of DX-99 (the
        migration script) uses it" but Phase 3 uses
        `buildIssueIdRegex(prefix)` for arbitrary-prefix correctness.
        Leaving the constant for Phase 4 ("Removing the legacy 'ISS'
        default fallback") to delete alongside `DEFAULT_ISSUE_PREFIX`.
      - **`migrateRepo` is ~163 lines.** Tests exercise via the public
        `runMigration` surface; refactor into 3 helpers
        (`collectMutations`, `applyMutations`, `updateConfig`) is
        mechanical but out-of-scope for this card.
      - **`setConfigPrefix` regex parser** could share a writer with
        `parseSimpleYaml` reader. No second consumer exists yet — the
        seed of duplication is here but not the code smell. Phase 4
        UI work is the natural place to surface a shared helper.
