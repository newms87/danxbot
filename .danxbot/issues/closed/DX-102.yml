      Both pass on isolated runs and on full-suite re-runs without
      changes. Two consecutive full-suite runs in this dispatch
      ended at 0 / 0 failures. If Phase 3 hits one of these, retry
      the suite once before debugging — root cause is timing, not
      the new code.
