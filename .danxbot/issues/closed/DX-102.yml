      ## Needs Help — operator must restart workers + run `make test-system-poller`

      **What's done:**
      - Migration script + 26 tests landed (commit `e8044ed`).
      - One-shot run executed with the script:
        - **danxbot:** 148 YAMLs migrated `ISS → DX`, `config.yml` updated to `issue_prefix: DX` (first attempt rolled back due to malformed `ISS-143.yml` — a backtick-wrapped colon in an unquoted `title:` was YAML-parsed as a nested mapping; quoted the title in-session and re-ran, second attempt succeeded).
        - **gpt-manager:** 129 YAMLs migrated `ISS → SG`, `config.yml` updated to `issue_prefix: SG`.
        - **platform:** 0 YAMLs (none existed), `config.yml` updated to `issue_prefix: FD`.
      - Graph integrity validated: every YAML parses with `expectedPrefix=<repo prefix>`, zero dangling `parent_id` / `children` / `blocked.by` refs (148 + 129 + 0 issues, 0 dangling).

      **What's still needed (operator action):**

      1. **Restart workers** so they re-read the new `issue_prefix` from `config.yml`. The currently running worker has `repo.issuePrefix = "ISS"` cached in memory from boot time. Until restart, the poller will scan for `ISS-N.yml` files (none left) and outbound sync cannot find any cards. From the host:
         ```bash
         cd /home/newms/web/danxbot
         make stop-all-workers
         make launch-worker REPO=danxbot       # docker
         make launch-worker REPO=gpt-manager   # docker
         # Or host-mode equivalents if you prefer interactive Windows Terminal tabs
         ```
      2. **Verify the poller works against the migrated repos** — AC #5:
         ```bash
         make test-system-poller
         ```
         This creates a `[System Test]` Trello card on the danxbot board, waits for the poller to dispatch + complete, and cleans up. ~$0.05–0.10 of Claude API cost. Requires `TRELLO_API_KEY` + `TRELLO_API_TOKEN` (already in `<repo>/.danxbot/.env`).
      3. **Commit the per-repo migration results**. The script is already committed in danxbot (`e8044ed`). The migration MUTATED these files in each repo (issues are gitignored everywhere; only `config.yml` is tracked):
         - `repos/danxbot/.danxbot/config/config.yml` (`issue_prefix: DX` added)
         - `repos/gpt-manager/.danxbot/config/config.yml` (`issue_prefix: SG` added)
         - `repos/platform/.danxbot/config/config.yml` (`issue_prefix: FD` added)

         **The dispatched agent is committing these now (one commit per repo) before exiting** — operator should still review the 3 commits show up clean.
      4. **Move card to Done** once `make test-system-poller` passes. Mark AC #5 `checked: true` and set `status: Done`.

      **Why this needs human/host help:**

      `make test-system-poller` cancels every in-flight worker job before creating the test card (the script does `POST /api/cancel/<jobId>` against every job whose status is `running`). The agent processing this card IS the only running job on the worker. Running the test from inside this dispatch would self-cancel before the test could complete. So this verification step inherently needs a fresh shell after the dispatched agent has exited.

      Also, the worker restart in step 1 must happen post-migration regardless — the in-memory `issuePrefix` is stale and only a process restart re-reads `config.yml`. It is the operator's responsibility either way; folding the test into the same restart cycle is the natural workflow.

      **Incomplete ACs:**

      - `make test-system-poller green against migrated repos` — operator-driven, post-restart. The migration's structural correctness is fully verified (every YAML parses, zero dangling refs); the system test is the runtime validation.

      **Final AC check:** Before Done, every AC must be checked: true.
