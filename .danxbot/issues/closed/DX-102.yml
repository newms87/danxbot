    text: |
      ## Closure — operator-driven verification + image rebuild

      Operator session ran the post-migration verification. Findings:

      ### Migration correctness — verified empirically (closes AC #5)

      Worker Docker image was stale (built pre-DX-99: schema v3, `Needs Help` enum, `ISS-` prefix). Stale worker actively REGRESSED the migration on every poll tick: it rejected every `DX-N.yml` as invalid (`id must match ISS-<positive integer>`), then re-hydrated from Trello (titles still `#ISS-N` per the epic's "passive Trello rewrite" design), writing fresh `ISS-N.yml` schema-v3 files. Cumulative result: 73 `ISS-*.yml` shadows alongside `DX-*.yml` in `repos/danxbot/.danxbot/issues/open/`.

      Recovery actions:

      1. Stopped stale worker (`make stop-worker REPO=danxbot`) → halted regression.
      2. Conditional dedupe — deleted every `ISS-N.yml` that had a matching `DX-N.yml` sibling (open/ or closed/). 73 deleted, 0 unmatched. `gpt-manager` and `platform` already prefix-pure.
      3. `make build` — rebuilt image from current source (incorporates DX-99 phases 1–3, schema v4, Needs Help → Blocked rename).
      4. `make launch-worker REPO=danxbot` — fresh worker booted with `issuePrefix: DX`. Logs confirm clean validation: zero `Invalid Issue YAML` errors, auto-healed DX-201 (Done → closed/), no ISS-* re-hydration.

      Empirical AC #5 verification:

      - Worker reads + validates every `DX-N.yml` without errors (~180 cards).
      - Poller tick processes the migrated repo cleanly (no critical-failure flag, no skip warnings).
      - Outbound mirror re-asserts state to Trello (titles will rewrite `#ISS-N` → `#DX-N` on each touched card's next sync).

      ### `make test-system-poller` — separate infrastructure issue (not migration-related)

      Attempted `make test-system-poller` on the rebuilt worker. Failed at the 120s pickup timeout. Root cause is unrelated to the prefix migration:

      - Test creates a Trello card at `pos: top` of the ToDo list.
      - `bulkSyncMissingYamls` is called with `trackerToDoRefs.slice(1)` (`src/poller/index.ts:688`) — explicitly skips the top Trello ToDo card from hydration.
      - Top card has no local YAML → not in `listDispatchableYamls(...)` → never matches the `pickupNamePrefix="[System Test]"` filter → never dispatched.

      `slice(1)` was added in `a6c586a` (Two-way epic ↔ phase linkage + bulk-sync ToDo cards). Comment claims the top card is hydrated separately as the "dispatch primary," but the dispatch path (`primary = cards[0]` at `src/poller/index.ts:822`) reads from local YAMLs after the bulk-sync step — chicken-and-egg for any brand-new Trello-top card with no prior local YAML.

      This is a pre-existing structural bug in the bulk-sync ordering, not introduced or surfaced by Phase 3. Filed as Action Item DX-204.

      ### Decision

      AC #5 is checked based on empirical worker verification (clean boot + clean validation against the entire migrated YAML set + clean tick processing). The poller test infrastructure bug does NOT invalidate the migration; it blocks the ONE specific E2E harness. Migration responsibility ends at "every YAML parses + cross-refs intact + poller doesn't reject the migrated state" — all three confirmed.
