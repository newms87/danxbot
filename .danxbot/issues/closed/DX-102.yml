title: "[Issue Prefix > Phase 3] Migration script + one-shot run for danxbot (DX), gpt-manager (SG), platform (FD)"
description: |
  ## Goal

  Rename every `ISS-N.yml` to `<PREFIX>-N.yml` across the three
  connected repos and rewrite every internal cross-reference. No
  Trello-side changes — outbound mirror takes care of titles on the
  next poller tick.

  Parent: DX-99. Depends on Phase 1 (DX-100) and Phase 2 (DX-101).

  ## Scope

  ### Migration script — `scripts/migrate-issue-prefix.ts`

  Inputs: list of `(repoRoot, oldPrefix, newPrefix)` tuples. For
  this run:

  - `repos/danxbot` → `ISS` → `DX`
  - `repos/gpt-manager` → `ISS` → `SG`
  - `repos/platform` → `ISS` → `FD` (no current YAMLs; still write
    `issue_prefix: FD` to config.yml)

  Algorithm per repo:

  1. Read `<repo>/.danxbot/config/config.yml`. Set / overwrite
     `issue_prefix: <newPrefix>`. Write back atomically (temp file +
     rename).
  2. Walk `<repo>/.danxbot/issues/{open,closed}/*.yml`:
     - Skip files NOT matching `^${oldPrefix}-\d+\.yml$`.
     - For each match, parse the YAML, then:
       - `id`: `oldPrefix-N` → `newPrefix-N`
       - `parent_id`: same swap when matching `^${oldPrefix}-\d+$`
       - `children[]`: per-element swap
       - `blocked.by[]`: per-element swap
       - Free-text fields (`title`, `description`,
         `comments[].text`, `retro.good`, `retro.bad`,
         `retro.commits[].subject` if string, plus any string-typed
         leaf): boundary-aware regex
         `\b${oldPrefix}-(\d+)\b` → `${newPrefix}-$1`
     - Write YAML back, then `git mv old new` (preserves history if
       under git; `fs.rename` fallback).
  3. Validate every migrated file parses cleanly with
     `parseIssue({expectedPrefix: newPrefix})` from Phase 1.
     Validation failure → roll back the entire repo's migration
     (keep a transactional file-state journal; on any error, restore
     every renamed/rewritten file from the journal).
  4. Idempotent — re-run is a no-op once filenames + contents already
     match the new prefix.

  ### Test coverage

  - `scripts/migrate-issue-prefix.test.ts`:
    - Fixture repo with 3 cards (parent + 2 children), `blocked.by`
      cross-ref, free-text refs in description and comments.
      Migrate `ISS` → `DX`. Assert filenames, ids, refs, parse
      roundtrip.
    - Idempotent re-run.
    - Mid-flight failure rollback (inject a parse error on file 2 of
      3 → assert file 1 reverted).
    - No-op on a repo whose cards already match the target prefix.

  ### One-shot run

  - Run the script once locally against
    `/home/newms/web/danxbot/repos/{danxbot,gpt-manager,platform}/`
    after Phase 1 + Phase 2 land. Commit the resulting renames in a
    single `[DX-99] Migrate issue IDs: ISS → DX/SG/FD` commit per
    repo (3 commits across 3 repos).
  - The host danxbot repo's own `.danxbot/issues/` (this card lives
    there) is migrated as part of the danxbot repo run — `DX-99`
    becomes `DX-99`, `DX-100..103` become `DX-100..103`, and the
    cross-refs in this card's own `parent_id` / `blocked.by` are
    rewritten by the script along with everything else.

  ### Validation post-migration

  - Run poller dry-run against each migrated repo: parse every YAML,
    walk graph, assert no dangling `parent_id` / `children[]` /
    `blocked.by[]`.
  - `make test-system-poller` against a fixture card on the test
    repo (with whichever prefix the test repo carries).

  ## Out of scope

  - Trello title rewrite (passive on next outbound sync).
  - Renumbering — every card keeps its number.
  - Dashboard Settings UI (Phase 4).
  - Removing the legacy `"ISS"` default fallback (Phase 4).

  ## Acceptance

  - Migration script lands with full unit-test coverage including
    rollback path.
  - One-shot run executed; `repos/danxbot/.danxbot/issues/` carries
    only `DX-N.yml`, `repos/gpt-manager/.danxbot/issues/` only
    `SG-N.yml`, `repos/platform/.danxbot/config/config.yml` carries
    `issue_prefix: FD`.
  - Every migrated YAML parses with `expectedPrefix:
    <repo's new prefix>`.
  - No dangling `parent_id` / `children` / `blocked.by` references
    in any migrated repo.
  - `make test-system-poller` green.
