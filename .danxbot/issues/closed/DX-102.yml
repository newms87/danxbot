      ## Notes from Phase 2 (DX-101 — committed `632b40e`)

      Inheriting prefix-aware infrastructure from Phases 1 + 2. Phase 3
      runs the migration that consumes it.

      ### Reusable helpers (already shipped — DO NOT re-implement)

      | Symbol | Module | Purpose |
      |---|---|---|
      | `loadIssuePrefix(repoLocalPath)` | `src/issue-tracker/load-issue-prefix.js` | Reads `<repo>/.danxbot/config/config.yml` `issue_prefix`. Throws on shape mismatch; returns `"ISS"` (with warn-once) when absent. **Use this as the per-repo source of truth in the migration runner.** |
      | `buildIssueIdRegex(prefix)` | `src/issue-tracker/yaml.js` | Returns `/^${prefix}-\d+$/`. Validates `prefix` shape; throws fail-loud on bad input. |
      | `LEGACY_ISS_REGEX` | `src/issue-tracker/yaml.js` | Named constant for `/^ISS-\d+$/`. Preserved exactly for the migration script — use this for the "old prefix" matcher instead of re-introducing the literal regex. |
      | `parseIssue(text, { expectedPrefix })` | `src/issue-tracker/yaml.js` | Phase 1's per-repo validator. Pass the NEW prefix during post-migration verification to confirm every migrated YAML's `id` field matches. |
      | `nextIssueId(issuesRoot, prefix)` / `maxIssueNumber(issuesRoot, prefix)` | `src/issue-tracker/id-generator.js` | Prefix-aware id allocation; filename scan filters to `<prefix>-N.yml` only and warns on cross-prefix files. |
      | `parseCardTitle(name)` | `src/issue-tracker/trello.js` | Inbound parser already accepts any `[A-Z]{2,4}-\d+`. Trello-side titles need NO migration — outbound sync reformats on next tick. |
      | `DEFAULT_ISSUE_PREFIX` / `ISSUE_PREFIX_SHAPE` | `src/issue-tracker/yaml.js` | Single source for the legacy `"ISS"` default and the `^[A-Z]{2,4}$` shape regex. |

      ### Transactional rollback — gotcha

      The dashboard reader (`src/dashboard/issues-reader.ts`) now
      validates every YAML against the per-repo prefix and treats
      cross-prefix YAMLs as MALFORMED (skipped with warn-once log).
      Implication for Phase 3: during a partial migration the
      dashboard will SKIP some cards entirely if `config.yml` already
      flipped to the new prefix but some `<old-prefix>-N.yml` files
      still exist on disk. **Update `config.yml` LAST in the
      transactional rollout** — rename + rewrite every YAML first,
      then atomically swap `config.yml`. On rollback: revert in
      reverse order (restore `config.yml` first if it was already
      flipped, then restore each YAML).

      The id-generator's filename-scan mismatched-prefix warning
      (`src/issue-tracker/id-generator.ts:114`) is the operator-
      facing breadcrumb — if a partial state leaks into production,
      the worker logs will name `scripts/migrate-issue-prefix.ts` as
      the recovery path.

      ### Phase 1 retro deferred a dashboard concern that's now fixed

      Phase 1's retro noted: `src/dashboard/issues-reader.ts`
      `parseIssue` was using default `"ISS"` because the dashboard is
      multi-repo at read-time. Phase 2 closed this — the reader now
      calls `loadIssuePrefix(repoCwd)` and threads the result. Phase
      3 doesn't need to revisit dashboard reader prefix awareness.

      ### Test patterns to mirror

      - `src/__tests__/issue-tracker/trello.test.ts` (parseCardTitle
        prefix roundtrip): structure for `it.each` over every prefix
        family.
      - `src/__tests__/dashboard/issues-reader.test.ts`
        (`setupRepoWithPrefix(prefix)` helper): pattern for fixture
        repos that write `config.yml` + YAMLs together.
      - `src/__tests__/issue-tracker/load-issue-prefix.test.ts`
        (leaf-module independent-importability pin): the migration
        script will be a leaf too — keep its imports off
        `src/repo-context.ts → src/config.ts`.

      ### Pre-existing failures fixed in Phase 2 (not Phase 3 work)

      - `src/worker/server-boot-seed-error.test.ts` — added missing
        `vi.mock("./restage-route.js", ...)`. Sibling
        `server.test.ts` had it.
      - `dashboard/vitest.config.ts` — `server.deps.inline` corrected
        from `"danx-ui"` to `"@thehammer/danx-ui"`. Three SPA tests
        unblocked.

      ### Order-dependent flakes to watch (NOT introduced by Phase 2)

      Two backend tests are flaky under full-suite parallelism;
