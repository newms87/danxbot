title: "[Issue Prefix > Phase 4] Dashboard Settings UI + skills/rules/docs swap + drop ISS fallback"
description: |
  ## Goal

  Surface `issue_prefix` as an editable field on the dashboard
  Agents/Settings tab, rewrite skill / rule / doc prose to a
  generic `<PREFIX>-N` placeholder convention, and remove the
  one-release `"ISS"` default fallback so `issue_prefix` becomes a
  required field on `config.yml`.

  Parent: DX-99. Depends on Phases 1, 2, and 3 (DX-100..102).

  ## Scope

  ### Dashboard Settings UI

  - `dashboard/src/components/agents/<existing AgentsTab section>`:
    add an "Issue prefix" text input per repo.
    - `pattern="[A-Z]{2,4}"`, `maxlength=4`, helper text "2-4
      uppercase letters".
    - Live-validates against the same regex used by `RepoContext`.
    - Save button is disabled until value is dirty + valid.
  - `PUT /api/agents/:repo/issue-prefix` route in
    `src/dashboard/server.ts`:
    - Auth: same dashboard auth as other `/api/agents/*` routes.
    - Body `{prefix: string}`. Validate `^[A-Z]{2,4}$`.
    - Worker writes `issue_prefix` to
      `<repo>/.danxbot/config/config.yml` (atomic write — temp file
      + rename — same pattern as `settings-file.ts`).
    - Trigger in-process migration via the Phase 3 script (passing
      old prefix loaded from disk + new prefix from body).
    - Response: `{prefix, migratedFiles: <count>}`.
    - Errors: 400 on bad regex, 409 if a poller dispatch is
      currently active for that repo (don't migrate while a worker
      holds a YAML lock), 500 on migration rollback.
  - SSE event broadcasted on success so the Issues tab reloads with
    the new prefix's chips.

  ### Skill / rule / doc prose rewrite

  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-*/SKILL.md`
    and `.../.claude/rules/danx-*.md`:
    rewrite every literal `ISS-N` reference to `<PREFIX>-N` (or the
    contextual phrase "this repo's issue prefix"). The poller's
    per-repo file renderer (`renderPerRepoFilesIntoWorkspaces` in
    `src/poller/index.ts`) writes a new
    `.claude/rules/danx-issue-prefix.md` into every workspace each
    tick, carrying the live `issuePrefix` value, so skills can
    reference the rendered file when they need the actual string.
  - `.claude/rules/agent-dispatch.md`,
    `.claude/rules/issue-card-workflow.md` (or wherever issue prose
    lives), `CLAUDE.md` Autonomous Agent Team section: same
    treatment.
  - `dashboard/src/components/chat/chatFixtures.ts` — fixture data
    keeps `ISS-` only if asserting legacy compat; otherwise switch
    to a representative new prefix (`DX-`).

  ### Drop legacy fallback

  - Remove the `"ISS"` default from `RepoContext` loader; missing
    `issue_prefix` now throws at startup with a clear error message:
    `"<repo>/.danxbot/config/config.yml is missing required field
    issue_prefix; run scripts/migrate-issue-prefix.ts or set it
    manually."`.
  - Remove the exported `LEGACY_ISS_REGEX` constant from Phase 1.
  - Setup skill (`/setup`) prompts for the prefix on every new repo.

  ### Tests

  - Dashboard composable / handler tests for the new
    `PUT /api/agents/:repo/issue-prefix` endpoint covering happy
    path, bad regex, active-dispatch rejection, migration failure.
  - Update workspace-shape test to assert
    `danx-issue-prefix.md` is rendered into every workspace dir per
    tick.
  - Update RepoContext loader test — missing `issue_prefix` now
    throws (was warn-once-default in Phase 1).

  ## Out of scope

  - Renaming the prefix mid-flight while a dispatch is active —
    409s in this phase, no further story.
  - Per-card prefix override (every card in a repo shares the
    repo's prefix, by design).

  ## Acceptance

  - Agents tab displays + edits `issue_prefix` per repo; save → write
    config.yml → run migration → SSE refresh; full round-trip green
    in a manual smoke.
  - All workspace skills / rules / docs use `<PREFIX>-N` placeholder
    convention; rendered `danx-issue-prefix.md` carries the live
    value per workspace.
  - Missing `issue_prefix` in `config.yml` throws at worker startup;
    no legacy ISS fallback remains in code.
  - vitest backend + dashboard suites green; tsc + vue-tsc green.
