retro:
  good: |
    - Parallelization paid off: prose rewrite (batch-editor, 10 files) and the legacy-fallback drop (forked worktree, 29 files) ran concurrently while the main session built the dashboard handler + UI. Three independent agents on disjoint file sets, no merge conflicts on file boundaries.
    - Test coverage held the line: 3493 backend + 188 dashboard at baseline → 3505 + 188 after. New surface (5 happy/error branches on the PUT handler + per-repo render assertion) covered without regressing any prior test.
    - Live `loadIssuePrefix` read on every snapshot beats persisting through `display.*` — a `PUT` is visible on the very next `/api/agents` poll without waiting for the worker's `syncSettingsFileOnBoot`. Same pattern fits the criticalFailure read; consistent ergonomics.
    - The `httpRequest` 409 probe against the worker's `/api/jobs` reuses an existing worker route; no new endpoint required. Probe failures fall through to "no active job" so a stuck worker can't block prefix migration on top of being unreachable.
  bad: |
    - Forked worktree branched from the parent's HEAD at fork time (`be94d96`) but the parent had already advanced 4 commits beyond that — including DX-202 (`Needs Help → Blocked` rename, `blocked` → `waiting_on` split, schema v4). Cherry-picking the worktree's single commit onto current main produced 2 conflicts in test files (`yaml.test.ts`, `yaml-lifecycle-memory-tracker.test.ts`) where main's tests asserted v4 wording while the worktree's edits assumed v3. Resolved by keeping main's v4 assertions and threading the new required `expectedPrefix` arg.
    - Cherry-pick incidentally reverted `IssueBoard.vue`'s Epic-first sort (worktree was 4 commits behind, didn't have that fix). Caught by hand and reverted via `git checkout HEAD -- IssueBoard.vue`. Should add a CI guard that flags cherry-picks that touch files outside the dispatched agent's intended scope.
    - The host-session `mcp__danx-issue__danx_issue_save` is pinned to schema v3, so this card had to be edited directly via Read/Edit on the YAML rather than the MCP path. Acknowledged by the handoff comment but still felt like a foot-gun for any agent unfamiliar with the worker-vs-host MCP split.
    - `make test-system-poller` is broken upstream (DX-204 — `bulkSyncMissingYamls` `slice(1)` bug). Did not touch in this card per AC #5 (which only measures vitest backend + dashboard, not system tests).
