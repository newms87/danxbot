    text: |
      ## Handoff — Phase 4 pickup context (operator session 2026-05-08)

      Phases 1-3 are complete and verified empirically. This card is the only remaining work for the DX-99 epic. Read this comment top-to-bottom before touching code — it captures everything the prior session learned that isn't already in the description.

      ### Phase status going in

      | Phase | Card | Status | Commits |
      |---|---|---|---|
      | 1 — Schema + RepoContext + helpers | `DX-100` | Done | `1b433d3` |
      | 2 — Tracker layer + dashboard reader | `DX-101` | Done | `632b40e` |
      | 3 — Migration script + one-shot run | `DX-102` | Done | `e8044ed` (script + tests), `31f3719` (danxbot ISS→DX, 148 YAMLs), `779399fc` (gpt-manager ISS→SG, 129 YAMLs), `d4d8a16b4` (platform ISS→FD, config.yml only) |
      | 4 — This card | `DX-103` | ToDo | — |

      ### Reusable helpers ALREADY SHIPPED — DO NOT re-implement

      | Symbol | Module | Notes |
      |---|---|---|
      | `loadIssuePrefix(repoLocalPath)` | `src/issue-tracker/load-issue-prefix.ts` | Reads `<repo>/.danxbot/config/config.yml#issue_prefix`. Throws on shape mismatch; returns `"ISS"` (warn-once) when absent. **AC #4 of THIS card removes the warn-once-default branch — make missing key fail loud.** |
      | `buildIssueIdRegex(prefix)` | `src/issue-tracker/yaml.ts` | Returns `/^${prefix}-\d+$/`. Validates prefix shape (`^[A-Z]{2,4}$`), throws fail-loud on bad input. |
      | `LEGACY_ISS_REGEX` | `src/issue-tracker/yaml.ts` | Dead code. **AC #4 — delete this alongside `DEFAULT_ISSUE_PREFIX` removal.** |
      | `parseIssue(text, { expectedPrefix })` | `src/issue-tracker/yaml.ts` | Per-repo validator. Used for migration verification. |
      | `nextIssueId(issuesRoot, prefix)` / `maxIssueNumber(issuesRoot, prefix)` | `src/issue-tracker/id-generator.ts` | Prefix-aware ID allocation; warns on cross-prefix files. |
      | `parseCardTitle(name)` | `src/issue-tracker/trello.ts` | Inbound parser accepts any `[A-Z]{2,4}-\d+`. |
      | `DEFAULT_ISSUE_PREFIX` / `ISSUE_PREFIX_SHAPE` | `src/issue-tracker/yaml.ts` | **AC #4 — remove `DEFAULT_ISSUE_PREFIX`; keep `ISSUE_PREFIX_SHAPE` (still needed by validators).** |
      | `runMigration({plan})` | `scripts/migrate-issue-prefix.ts` | Phase 3 migration entry point with transactional rollback. **PUT /api/agents/:repo/issue-prefix calls this in-process.** |
      | `setConfigPrefix(configPath, prefix)` | `scripts/migrate-issue-prefix.ts` | Atomic temp+rename writer for `issue_prefix:` field on `config.yml`. Use this from the dashboard handler — do NOT roll a second writer. |
      | `renderPerRepoFilesIntoWorkspaces(...)` | `src/poller/index.ts` | Already renders `danx-repo-config.md`, `danx-repo-overview.md`, `danx-repo-workflow.md`, `danx-tools.md` per tick into every workspace dir. **AC #3 — ADD a fifth rendered file `danx-issue-prefix.md` carrying the live `issuePrefix` value.** |

      ### Environment state going in

      - Worker `danxbot-worker-danxbot` was REBUILT in this session (`make build` + `make launch-worker REPO=danxbot`). Image now incorporates DX-99 Phases 1-3 + the v3→v4 schema rename + `Needs Help → Blocked` enum. **Do NOT skip `make build` if you change Dockerfile-baked code; the prior stale image actively regressed the migration by re-hydrating ISS-N.yml shadows from Trello.**
      - All 3 connected repos are prefix-pure: `repos/{danxbot,gpt-manager,platform}/.danxbot/issues/` carry zero `ISS-*.yml` (73 shadows in danxbot were conditionally deleted after dedupe vs DX-* siblings — all matched, 0 unmatched).
      - `repos/{danxbot,gpt-manager,platform}/.danxbot/config/config.yml` carry `issue_prefix: DX|SG|FD`.

      ### Dispatch hazards

      1. **`make test-system-poller` is BROKEN due to a pre-existing unrelated bug (filed as DX-204).** The test harness creates a Trello card at `pos: top` of ToDo; `bulkSyncMissingYamls` does `trackerToDoRefs.slice(1)` (`src/poller/index.ts:688`) → top card never hydrates to local YAML → never matches `pickupNamePrefix` filter → 120s pickup deadline expires → test fails. Do NOT debug this in DX-103 scope; it has its own card. AC #5 of THIS card is "vitest backend + dashboard suites green; tsc + vue-tsc green" — **NOT** `test-system-poller`.

      2. **Pre-existing uncommitted in-flight work on host repo** (NOT from this session): `git status` shows `M` on many files for an in-progress `Needs Help → Blocked` rename + `dashboard/src/components/issues/issuePalette` refactor. **Do NOT include these in any DX-103 commit.** They belong to a separate ongoing piece of work. Use `git status -s` and `git add` SPECIFIC paths only — never `git add .` / `git add -A`.

      3. **Pre-existing test failures unrelated to DX-103**:
         - Backend vitest: 22 fail / 3482 — all in the `Needs Help → Blocked` rename WIP files (`src/poller/{epic-status,heal,local-issues,yaml-lifecycle}.test.ts`, `src/__tests__/{dashboard/issues-reader,integration/yaml-lifecycle-memory-tracker,issue-tracker/sync,worker/issue-route}.test.ts`, `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts`).
         - Dashboard vitest: 6 fail / 188 — all in `dashboard/src/components/issues/issuePalette.test.ts` (mid-refactor: code returns `"waiting"`, test expects `"blocked"`).
         - **AC #5 measures DX-103's effect on test counts — your changes must not increase failures.** Compare before/after, not absolute numbers. If your run shows >22 backend / >6 dashboard fails, your changes regressed something; if equal, you held the line; if less, you happened to also fix something incidental.

      4. **`@thehammer/danx-issue` MCP server schema validator is stuck on schema_version 3.** `mcp__danx-issue__danx_issue_get DX-99` from a fresh dispatch will throw `schema_version must be 3 (got 4)`. Read YAMLs directly with the Read tool until that npm package is bumped (separately tracked). The worker container's bundled MCP is fine; the host-session MCP that comes from `npm install` is stale.

      ### Dashboard handler — implementation guidance

      Auth pattern: copy from existing `/api/agents/*` routes in `src/dashboard/server.ts` (look for `requireUser` or the dashboard auth middleware band).

      Concurrency / 409 active-dispatch check: query the worker's `GET /api/jobs` (returns every active dispatch in `activeJobs`). If any job's `repo` matches the target, return 409 with `{error: "Active dispatch holds a YAML lock; wait for it to complete or cancel via /api/cancel/<jobId>"}`.

      Migration call: import `runMigration` from `scripts/migrate-issue-prefix.ts`. The script is a leaf module (zero deps on `repo-context.ts → config.ts`) so it imports cleanly into the dashboard server. Pass:
      ```ts
      await runMigration({
        plan: [{
          repoRoot: ctx.repoLocalPath,
          oldPrefix: currentPrefix,
          newPrefix: req.body.prefix,
        }],
      });
      ```
      The script's existing rollback handles partial failures.

      SSE: `src/dashboard/events.ts` carries the broadcaster. Emit `issue_prefix_changed` with `{repo, oldPrefix, newPrefix, migratedFiles}` so the Issues tab knows to reload. Pattern matches existing event types — re-use.

      ### Skill / rule / doc rewrite — workspaces

      Per-workspace skill files live in `src/poller/inject/workspaces/issue-worker/.claude/{skills,rules}/danx-*` and are mirrored verbatim every tick (`injectDanxWorkspaces` in `src/poller/index.ts`). Edit the source-of-truth files in `src/poller/inject/workspaces/` — the worker re-syncs to every connected repo's `.danxbot/workspaces/issue-worker/.claude/` on the next tick. **Do NOT edit the mirrored copies in `<repo>/.danxbot/workspaces/`** — they get overwritten.

      Test pin: `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` asserts the workspace fixture matches the marketplace mirror byte-for-byte. After your edits, you may need to also touch the marketplace mirror (referenced inside that test) — read the test to see which path. Already 2 fails in this file from the in-flight `Needs Help → Blocked` work; do not let your changes add a third.

      ### Drop legacy fallback — sequence

      Order matters because deleting `DEFAULT_ISSUE_PREFIX` makes every test that doesn't pass `expectedPrefix` blow up:

      1. Add explicit `expectedPrefix` / `prefix` arg to every callsite that previously relied on the default. `grep -rn "DEFAULT_ISSUE_PREFIX\|LEGACY_ISS_REGEX" src/` lists the consumers.
      2. Update tests to thread `"ISS"` explicitly where they're asserting legacy compat.
      3. Make `loadIssuePrefix` throw on missing field (was warn-once-default).
      4. Delete `DEFAULT_ISSUE_PREFIX` and `LEGACY_ISS_REGEX`.
      5. Run full vitest suite. Fix any callsite that still relies on the default.

      ### Setup skill update

      `/setup` is in `src/setup/` (npm-style installer). Find the wizard step that writes `<repo>/.danxbot/config/config.yml` and add a "Issue prefix (2-4 uppercase letters)" prompt. Existing repos already have `issue_prefix` set — only matters for new connections.

      ### Acceptance reminder — manual smoke at the end

      Per AC #1, do a real end-to-end smoke before marking Done:
      1. Open dashboard at `http://localhost:5566` → Agents tab.
      2. Edit `issue_prefix` for one repo (e.g. `DX → DTX` on a test scratch).
      3. Save. Verify: `config.yml` flipped, every YAML renamed, references rewritten.
      4. Verify SSE-driven Issues tab refresh shows new chips.
      5. **Reset to `DX` after the smoke** so the rest of the session sees the canonical prefix. The migration script is idempotent — running it back is safe.

      ### Sibling Action Item — DX-204

      Out of scope for this card but linked: `bulkSyncMissingYamls` `slice(1)` bug breaks any new Trello-top card from hydrating, including `make test-system-poller`. Card has full reproduction + fix sketch. Don't address here; flag in retro if it bites you.
