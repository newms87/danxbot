title: Triage agent silent-completion guard — detect dispatches that complete without advancing triage.expires_at
description: |-
  ## Context

  Phase 4 of DX-90 (DX-94, commit `76b7723`) wired per-card triage dispatches into the poller. A new failure mode is reachable today and not detected:

  A `kind: "triage"` dispatch that signals `danxbot_complete({status: "completed"})` **without persisting `triage.expires_at`** is invisible to every existing guard:

  - `consecutiveFailures` does not increment (status=completed, by design).
  - `recoverStuckCards` does not fire (it only triggers on agent failure / timeout, and only for cards that moved to In Progress mid-run).
  - `checkCardProgressedOrHalt` does not fire — `tryTriageDispatch` deliberately leaves `state.trackedCardId` null because triage is not a list-move operation.
  - The next poll tick's `listTriageDueYamls` returns the same card (expired-or-empty `triage.expires_at` still matches).
  - The same broken agent gets dispatched against the same card on every interval. Token burn loop.

  This is a real regression surface introduced by Phase 4: pre-Phase-4, the bulk-triage agent failed-loud-or-not-at-all because every Action Items card flowed through one prompt. Per-card triage moves the responsibility onto every individual dispatch.

  ## Repro

  1. Spawn a triage agent that returns `danxbot_complete({status: "completed", summary: "..."})` without calling `mcp__danx-issue__danx_issue_save` (or saving without updating `triage.expires_at`).
  2. Observe: `tracker.fetchOpenCards` still returns the card on the next tick, `listTriageDueYamls` still includes it, `tryTriageDispatch` re-dispatches the same broken agent.
  3. Repeat indefinitely until operator notices the dashboard's per-card spend.

  ## Root Cause

  No invariant in the worker or poller asserts that a triage dispatch progressed its `triage.expires_at` (or any other observable triage state). The `dispatch{}` block IS cleared by `clearActiveDispatch` in `onComplete` regardless — that's correct, the dispatch DID end. The missing guard is at the application-state level: did the dispatch DO ANYTHING.

  ## Proposed Solutions

  Pick exactly one. Both close the loop.

  ### Option A — Worker-side validator (preferred)

  In the danxbot worker's `mcp__danxbot__danxbot_complete` handler (or the `mcp__danx-issue__danx_issue_save` path), reject a save from a `kind: "triage"` dispatch that did NOT advance `triage.expires_at` past the dispatch's `started_at`. Mechanism:

  - Worker tracks the dispatch's `started_at` from `activeJobs`.
  - On the final `danx_issue_save` for that dispatchId, compare the saved YAML's `triage.expires_at` against the dispatch's `started_at`.
  - If `expires_at` is empty OR `expires_at <= started_at`, fail the save with a structured error and / or write the `CRITICAL_FAILURE` flag.

  ### Option B — Poller post-dispatch guard

  In `handleAgentCompletion` (`src/poller/index.ts`), add a parallel branch to `checkCardProgressedOrHalt` that fires for `kind: "triage"` dispatches:

  - Track the triage target's `id` on `RepoPollerState` (analog to `trackedCardId`).
  - After completion, re-read the YAML and verify `triage.expires_at` advanced. If it didn't, write the `CRITICAL_FAILURE` flag with a triage-specific reason.

  Option A localizes the contract to the save path (catches every consumer including future ones); Option B keeps the change in the poller (no MCP server publish needed).

  ## Files

  - `src/agent/launcher.ts` — `activeJobs` already tracks `startedAt`; expose for reading.
  - `src/worker/issue-route.ts` — likely the validator hook for Option A.
  - `src/poller/index.ts` — `tryTriageDispatch` + `handleAgentCompletion` for Option B.
  - `src/critical-failure.ts` — flag writer (already exists, just adopt for the new branch).

  ## Acceptance

  - A triage dispatch that completes without updating `triage.expires_at` fails LOUDLY — either the save is rejected with a structured error OR the `CRITICAL_FAILURE` flag is written.
  - The poller refuses to re-dispatch the same triage target until an operator acks the failure.
  - Test: drive a fake triage agent that returns `status: "completed"` without saving; assert the loud failure path fires.
  - Existing successful triage flow still passes (regression guard).

  ## Out of scope

  - Changing the `triage{}` schema.
  - Re-introducing the bulk-triage path.
  - Worker-side dispatch lifecycle changes beyond the validator hook.
