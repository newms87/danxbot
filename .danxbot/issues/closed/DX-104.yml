    text: |-
      <!-- danxbot -->

      ## Decision — Option B (poller post-dispatch guard)

      Picked Option B over Option A. Reasoning:

      - **Option B mirrors the existing pattern.** `checkCardProgressedOrHalt` already does post-dispatch verification keyed off `RepoPollerState`, with `writeFlag(source: "post-dispatch-check", ...)` on env-level signal. The triage guard is a parallel branch using the same primitives (`loadLocal` instead of `tracker.getCard`, `triage.expires_at` advance instead of list-move). One conceptual model, two readers.
      - **No save-path coupling.** Option A would intercept `mcp__danx-issue__danx_issue_save` (or `danxbot_complete`) in the worker, then track per-dispatch `started_at` to validate the LAST save. The "last save" signal is fragile — agents may save 0, 1, or N times — and rejecting any individual save that didn't update `triage.expires_at` is too strict (mid-dispatch saves are legitimate). Option B sidesteps this entirely by checking once, after the dispatch finishes.
      - **No MCP server publish needed.** Option B is a pure poller change. Option A would touch `src/worker/issue-route.ts` and the `danx-issue` MCP server's contract.
      - **Same fail-loud halt.** Both options write the critical-failure flag — same reader, same operator UX, same poller-stop semantics. Option B reaches the same end-state through fewer moving parts.

      Implementation lives in `src/poller/index.ts`:
      - `RepoPollerState.triageTracked: { id, startedAt } | null` — set in `tryTriageDispatch` BEFORE spawn, cleared by `cleanupAfterAgent`.
      - `checkTriageProgressedOrHalt(repo, state, job)` — re-reads YAML via `loadLocal`, asserts `Date.parse(triage.expires_at) > Date.parse(started_at)`, writes the flag otherwise. Tolerates read failures (false-negative preferred over false-positive, mirroring `checkCardProgressedOrHalt`).
      - Wired into `handleAgentCompletion` parallel to the work-dispatch guard.
  - id: 69fd3eece1fba21907598ea9
    author: danxbot
    timestamp: 2026-05-08T01:39:56.724Z
    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Option B (poller post-dispatch guard) was the right call — symmetric with `checkCardProgressedOrHalt`, one mental model, no save-path coupling, no MCP republish. The reviewer agreed the implementation should ship as-is.
      - TDD discipline paid off: the seven initial tests caught the throw-tolerance bug (loadLocal throws inside `clearActiveDispatch` BEFORE my guard runs) before any production interaction. Test #6 ended up needing a counter-based toggle, not a phase-based one — small cost, big regression-protection win.
      - Test-reviewer flagged 3 cheap defensive cases (malformed `Date.parse`, missing `triage` block, `triageTracked` cleanup); code-reviewer flagged 1 boundary case (`expires_at == started_at`). All four were tiny in-session adds rather than action items — Step 1.5 applied correctly.
      - Pre-existing `tsc` error (DX-100 mock signature drift on `mockListDispatchable/InProgress/BlockedTodo/TriageDueYamls`) was a small in-scope fix, not deferred. Worth ~3 lines of mock-signature relaxation.
      **What went wrong:** - Test #6 (`loadLocal throws`) needed two iterations to land — first attempt had loadLocal throw on EVERY post-dispatch call, but `clearActiveDispatch` calls loadLocal first inside the same onComplete chain, so the throw fired before my guard. Counter-based toggle (skip first call, throw on second) is the right pattern but it took a failing test cycle to discover.
      - Code reviewer caught a misleading comment in `tryTriageDispatch` claiming pre-spawn failures route through `onComplete` — they don't, the catch branch calls `cleanupAfterAgent` directly. Fixed inline.
      **Action items:** Nothing
      **Commits:** 96ca9ac
