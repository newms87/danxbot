title: Rotate + segregate shared ANTHROPIC_API_KEY across 3 environments
description: |-
  ## Problem

  While investigating the $1K-in-a-day runaway dispatch incident on 2026-04-21, one finding stood out on its own: a single `sk-ant-api03-Zpe...pwAA` key is shared across FOUR locations:

  1. Platform prod SSM: `/danxbot-platform/shared/ANTHROPIC_API_KEY` (materialized into `danxbot-worker-platform` container at `44.208.198.139:/danxbot/.env`)
  2. GPT prod SSM: `/danxbot-gpt/shared/ANTHROPIC_API_KEY` (materialized into `danxbot-worker-danxbot` + `danxbot-worker-gpt-manager` containers at `3.223.226.161:/danxbot/.env`)
  3. Local dev: `/home/newms/web/danxbot-flytebot/.env`
  4. Local dev: `/home/newms/web/danxbot-flytebot/repos/danxbot/.env`

  ## Why it matters

  - Blast radius of a compromise is every deployment + local dev
  - Cost attribution across environments is impossible — the Anthropic dashboard shows one key with aggregate usage, not per-environment
  - The runaway incident was hard to localize BECAUSE platform + gpt share a key: it looked like platform might be burning the $1K but turned out to be gpt
  - Key rotation requires a coordinated redeploy of every environment + local `.env` rewrite

  ## Proposed fix

  Rotate to three separate keys, one per environment:
  - `sk-ant-api03-<platform-specific>` → only in `/danxbot-platform/shared/`
  - `sk-ant-api03-<gpt-specific>` → only in `/danxbot-gpt/shared/`
  - `sk-ant-api03-<local-specific>` → only in local `.env` (or use `claude-auth/` Claude Code credentials for local work and REMOVE the env var entirely)

  Old `sk-ant-api03-Zpe...pwAA` key gets revoked from the Anthropic dashboard after rotation is verified.

  ## Key files

  - `deploy/secrets.ts` — bootstraps SSM secrets; needs per-target key now instead of one shared key
  - `deploy/cli.ts` — `deploy-secrets-push` target for uploading the new per-target keys
  - `make deploy TARGET=<target>` — redeploys the worker with the new env
  - Anthropic dashboard (manual) — generate the three new keys, revoke the old one

  ## How to verify

  - `aws --profile <profile> ssm get-parameter --name /<prefix>/shared/ANTHROPIC_API_KEY --with-decryption` returns three different values
  - Docker exec into each container and confirm `env | grep ANTHROPIC_API_KEY` differs per environment
  - Old key is revoked on the Anthropic dashboard (any further usage would 401)
