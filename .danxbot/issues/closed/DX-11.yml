      ## Needs Help — Operator-only rotation: Anthropic dashboard + production SSM pushes + redeploys

      **What's done:**
      - Triage already verified (2026-04-28) that `deploy/secrets.ts` per-target `.env.<target>` overlay infrastructure is in place — `secrets.test.ts:204-225` exercises the override path. **No code changes are required.** This card is purely operational.
      - Card moved to In Progress, classified as Needs Help short-circuit per `danx-next` Step 2.4 (requires external credentials + production deploys).

      **What's still needed (operator runbook):**

      1. **Generate three new Anthropic API keys** on the Anthropic console (https://console.anthropic.com/settings/keys). Suggested labels:
         - `danxbot-platform-prod`
         - `danxbot-gpt-prod`
         - `danxbot-local-dev` (OR skip this entirely — see step 5b)
      2. **Stage the keys in local overlay files** (these are gitignored, never committed):
         - `/home/newms/web/danxbot-flytebot/.env.platform` → `ANTHROPIC_API_KEY=sk-ant-api03-<platform>`
         - `/home/newms/web/danxbot-flytebot/.env.gpt` → `ANTHROPIC_API_KEY=sk-ant-api03-<gpt>`
         - `deploy/secrets.ts#collectDeploymentSecrets` will merge these on top of root `.env` for each `make deploy TARGET=<t>` invocation (verified in `deploy/secrets.test.ts:204-225`).
      3. **Push to SSM + redeploy each target** (production-affecting; per `.claude/rules/make-commands.md` requires explicit operator authorization — that's why this is Needs Help):
         ```bash
         cd /home/newms/web/danxbot-flytebot
         make deploy-secrets-push TARGET=platform
         make deploy TARGET=platform
         make deploy-secrets-push TARGET=gpt
         make deploy TARGET=gpt
         ```
      4. **Verify in SSM and in the running containers**:
         ```bash
         # Different values per target:
         aws --profile platform ssm get-parameter --name /danxbot-platform/shared/ANTHROPIC_API_KEY --with-decryption --region us-east-1 --query Parameter.Value --output text
         aws --profile gpt      ssm get-parameter --name /danxbot-gpt/shared/ANTHROPIC_API_KEY      --with-decryption --region us-east-1 --query Parameter.Value --output text

         # Different env in each running worker:
         timeout 30 npx tsx deploy/cli.ts status platform   # get IP
         ssh -i ~/.ssh/danxbot-production-key.pem ubuntu@<ip> 'docker exec danxbot-worker-platform env | grep ANTHROPIC_API_KEY'
         timeout 30 npx tsx deploy/cli.ts status gpt
         ssh -i ~/.ssh/danxbot-production-key.pem ubuntu@<ip> 'docker exec danxbot-worker-danxbot       env | grep ANTHROPIC_API_KEY'
         ssh -i ~/.ssh/danxbot-production-key.pem ubuntu@<ip> 'docker exec danxbot-worker-gpt-manager  env | grep ANTHROPIC_API_KEY'
         ```
      5. **Local dev** — pick one of:
         - **5a.** Replace `ANTHROPIC_API_KEY` in `/home/newms/web/danxbot-flytebot/.env` AND `/home/newms/web/danxbot-flytebot/repos/danxbot/.env` with the third new key.
         - **5b. (recommended by triage)** Remove `ANTHROPIC_API_KEY` from both local `.env` files entirely and rely on `claude-auth/` Claude Code OAuth credentials. This eliminates the local-dev key from the rotation set, leaving only 2 keys to manage long-term.
      6. **Revoke the old key** `sk-ant-api03-Zpe...pwAA` on the Anthropic dashboard. Confirm any subsequent use returns 401.

      **Why this needs human/host-mode help:**
      - **Anthropic key generation + revocation has no API** — both must happen via the Anthropic web console with operator account credentials. No autonomous path exists.
      - **`make deploy-secrets-push` and `make deploy` are explicitly listed as production-affecting in `.claude/rules/make-commands.md`** and require explicit user authorization before invocation. The dispatched-agent autonomous workflow is not the right vehicle for production rotation.
      - **Local `.env` edits in `/home/newms/web/danxbot-flytebot/`** are owned by the developer and not danxbot's territory; the dispatched worker writes only inside `<repo>/.danxbot/workspace/` per `.claude/rules/agent-dispatch.md` "Workspace isolation".
      - **Coordination across two production targets** is needed to avoid dropping live dispatches; the operator should pick a low-traffic window.

      **Incomplete ACs:** The card has no Acceptance Criteria checklist. The triage comment recommended adding the following — operator should add them on the next pass and check them off as the runbook above is executed:
      - Three distinct `sk-ant-api03-*` values present in `/danxbot-platform/shared/`, `/danxbot-gpt/shared/`, and local `.env` (or local key removed in favor of `claude-auth/`).
      - `docker exec` confirms different `ANTHROPIC_API_KEY` env var per worker container (`danxbot-worker-platform` vs `danxbot-worker-danxbot` vs `danxbot-worker-gpt-manager`).
      - Old `sk-ant-api03-Zpe...pwAA` key revoked on the Anthropic dashboard; any reuse returns 401.

      **Final AC check:** Before this card moves to Done, every Acceptance Criteria item must be `state: "complete"`. If any AC remains unverifiable, leave the card in Needs Help — don't shortcut.
