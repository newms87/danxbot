  - id: 69fe8e7d26ab763cc7e02137
    author: code-reviewer
    timestamp: 2026-05-09T01:31:41.015Z
    text: |
      <!-- danxbot -->

      ## Code Review

      No CRITICAL findings. Fix is well-scoped, narrow, symmetric with the rest of `EventQueue`, JSDoc explicitly states the contract + non-allowlisted error codes.

      ### Suggested

      - **Sibling-race code: ENOTDIR, not just ENOENT.** `src/agent/event-queue.ts` allowlists only `ENOENT`. If the parent path component is replaced by a *file* (not removed) ‚Äî log-rotator that swaps the dir for a tarball ‚Äî `writeFile` throws `ENOTDIR`. Card's stated race is `rm -rf` (ENOENT), so out of scope behaviour-wise, but worth listing `ENOTDIR` among the JSDoc re-throw examples so the next reader doesn't re-open the question.
      - **Warn message could surface the dispatch id.** Filename is `<dispatchId>.jsonl` so the operator can recover by basename, but a dedicated `dispatch=<id>` token makes grep-from-noisy-logs trivial. Recommend `Queue dir reaped during retain (ENOENT); dispatch=${basename(this.filePath, ".jsonl")} batches_lost=${batches.length} path=${this.filePath}`.
      - **Missing test: the `drainAndSend` path (running forwarder, not boot).** The replayQueueOnBoot test pins the boot path; the existing "queue dir gone" tests around line 1074 / 1084 / 1122 cover ENQUEUE-side ENOENT (`appendFile`), not RETAIN-side. Card explicitly calls out "the running forwarder's `drainQueue` path" as also-reachable.

      ### Nits

      - **EISDIR test cross-platform stability**: `mkdirSync(path)` to force `EISDIR` is documented POSIX behaviour; Windows returns `EPERM`. danxbot test suite is Linux/macOS only ‚Äî fine, but a one-line comment locks the assumption.
      - **JSDoc "transient filesystem race"** is accurate; the parenthetical already names test teardown ‚Äî disregard.
