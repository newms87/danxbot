title: Audit replayQueueOnBoot for retain ENOENT ‚Äî `src/agent/laravel-forwarder.ts#replayQueueOnBoot` calls drainQueue ‚Üí queue.retain ‚Üí writeFile, which can ENOENT if the queue dir is reaped between peekAll and retain. Boot timing makes this near-impossible in practice, but the same swallow-with-warn pattern (or moving the catch into EventQueue.retain) would close the gap.
description: |
  ## Problem

  `src/agent/laravel-forwarder.ts#replayQueueOnBoot` calls `drainQueue ‚Üí queue.retain ‚Üí writeFile`. If the queue dir is reaped between `peekAll()` and `retain()` (log reaper races boot drain, or test teardown wipes the dir mid-flush), `writeFile` throws `ENOENT` and the boot replay fails outright. `replayQueueOnBoot` has no try/catch, so the throw escapes ‚Äî best-effort delivery becomes worker-crashing delivery.

  Boot timing makes this near-impossible in production today. But the same call path is reachable from the running forwarder's `drainQueue` (via `drainAndSend()`), where a future refactor could drop the outer catch in `drainAndSend` and leave the gap.

  ## Fix

  Move the ENOENT swallow into `EventQueue.retain` ‚Äî symmetric with `peekAll()` (returns `[]` on ENOENT), `clear()` (idempotent on ENOENT), and `hasPending()` (returns `false` on any error). Closes the gap for every retain caller (replay + running drain) and stops a transient filesystem race from raising.

  ## Approach

  In `src/agent/event-queue.ts#EventQueue.retain`, wrap the `writeFile` call in try/catch. On ENOENT: log.warn with the file path + batch count and return. Re-throw anything else.

  Add a regression test in `event-queue.test.ts` that removes the queue dir between `peekAll()` and `retain()` and asserts retain resolves without throwing. Add a paired test that replayQueueOnBoot survives a dir reap mid-drain.
