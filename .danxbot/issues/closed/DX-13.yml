      ## Review Fixes

      Addressed every finding from the parallel code-review + test-review subagents:

      1. **Added `ENOTDIR` to the JSDoc re-throw allowlist** in `src/agent/event-queue.ts#EventQueue.retain` (next to `EROFS, ENOSPC, EISDIR, EACCES`). Documents the next-most-likely sibling race; behaviour unchanged ‚Äî already re-thrown via the catch-all branch.
      2. **Improved warn message format**: now `Queue dir reaped during retain (ENOENT); dispatch=<id> batches_lost=<n> path=<filePath>`. Operator can grep by `dispatch=` token without parsing basename.
      3. **CRITICAL ‚Äî added running-forwarder test** in `laravel-forwarder.test.ts` (`createLaravelForwarder with EventQueue` block): `drainAndSend ‚Üí retain swallows ENOENT when the queue dir is reaped between fetches`. Pre-stages two pending batches; mocks fetch 200-then-503 with `rmSync(queueDir)` between; asserts `flush()` resolves and a warn from the `event-queue` logger fires with `ENOENT` + `batches_lost=1`.
      4. **Strengthened ENOENT warn assertion** in `event-queue.test.ts` to also check `batches_lost=1` and `dispatch=d-race` ‚Äî pins the operator-facing fields against silent regressions.
      5. **Added Linux/macOS comment** on the EISDIR test documenting that POSIX returns EISDIR, Windows would return EPERM (suite is Linux-only in CI).

      Re-ran filtered: 4/4 new pass. Re-ran `src/agent/event-queue.test.ts` + `src/agent/laravel-forwarder.test.ts`: 81/81. Re-ran `src/agent/`: 604/604. `npx tsc --noEmit`: clean.
