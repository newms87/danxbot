      ## Test Review

      | Test | Status | Notes |
      |---|---|---|
      | `retain swallows ENOENT and logs a warn` | Good | Pins AC #1; `rmSync` deterministic; missing batch-count assertion against AC wording. |
      | `retain re-throws non-ENOENT errors from writeFile` | Good | Pins AC #2; EISDIR via mkdir-at-filepath stable on Linux/macOS. |
      | `replayQueueOnBoot survives queue dir reap mid-drain` | Good | Pins AC #3 at boot-replay layer; mockFetch ordering deterministic. |
      | running-forwarder `drainAndSend ‚Üí drainQueue ‚Üí retain` ENOENT | **Missing** | **CRITICAL.** Card calls out running-forwarder reach explicitly. Existing tests cover ENQUEUE-side ENOENT (different syscall, different site). RETAIN-side ENOENT through `drainAndSend` is untested. |
      | `retain([])` ENOENT path | Already covered | `retain([])` delegates to `clear()` which already swallows ENOENT. |

      ### Gaps to close

      - **CRITICAL:** Add a `createLaravelForwarder` integration test exercising the running forwarder's `drainAndSend ‚Üí drainQueue ‚Üí retain` ENOENT path. Repro: enqueue 2 batches, mock fetch 200-then-503, rmSync between, await `flush()`, assert resolves + warn from `event-queue` logger fires.
      - **Nice-to-have:** Strengthen ENOENT warn assertion to check batch count substring (`"batches_lost=1"`) ‚Äî AC #1 names the field; without the assertion a regression dropping `${batches.length}` would pass.

      ### Determinism

      All three new tests deterministic ‚Äî `rmSync` synchronous, `mockImplementation` runs inside the awaited fetch promise, no real timers needed.
