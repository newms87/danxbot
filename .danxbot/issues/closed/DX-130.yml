      <!-- danxbot -->

      ## Phase 1 Handoff (DX-131 → next phase agent)

      **Built:** `runSync` in `src/worker/issue-route.ts` is now local-first. `persistAfterSync(repo.localPath, issue)` runs FIRST unconditionally, before `syncIssue`. On successful sync, a second `persistAfterSync(repo.localPath, updatedLocal)` merges tracker-side mutations (`external_id` orphan recovery, `check_item_id[]` stamps, inbound comments). Tracker errors still flow through `recordError` for dashboard visibility but no longer roll back the local persist. Commit `a61f4aa`. AC #1 verified.

      **Discoveries affecting remaining phases:**

      1. **`runSync` is now exported** (`export async function runSync`). Two real callers: `handleIssueSave` (line 258) and `syncTrackedIssueOnComplete` (line ~698). Phase 2 (DX-132) will add a third caller path via `enqueueRetry` → `drainRetries`. The retry-queue drain at the top of `_poll` should call `syncIssue` (or a sibling helper) directly with the freshly-read YAML — re-using `runSync` from poll-tick context would duplicate the local-first persist (the YAML on disk is already the correct state when the queue drains; it's the TRACKER side that's behind). Recommend: `drainRetries` reads the YAML, calls `syncIssue` directly, persists `updatedLocal` only if it differs (matching `runSync`'s second-persist contract). Don't call `runSync` from the drain path.

      2. **`runSync`'s catch branch is the natural enqueue point for the retry queue.** Today: `log.error` + `recordError`. Phase 2: also `enqueueRetry({issueId: issue.id})`. The branch already has `dispatchId` + `issue.id` in scope. One-line addition once `retry-queue.ts` exists.

      3. **The `recordError` poller helper still doesn't exist** (per Phase 8's handoff note). Phase 4 (DX-134) wires the dashboard `system_errors` SSE channel; until then both `runSync`'s catch and the retry-queue's "max attempts exceeded" branch will continue logging via `log.error` only.

      4. **Tests pin the local-first ordering structurally.** `src/worker/issue-route.test.ts` describe block `runSync (local-first persist)` has 6 tests. A regression that puts `syncIssue` before `persistAfterSync` would fail tests 1, 3, 5, 6 (every "tracker throws" branch). Don't relax those tests when adding retry-queue-related tests in Phase 2; add a new describe block instead.

      **Corrections to remaining phase descriptions:** none. DX-132's description is accurate (retry queue, drain at top of `_poll`, FIFO by `queuedAt`, 24-attempt cap).

      **Next-agent context (Phase 2 specifically):**
      - `runSync` is at `src/worker/issue-route.ts:339`. Catch branch is at `:355-360` (the 3-line block with `log.error` + `recordError`).
      - Retry-queue dir: `<repo>/.danxbot/.trello-retry/`. Already gitignored (`.danxbot/` covers everything).
      - The poller's `_poll` body lives in `src/poller/index.ts` and is wrapped in a top-level try/catch (DX-149). Drain at the very top of `_poll` (per DX-132's plan) means inside that try block — fine, the outer catch will still log + clean-return on a drain throw.
      - For test isolation: when adding `retry-queue.test.ts`, follow `issue-route.test.ts`'s pattern of `mkdtempSync` + per-test cleanup via `rmSync`. Don't share a tmpdir across tests.
      - Full suite + tsc baseline: 3298 pass. Type-check clean.
