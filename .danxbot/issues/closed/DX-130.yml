title: "[Danxbot] Trello decouple + local self-recovery + resume hardening"
description: |-
  ## Context

  A real-world dispatch (DX-95 / DX-90 epic, May 7 2026) exposed three independent failures that compound into a stuck-card class:

  1. Trello creds were dead/intermittent (401 + 500 across every list fetch including `/members/me`). Every poller tick errored out before reaching local healing logic. `mcp__danx-issue__danx_issue_save` returned `{saved: true}` synchronously but the async `runSync` (`src/worker/issue-route.ts:298-315`) called `syncIssue` which threw — and `persistAfterSync` (the `open/` → `closed/` move) is INSIDE the try block, after the throwing call. Result: DX-95 YAML had `status: Done` but the file stayed in `open/`.
  2. Parent epic (DX-90) auto-derive (DX-98) never ran because the poller tick aborted on `fetchListCards` before reaching the auto-derive pass.
  3. The dispatched agent armed a `ScheduleWakeup` (`/loop` dynamic mode) BEFORE calling `danxbot_complete`. Worker's stop callback never fired → `script -q -f` + claude stayed alive ~60min after the work was done. Poller orphan-resume eventually re-spawned via `--resume <sessionId>`, claude code's TUI rendered the prior session's `ScheduleWakeup` history as a "/loop wakeup" banner, agent (and observer) misread it as a wakeup instead of a poller-driven resume, and re-ran `/danx-next` instead of self-checking "am I done already?".

  Plus a smaller invariant break — DB row `host_pid` and YAML `dispatch.pid` disagreed on the same dispatch UUID. Reconcile (`src/worker/reconcile.ts`) marked the row failed; poller reattach (`src/poller/index.ts:242`) registered the YAML's PID as alive. Two truth sources for the same fact.

  ## Solution

  Trello becomes a strict one-way courtesy mirror with zero impact on local flow.

  - Phase 1 — split `runSync` so `persistAfterSync` runs ALWAYS (local first), Trello detached. Tracker errors → `recordError` + dashboard event, never block local.
  - Phase 2 — disk-backed Trello retry queue. Failed pushes are persisted, drained next tick with backoff, surfaced to the dashboard when persistent.
  - Phase 3 — poller `healLocalYamls` pass each tick. Idempotent self-heal: terminal-status YAMLs in `open/` move to `closed/`; stale dispatch records cleared via existing `evictDeadDispatches` (no change). Runs BEFORE dispatch decisions so the next tick auto-recovers DX-95-class stuck cards.
  - Phase 4 — dashboard `system_errors` SSE channel + UI banner. Backend ring-buffer (last N). Sources: tracker fails, healer warnings, reconcile mismatches.
  - Phase 5 — resume prompt rewrite + danx-next/danx-start skill self-check contract: on resume, agent reads YAML; status terminal AND ACs satisfied → `danxbot_complete` immediately, no `/danx-next` re-run; else continue remaining work.
  - Phase 6 — `/loop` + `ScheduleWakeup` contract in dispatched-agent skills. Allowed for in-card async monitoring/testing only. Forbidden for "waiting on human / next card / unrelated to this card". MUST NOT call `danxbot_complete` while a loop is active (loop owns completion timing).
  - Phase 7 — `host_pid` (DB) + `dispatch.pid` (YAML) write-ordered atomically. Reconcile + reattach read the same value. Mismatch → halt + dashboard event.
  - Phase 8 (DX-149) — `_poll` top-level try/catch. A throw inside any tracker call inside `_poll` (e.g. `tryAcquireLock` → `getComments` for an invalid `external_id`) currently kills the whole worker process. Wrap `_poll` body in one outer try/catch → log + `recordError` + clean return; the next tick re-runs idempotently. Strictly defensive — no behavior change on the happy path.
  - Phase 9 (DX-150) — `external_id` format heal. Tracker swaps (e.g. MemoryTracker → Trello) leave stale `mem-N` external_ids in YAMLs that are invalid for the new tracker. Add `tracker.isValidExternalId(id)` to the `IssueTracker` interface; per-tick poller pass blanks invalid external_ids → `syncIssue`'s existing orphan path mints fresh real ids. Idempotent, cheap, schema-aware.

  ## May 8 2026 — second crash class observed

  `gpt-manager` worker died booting against `SG-106` (`external_id: mem-2`, leftover from MemoryTracker before Trello config landed): `Trello API error: 400 Bad Request (GET /cards/mem-2/actions)` thrown from `tryAcquireLock` → `getComments` and unwound past `_poll`'s only `fetchOpenCards` try/catch. The whole worker process exited. DX-131 / DX-132 / DX-134 are scoped to OUTBOUND `runSync` only and do not protect the inbound dispatch-lock comment fetch — Phases 8 + 9 close that gap.

  ## Stuck cards self-healing as part of acceptance

  DX-95 + DX-90 are sitting in `open/` with `status: Done` and `status: ToDo` respectively (epic blocked from auto-flip by Trello errors). Phase 3's healer must move DX-95 to `closed/` on first tick and Phase 3 + DX-98 auto-derive must flip DX-90 to Done on a subsequent tick — automatic, no human `mv`. AC #6 below is verified against THESE specific cards.

  ## Files

  - `src/worker/issue-route.ts` — `runSync` split (Phase 1)
  - `src/issue-tracker/trello.ts` + new `src/issue-tracker/retry-queue.ts` — retry queue (Phase 2)
  - `src/poller/index.ts` — `healLocalYamls` pass (Phase 3)
  - `src/dashboard/server.ts`, `src/dashboard/events.ts`, `dashboard/src/components/SystemErrorsBanner.vue` — dashboard surface (Phase 4)
  - `src/poller/index.ts` resume prompt + `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` — resume contract (Phase 5)
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` + danx-start SKILL.md — `/loop` rules (Phase 6)

  Phase 7 (PID source-of-truth) was carved out into a sibling epic DX-139 (DB-as-dispatch-registry + full reattach + orphan-process scan) since the scope grew beyond a single phase.

  ## Out of scope

  - Trello credential rotation (operator action, not code).
  - Replacing Trello with a different tracker (separate epic).
  - Dispatch lifecycle changes beyond the PID-stamp ordering fix.
