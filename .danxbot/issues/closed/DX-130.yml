      ## Phase 8 Handoff (DX-149 → next phase agent)

      **Built:** `_poll` body wrapped in single top-level try/catch in `src/poller/index.ts`. Commit `372f6c0`. Tracker throw inside `_poll` (and any throw inside its body — `syncRepoFiles` rm, corrupt YAML, hydrate failure, etc.) → log + clean return. Worker process survives. Verified by manual smoke against the real `gpt-manager` `mem-2` SG-106 YAML on May 8 2026.

      **Discoveries affecting remaining phases:**

      1. **`recordError` doesn't exist as a poller-internal helper yet.** DX-149's catch logs only via `log.error`. When DX-134 (Phase 4 — dashboard system_errors SSE banner) lands, wire `_poll`'s top-level catch into that channel — single attributable line per dropped tick is the contract. Same goes for `runSync`'s catch in DX-131 (Phase 1) and the retry-queue persistent-failure surface in DX-132 (Phase 2).

      2. **Top-level catch necessarily swallows non-tracker throws too** (`syncRepoFiles` rm EACCES, corrupt-YAML hydration, hydrate 401, missing-creds guard). 5 fail-loud tests in `src/poller/index.test.ts` + 1 in `src/__tests__/integration/poller-memory-tracker.test.ts` were rewritten to assert log-and-swallow. Trade-off accepted: process-stability over fail-loud-on-bad-state. If any of those non-tracker failure modes surface as silently-stuck cards, the fix is per-call wrappers around the affected helpers, not retiring DX-149's outer catch.

      3. **DX-150 (Phase 9 — `external_id` format heal) is the natural follow-on.** DX-149 keeps the worker alive past `mem-2` but the bad data still trips the catch every tick (~1 log line per minute per repo with stale external_ids). DX-150 makes the bad data heal automatically. Sub-agent prompt is implicit in the DX-150 description — `tracker.isValidExternalId(id)` interface + Trello/Memory implementations + `healExternalIds` poller pass that runs after `healLocalYamls`. 8 unit tests + 1 manual smoke.

      **Corrections to remaining phase descriptions:** none. DX-131 / DX-132 / DX-134 still framed correctly relative to outbound `runSync` push; DX-149 is strictly defensive on the inbound side and doesn't change their contracts.

      **Next-agent context:**
      - The wrap is at `src/poller/index.ts:498-918` with a long header comment at `:498-522` documenting the design.
      - `mockHealLocalYamls.mockImplementationOnce(() => throw)` is the canonical "deeper-throw-path" test pattern in `src/poller/index.test.ts` (line ~1885 area).
      - Full suite: `npx vitest run > /tmp/vitest.log 2>&1` → 3290 pass. Type-check: `npx tsc --noEmit`.
      - Don't reintroduce per-call try/catches inside `_poll`'s body; the outer catch is the single point of resilience.
