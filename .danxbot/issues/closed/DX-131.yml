    text: |
      <!-- danxbot -->

      ## Phase 1 Commit

      **Commit:** `a61f4aa`
      **Files:** `src/worker/issue-route.ts`, `src/worker/issue-route.test.ts`

      `runSync` reordered: `persistAfterSync(repo.localPath, issue)` now runs FIRST unconditionally, before the tracker `syncIssue` call. After a successful sync, a second `persistAfterSync(repo.localPath, updatedLocal)` applies any tracker-mutated fields (`external_id` orphan-recovery, `check_item_id[]` stamps, inbound human comments). Idempotent under no remote mutations — same-content `writeFileSync` is safe to repeat.

      Tracker errors flow through `recordError` as before, so the dashboard still surfaces them — but never roll back the local persist.

      **Tests** (6 new, all in `src/worker/issue-route.test.ts`):

      | # | Branch | Pin |
      |---|--------|-----|
      | 1 | tracker throw + Done | `closed/<id>.yml` exists, `open/<id>.yml` absent, `recordError` invoked |
      | 2 | tracker success + mutations | `external_id` + `check_item_id[]` merged into the persisted YAML |
      | 3 | tracker throw + ToDo (non-terminal) | `open/<id>.yml` exists, `closed/<id>.yml` absent, `recordError` invoked |
      | 4 | tracker success + no mutations | byte-identical re-run of `runSync` (idempotency) |
      | 5 | tracker throw + Cancelled | `closed/<id>.yml` exists (second terminal branch) |
      | 6 | tracker throw + ToDo + `blocked != null` | YAML lands in `open/`, `dispatch` cleared (blocked is session-terminal) |

      Tests 1, 3, 5, 6 fail without the local-first ordering — the local write only fires before the tracker call, so a tracker throw still leaves the file on disk.

      Full suite: 3298/3298 (one pre-existing flake on `mcp-server-probe.test.ts > actually kills the hung subprocess on timeout` reproduced once under full-suite load, then cleared on re-run; passes deterministically in isolation; unrelated to this scope). Type-check clean.
  - id: 69fd96472cc3557784107556
    author: danxbot
    timestamp: 2026-05-08T07:52:39.617Z
    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Pure TDD: failing tests landed first (tests 1 + 3), confirmed failures pinned the local-first ordering claim, then the implementation flipped them green.
      - Reviewer recommendations all addressed in-session: idempotency assertion strengthened to byte-equality, Cancelled coverage added, blocked-record + dispatch-clear coverage added, JSDoc explains both the export rationale and why the second persist isn't guarded.
      - Phase scope held — only `src/worker/issue-route.ts` and its test file. No incidental edits, no scope creep into Phase 2's retry queue.
      - The `_drainAsyncWorkForTesting` helper already exists in `issue-route.ts` and the integration suite at `yaml-lifecycle-memory-tracker.test.ts` exercises the full handler path — meaning the unit tests can stay focused on `runSync` semantics with mocked `syncIssue` while the integration layer continues to pin end-to-end behaviour. Clean separation paid off.

      **What went wrong:** - Caught one TDD discipline slip mid-implementation: edited `runSync` to add the local-first persist BEFORE writing failing tests, then reverted the implementation, wrote the tests, watched them fail, then re-applied. No harm — but a reminder that "failing test first" is a checklist, not an aspiration.
      - One unrelated flake (`mcp-server-probe.test.ts > actually kills the hung subprocess on timeout`) reproduced once on the first full-suite run. Confirmed pre-existing (clean diff against scope) by running the file in isolation (passes) and re-running the full suite (passes). Not in DX-131's scope to fix; flagged here for visibility, not deferred as an action item per the "small unrelated fixes belong in-session" rule — since the flake is intermittent and the fix isn't a one-liner, it falls into the "needs its own scoping" bucket and is genuinely separable.

      **Action items:** Nothing
      **Commits:** a61f4aa
