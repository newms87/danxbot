title: "[Trello decouple > Phase 1] runSync split — local persist always, Trello detached"
description: |-
  ## Context

  `src/worker/issue-route.ts:298-315` `runSync`:

  ```ts
  async function runSync(deps, dispatchId, repo, issue) {
    try {
      const { updatedLocal } = await syncIssue(deps.tracker, issue, { actionItemTitles });
      persistAfterSync(repo.localPath, updatedLocal);   // <-- only on success
    } catch (err) {
      const msg = `danx_issue_save async sync failed for ${issue.external_id}: ...`;
      log.error(msg);
      await deps.recordError?.(dispatchId, msg);
    }
  }
  ```

  `persistAfterSync` (line 356-380) is the function that writes the canonical YAML to `closed/<id>.yml` and removes `open/<id>.yml` for `Done` / `Cancelled` saves. When `syncIssue` throws (Trello 401/500), the local persist NEVER runs. The handler already returned `{saved: true}` synchronously upstream, so the agent thinks the save worked, but the YAML is in an inconsistent state: in-memory copy reflects the agent's edit, on-disk file in `open/` may or may not match (depends on whether the in-process Edit landed before the save call).

  This is the root cause of DX-95 sitting in `open/` with `status: Done`.

  ## Solution

  Split into two operations:

  1. `persistAfterSync(repo.localPath, issue)` runs **first**, unconditionally, before the tracker push. Local file = authoritative; the worker's local-write path must be deterministic regardless of network.
  2. `syncIssue(deps.tracker, ...)` runs **after** persist, in a detached fire-and-forget. Errors → `recordError` + dashboard `system_errors` event (Phase 4 wires the dashboard event; Phase 1 emits the log only).
  3. The `updatedLocal` object that `syncIssue` returns may contain tracker-side mutations (e.g. `external_id` for new orphans, `check_item_id` for new AC items). On successful sync, persist a SECOND time with the merged object. Idempotent — second persist is a no-op when no fields changed.

  ## Files

  - `src/worker/issue-route.ts` — `runSync`, `persistAfterSync` (no signature change)
  - `src/worker/issue-route.test.ts` — new tests below

  ## Test plan (TDD)

  Failing tests first. Each is a unit test against `runSync` with a mock `tracker.syncIssue`:

  1. Tracker throws → local file at `closed/<id>.yml` exists with the saved status, `open/<id>.yml` does not exist (terminal save), `recordError` called with the error message.
  2. Tracker succeeds → local file at `closed/<id>.yml` exists with merged tracker fields (e.g. `external_id` populated for orphan).
  3. Non-terminal save (`status: ToDo`) + tracker throws → local file at `open/<id>.yml` exists with saved content, `recordError` called.
  4. Tracker succeeds with no field mutations → only one `writeFileSync` call (idempotent second persist is a no-op or a same-content write).

  ## Acceptance

  - `persistAfterSync` runs before `syncIssue` in `runSync`. Tracker failure does NOT prevent the local YAML's open→closed move on terminal saves.
  - `recordError` still called on tracker failure (preserves existing dispatch-row visibility).
  - All 4 tests pass; no existing tests regressed.
  - Type-check clean: `npx tsc --noEmit`.

  ## Out of scope

  - Persistent retry queue (Phase 2).
  - Dashboard surface (Phase 4).
  - Changes to `syncIssue` itself or to `persistAfterSync`'s signature.
