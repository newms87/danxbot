title: "[Trello decouple > Phase 2] Trello retry queue on disk + drain on tick"
description: |-
  ## Context

  Phase 1 made local persist tracker-independent. Tracker push failures are now logged + `recordError`'d but otherwise dropped on the floor. When Trello recovers, the YAML's last state is correctly mirrored by the next save (which re-pushes everything via `syncIssue`), but interim saves are lost from Trello's perspective. Net effect today is acceptable for status but not for comments â€” a comment appended during a Trello outage is invisible until ANOTHER save fires, which may be hours later.

  ## Solution

  On-disk retry queue: `<repo>/.danxbot/.trello-retry/<dispatch_id>-<seq>.json` containing `{issueId, attempt, lastErr, queuedAt, payload?}`. The poller drains the queue at the top of every tick before list fetches. Backoff: attempt 1 â†’ 30s, 2 â†’ 2min, 3 â†’ 10min, 4+ â†’ 1h, max 24 attempts then surface as persistent failure (Phase 4 dashboard event).

  ### What goes on the queue

  Queue entries are `{issueId}` only â€” at drain time, re-read the YAML and call `syncIssue` fresh. Avoids stale-payload class of bugs (queue entry promised state X, YAML now reflects state Y, push happens on stale snapshot). The cost is one extra file read per drain â€” negligible.

  ### Drain ordering

  FIFO by `queuedAt`. Successful drain â†’ unlink the queue file. Failure â†’ bump `attempt`, rewrite the file, schedule next attempt by backoff table. Single drain pass per tick to avoid hammering Trello during recovery.

  ### Where the enqueue happens

  `runSync` catch branch (Phase 1) â€” after `recordError`, write the queue file. New module `src/issue-tracker/retry-queue.ts` exports `enqueueRetry` + `drainRetries`. Poller calls `drainRetries` first thing in `_poll`.

  ## Files

  - `src/issue-tracker/retry-queue.ts` (new)
  - `src/issue-tracker/retry-queue.test.ts` (new)
  - `src/worker/issue-route.ts` â€” call `enqueueRetry` in catch branch
  - `src/poller/index.ts` â€” call `drainRetries` at top of `_poll`
  - `.gitignore` â€” already covers `.danxbot/` so `.trello-retry/` is auto-gitignored

  ## Test plan (TDD)

  1. `enqueueRetry({issueId})` writes a JSON file under `.danxbot/.trello-retry/`. Filename uses `Date.now()` + UUID for FIFO ordering.
  2. `drainRetries(tracker)` reads queue files in mtime order, calls `syncIssue` on each, unlinks on success.
  3. `drainRetries` on failure increments `attempt`, sets next eligibility per backoff table, rewrites file. Subsequent drain before backoff window is a no-op.
  4. Max 24 attempts â†’ file deleted + persistent failure event emitted (mock `recordSystemError`).
  5. Drain reads YAML fresh â€” if YAML was deleted between enqueue and drain, drain unlinks queue entry without a tracker call.
  6. Concurrent enqueue during drain doesn't double-process (drain takes a snapshot of files at start).

  ## Acceptance

  - On-disk queue at `<repo>/.danxbot/.trello-retry/` survives worker restarts.
  - Poller drains at the top of every tick with backoff.
  - 6 new tests pass; no existing tests regressed.
  - Manual smoke: kill Trello creds, save several YAMLs, verify queue files appear, restore creds, observe queue drained on next tick.

  ## Out of scope

  - Dashboard surface for the queue depth (Phase 4 ties this in).
  - Retry on non-Trello tracker errors (memory tracker doesn't fail like this).
  - Compacting queue across restarts (single drain pass per tick is plenty).
