      ## Retro

      **What went well:** - Refactor-first paid off â€” extracting `issuePath` to `src/issue-tracker/paths.ts` and hoisting `loadActionItemTitles` to `sync.ts` removed the only two cross-layer warts (issue-tracker importing upward into poller; duplicated linked-YAML loader) before Phase 2 piled on top.
      - Reviewer agents (test + code) caught 4 distinct gaps the implementation had missed: gitignore claim was false, `result.yamlMissing` overcounted, MAX_ATTEMPTS-1 boundary wasn't pinned, drain-reads-fresh semantic wasn't tested. All addressed pre-commit.
      - 25 retry-queue unit tests with `mkdtempSync` + `now`/`random` injection give deterministic fast (~150ms) coverage; no flakes, no real-time waits.
      - Per-tick gitignore install is one-line via the existing `ensureGitignoreEntry` helper â€” no new sync stage.
      **What went wrong:** - First attempt at the test file used non-numeric ids (`ISS-A` / `ISS-B`) which the prefix validator rejected with a confusing failure mode. Cost ~5min before realizing the regex is `^ISS-\d+$`.
      - `result.attempted` was being incremented before the YAML lookup, so missing-YAML drains showed `attempted: 1, yamlMissing: 1` instead of `attempted: 0`. Fixed by moving the increment past the lookup.
      - Initial gitignore claim ("via `.danxbot/`'s blanket rule") was wrong â€” there's no such rule and the per-repo `.danxbot/.gitignore` files don't include `.trello-retry/`. Caught by code reviewer; fix is a one-line `ensureGitignoreEntry` call.
      **Action items:** Nothing
      **Commits:** ff69814
