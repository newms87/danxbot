      ## Phase 2 Handoff (DX-132 â†’ next phase agent)

      **Built:** Disk-backed Trello retry queue at `<repo>/.danxbot/.trello-retry/<paddedQueuedAtMs>-<rand>.json`. Failed `runSync` pushes enqueue (after `recordError`); drain runs at the top of `_poll` after both heal passes and before list fetches, inside the existing DX-149 outer try/catch. Backoff: attempt 1 â†’ 30s, 2 â†’ 2min, 3 â†’ 10min, 4+ â†’ 1h; 24-attempt cap. Commit `ff69814`.

      **Discoveries affecting remaining phases:**

      1. **`recordSystemError` hook seam is in place.** `drainRetries` accepts an optional `recordSystemError(message)` dep and fires it on the exhaustion branch (after `MAX_ATTEMPTS` failures). Phase 4 / DX-134 wires this into the dashboard `system_errors` SSE channel â€” the call site is ready, just inject from the worker boot path. Until then, exhaustion logs at `error` level only. Same hook is also fed by `runSync` failures via `recordError` (separate dep â€” Phase 1's existing dispatch-row updater).

      2. **`DrainResult` shape.** `{attempted, succeeded, failed, exhausted, yamlMissing, yamlInvalid, skipped, malformed}` â€” distinct counters for Done-was-deleted (`yamlMissing`), corrupt-on-disk (`yamlInvalid`), still-in-backoff-window (`skipped`), and unparseable-queue-file (`malformed`). Phase 4's banner can pivot on any subset; the per-tick log line in `poller/index.ts:~610` already emits all of them. `skipped`-only ticks are intentionally suppressed from the log (no-op-by-definition).

      3. **Refactor performed mid-phase (refactor-first per zero-debt):**
         - `issuePath` / `ensureIssuesDirs` / `IssueState` moved to `src/issue-tracker/paths.ts`. `src/poller/yaml-lifecycle.ts` re-exports them for caller compatibility. Tracker-side modules (`sync.ts`, `retry-queue.ts`) now import paths without an upward dep into the poller.
         - `loadActionItemTitles` hoisted from `worker/issue-route.ts` into `src/issue-tracker/sync.ts` and used by both call sites (worker-driven syncs + poller's drainRetries). Single canonical helper; logger is now an injected param defaulting to `createLogger("sync")`.

      4. **Reviewer-driven coverage additions** (kept as load-bearing tests for future phases):
         - `retry-queue.test.ts` "drain reads YAML fresh" pins the Phase 2 contract â€” agent edits between enqueue and drain are observed by the drain.
         - `retry-queue.test.ts` "MAX_ATTEMPTS-1 â†’ still queued, NOT exhausted" pins the `>` vs `>=` boundary.
         - `retry-queue.test.ts` "actionItemTitles wiring" pins parity with worker-side retro rendering.
         - `worker/issue-route.test.ts` "EROFS does not shadow tracker error" pins fail-loud-on-the-right-error containment.

      **Corrections to remaining phase descriptions:** none. DX-133 (Phase 3 / heal pass) shipped earlier as ISS-133, already merged. DX-134 (Phase 4) needs the `recordSystemError` callsite â€” already present in `drainRetries` + `runSync`. DX-135/6 (resume + `/loop` skill rules) are agent-skill changes orthogonal to this phase. DX-150 (external_id heal) shipped (commit `675de2a`); DX-149 (`_poll` outer catch) shipped earlier and the new drain throw is correctly contained by it (verified by the wiring test "a drainRetries throw is caught by the outer DX-149 wrap").

      **Next-agent context (DX-134 / Phase 4 specifically):**
      - `drainRetries` already takes `recordSystemError?: (message: string) => void | Promise<void>`. Inject from the worker boot path (or wherever `getRepoTracker` first runs) â€” no changes to `retry-queue.ts` needed.
      - The poller log line at `src/poller/index.ts:~610` is the natural place to also fire `recordSystemError` for non-exhaustion outcomes (e.g. `yamlInvalid > 0`) if the dashboard wants those surfaced. Today only the exhaustion branch fires the hook.
      - `runSync`'s catch branch in `worker/issue-route.ts:~360` already calls `recordError(dispatchId, msg)` which feeds the dispatch-row error column. Phase 4's "system_errors banner" should aggregate from BOTH the dispatch-row column AND the new `recordSystemError` channel.
      - Full suite + tsc baseline: 3417 pass; type-check clean.
