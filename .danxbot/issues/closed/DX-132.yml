      ## Notes from Phase 1 (DX-131, commit `a61f4aa`)

      Phase 1 shipped â€” `runSync` in `src/worker/issue-route.ts` now persists locally before the tracker push. Hook points for this phase:

      - **Where to enqueue.** `runSync`'s catch branch is at `src/worker/issue-route.ts:355-360`. After the existing `log.error` + `await deps.recordError?.(dispatchId, msg)`, add the `enqueueRetry({issueId: issue.id})` call. Both `dispatchId` and `issue.id` are already in scope.

      - **`runSync` is exported now.** It's used by `handleIssueSave` (line 258) and `syncTrackedIssueOnComplete` (line ~698). DO NOT call `runSync` from the retry-queue drain path. The local YAML is already authoritative when the drain fires â€” only the tracker side is behind. `drainRetries` should read the YAML directly, call `syncIssue` itself, and persist `updatedLocal` only if it differs from the input issue (matching `runSync`'s second-persist contract).

      - **`_poll` already has a top-level try/catch** (DX-149, commit `372f6c0`). Calling `drainRetries` at the top of `_poll`'s body is fine â€” a throw inside drain will be caught by the outer wrapper and logged as a clean return. Don't add a redundant inner try/catch.

      - **`recordError` poller helper still doesn't exist.** Phase 4 (DX-134) wires the dashboard `system_errors` SSE channel. For Phase 2, "max attempts exceeded" â†’ `log.error` only is acceptable; a follow-up ties the persistent-failure event to the dashboard once Phase 4 lands.

      - **Test pattern.** `src/worker/issue-route.test.ts`'s `runSync (local-first persist)` describe block uses `mkdtempSync` per-test + `rmSync` in `afterEach` for filesystem isolation. `vi.mock("../issue-tracker/sync.js")` for `syncIssue`. Mirror this in `retry-queue.test.ts` â€” fresh tmpdir per test, mocked tracker.

      - **Idempotency invariant from Phase 1 carries forward.** `persistAfterSync` is safe to call repeatedly with the same input. If the drain succeeds and you persist `updatedLocal`, doing so a second time on a subsequent retry is a no-op.

      Baseline: full suite 3298 pass; tsc clean.
