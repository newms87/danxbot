    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - **Clean DRY extraction.** `moveToClosedIfTerminal` lives once in `src/poller/yaml-lifecycle.ts` and is consumed by both the new poller pass (`healLocalYamls`) and the worker's existing `persistAfterSync`. No duplicated openâ†’closed logic; both code paths inherit the same "open wins" overwrite contract automatically.
      - **First-run TDD pass.** All 8 heal unit tests passed against the implementation on the very first run â€” the schema and the `epic-status.ts` precedent gave a solid template, and the test fixture at `heal.test.ts` test #6 reproduces the exact DX-95 stuck state (terminal status + lingering `dispatch{}` block) so a regression that re-introduces that bug fails immediately.
      - **Live verification was simple and convincing.** Staged `closed/DX-95.yml` back into `open/`, ran `healLocalYamls('/home/newms/web/danxbot/repos/danxbot')`, observed `healed: [{id: "DX-95", status: "Done"}]` and the file moved on disk. The contract works end-to-end against the real repo path, not just synthetic tmpdirs.
      - **Pure-helper boundary preserved.** Both `heal.ts` and `yaml-lifecycle.ts` stay logger-free / config-chain-free, matching the project rule that lets test files import them without paying the `DANXBOT_DB_USER` env-validation tax. The caller (`_poll`) handles all logging.
      - **Code review verdict was "ship as-is".** Nits 1-5 from the review were all optional polish; none surfaced critical or high-priority concerns, which validates the test-first / pattern-matching approach.

      **What went wrong:** - **YAML status flipped back to ToDo mid-dispatch.** The first `danx_issue_save` in this dispatch returned `{saved: false, errors: ["sync failed: Trello API error: 500 Internal Server Error (POST /cards)"]}`. Despite the name, the local YAML was written successfully â€” the failure was only the Trello orphan-create. But because the synchronous response was `saved: false`, the worker's later async push (which succeeded once Trello recovered) round-tripped the OLD in-memory state (`status: ToDo`) back onto disk, overwriting the `In Progress` flip I'd persisted locally. Had to re-flip after the quality-gate review. **This is exactly the failure mode DX-130 / DX-131 fix.** Phase 1 (when shipped) makes `persistAfterSync` run before tracker push, which would have made my first save authoritative and prevented the round-trip clobber.
      - **Pre-existing full-suite flakes surfaced under load.** Two of three full-backend `vitest run` invocations were 100% green (3242/3242). The third hit 5 failures across `src/index.test.ts`, `src/cli/list-target-repos.test.ts`, and `src/__tests__/integration/helpers/capture-server-cli.test.ts` â€” all 57 tests in those files passed cleanly in isolation. These are timing-dependent subprocess + microtask-drain flakes, NOT regressions caused by DX-133, but they're real and worth investigating in a separate card. Filed as the Phase 3 retro observation; not blocking ship.
      - **Initial TS narrowing dance in `heal.ts`.** TypeScript doesn't propagate the `issue.status !== "Done" && issue.status !== "Cancelled"` narrow across the `{ ...issue, dispatch: null }` spread. Caught by the first `tsc --noEmit` run. The fix (capture `terminalStatus: "Done" | "Cancelled" = issue.status` before the spread) is a small smell but the comment explains why; the alternative (widening the helper return type) was worse.
      - **Heal pass logging coverage gap.** The poller's heal-result log loop (info for `healed[]`, warn for `errors[]`) has no direct test. Test reviewer flagged this as low-priority; Phase 4 will replace those `log.*` calls with `recordSystemError`, so testing the current shape now would just churn. Acceptable tradeoff.

      **Action items:** Nothing
      **Commits:** f27575b
