title: "[Trello decouple > Phase 3] healLocalYamls poller pass â€” auto-move Done â†’ closed/"
description: |-
  ## Context

  Even with Phase 1 + 2, cards already in the inconsistent state (terminal status in `open/`) need to self-heal. DX-95 + DX-90 are sitting on disk right now in that state. The poller must auto-recover without a human `mv`.

  Existing similar pass: `evictDeadDispatches` clears stale `dispatch{}` blocks. Existing similar pass: DX-98 epic-status auto-derive. Both run inside the poller tick. This phase adds a third complementary pass.

  ## Solution

  New pass `healLocalYamls(repo)` runs at the TOP of every poll tick (before any dispatch logic, before tracker fetches). Per repo, scan `<repo>/.danxbot/issues/open/`:

  - Parse each `.yml`. Malformed â†’ log warn, skip.
  - `status âˆˆ {"Done", "Cancelled"}` â†’ call `persistAfterSync`'s openâ†’closed mover (extract that block into a shared helper). Idempotent: `closed/<id>.yml` already present â†’ write merged content + unlink open copy.
  - `dispatch != null` and PID is dead â†’ already handled by `evictDeadDispatches`, no overlap.
  - Log healing actions at info level so dashboard (Phase 4) can surface them.

  Order of poller-tick passes after this lands:

  1. `healLocalYamls` (new) â€” heal terminal-status open/ files
  2. `drainRetries` (Phase 2) â€” drain Trello retry queue
  3. `evictDeadDispatches` (existing) â€” clear stale dispatch records
  4. tracker fetch + bulk-sync inbound (existing)
  5. epic-status auto-derive (existing, DX-98)
  6. dispatch decisions (existing)

  Heal pass + epic auto-derive together close the DX-95/DX-90 loop: heal moves DX-95 to `closed/`; the next tick's auto-derive sees all of DX-90's children Done â†’ flips DX-90 to Done; subsequent tick heals DX-90 too.

  ## Files

  - `src/poller/index.ts` â€” new `healLocalYamls` function + integration into `_poll`
  - `src/poller/yaml-lifecycle.ts` â€” extract `moveToClosedIfTerminal` shared helper
  - `src/worker/issue-route.ts` â€” `persistAfterSync` calls the shared helper instead of inlining the move (keeps single implementation)
  - `src/poller/index.test.ts` â€” new test cases below

  ## Test plan (TDD)

  1. `healLocalYamls` finds `open/ISS-N.yml` with `status: Done` â†’ moves to `closed/`. `open/` copy gone, `closed/` copy present.
  2. Idempotent: running `healLocalYamls` again with `closed/<id>.yml` present + no `open/<id>.yml` â†’ no-op.
  3. Stale `closed/<id>.yml` already present + `open/<id>.yml` with `status: Done` â†’ `closed/` copy is overwritten with the open's content (open wins, see existing comment in `persistAfterSync`).
  4. `status: ToDo` YAML in `open/` â†’ not touched by heal pass.
  5. Malformed YAML â†’ logged, skipped, doesn't crash the pass.
  6. End-to-end: stage DX-95-style YAML (`status: Done` in `open/`), run one tick, assert YAML moved.

  ## Acceptance

  - `healLocalYamls` is the FIRST pass in `_poll`, before tracker fetch.
  - Terminal-status YAMLs in `open/` move to `closed/` automatically every tick. Idempotent. Tracker-independent.
  - 6 new tests pass; no existing tests regressed.
  - Real-world verification: launch worker against repo with DX-95 + DX-90 in their current stuck state â†’ next tick moves DX-95 to closed/; tick after auto-derive flips DX-90 to Done; tick after heals DX-90 to closed/. AC #8 of DX-130 verified live.

  ## Out of scope

  - Healing OTHER drift classes (orphan dispatch blocks, AC item id reconciliation) â€” those have their own existing passes.
  - Changing the order of existing passes beyond inserting healLocalYamls at the top.
