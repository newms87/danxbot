title: "[Trello decouple > Phase 4] Dashboard system_errors SSE channel + UI banner"
description: |-
  ## Context

  Phase 1 + 2 push tracker errors to `recordError` + log files. Phase 3 healer logs healing actions. None of those surface to a human watching the dashboard. Operators need a visible signal that the system is in a degraded state (e.g. Trello down, queue draining slowly, reconcile/reattach mismatch).

  ## Solution

  New `system_errors` SSE channel. Backend ring-buffer (last 200 events, in-memory). Dashboard banner component subscribes; renders a top-of-page yellow/red bar listing recent errors with timestamp + source + message. Click-to-dismiss per event; auto-clear on resolve event.

  Event shape:

  ```ts
  type SystemError = {
    id: string;          // uuid
    timestamp: string;   // ISO
    source: "tracker" | "healer" | "reconcile" | "retry-queue" | "poller";
    severity: "warn" | "error";
    repo: string;        // repo name
    message: string;
    details?: Record<string, unknown>;
  };
  ```

  Producers:

  - `src/worker/issue-route.ts` `runSync` catch (Phase 1) → `recordSystemError({source: "tracker", ...})`.
  - `src/issue-tracker/retry-queue.ts` max-attempts branch (Phase 2) → `recordSystemError({source: "retry-queue", severity: "error"})`.
  - `src/poller/index.ts` `healLocalYamls` (Phase 3) → `recordSystemError({source: "healer", severity: "warn"})` per heal action.
  - `src/worker/reconcile.ts` mismatch branch (Phase 7) — wired in Phase 7.

  Backend:

  - `src/dashboard/system-errors.ts` (new) — ring buffer + SSE emitter.
  - `src/dashboard/server.ts` — register `/api/system-errors/stream` SSE route + `/api/system-errors` REST list (last N).

  Frontend:

  - `dashboard/src/components/SystemErrorsBanner.vue` (new)
  - `dashboard/src/composables/useSystemErrors.ts` (new) — typed wrapper around the SSE stream + REST seed.
  - `dashboard/src/App.vue` — mount the banner above the existing layout.

  ## Test plan (TDD)

  Backend (mandatory tests):

  1. `recordSystemError(...)` adds to ring buffer; capacity caps at 200 (oldest evicted).
  2. SSE clients receive new events live; late subscribers get the buffered tail on connect.
  3. REST endpoint returns last N events ordered newest-first.
  4. Per-repo filter on REST + SSE works (`?repo=danxbot`).

  Frontend: per CLAUDE.md exemption, dashboard SFCs don't require tests. Type-check + smoke verify only.

  ## Acceptance

  - SSE channel + REST endpoint shipped; backed by ring buffer.
  - Producers in tracker/healer/retry-queue wired (reconcile producer wired in Phase 7).
  - 4 backend tests pass.
  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - Manual smoke: revoke Trello token, save a card, see banner appear.

  ## Out of scope

  - Persistent storage (ring buffer = in-memory; restarts clear it; persistence is a follow-up).
  - Per-error acknowledgment workflow (click-to-dismiss is local UI state only).
  - Email/Slack escalation.
