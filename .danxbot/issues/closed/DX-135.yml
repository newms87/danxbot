      <!-- danxbot -->

      ## Code Review

      **Verdict: ship it.** No blockers; suggestions 2 and 3 are followups, not gates.

      ### Critical findings

      None. The change is small, well-scoped, and the contract in `index.ts` matches the spec in this card's description verbatim (RESUMED dispatch / parent / CONTRACT three steps / Verify, don't repeat).

      ### Suggestions

      1. **`TEAM_PROMPT_RESUME` design rationale is sound.** The JSDoc at `src/poller/constants.ts:98-111` correctly explains why the value is identical to `TEAM_PROMPT` today (same `/danx-next` skill loads, the resume self-check lives inside the skill) AND why the constant exists (grep-distinct callsite, one-line swap to a future `/danx-resume`). Two layers of defense (prompt + skill) is appropriate for a $1K-incident-class bug.
      2. **DRY niggle** — the resume contract phrasing is duplicated three places (`index.ts`, `danx-next/SKILL.md` Step 1.1, `danx-start/SKILL.md`). Worth a one-line `// keep in sync` near the orphan-resume callsite. **APPLIED in this commit.**
      3. **Marketplace skill drift** — `claude-plugins/issue-worker/skills/danx-next/SKILL.md` is materially older than the inject copy (no `danx-no-interactive` block, missing `pipe-start` rename, missing DX-98 epic-status note, missing this card's Step 1.1). Pre-existing drift, not caused by this card. Flagged in retro.
      4. **Test mock shape** — `src/poller/index.test.ts:107-115` correctly adds `TEAM_PROMPT_RESUME` and matches the real exports. No drift.

      ### Praise

      - **Negative test** at `src/poller/index.test.ts` is excellent — explicitly asserts fresh dispatches do NOT carry the resume anchors, locking down the regression where someone swaps `TEAM_PROMPT` for `TEAM_PROMPT_RESUME` at the fresh callsite.
      - **Comment block at the orphan-resume callsite** captures the May-7 incident rationale at the line — an agent six months from now learns exactly why the contract block exists without chasing the card.
      - **Spec fidelity** — every clause in this card's Solution section is reproduced in code: `${TEAM_PROMPT_RESUME}`, `RESUMED dispatch on ${id} (parent ${parentDispatchId})`, the three-step CONTRACT, the `Verify, don't repeat` close.
