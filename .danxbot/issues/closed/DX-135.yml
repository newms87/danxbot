      ## Retro

      **What went well:** - **TDD red → green flow worked cleanly.** Wrote 3 new tests, watched 2 fail (orphan-resume contract anchors + SKILL.md section), implemented the constant + callsite + skill sections, watched all 3 turn green. The fresh-dispatch sentinel passed pre-implementation by virtue of the new contract not being there yet — a healthy "negative-space sentinel" pattern.
      - **Two-layer defense (prompt + skill) is the right architecture** for a token-burning regression. The prompt is what the agent sees on its first turn; the skill is what it consults if it ever opens the workflow. Both encode the same terminal-state-→-`danxbot_complete` rule, with a `// keep in sync` cross-reference comment at the orphan-resume callsite.
      - **Code reviewer + test reviewer ran in parallel** and both returned with no critical findings. Both nice-to-haves they flagged (pin `TEAM_PROMPT_RESUME` value at source; pin `git log` + `retro.commits[]` verification step) were applied in this dispatch per Step 1.5.
      - **One existing test regressed and was updated cleanly** — the legacy `composes a resume task containing TEAM_PROMPT, …` test was rewritten to match the new contract phrasing (RESUMED dispatch, CONTRACT — read FIRST, Verify, don't repeat, danxbot_complete directive). No silent skips, no commented-out assertions.
      - 3262 unit + integration tests pass; tsc clean.
      **What went wrong:** - **Marketplace skill drift is pre-existing but worth surfacing.** `claude-plugins/issue-worker/skills/danx-next/SKILL.md` is materially older than the inject copy at `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` — multiple phases of drift, including this card's new Step 1.1. Not caused by this card; not in scope to fix here. Worth a separate sync card if drift becomes a real problem.
      - **3 unrelated tests flake under full-suite parallel execution** (`src/index.test.ts > registers shutdown handlers in worker mode`, `src/agent/mcp-server-probe.test.ts > kills hung subprocess on timeout`, `src/cli/list-target-repos.test.ts > exits non-zero when target file is missing`). All three pass in isolation; they're race-y under parallel execution. Pre-existing flakes, not caused by this card. Worth a hardening pass.
      - **Slight redundancy** between the new orphan-resume contract test and the rewritten "composes a resume task containing TEAM_PROMPT_RESUME" test — both assert overlapping anchors. Kept both because they pin different load-bearing slices (anchor presence vs. YAML path + completion directive wiring), but a future reader may want to consolidate.
      **Action items:** Nothing
      **Commits:** 59f8f5e
