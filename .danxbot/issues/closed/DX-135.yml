title: "[Trello decouple > Phase 5] Resume prompt rewrite + danx-next/danx-start self-check contract"
description: |-
  ## Context

  Orphan-resume in `src/poller/index.ts:1153-1157` spawns claude with `--resume <sessionId>` + prompt:

  ```
  ${TEAM_PROMPT}\n\nResuming prior dispatch on ${id}. Read ${yamlPath} for current state, verify progress against ACs, complete remaining work. Call danx_issue_save({id: "${id}"}) when done.
  ```

  In the May-7 incident, the resumed agent ran `/danx-next` against a card whose status was already `Done` (work + commits completed in the prior dispatch — only Trello sync had failed). The agent's mental model was "I have new work to do" instead of "verify what's already done." Result: tried to dispatch `danxbot_complete` AGAIN (which had already fired) and noise on the card.

  Plus the agent (and the observer reading the transcript) misread Claude Code's `--resume` banner as a `/loop` ScheduleWakeup. That's a Phase 6 problem; this phase is the prompt + skill side.

  ## Solution

  Two coordinated edits.

  ### Resume prompt rewrite

  ```
  ${TEAM_PROMPT_RESUME}\n\nRESUMED dispatch on ${id} (parent ${parentDispatchId}).

  CONTRACT — read FIRST, act AFTER:
  1. Read ${yamlPath} now. Note current status, AC checked-state, retro state, commits in retro.commits[].
  2. If status ∈ {Done, Cancelled} AND every AC item checked AND retro filled — work is COMPLETE. Call danxbot_complete({status: "completed", summary: "..."}) immediately. Do NOT re-run /danx-next. Do NOT redo any work. Do NOT save the YAML again.
  3. Else, identify the smallest gap (uncompleted AC, missing retro field, unverified AC item) and resume from that point. Save the YAML when each gap closes. Call danxbot_complete only when every gap is closed.

  This is a RESUME, not a fresh dispatch. The prior session already did most or all of the work. Verify, don't repeat.
  ```

  `TEAM_PROMPT_RESUME` is a new constant in `src/poller/constants.ts`. Distinct from `TEAM_PROMPT = "/danx-next"` so the agent's first input is clearly a resume contract, not the standard pickup skill.

  ### Skill self-check (danx-next + danx-start)

  Add a new section near the top of `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` and the danx-start equivalent:

  ```
  ## Resume self-check (read first, every dispatch)

  Before doing ANY work, read the assigned YAML. If status is terminal AND every AC item is checked AND retro is filled — the prior session finished. Call danxbot_complete and stop. Do not redo work.

  If you're not sure whether prior work landed (e.g. status ToDo but you see commits in retro.commits[] referencing your assigned scope), inspect git log for those commit hashes. Real commits + checked ACs = done. No commits = fresh work.
  ```

  ## Files

  - `src/poller/constants.ts` — add `TEAM_PROMPT_RESUME`
  - `src/poller/index.ts` — orphan-resume callsite uses new constant
  - `src/poller/index.test.ts` — assert the new prompt text on resume spawn
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` — Resume self-check section
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-start/SKILL.md` (if exists) — same section

  ## Test plan (TDD)

  1. Orphan-resume spawn captures new resume prompt (containing "RESUMED dispatch", "CONTRACT", "Verify, don't repeat").
  2. Fresh dispatch (non-resume) still uses `TEAM_PROMPT = "/danx-next"` unchanged.
  3. Skill file contents verified — assertion in poller-inject test that the new section is present in the rendered workspace `.claude/skills/danx-next/SKILL.md`.

  ## Acceptance

  - New `TEAM_PROMPT_RESUME` constant in use at the orphan-resume callsite.
  - Skill rules for self-check are mirrored into the issue-worker workspace on inject.
  - 3 new tests pass; no existing tests regressed.

  ## Out of scope

  - `/loop` rules (Phase 6).
  - Worker-side enforcement that an agent who claims complete-on-resume actually verified — agents are trusted at this layer.
  - Removing `/danx-next` skill — still the primary fresh-dispatch flow.
