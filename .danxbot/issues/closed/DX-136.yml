      ### Test file (`src/poller/inject-skill-contract.test.ts`)

      - **Isolation correct:** `src/poller/index.test.ts` calls `vi.mock("node:fs", â€¦)`. Putting the contract test in its own file lets the real `readFileSync` work â€” vitest scopes module mocks per file.
