title: "[Trello decouple > Phase 6] /loop + ScheduleWakeup contract for dispatched agents"
description: |-
  ## Context

  In the May-7 incident, the dispatched agent armed a `ScheduleWakeup` (`/loop` dynamic mode) DURING the dispatch and BEFORE calling `danxbot_complete`. Dispatch finished (work + commits done). Wakeup later fired inside the same claude session. Orphan-resume re-spawned via `--resume`, claude code's TUI rendered the prior session's `ScheduleWakeup` history â†’ "Claude resuming /loop wakeup" banner. Agent (and observer) misread the banner as the trigger and re-ran `/danx-next` instead of self-checking.

  Two real failure modes are tangled:

  1. Agent armed `/loop` to wait on something that doesn't belong to the dispatch (next card, human reply, "let me check on the deploy in 5 min and report back"). That use of `/loop` is a workflow hole â€” dispatched agents have one exit (`danxbot_complete`); using `/loop` to defer completion is a bug.
  2. Agent armed `/loop` legitimately (testing an async pipeline, monitoring a long-running task whose result is part of the card's AC) and that was fine â€” but completed without disarming, which left the wakeup armed for whoever resumed the session next.

  User's decision: allow case 2 (in-card async monitoring), forbid case 1 (waiting on human/next card/anything not in this card's AC). When `/loop` is active, agent MUST NOT call `danxbot_complete` â€” the loop owns completion.

  ## Solution

  Doc-only change to the dispatched-agent skill set. No code changes; the contract is enforced by skill description + the agent honoring it.

  ### New section in danx-next + danx-start SKILL.md

  ```
  ## /loop and ScheduleWakeup â€” narrow contract

  ALLOWED:
  - Polling an async pipeline whose result IS part of this card's AC (e.g. dispatch a build, /loop every 5 min until it finishes, then verify the artifact and proceed).
  - Monitoring a long-running test whose pass/fail is the AC under test.
  - Watching for the next state of an external system you triggered AS PART OF THIS CARD's WORK.

  FORBIDDEN:
  - Waiting for a human to reply (use status: Needs Help instead â€” the operator opens the card, answers, moves it back).
  - Waiting for the next card to land (the poller dispatches; you exit when this card is done).
  - "Let me check on this in N minutes" for anything outside this card's scope.
  - Arming /loop and then calling danxbot_complete in the same dispatch. Loop owns completion timing â€” if you call complete, disarm the loop first; if a loop is active, do not call complete.

  RULE: when you call danxbot_complete, every ScheduleWakeup armed during this dispatch must be disarmed (or have already fired and exited). Active loop + complete signal = workflow violation; the next resume will re-fire the loop after the dispatch is logically over.
  ```

  ### Audit existing dispatched-agent skills

  Grep the `src/poller/inject/workspaces/issue-worker/` tree for any existing `/loop`, `ScheduleWakeup`, or `wait for` references and align them with this contract. Any that contradict the new rules â†’ rewrite or remove.

  ## Files

  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` â€” new section
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-start/SKILL.md` â€” same section
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage-card/SKILL.md` (and any other dispatched-agent skill) â€” audit for conflicts
  - `src/poller/index.test.ts` â€” assertion that the inject pipeline mirrors the new section into the workspace dir

  ## Test plan (TDD)

  1. Inject pipeline copies the new section into `<repo>/.danxbot/workspaces/issue-worker/.claude/skills/*` and the test asserts the strings "ALLOWED", "FORBIDDEN", "Loop owns completion timing" are present.
  2. No existing skill file under `inject/` contradicts the new rule (test does a grep across files, fails if it finds a forbidden phrase).

  ## Acceptance

  - danx-next + danx-start + every dispatched-agent skill carries the same contract.
  - Workspace dir under `<repo>/.danxbot/workspaces/issue-worker/.claude/skills/` has the new section after a poll tick.
  - 2 new tests pass.
  - Manual review: skim each affected skill; confirm wording is consistent.

  ## Out of scope

  - Worker-side enforcement (e.g. detect `ScheduleWakeup` calls and reject them) â€” agents are trusted; the contract is the lever.
  - Modifying Claude Code's `/loop` skill itself.
