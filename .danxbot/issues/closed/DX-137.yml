retro:
  good: Scope review with the operator surfaced that "DB pid + YAML pid converge" is necessary but insufficient — the broader invariant is "DB = dispatch registry, worker restart is idempotent across every dispatch type (poller, /api/launch, slack), orphan processes are detectable + reapable." Catching this BEFORE the phase shipped meant zero wasted code; the carve-out (DX-139 epic) ships the same idea with the full surface covered.
  bad: Original Phase 7 scope was sized too small — focused on the symptom (PID divergence between DB row + YAML) rather than the root invariant (DB-as-registry + idempotent reattach with full monitoring stack). Carve-out adds two phases of work beyond the original card.
