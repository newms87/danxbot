title: "[Trello decouple > Phase 7] PID source-of-truth — DB host_pid + YAML dispatch.pid converge (SUBSUMED by DX-139)"
description: |-
  ## Context

  In the May-7 incident, worker boot logged:

  ```
  Reconciled orphaned dispatch 26dbeb33-... (host_pid=35761) → failed
  reattach: DX-90 alive (pid=33130, dispatch=26dbeb33-...) — registered
  ```

  Same dispatch UUID, two different PIDs, two opposite verdicts within ~140 ms. Reconcile (`src/worker/reconcile.ts`) reads `dispatches.host_pid` from MySQL; reattach (`src/poller/index.ts:242`) reads `issue.dispatch.pid` from YAML. The two stamps were written at different times and one of them was stale. Either:

  - DB host_pid was written first (dispatch row created), agent wrote YAML pid later, and an early death between writes left them divergent.
  - Both were written but one path didn't update on the script-wrapper PID change (host-mode `script -q -f` reparenting).
  - YAML pid was rewritten on a re-attach without a corresponding DB update.

  Fixing this is orthogonal to Trello but lives in the same epic because the same May-7 incident exposed it.

  ## Solution

  Single source of truth: YAML `dispatch.pid` is canonical for liveness. DB `host_pid` mirrors YAML and is rewritten whenever YAML is. Reconcile + reattach both consult YAML; DB is for analytics and cross-restart correlation only.

  Implementation pieces:

  1. `src/agent/launcher.ts` — when `spawnInTerminal` learns the script PID (via the PID file polling), write the PID to BOTH the YAML's `dispatch{}` block AND the DB row's `host_pid` column in the same async block. Either both succeed or both rollback.
  2. `src/worker/reconcile.ts` — read YAML pid for every dispatch row; if YAML pid differs from DB host_pid, log a warning + emit `system_errors` event (`source: "reconcile"`) and prefer YAML. Use YAML pid for liveness check.
  3. `src/poller/index.ts` reattach — already reads YAML; no change.
  4. New invariant test: `dispatch.pid` (YAML) == `host_pid` (DB) for every non-terminal dispatch row at all times, EXCEPT during the brief window between spawn and PID-file resolution. Test fakes the spawn flow + asserts the invariant.

  ## Files

  - `src/agent/launcher.ts` — paired write
  - `src/worker/reconcile.ts` — YAML-canonical lookup + mismatch event
  - `src/dispatch/core.ts` (if needed) — propagate dispatchId to launcher for the paired write
  - `src/agent/launcher.test.ts` + `src/worker/reconcile.test.ts` — new tests below

  ## Test plan (TDD)

  1. Spawn flow writes YAML pid + DB host_pid in the same async chain. Mock both writes; assert both fire with the SAME pid value.
  2. Reconcile sees DB host_pid=A, YAML pid=B (mismatch) → logs warning, emits system_errors event with `source: "reconcile"`, uses YAML pid B for the liveness probe.
  3. Reconcile sees DB host_pid=A, YAML pid=A → no warning, no event.
  4. Reconcile sees DB host_pid=A, YAML missing → falls back to DB pid (legacy row, pre-migration), continues without warning.
  5. Reattach is unchanged — already reads YAML.

  ## Acceptance

  - Paired-write enforced in `spawnInTerminal` PID-resolution branch.
  - Reconcile prefers YAML pid + emits a system_errors event on mismatch.
  - Phase 4's `system_errors` channel carries reconcile events (final producer wired).
  - 5 new tests pass; no existing tests regressed.
  - Manual smoke: launch worker against repo with a stale DB row whose host_pid is dead but whose YAML pid is alive → worker logs the mismatch, emits an event, marks dispatch as alive.

  ## Out of scope

  - Replacing the dispatches DB schema (host_pid stays a column for analytics).
  - Cross-host PID semantics (`dispatch.host` already covers that; this phase doesn't change it).
  - Migrating existing rows whose host_pid is wrong — they are repaired naturally on the next save.
