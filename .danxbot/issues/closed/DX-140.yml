    text: |-
      <!-- danxbot -->

      ## Code Review

      ### Critical findings â€” addressed

      1. **Silent YAML write skip when `loadLocal` returns null** (poller `pairedWriteYaml.write`).

         Fix: throw a descriptive error so the helper routes into rollback instead of leaving DB stamped + YAML empty.

         ```ts
         if (!issue) {
           throw new Error(
             `paired-write: YAML for ${dispatchStamp.issueId} disappeared during dispatch â€” cannot stamp pid ${pid}`,
           );
         }
         ```

      2. **`launcher.ts` paired-write catch path untested** (review #1 + test reviewer #1).

         Fix: added 3 new launcher tests covering SIGTERM-on-rollback, gate-skip when `dispatch` absent, and `pairedWriteYaml` wiring â€” see test-review summary above.

      3. **`finalize` doesn't assert `pidTerminatedAt`** (test reviewer #2).

         Fix: added `dispatch-tracker.test.ts` "finalize stamps pidTerminatedAt equal to completedAt on every terminal status" covering both completed + failed branches.

      ### Findings deferred (Phase 2 / unrelated cards)

      | Finding | Why deferred |
      |---|---|
      | Stall-recovery respawn doesn't re-stamp `host_pid` (regression vs pre-DX-140 in worker-restart-after-stall edge case) | Phase 2 (DX-141) owns the reconcile rewrite + reattach. The respawn path's host_pid update belongs there. |
      | `pairedWriteHostPid` rollback's "mark failed" UPDATE conflicts with `finalize`'s overwrite (double-finalize race) | Same fields written with same values by both paths. Harmless today; cleaning up requires a wider refactor of who owns terminal-row writes. |
      | DRY of `loadLocal + null-guard + clearDispatchAndWrite` patterns in `poller/index.ts` | Pre-existing repetition across 5+ call sites. Out of scope for this phase. |
      | `PairedHostPidWriteError` doesn't expose `markFailedError` | The `markErr` is logged, not surfaced. Low impact since `finalize` also writes the failed status. |

      ### Comment quality

      - Header on `paired-host-pid-write.ts` is load-bearing â€” references the May-7 incident.
      - Launcher catch comment is load-bearing.
      - Other comments tightened where they duplicated the helper's header.
