title: "[DB registry > Phase 1] Atomic paired write â€” host_pid (DB) + dispatch.pid (YAML) stamped together"
description: |-
  ## Context

  In the May-7 incident, the worker boot log showed:

  ```
  Reconciled orphaned dispatch 26dbeb33-... (host_pid=35761) â†’ failed
  reattach: DX-90 alive (pid=33130, dispatch=26dbeb33-...) â€” registered
  ```

  Same dispatch UUID, two different PIDs, two opposite verdicts within ~140 ms. Reconcile read DB host_pid=35761 (dead). Poller reattach read YAML dispatch.pid=33130 (alive). Both stamps were written at different times by different code paths and one was stale.

  Today's spawn flow:
  1. `dispatch()` core inserts the DB row with `host_pid: null` (placeholder).
  2. Spawn fires; `script` PID is captured by `readPidFileWithTimeout`.
  3. Launcher updates the DB row's `host_pid` separately.
  4. The first agent save writes the YAML's `dispatch{}` block (including pid).

  Steps 3 and 4 are independent. Either can fail or be delayed without the other knowing. Until both land, the worker has divergent truth.

  ## Solution â€” Atomic paired write

  Once `readPidFileWithTimeout` resolves the PID, the launcher writes:
  - DB row: `UPDATE dispatches SET host_pid = ?, host_pid_at = NOW() WHERE id = ?`
  - YAML: `Edit` to inject `dispatch{}` with the same pid

  in the SAME async block. Either both succeed (commit) or both fail (rollback â€” DB UPDATE reverted to `host_pid: null`, YAML write skipped). New `pid_terminated_at` column added so termination can be recorded explicitly without losing the historical pid.

  Per-row flags:
  - `host_pid` â€” current PID. Cleared (set null) when terminated.
  - `host_pid_at` â€” when the PID was stamped.
  - `pid_terminated_at` â€” when termination was confirmed (by completion handler OR reconcile dead-pid sweep). Null while running.

  ## Files

  - `src/dashboard/dispatches-db.ts` â€” schema migration (add `host_pid_at`, `pid_terminated_at`)
  - `src/agent/launcher.ts` â€” paired-write helper called after PID resolution
  - `src/worker/dispatch.ts` (stop handler) â€” sets `pid_terminated_at` on `danxbot_complete`
  - `src/worker/reconcile.ts` â€” sets `pid_terminated_at` when marking row failed
  - `src/agent/launcher.test.ts`, `src/worker/reconcile.test.ts`, `src/worker/dispatch.test.ts` â€” tests below

  ## Test plan (TDD)

  1. After a successful spawn, DB host_pid + YAML dispatch.pid contain the SAME value within 100 ms.
  2. DB UPDATE succeeds, YAML write fails â†’ DB rolls back to host_pid=null + the launcher logs the failure + the dispatch row is marked `failed` with reason "paired-write rollback."
  3. YAML write succeeds, DB UPDATE fails â†’ opposite rollback path; YAML's `dispatch{}` cleared + dispatch row marked failed.
  4. `danxbot_complete` stop handler sets `pid_terminated_at` to NOW.
  5. Reconcile sweeping a dead PID sets `pid_terminated_at` along with `status=failed`.
  6. Migration script adds new columns idempotently to existing schemas.

  ## Acceptance

  - `host_pid_at` + `pid_terminated_at` columns exist on the `dispatches` table; migration is idempotent.
  - Paired-write is atomic â€” either both DB + YAML carry the same pid OR neither.
  - Termination is recorded with a timestamp on every terminal transition.
  - 6 new tests pass; no existing tests regressed; tsc clean.

  ## Out of scope

  - Reconcile rewrite (Phase 2).
  - Process-table scan (Phase 3).
  - YAML schema changes beyond the existing `dispatch{}` block.
