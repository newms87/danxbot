  - id: 69fda7c30f6ec43913761ea8
    author: danxbot
    timestamp: 2026-05-08T09:07:15.861Z
    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Schema migration + paired-write helper + lifecycle wiring landed
        in one cohesive phase with TDD coverage and zero existing-test
        regressions on first vitest run after fixing fixture types.
      - Code reviewer caught the poller's silent `if (issue)` skip â€” a
        near-miss that would have recreated the divergent half-stamped
        state DX-139 exists to eliminate. Fixed in-session before commit.
      - Test reviewer flagged that `dispatch-tracker.finalize` had no
        direct `pidTerminatedAt` assertion â€” the in-memory writer for
        AC #3 was previously coverage-by-implication. Added an explicit
        test for both completed and failed branches.
      - The `pairedWriteHostPid` helper is dispatch-type-agnostic by
        design: Slack and `/api/launch` paths pass no YAML pair and only
        get the DB stamp, no special-casing needed at call sites.
      **What went wrong:** - Initial test run produced 8 failures from missing `hostPidAt` /
        `pidTerminatedAt` fields on test fixtures across 6 files. Sprawl
        that should have been avoidable â€” the `Dispatch` interface
        reaching every dispatch-touching test means a single-field
        addition produces a wide blast radius. A test fixture builder
        (`makeDispatch({ overrides })`) exists in some files but not
        uniformly; consolidating would prevent the next field-add from
        cascading.
      - Stall-recovery respawn behavior under the new semantics is a
        latent regression vs pre-DX-140 (host_pid stays at the dead
        original PID after a stall recovery). Deferred to Phase 2 because
        DX-141's reconcile rewrite owns the reattach logic that would
        naturally fix it, but worth flagging that the symptom only fires
        on worker-restart-after-stall â€” a narrow window in practice.
      - Integration test (`dispatch-pipeline.test.ts`) needed a new
        `dispatches-db` mock because paired-write fail-loud broke the
        pre-existing implicit "DB calls fail silently" assumption. The
        test was always coupled to that assumption; the mock makes the
        coupling explicit but the test stack now hides DB-side
        regressions of the dispatch tracker.
      **Action items:** Nothing
      **Commits:** 49f1664
