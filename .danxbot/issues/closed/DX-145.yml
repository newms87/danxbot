      ## Test Review

      ### Summary

      16 dedicated tests cover round-trip, parse-time validation, parse cap, and `appendHistory` cap+truncation. Reviewer flagged 5 high-priority gaps and 4 nice-to-have gaps.

      ### High-priority gaps (blocked commit until filled)

      1. `validateHistory` non-array, non-null `history` rejection (e.g. `history: "string"`). The `!Array.isArray(value)` branch was uncovered.
      2. `HISTORY_CAP` exact boundary tests. Original test only used `CAP + 500`; off-by-one in `out.length > HISTORY_CAP` would slip through.
      3. `HISTORY_NOTE_CAP` exact boundary tests at 200 (untouched) and 201 (truncated to 199 + `…`).
      4. `appendHistory` below-cap path — assert length grows by exactly 1, no slice at boundary.
      5. Serialize-side absence of `from` / `to` / `note` keys — round-trip equality is insufficient because validator tolerates `null`.

      ### Lower-priority gaps

      6. `appendHistory([], entry)` baseline length-1 assertion separated from the truncation tests.
      7. Per-field `null` tolerance on `from` / `to` / `note` (legacy hand-edited YAMLs).
      8. `createEmptyIssue` default `history: []`.
      9. `memory.ts` / `trello.ts` `getCard` always emits `history: []` (low priority — trackers have no source).

      Files referenced: `src/__tests__/issue-tracker/yaml-history.test.ts`, `src/issue-tracker/yaml.ts`.
