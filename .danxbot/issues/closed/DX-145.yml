      ## Retro

      **What went well:** - TDD held: every gap (test-reviewer's 5 high-priority + code-reviewer's 2 critical contract findings) was fixed in-session, not deferred to a follow-up card.
      - The `appendHistory` actor-format + per-event invariants close the parse/append symmetry the code reviewer flagged. Phase 2/3 now have a load-bearing fail-loud contract instead of by-convention discipline.
      - Schema-only phase shipped without touching any write path — clean separation from Phase 2 work to come.
      - Adjacent test fixtures (~15 files) needed `history: []` added; a small node script handled the bulk edit cleanly without false positives.
      - Legacy YAMLs round-trip without rejection: tested + documented as a migration side-effect, so the first post-Phase-1 save's diff is expected.

      **What went wrong:** - The yaml-history test file's regex for the OUTER `history: []` originally collided with the inner `triage.history: []`. Took one debug round-trip script run to spot. A `^…$/m` anchor fixed it cleanly, but should have been my first instinct.
      - Initial `validateHistory` was parse-time-permissive and append-time-permissive — the contract drift the reviewer caught was the reviewer earning their keep. Caught in pre-commit review, but the per-event field invariants should have been in the first draft.
      - The post-dispatch CRITICAL_FAILURE check ties the dispatch lifecycle to the originally-tracked card (DX-138 here), but the orchestrator is now working on DX-145. The skill says "do NOT edit the epic's status yourself" while the post-dispatch check expects the tracked card to leave ToDo. Working around with a manual epic-status bump that auto-derive will overwrite next tick. Worth filing a follow-up to make the post-dispatch check epic-aware (verify any child progressed) — flagged below.

