    text: |-
      <!-- danxbot -->

      ## Review Fixes

      Addressed all 5 high-priority + 4 nice-to-have test-reviewer gaps and both critical code-reviewer findings.

      ### Test gaps filled

      | # | Gap | Test name |
      |---|-----|-----------|
      | 1 | non-array, non-null `history` rejection | `rejects history field that is neither a list nor null` |
      | 2 | `HISTORY_CAP` exact boundary | `keeps every entry when count is exactly HISTORY_CAP` + `drops exactly one entry when count is HISTORY_CAP + 1` |
      | 3 | `HISTORY_NOTE_CAP` exact boundary | `leaves a note of exactly HISTORY_NOTE_CAP chars unchanged` + `truncates a note of HISTORY_NOTE_CAP + 1 chars` |
      | 4 | `appendHistory` below-cap path | `does NOT slice when below HISTORY_CAP (length grows by exactly 1)` |
      | 5 | Serialize-side key absence | `omits from/to/note keys entirely when undefined (no synthetic null)` |
      | 6 | `appendHistory([], entry)` baseline | `returns [entry] when called with empty history (baseline)` |
      | 7 | Per-field null tolerance | `tolerates per-field nulls (from/to/note: null) on parse` |
      | 8 | `createEmptyIssue` default | `defaults history: [] so the resulting Issue is valid out of the box` |
      | 9 | Legacy migration side-effect | `a pre-Phase-1 YAML re-serializes with history: [] between comments and retro on first save` |

      ### Code findings addressed

      1. **Actor-format enforcement at append-time** — added `HISTORY_ACTOR_FORMAT` regex (`^([^:]+:.+|setup|unknown)$`) + `assertHistoryEntry` helper called from `appendHistory`. Throws `IssueHistoryAppendError` on malformed actor. Pinned with 6 new tests covering canonical sources, grandfathered bare actors, empty/missing-separator/empty-source/empty-id rejection.
      2. **Per-event field invariants** — applied at BOTH `appendHistory` (throws `IssueHistoryAppendError`) and `validateHistory` (returns error string). The asymmetric leniency the reviewer warned about is closed: `status_change` requires `from` + `to`; `created` / `blocked` require `to`; `unblocked` has no required fields. 5 append-time tests + 5 parse-time tests pin both paths.
      3. Added the legacy-migration documentation test (#9 above).
      4. Softened the `validateHistory` cap comment from "parallel to `validateTriageHistory`" to explicitly note the strictness divergence on required fields.

      ### Final state

      - 43 history tests pass (up from 16 originally).
      - 3343 backend tests pass total.
      - `npx tsc --noEmit` clean.
      - Both reviewers' findings closed; no rationalizations, no deferrals.
