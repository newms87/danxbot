title: "[Dashboard] Card history > Phase 1: Schema — `Issue.history[]` field, parse/serialize round-trip, validation, 1000-cap rolling window"
description: |-
  ## Goal

  Land the on-disk shape for the new `history[]` audit log on every Issue. This phase introduces the type, validates it, round-trips it through YAML, and applies the 1000-entry rolling cap. No write-paths are wired yet — that lands in Phase 2 (worker) and Phase 3 (auto-mutation paths). After this phase, every existing YAML continues to parse with `history: []` defaulted in, and a YAML carrying entries serializes back byte-identically.

  Parent epic: `DX-138` (Card history — status + blocked transitions with actor + dispatch id, plus History tab).

  ## Schema

  Add to `src/issue-tracker/interface.ts`:

  ```ts
  export type IssueHistoryEvent = "created" | "status_change" | "blocked" | "unblocked";

  export interface IssueHistoryEntry {
    /** ISO 8601, server-side wall clock. Validator does NOT parse the format. */
    timestamp: string;
    /** Required. Format `<source>:<id>` OR bare `setup` / `unknown`. */
    actor: string;
    event: IssueHistoryEvent;
    /** Required for `status_change`. Optional for `blocked`/`unblocked`/`created`. */
    from?: IssueStatus;
    /** Required for every event except (optionally) `unblocked`. */
    to?: IssueStatus;
    /** Optional human-readable note. Capped at 200 chars on append (truncate + ellipsis); validator tolerates longer. */
    note?: string;
  }

  export interface Issue {
    // ... existing fields ...
    /**
     * Append-only audit log of `status` / `blocked` transitions and the
     * `created` event. Maintained by the worker write-paths (Phase 2 / DX-138)
     * and the auto-mutation paths (Phase 3 / DX-138). Capped at 1000 entries —
     * oldest dropped on overflow. Empty `history: []` is the legacy default;
     * existing YAMLs ship with no entries and acquire them as future
     * mutations land.
     */
    history: IssueHistoryEntry[];
  }
  ```

  Position in `serializeIssue`: AFTER `comments`, BEFORE `retro` (matches the description's suggested ordering and keeps round-trip stable).

  ## Validation rules

  `validateHistory` (parallel to `validateTriageHistory`):

  - Missing `history` field → default to `[]` (parse-tolerant; legacy YAMLs carry no history).
  - `history === null` → `[]`.
  - `history` must be a list. Each entry must be a mapping.
  - `actor` required, non-empty string. The internal format check (`<source>:<id>` OR bare `setup`/`unknown`) lives at append-time, not parse-time, because the validator must not reject historical data with a future actor prefix.
  - `event` required, must be one of the four enum values; reject otherwise.
  - `from` / `to`, when present, must match the `IssueStatus` enum.
  - `timestamp` required, non-empty string. Format not parsed.
  - `note`, when present, must be a string. Cap is enforced on append, NOT on parse.
  - Cap on parse: if `history.length > 1000`, drop the oldest entries silently (parallel to `TRIAGE_HISTORY_CAP`).

  Add `HISTORY_CAP = 1000` constant; export an `appendHistory(history, entry)` helper that pushes + applies the rolling cap. The append helper also enforces the 200-char note truncation. Phase 2 + Phase 3 consume this helper to avoid duplicating the cap+truncate logic.

  ## Files

  - `src/issue-tracker/interface.ts` — `IssueHistoryEntry` type + `IssueHistoryEvent` union + add to `Issue`.
  - `src/issue-tracker/yaml.ts` — `validateHistory` function, wire into `validateIssue`, add `history` to `serializeIssue`, default `[]` in `createEmptyIssue`. Also export `appendHistory` helper.
  - `src/issue-tracker/__tests__/yaml-history.test.ts` (new) OR extend an existing yaml test file — tests below.

  `CreateCardInput` and `issueToCreateInput`: do NOT add `history` here. History is local-only audit (parallel to `dispatch` / `parent_id` / `children`); the tracker abstraction never sees it. Newly-created issues acquire their `created` history entry in Phase 2's `handleIssueCreate`, AFTER the tracker push.

  ## Test plan (TDD)

  1. Round-trip — Issue with several history entries (mixed events, mixed from/to/note presence) serializes → parses → serializes byte-identical.
  2. Round-trip — Issue with `history: []` is byte-identical to an Issue with no `history` field on input (default-fill works).
  3. Validation — entry missing `actor` is rejected with a useful message.
  4. Validation — entry with `event: "deleted"` (unknown event) is rejected.
  5. Validation — entry with non-string `timestamp` is rejected.
  6. Validation — entry with non-`IssueStatus` value in `from`/`to` is rejected.
  7. Cap on parse — YAML carrying 1500 entries parses to exactly 1000, oldest dropped.
  8. `appendHistory` cap — appending past 1000 drops the oldest entry; the new entry is at the tail.
  9. `appendHistory` note truncation — a 250-char note is truncated to 197 chars + `…` (3 ellipsis chars = 200 total).

  ## Acceptance

  - `IssueHistoryEntry` + `IssueHistoryEvent` types added to `interface.ts`.
  - `Issue.history: IssueHistoryEntry[]` field added; default-filled `[]` on parse when absent.
  - `serializeIssue` emits `history` after `comments` and before `retro` (matches description).
  - `validateIssue` rejects malformed entries (missing actor, unknown event, non-string timestamp, non-status `from`/`to`).
  - 1000-cap rolling window applied on parse (oldest dropped) AND on `appendHistory`.
  - `appendHistory` helper exists with cap + note-truncation; covered by test plan above.
  - 9 backend tests pass; `npx tsc --noEmit` clean; no existing tests regressed.
  - AC #1 + AC #7 of the parent epic (DX-138) are now mechanically achievable by the worker phases.

  ## Out of scope

  - Wiring `appendHistory` into worker write-paths (`runSync`, `handleIssueCreate`) — Phase 2.
  - Auto-derive / heal / Trello hydrate appends — Phase 3.
  - Dashboard rendering — Phase 4.
  - Migration of existing YAMLs — none required; default `[]` lands automatically on next save.
