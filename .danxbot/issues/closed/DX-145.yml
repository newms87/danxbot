    text: |-
      <!-- danxbot -->

      ## Code Review

      ### Verdict

      Schema change is small, well-tested, tight-scoped, and respects existing patterns (parallel to `dispatch`, `blocked`, `triage`). Type check + 3321 backend tests pass. **Two contract drift findings** are blockers before Phase 2 lands; the rest are nice-to-haves.

      ### Critical findings (block before commit)

      1. **`appendHistory` does not enforce the actor format the interface contract promises.** `IssueHistoryEntry.actor` JSDoc says format enforcement happens at append-time only (parse-time stays permissive so legacy YAMLs round-trip). But `appendHistory` only truncates the note and applies the cap — no actor format check anywhere. Phase 2/3 callers will rely on the documented contract; if they pass a malformed actor (drop the `:` separator, pass empty), the bad entry lands on disk silently and the validator (deliberately permissive) won't catch it.
      2. **`validateHistory` does not enforce per-event field requirements documented on the interface.** A `status_change` entry with no `from` / `to` passes validation; same for `created` and `blocked` missing `to`. Phase 2 will be inserting entries from a transition diff; if a Phase-2 bug omits a required field, the bad entry round-trips cleanly forever.

      ### Non-critical findings

      3. First-save behavior on legacy YAMLs is undocumented and untested. Add one short test asserting the legacy → re-serialize → `history: []` migration side-effect.
      4. Comment claims `validateHistory` is "parallel to" `validateTriageHistory`, but the latter is lenient on missing strings while the former is strict. Soften the framing or note the divergence.
      5. Cap-and-slice idiom appears 2x — borderline DRY, leave as-is. If a third audit log lands, extract `applyRollingCap`.

      ### Verified RIGHT

      - Optional `from`/`to`/`note` (no `IssueComment.author`-style empty-string default).
      - `getCard` always emits `history: []` — trackers never see audit log; consistent with `dispatch` / `parent_id` / `children` pass-through.
      - Field ordering `comments → history → retro` — verified via snapshot test.
      - Backwards-compat parse path — covered.
      - No magic numbers — `HISTORY_CAP` / `HISTORY_NOTE_CAP` exported.
      - No `as any` casts; type narrowing via `Set.has` / `includes` is safe.
