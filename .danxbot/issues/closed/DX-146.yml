      <!-- danxbot -->

      ## Notes from Phase 1 (DX-145)

      Phase 1 commit: `4476b6a`. The `Issue.history[]` schema is on disk; no write-paths populate it yet — that's your job.

      ### Phase 1 deviations from the original spec

      - Code reviewer flagged that the `IssueHistoryEntry.actor` JSDoc and the optional `from`/`to` JSDoc promised enforcement that no code performed. Closed in Phase 1: `appendHistory` now throws `IssueHistoryAppendError` on malformed actor or missing per-event fields. `validateHistory` mirrors the per-event check at parse-time so a non-`appendHistory` writer can't sneak a malformed entry through.
      - **You don't need to add `system_errors` event hooks for the actor format itself** — `appendHistory` is fail-loud at append-time. The `system_errors` event in your AC #4 (unknown actor) is for the case where the worker route legitimately can't resolve an actor and falls back to `actor: "unknown"` (which `appendHistory` accepts via the bare-actor branch). That fallback should emit `system_errors`.

      ### Reusable helpers Phase 2 should consume

      | Symbol | File | Use |
      |---|---|---|
      | `appendHistory(history, entry)` | `src/issue-tracker/yaml.ts` | The ONLY entry point for pushing onto `issue.history`. Applies cap + truncation + actor format + per-event invariants. Pure / immutable. |
      | `HISTORY_CAP`, `HISTORY_NOTE_CAP` | `src/issue-tracker/yaml.ts` | Constants — import, don't redefine. |
      | `IssueHistoryAppendError` | `src/issue-tracker/yaml.ts` | Thrown by `appendHistory` on malformed input. Worker route should let this propagate (don't swallow). |
      | `IssueHistoryEntry`, `IssueHistoryEvent` | `src/issue-tracker/interface.ts` | Type imports for diff-builder helpers. |

      ### Diff path skeleton

      Inside `runSync` (in `src/worker/issue-route.ts`), the "old" issue is the on-disk parse and "new" is the saved body. Both should ride through `forceBlockedToToDo` first; take the diff AFTER normalization so a `blocked: {…}, status: Needs Help` save doesn't double-count (worker normalizes status to `ToDo`, then the diff sees `(In Progress, ToDo)` for status and `(null, …)` for blocked → both events emitted appropriately).

      Pseudo-code:

      ```ts
      const now = new Date().toISOString();
      const actor = `dispatch:${dispatchId}`;
      let history = newIssue.history;

      if (oldIssue.status !== newIssue.status) {
        history = appendHistory(history, {
          timestamp: now,
          actor,
          event: "status_change",
          from: oldIssue.status,
          to: newIssue.status,
        });
      }

      if (oldIssue.blocked === null && newIssue.blocked !== null) {
        history = appendHistory(history, {
          timestamp: now,
          actor,
          event: "blocked",
          to: newIssue.status, // worker forces ToDo when blocked != null
          note: `Blocked on ${newIssue.blocked.by.join(", ")}`.slice(0, HISTORY_NOTE_CAP),
        });
      }

      if (oldIssue.blocked !== null && newIssue.blocked === null) {
        history = appendHistory(history, {
          timestamp: now,
          actor,
          event: "unblocked",
          to: newIssue.status,
        });
      }

      newIssue.history = history;
      ```

      ### handleIssueCreate `created` entry

      Push exactly ONE `created` entry AFTER `tracker.createCard` succeeds, BEFORE `writeFileSync(targetPath, serializeIssue(stamped))`:

      ```ts
      stamped.history = appendHistory(stamped.history, {
        timestamp: new Date().toISOString(),
        actor: `dispatch:${dispatchId}`,
        event: "created",
        to: stamped.status,
      });
      ```

      Note: `_dispatchId` is currently underscore-prefixed (unused) in `handleIssueCreate`. Remove the underscore to thread it through.

      ### Tests

      Phase 1 added 43 history tests in `src/__tests__/issue-tracker/yaml-history.test.ts`. Your phase needs Phase 2-specific tests for the worker route's diff behaviour:

      - status change emits `status_change`
      - blocked null→record emits `blocked` with `note`
      - blocked record→null emits `unblocked`
      - `handleIssueCreate` emits exactly one `created`
      - actor format `dispatch:${dispatchId}` correct
      - unknown-actor branch emits `system_errors` event

      Run `npx vitest run src/__tests__/worker/issue-route.test.ts` (existing test file).

      ### Gotchas

      - `runSync` runs INSIDE `chainOnIssueLock`; don't take additional locks.
      - The append happens BEFORE `syncIssue` (tracker push). History is local-only — tracker doesn't consume it, but the YAML is the authoritative pre-sync shape.
      - `_dispatchId` rename: also check there are no callers of `handleIssueCreate` passing the param positionally — TS will flag if you miss one.
      - Existing test fixtures across ~15 files were updated to add `history: []`. Your new fixtures (e.g. for diff cases) should pre-populate `history` with whatever entries the test scenario expects.
