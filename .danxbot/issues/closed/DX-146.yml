title: "[Dashboard] Card history > Phase 2: Worker write-paths — `runSync` diff appends + `handleIssueCreate` `created` entry + actor resolution"
description: |-
  ## Goal

  Wire the worker's two agent-facing write-paths to push history entries on every status / blocked transition and on card creation. After this phase, every save and every create from a dispatched agent leaves a fully-attributed history trail.

  Parent epic: `DX-138`. Depends on `DX-145` (Phase 1: schema + `appendHistory` helper).

  ## Worker integration points

  Both endpoints live in `src/worker/issue-route.ts`. They share the per-dispatch `dispatchId` (the URL parameter) — that is the actor identity for every save originating from an agent.

  ### `runSync` — diff old/new and append entries

  `runSync` already runs INSIDE `chainOnIssueLock` AFTER `parseIssue` of the on-disk YAML. Pre-existing on-disk state is the "old" issue; the body the agent saved is the "new" issue. Both ride through `forceBlockedToToDo` first; the diff is taken AFTER normalization so `blocked: {…}, status: "Needs Help"` saved by an agent doesn't double-count (worker normalizes status to `ToDo`, then the diff sees `(In Progress, ToDo)` for status and `(null, …)` for blocked → both events emitted appropriately).

  Diff rules (each independent — multiple events can append for one save):

  - `old.status !== new.status` → push `status_change` with `from: old.status`, `to: new.status`.
  - `old.blocked === null && new.blocked !== null` → push `blocked` with `to: new.status` (which the worker has forced to `ToDo`). `note` carries the blocker `by[]` summary, e.g. `Blocked on DX-200` or `Blocked on DX-200, DX-201`.
  - `old.blocked !== null && new.blocked === null` → push `unblocked` with `to: new.status`. No `note` unless we have one (this branch is dispatched-agent-driven; a typical case is the agent edited blocked back to null themselves).

  Append to `new.history` via `appendHistory` (Phase 1 helper). Then write the merged issue via `persistAfterSync`. The append happens BEFORE `syncIssue` so the appended entries are visible to the tracker push (history is local-only — tracker doesn't actually consume it, but the YAML is the authoritative pre-sync shape).

  ### `handleIssueCreate` — `created` entry

  Inside `handleIssueCreate`, AFTER the successful `tracker.createCard` call but BEFORE `writeFileSync(targetPath, serializeIssue(stamped))`. Push exactly one entry:

  ```ts
  appendHistory(stamped.history, {
    timestamp: <now ISO>,
    actor: `dispatch:${dispatchId}`,
    event: "created",
    to: stamped.status,
  });
  ```

  Note: `_dispatchId` is currently underscore-prefixed (unused). Remove the underscore to thread it through.

  ## Actor resolution

  Both endpoints derive actor from the URL `dispatchId` parameter:

  - Non-empty `dispatchId` → `dispatch:${dispatchId}`.
  - Empty / missing `dispatchId` → `unknown` AND emit a `system_errors` event so the dashboard surfaces the gap. Implement via `events.ts#emit("system_errors", { source: "issue-route", reason: "missing dispatch id on issue save/create", ...})` — match the existing event-emission pattern. Verify the existing event signature; the test plan asserts the call.

  `syncTrackedIssueOnComplete` (the in-process `danxbot_complete` auto-sync) takes the same path as `handleIssueSave` for the diff/append — a single helper `appendDiffEntries(old, new, dispatchId)` is consumed by both.

  ## Per-issue mutex preserves correctness

  The diff is taken inside `chainOnIssueLock` (already exists for serialization of saves on the same id). No additional locking needed.

  ## Files

  - `src/worker/issue-route.ts` — `appendDiffEntries(old, new, dispatchId, recordError)` helper, wire into `runSync` + `handleIssueCreate` + `syncTrackedIssueOnComplete`. Thread `dispatchId` into `handleIssueCreate` (drop the underscore).
  - `src/worker/issue-route.test.ts` — extend with the test plan below.
  - `src/dashboard/events.ts` (or wherever `system_errors` emission lives) — verify shape; reuse if present.

  ## Test plan (TDD)

  1. `runSync` — save with status change → exactly one `status_change` entry appended with correct `from`/`to`/`actor`.
  2. `runSync` — save with no status change → zero entries appended.
  3. `runSync` — save with `blocked: null → {reason, ...}` → one `blocked` entry with `note` listing blocker ids.
  4. `runSync` — save with `blocked: {} → null` → one `unblocked` entry.
  5. `runSync` — save with both status change AND blocked transition → both entries appended (preserve order: status_change before blocked/unblocked).
  6. `handleIssueCreate` — fresh card → exactly one `created` entry appended with `actor: dispatch:<id>` and `to: <draft.status>`.
  7. `runSync` — empty `dispatchId` → actor falls back to `unknown` AND `system_errors` is emitted with a useful reason field.
  8. `handleIssueCreate` — empty `dispatchId` → same fallback + system_errors emission.
  9. Cap behavior at the boundary — saving when `history.length === 1000` and a new event fires drops the oldest entry; final length stays 1000.
  10. `syncTrackedIssueOnComplete` — auto-sync on completion appends the same diff entries as the explicit-save path (no double-append: the in-process call goes through the same helper as the HTTP path).

  ## Acceptance

  - `runSync` appends `status_change` when status differs; no append when unchanged.
  - `runSync` appends `blocked` entry on `null → record` and `unblocked` entry on `record → null`.
  - Both diff-driven entries carry `actor: dispatch:<dispatchId>` for the dispatch-driven path.
  - `handleIssueCreate` appends a single `created` entry with the dispatch actor.
  - Empty / missing dispatchId on the issue-route handlers falls back to `unknown` actor AND emits a `system_errors` event with a useful reason (visible in the dashboard analytics stream).
  - 1000-cap rolling window holds — appending past the cap drops the oldest entry.
  - `syncTrackedIssueOnComplete` reuses the same diff helper (no second code path).
  - 10 new backend tests pass; `npx tsc --noEmit` clean; no existing tests regressed.

  ## Out of scope

  - Auto-derive / heal / Trello hydrate appends — Phase 3.
  - Dashboard rendering — Phase 4.
  - Dashboard write-paths emitting `dashboard:<username>` — no card-mutating dashboard endpoint exists today; the description acknowledges this is forward-looking. Add the actor format to a TODO comment near the future endpoint surface; do not invent the endpoint here.
