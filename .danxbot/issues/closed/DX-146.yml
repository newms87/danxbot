      ## Retro

      **What went well:** - **TDD discipline held**: 16 failing tests authored first, all failed for the right reason, implementation made them pass without an "oops let me adjust the assertion" cycle.
      - **DRY kept under pressure during review fixes**: M2 (extract `resolveDispatchActor`) and M1 (`fireAndForgetSystemError`) collapsed into one helper-extraction pass; both call sites now share the same actor-resolution + hook-invocation contract. Mirrors the precedent set by `src/issue-tracker/retry-queue.ts`.
      - **Phase 1 helpers re-used cleanly**: `appendHistory` (DX-145) handles cap, truncation, actor format, and per-event invariants in one place. Phase 2 just hands it the right entry — no duplicated validation logic.
      - **Both reviewer subagents found real issues** that would have shipped silently (M1 unhandled-rejection bug, missing tracker-bound branch coverage). Quality gates earned their tokens.
      **What went wrong:** - **Initial pre-slice of `note.slice(0, HISTORY_NOTE_CAP)` bypassed `appendHistory`'s ellipsis truncation.** Trusted the cap helper too much without reading its contract — `appendHistory` only truncates when `note.length > HISTORY_NOTE_CAP`. Pre-slicing to exactly 200 chars made it pass through unchanged. Caught immediately by the truncation test.
      - **Test fixture id format violations**: used `ISS-AC` and `ISS-CAP` for test issue ids. The validator requires `^ISS-<positive integer>$`. Caused 3 confusing test failures before grepping the regex pinned the bug. Rule-of-thumb: if the test parses YAML, the fixture must satisfy the schema validator's invariants — test-only "memorable" ids violate the same contract real cards do.
      - **Initial `void Promise.resolve(deps?.recordSystemError?.(...))` pattern was a copy-from-pattern-not-from-thinking moment.** Wrote it knowing fire-and-forget was the intent, didn't notice that `void` doesn't attach `.catch`. Code reviewer correctly flagged it as Major. The repo already had the canonical answer in `retry-queue.ts:433` — should have grepped first.
      - **DX-146's spec said "old issue is on-disk pre-existing" + "new issue is saved body"** which is contradictory under the current MCP architecture (`{id}`-only request, agent edits disk before save). Spent ~10 min trying to reconcile before committing to the in-memory cache design. The cache works, but a future Phase 2.5 might consider whether the architecture should change so the diff source is more obvious.
      **Action items:** Nothing
      **Commits:** be5c03a
