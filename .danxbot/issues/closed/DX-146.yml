      <!-- danxbot -->

      ## Code Review

      Code-reviewer reviewed `src/worker/issue-route.ts`. Verdict: **0 Critical, 2 Major, 6 Minor.**

      ### Major findings — both addressed

      **M1 — `void Promise.resolve(deps?.recordSystemError?.(...))` adopts rejections without catching.** The `void` operator only discards the synchronous expression's value; it does not register a `.catch`. A rejected return surfaces as `UnhandledPromiseRejection`. Diverged from `src/issue-tracker/retry-queue.ts:433-444` which solves the same problem with `try { await … } catch { log.warn(…) }`.

      **Fix:** extracted a `fireAndForgetSystemError` helper that detects whether the hook return is thenable and attaches `.catch` only then; wraps the synchronous call in `try/catch` for synchronous throws. Mirrors the retry-queue contract (one canonical way to call instrumentation hooks).

      **M2 — DRY: actor + recordSystemError block duplicated at two sites.** Identical inline blocks in `appendDiffEntries` and `handleIssueCreate`.

      **Fix:** extracted `resolveDispatchActor(dispatchId, context, deps)`. Single source of truth for actor resolution; folds in M1's hook-invocation safety in one place.

      ### Minor findings — all addressed

      | Finding | Fix |
      |---|---|
      | m1 — Concurrent-save safety undocumented | Added paragraph to `lastSeenIssueState` JSDoc explaining the synchronous read-write window in `applyHistoryDiff` |
      | m2 — `applyHistoryDiff` identity-check no-alloc path undocumented | One-liner added to JSDoc |
      | m4 — `recordSystemError` JSDoc claimed "always fires on empty dispatchId" but early `if (!oldIssue) return` short-circuits | Reworded JSDoc to be honest: hook fires only when ≥ 1 transition is detected (no-diff path doesn't write an `unknown` entry, so there's nothing for the operator to chase) |
      | m5 — Cache `set` ran BEFORE `writeFileSync` in `handleIssueCreate` (failed persist would leave cache holding phantom snapshot) | Moved `lastSeenIssueState.set` AFTER `writeFileSync` |
      | m6 — JSDoc example wording on `forceBlockedToToDo` interaction | Added "given prior cached state `In Progress`" qualifier |

      ### Concerns confirmed as not bugs

      - **In-memory `Map` cache (lost on restart)**: not a SOLID violation. The YAML is authoritative; cache is purely a diff-source for the audit log. Putting it in MySQL would couple history append to DB availability.
      - **Concurrent saves on the same id**: safe. `applyHistoryDiff` is synchronous between read and write.
      - **Cache key = internal `id`** (not `external_id`): correct. `external_id` is empty for memory-tracker issues + drafts; partitions one logical issue across two keys.
      - **Empty dispatchId should NOT throw**: throwing turns observability gap into save failure. Fire-and-forget hook is the right contract.
