title: "[Dashboard] Card history > Phase 3: Auto-mutation appends — `worker:auto-derive` + `worker:heal` + `tracker:trello` `created`"
description: |-
  ## Goal

  Wire the three non-dispatch-driven write-paths to push their own history entries:

  1. The poller's epic auto-derive flips a parent epic's status when its children's union state changes (`src/poller/epic-status.ts` — DX-98).
  2. The poller's `healLocalYamls` pass moves a stuck terminal-status YAML from `open/` → `closed/` (`src/poller/heal.ts` — DX-133 Phase 3).
  3. Inbound Trello hydrate adopts a tracker-born card and writes a fresh local YAML (`src/issue-tracker/sync.ts` — `bulkSyncMissingYamls`).

  After this phase, every state change made by the worker / poller / tracker is attributed in the audit log. Combined with Phase 2's dispatch-driven appends, the schema covers every non-human, non-setup write path.

  Parent epic: `DX-138`. Depends on `DX-145` (Phase 1: schema + `appendHistory` helper) and `DX-146` (Phase 2: diff helper + actor pattern).

  ## Integration points

  ### `epic-status.ts` — `worker:auto-derive`

  The derive step in `applyEpicStatus` (or equivalent — locate via `Grep` for the actual symbol) compares `parent.status` to the derived value and writes only on diff. When the diff fires, push:

  ```ts
  appendHistory(parent.history, {
    timestamp: <now ISO>,
    actor: "worker:auto-derive",
    event: "status_change",
    from: parent.status,
    to: derived,
    note: <rule-that-fired>,
  });
  ```

  `<rule-that-fired>` describes which rule produced the new status — e.g. `All children Done — derive to Done`, `One child Needs Help — derive to Needs Help`, `Mixed children — derive to In Progress`. The exact strings live in `epic-status.ts` already as branch reasons; thread them through.

  ### `heal.ts` — `worker:heal`

  When the healer moves a YAML from `open/` to `closed/` because its status is terminal, that's a no-op state change at the issue level (status is already terminal in-file) — but the healer ALSO covers the inverse: a closed YAML whose status drifted to non-terminal must move back. Per DX-133 Phase 3, the healer's typical action is the open→closed move. Push:

  ```ts
  appendHistory(issue.history, {
    timestamp: <now ISO>,
    actor: "worker:heal",
    event: "status_change",
    from: <prior status from filename location heuristic>,
    to: issue.status,
    note: "Healer moved <open|closed> → <closed|open> to match status",
  });
  ```

  If the heal pass discovers no real status delta and the move is purely a filesystem fix, prefer NOT to emit a history entry (avoid noise — heal entries should reflect a real state change, not janitorial filesystem moves). The `note` must be specific to what happened.

  The blocker `worker:auto-derive` and `worker:heal` may both fire and clear `blocked` automatically when all blockers reach terminal. Wire those events too:

  - Poller's auto-clear (when every blocker in `by[]` is terminal) → push `unblocked` with `actor: worker:auto-derive`, `note: All blockers terminal: ISS-X, ISS-Y`.

  ### `sync.ts` (`bulkSyncMissingYamls` / Trello hydrate) — `tracker:trello`

  When the poller / sync layer adopts a tracker-born card (one that exists on Trello but lacks a local YAML), it builds a fresh `Issue` and writes it. Push exactly one entry on the fresh issue BEFORE the first write:

  ```ts
  appendHistory(hydrated.history, {
    timestamp: <now ISO>,
    actor: "tracker:trello",
    event: "created",
    to: hydrated.status,
    note: "Hydrated from tracker external_id <id>",
  });
  ```

  If `hydrated.history` already has entries (e.g. the YAML round-tripped from a previous worker session), this branch should be a no-op. The `created` event is exactly-one-per-card.

  ## Files

  - `src/poller/epic-status.ts` — append on derive flip.
  - `src/poller/heal.ts` — append on real status delta only.
  - `src/issue-tracker/sync.ts` — append on inbound hydrate `bulkSyncMissingYamls`.
  - `src/poller/epic-status.test.ts` — extend.
  - `src/poller/heal.test.ts` — extend.
  - `src/issue-tracker/sync.test.ts` (or wherever bulkSyncMissingYamls is tested) — extend.

  ## Test plan (TDD)

  1. `epic-status.ts` — derive flips parent's status from `In Progress` to `Done` → exactly one `status_change` entry with `actor: worker:auto-derive` and a `note` describing the rule.
  2. `epic-status.ts` — derive runs but no flip → zero history entries appended.
  3. `epic-status.ts` — auto-clear of `blocked` when every `by[]` is terminal → one `unblocked` entry with `actor: worker:auto-derive`.
  4. `heal.ts` — heal moves a `closed/` Done YAML back to `open/` because operator re-opened (status drifted to ToDo) → one `status_change` entry with `actor: worker:heal`.
  5. `heal.ts` — heal does the typical `open → closed` move on a terminal YAML; status already matches → zero entries (no fake state delta).
  6. `bulkSyncMissingYamls` — adopts a fresh tracker card → exactly one `created` entry with `actor: tracker:trello` and a `note` referencing the external_id.
  7. `bulkSyncMissingYamls` — runs against a card whose local YAML already exists with non-empty history → no second `created` entry pushed (idempotent).

  ## Acceptance

  - `epic-status.ts` auto-derive appends `worker:auto-derive` `status_change` with a `note` describing the rule.
  - `epic-status.ts` auto-clear of `blocked` appends `worker:auto-derive` `unblocked`.
  - `heal.ts` appends `worker:heal` `status_change` ONLY when there's a real status delta (no filesystem-noise entries).
  - `bulkSyncMissingYamls` appends `tracker:trello` `created` with `note` referencing external_id, exactly once per fresh card.
  - 7 new backend tests pass; `npx tsc --noEmit` clean; no existing tests regressed.
  - AC #5 + AC #6 of the parent epic (DX-138) hold.

  ## Out of scope

  - Dashboard rendering — Phase 4.
  - `worker:retry-queue` / `worker:reconcile` actors — those code paths are pre-existing helpers used by other features; a future card can extend the actor list when those paths actually mutate status. The actor table in the parent epic's description is a canonical reference, not a Phase 3 deliverable.
