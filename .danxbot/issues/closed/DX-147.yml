      <!-- danxbot -->

      ## Notes from Phase 2 (DX-146)

      Phase 2 commit: `be5c03a`. The dispatch-driven save / create paths now populate `Issue.history[]`. Your phase wires the **auto-mutation** writers (auto-derive, heal, Trello hydrate) so non-dispatch worker code paths also leave a fully-attributed audit trail.

      ### Reusable helpers Phase 3 should consume

      | Symbol | File | Use |
      |---|---|---|
      | `appendHistory(history, entry)` | `src/issue-tracker/yaml.ts` | The ONLY entry point for pushing onto `issue.history`. Phase 1 helper. Pure. |
      | `appendDiffEntries(old, new, dispatchId, nowIso, deps)` | `src/worker/issue-route.ts` | Pure diff helper from Phase 2. Useful when Phase 3 callers ALSO want diff semantics (e.g. heal pass that happens to flip status). For deterministic auto-mutations (auto-derive flips a known status), call `appendHistory` directly with a `worker:auto-derive` actor — diff isn't needed. |
      | `HISTORY_CAP`, `HISTORY_NOTE_CAP` | `src/issue-tracker/yaml.ts` | Constants — import, don't redefine. |
      | `IssueHistoryAppendError` | `src/issue-tracker/yaml.ts` | Thrown by `appendHistory` on malformed input. Phase 3 callers should let it propagate. |

      ### Actor format for Phase 3

      Phase 2 callers use `dispatch:<uuid>`. Phase 3 callers use bare-prefix actors per the canonical actor table on the parent epic (`DX-138`):

      | Phase 3 caller | Actor |
      |---|---|
      | `epic-status.ts#deriveAndPersist` (auto-derive) | `worker:auto-derive` |
      | `heal.ts#healLocalYamls` (heal pass) | `worker:heal` |
      | Trello hydrate (`bulkSyncMissingYamls`) | `tracker:trello` |
      | Retry queue drain (if it ever flips status) | `worker:retry-queue` |

      All four match `appendHistory`'s actor regex `^([^:]+:.+|setup|unknown)$`.

      ### Phase 2 deviations from spec (worth knowing)

      - The original spec said the diff source was the on-disk YAML pre/post agent edit. With the current MCP architecture (`{id}`-only request, agent edits disk before save), the actual diff source is the **in-memory `lastSeenIssueState` cache** in `src/worker/issue-route.ts`. Worker restart loses the cache; first save after restart has no diff context. Acceptable trade-off — YAML stays authoritative, history is best-effort audit.
      - **Auto-mutations don't need the cache.** When `epic-status.ts` flips a parent's status from In Progress → Done, the writer KNOWS what it changed. Just call `appendHistory(parent.history, {timestamp, actor: "worker:auto-derive", event: "status_change", from: oldStatus, to: newStatus, note: "..."})` directly. No cache lookup, no `appendDiffEntries`.
      - **Note for `worker:auto-derive` should describe the rule that fired.** Per AC #5 of the parent epic. Example: `note: "All children Done — DX-98 derive rule"` or `note: "Any child Needs Help → parent Needs Help"`. Reuse the priority-rule numbering from the issue-card-workflow skill so dashboard readers can correlate.
      - **`HISTORY_NOTE_CAP = 200` is enforced by `appendHistory`.** Don't pre-truncate; let the helper do it (Phase 2 burned a test cycle on this).

      ### Test pattern Phase 3 should mirror

      Phase 2 added 21 tests in `src/__tests__/worker/issue-route.test.ts` (search for `DX-146`). Pure-helper tests + integration tests using a real `node:http` server bound to a tmpdir + `MemoryTracker`. Phase 3's auto-derive append should test:

      - Status diff at the parent triggers a `worker:auto-derive` `status_change` entry.
      - Note string accurately describes the derive rule that fired.
      - Multiple children moving simultaneously produce ONE entry per parent flip, not one per child.

      ### Gotchas

      - The cache in `src/worker/issue-route.ts` is keyed by `issue.id`. If your Phase 3 writers ALSO bypass the cache and write directly via `appendHistory`, the cache stays out of sync — that's fine because `appendDiffEntries`'s only consumer is `applyHistoryDiff`, and it tolerates cache divergence (worst case = a redundant entry on the next save).
      - Trello hydrate's `created` entry should fire ONLY when the YAML is FRESHLY-hydrated (no prior local YAML). If the YAML already exists and inbound updates re-add comments, that's not a `created` event.
      - The healer's status flips are usually open→closed file moves on Done / Cancelled cards — terminal states. Append the history entry BEFORE the file move so the closed/ YAML carries it.
