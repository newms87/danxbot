title: "[Dashboard] Card history > Phase 4: Dashboard History tab — `HistoryTab.vue`, actor pills, relative timestamps, from→to diff, empty-state"
description: |-
  ## Goal

  Add a "History" tab to the issue drawer that renders the `history[]` audit log every prior phase populates. Operators get a one-click view of every status / blocked transition with attribution, replacing the current "grep worker logs + open Trello audit trail" workflow.

  Parent epic: `DX-138`. Depends on `DX-145` (Phase 1: schema), `DX-146` (Phase 2: dispatch-driven appends), `DX-147` (Phase 3: auto-mutation appends).

  ## Backend type extension

  `IssueDetail` (the dashboard API DTO — typically in `src/dashboard/types.ts` or `src/dashboard/issues-route.ts`) must include `history: IssueHistoryEntry[]`. The serializer currently passes through every field from the parsed YAML; verify the `history` list lands on the API response (no extra mapping required if the DTO is `Pick<Issue, ...>`-style; otherwise add the field).

  `dashboard/src/types.ts` re-exports backend types — verify `history` flows into the SPA's `IssueDetail` as `IssueHistoryEntry[]`.

  ## Tab strip wiring

  `dashboard/src/components/issues/IssueDetailView.vue`:

  - Extend `TabId` union: add `"history"`.
  - Extend `VALID_TABS` array.
  - Add `{ id: "history", label: "History" + (issue.history.length > 0 ? ` · ${issue.history.length}` : "") , disabled: false }` to the `tabs` computed. Position: after `comments`, before `retro` (matches semantic ordering — history is "what happened to this card", retro is "what we learned").
  - The tab is NEVER disabled. Empty-history cards still show the tab — clicking it lands on the empty-state message (operators learn the tab exists this way).
  - Wire the conditional render: `<HistoryTab v-else-if="tab === 'history'" :issue="issue" />`.

  ## `HistoryTab.vue`

  New component at `dashboard/src/components/issues/HistoryTab.vue`. Per CLAUDE.md UI exemption, no test required (type-check via `vue-tsc --noEmit` is required).

  Render contract:

  - **Empty state** — when `issue.history.length === 0`, show: `No history recorded — card predates the history schema (or was created before this feature shipped).` Use the same muted-text pattern that `RetroTab.vue` / `CommentsTab.vue` use for empty states.
  - **Reverse chronological** — newest entry at the top. Sort by `timestamp` descending; do not mutate the source array.
  - **Per-entry layout** — vertical timeline. Each row:
    - **Event icon** — `⇄` for `status_change`, `⛔` for `blocked`, `✅` for `unblocked`, `＋` for `created`. Inline at the row's leading edge.
    - **Relative timestamp** — "2 minutes ago", "yesterday at 4:13 PM", "3 days ago". Tooltip = full ISO. Use a small `formatRelativeTime` helper (likely already exists in `dashboard/src/composables/`; reuse if so, else add a minimal one — `Intl.RelativeTimeFormat` is fine).
    - **Actor pill** — bordered chip styled per actor source:
      - `dispatch:<uuid>` → blue pill, label `dispatch:<uuid-first-8>`. Click → navigate to the dispatch detail view (`/dispatches/<uuid>`); reuse the existing dispatch-detail link pattern.
      - `dashboard:<username>` → green pill with username (no avatar required for v1; the description's avatar mention is aspirational).
      - `worker:<reason>` → gray pill with robot icon (use `🤖` or an inline SVG; pick a small reusable approach) and the `<reason>` text.
      - `tracker:trello` → indigo pill with `Trello` text (no logo image required).
      - `setup` → yellow pill with `setup` text.
      - `unknown` → red pill — these are signal of a missing actor; make them visually loud.
    - **From → To diff** — for `status_change`, render `<from-status-badge> → <to-status-badge>` using existing `StatusBadge.vue`. For `blocked` / `unblocked` / `created`, render only `to`.
    - **Note** — when `entry.note` is present, render below as a one-line muted string.
  - **Layout** — same scroll container pattern as `CommentsTab.vue` (vertical list, fixed-height container, scrollable). Match the existing dark-theme palette (`#0b1220` body, `#94a3b8` muted text, `#1e293b` borders).
  - **Accessibility** — actor pills use `role="link"` only when clickable; non-clickable pills are plain `<span>`.

  ## Files

  - `src/dashboard/types.ts` (or wherever `IssueDetail` is defined) — extend with `history: IssueHistoryEntry[]`. Verify the API serializer passes it through.
  - `dashboard/src/types.ts` — extend the SPA-side `IssueDetail` and re-export `IssueHistoryEntry`.
  - `dashboard/src/components/issues/IssueDetailView.vue` — extend `TabId`, `VALID_TABS`, the `tabs` computed, and the conditional render.
  - `dashboard/src/components/issues/HistoryTab.vue` (new) — the rendering component.

  ## Verification (no automated test on the SFC per CLAUDE.md exemption)

  1. `npx tsc --noEmit` — backend types compile (the `history` field reaches `IssueDetail`).
  2. `cd dashboard && npx vue-tsc --noEmit` — SFC types compile.
  3. `npx vitest run` — full backend suite green; total backend test count is the sum of P1 + P2 + P3 + any pre-existing tests, and no regressions.
  4. Manual smoke (AC #12 of the parent epic):
     - Start dev stack (`docker compose up -d`).
     - Create a card via the Issues UI; observe `created` entry appears.
     - Dispatch the card via `/danx-next`; observe `status_change` (ToDo → In Progress) entry appears in the History tab as the worker's runSync runs.
     - Move it to Done via the dispatched agent; observe a second `status_change` (In Progress → Done) entry.
     - Verify all three actor pills render correctly (`tracker:trello` for created via Trello hydrate path OR `dispatch:<uuid>` for dispatch-driven create, depending on which create path the smoke uses).
     - Verify empty-history legacy card shows the empty-state message.

  ## Acceptance

  - `IssueDetail` API DTO and the SPA-side type both carry `history: IssueHistoryEntry[]`.
  - `HistoryTab.vue` exists and renders the contract above.
  - "History" tab appears in `IssueDetailView.vue`'s tab strip with the entry count when > 0.
  - Each entry renders with: event icon, relative timestamp (tooltip = full ISO), actor pill (styled per source), from→to status badges for `status_change` / single `to` for the others, optional note line.
  - Empty-history cards show the empty-state message.
  - `dispatch:<uuid>` actor pills are clickable links to the dispatch detail view.
  - `unknown` actor pills are visually loud (red) so missing-actor situations are obvious.
  - AC #11 (final): all 26 backend tests across P1 + P2 + P3 pass; `npx tsc --noEmit` clean; `cd dashboard && npx vue-tsc --noEmit` clean; no existing tests regressed.
  - AC #12 (manual smoke): create → dispatch → ToDo → In Progress → Done shows three correctly-attributed entries in the History tab.

  ## Out of scope

  - Filtering / searching history entries within the tab — list view only for v1.
  - Pushing history to Trello — Trello has its own audit trail; YAML history is the canonical local record.
  - Rendering history for `description` / `ac[]` / `comments[]` / `retro` edits — only status + blocked + create are tracked in this feature; richer audit is a separate, larger initiative.
  - Avatar imagery for `dashboard:<username>` actors — text-only username pill is sufficient for v1.
