      <!-- danxbot -->

      ## Notes from Phase 3 (DX-147)

      Phase 3 commit: `be94d96`. The four non-dispatch worker / poller / tracker write-paths now populate `Issue.history[]`. AC #5 + AC #6 of the parent epic are now mechanically achievable. Full handoff with implementation details + per-write-path actor table is on the parent epic `DX-138` under "Phase 3 Handoff (DX-147 → DX-148)".

      ### What you can rely on for Phase 4 rendering

      | Source field | Possible actor values you'll render |
      |---|---|
      | runSync save (dispatch-driven) | `dispatch:<uuid>` — Phase 2 (DX-146) |
      | createIssue (dispatch-driven) | `dispatch:<uuid>` — Phase 2 (DX-146) |
      | epic-status auto-derive | `worker:auto-derive` |
      | blocked auto-clear | `worker:auto-derive` |
      | heal closed → open inverse | `worker:heal` |
      | Trello / MemoryTracker first hydrate | `tracker:trello` / `tracker:memory` (dynamic — `tracker:${issue.tracker}`) |

      The setup skill seeded path uses `setup` (bare). Operator dashboard writes use `dashboard:<username>`. Unknown-actor fallback is `unknown` (used by Phase 2 when dispatchId is empty + a system_errors event fires).

      ### Specific Phase 4 things to confirm

      - The `event` enum is `created | status_change | blocked | unblocked` — exactly four values. Your icon/style mapping should be exhaustive.
      - `from` is REQUIRED on `status_change` (parse-time + append-time both enforce). It's OPTIONAL on `blocked` / `unblocked` / `created`. Render the from→to chip only for `status_change`; render single `to` for the others (per your description).
      - `note` is optional, capped at 200 chars (truncated with `…` ellipsis on append). Render verbatim — don't re-truncate, don't escape, don't markdown-render.
      - History rolling cap: 1000 entries. Real cards never get close. Don't worry about virtualization for v1.

      ### Heuristics worth surfacing in the UI prose (or punting to a future card)

      - `worker:heal` `status_change` entries' `from` field is inferred via "most recent terminal in history → fall back to `Done`". For Phase 4 v1, render the `note` ("Healer moved closed → open to match status") verbatim and don't try to distinguish inferred-from-history vs default-`Done`. A future card can extend the entry shape with an explicit `inferred: true` flag if operators ask.
      - Action-item cards (Action Items list) hydrate via the same `tracker:trello` `created` path — operators will see those entries too.

      ### Mid-session incident worth knowing

      DX-201 (commit `9828791`) wired `injectDanxIssueMcp` into the poller's `syncRepoFiles`. That helper uses `node:fs#renameSync` which the integration test `src/__tests__/integration/poller-memory-tracker.test.ts` mocked without. I added `renameSync: vi.fn()` to that mock during the gap-fix pass. If you add new code paths into the poller's `_poll` or `syncRepoFiles` that touch fresh node:fs APIs, audit that integration test's `vi.mock("node:fs", ...)` factory at the same time — it's the single most-mocked module and the one most likely to bite next.
