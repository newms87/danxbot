      ## Phase 8 Commit

      **Commit:** `372f6c0` (bundled with DX-99 prefix-migration fix and `scripts/sync-yamls-to-tracker.ts` from a parallel session — DX-149 changes are nonetheless complete and in HEAD).

      **Verified:**
      - `_poll` body wrapped in single top-level try/catch; tracker throw → log + clean return; `state.polling` reset preserved in `poll()`'s `finally`.
      - 5 new DX-149 tests + 1 backoff-invariant test + 1 deeper-throw-path test (`healLocalYamls` mockImplementationOnce → throw) all pass.
      - 5 existing fail-loud tests in `index.test.ts` rewritten to assert log-and-swallow; 1 in `__tests__/integration/poller-memory-tracker.test.ts` rewritten same way.
      - Full suite: `npx vitest run` → 3290/3290 pass. `npx tsc --noEmit` → clean.
      - Manual smoke: `make launch-worker-host REPO=gpt-manager` against the real `mem-2` SG-106 YAML → worker booted, hit the 400, logged `[gpt-manager] _poll crashed — tick aborted, next tick will retry: Trello API error: 400 Bad Request (GET /cards/mem-2/actions)`, stayed alive, ready for next tick.

      **Accepted trade-off (logged in retro):** top-level catch necessarily swallows non-tracker throws too — `syncRepoFiles` rmSync EACCES, corrupt-YAML hydration, hydrate-from-remote 401, credentials-missing guard. Five existing fail-loud tests had to be retired and rewritten. Card spec accepted this; revisit if any of those failure modes surface as silently-stuck cards.

      **`recordError` deferral:** card said `log + recordError + return` but no poller-internal `recordError` exists yet. Implementation logs only. Wire to dashboard `system_errors` SSE channel when DX-134 (Phase 4) lands.
