title: "[Trello decouple > Phase 8] _poll crash isolation — top-level try/catch + skip-and-continue"
description: |-
  ## Context

  Worker crashed booting `gpt-manager` on May 8 2026:

  ```
  Error: Trello API error: 400 Bad Request (GET /cards/mem-2/actions)
      at TrelloTracker.requestJson (src/issue-tracker/trello.ts:668:13)
      at async TrelloTracker.getComments (src/issue-tracker/trello.ts:370:21)
      at async tryAcquireLock (src/issue-tracker/lock.ts:220:20)
      at async _poll (src/poller/index.ts:807:22)
      at async poll (src/poller/index.ts:492:5)
  Node.js v22.18.0
  make: *** [Makefile:188: launch-worker-host] Error 1
  ```

  Local YAML `gpt-manager/.danxbot/issues/open/SG-106.yml` carries `external_id: mem-2` — a leftover `MemoryTracker`-minted id (`src/issue-tracker/memory.ts:161` mints `mem-${nextExternalId++}`). Repo was later switched to Trello tracker; Trello rejects `mem-2` as invalid card id. Crash brings down the WHOLE worker process — Slack listener, dispatch API, dashboard SSE, the lot. One bad YAML → entire repo offline.

  This is the same crash class as DX-130 epic context describes, but the existing phases (DX-131 `runSync` split, DX-132 retry queue, DX-134 dashboard surface) all scope to OUTBOUND tracker push from `runSync`. None wrap `_poll`'s INBOUND tracker calls. Specifically:

  - `src/poller/index.ts:552` — `tracker.fetchOpenCards()` HAS its own try/catch → returns early on failure ✓
  - `src/poller/index.ts:807` — `tryAcquireLock` (calls `tracker.getComments`) does NOT → throws to top ✗
  - Other unprotected tracker calls in `_poll` between line 557 and 877 (orphan push, parent-changes, hydrateFromRemote, `evictDeadDispatches`'s sub-paths, etc.)

  ## Solution

  Wrap the body of `_poll` in a top-level try/catch. On throw:

  1. Log the error with repo name + a stable diagnostic prefix.
  2. Call `recordError` (same dashboard surface DX-131 / DX-134 wire up) with the error message + `external_id` if known.
  3. Return cleanly — process stays alive, tick ends, next tick (~60s later) tries again.

  Independent of DX-131 / DX-132 / DX-134. Strictly defensive — no behavior change on the happy path.

  ### Why top-level vs per-call

  Per-call try/catches around every `tracker.*` invocation in `_poll` mean ~6 catch blocks, each duplicating "log + recordError + return-or-continue" boilerplate. Top-level catch is one block, covers every current AND future tracker call inside `_poll`. The `_poll` body is already a single linear flow — there's no scope where partial completion is meaningfully recoverable inside the function (the next tick re-runs the whole thing idempotently).

  ### Scope for this phase

  ONLY `_poll`. Sibling functions called from outside the poller (`checkNeedsHelp`, `bulkSyncMissingYamls`, `resolveBlockedCards`, etc.) already either swallow per-iteration errors locally or are wrapped at their own callsite. Don't widen scope here — DX-130's other phases own the rest.

  ## Files

  - `src/poller/index.ts` — wrap `_poll` body in try/catch
  - `src/poller/index.test.ts` (or new `src/poller/poll-crash-isolation.test.ts`) — failing test first

  ## Test plan (TDD)

  Failing tests first. Each passes a mock tracker into `_poll` (or `poll`) and asserts the worker survives.

  1. Tracker `getComments` throws inside `tryAcquireLock` → `_poll` returns cleanly, no rethrow, no process exit. Subsequent `poll()` call works (state.polling reset).
  2. Tracker `fetchOpenCards` throws → already protected; assert no regression (existing behavior preserved — early return + no recordError-via-top-catch double-fire).
  3. Hydrate-or-load path throws (`hydrateFromRemote` fails) → caught, no rethrow.
  4. `recordError` is called with the error message + repo name + (if available) the `external_id` of the card that triggered the throw.
  5. Happy path unchanged — when nothing throws, top-level catch is never invoked, no observable behavior change (existing tests still pass).

  ## Acceptance

  - `_poll` body is wrapped in a single top-level try/catch.
  - Tracker call throwing inside `_poll` no longer kills the worker process — tick ends, log + `recordError` fire, next tick proceeds.
  - All 5 tests pass.
  - `gpt-manager` worker boots and survives one full tick against the existing `SG-106` `external_id: mem-2` YAML (manual smoke).
  - `npx tsc --noEmit` clean. No existing poller tests regressed.

  ## Out of scope

  - Healing the bogus `external_id` itself — that's DX-150 (Phase 9).
  - Per-call try/catches inside helpers called from `_poll` — top-level catch is the contract.
  - Backoff / consecutive-failure tracking changes — leave existing `state.consecutiveFailures` bookkeeping alone.
  - Dashboard surface for the new error path — DX-134 (Phase 4) covers the SSE channel + UI banner.
