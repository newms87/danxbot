title: "[Trello decouple > Phase 9] external_id format heal â€” auto-recover MemoryTrackerâ†’Trello swaps"
description: |-
  ## Context

  Two YAMLs in `gpt-manager` carry stale `MemoryTracker`-minted external_ids:

  - `gpt-manager/.danxbot/issues/closed/SG-105.yml` â†’ `external_id: mem-1`
  - `gpt-manager/.danxbot/issues/open/SG-106.yml` â†’ `external_id: mem-2`

  Source: `src/issue-tracker/memory.ts:161` mints `mem-${nextExternalId++}` for every card created while the tracker is `MemoryTracker`. When the operator later switches the tracker to Trello (config edit), those `mem-N` ids become invalid against the new tracker. Every tracker call against them errors (Trello: 400; other future trackers may differ). DX-149 (Phase 8) prevents the error from crashing the worker; this phase prevents the error from happening at all by healing the YAML.

  Observed format mismatch:

  - Trello card ids = 24-char hex (e.g. `69fd1486208523401e60afcb`)
  - MemoryTracker ids = `mem-N` (e.g. `mem-1`, `mem-42`)
  - No future-tracker scheme defined; healer should be schema-aware via `tracker.isValidExternalId(id)` (new method on the `IssueTracker` interface).

  ## Solution

  Add a healing pass to the poller that runs after `healLocalYamls` (DX-133) and before any tracker call. For every YAML in `open/` AND `closed/`:

  1. Skip if `external_id === ""` (orphan â€” `syncIssue` already handles).
  2. Call `tracker.isValidExternalId(external_id)`. New method per tracker:
     - `TrelloTracker`: returns `true` for 24-char `[0-9a-f]{24}` strings.
     - `MemoryTracker`: returns `true` for `^mem-\d+$`.
  3. Invalid â†’ blank the `external_id` field, append a `comments[]` entry titled `## Tracker swap â€” external_id healed` with the old id + reason, leave file location unchanged. The card now looks like an orphan to the next tick's sync pass; `syncIssue` calls `tracker.createCard` and mints a fresh real id.
  4. Log the heal: `[<repo>] Healed external_id mismatch on <id>: <old> â†’ "" (tracker.isValidExternalId rejected)`.

  Idempotent: a card whose `external_id` is already valid OR already empty is a no-op. Pass runs every tick â€” cheap (just a regex check per YAML, no tracker call).

  ### Why a tracker-method instead of a static regex map

  The tracker already abstracts the "what's my id format" concept. A static `EXTERNAL_ID_PATTERNS` map duplicates that knowledge in two places and rots when a new tracker lands. Tracker owns its id format â†’ tracker validates.

  ### Why blank instead of delete-card-or-create-elsewhere

  Blanking + re-orphaning is the existing well-tested path. `syncIssue` already creates cards for orphans, the next tick repaints all fields (status, AC, comments, retro), and the YAML's content is preserved. The closed-status pre-existing comment gives humans an audit trail.

  ## Files

  - `src/issue-tracker/interface.ts` â€” add `isValidExternalId(id: string): boolean` to `IssueTracker`
  - `src/issue-tracker/trello.ts` â€” implement (24-hex regex)
  - `src/issue-tracker/memory.ts` â€” implement (`/^mem-\d+$/`)
  - `src/poller/heal-external-id.ts` (new) â€” pure function `healExternalIds(repoLocalPath, tracker)` returning `{healed: Array<{id, oldExternalId}>, errors[]}`
  - `src/poller/heal-external-id.test.ts` (new) â€” TDD
  - `src/poller/index.ts` â€” call `healExternalIds` after `healLocalYamls` and before `tracker.fetchOpenCards`

  ## Test plan (TDD)

  1. YAML with `external_id: "mem-2"` + `TrelloTracker` â†’ blanked, comment appended, log emitted.
  2. YAML with `external_id: "69fd1486208523401e60afcb"` + `TrelloTracker` â†’ no change (idempotent).
  3. YAML with `external_id: "mem-2"` + `MemoryTracker` â†’ no change (valid for memory).
  4. YAML with `external_id: ""` â†’ no change (orphan, skip).
  5. Mixed dir (3 valid + 1 invalid) â†’ only invalid one healed; healed list returned with one entry.
  6. Both `open/` and `closed/` directories scanned.
  7. Unparseable YAML in dir â†’ `errors[]` populated, other YAMLs still healed.
  8. After heal, next tick's `syncIssue` flow against the orphaned YAML calls `tracker.createCard` (integration test with fake tracker).

  ## Acceptance

  - `IssueTracker.isValidExternalId(id)` exists on interface, implemented by Trello + Memory trackers.
  - `healExternalIds` blanks invalid external_ids, appends audit comment, logs.
  - Pass runs every tick BEFORE any tracker call.
  - 8 new tests pass; existing tests not regressed.
  - Manual smoke: drop the existing `mem-1` / `mem-2` YAMLs in `gpt-manager` â†’ after one tick, both YAMLs have `external_id: ""` and a heal comment; after second tick, both have fresh Trello-minted external_ids and Trello cards exist.
  - `tsc --noEmit` clean.

  ## Out of scope

  - Pruning closed/ YAMLs that no longer correspond to any real card (separate concern).
  - Cross-tracker migration of card history (comments, retro on the old tracker are gone â€” accepted loss).
  - Detecting tracker swaps proactively (config-watch) â€” purely reactive heal on YAML scan is enough.
