      Code is implemented + committed + pushed. ACs #1, #2, #3, #4, #6 all verified by automated tests in this dispatch. **AC #5 (manual smoke against gpt-manager production)** requires operator action that this dispatched agent cannot perform.

      **What's done:**

      - Commit `675de2a` on `main` ([Danxbot] DX-150 Phase 9: external_id format heal).
      - 21 new tests; 3385 backend tests pass; `tsc --noEmit` and `vue-tsc --noEmit` clean.
      - Reviewer findings addressed (M2 JSDoc accuracy + L6 constant extraction).

      **What's still needed (operator action):**

      1. **Deploy to gpt:** `make deploy TARGET=gpt`
      2. **Wait for the next gpt-manager poller tick** (~60s after restart) and check the worker logs for:

         ```text
         [gpt-manager] Healed external_id mismatch on SG-106: mem-2 â†’ "" (tracker.isValidExternalId rejected)
         [gpt-manager] Healed external_id mismatch on SG-105: mem-1 â†’ "" (tracker.isValidExternalId rejected)
         ```

      3. **Verify the YAMLs on disk** at the deployed `gpt-manager` repo:

         ```bash
         # On the gpt EC2 instance, inside the worker container:
         docker exec danxbot-worker-gpt-manager grep -E '^external_id:' \
           /danxbot/repos/gpt-manager/.danxbot/issues/open/SG-106.yml \
           /danxbot/repos/gpt-manager/.danxbot/issues/closed/SG-105.yml
         # Expected after tick 1: both lines show `external_id: ""` (open SG-106)
         # or `external_id: ""` (closed SG-105). Audit comment present in
         # `comments:` block titled `## Tracker swap â€” external_id healed`.
         ```

      4. **Wait for the next tick** (or the same tick â€” `pushOrphans` runs later in the same `_poll` invocation, so AC #5's "next tick" wording was an over-cautious estimate; recovery is single-tick by design). Verify SG-106's `external_id` is now a 24-char Trello id (not empty, not `mem-2`):

         ```bash
         docker exec danxbot-worker-gpt-manager grep '^external_id:' \
           /danxbot/repos/gpt-manager/.danxbot/issues/open/SG-106.yml
         # Expected: external_id: <24-char hex Trello id>
         ```

         **Note:** SG-105 stays in `closed/` with `external_id: ""` permanently â€” the existing `pushOrphans` contract intentionally skips closed/ orphans (resurrecting Done cards as fresh tracker cards = bad UX). That is by design; don't flag it as a regression.

      5. **Verify no more 400s** â€” the `[gpt-manager] _poll crashed â€” tick aborted... Trello API error: 400 Bad Request (GET /cards/mem-2/actions)` log line should stop appearing after tick 2 (the previous primary YAML now points to a real Trello card).

      **Why this needs human/host help:** Production deploy + container restart + log inspection on the gpt EC2 instance. Dispatched agents cannot run `make deploy` or `docker exec` against production from within the worker container.

