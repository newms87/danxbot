      ## Code Review

      `code-reviewer` flagged one MUST-FIX (M2 â€” JSDoc accuracy) plus several judgment calls. Addressed M2 + L6; explicitly skipped the rest.

      ### Fixed

      **M2 (blocker) â€” JSDoc claimed "next tick" but heal â†’ `pushOrphans` is single-tick.** `_poll` calls `healExternalIds` at line 567 then `pushOrphans` at line 666 in the SAME `_poll` invocation. Fixed the heal-external-id.ts header to say "later in the same `_poll` tick" and explain the single-tick recovery semantics. (The original card description carried the same `next tick` mistake â€” left as-is in the historic comment thread; the fixed JSDoc is the new authoritative source.)

      **L6 â€” extracted `MEMORY_EXTERNAL_ID_PREFIX` constant.** The mint format in `MemoryTracker.createCard` (`mem-${nextExternalId++}`) and the regex in `isValidExternalId` (`^mem-\\d+$`) now both go through the same `MEMORY_EXTERNAL_ID_PREFIX = "mem-"` constant. Drift between mint + validator would self-heal every freshly-minted card on the next poll tick â€” this guarantees they stay locked.

      ### Skipped (judgment calls)

      - **L9 â€” append a `worker:heal` history entry.** The `IssueHistoryEvent` enum doesn't include a `tracker_swap` value yet (DX-138 owns the broader history-write paths). The audit comment IS the audit trail today; wiring the heal pass into `history[]` is correct follow-up work for DX-138 but not in scope here.
      - **L8 / N2 â€” minor stylistic nits.** Skipped per reviewer's "skip if you prefer".
      - **`HealExternalIdResult` â†’ `HealExternalIdReport` rename.** Skipped â€” current shape matches `HealResult` from `healLocalYamls` (the precedent helper), and consistency with the sibling pattern beats the marginal naming clarity gain.

      ### Other findings

      - **Closed-dir-skip in `pushOrphans`** â€” flagged by reviewer as "the OTHER silent fallback" but the rationale (resurrecting Done cards as fresh tracker cards = bad UX) is documented in the heal-external-id.ts header and the existing `pushOrphans` JSDoc. No change.
      - **Premature-abstraction guard for `forEachIssueYaml`** â€” explicitly punted per reviewer recommendation; rule-of-three not yet hit.
