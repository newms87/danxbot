      Two YAMLs in `<gpt-manager>/.danxbot/issues/`:
      - `closed/SG-105.yml` â†’ `external_id: mem-1`
      - `open/SG-106.yml` â†’ `external_id: mem-2`

      Both are leftover from a `MemoryTracker` window before the repo's Trello config landed. `MemoryTracker` mints `mem-${nextExternalId++}` (`src/issue-tracker/memory.ts:161`). The healer must blank these so `syncIssue`'s existing orphan-create path mints fresh real Trello ids on the next tick.

      ### Where DX-149 leaves things for the impl

