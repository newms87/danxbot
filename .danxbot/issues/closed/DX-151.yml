    timestamp: 2026-05-08T23:15:00Z
    text: |
      ## Phase 1 shipped (DX-152 Done)

      **Scope expansion notice for next agent:** DX-163 was carded as
      Phase 1.1 only (foundation: compose service, pg deps,
      `connection.ts`, `migrate.ts`, foundation tests). Per operator
      override "ALL PROBLEMS ARE IN SCOPE — get this fully functional",
      Phase 1.2 (re-author 15 migrations), Phase 1.3 (port consumer
      modules), and Phase 1.4 (drop mysql) all shipped under the same
      commit (`1ad6504`) so the build never had a half-migrated state.
      DX-165/166/167 closed retroactively pointing at the DX-163 commit.

      **Local stack now functional on Postgres.** Production (`gpt`
      target) still on MySQL until `make deploy TARGET=gpt` runs —
      deliberately deferred for local soak.

      **Phase 2+ picker, start here:**

      - `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md` —
        full design doc (read first)
      - DX-153 Phase 2 — issues + issue_history schema (DDL only, no
        consumers yet). New migration 016+ via the PG runner.
      - DX-154 Phase 3 — chokidar watcher + boot scan + reconcile +
        read-your-writes ack + CRITICAL_FAILURE on DB-write fail
      - DX-155 Phase 4 — migrate poller readers (`local-issues.ts`,
        `yaml-lifecycle.ts`, `epic-status.ts`, triage queries) to SQL
      - DX-156 Phase 5 — migrate dashboard + MCP readers to SQL
      - DX-157 Phase 6 — retire `danx_issue_save` MCP tool + final
        `make test-system` + `make deploy-smoke TARGET=gpt`

      **Watch-outs the next agent should know:**

      - `pg.types.setTypeParser(20, parseInt)` in `connection.ts` —
        BIGINT (oid 20) coerced to JS number. Don't undo.
      - `set_updated_at()` PL/pgSQL trigger function in migration 001
        — every table with `updated_at` attaches a BEFORE UPDATE
        trigger calling it. New tables in DX-153 should follow the
        same pattern (or omit `updated_at` if not needed).
      - `query<T>(sql, params)` returns `T[]` directly (rows already
        unwrapped from `result.rows`). `getPool().query(...)` returns
        the full pg result object when you need `rowCount`.
      - `withTx(fn)` wraps BEGIN/COMMIT/ROLLBACK + release. Each
        migration runs inside withTx so a half-applied version never
        gets recorded in `schema_migrations`.
      - Reserved words double-quoted: "trigger", "status", "error",
        "user", "text". Backticks are MySQL — never use them.
      - `ON CONFLICT (col) DO UPDATE SET col = EXCLUDED.col` replaces
        `ON DUPLICATE KEY UPDATE`.
      - `LIMIT $N OFFSET $M` — not `LIMIT ?, ?`.
      - SQLSTATE 23505 → `DbError.code === "duplicate_entry"`.
      - `INSERT … RETURNING id` for surrogate-id capture (no
        `LAST_INSERT_ID()` / `insertId`).
      - Migration-syntax-snapshot tests (002, 004, 011, 015) were
        deleted as redundant. Don't reintroduce them. Schema is
        verified end-to-end via integration tests against real PG.
