  good: |
    - **Six phases shipped sequentially** (DX-152 → DX-157) over ~6h on
      2026-05-08/09. Each phase landed its own commit:
      - DX-152 Phase 1: Postgres swap (15 migrations + every DB module)
      - DX-153 Phase 2: `issues` + `issue_history` schema
      - DX-154 Phase 3: chokidar watcher + writer + boot scan + reconcile + read-your-writes
      - DX-155 Phase 4: poller readers migrate to DB queries
      - DX-156 Phase 5: dashboard endpoints + danx-issue MCP query tools migrate to DB
      - DX-157 Phase 6: retire `danx_issue_save` MCP tool + helper route
    - **DB mirror operational.** Boot scan populated 181 issue rows for
      the danxbot repo on first restart with the watcher code; chokidar
      catches every YAML edit; agents continue reading YAMLs unchanged.
    - **Architectural boundary preserved.** Trello stayed background
      infrastructure throughout. Agent path (read YAML → edit YAML →
      save YAML) never depended on Trello at any phase.
  bad: |
    - **Phase 6 agent mis-classified deploy as a completion gate** and
      moved itself to Blocked. Operator manually closed and updated
      `danx-next/SKILL.md` + `danx-no-launch-worker.md` to clarify:
      deploy is operations, not a verification gate. Local
      `make test-system` covers the same surface.
    - **Worker restart was needed mid-epic** to load DX-154's chokidar
      module — host worker had been running pre-DX-154 code. Boot scan
      then populated the DB. Caught only because operator probed
      `/api/issues` and saw `[]`.
    - **chokidar dep didn't ship with the dashboard container image.**
      DX-154 added the dep to package.json but the running dashboard
      image was baked before that. `docker exec npm install chokidar`
      unblocked the dev proxy; permanent fix lands on next `make build`.
