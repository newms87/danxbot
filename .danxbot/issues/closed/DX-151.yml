title: "[Issues > DB Mirror] Postgres-backed mirror of issue YAMLs (file-authoritative)"
description: |-
  ## Context

  Today every consumer that needs to look at an issue (`<repo>/.danxbot/issues/{open,closed}/*.yml`) does it by globbing the directory, reading each file, parsing the YAML, and filtering in memory. This pattern lives in `src/poller/local-issues.ts`, `src/poller/yaml-lifecycle.ts` (`loadLocal`, `findByExternalId`), `src/poller/epic-status.ts`, the dashboard's issue-listing endpoints, and the `danx-issue` MCP query tools. It works at today's volume but: it is O(n) per call, it cannot answer cross-card queries cheaply, it cannot be sorted server-side, it cannot be indexed, and it makes the upcoming multi-worker dispatch epic impossible (agent-busy lookups need an index, not a directory walk).

  This epic introduces a Postgres mirror of the YAMLs. Filesystem stays the source of truth — if the DB is wiped, a boot scan rebuilds it from disk. Every YAML change cascades into the DB through a single chokidar watcher; every internal Node reader switches to SQL queries with proper indexes. Agents continue to read YAMLs directly through `Glob` / `Read` / `Edit` / `Write` — their workflow does not change.

  Full design: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md` (commit `53864c3`). Read that BEFORE picking up any phase.

  ## Architecture (one screen)

  ```
  writeIssue(repoLocalPath, issue) ──► YAML on disk ──┐
  agent Edit/Write tool       ───────► YAML on disk ──┤
  operator hand-edit          ───────► YAML on disk ──┤
                                                      │
                              chokidar watcher (per repo, on open/+closed/)
                                                      │
                                                      ▼
                          parse + hash + RFC 6902 patch vs prev
                                                      │
                                                      ▼
                            UPSERT issues  +  INSERT issue_history
                                                      │
                                                      ▼
                                       Postgres `issues` / `issue_history`
                                                      ▲
                  internal Node readers (poller, dashboard, MCP) ──── SQL ────┘
                  agents continue reading YAMLs directly (unchanged)
  ```

  ## Phases

  Each phase is its own card and ships its own commits. Phases run sequentially — DX-153..DX-157 each carry `blocked.by = [previous phase]` so the poller dispatches them one at a time. Adjust if a phase's preconditions change.

  | Card | Phase | Scope |
  |---|---|---|
  | DX-152 | 1: Postgres infra swap | Replace `danxbot-mysql` with `danxbot-postgres`; install `pg`; rewrite `src/db/migrate.ts`; rewrite all 15 existing migrations as PG-syntax (no data migrated); rewrite every DB-touching module (`users-db`, `threads-db`, `auth-db`, `dispatches-db`, `events`, `worker-restarts-db`); update local + prod compose; verify `make test` + `make launch-infra` + `make create-user` work end-to-end. |
  | DX-153 | 2: `issues` + `issue_history` schema | New migration creating both tables per spec (17 generated columns on `issues`, RFC 6902 patch jsonb on `issue_history`). No code consumes the tables yet. |
  | DX-154 | 3: Watcher + writer + boot scan + reconcile | New `src/db/issues-mirror.ts`. Chokidar on `open/`+`closed/`. Boot scan on worker start. 10-minute periodic reconcile on `open/` only. Read-your-writes resolution: `writeIssue()` awaits an in-process ack from the watcher before returning. DB-write failure writes `<repo>/.danxbot/CRITICAL_FAILURE` (existing flag). |
  | DX-155 | 4: Migrate poller readers to DB | `src/poller/local-issues.ts` (`listDispatchableYamls`, `listInProgressYamls`, `listTriageDueYamls`, `listBlockedTodoYamls`), `src/poller/yaml-lifecycle.ts` (`loadLocal`, `findByExternalId`), `src/poller/epic-status.ts`, triage queries. Each helper rewritten as SQL preserving its existing return shape; YAML-walk code deleted as each helper migrates. |
  | DX-156 | 5: Migrate dashboard + MCP readers to DB | Every issue-listing / filtering endpoint in `src/dashboard/server.ts`. The `danx-issue` MCP server's `danx_issue_get` / `danx_issue_list` handlers move to SQL (still return Issue / IssueRef shapes). |
  | DX-157 | 6: Retire `danx_issue_save` MCP + validation | Drop the `/api/issue-save/:id` worker route, drop the MCP server entry, drop `DANXBOT_ISSUE_SAVE_URL` injection, update every workspace skill that used it (replace with `Edit` / `Write` of the YAML). Full `make test` + `make test-system` pass. `make deploy-smoke TARGET=gpt`. |

  ## Locked decisions (from brainstorm 2026-05-08)

  - **Postgres only.** MySQL container + client + driver removed. No data migrated; `make create-user` re-seeds users.
  - **Filesystem authoritative.** DB is a derived projection; boot scan rebuilds it from disk.
  - **Watcher is the canonical write path.** External edits (operator hand-edit, git pull) reach the DB through the same code as internal `writeIssue()` calls.
  - **`danx_issue_create` stays.** Atomic ISS-N allocation requires server-side coordination.
  - **`danx_issue_save` is retired** in Phase 6.
  - **Outbound tracker push stays in poller's per-tick mirror.** No change to Trello sync mechanism.
  - **History format = RFC 6902 JSON Patch ops in jsonb.** Every change recorded; no transient-field filter; no same-second coalescing.
  - **DB write failure ≠ crash.** Writes the existing `CRITICAL_FAILURE` flag → poller halts, dashboard banner, in-flight dispatches finish.
  - **Single `issues` table, `repo_name` column.** Composite `(repo_name, id)` PK. Indexes per spec.

  ## Open details (resolved during phase-writing, not before)

  - Tombstone delete vs cascade — does deleting an `issues` row preserve its `issue_history`? Phase 3 picks. Default: drop FK, history rows live independently.
  - `danx_issue_create` ID allocation strategy. Phase 6 (or Phase 2 if we touch the create path then) picks. Default: PG sequence per `repo_name` (one-row counter table with `SELECT ... FOR UPDATE`).
  - Chokidar debounce. Phase 3 picks. Default: chokidar `awaitWriteFinish: { stabilityThreshold: 100, pollInterval: 50 }`.
  - Watcher test strategy. Phase 3 picks. Default: real chokidar in integration tests, exposed `simulateWatcherEvent()` for unit tests.

  ## Acceptance (epic-level — verified after Phase 6)

  - All MySQL infrastructure removed (`danxbot-mysql` service, `mysql2` package, `mysql` client invocations).
  - `danxbot-postgres` running locally (`make launch-infra`) and in deployed targets.
  - Every existing DB-backed feature still works: dashboard auth, `make create-user`, dispatches table populated, events / analytics, slack threads, worker-restarts.
  - `<repo>/.danxbot/issues/{open,closed}/*.yml` mirrored into `issues` table with full history in `issue_history`.
  - All internal Node readers query the DB; YAML-scan code paths deleted.
  - `danx_issue_save` MCP tool removed from the danxbot MCP server; no callsite still invokes it.
  - Reading a YAML and immediately querying the DB in the same Node tick returns the new state (read-your-writes).
  - `make test`, `make test-system`, `make deploy-smoke TARGET=gpt` pass.

  ## Out of scope (this epic)

  - Multi-worker dispatch (separate epic; consumes the `assigned_agent` column this epic provides).
  - Agent-side direct DB queries — agents stay on YAML.
  - Migrating any historical data from the dropped MySQL tables (dispatches, events, etc. start fresh).
  - Replacing the outbound tracker mirror — still poller-tick-driven against the local YAML.
  - Touching any field on the `Issue` schema (no new YAML fields are introduced; `assigned_agent` already exists in the schema for the multi-worker epic).
