title: "Issues DB Mirror > Phase 1: Replace MySQL with Postgres (infra + 15 migrations + every DB module)"
description: |-
  ## Context

  Phase 1 of the Issues DB Mirror epic (DX-151). Pure infrastructure swap. After this phase ships, every existing DB-backed feature still works exactly as before, but the engine is Postgres instead of MySQL. No new tables, no new behavior, no `issues` mirror yet. That arrives in Phase 2 (DX-153) and Phase 3 (DX-154).

  The brainstorm decision was: drop MySQL entirely, do not migrate data. Dispatches / events / analytics are ephemeral; users get re-seeded via `make create-user`. The only authoritative state is on the filesystem (issue YAMLs, `.danxbot/.env`, `.danxbot/settings.json`), and Phase 1 doesn't touch any of that.

  Full epic spec: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md`.

  ## Sub-split

  This card was originally a single `type: Feature` phase. The first dispatched agent surveyed the surface area and found it exceeds Step 3's split criteria — ~5000 lines across ~40 files, four distinct domains (Node DB driver, schema migrations, DB-backed modules + tests, infra + deploy + docs), and the description itself recommends a 4-commit landing. The card was promoted to `type: Epic` and split into four sub-phases. Each sub-phase is self-contained, leaves the codebase in a working state on its own boundaries, and is small enough to land in a single autonomous dispatch.

  | Sub-phase | Scope |
  |---|---|
  | Phase 1.1 | Postgres compose service (additive — MySQL stays); `pg` + `@types/pg` deps; rewrite `src/db/connection.ts` on `pg.Pool` (with `query()`, `withTx()`, `DbError` helpers); rewrite `src/db/migrate.ts` with `schema_migrations` tracking; refresh `connection.test.ts` + `migrate.test.ts`. After this phase the foundation is in place but no consumer module has been ported yet. |
  | Phase 1.2 | Re-author all 15 numbered migrations (`001_initial_schema.ts` … `015_dispatches_pid_timestamps.ts`) in PG syntax. Common transforms: `LONGTEXT` → `text`, `JSON` → `jsonb`, `DATETIME(6)` → `timestamptz`, `BIGINT UNSIGNED AUTO_INCREMENT` → `bigserial`, `tinyint(1)` → `boolean`, `ENUM(...)` → `text` + check, prefix indexes dropped. Each migration's `up` signature becomes `(client: pg.PoolClient) => Promise<void>`. `migrate.test.ts` asserts the final-state schema. |
  | Phase 1.3 | Port every consumer module (`users-db`, `threads-db`, `auth-db`, `dispatches-db`, `worker-restarts-db`, `sql-executor`, `fake-platform-pool`, plus any `events`-style modules surfaced by grep). Common transforms: `?` → `$1, $2, ...`, `INSERT … ON DUPLICATE KEY UPDATE` → `INSERT … ON CONFLICT (…) DO UPDATE SET …`, `LIMIT ?, ?` → `LIMIT $1 OFFSET $2`, `JSON_EXTRACT(col, '$.x')` → `col->>'x'`, mysql2 `[rows, fields]` → pg `{rows}`, `ER_DUP_ENTRY` → `DbError.code === "duplicate_entry"`. After this phase the full vitest suite is green and zero `mysql2` imports remain. |
  | Phase 1.4 | Drop `danxbot-mysql` from all 3 compose files; drop the volume; `Dockerfile` `mysql-client` → `postgresql-client`; `Makefile` references swapped; `deploy/secrets.ts` + `deploy/targets/<target>.yml` updated; `mysql2` removed from `package.json`; documentation sweep (`CLAUDE.md`, `.claude/rules/*.md`, `README.md`); final `grep` returns zero matches; operator-driven E2E verification (`make launch-infra`, `make create-user`, dashboard login, `make launch-worker`, `make test-system-health`, `make test-system-dispatch`). |

  Sub-phases are sequenced strictly — Phase 1.2 needs the runner from Phase 1.1, Phase 1.3 needs the migrations from Phase 1.2 to actually apply, Phase 1.4 cleans up. Each subsequent phase carries `blocked.by = [<previous-phase>]` so the poller dispatches them one at a time.

  ## What MySQL touches today (surface-area inventory)

  Verified once at split time via:

  ```bash
  grep -rn "mysql2\|createPool\|danxbot-mysql\|MYSQL\|DANXBOT_DB_\|mysql-client" \
    src deploy docker-compose*.yml Makefile Dockerfile package.json
  ```

  Compose / infra:

  - `docker-compose.yml` — `danxbot-mysql` service definition.
  - `docker-compose.prod.yml` — `danxbot-mysql` service definition.
  - `deploy/templates/docker-compose.prod.yml` — `danxbot-mysql` service definition.
  - `Dockerfile` — `mysql-client` package install (replace with `postgresql-client`).
  - `Makefile` — any target referencing the mysql container.
  - `deploy/terraform/` — review for any MySQL-named resources.

  Node:

  - `package.json` — drop `mysql2`, add `pg` and `@types/pg`.
  - `src/db/connection.ts` — pool factory + helpers.
  - `src/db/migrate.ts` — runner.
  - `src/db/migrations/001_initial_schema.ts` … `015_dispatches_pid_timestamps.ts` — 15 migration files.
  - Consumer modules (verify via grep): `src/db/users-db.ts`, `src/db/threads-db.ts`, `src/dashboard/auth-db.ts`, `src/dashboard/dispatches-db.ts`, `src/worker/worker-restarts-db.ts`, `src/worker/sql-executor.ts`, `src/db/health.ts`.
  - Test helpers: `src/__tests__/integration/helpers/fake-platform-pool.ts`.

  Tests:

  - Every test that mocks the pool needs its mock factory updated. Notably `src/db/connection.test.ts` mocks `mysql2/promise` directly today.
  - Tests that assert on raw MySQL error shapes (`ER_DUP_ENTRY`, etc.) — re-target at the new `DbError` surface so call sites don't depend on engine-specific codes.

  Deploy:

  - `deploy/secrets.ts` — `DANXBOT_DB_HOST/USER/PASSWORD/NAME` env var names stay (only the engine changes).
  - `deploy/templates/docker-compose.prod.yml` — swap the service.
  - `deploy/targets/<target>.yml` — review for MySQL-specific knobs.

  Documentation:

  - `CLAUDE.md` — every mention of MySQL → Postgres.
  - Auto-loaded rules under `.claude/rules/*.md` — same.
  - `README.md` if it mentions the engine.

  ## Locked decisions (from brainstorm 2026-05-08)

  - **Postgres only.** MySQL container + client + driver removed.
  - **No data migration.** `loss of historical dispatches/events is accepted` — `make create-user` re-seeds users.
  - **Function names byte-identical.** Where possible, exported function names from `src/db/connection.ts` stay the same so consumer modules don't need import edits — only the implementation behind the function changes. Function _signatures_ may change (mysql2 returns `[rows, fields]`; pg returns `{rows}`); consumers handle the new shape.

  ## Out of scope

  - The new `issues` and `issue_history` tables (DX-153 owns those).
  - The chokidar watcher / mirror engine (DX-154).
  - Any reader migration (DX-155, DX-156).
  - `danx_issue_save` retirement (DX-157).
  - Migrating historical data — explicitly excluded per the brainstorm decision.
