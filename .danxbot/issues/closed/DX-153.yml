    text: |
      ## Test Review

      **Verdict:** ADEQUATE (with minor optional follow-ups).

      All 9 tests map cleanly to AC #1–#7, #8 (initial-creation), #9
      (no-cascade). AC "zero callsites read/write the new tables" is a
      `grep` verification, correctly excluded from the 9-test count.

      ### Coverage observations

      - Sparse + rich row in the generated-columns test exercises NULL
        passthrough, the `blocked` `COALESCE` branch, the `pid::int`
        cast, the `dispatch.id` `#>>` extraction, and labels jsonb
        passthrough.
      - Index test uses `has()` not equality — extra indexes wouldn't
        fail (intentional; partial-index DDL is verified at apply).
      - The down/up-cycle test restores the schema before returning so
        the rest of the suite still sees a clean migration.
      - `test-db.ts` is exercised end-to-end (create → up → query → down
        → up → close). Direct unit tests would mostly assert
        `pg`-library behavior — skipped intentionally.

      ### Optional follow-ups (Phase 3, not blocking)

      - PK uniqueness on `(repo_name, id)` not pinned — a typo turning
        the PK into a non-unique constraint would pass.
      - `blocked: null` literal jsonb branch is documented in the
        migration header but no test pins the behavior.
      - Malformed `dispatch.pid` (non-numeric) — `(text)::int` would
        raise on insert; Phase 3 writer concern.

      No flake risks identified — cleanups, schema restoration, unique
      DB names via `randomBytes(6).toString("hex")`, and
      `pg_terminate_backend` before `DROP DATABASE` are all in place.
  - author: code-reviewer
    timestamp: 2026-05-09T01:30:00Z
    text: |
      ## Code Review

      **Verdict:** PASS with non-blocking notes.

      Three files are clean, well-documented, and match conventions
      from DX-140 / DX-152. AC met (9 tests). DDL quoting consistent
      with siblings (`002_events_table.ts`, `009_dispatches_table.ts`).
      Generated-column expressions correctly limited to IMMUTABLE
      operators. Schema-only Phase 2 boundary respected — zero
      application-code references.

      ### Findings (all addressed)

      1. **`DANXBOT_DB_HOST_TEST` env var** in `src/db/test-db.ts`
         invented a one-off contract that defaulted to `127.0.0.1`
         anyway — the test always runs from the host where `127.0.0.1`
         is the only reachable address. **Fix:** dropped the env var,
         hard-coded `127.0.0.1`. Documented why.
      2. **Bare `catch {}` in `createTestDb`** swallowed connectivity
         errors silently — operators couldn't distinguish "PG not
         running" from "wrong port / bad password". **Fix:** added a
         `console.warn` inside the catch surfacing the error message.
      3. **DRY violation** — `runUp` and `runDown` in the test file
         differed only in the `up`/`down` symbol. **Fix:** collapsed to
         a single `runMigration(pool, fn)` helper.
      4. **`blocked` COALESCE** at `016_issues_mirror.ts:81-84` is
         correct and IMMUTABLE; verified `jsonb_typeof('null'::jsonb)
         = 'null'`, not `'object'`. No change needed.
