title: "Issues DB Mirror > Phase 5: Migrate dashboard endpoints + danx-issue MCP query tools to DB"
description: |-
  ## Context

  Phase 5 of the Issues DB Mirror epic (DX-151). Sister to Phase 4 (DX-155) — same migration shape but applied to the dashboard's HTTP endpoints and the agent-facing `danx-issue` MCP server's read tools. After this phase, every internal Node consumer of issue data queries the DB.

  Full epic spec: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md`, "Read pipeline" section.

  ## Endpoints + tools in scope

  Inventory before starting (run `grep -rn "issues/open\|issues/closed\|parseSimpleYaml\|readdirSync.*issues" src/dashboard src/mcp` and reconcile against this list):

  Dashboard (`src/dashboard/server.ts` + helpers):

  - `GET /api/issues` — list with filtering by repo, status, parent, label, search
  - `GET /api/issues/:id?repo=<name>` — single issue + history
  - `GET /api/issues/history/:id?repo=<name>` — history rows for the issue (NEW endpoint enabled by `issue_history`)
  - any SSE stream that pushes issue changes (today driven by file watching; can stay on the watcher OR switch to a DB-LISTEN pattern — pick file-watcher; LISTEN/NOTIFY is a future optimization)

  MCP — the `@thehammer/danx-issue-mcp` package's tools, which run inside the workspace agent:

  - `danx_issue_get(id)` — single issue lookup
  - `danx_issue_list({status?, type?, parent_id?})` — filtered list

  Both `danx_issue_get` and `danx_issue_list` today read YAMLs directly from the agent's workspace cwd. Since agents reach the danxbot worker via the worker's HTTP API (not directly into PG), the cleanest move is: the danx-issue MCP server keeps its current YAML reader for `danx_issue_get` (the agent has the file at hand — reading the file is fast and stays consistent with the "agents stay on YAML" rule) but `danx_issue_list` calls a new worker endpoint `GET /api/internal/issues?repo=<name>&filters` that the worker serves from the DB. Why: list queries are the cross-card lookups that benefit from the DB index; single-card gets do not.

  Confirm this split with the maintainer before implementing if uncertain — the spec says agents stay on YAML for reads, but `danx_issue_list` is a cross-card query, which is the one shape the DB exists to accelerate.

  ## Solution

  ### Dashboard endpoints (single source change)

  Replace every YAML walk inside the dashboard server's issue handlers with SQL queries against `issues`. Pagination + ordering becomes a real `LIMIT / OFFSET / ORDER BY`. Filtering uses indexed generated columns. The response shape (`Issue[]`, `Issue`, `HistoryEntry[]`) is unchanged.

  Add the new history endpoint:

  ```
  GET /api/issues/history/:id?repo=<name>
  → 200 { entries: [{ changed_at, source, prev_hash, next_hash, patch }] }
  ```

  ordered ascending by `changed_at`. Pagination optional (cap to last 200; expose `?since=<iso>` for forward streaming if dashboard timeline UI wants it — DON'T build the dashboard UI in this card; just expose the endpoint).

  ### MCP `danx_issue_list`

  Repo: `@thehammer/danx-issue-mcp` (separate npm-published package). The package source lives outside this repo — but the danxbot worker registers a handler for `danx_issue_list` calls? Actually, the MCP runs in-process inside the agent and reads the local FS. Two options:

  - **Option A (preferred):** The MCP package itself adds an HTTP fallback. When env `DANX_ISSUE_LIST_VIA_HTTP=1` is set, `danx_issue_list` makes an HTTP GET to `${DANXBOT_ISSUE_LIST_URL}` (auto-injected by `dispatch()` like other per-dispatch URLs). The worker serves it from PG. Falls back to YAML scan when the env is unset (local dev / non-dispatched usage).
  - **Option B:** Keep `danx_issue_list` on YAML scan inside the MCP. The MCP runs inside the agent's process; agents stay on YAML per spec. Skip the migration for this tool; only the dashboard side migrates.

  The spec's "Reader scope" decision was "agents keep YAML reads." On a literal reading, Option B is correct: `danx_issue_list` runs inside the agent, so it stays on YAML. **Pick Option B.** Document in the card retro that the dashboard side gets DB acceleration; the agent side does not, by design.

  That means MCP changes are zero. The full scope of Phase 5 reduces to: dashboard endpoints + new history endpoint.

  ### Endpoint migrations — concrete

  In `src/dashboard/server.ts`:

  - Find every handler that reads from `<repo>/.danxbot/issues/`.
  - Replace with the equivalent SQL against `issues`. Where filtering used in-memory predicates, translate to `WHERE` clauses on indexed columns.
  - Where the handler returned `Issue[]`, project `select data ...` and cast.
  - Where the handler took a `repo` query param, the SQL filter is `repo_name = $1`.
  - Where SSE pushed issue changes, leave it on the existing file-watcher (out of scope to switch to LISTEN/NOTIFY in this epic).
  - Add the new `GET /api/issues/history/:id` handler.

  Update or add tests for each handler. The dashboard test layer already has DB-backed helpers from Phase 1.

  ## Files

  Modify:

  - `src/dashboard/server.ts`
  - any helper file the server delegates to (e.g. an `issues-route.ts` if it was extracted previously)
  - tests for those handlers

  Out (no longer in scope after the Option B decision):

  - The `@thehammer/danx-issue-mcp` package — no changes.

  ## Test plan

  1. Inventory each handler that reads issue data. List them in a comment at the top of the test file.
  2. For each handler, write an integration test that seeds the test DB with 3-5 fixture issues, hits the endpoint via the existing test harness, asserts the response shape + filtering.
  3. Migrate the handler. Re-run.
  4. Add tests for the new history endpoint:
     - Returns ascending-ordered entries for a known issue.
     - Returns empty array for an unknown issue.
     - 404 for missing repo.
     - Pagination (if exposed).
  5. Full `make test` + `cd dashboard && npx vitest run`.
  6. Manual smoke: open `http://localhost:5566`, navigate the Issues tab, verify lists, filters, and the per-issue drawer load correctly.
  7. Manual smoke: hit `/api/issues/history/<known-id>?repo=danxbot` with curl + bearer token; verify the timeline renders.

  ## Acceptance

  - Every dashboard issue endpoint is DB-backed; `grep -n "issues/open\|issues/closed\|readdirSync\|parseSimpleYaml" src/dashboard/server.ts` returns ZERO matches.
  - New `GET /api/issues/history/:id` endpoint live + tested.
  - All existing dashboard tests pass without assertion changes (response shapes preserved).
  - `make test` green; `cd dashboard && npx vitest run` green; `npx tsc --noEmit` + `vue-tsc --noEmit` clean.
  - Manual smoke: dashboard Issues tab fully functional.
  - `danx-issue` MCP package unchanged (decision documented in retro).

  ## Out of scope

  - Building a dashboard timeline UI for `issue_history` — endpoint exposed; UI is a separate card.
  - Switching SSE issue updates from file-watcher to PG LISTEN/NOTIFY — future optimization.
  - Migrating `danx_issue_list` — agents stay on YAML by design.
  - Retiring `danx_issue_save` (DX-157).
