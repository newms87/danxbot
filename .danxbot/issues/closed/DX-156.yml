retro:
  good: |
    - **Option B preserved the agent/dashboard split cleanly.** The card's
      pre-decided "MCP `danx_issue_list` stays on YAML" call meant zero
      changes to `@thehammer/danx-issue-mcp`. Phase 5 reduced to dashboard
      endpoints + history API — sharper diff, lower regression surface.
      The card's own description explicitly walked the reasoning, which
      is why this Phase landed in one tight commit instead of cascading
      into the MCP package's release pipeline.
    - **`setIssueDbQueryFn` test hook from Phase 4 was reusable.** The
      poller's `src/poller/issues-db.ts` already had the query-function
      injection point and the `setRepoName` registry. The dashboard
      reader plugged into both with no shim — same SQL surface, same
      mock pattern, same test ergonomics.
    - **Strict-matcher simulator caught a real fragility.** The first
      cut of the unit-test simulator pattern-matched on SQL substrings
      ("FROM issues" + "repo_name = $1"). Reviewer flagged that any
      future helper added to `issues-db.ts` (e.g. an external_id
      lookup) would silently route through `dbListAllIssues` and
      return the wrong rows. Refactored to normalize whitespace +
      compare against EXACT expected SQL strings + throw on unknown.
      Now adding a new helper trips the test loudly during CI.
    - **`raw_yaml` re-serialization works.** The reader builds
      `raw_yaml` from `serializeIssue(data)` rather than a disk read.
      Round-trip equality holds for any YAML originally written by
      `serializeIssue` (every code path that writes issue YAMLs goes
      through that helper). The test suite confirms it for the unit
      cases; the integration test confirms it after the data goes
      through PG's jsonb canonicalization.
    - **Scale guard pattern is the right shape.** `LIMIT 5001` + count
      check + `IssuesPayloadTooLargeError` is a low-effort tripwire
      that turns a silent multi-MB response into an operator-visible
      error. Worth replicating any time a JS slice consumes a
      bounded-by-convention SQL result set.
  bad: |
    - **The dashboard's `IssueListItem` slice + sort logic is doing the
      DB's job in JS.** `listIssues` pulls every row, then in JS:
      separates open/closed, slices closed to recent-50, walks open +
      recent-closed for referenced ids, pulls referenced-extras. Every
      step is a SQL query waiting to happen. At today's scale (150
      closed cards/repo) the JS path is fine; the scale guard +
      reviewer feedback both flag it as a tail risk. A follow-up card
      should split into "all open" + "newest-N closed" + "explicit
      referenced ids" once the dashboard caches indicate it's
      worthwhile. The scale guard makes the pivot non-urgent but
      observable.
    - **400 vs 404 for unknown repo is now inconsistent across the
      dashboard.** Agents-routes return 404; new history endpoint
      returns 400 to match the existing `handleListIssues` /
      `handleGetIssue`. Reviewer flagged 404 as more standard, but
      retrofitting the four other handlers (and updating their tests)
      was out of scope. The inconsistency is now documented in
      issues-routes comments.
    - **Repo-lookup boilerplate is duplicated 7 times across
      issues-routes.ts (3) + agents-routes.ts (4).** Same `if
      (!params.repo)` + `.find(name)` + `if (!repo)` block. Reviewer
      called it out; pulling a `resolveRepo(res, name, deps)` helper
      is straight DRY work but touches more files than this card's
      scope warrants. Captured as future refactor.
    - **Manual smoke depends on an operator dashboard restart.** This
      dispatch ran with a no-restart prohibition. The dashboard SPA
      didn't change, the API contract is locked by tests, but the
      visual final-pass needs a `docker compose up -d --force-recreate
      dashboard` after this commit lands. Operator should verify the
      Issues tab + drawer + filters once after the restart to close
      the loop.
