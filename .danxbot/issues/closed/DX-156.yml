comments:
  - author: code-reviewer
    timestamp: 2026-05-09T03:35:00.000Z
    text: |-
      ## Code Review

      **Critical:** none. Migration preserves response shapes, route ordering correct, parameterized SQL, no injection risk.

      **Major (addressed in this commit):**

      - **`dbListIssueHistory` `id ASC` tiebreak comment.** Reviewer flagged that the equivalence between PG `bigserial id ASC` and the test simulator's `insertSeq` is non-obvious. Added a 6-line comment in `src/poller/issues-db.ts#dbListIssueHistory` explaining the tiebreaker semantics.
      - **Limit parsing slop.** `parseInt("12abc", 10) === 12` — handler accepted partial-numeric input. Tightened to `/^\d+$/` test before parsing in `handleGetIssueHistory`. Added 7 boundary tests (`"0"`, `"abc"`, `"-5"`, `""`, `"12abc"`, `"1.5"`, `" 50"`) all 400.
      - **`dbListAllIssues` scale guard.** Full-table pull had no SQL-level cap. Added `LIMIT 5001` + `IssuesPayloadTooLargeError` at >5000 rows; both unit and integration tests cover the boundary. The runaway-repo case now fails loudly instead of serving multi-MB responses every poll.

      **Major (deferred):**

      - **400 vs 404 for unknown repo.** The new history handler returns 400, matching the existing `handleListIssues` / `handleGetIssue` pattern. Reviewer noted 404 is more standard; out of scope to retrofit the existing handlers in this card.
      - **Repo-lookup DRY violation across 7 handlers.** Same 6-line `if (!repo) {…}` block in every issues + agents route. Worth a small follow-up card extracting `resolveRepo(res, name, deps)` once we touch agents-routes again.

      **Nits:**

      - `RawIssue` interface in `issues-reader.ts` is now structurally equivalent to `DbIssueRow` with one renamed field; left as-is for diff readability.
      - `raw_yaml` is rendered via `serializeIssue(data)` rather than re-reading the file. Trade-off documented inline at `readIssueDetail`'s comment block: hand-edited YAMLs lose non-canonical formatting in the rendered string. Only consumer is `RawTab.vue`'s read-only display.
  - author: test-reviewer
    timestamp: 2026-05-09T03:35:00.000Z
    text: |-
      ## Test Review

      **Coverage status:** 73 of 82 enumerated test surfaces covered before fixes; all 11 missing items addressed in the same commit.

      **Top gaps closed in this commit:**

      1. **Server route-ordering invariant** — the load-bearing rule that `/api/issues/history/:id` matches before `/api/issues/:id`. Added 7 tests in `server.test.ts` (`describe("issues route ordering invariant (DX-156)")`) verifying each handler routes to its own mock and `/api/issues/history/:id` does NOT collapse through the generic `:id` matcher. URL-encoded id decode + nested-path 404 + auth gate also covered.
      2. **Limit-parsing boundary tests** — added `it.each` table covering `"0"`, `"abc"`, `"-5"`, `""`, `"12abc"`, `"1.5"`, `" 50"` (all 400). Added accept tests for `limit=1` (lower bound) and `limit=1000` (exact cap, no clamp).
      3. **Same-timestamp tiebreak** — added integration test seeding 3 history rows at identical `changed_at` and asserting insertion-order preservation via PG's `id ASC`. The unit simulator can't exercise this because it tiebreaks on `insertSeq`.
      4. **50-cap + referenced-pull against real PG** — added 2 integration tests seeding 60+ closed rows with monotonic `mirror_updated_at` and asserting the JS slice / referenced-extras walk handles PG-returned timestamps correctly.
      5. **Scale guard fail-loud** — added a unit test that stubs the simulator to return cap+1 rows and asserts `IssuesPayloadTooLargeError` propagates. Mirror integration test covers the same path against real PG.
      6. **Simulator strict matcher** — refactored the in-memory mock from substring matching to exact normalized-SQL matching. New helpers added to `issues-db.ts` will trip the simulator's `Unhandled SQL` throw and fail loudly during test runs instead of silently returning the wrong row set through `dbListAllIssues`.
      7. **Dead code removal** — the `Number.isFinite(limit) && limit > 0` no-LIMIT branch in `dbListIssueHistory` was unreachable. Replaced with an explicit fail-loud throw on bad input.
