      ## Blocked — operator action required for Layer 3 / deploy validation

      The code work for DX-157 has landed. The remaining ACs (`make test-system green`, `make deploy-smoke green`, manual YAML→Trello smoke, and Epic DX-151 close) cannot be completed by an autonomous dispatch — they require either killing the dispatching worker (forbidden) or running production deploys (forbidden without explicit per-invocation user authorization). This card is parked in **Blocked** pending the operator handoff below.

      ### What's done

      - **`grep -rn 'danx_issue_save|DANXBOT_ISSUE_SAVE_URL|/api/issue-save' src .claude` returns ZERO matches** ✓ (AC #6).
      - `src/worker/issue-route.ts` `handleIssueSave` deleted; `handleIssueCreate` + `syncTrackedIssueOnComplete` retained (AC #1) ✓.
      - `src/mcp/danxbot-server.ts` save tool def + dispatcher case + advertise filter all removed (AC #2) ✓.
      - `DANXBOT_ISSUE_SAVE_URL` removed from `DanxbotToolUrls` / `McpFactoryOptions` / `mcp-registry` / `dispatch/core.ts` overlay (AC #3) ✓.
      - Workspace skills (`danx-next`, `danx-triage-card`, `danx-epic-link`) rewritten to use `Edit` / `Write` directly; poller dispatch prompt updated (AC #4) ✓.
      - `CLAUDE.md` table row + `.claude/rules/agent-dispatch.md` per-dispatch URL list updated; new forbidden-pattern row added (AC #5) ✓.
      - `npx tsc --noEmit` clean ✓; `cd dashboard && npx vue-tsc --noEmit` clean ✓.
      - `npx vitest run` — 3578 passed, 4 skipped, 0 failed (AC #7) ✓.
      - Code-reviewer + test-reviewer subagents ran in parallel; findings landed in this card's `comments[]`. Critical-but-architectural findings filed as separate cards (see action items).

      ### What's still needed (operator)

      Run, in order, on the danxbot host:

      1. **Rebuild + relaunch the danxbot worker** to pick up the new `src/mcp/danxbot-server.ts` and `src/worker/issue-route.ts`:

         ```bash
         cd /home/newms/web/danxbot
         make build
         make stop-worker REPO=danxbot
         make launch-worker REPO=danxbot
         ```

         (Note: this kills the very worker that processed DX-157. Operator runs it; autonomous dispatches cannot.)

      2. **Run `make test-system`** to verify the full Layer 3 stack (covers AC #8):

         ```bash
         make test-system
         ```

         Costs ~$1 in real Claude API tokens.

      3. **Deploy to production** (covers AC #9 prerequisites):

         ```bash
         make deploy TARGET=gpt
         ```

      4. **Run `make deploy-smoke TARGET=gpt`** to verify the deployed worker's dispatch round-trip (AC #9).

      5. **Manual YAML→Trello smoke** (AC #10): pick a real card under `<repo>/.danxbot/issues/open/`, edit a comment via `Edit`, observe within ~60s that the next poller tick mirrors the change to the Trello card.

      6. **Close Epic DX-151** (AC #12): every other AC of DX-151 should already be satisfied by the closed phase cards (DX-152..DX-156); after DX-157 lands operator marks the remaining DX-151 ACs and flips the epic to Done.

      ### Why this needs human/host help

      - **Worker rebuild kills the dispatcher.** The danxbot worker that ran DX-157 IS the one that needs rebuilding. An autonomous dispatch cannot restart its own host process.
      - **Production deploys are explicit-authorization-only.** Per `.claude/rules/danx-no-launch-worker.md` and `make-commands.md`, autonomous agents cannot run `make deploy` / `make deploy-smoke` against production targets.
      - **`make test-system` requires running infra.** Layer 3 tests need a live MySQL + worker. An autonomous dispatch cannot launch infra (forbidden) and cannot rely on the dispatcher's own infra (would race).

      ### Incomplete ACs

      - AC #8: `make test-system green` — operator step 2.
      - AC #9: `make deploy-smoke TARGET=gpt green` — operator steps 3 + 4.
      - AC #10: Manual YAML→Trello smoke within ~60s — operator step 5.
      - AC #11: Action item filed for `issues:issue-card-workflow` plugin skill — DX-211 covers it.
      - AC #12: Epic DX-151 every AC checked, epic flipped to Done — operator step 6.

      ### Final AC check

      Before Done, every AC must be `checked: true`. Operator validates ACs #8-#10 and #12 by running the steps above; AC #11 closes when DX-211 lands.

      ### Action items filed

      - **DX-211** — Sweep `danx_issue_save` from `claude-plugins` marketplace skills + commit/push.
      - **DX-212** — Auto-sync `trigger === "trello"` gate footgun for `/api/launch` `issue-worker` dispatches (operator picks Option A / B / C; recommended Option B = parser invariant).
      - **DX-213** — Backfill four post-DX-157 test-coverage gaps (Needs Approval branch, `chainOnIssueLock` concurrency, `recordSystemError` on tracker error, `parseIssue` throw branch).

      The DX-212 gap is the one most likely to surface as a real bug if non-poller `/api/launch` calls are made against `workspace: "issue-worker"`. Worth landing before any dashboard or external dispatcher starts using that workspace.
