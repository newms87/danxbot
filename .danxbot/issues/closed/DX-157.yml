    timestamp: 2026-05-09T04:50:32.038Z
    text: |
      <!-- danxbot -->

      ## Code Review

      DX-157 retire-`danx_issue_save` is structurally clean — the agent-facing save MCP tool, its env URL, its worker route, and its dispatcher case are all gone, callers and tests have been updated, and `npx tsc --noEmit` + the full vitest run pass. The new architecture (chokidar watcher mirrors agent edits → DB; auto-sync at `danxbot_complete` pushes to tracker) is sound for the Trello-trigger path it was designed for. Findings ranked by severity:

      ### 1. Footgun — auto-sync gates on `trigger === "trello"`, but `issue-worker` is reachable from non-Trello triggers

      `src/worker/auto-sync.ts:69` returns early on any non-Trello dispatch row. An agent running the `issue-worker` workspace via `/api/launch` (trigger `"api"`) skips `forceWaitingOnToToDo`, history-diff append, terminal `dispatch: null` clearing, and the open→closed file move. The skill (`danx-next/SKILL.md:483`) tells agents:

      > Do NOT change `status`. Leave it as is. **The worker mechanically forces `status: ToDo` on save when `waiting_on` is non-null.**

      That promise is now conditional on the trigger being `"trello"`. Pre-DX-157, the legacy save handler always fired regardless of trigger.

      Fix options (operator decides):
      - Strip the `trigger === "trello"` check from `auto-sync.ts`; let `runSync` short-circuit when `external_id === ""` (it already does).
      - Add a parser-level invariant in `parseIssue` that rejects `waiting_on != null && status !== "ToDo"`.
      - Reject `/api/launch` with `workspace === "issue-worker"`.

      The second is most aligned with "DX-157 made the YAML the source of truth" — invariants belong in the parser, not in a side-channel normalizer.

      ### 2. Stale docstring residue (8 references — all updated this session)

      Updated comments in `src/worker/issue-route.ts` (8 sites), `src/agent/mcp-types.ts:89`, `src/worker/issue-route.test.ts:5` to drop `handleIssueSave` references.

      ### 3. Dead `vi.mock` entry — fixed

      `src/worker/server-boot-seed-error.test.ts:21` mocked `handleIssueSave: vi.fn()` from a module that no longer exports it. Removed.

      ### 4. URL count miscount in `agent-dispatch.md` — fixed

      Doc said "Four URLs total today" but five are auto-injected (the four listed plus `DANXBOT_RESTART_WORKER_URL`). Updated to "Five URLs" with the restart URL row added.

      ### 5. Coverage gap — `forceWaitingOnToToDo` end-to-end through `syncTrackedIssueOnComplete`

      Added `it("DX-157 AC #1: forceWaitingOnToToDo normalizes In Progress + waiting_on YAML to ToDo + waiting_on preserved")` in `src/__tests__/worker/issue-route.test.ts` `describe("syncTrackedIssueOnComplete")`. Verified passing.

      ### 6. `applyHistoryDiff` cache-seeding gap (deferred)

      Pre-DX-157 the cache was seeded by `handleIssueCreate` AND every `handleIssueSave`. Post-DX-157, only `handleIssueCreate` and `syncTrackedIssueOnComplete` write to the cache. For cards created OUTSIDE this worker (operator hand-edit, git pull, mirror reconcile), the first agent-driven completion's diff is empty (no prior reference). Worth seeding the cache on the chokidar watcher's `add` event in a follow-up — out-of-scope for this card.

      ### 7. Skipped integration test — `yaml-lifecycle-memory-tracker.test.ts`

      `describe.skip`'d with explanatory comment. The behavior is unit-covered by `syncTrackedIssueOnComplete` tests + auto-sync tests, but the MemoryTracker E2E proof of the new architecture is unverified. Follow-up card filed below.

      ### 8. Downstream skill drift — `claude-plugins` marketplace still references `danx_issue_save`

      `~/web/claude-plugins/issues/skills/issue-card-workflow/SKILL.md` and `~/web/claude-plugins/issue-worker/skills/comment-style/SKILL.md` still document the legacy save tool. Out of this PR's scope — flagged in the action item below.

      ### 9. Forbidden-pattern check

      | Anti-pattern | Status |
      |---|---|
      | Backwards-compat shim for `danx_issue_save` | None — fully gone |
      | Fallback to old route on failure | None |
      | Dead exports | None |
      | Swallowed errors covering up the migration | None |
      | Unsafe casts to bridge the gap | None |

      ### Summary — landing readiness

      **Fixed in this session:** Findings #2, #3, #4, #5.

      **Operator decision required:** Finding #1 (auto-sync trigger gate). The card moves to Blocked pending operator pick of fix option.

      **Follow-up cards filed:** Findings #6, #7, #8.
