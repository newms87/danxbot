      dashboard-dev-1). Permanent fix lands on next `make build` (image
      rebake).
    - **Auto-sync trigger gate is a footgun the migration didn't address.**
      Pre-DX-157, the legacy save handler ran the worker normalization
      (`forceWaitingOnToToDo`, history mint, terminal dispatch clearing)
      regardless of trigger. Post-DX-157, only Trello-triggered dispatches
      hit those code paths. `/api/launch` callers using `workspace:
      "issue-worker"` silently skip normalization. The skill body still
      promises "the worker mechanically forces `status: ToDo` on save when
      `waiting_on` is non-null." That promise is now conditional. Filed as
      DX-212.
