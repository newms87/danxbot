retro:
  good: |
    All 15 numbered migrations apply cleanly to a fresh Postgres 16 container.
    SELECT 1 + every consumer module (auth-db, dispatches-db, threads-db,
    users-db, worker-restarts-db, sql-executor, fake-platform-pool) returns
    PG-shape rows. Full suite тАФ 3484 backend tests + 188 dashboard tests +
    tsc + vue-tsc тАФ green. Phase scope was deliberately expanded to
    Phase 1.2 + 1.3 + 1.4 in one pass per operator instruction
    "ALL PROBLEMS ARE IN SCOPE".
  bad: |
    `pg` rejects MySQL-isms differently than mysql2: `LIMIT ?, ?` тЖТ
    `LIMIT $N OFFSET $M`, `INSERT тАж ON DUPLICATE KEY` тЖТ `ON CONFLICT (col)
    DO UPDATE SET col = EXCLUDED.col`, `JSON_EXTRACT(col, '$.x')` тЖТ
    `col->>'x'`, `RETURNING id` for surrogate-id capture, `NOW() - INTERVAL
    '$1 second'` is invalid тАФ must be `NOW() - ($1::int * INTERVAL '1
    second')`. Each is a footgun if you forget. ON UPDATE
    CURRENT_TIMESTAMP requires a per-table BEFORE UPDATE trigger calling a
    bootstrap `set_updated_at()` function (added in 001). `bigint` type
    parsing in pg defaults to string тАФ coerced to number via
    `pg.types.setTypeParser(20, parseInt)` so consumer modules don't see
    string ids. `pool.query` returns a result OBJECT not a tuple тАФ every
    `[rows] =` destructure had to be rewritten. Migration tests that
    snapshotted MySQL DDL strings (002, 004, 011, 015) were deleted as
    redundant once the runner's behavior is integration-tested.
