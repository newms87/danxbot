title: "Issues DB Mirror > Phase 1.3: Port every *-db.ts consumer module to pg.Pool; full vitest suite green"
description: |-
  ## Context

  Third sub-phase of DX-152 (Phase 1 of the Issues DB Mirror epic, DX-151). Read the parent epic (DX-152) for the full split rationale + sub-phase table. **Blocked on Phase 1.2 (DX-165)** — without re-authored migrations, the consumer modules can't actually run against a PG database. Order matters.

  This is the big-bang module switch. After Phase 1.1 the foundation pool is PG-shaped; after Phase 1.2 the migrations apply cleanly. Until this phase, every consumer module (`users-db`, `threads-db`, `auth-db`, `dispatches-db`, `worker-restarts-db`, `sql-executor`, `fake-platform-pool`) was written for `mysql2` return shapes (`[rows, fields]`, `?` placeholders, `JSON_EXTRACT(...)`, etc.). This phase rewrites every one in `pg` form, updates every test that mocks the pool, and confirms the full vitest suite goes green again.

  After this phase ships:

  - Zero `mysql2` imports in `src/`.
  - Zero `?` placeholder syntax in any SQL.
  - Zero `JSON_EXTRACT` / `JSON_UNQUOTE` / `LIMIT n, m` syntax.
  - All `INSERT ... ON DUPLICATE KEY UPDATE` rewritten as `INSERT ... ON CONFLICT (...) DO UPDATE SET ...`.
  - Every consumer module references `pg.Pool` types (or the `query()` / `withTx()` helpers from `connection.ts`).
  - Every test that mocked the pool now mocks the `pg` shape (or uses the new helpers).
  - `npx vitest run` (full suite) green.
  - `npx tsc --noEmit` clean.
  - `cd dashboard && npx vue-tsc --noEmit` clean.

  Full epic spec: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md`.

  ## Files (verified at split time via grep)

  Consumer modules + their tests:

  - `src/db/users-db.ts` (54 lines) + `users-db.test.ts`
  - `src/db/threads-db.ts` (70 lines) + `threads-db.test.ts`
  - `src/db/health.ts` + `health.test.ts` (verify; likely minimal change)
  - `src/dashboard/auth-db.ts` (167 lines) + `auth-db.test.ts`
  - `src/dashboard/dispatches-db.ts` (399 lines) + `dispatches-db.test.ts`
  - `src/worker/worker-restarts-db.ts` (116 lines) + `worker-restarts-db.test.ts`
  - `src/worker/sql-executor.ts` (303 lines) + `sql-executor.test.ts` — sql-executor is a thin layer over the pool used by the worker for arbitrary SQL execution; it imports `FieldPacket` from `mysql2/promise` today; needs to switch to pg's `FieldDef` shape.
  - `src/__tests__/integration/helpers/fake-platform-pool.ts` (142 lines) + `fake-platform-pool.test.ts`
  - `src/__tests__/system/slack-agent-e2e.test.ts` — verify it still passes with the new fake pool shape (Slack agent uses platform tools that delegate through this pool).
  - `src/dashboard/reset-data.ts` + `reset-data.test.ts` — uses pool to truncate tables; transform statements.
  - Any consumer flagged by `grep -rln "from \"mysql2\b" src` after this phase starts (the surface above is the snapshot at split time; new ones may surface).

  Other touch-points (verified at split):

  - `src/worker/dispatch.ts` — imports `ResultSetHeader` from `mysql2/promise` for typing; switch to pg-shaped types.
  - `src/dashboard/auth-db.ts` — imports `ResultSetHeader, RowDataPacket`; same.
  - `src/db/threads-db.ts`, `src/worker/worker-restarts-db.ts`, `src/dashboard/dispatches-db.ts` — all import `ResultSetHeader`.

  ## Common transforms

  | mysql2 idiom | pg equivalent |
  |---|---|
  | `pool.execute(sql, [a, b])` returns `[rows, fields]` | `pool.query(sql, [a, b])` returns `{ rows, rowCount, fields }` — use the new `query<T>(sql, params)` helper from `connection.ts` for `T[]` rows directly |
  | `?` placeholder | `$1`, `$2`, ... (1-indexed) |
  | `INSERT ... ON DUPLICATE KEY UPDATE col = VALUES(col)` | `INSERT ... ON CONFLICT (key_col) DO UPDATE SET col = EXCLUDED.col` |
  | `INSERT IGNORE` | `INSERT ... ON CONFLICT DO NOTHING` |
  | `LIMIT N, M` (offset, limit) | `LIMIT M OFFSET N` |
  | `JSON_EXTRACT(col, '$.x')` | `col->>'x'` (text) or `col->'x'` (jsonb) — `->>` for terminal, `->` for chaining |
  | `JSON_UNQUOTE(...)` | `->>` already returns unquoted text; drop |
  | `CAST(... AS UNSIGNED)` | `(...)::bigint` or `(...)::int` depending on width |
  | `ResultSetHeader.affectedRows` (mysql2) | `result.rowCount` (pg) |
  | `ResultSetHeader.insertId` (mysql2) | `RETURNING id` clause + read from `rows[0].id` (pg has no implicit "last insert id") |
  | `RowDataPacket[]` types | `T[]` from the typed `query<T>()` helper |
  | `FieldPacket` | `FieldDef` from `pg` (sql-executor only) |
  | `err.code === "ER_DUP_ENTRY"` | `err instanceof DbError && err.code === "duplicate_entry"` (DbError set up in Phase 1.1) |

  Big watch-out: **`RETURNING` is required for `insertId` semantics.** Every consumer that read `result.insertId` after an `INSERT` must add `RETURNING id` to the SQL and read `rows[0].id`.

  ## Approach

  1. **Survey:** start with `grep -rln "from \"mysql2\b\|mysql2/promise\b" src` and `grep -rn "?\\b" src/**/*-db.ts src/**/*.ts | grep "execute\|query"` to enumerate every callsite.
  2. **Port one module at a time, with its test alongside.** Suggested order, in increasing complexity:
     1. `src/db/health.ts` (smallest)
     2. `src/db/users-db.ts`
     3. `src/db/threads-db.ts`
     4. `src/dashboard/auth-db.ts`
     5. `src/worker/worker-restarts-db.ts`
     6. `src/dashboard/dispatches-db.ts` (largest single file)
     7. `src/worker/sql-executor.ts` (cross-cutting; relies on pg's `FieldDef`)
     8. `src/__tests__/integration/helpers/fake-platform-pool.ts` (last — tests of other modules may depend on its mocks)
  3. After each module port, run `npx vitest run <module>.test > /tmp/vitest.log 2>&1` — green before moving on.
  4. After all modules ported, run the full suite: `npx vitest run > /tmp/vitest.log 2>&1` — must be green.
  5. Run `npx tsc --noEmit` and `cd dashboard && npx vue-tsc --noEmit` — both clean.

  Sub-agent hint: for the mechanical transforms (`?` → `$N`, `JSON_EXTRACT` → `->>`), dispatch a `batch-editor` subagent on a per-file basis. Avoid blanket regex; the rewrite must be SQL-aware to count placeholder positions.

  ## Acceptance

  - `grep -rln "mysql2\\b" src` returns ZERO matches (the mysql2 package import is the canonical signal). Type-only imports of `Pool`, `ResultSetHeader`, `RowDataPacket`, `FieldPacket` all gone.
  - Every consumer module ported; per-module tests pass when run alone.
  - `npx vitest run` (full suite) green.
  - `npx tsc --noEmit` clean.
  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - `src/__tests__/integration/helpers/fake-platform-pool.ts` mocks the `pg.Pool` shape (`{ rows, rowCount }` return); `fake-platform-pool.test.ts` exercises that shape.
  - `src/__tests__/system/slack-agent-e2e.test.ts` passes (the slack agent's platform-tool path goes through `fake-platform-pool` — the system test relies on the mock shape).
  - Every `INSERT ... RETURNING id` callsite reads `rows[0].id` correctly (no `result.insertId` survivors).

  ## Out of scope

  - Removing `danxbot-mysql` from compose / `mysql2` from `package.json` / `mysql-client` from Dockerfile (Phase 1.4).
  - Documentation sweep (Phase 1.4).
  - Operator-driven E2E verification (Phase 1.4).

  ## Notes for the agent

  - **Don't paper over a failing test by relaxing the assertion.** If a port surfaces a real bug (e.g. mysql2's `affectedRows` was being misread), fix it correctly. The card is worth re-verifying carefully because the mysql-shape API and pg-shape API have real semantic differences.
  - **`ON CONFLICT` is column-set-aware.** PG requires you to name a unique constraint or column-set. Read each `ON DUPLICATE KEY UPDATE` and figure out which UNIQUE constraint it relies on; the PG migration from Phase 1.2 must have that constraint named.
  - **Be explicit about NULLs in `ON CONFLICT` updates.** PG's `EXCLUDED.col` references the proposed insert value; `tbl.col` references the current row. mysql2's `VALUES(col)` is the same as `EXCLUDED.col`.
  - **`RETURNING` is your friend.** Anywhere you used `result.insertId` add `RETURNING id`; anywhere you needed the row that got inserted/updated, `RETURNING *` and parse the row.
  - **Numeric `bigint` columns:** with the type-parser hack from Phase 1.1 (`pg.types.setTypeParser(20, parseInt)`), bigints surface as `number`. Sanity-check that no id column overflows 2^53 (none of ours do today; they're sequence ints starting at 1).
  - **`Date` vs `string` for `timestamptz`:** consumer modules that compared timestamps as strings need to switch to `Date` comparisons or `.toISOString()` calls. Use the existing dashboard's `formatTimestamp` helpers where possible.
  - **`fake-platform-pool` is multiply-consumed** — its surface contracts get exercised by integration tests under `src/__tests__/integration/`. Re-shape it carefully; don't break the contract Slack tests rely on.

  ## Forbidden patterns

  - Adding a `mysql2` ↔ `pg` shim layer to "ease the transition." The card is explicit: drop mysql2. A shim survives into prod and rots.
  - Skipping `RETURNING` and falling back to `SELECT LAST_VALUE FROM <seq>`. PG's last-value-of-sequence is per-session and brittle; `RETURNING` is the canonical answer.
  - Casually dropping `fake-platform-pool`'s `field` packet emit. The integration tests assert on `FieldPacket` shape. Update both sides together.
  - Moving infra changes (compose, package.json) into this phase. Phase 1.4 owns those — keep this phase about modules + tests only.
