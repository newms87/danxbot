title: "Issues DB Mirror > Phase 1.4: Drop MySQL infra + Dockerfile/Makefile/deploy/docs sweep + operator E2E verification"
description: |-
  ## Context

  Final sub-phase of DX-152 (Phase 1 of the Issues DB Mirror epic, DX-151). Read the parent epic (DX-152) for the full split rationale + sub-phase table. **Blocked on Phase 1.3 (DX-166)** — until every consumer module ports to PG and the full vitest suite is green, removing MySQL infrastructure would break the build.

  This sub-phase removes every remaining MySQL trace, sweeps documentation, and runs end-to-end verification (some operator-driven). After this phase ships, `grep -rn "mysql2\|danxbot-mysql\|MYSQL\b\|mysql-client"` on the entire repo returns ZERO matches outside this card / the spec doc / ADR-style historical notes.

  Full epic spec: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md`.

  ## Approach

  1. **Compose files** (3 to update):
      - `docker-compose.yml` — remove the `danxbot-mysql` service block.
      - `docker-compose.prod.yml` — remove the `danxbot-mysql` service block.
      - `deploy/templates/docker-compose.prod.yml` — remove the `danxbot-mysql` service block.
      - Remove the `danxbot-mysql-data` named volume from any `volumes:` section.
      - The `DANXBOT_DB_PORT` env var conventions stay — only the engine moves.
  2. **`Dockerfile`** — `mysql-client` apt install → `postgresql-client`. Verify the image rebuilds clean (`make build`). The `mysql` shell utility inside the worker container (used for ad-hoc debugging via `docker exec`) becomes `psql`; mention this in the production-access rule under `.claude/rules/`.
  3. **`Makefile`** — search for any reference to `danxbot-mysql` in target recipes. The most common will be in log/exec helpers if they exist by name; container-name-based commands (`docker exec danxbot-mysql ...`) that document workflows in comments → update to `danxbot-postgres`.
  4. **Deploy:**
      - `deploy/secrets.ts` — `DANXBOT_DB_HOST/USER/PASSWORD/NAME` env var names stay; only the database engine changed. Verify the SSM materialization doesn't have any MySQL-specific paths.
      - `deploy/targets/<target>.yml` (currently `gpt`) — review for any MySQL-specific knobs (image tag overrides, volume names). Remove if found.
      - `deploy/terraform/` — review for MySQL-named resources, security groups, ECR images. Remove or rename.
      - `deploy/compose-infra.test.ts` — update any MySQL-specific assertions.
  5. **`package.json`** — remove `mysql2` from `dependencies`. Run `npm install`. Verify `package-lock.json` no longer has `mysql2` anywhere.
  6. **Documentation sweep:**
      - `CLAUDE.md` — every mention of MySQL → Postgres. Search for "MySQL", "mysql", "mysql2", "danxbot-mysql".
      - `.claude/rules/agent-dispatch.md` — mention of MySQL in the spawn / monitoring section.
      - `.claude/rules/docker-runtime.md` — Tools-available section currently lists `mysql` client; update.
      - `.claude/rules/production-access.md` — debugging recipes currently reference `docker exec danxbot-mysql mysql ...`; update.
      - `.claude/rules/dashboard.md` — uses MySQL containers in test setup; update.
      - `.claude/rules/make-commands.md` — verify no make target references mysql.
      - `README.md` — if it mentions the engine.
      - Any `docs/superpowers/specs/*.md` that references the engine name (the design doc itself can stay — it's the historical record).
  7. **Final greps** (run from `/home/newms/web/danxbot/repos/danxbot`):
      - `grep -rn "mysql2\|danxbot-mysql\|MYSQL\b" src deploy docker-compose*.yml Makefile Dockerfile package.json` — ZERO matches.
      - `grep -rn "mysql-client" Dockerfile` — ZERO matches.
      - `grep -rn "MySQL\|MariaDB" CLAUDE.md README.md .claude/rules/` — ZERO matches outside historical-record references that explicitly call themselves out.
  8. **Operator-driven E2E verification** (these AC items will end this card at `Needs Help` — the operator runs them on the host and reports back):
      - `make stop-infra && make launch-infra` — `danxbot-postgres` healthy, no `danxbot-mysql`.
      - `DANXBOT_CREATE_USER_PASSWORD=test make create-user LOCALHOST=1 USERNAME=test` — exits 0, prints API token.
      - Dashboard login at `http://localhost:5566` succeeds with `test` + that token.
      - `make launch-worker REPO=danxbot` — boots, `/health` returns 200, no DB errors in logs over 60s.
      - `make test-system-health` + `make test-system-dispatch` pass.

  Note on the operator-driven step: the dispatched agent CANNOT verify these — `make launch-infra` runs on the host, not inside the worker; `make launch-worker REPO=danxbot` would kill the running dispatch; `make test-system-*` requires running infra. The agent does the code work + the documentation sweep + the final greps + the vitest pass, then moves the card to `Needs Help` with a precise operator playbook in the comment. Operator runs the host commands and either (a) reports success → moves the card to `Done`, or (b) reports a failure → re-dispatches the card with the failure detail.

  ## Files

  Modify:

  - `docker-compose.yml`
  - `docker-compose.prod.yml`
  - `deploy/templates/docker-compose.prod.yml`
  - `Dockerfile`
  - `Makefile`
  - `deploy/secrets.ts`
  - `deploy/targets/gpt.yml` (or any target listed in `deploy/targets/`)
  - `deploy/compose-infra.test.ts`
  - `package.json`
  - `package-lock.json` (regenerated by `npm install`)
  - `CLAUDE.md`
  - `.claude/rules/*.md` (sweep — dashboard, docker-runtime, agent-dispatch, production-access, make-commands)
  - `README.md` (if applicable)

  Possibly modify (if found):

  - `deploy/terraform/*.tf`
  - Other `docs/**/*.md` references

  ## Acceptance

  Code-side (verifiable by the agent):

  - `danxbot-mysql` service removed from `docker-compose.yml`, `docker-compose.prod.yml`, `deploy/templates/docker-compose.prod.yml`.
  - `danxbot-mysql-data` volume removed from compose `volumes:` sections.
  - `Dockerfile` has `postgresql-client` (not `mysql-client`).
  - `Makefile` has no `danxbot-mysql` references.
  - `deploy/secrets.ts` and `deploy/targets/<target>.yml` have no MySQL-specific knobs.
  - `mysql2` removed from `package.json`; `npm install` clean.
  - Documentation sweep complete in `CLAUDE.md`, `.claude/rules/*.md`, `README.md`.
  - `grep -rn "mysql2\|danxbot-mysql\|MYSQL\b\|mysql-client" src deploy docker-compose*.yml Makefile Dockerfile package.json` returns ZERO matches.
  - `npx vitest run` (full suite) green.
  - `npx tsc --noEmit` clean.
  - `cd dashboard && npx vue-tsc --noEmit` clean.

  Operator-side (Needs Help comment with playbook; operator verifies and reports):

  - `make stop-infra && make launch-infra` brings up `danxbot-postgres` healthy; no `danxbot-mysql`.
  - `DANXBOT_CREATE_USER_PASSWORD=test make create-user LOCALHOST=1 USERNAME=test` exits 0 and prints an API token.
  - Dashboard login at `http://localhost:5566` succeeds with `test` + the token.
  - `make launch-worker REPO=danxbot` boots, `/health` returns 200, no DB errors in logs.
  - `make test-system-health` passes.
  - `make test-system-dispatch` passes.

  ## Notes for the agent

  - Plan to end this card at `Needs Help` with a precise operator playbook. The agent does ALL the code work (everything in the "Code-side" AC list above). Then comments on the card with explicit step-by-step host commands the operator runs, captures their pass/fail, and reports back.
  - The 7 operator AC items are the only non-agent-verifiable steps in the entire DX-152 epic. Once they pass, DX-152 (the epic) auto-completes via poller derivation, and DX-151's progression to Phase 2 (DX-153) starts.
  - **Don't preempt the production deploy.** This phase ships local-side. The `make deploy TARGET=gpt` step happens after the operator verifies locally — it's a separate operator action and is mentioned in the playbook but not gated by this card's ACs.
  - **Documentation has been bitten by partial sweeps before.** Use `grep -ril "mysql\|mariadb"` (case-insensitive) on the entire repo as a final pass — anything that comes back must either be intentional historical reference (call it out explicitly with a `<!-- historical -->` HTML comment) or get rewritten.

  ## Forbidden patterns

  - Removing `mysql2` from `package.json` BEFORE the consumer port phase (1.3) lands. The dispatch order via `blocked.by` prevents this — if you somehow start work on this phase before 1.3 is Done, immediately stop and verify 1.3's status.
  - Skipping the operator step. The card cannot be marked Done without operator verification — the agent's vitest + tsc passes are necessary but not sufficient. Mark Needs Help with the playbook; let the operator run + report.
  - Renaming `DANXBOT_DB_*` env vars. The brainstorm decision keeps the names stable so SSM keys don't churn — only the underlying engine changes.
