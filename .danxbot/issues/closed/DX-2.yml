      Note: the `DANXBOT_WORKER_PORT` entry in the error string is a side-effect of the test invoking `make` without `DANXBOT_WORKER_PORT` set in the dispatched agent's env (literal `${DANXBOT_WORKER_PORT}` was in the agent env, defaulted by `${VAR:-5561}` to `${DANXBOT_WORKER_PORT}`). With `DANXBOT_WORKER_PORT=5561` exported, the worker port placeholder is satisfied and only the three Trello entries remain unresolved. The hotfix card's Defect 1 description focuses on those three, which are the real stale entries.

