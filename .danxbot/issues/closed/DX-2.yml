title: "[Danxbot] Run Layer 3 verification of Phase 5 against renamed issue-worker workspace"
description: |-
  ## Context

  Phase 5 (commit `c8e8101`) shipped major changes inside `src/issue-tracker/sync.ts` (worker retro renderer + action-items spawner) AND renamed the workspace dir `trello-worker` â†’ `issue-worker`. Layer 1/2 tests cover both ends extensively (2567 backend + 179 dashboard tests green). Layer 3 (`make test-system-yaml-memory`, ~$0.05 per run) was NOT run as part of Phase 5 verification.

  Why it matters: Layer 3 dispatches REAL claude into the renamed workspace. It catches drift the unit + integration layers can't:

  - Workspace fixture loads cleanly under the new name end-to-end.
  - The dispatched session's JSONL contains zero `mcp__trello__*` tool calls (the AC #4 structural property).
  - Real claude's retro write path produces YAML the worker's new sync renders without surprise.
  - The `injectIssueWorkerAlias` symlink (one-release alias) doesn't break anything when the fixture creates an `issue-worker/` workspace + the alias creates a `trello-worker/` symlink alongside.

  ## Solution

  1. Boot the worker locally via `make launch-worker REPO=<some-repo>` (any repo with `DANX_TRELLO_ENABLED=false` and a populated `.danxbot/.env`).
  2. Run `make test-system-yaml-memory` from the repo root.
  3. Capture output to `/tmp/v5-l3.log`. If green, done. If red, file a bug card with the failure mode.
  4. (Optional) Run `make test-system-poller` if a Trello-enabled repo is available â€” exercises the full dispatch round-trip + critical-failure flag.

  ## Acceptance Criteria

  - `make test-system-yaml-memory` exit 0.
  - The captured JSONL contains zero `mcp__trello__*` entries.
  - The worker container's `<repo>/.danxbot/workspaces/` listing shows `issue-worker/` as a real directory and `trello-worker` as a symlink pointing to it.

  ## Out of scope

  - Production deploy (`make deploy TARGET=gpt`) â€” separate operator action.
  - Performance benchmarking of the new sync path.

  ## Notes

  This is a one-shot verification task; the next agent should pick it up FIRST before touching any code. If it fails, that's a Phase 5 hotfix; if it passes, all the other follow-up cards (`VeChPbUQ`, `AoIo3L6K`, the test-coverage and DRY cards) can ship in any order.
