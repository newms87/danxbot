      **Re-pickup state:** Card was moved back from Needs Help â†’ ToDo expecting Layer 3 to pass after hotfix `a417f99`. It does NOT pass yet because the running danxbot worker (PID 23459, started 13:15) was launched BEFORE the hotfix landed (13:44). `tsx` does not hot-reload TypeScript source â€” the worker process is still executing pre-hotfix `src/dispatch/core.ts`, so the new `DANXBOT_WORKER_PORT` auto-inject is not active.

      **Empirical proof (collected this dispatch):**

      ```
      $ curl -sS -X POST http://127.0.0.1:5561/api/launch \
          -H 'Content-Type: application/json' \
          -d '{"workspace":"issue-worker","task":"Reply OK ...","api_token":"system-test-token"}'
