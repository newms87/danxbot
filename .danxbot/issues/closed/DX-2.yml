      The verification revealed two Phase 5 defects. The card description itself states "If red, that's a Phase 5 hotfix" â€” by design this verification card does not fix; it produces a verdict and hands off. The hotfix card needs operator priority + a fresh dispatch round.

      **Findings (ground truth from this run):**

      Defect 1 â€” `src/poller/inject/workspaces/issue-worker/workspace.yml` declares `TRELLO_API_KEY`, `TRELLO_TOKEN`, `TRELLO_BOARD_ID` under `required-placeholders`, but Phase 4 dropped the trello MCP server and `workspace-shape.test.ts:38-40` even asserts those strings DO NOT appear in `.mcp.json`. `/api/launch` rejects the dispatch:

