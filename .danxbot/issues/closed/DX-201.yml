comments:
  - author: agent
    timestamp: 2026-05-08T00:00:00Z
    text: |
      ## Implementation summary

      - New helper `src/poller/inject/inject-root-mcp.ts` — `injectDanxIssueMcp({repoRoot})` returns `{changed, path}`. Merge-only: ADDS `danx-issue` if absent under `mcpServers`; never touches other entries OR top-level keys; preserves operator override byte-identical; bails on malformed JSON / non-object `mcpServers` value with `log.error`; atomic write via `.tmp` + `renameSync` with `.tmp` cleanup on rename throw.
      - Wired into `syncRepoFiles` in `src/poller/index.ts` after the gitignore stage, before `copyComposeOverride`. Logs once per `changed: true`. No-op cost is one read + one parse per tick per repo.
      - 12 unit tests covering: missing file → create, empty `mcpServers` → add, pre-existing entries preserved, canonical present → no-op (mtime + bytes unchanged), operator override preserved, malformed top-level JSON → no write, non-object top-level → no write, malformed `mcpServers` value → no write, top-level extra keys preserved, atomic-write success (no `.tmp` leftover), rename mid-write fails → `.tmp` cleaned + original intact + error rethrown (via `_fsHooks` test seam), two-tick idempotency.
      - 1 integration test in `src/poller/index.test.ts` asserts `syncRepoFiles` writes `<repo>/.mcp.json.tmp` containing `danx-issue` + `@thehammer/danx-issue-mcp` per repo per tick.
      - Doc: replaced the prohibition section in `.claude/rules/docker-runtime.md` with the new "Root `.mcp.json` injection contract" section. Rewrote the "Strict isolation from danxbot" paragraph to acknowledge the single injected server. No other doc carried the prohibition prose; sweep clean.

      ## Verification

      - `npx vitest run src/poller/inject/inject-root-mcp.test.ts` — 12/12 green
      - `npx vitest run src/poller/index.test.ts` — 177/177 green (176 prior + 1 wiring)
      - `npx tsc --noEmit` — clean
      - `npx vitest run` (full suite) — 3468 pass, 8 fail. The 8 failures are pre-existing in `src/__tests__/integration/poller-memory-tracker.test.ts` (`Cannot set property current of #<Object> which has only a getter`) — vi.mock pollution from a `defineProperty` that reassigns `trackerHandle.current` as a getter without restoring it. Reproduces in isolation on `main` without my changes; unrelated.
      - Smoke: ran `injectDanxIssueMcp` against an empty `/tmp` repo — produced canonical `.mcp.json` with the documented entry. `gpt-manager/.mcp.json` already contains a matching `danx-issue` entry; helper would no-op on it (verified by the "no-op when canonical present" unit test).

      ## AC #10 — partial

      Left `checked: false` because the literal "open Claude Code at the repo root, type `/mcp`, see `danx-issue` listed" is an operator-driven interactive step the agent cannot run from this session. Mechanical chain is verified: helper produces canonical entry → file written at `<repo>/.mcp.json` → matches the entry shape Claude Code reads. Operator action: `cd <repo> && claude` then `/mcp`.
