type: Feature
title: Inject danx-issue MCP into target repos' root .mcp.json (merge, never clobber)
description: |-
  ## Context

  Today host-session `claude` invocations at a target repo's root see ZERO MCP servers. Result: orchestration-style sessions (epic + phase card creation, plan writing) cannot atomically allocate `DX-N` ids. Operators end up hand-picking ids by `ls`-ing the issues dir, racing the worker, and producing collisions (witnessed in this session: DX-163 / DX-165 / DX-166 collided with the worker's auto-split of DX-152).

  The right fix: the user runs `claude` at the repo root; the root `.mcp.json` has `danx-issue` available; `danx_issue_create` allocates ids atomically server-side.

  The wrong fix (which we are NOT doing): wipe or reshape the user's existing root `.mcp.json`. Danxbot is an add-on service — it owns `<repo>/.danxbot/`, not the rest of the repo. Any change to a file outside `.danxbot/` MUST be additive and idempotent.

  ## Solution

  ### 1. Remove the prohibition rule

  Delete the prose that says "Danxbot repo no longer ships a repo-root `.mcp.json`" and "If you add a workspace-scoped MCP config in the future, declare it inside the workspace dir — never at repo root" from `.claude/rules/docker-runtime.md` (the section under "Interactive CLI — no repo-root MCP exposure"). The rationale was protecting the dev's interactive `claude` from picking up worker-only MCP servers (Trello, Playwright, etc). That is still important — the new contract honors it because we only inject `danx-issue`, not the worker's broader MCP surface.

  Audit + edit any other doc that repeats the prohibition (`CLAUDE.md`, `agent-dispatch.md`, this card, the workspace-dispatch spec).

  Keep the principle: workers' per-dispatch MCPs still live inside the workspace dir (`<repo>/.danxbot/workspaces/<name>/.mcp.json`) — this card does NOT change worker dispatch behavior.

  ### 2. Inject step — merge `danx-issue` into root `.mcp.json`

  New helper: `src/poller/inject/inject-root-mcp.ts` (and `.test.ts`).

  ```ts
  export interface InjectRootMcpOptions { repoRoot: string; danxbotEnvPath: string; }
  export function injectDanxIssueMcp(opts: InjectRootMcpOptions): { changed: boolean; path: string };
  ```

  Behavior:

  - Read `<repoRoot>/.mcp.json` if it exists. Parse as JSON. If parse fails, log loudly + bail (do NOT overwrite a malformed user file).
  - If the file does not exist, create it with shape `{"mcpServers": {}}`.
  - In the `mcpServers` map, ensure the `danx-issue` key exists. If absent, add:

    ```json
    "danx-issue": {
      "type": "stdio",
      "command": "npx",
      "args": ["-y", "@thehammer/danx-issue-mcp"],
      "env": {
        "DANX_REPO_ROOT": "${DANX_REPO_ROOT}",
        "DANX_TRACKER": "${DANX_TRACKER}",
        "TRELLO_API_KEY": "${TRELLO_API_KEY}",
        "TRELLO_API_TOKEN": "${TRELLO_API_TOKEN}"
      }
    }
    ```

    Env vars resolve from `<repoRoot>/.danxbot/.env` at agent runtime — same pattern as the workspace `.mcp.json`.

  - If the key exists already, **leave it alone** (do not stomp the user's customizations). Idempotent — re-running is a no-op when up-to-date.
  - **Never delete or rewrite any other key under `mcpServers`.** Pre-existing servers (`playwright`, `context7`, user's own MCPs, etc.) survive byte-for-byte.
  - Preserve top-level fields outside `mcpServers` byte-for-byte (the user may have other root-level config).
  - Pretty-print with 2-space indent + trailing newline (match the rest of the codebase's JSON style).
  - Lock-file pattern: write to `.mcp.json.tmp` then atomic rename — protects against poller crash mid-write.

  Wire into the poller's existing `syncRepoFiles` step in `src/poller/index.ts`:

  ```ts
  const result = injectDanxIssueMcp({ repoRoot: repo.localPath, danxbotEnvPath: ... });
  if (result.changed) log.info(`[${repo.name}] root .mcp.json updated with danx-issue server`);
  ```

  Runs every tick. Cheap when no-op.

  ### 3. Document the contract

  Add a section to `.claude/rules/docker-runtime.md` (replacing the deleted prohibition) titled "Root `.mcp.json` injection contract" that documents:

  - Danxbot ADDS the `danx-issue` server entry to `<repo>/.mcp.json` on every poll tick.
  - Danxbot NEVER deletes, rewrites, or reorders any other entry.
  - Operators can opt out by adding `danx-issue` themselves with different content — the poller leaves whatever exists alone.
  - Operators can also gitignore the file — danxbot still rewrites it locally on each tick.

  ## Files

  Create:

  - `src/poller/inject/inject-root-mcp.ts`
  - `src/poller/inject/inject-root-mcp.test.ts`

  Modify:

  - `src/poller/index.ts` — call `injectDanxIssueMcp` per repo per tick
  - `.claude/rules/docker-runtime.md` — delete the prohibition prose; add the injection-contract prose
  - `CLAUDE.md` — sweep for any "no repo-root .mcp.json" mention
  - `docs/superpowers/specs/2026-04-24-workspace-dispatch.md` (or whichever epic doc carried the rule) — sweep
  - `<repo>/.gitignore` (every connected repo) — verify `.mcp.json` is NOT ignored (operators may want the file committed; danxbot doesn't dictate)

  ## Test plan (TDD)

  Unit (`inject-root-mcp.test.ts`):

  1. Failing test: file does not exist → `injectDanxIssueMcp` creates it with the canonical danx-issue server. `changed: true`.
  2. Failing test: file exists with empty `mcpServers` → adds danx-issue. `changed: true`.
  3. Failing test: file exists with `mcpServers.playwright = {...}` AND no danx-issue → playwright preserved byte-identical, danx-issue added. `changed: true`.
  4. Failing test: file already has the canonical danx-issue server → no-op. `changed: false`. Mtime unchanged.
  5. Failing test: file has `danx-issue` with different content (operator override) → leave it alone. `changed: false`.
  6. Failing test: malformed JSON in existing file → log error, no write, `changed: false`. (Verify by reading file mtime + content.)
  7. Failing test: top-level keys outside `mcpServers` (e.g. `extensions: [...]`) preserved byte-identical.
  8. Failing test: atomic write — simulate crash mid-write via mock fs that throws after `.tmp` rename → original file unchanged.

  Integration (`src/poller/index.test.ts` extension):

  9. After one poll tick, every connected repo's `<root>/.mcp.json` has `danx-issue` under `mcpServers`. Pre-existing servers in any test fixture survive.
  10. Second tick is a no-op for every repo (changed: false x N).

  Manual smoke:

  11. `cd <repo> && claude` (host) → run `/mcp` (Claude Code's debug command) → see `danx-issue` listed. Type `mcp__danx-issue__danx_issue_list({})` → returns the open issues list.

  ## Acceptance

  - `injectDanxIssueMcp` exists + idempotent + merge-only + atomic-write.
  - Pre-existing `mcpServers` entries (playwright, context7, user's own) survive every tick byte-identical.
  - Pre-existing top-level keys outside `mcpServers` survive byte-identical.
  - Operator override of `danx-issue` (different command/args/env) survives byte-identical.
  - Malformed JSON → no overwrite, log error.
  - Poller integration runs the inject every tick for every repo.
  - Prohibition rule deleted from every doc.
  - 11 tests pass; full `vitest run` green; `tsc + vue-tsc` clean.
  - Manual smoke at danxbot root + at least one connected repo (gpt-manager) — `claude` sees `danx-issue` MCP at root.

  ## Out of scope

  - Adding any OTHER MCP server at root — only `danx-issue`. Worker-only MCPs (Trello, Playwright) still live inside per-workspace dirs.
  - Changing the worker's per-dispatch MCP injection (still through `dispatch()` overlay).
  - Building UI for this in the dashboard.
