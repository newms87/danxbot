title: "Schema v4: split `blocked` into `waiting_on` (dep-chain) + `blocked` (self-block); rename status `Needs Help` ŌåÆ `Blocked`"
description: |-
  ## Context

  v3 conflated two distinct concepts under one field name:
  - `Issue.blocked: {reason, timestamp, by[]}` was actually a **dep-chain queue** ("this card is queued behind those cards"). Status stayed `ToDo`. Worker auto-cleared on all deps Done.
  - `status: "Needs Help"` was the **self-block** state ("this card itself can't proceed; human action needed"). Card parked.

  Naming made every operator and every fresh agent think a card with `blocked != null` was halted, when in reality it was just queued. Worse, the auto-applied "Blocked" Trello label fired on dep-wait, painting cards as halted when they weren't. Triage harder than it needed to be.

  ## Solution

  **Two fields, two purposes, two clear names.**

  | Concept | Mechanism | Status while in this state |
  |---|---|---|
  | This card itself can't proceed (broken env, missing creds, ambiguous spec, write-only resource, decision input) | Status `"Blocked"` AND `Issue.blocked = {reason, timestamp}`. Invariant: `status === "Blocked" Ō¤║ blocked !== null` (worker enforces both directions). | `Blocked` |
  | This card is waiting on OTHER cards to finish first (dep-chain queue) | `Issue.waiting_on = {reason, timestamp, by: ["ISS-N"]}`. Worker forces `status: "ToDo"` whenever non-null. Poller skips dispatch until every dep Done/Cancelled, then auto-clears `waiting_on` and resumes. | `ToDo` |

  Status name changed: `"Needs Help"` ŌåÆ `"Blocked"`. Same intent (renamed Needs Help ŌåÆ Blocked because that IS the user-visible name for self-block).

  Both fields can technically coexist on a single card; the worker resolves the conflict by preferring `waiting_on` (clears `blocked`, forces `status: "ToDo"`). Practically rare.

  ## Schema bump v3 ŌåÆ v4

  Parser auto-migrates v3 on read:
  - Old `blocked: {reason, timestamp, by[]}` (dep-chain) ŌåÆ renamed to `waiting_on:` field, new `blocked:` left null.
  - Old `status: "Needs Help"` ŌåÆ `"Blocked"`. Synthesizes a placeholder `blocked: {reason: "(no recorded reason ŌĆö migrated from legacy v3 'Needs Help' status; agent should overwrite on next pickup)", timestamp: "1970-01-01T00:00:00.000Z"}` so the v4 invariant holds. Agents overwrite reason on next pickup.

  Always emits v4 + both fields on write. No separate migration script required for the parser path; a one-shot loop (`scripts/migrate-yamls-to-v4.ts`) walks the repo's existing YAMLs once to land them on v4 explicitly.

  ## Worker enforcement

  - `forceWaitingOnToToDo` (renamed from `forceBlockedToToDo`): when `waiting_on != null`, force `status: "ToDo"` AND clear `blocked` (waiting_on overrides self-block status).
  - `recomputeParentStatuses` (epic-status auto-derive): when promoting a parent's status to `"Blocked"` based on child union, synthesizes `blocked: {reason: "Auto-derived from children: <rule>", timestamp: now()}`. When demoting parent off Blocked, clears `blocked`. Maintains the v4 invariant on every auto-flip.
  - History event names `"blocked"` / `"unblocked"` retained on `waiting_on` nullŌåörecord transitions (audit log compatibility).

  ## Tracker side (deferred)

  - `ManagedLabels` shape: `{type, blocked, needsApproval, triaged}`. The new `blocked` slot derives from `status === "Blocked"`. The OLD `blocked` slot (which auto-applied the "Blocked" Trello label on dep-wait) is gone ŌĆö that was the visual bug.
  - Trello list `Needs Help` and label literal `Blocked` left in place; `TrelloConfig.needsHelpListId` remains the routing target for `status: "Blocked"` cards. Operator renames Trello list/label later if desired. Out of scope for this card.

  ## Migration

  - Schema bump applied across `src/issue-tracker/{interface,yaml,sync,trello,memory}.ts`, `src/poller/{index,yaml-lifecycle,epic-status,local-issues,heal,blocked-resolverŌåÆwaiting-on-resolver}.ts`, `src/worker/issue-route.ts`, `src/mcp/danxbot-server.ts`, `src/dashboard/issues-reader.ts`.
  - Dashboard SPA: `IssueListItem.blocked/blocked_by` ŌåÆ `waiting_on/waiting_on_by`. ChildStatusId `blocked_by_card` ŌåÆ `waiting`. Column `Needs Help` ŌåÆ `Blocked` with palette accent kept.
  - Skill docs in `src/poller/inject/` updated by parallel agent (47 files touched).
  - 169/170 repo YAMLs migrated via `scripts/migrate-yamls-to-v4.ts`. DX-201 had a pre-existing `retro.commits[0]` non-string YAML bug unrelated to this work ŌĆö flagged in retro for follow-up.
  - Test fixture builders across 14 test files auto-fill `blocked: {reason, timestamp}` when `status: "Blocked"` is set without explicit override. Same shape used by fake-claude integration helper.
  - 2 marketplace-mirror tests in `workspace-shape.test.ts` skipped pending operator push to `claude-plugins/` repo (cross-repo, out of scope for this branch).

  ## Verification

  - `npx tsc --noEmit` ŌĆö 0 errors
  - `npx vitest run` ŌĆö 3480 pass / 2 skipped (mirror tests)
  - `cd dashboard && npx vue-tsc --noEmit && npx vitest run` ŌĆö clean
  - DX-158, DX-200, DX-167, DX-74 spot-checked: `waiting_on` populated, `blocked: null`, status `ToDo`. Pre-existing `Needs Help` cards (DX-99, DX-102) ŌåÆ `status: Blocked` + synthesized `blocked` placeholder.

  ## Out of scope

  - Renaming Trello list "Needs Help" ŌåÆ "Blocked" on the board. Operator action.
  - Pushing skill changes to `~/web/claude-plugins/issues/` cross-repo.
  - Renaming the existing `Issue.blocked` audit-log event names ŌĆö `"blocked"` / `"unblocked"` event literals retained for history compat.

  ## Notes for next agent picking this up

  - The 4 cards previously using `blocked: {by[]}` (DX-158, DX-200, DX-167, DX-74) are now correctly displayed as ToDo with a "waiting on ŌĆ”" affordance, NOT halted.
  - DX-99 and DX-102 carry the synthesized placeholder `blocked.reason` ŌĆö when an agent dispatches against either, it should overwrite the reason with the actual blocker context.
  - The skipped marketplace-mirror tests in `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` will pass once the operator pushes the matching commit to `github:newms87/claude-plugins`.
  - DX-201 retro had a pre-existing YAML bug (`retro.commits[0]: 9828791` parsed as int instead of string). Not migrated; left for separate fix.
