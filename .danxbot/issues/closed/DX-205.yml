retro:
  good: |
    - Plugin source rewrite was a clean diff against the in-repo SOT — the in-repo files at `src/poller/inject/workspaces/issue-worker/.claude/skills/**` were already v4-correct, so syncing was mechanical (`cp` per file) and the byte-for-byte mirror test confirms zero drift.
    - Caught and fixed three downstream plugin docs that still leaked v3 vocabulary (`pipeline/skills/pipe-plan/SKILL.md` had a bogus `blocked.action_required` field that never existed in any schema; `pipe-commit` + `halt-flag` + `danxbot/SKILL.md` referenced "Needs Help" in retro/halt/poll-decision contexts) — same `grep -nE "Needs Help|blocked\\.by"` sweep would have missed them if the search were narrower.
    - Test re-enable surfaced one bug it was meant to catch: the TTL regex still asserted `Needs Help|3h` + `Blocked|1h`, which is v3. Updated to `Blocked|3h` + `Waiting On|1h` so the assertion now pins the v4 cadence table (Review 24h / Blocked 3h / Waiting On 1h).
  bad: |
    - The plugin `pipe-plan/SKILL.md` Move B procedure referenced `blocked.action_required` — a field that has never existed in `Issue.blocked` shape (v3 was `{reason, timestamp, by[]}`, v4 is `{reason, timestamp}`). That doc had been wrong since whenever it was written; DX-202's schema rewrite only made the wrong-ness visible. A separate pass over plugin docs to verify every field reference against `src/issue-tracker/interface.ts` would have caught it earlier.
    - `git add .danxbot/issues/open/DX-205.yml` failed because `.danxbot/issues` is gitignored — terminal-status YAMLs flow back through the `danx_issue_save` MCP path, not the git index. Worth a one-line rule callout next time someone tries to commit a YAML directly.
