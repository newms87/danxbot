title: "[Action Item from DX-202] Push schema-v4 skill changes to claude-plugins repo + reload + unskip mirror tests"
description: |-
  ## Context

  DX-202 (schema v4 — `Issue.blocked` self-block field + `Issue.waiting_on` dep-chain queue + status `"Needs Help"` → `"Blocked"`) updated the in-repo skill docs at `src/poller/inject/workspaces/issue-worker/.claude/skills/**` but did NOT push the matching commit to the cross-repo plugin source `~/web/claude-plugins/issues/skills/issue-card-workflow/SKILL.md` (and any other plugin-side skills that document the OLD `blocked` field semantics or the OLD `Needs Help` status).

  Two tests in `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` are currently `.skip`'d:
  - `` `danx-triage-card/SKILL.md` ships with the per-status TTL contract + ICE rubric + decision enum ``
  - `` `danx-triage-card/SKILL.md` matches the claude-plugins marketplace mirror byte-for-byte ``

  These will pass once the operator pushes the matching commit to `git@github.com:newms87/claude-plugins`. Re-enable them after the push.

  ## Solution

  1. Diff the in-repo skill docs vs the plugin-source equivalents:
     - `~/web/claude-plugins/issues/skills/issue-card-workflow/SKILL.md`
     - any other plugin-source skills referencing the old `blocked.by[]` data field shape, the old `"Needs Help"` status string, or the conceptual "Blocked vs Waiting On" / "Needs Help vs Blocked" distinction.
  2. Apply the same v4 rewrite as `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` and friends — the in-repo files are the canonical source of the new wording.
  3. Commit + push to `git@github.com:newms87/claude-plugins`.
  4. `/reload-plugins` in any active sessions consuming the marketplace.
  5. Remove the `.skip` from the two marketplace-mirror tests in `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` and verify they pass.
  6. Container workers auto-update via `autoUpdate: true` — verify on the next poll tick that `workspace-shape.test` passes locally + in CI.

  ## Key files

  - `~/web/claude-plugins/issues/skills/issue-card-workflow/SKILL.md` — main cross-repo skill source
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` — in-repo canonical (already updated)
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-epic-link/SKILL.md`
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage-card/SKILL.md`
  - `src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` — `.skip` removal site
  - `~/.claude/CLAUDE.md` — global plugin source repo (`github:newms87/claude-plugins` marketplace)

  ## Verification

  - In-repo skill matches plugin-source skill byte-for-byte
  - `npx vitest run src/poller/inject/workspaces/issue-worker/workspace-shape.test.ts` — 0 skipped
  - `npx vitest run` total skipped count drops from 2 → 0

  ## Out of scope

  - Renaming the `claude-plugins` repo / directory layout
  - Touching any plugin-source skill not affected by the v4 schema rename
