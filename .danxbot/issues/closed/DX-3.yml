      ## Verification â€” tests already shipped in hotfix `a417f99`

      The test file already exists at `src/poller/issue-worker-alias.test.ts` (named after the helper module rather than the originally-proposed `inject-issue-worker-alias.test.ts` â€” the helper was extracted into its own `issue-worker-alias.ts` module in the hotfix, so the natural sibling-name pattern was used).

      **Coverage check (each test calls `injectIssueWorkerAlias`):**

      1. `creates a trello-worker symlink to issue-worker on a fresh install` â€” covers the "no alias entry yet" branch.
      2. `is a no-op when issue-worker is missing` â€” fail-soft branch (no dangling symlink).
      3. `leaves a correct existing symlink untouched` â€” AC branch 3 (correct symlink â†’ no-op, no churn). Asserts mtime unchanged.
      4. `recognizes a relative-target symlink as correct` â€” defends the resolve-through-symlink comparison.
      5. `rewrites a stale symlink that points at the wrong target` â€” AC branch 2 (wrong-target â†’ replaced).
      6. `converts a pre-P5 danxbot-authored real trello-worker/ directory to a symlink` â€” danxbot-owned-dir branch.
      7. `leaves an operator-authored trello-worker/ directory untouched (no workspace.yml)` â€” AC branch 1 (operator dir â†’ not clobbered).
      8. `leaves an operator-authored trello-worker/ with a malformed/empty workspace.yml untouched` â€” fail-safe ambiguous-data branch.
      9. `leaves an operator-authored trello-worker/workspace.yml with a different name untouched` â€” name-mismatch branch.

      All nine drive a fresh `mkdtempSync(resolve(tmpdir(), "danxbot-alias-test-"))` per `beforeEach`, no fs mocks. The three required AC cases are covered (#7 = populated dir, #5 = wrong-target symlink, #3 = correct symlink no-op).

      **Run results (this dispatch):**

      - `npx vitest run src/poller/issue-worker-alias.test.ts` â†’ 9 passed, exit 0, 17ms.
      - `npx vitest run` â†’ 2588 tests passed across 137 files. Vitest exits 1 due to a pre-existing teardown leak in `src/__tests__/integration/yaml-lifecycle-memory-tracker.test.ts` (EventForwarder writes a JSONL to `<testState.logsDir>/event-queue/*.jsonl` after `afterAll` ran `rmSync` on `logsDir`, surfacing as `ENOENT` unhandled rejection). Reproducible across three runs; one run additionally caught a separate flake in `src/__tests__/integration/dispatch-pipeline.test.ts` (assistant-summary assertion race in fake-claude). Neither test was touched by Phase 5 nor by this card; both are pre-existing and tracked as action items.
