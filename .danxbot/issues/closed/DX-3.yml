title: "[Danxbot] Test coverage: injectIssueWorkerAlias unit tests against real fs"
description: |-
  ## Context

  Phase 5 (commit `c8e8101`) added `injectIssueWorkerAlias` in `src/poller/index.ts` (~line 615). It creates a one-release symlink alias `<repo>/.danxbot/workspaces/trello-worker â†’ issue-worker` so existing dispatches that hardcode the old workspace name keep resolving.

  The function has three branches that test-reviewer flagged as uncovered:

  1. **Populated `trello-worker/` directory exists** â€” must NOT be clobbered (operator-authored workspace precedent: gpt-manager's `schema-builder/`).
  2. **Broken or wrong-target symlink exists** â€” must be replaced with a fresh one pointing at `issue-worker`.
  3. **Correct symlink already exists** â€” must be a no-op (no rm, no resymlink â€” silent disk churn would log every poll tick).

  The existing `src/poller/index.test.ts` mocks `node:fs` with `vi.fn()` no-ops for `symlinkSync` / `readlinkSync` / `lstatSync`, so the alias logic IS reached but its branches aren't asserted on.

  ## Solution

  Create a new test file `src/poller/inject-issue-worker-alias.test.ts` that drives the helper against a REAL `mkdtempSync` tmpdir (not the mocked-fs harness). Three test cases:

  1. **populated directory â†’ NOT clobbered:** mkdir `<tmpdir>/issue-worker` + `<tmpdir>/trello-worker/foo.txt`. Call the helper. Assert `<tmpdir>/trello-worker/foo.txt` still exists, `<tmpdir>/trello-worker` is still a directory (not a symlink).

  2. **broken / wrong-target symlink â†’ replaced:** mkdir `<tmpdir>/issue-worker`. `symlinkSync(<tmpdir>/some-other-target, <tmpdir>/trello-worker)`. Call the helper. Assert `readlinkSync(<tmpdir>/trello-worker)` resolves to `<tmpdir>/issue-worker`.

  3. **correct symlink â†’ no-op:** mkdir `<tmpdir>/issue-worker`. `symlinkSync(<tmpdir>/issue-worker, <tmpdir>/trello-worker)`. Call the helper. Spy on `rmSync` and `symlinkSync` and assert NEITHER fired.

  Either export `injectIssueWorkerAlias` from `src/poller/index.ts` (preferred â€” tighter unit test) or drive it indirectly via `syncRepoFiles` â†’ `injectDanxWorkspaces` with the full plural-workspace fixture mirroring real disk state.

  ## Key files

  - `src/poller/index.ts` â€” `injectIssueWorkerAlias` (export it for testing)
  - `src/poller/inject-issue-worker-alias.test.ts` â€” new

  ## Acceptance Criteria

  - Three test cases above, each driving a real `mkdtempSync` tmpdir, not the existing mocked-fs harness.
  - `npx vitest run src/poller/inject-issue-worker-alias.test.ts` â†’ green.
  - `npx vitest run` â†’ still green (no regressions).
  - The function is invoked at least once in each test (no skipped branches per `c8 coverage` if applicable).

  ## Out of scope

  - Layer 3 system-test coverage (covered by Trello `VeChPbUQ` follow-up if/when the poller refactors to MemoryTracker).
  - Coverage of `injectMcpServers` (different helper, separate code path).
