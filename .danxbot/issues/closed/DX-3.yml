      ## Retro

      **What went well:** Test file shipped alongside the hotfix that introduced the helper, so verification was a straight read + run. The 9-test matrix covers more branches than the 3 ACs required (relative-symlink, malformed manifest, name-mismatch operator dir).
      **What went wrong:** Two pre-existing integration-test flakes surfaced during AC #3 verification (yaml-lifecycle-memory-tracker teardown leak; dispatch-pipeline summary race). Vitest exit-1 from the teardown leak masks real-failure detection in CI.
      **Action items:**
      - Fix yaml-lifecycle-memory-tracker.test.ts teardown leak. afterAll rmSync on testState.logsDir runs while EventForwarder still has pending writes to <logsDir>/event-queue/*.jsonl, producing ENOENT unhandled rejection that fails Vitest exit even when all 2588 tests pass. Drain or stop the forwarder before rmSync, or unref the queue write loop. Reproduce: npx vitest run from repo root.
      - Fix dispatch-pipeline.test.ts 'extracts summary from last assistant text in JSONL' race. Test reads the assistant summary before fake-claude has finished writing the final text block, so it captures the intermediate 'I will help you with that task.' instead of 'Task completed successfully'. Likely needs a wait-for-final-block helper or to drive the assertion off the watcher's terminal entry rather than the in-flight one.
      **Commits:** a417f99 (referencing â€” tests shipped in hotfix; this card is the verification gate, no new commit)
