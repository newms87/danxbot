title: "[Danxbot] DRY: extract sync.ts comment-edit reflection + document retro/action-items coupling"
description: |-
  ## Context

  Phase 5 (commit `c8e8101`) added two near-identical in-place-edit reflection branches in `src/issue-tracker/sync.ts` finalize block (~lines 386-412). Code-reviewer flagged the duplication:

  ```typescript
  if (
    retroEditedCommentId !== null &&
    retroEditedNewText !== null &&
    base.id === retroEditedCommentId
  ) {
    return { ...base, text: retroEditedNewText };
  }
  if (
    actionItemsEditedCommentId !== null &&
    actionItemsEditedNewText !== null &&
    base.id === actionItemsEditedCommentId
  ) {
    return { ...base, text: actionItemsEditedNewText };
  }
  ```

  Two paths today; a third (e.g., a future structured-status comment edit) would copy-paste a third branch. The pattern is `Map<commentId, newText>` keyed by id.

  Also: the retro renderer and action-items spawner couple via the rendered retro body â€” when `retro.action_items[]` changes, the retro comment ALSO edits because `renderRetroComment` includes a `**Action items:**` bullet list rendered from `local.retro.action_items`. This is intentional but non-obvious; the test "incremental: appending an action_item spawns ONLY the new title" expects 3 writes (1 spawn + 2 edits) and the explanation lives only in that test's comment. Worth a header comment in `sync.ts`.

  ## Solution

  1. Replace the two `xEditedCommentId` / `xEditedNewText` pairs in `syncIssue` with a single `editedCommentTexts: Map<string, string>` keyed by comment id. Both the retro renderer and action-items spawner push into it after issuing `tracker.editComment`. The `finalComments` mapping reads via `editedCommentTexts.get(base.id)`.

  2. Add a header comment to `src/issue-tracker/sync.ts` near the action-items spawner block (around line 263) explaining the coupling: when `retro.action_items[]` changes, BOTH the bookkeeping comment AND the retro comment get edited because the retro body's `**Action items:**` bullet list is rendered from the same field. This is intentional â€” the retro is the human-readable summary, the bookkeeping is the machine-readable spawn ledger. Verified by the "incremental: appending an action_item" test in `sync.test.ts`.

  3. (Optional) If a third edit-source lands later, extend the map naturally without copy-pasting a new variable pair.

  ## Key files

  - `src/issue-tracker/sync.ts` (~lines 263, 271-320, 347-373, 386-412)

  ## Acceptance Criteria

  - `editedCommentTexts: Map<string, string>` replaces the four `xEditedCommentId`/`xEditedNewText` variables.
  - The two branches in the `finalComments` `.map` block collapse to one lookup.
  - A header comment in `sync.ts` near the action-items spawner explains the retro/action-items coupling (1-3 sentences).
  - All existing tests pass; no behavior change.
  - `npx vitest run src/__tests__/issue-tracker/` â†’ green.

  ## Out of scope

  - Test additions (existing tests already pin behavior).
  - Cosmetic refactor of `renderRetroComment` formatting.
