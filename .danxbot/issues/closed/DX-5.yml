  - id: 69f784462a6b5d4865b5ac5f
    author: danxbot
    timestamp: 2026-05-03T17:22:14.032Z
    text: |-
      <!-- danxbot -->

      ## Bug Diagnosis

      **Problem:** the action-items bookkeeping comment introduced in Phase 5 (commit `c8e8101`) used U+2192 '→' as its `<title> → <external_id>` separator. The `validateRetro` validator rejected only the canonical glyph, so an agent typing `Fix: A -> B` or pasting `⟶` / `➔` / `➡` into a `retro.action_items[i]` produced valid YAML but risked silent misattribution on reread of the bookkeeping comment.

      **Root Cause:** the separator was a glyph that humans (and agents quoting natural-language text) plausibly type. Validator-side blocklists for every Unicode arrow lookalike + ASCII bigram are leaky by construction — there is always one more glyph.

      **Solution:** Option A from the card. Swap the separator to U+0009 HORIZONTAL TAB. Tab is invisible in tracker UI, never appears in human prose, and `validateRetro` rejects it loudly in titles via a single `.includes("\t")` check. Arrow lookalikes (`->`, `=>`, `→`, `⟶`, `➔`, etc.) are now inert title text. The new `BOOKKEEPING_SEP` constant is exported from `sync.ts` and imported by `yaml.ts` so renderer + validator share one source of truth. Parser tightened: `indexOf` (validator guarantees one separator), throws on multi-tab lines, no CRLF tolerance, no legacy `→` fallback (per CLAUDE.md zero-tech-debt rule).

      **Migration:** production had not shipped Phase 5's bookkeeping comments when this card was filed, so this is likely a no-op. If any pre-Phase-5 deployment carries the old `→` format on a live tracker card, the next sync throws "Malformed action-items bookkeeping line" — operator deletes the offending comment from the tracker UI and the next sync re-creates a fresh tab-separator comment.
