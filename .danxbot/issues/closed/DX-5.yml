title: "[Danxbot] Reject arrow lookalikes in retro.action_items (silent bookkeeping corruption risk)"
description: "## Context


  Phase 5 (commit `c8e8101`) introduced a bookkeeping comment for spawned action-items cards with line format `- <title> → <external_id>`. `validateRetro` in `src/issue-tracker/yaml.ts` rejects the canonical `→` (U+2192) in `retro.action_items[i]` so titles cannot collide with the separator.


  **Gap:** lookalike characters and ASCII bigrams that VISUALLY render as arrows are NOT rejected. An agent typing `Fix: A -> B`, or copy-pasting from a doc with `⟶` / `➔` / `➡`, lands valid YAML but produces a bookkeeping comment that the parser will misattribute on reread — `parseActionItemsBookkeeping` in `src/issue-tracker/sync.ts` uses `lastIndexOf(\"→\")` so an embedded canonical `→` inside a title (which the validator catches) is the only case actually closed; other arrow shapes pass validation but won't appear in the bookkeeping anyway, so the reread is fine for them.


  The real bug surface: titles that mix the canonical `→` with a leading lookalike. Today validate rejects ANY `→` in titles → this case is closed defensively. So this card is mostly preventative hardening + future-proofing.


  ## Solution


  Pick ONE of:


  ### Option A: Switch the separator to a sentinel that no human will ever type


  Change `renderActionItemsBookkeeping` and `parseActionItemsBookkeeping` in `src/issue-tracker/sync.ts` to use a non-printing sentinel (e.g. `\x01` or `\\t`) instead of `→`. Pros: bulletproof against any human-typed lookalike. Cons: bookkeeping comment becomes harder to read on the tracker UI; existing prod bookkeeping comments would need a one-time migration.


  ### Option B: Tighten the validator to reject ASCII bigrams + Unicode lookalikes


  Extend `validateRetro` in `src/issue-tracker/yaml.ts` to also reject:

  - `->`, `=>` (ASCII bigrams that visually render as arrows)

  - `⟶` (U+27F6), `➔` (U+2794), `➡` (U+27A1), `→` (U+FE3A), `⇒` (U+21D2), `⇨` (U+21E8) (Unicode lookalikes)


  Pros: reads `→` in the bookkeeping comment when humans inspect the tracker. Cons: rejects legitimate English usage like \"Fix: A -> B\" — pushes agents toward `:` or `then` instead.


  **Recommendation:** Option A. The bookkeeping comment is internal danxbot bookkeeping, not human-facing prose; a sentinel is fine. Document in the comment header that `→` appears in the rendered output ONLY for human readability of the spawned-cards comment, while the parse path uses the sentinel.


  If Option A: the migration step adds risk. Run a one-time scrub on prod that re-parses bookkeeping comments under the OLD format, then re-renders under the new. Or accept that any pre-Phase-5-N bookkeeping comments will fail to parse and require manual intervention — production hasn't shipped Phase 5 yet at file time, so likely a no-op.


  ## Key files


  - `src/issue-tracker/sync.ts` — `ACTION_ITEMS_COMMENT_MARKER`, `renderActionItemsBookkeeping`, `parseActionItemsBookkeeping`

  - `src/issue-tracker/yaml.ts` — `validateRetro`

  - `src/__tests__/issue-tracker/{sync,yaml}.test.ts` — extend tests


  ## Acceptance Criteria


  - A retro YAML with a title `\"Fix: A -> B already-spawned\"` round-trips through parseIssue → save → re-sync without misattributing the spawned card's external_id (test it explicitly).

  - `validateRetro` rejects all chosen forbidden tokens in `retro.action_items[i]` (Option B) OR the bookkeeping format no longer uses any character a human might naively type (Option A).

  - Existing tests still pass; no regression in `sync.test.ts` retro/action-items idempotency tests.

  - Deploy / migration plan documented in the commit message — pre-Phase-5 prod bookkeeping comments handled gracefully.


  ## Out of scope


  - The `→` lookalike normalization helper — pure validation/formatting, not a retroactive fix.

  - Slack agent path."
