  - id: 69f7844110179781f6028979
    author: newms87
    timestamp: 2026-05-03T17:22:09.802Z
    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** Option A pick was clean: one constant change + one validator predicate flip + one parser tightening. The new tests cover AC1's regression case explicitly, plus boundary cases the original parser missed (multiple tabs, leading/trailing tab in titles, whitespace-only halves). Code-review and test-review subagents both flagged real fixes (single-source-of-truth for the separator, `indexOf` vs `lastIndexOf` doc/code drift, drop the `\\r$` silent fallback) — applied all of them in the same pass.
      **What went wrong:** First parser draft used `lastIndexOf` and a `replace(/\\r$/, "")` strip — both leftover habits from the arrow-glyph design. Code review caught both as silent-fallback violations. Lesson: when changing a separator with stricter validator backing, simplify the parser to match the new contract instead of carrying old defensive code over.
      **Action items:**
      - Investigate intermittent unhandled rejection from src/__tests__/integration/yaml-lifecycle-memory-tracker.test.ts when run as part of the full vitest suite (ENOENT on /tmp/danxbot-yaml-test-logs-*/event-queue/*.jsonl). Reproduces only in parallel suite runs; isolated runs are clean. Pre-existing race in laravel-forwarder/event-queue async cleanup vs vi.hoisted mkdtempSync teardown.
