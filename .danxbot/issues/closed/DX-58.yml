title: Add staged_files to /api/launch — generic pre-dispatch file staging into workspaces
description: |-
  ## Context

  Connected repos (gpt-manager, others in future) need to pre-populate the dispatched agent's working filesystem before the agent starts. Today the only mechanism is "agent calls an MCP tool at startup to fetch its own state" — which puts a runtime contract on the agent (must call exactly once, must not re-call), races sub-agent saves on overwrite, and fails opaquely when the agent forgets the call.

  Concrete first consumer: gpt-manager's schema-builder dispatch needs `/tmp/schemas/${SCHEMA_DEFINITION_ID}/` populated with `schema.json`, `blueprints/{id}.json`, `templates/{id}.json`, `templates/sample-data-{id}.json`, and `annotations/{notes,questions,research,rules}.json` before the agent spawns. See gpt-manager's sibling card `DX-47`.

  ## Solution

  Add a generic file-staging mechanism to the danxbot dispatch layer. Inline-in-launch (not a separate endpoint) so staging + dispatch are atomic.

  **`POST /api/launch` gains a `staged_files` field:**

  ```json
  {
    "repo": "gpt-manager",
    "workspace": "schema-builder",
    "task": "...",
    "api_token": "...",
    "overlay": { "SCHEMA_DEFINITION_ID": "42", ... },
    "staged_files": [
      { "path": "/tmp/schemas/${SCHEMA_DEFINITION_ID}/schema.json", "content": "..." },
      { "path": "/tmp/schemas/${SCHEMA_DEFINITION_ID}/blueprints/7.json", "content": "..." }
    ]
  }
  ```

  Worker behavior:

  1. Receive launch body. Validate `staged_files[]` shape.
  2. Resolve placeholders in each `path` against the launch body's `overlay` (e.g. `${SCHEMA_DEFINITION_ID}` → `"42"`). Fail loud on unresolved placeholders.
  3. Validate each resolved path against the workspace's declared `staging-paths` allowlist. Reject anything outside the allowlist with 400 + clear error. NEVER write outside.
  4. Resolve each path to its canonical absolute form (`path.resolve` after normalization). Reject any path that contains `..` or escapes the allowlist root after normalization (path-traversal guard).
  5. Write each file. On any write failure, abort the dispatch — do NOT proceed to `spawnAgent`. Return 5xx with the failure detail.
  6. Spawn the agent only after every staged file is on disk.
  7. Track staged files for post-dispatch cleanup. When the dispatch reaches a terminal state (completed/failed/cancelled/timed-out), remove every staged file the worker wrote. Cleanup MUST NOT touch files the worker did not write.

  **Workspace config — declare allowlist roots:**

  Each workspace's `<repo>/.danxbot/workspaces/<name>/workspace.yml` gains:

  ```yaml
  staging-paths:
    - "/tmp/schemas/${SCHEMA_DEFINITION_ID}/"
  ```

  Multiple roots permitted. Placeholders resolved against the dispatch's `overlay` at request time. Workspace with no `staging-paths` rejects any non-empty `staged_files` payload (fail closed).

  ## Why inline-in-launch (not a separate `PUT /api/workspace/{name}/files` endpoint)

  - Atomic. Staging + dispatch are one operation; no race window where staged files exist but no dispatch follows (or vice versa).
  - One round-trip from caller. Schema dispatches stage ~10–30 small JSON files; one POST is faster + simpler than orchestrating per-file PUT calls.
  - No extra public surface. The existing `/api/launch` bearer auth covers it; no new endpoint to defend.

  ## Out of Scope

  - Public `PUT /api/workspace/{name}/files` HTTP endpoint
  - Mutating staged files mid-dispatch
  - File-content size limit / streaming
  - Cross-workspace staging

  ## Key Files

  - `src/dispatch/core.ts` — wire staging before `spawnAgent`, cleanup in `onComplete`
  - `src/dispatch/staged-files.ts` (new) — sandbox enforcement, write, cleanup
  - `src/worker/dispatch.ts` — accept + validate `staged_files` body
  - `src/workspace/manifest.ts` — add `stagingPaths: readonly string[]`
  - `src/workspace/resolve.ts` — substitute + return `stagingPaths` on `ResolvedWorkspace`
  - `src/__tests__/dispatch/staged-files.test.ts` (new) — comprehensive sandbox + placeholder tests
  - `.claude/rules/agent-dispatch.md` — document new field + ownership boundary

  ## Architecture Constraints

  - **DRY**: single staging implementation in `staged-files.ts`.
  - **SOLID**: dispatch core calls staging module; never reimplements.
  - **Fail loud**: every reject path returns a structured error.
  - **No legacy / no backwards-compat**: `staged_files` is a new field.

  ## How to Verify

  - Unit tests cover every reject case + happy path + cleanup invariant.
  - Path-traversal payloads (`..`, abs paths outside allowlist) rejected.
  - Workspace with no `staging-paths` rejects non-empty `staged_files`.
  - Cleanup removes only worker-staged files; non-staged files untouched.

  ## Sibling Card

  gpt-manager `DX-47` is blocked on this card.
