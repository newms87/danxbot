retro:
  good: |
    TDD held throughout — manifest, resolver, staged-files module, worker
    parser, dispatch core integration each landed with tests-first. Path
    traversal coverage includes the sibling-prefix attack (`/tmp/schemas/42`
    vs `/tmp/schemas/42-evil`) which a naive startsWith check would let
    through. All-or-nothing rollback inside writeStagedFiles plus error
    `kind` discriminator (validation/write) gives the HTTP layer a clean
    400 vs 500 mapping with no message-string parsing.
  bad: |
    Wired cleanup into runResolved.spawnForDispatch via the resolved
    surface object (`stagedFilePaths`) — a slightly leaky abstraction
    since spawn/cleanup logic now reaches into stagedFilePaths. Acceptable
    given the alternative (a closure-captured cleanup callback) would
    have re-implemented the onComplete chaining the file already does
    for cleanupMcpSettings.
