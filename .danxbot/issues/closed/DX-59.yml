retro:
  good: |-
    - Two-pass code review caught real issues: the resume path was missing the override-strip (DRY violation), the silent fallback in `computeAgentElapsed` violated zero-debt rules, and the magic grace constant scaled badly across budgets. Refactor extracted `consumeMaxRuntimeMsOverride(array &$context): int` so launch + resume share one helper and neither path can drift.
    - Replacing the brittle prose-pin test on workspace CLAUDE.md with a follow-up structural-enforcement card (DX-58 in gpt-manager) was the right move — testing doc prose is a textbook anti-pattern, but the regression vector behind it (AGD-48) is real and now scoped to its own card.
    - Live verification covered both paths: `--timeout=10` exits 1 with `dispatch.status=timeout` set by the worker's PUT (no `Invalid or expired token` events); `--timeout=600` exits 0 with all 7 isolation checks passing in 268s.
  bad: |-
    - First `--timeout=10` live run failed to observe the terminal status because the original 5s grace was too tight: Horizon queue + worker preflight added ~10s of latency before the agent's wall-clock started, so the observer gave up while the worker's enforcement timer was still running. Bumped to a scaled `observerGraceSeconds(int)` (floor 30s, 10% of N for large budgets) — but the discovery cost a wasted iteration.
    - Container worker on `gpt-manager_sail` had a stale WSL bind-mount path on Docker Desktop and exited 143 mid-investigation; only realized after diagnosis that a host-mode worker was already on host port 5562 receiving the dispatches all along. Stopped the container worker and worked exclusively against the host worker.
    - Octane's PHP file cache hid the validator + match-arm changes for two reload cycles before I noticed; `octane:reload` should be reflexive after every controller / service edit during live testing.
