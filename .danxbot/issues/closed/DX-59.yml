type: Bug
title: "Fix: per-dispatch max_runtime_ms plumbing + accept 'timeout' status PUT (Laravel validator gap)"
description: |-
  ## Context

  Two bugs in the gpt-manager ↔ danxbot dispatch contract block deterministic per-dispatch budget enforcement:

  1. **Per-dispatch `max_runtime_ms` not plumbed.** `SchemaBuilderService::resolveAgentMaxRuntimeMs()` only reads the global `services.danxbot_gpt_manager.agent_max_runtime_ms` config (`config/services.php:57`, default 3600000ms = 1 hour). Callers cannot pass a per-dispatch override. Test commands like `test:schema-builder --timeout=N` therefore have no way to lower the wall-clock cap that danxbot actually enforces.

  2. **danxbot's `timeout` terminal PUT is rejected by Laravel.** When danxbot's `maxRuntimeMs` timer fires (`danxbot/src/agent/launcher.ts:166-185`) OR its inactivity timer fires (`launcher.ts:141-158`), the worker calls `notifyTerminalStatus(j, options, "timeout", j.summary)` (`agent-status.ts:122-136`), which PUTs `{status: "timeout", message: "Agent exceeded max runtime of N minutes"}`. Laravel's `AgentDispatchStatusController::__invoke` validator at `app/Http/Controllers/Ai/AgentDispatchStatusController.php:32` is `'status' => 'required|string|in:running,completed,failed,canceled'` — `timeout` is NOT in the enum → 422 → `AgentDispatch` row never reaches terminal via this path. The agent dies; Laravel sees only the dying heartbeats.

  ## Why this is showing up now

  DX-49 (in gpt-manager) added a fast scenario regression test for `test:schema-builder` with a `--timeout=30` budget. The command currently reinvents budget enforcement in PHP via a custom `pollUntilTerminal` + `markTimeoutFailed` that writes Laravel-side `failed` directly. That custom kill poisons the schema MCP token (the MCP server's auth check rejects requests on terminal dispatches), causing the agent to hit `Invalid or expired token` mid-flight and abort. Verified empirically — see `/tmp/iss49-iter1.log` + dispatch SD-65 events on 2026-05-05 ~02:11.

  The right fix is to use the existing infrastructure: pass the budget into the launch payload, let danxbot enforce, let danxbot PUT the terminal status, fix the validator so the PUT lands cleanly. Then delete the PHP custom-kill path entirely.

  ## Solution

  ### Step 1 — Add `STATUS_TIMEOUT` and accept it on the status endpoint (gpt-manager)

  `app/Models/Agent/AgentDispatch.php`:
  - Add `const string STATUS_TIMEOUT = 'timeout';`
  - Add `STATUS_TIMEOUT` to `TERMINAL_STATUSES` array.

  `app/Http/Controllers/Ai/AgentDispatchStatusController.php:32`:
  - Change validator from `'in:running,completed,failed,canceled'` to `'in:running,completed,failed,canceled,timeout'`.

  This preserves the truth of the terminal signal (timeout vs failed are different conditions) and lets `AgentDispatch::isTerminal()` recognize it.

  ### Step 2 — Per-dispatch max_runtime_ms override (gpt-manager)

  `app/Services/Schema/SchemaBuilderService.php`:
  - Read an override key from the existing `$context` array: `$maxRuntimeMs = $context['max_runtime_ms_override'] ?? $this->resolveAgentMaxRuntimeMs();`
  - Apply in both call sites (`buildAndSendLaunchPayload` line ~318 and the resume path's payload construction around line ~209).
  - Strip the override key from `$context` before it's passed downstream (the prompt context does NOT need it, and persisting it into the prompt header's "Runtime budget" line is legitimately redundant once danxbot enforces).

  No public API change — `launch()` / `launchOrResume()` signatures stay the same; the override flows through the existing `$context` dict.

  ### Step 3 — TestSchemaBuilderCommand: delete custom timeout logic, plumb to danxbot (gpt-manager)

  `app/Console/Commands/TestSchemaBuilderCommand.php`:
  - In `runAddFieldScenario`, build the dispatch context as `['max_runtime_ms_override' => $timeoutSeconds * 1000]` and pass it into `dispatchSchemaBuilder($schema, $context, $thread->id)`.
  - Replace the existing `pollUntilTerminal` + `markTimeoutFailed` flow with a pure-observer poll: poll `AgentDispatch` until `isTerminal()` returns true. There is no custom kill — danxbot does that. The poll's wall-clock cap is `$timeoutSeconds + GRACE_SECONDS` (e.g. +5s) so it doesn't race danxbot's enforcement.
  - Delete `markTimeoutFailed()` entirely.
  - Drop the `use App\Services\AgentDispatch\AgentDispatchService;` import (no longer needed).

  `verifyAddField` Check 6 (dispatch terminal status):
  - Already asserts `$dispatch->status === STATUS_COMPLETED`. Keep that — when danxbot enforces and PUTs `timeout`, `verifyAddField` correctly returns false. The CALLER (`runAddFieldScenario`) still gets exit code 1 in the timeout branch via the existing pattern.

  ### Step 4 — Fix the dependent test in `TestSchemaBuilderCommandTest`

  The existing test `poll_until_terminal_returns_null_when_budget_exceeded_with_no_dispatch` simulates the budget-exceeded path with a 1-second poll budget against a non-terminal dispatch. Update its expectation: `pollUntilTerminal` should still return null when the dispatch never reaches terminal, but the poll budget calculation now needs to align with the new pure-observer behavior. Re-read the test, adapt the assertion if the public method signature changes.

  ## Verification

  After all steps:

  1. Unit suite green: `cd /home/newms/web/gpt-manager && ./vendor/bin/sail test --filter TestSchemaBuilderCommandTest > /tmp/iss59-tests.log 2>&1` — exit 0.
  2. Live dispatch with budget that danxbot will exceed:
     - `cd /home/newms/web/gpt-manager && ./vendor/bin/sail artisan test:schema-builder --scenario=1 --dispatch --timeout=10 > /tmp/iss59-live-10s.log 2>&1`
     - Expect: exit 1, dispatch row reaches `status=timeout` via danxbot's PUT (NOT custom Laravel write), no `Invalid or expired token` errors in agent_dispatch_events.
  3. Live dispatch with budget that danxbot won't exceed (use a high cap, ~600s):
     - `./vendor/bin/sail artisan test:schema-builder --scenario=1 --dispatch --timeout=600 > /tmp/iss59-live-600s.log 2>&1`
     - Expect: exit 0, dispatch row `status=completed`, all 7 isolation checks pass (matches DX-49 prior 349s run).
  4. Full Laravel suite: `./vendor/bin/sail test > /tmp/iss59-full.log 2>&1` — exit 0.

  ## Out of scope (DO NOT include in this card)

  - Reducing the agent's actual runtime under 30s. That's a separate optimization track (orchestrator preamble, MCP probe latency, qg-reviewer skip, schema pre-injection on launch). This card ONLY fixes the budget plumbing + status PUT contract so future optimization work can iterate cleanly.
  - Reworking the orchestrator's `schema_definition_get` mandate. Removal is in progress on the gpt-manager side independently.
  - Adding `prefetch_files` / `SCHEMA_PRELOADED_JSON` to danxbot's launch payload. Future iteration once budget plumbing is fixed.

  ## Key files

  - `app/Models/Agent/AgentDispatch.php` — add STATUS_TIMEOUT constant + TERMINAL_STATUSES.
  - `app/Http/Controllers/Ai/AgentDispatchStatusController.php` — validator enum.
  - `app/Services/Schema/SchemaBuilderService.php` — read `max_runtime_ms_override` from context in both launch + resume paths.
  - `app/Console/Commands/TestSchemaBuilderCommand.php` — delete custom kill, plumb timeout to context, simplify poll.
  - `tests/Feature/Commands/TestSchemaBuilderCommandTest.php` — adapt the budget-exceeded test if signature changes.

  All paths are in the gpt-manager repo (`/home/newms/web/gpt-manager/`). danxbot side (this repo) requires zero code changes — it already does the right thing; Laravel just needs to accept the signal it sends.

  ## Phase dependency

  None. Independent of all in-flight work. Closes the path for DX-49 (gpt-manager) AC #7 — once landed, `--timeout=30` is enforced by danxbot end-to-end and DX-49 can re-evaluate whether the agent path is achievable inside that budget (separate question, separate card).
