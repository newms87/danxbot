comments:
  - author: danxbot
    timestamp: 2026-05-05T02:30:00.000Z
    text: |-
      ## Spawn context

      Card created during a danxbot session driving DX-49 (gpt-manager) iteratively. Iter 1 of DX-49 dispatch revealed:

      - Custom 30s budget enforcement in `TestSchemaBuilderCommand::markTimeoutFailed` writes `STATUS_FAILED` directly to the AgentDispatch row.
      - As soon as the dispatch is terminal, the schema MCP server's bearer-token auth check rejects all subsequent calls (`Invalid or expired token`).
      - The agent — which was making real progress (sub-agent spawned schema-builder, ToolSearch, Read, Edit, schema_save in flight) — gets `Invalid or expired token` on schema_save and aborts via `mcp__schema__abort`.
      - Empirical evidence: SD-65 (gpt-manager DB), event id ~02:12:24 carries the abort message.

      Investigation also surfaced that danxbot already has the right enforcement primitives end-to-end:
      - `src/agent/launcher.ts:166-185` — maxRuntimeMs SIGTERM + putStatus("timeout", summary).
      - `src/dispatch/core.ts:200,397` — plumbs maxRuntimeMs from /api/launch body.
      - `src/worker/dispatch.ts:338-339` — reads body.max_runtime_ms per-request.

      The two gaps preventing this from being usable are both Laravel-side: (1) no per-dispatch override on the launch payload from `SchemaBuilderService`, and (2) the AgentDispatchStatusController validator does not accept the literal status string "timeout" that danxbot sends.

      DX-49 is paused waiting for this card to land. Once shipped, DX-49 can re-run `--timeout=N` with confidence the budget is enforced where it should be, and decide whether the agent path actually fits inside the desired budget (separate question — likely needs orchestrator preamble + qg-reviewer optimizations on a follow-up card).

      External_id left empty so the danxbot worker creates the tracker card on the next sync.
