title: "[Danxbot] Drop trello-worker → issue-worker symlink alias"
description: |-
  ## Context

  Phase 5 of the tracker-agnostic-agents epic (https://trello.com/c/OWQdETAI) renamed the poller's dispatch workspace `trello-worker` → `issue-worker`. To keep in-flight `/api/launch` callers, hardcoded Slack workflows, and any external automation referencing the old name working through the cutover, the poller writes a one-release symlink alias at `<repo>/.danxbot/workspaces/trello-worker → issue-worker` on every poll tick.

  This card tracks the alias removal one release after Phase 5 ships.

  ## Solution

  1. Delete `injectIssueWorkerAlias` helper from `src/poller/index.ts` (defined ~line 615 in the Phase 5 commit; search for "Phase 5 alias").
  2. Remove the call to it in `injectDanxWorkspaces`.
  3. Add a one-time scrub: walk `<repo>/.danxbot/workspaces/` and `rm` any symlink whose name is `trello-worker` AND whose target is `issue-worker`. Skip if the path is a real directory (preserves operator-authored workspaces — same invariant the alias logic itself enforces).
  4. Drop the alias-related comments in `src/poller/inject/workspaces/issue-worker/CLAUDE.md`.
  5. Drop the `Phase 5 alias` paragraph in `src/poller/index.ts` `injectDanxWorkspaces` docstring.

  ## Acceptance Criteria

  - `rg "injectIssueWorkerAlias|trello-worker.*issue-worker|issue-worker.*alias" src/` → zero matches.
  - After running the poller against an existing connected repo (which has `<repo>/.danxbot/workspaces/trello-worker` as a symlink), the next tick removes the symlink and the directory listing shows only `issue-worker`.
  - Operator-authored `<repo>/.danxbot/workspaces/trello-worker/` directories (real, populated) are NOT touched by the scrub.
  - `npx vitest run` → green.
  - A Layer 3 system test (or expanded `make test-system-poller`) verifies both the scrub-symlink and preserve-real-dir branches.

  ## When to ship

  After at least one full release cycle has passed since Phase 5's commit (`<sha placeholder>`). Confirm by checking `git log --since` for the Phase 5 commit and verifying any external `/api/launch` callers (gpt-manager, etc.) have updated their hardcoded `workspace: "trello-worker"` references to `"issue-worker"`.
