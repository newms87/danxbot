    author: test-reviewer
    timestamp: 2026-05-03T17:34:40.227Z
    text: |
      <!-- danxbot -->

      ## Test Review

      6 fs-based unit tests in `legacy-trello-worker-scrub.test.ts` cover all required branches with real filesystem ops via `mkdtempSync` (stronger than mocked lstatSync). Both AC#5 branches (scrub + preserve) verified.

      Gaps reported: (1) symlink-to-FILE edge case, (2) dangling-symlink edge case, (3) integration assertion that `injectDanxWorkspaces` actually invokes the scrub. Gap #3 is the most valuable — without it, dropping the call site would silently regress AC#2 while passing the dedicated test.

      Resolved in this commit:
      - Added dangling-symlink test to `legacy-trello-worker-scrub.test.ts`.
      - Added two integration assertions to `index.test.ts` that exercise the call from `injectDanxWorkspaces` for both branches (scrub + preserve).
  - id: 69f787306f43db5965a5fe15
    author: code-reviewer
    timestamp: 2026-05-03T17:34:40.565Z
    text: |
      <!-- danxbot -->

      ## Code Review

      No blocking issues. AC verified — `rg` for forbidden patterns returns zero matches.

      Low (DRY/SOLID consistency): the scrub is structurally a sibling of `scrubLegacySingularWorkspace` and `scrubRepoRootDanxArtifacts` (both private in `index.ts`); inlining would match the established pattern. Counter: the danxbot-specific test rule in `danx-repo-workflow.md` warns against importing from `index.ts` in tests due to the `config.ts` import chain. Keeping the scrub in its own module preserves cheap fs-based tests via real `mkdtempSync` without the config dependency. Either is defensible; current state was chosen to honor the project test rule.

      Safety review: real directories preserved; wrong-target symlinks preserved (operator-rebound respected); relative + absolute symlink targets handled correctly via `resolve(workspacesTargetDir, readlinkSync(...))`; idempotent; no fallback shims; no swallowed errors beyond the documented `ENOENT` swallow in `fs-probe.ts`.

      Cleanup: alias paragraph removed from `inject/workspaces/issue-worker/CLAUDE.md`; `fs-probe.ts` docstring updated to reference the new consumer; `index.test.ts` mocks unchanged (correct — scrub uses real fs in its own test).
  - id: 69f787304f59c51bd94b4587
    author: danxbot
    timestamp: 2026-05-03T17:34:40.883Z
    text: |
      <!-- danxbot -->

      ## Review Fixes

      Addressed test-reviewer gap #3 by adding two integration tests to `src/poller/index.test.ts` asserting that a single `poll()` tick:
      1. Calls `rmSync(<workspaces>/trello-worker)` when that path is a symlink whose `readlinkSync` resolves to the sibling current workspace.
      2. Does NOT call `rmSync` on a real directory at that path.

      Added the dangling-symlink test to `legacy-trello-worker-scrub.test.ts` to pin behavior at the boundary (`resolve()` is a string op — the symlink is removed even when the target dir is absent, which is correct: the leftover alias should not survive the scrub).

      All 2592 backend tests pass; `tsc --noEmit` clean.
