title: Dashboard Issues tab — read-only Trello-like kanban over .danxbot/issues
description: |-
  ## Context

  The dashboard currently exposes Dispatches, Agents, Settings tabs but has no
  view of the local issue tracker (`<repo>/.danxbot/issues/{open,closed}/*.yml`).
  Operators and humans want a Trello-like board to see the current state of
  every issue: organized by status, with click-to-expand detail, epic <-> phase
  relationships, and search / filter chrome.

  This epic adds a new top-level **Issues** tab. **Read-only** for v1 — drag,
  edit, comment, create are explicitly out of scope. Goal: communicate state.

  A pixel-perfect HTML/CSS/JS design ships in
  `docs/design/issues-board/` (8 files: `index.html`, `App.jsx`, `Header.jsx`,
  `IssueBoard.jsx`, `IssueCard.jsx`, `IssueDrawer.jsx`, `IssuesFixtures.jsx`,
  `colors_and_type.css`). Phase cards translate React-prototype output into
  Vue 3 SFCs in `dashboard/src/components/issues/` using `danx-ui` components
  where they fit. **Match the visual output**, not the prototype's internal
  React structure.

  ## Solution Outline

  - **Backend** — `GET /api/issues?repo=<name>` (list-card shape, closed
    capped to 50 most-recent by mtime, `?include_closed=all` overrides) and
    `GET /api/issues/:id?repo=<name>` (full `Issue` object). Same auth gate
    as `/api/agents`. Reads YAMLs via the existing `parseIssue` in
    `src/issue-tracker/yaml.ts`.
  - **Frontend** — new tab in `DashboardHeader.vue`, a kanban board with 6
    status columns (Review / ToDo / In Progress / Needs Help / Done /
    Cancelled), rich cards (epic phase checklists, AC progress bars, blocked
    accent, parent-epic chip), a slide-over detail drawer with 4 tabs
    (Overview / Comments / Retro / Raw YAML), filter toolbar with URL-state
    persistence, and an epic-scope mode (highlight or filter the epic family
    cluster). Repo selector reuses the existing one — one repo at a time.
  - **State** — composable `useIssues(repo)` fetches list, polls every 30s,
    fetches detail on demand. No SSE for v1.

  ## Phases

  1. **DX-61 — Backend list + detail endpoints** (server, tests, auth gate)
  2. **DX-62 — Board skeleton, columns, minimal card, repo wiring**
  3. **DX-63 — Rich IssueCard (epic accents, phase checklist, AC bar, blocked, parent chip)**
  4. **DX-64 — FilterToolbar + URL-state persistence (search, type, blocked, closed, count)**
  5. **DX-65 — IssueDrawer slide-over with 4 tabs**
  6. **DX-66 — Epic scope (filter / highlight) + cross-card navigation**

  ## Design Source of Truth

  Every phase card references `docs/design/issues-board/`. The chat the user
  iterated on is captured in the cards' descriptions; the component files are
  the pixel-perfect spec. Match colors, spacing, accents, animations, glyphs
  exactly.

  ## Out of Scope (v1)

  - Drag/drop status changes
  - Editing description / AC / comments
  - Creating new issues from the UI
  - Multi-repo combined board
  - Live SSE updates (30s poll only)

  ## Dashboard test exemption

  Per `CLAUDE.md` the Vue UI layer under `dashboard/src/` does NOT require
  unit tests. Type checking (`npx vue-tsc --noEmit`) IS still required. The
  backend half (Phase 1) is NOT exempt — full unit + integration tests
  required for the new endpoints.
