      <!-- danxbot -->

      ## Phase 2 Handoff

      **Built:** DX-62 — Issues tab + 6-column kanban + minimal card + repo wiring + 30s-polling composable. Commit `5cce516`.

      **Discoveries:**
      - Backend `IssueListItem` shape (`src/dashboard/issues-reader.ts`) already includes everything Phase 2 needs: `ac_total`, `ac_done`, `phases_total`, `phases_done`, `blocked: boolean`, `comments_count`, `has_retro`, `updated_at` (mtime ms). Phase 3 can render the AC bar + phase checklist directly off these counts without a detail fetch — `phases_total` is the count for the epic "N phases" chip.
      - `dashboard/src/utils/relativeTime.ts` ships in this commit. Reuse it in the drawer (Phase 5) instead of duplicating.
      - `dashboard/src/components/issues/IssueCard.vue` parent_id chip is rendered as a plain non-interactive span with a comment marking the deferral. Phase 6 (epic scope) is where that chip becomes a button wired to a `setScopedEpicId` emit.
      - `IssueBoard.vue` keys columns directly by `IssueStatus` (the backend union); the lowercase snake_case `id` per column is now used only for `data-test` selectors. Don't reintroduce a parallel `ColumnId` enum in later phases.
      - `useIssues.ts` uses a monotonic `currentReq` guard — replicate the pattern in any future detail-fetch composable to avoid late-response clobbering.

      **Corrections:** epic moved ToDo → In Progress; Phase 1 + Phase 2 marked Complete; epic ACs #1, #2, #3, #9, #10 checked off.

      **Next-agent context:** Phase 3 (DX-63) adds rich content — epic accent (left border + tinted bg + "N phases" chip), `PhaseChecklist`, `ACBar`, blocked accent. Visual values are in `docs/design/issues-board/IssueCard.jsx`. The minimal card already imports `TypeBadge` + `relativeTime`; add the rich elements behind `issue.type === "Epic"` / `issue.blocked` / `issue.ac_total > 0` guards. The card emits `select` — Phase 5 wires it to the drawer.
