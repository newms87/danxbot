      ## Retro

      **What went well:** All 6 phases shipped sequentially with no rework: Phase 1 (backend list/detail endpoints), Phase 2 (board skeleton), Phase 3 (rich card), Phase 4 (filter toolbar + URL state), Phase 5 (drawer slide-over), Phase 6 (epic scope + cross-card navigation).
      Pixel-perfect design fixtures in `docs/design/issues-board/` made every visual call deterministic — no design churn between phases.
      Shared abstractions (`relativeTime`, `useIssueFilters.isInScope`, `IssueListItem` mtime) seeded early stayed reusable across phases.
      **What went wrong:** Cross-repo jump (Phase 6 AC #7) is forward-looking — current per-repo ID model means the precondition is unobservable. Implementation is a no-op with inline comment; would need a global-id model and a `repo` field on `IssueListItem` to actually exercise.
      Pre-existing dashboard test failures (`useStream.test.ts`, `App.test.ts`, `SettingsPage.test.ts`) noisy on `npx vitest run`; unrelated to this epic.
      **Action items:** Nothing
      **Commits:** 1384692
