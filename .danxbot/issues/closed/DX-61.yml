title: "Issues board > Phase 1: backend list + detail endpoints"
description: |-
  ## Context

  Phase 1 of the Issues-tab epic (DX-60). Frontend phases all depend on
  these endpoints existing and being shaped right. Pure backend work — zero
  Vue files touched.

  ## Solution

  Two REST routes added to `src/dashboard/server.ts`, served on the
  dashboard's existing port (`5555` baked image / `5566` Vite dev proxy):

  ### `GET /api/issues?repo=<name>&include_closed=<recent|all>`

  - Auth: same `requireUser` middleware as `/api/agents`.
  - `repo` required. 400 if missing or not in connected repos.
  - Reads `<repo>/.danxbot/issues/open/*.yml` AND
    `<repo>/.danxbot/issues/closed/*.yml` (skipping `.migrated-to-v3`
    and any non-`.yml`).
  - Each file parsed via existing `parseIssue` from
    `src/issue-tracker/yaml.ts`. Parse failures log-once and are
    skipped, never throw.
  - Closed cap: `include_closed` defaults to `recent` → 50 most-recent
    closed by `mtime`. `all` returns every closed file.
  - Response is the **list-card shape** (NOT the full Issue):

    ```ts
    interface IssueListItem {
      id: string;                     // ISS-N
      type: "Epic" | "Bug" | "Feature";
      title: string;
      status: IssueStatus;            // 6 values from interface.ts
      parent_id: string | null;
      children: string[];
      ac_total: number;
      ac_done: number;
      phases_total: number;
      phases_done: number;            // status === "Complete"
      blocked: boolean;               // bool only — full record on detail
      comments_count: number;
      has_retro: boolean;             // any of good/bad/action_items/commits non-empty
      updated_at: number;             // mtime ms
    }
    ```

  - Sort: by `updated_at` desc inside the response.

  ### `GET /api/issues/:id?repo=<name>`

  - Auth + 400 rules same as list.
  - Returns the **full `Issue` object** verbatim (after `parseIssue`)
    plus a top-level `updated_at: number` from mtime. Description,
    AC[], phases[], comments[], retro, triaged, blocked, all there.
  - 404 if no `<id>.yml` in either `open/` or `closed/`.

  ## Architecture

  - New file `src/dashboard/issues-reader.ts` — pure functions:
    `listIssues(repoCwd, { includeClosed })` and
    `readIssueDetail(repoCwd, id)`. `server.ts` thin glue only.
  - DRY: parse via `parseIssue`; do not duplicate YAML logic.
  - Validate `repo` against the dashboard's known repos
    (`loadRepoContextsForDashboard()` already exists for `/api/agents`).
  - No caching; `mtime`-driven order is enough for v1.

  ## Tests (mandatory — backend is NOT exempt)

  Path: `src/__tests__/dashboard/issues-reader.test.ts` and
  `src/__tests__/dashboard/issues-routes.test.ts`. Fixtures: a tmpdir
  populated with hand-crafted YAMLs covering every Issue shape (epic,
  phase, blocked, retro, comments, malformed). Cover:

  - List shape exact (every list-card field present + correct).
  - Closed cap default 50, `?include_closed=all` returns all.
  - Sort by updated_at desc.
  - Malformed YAML skipped, not 500.
  - 401 without auth, 400 missing repo, 400 unknown repo, 404 unknown id.
  - Detail returns full body verbatim with mtime injected.
  - parent_id / children round-trip cleanly (no nested mutation).

  Run with `npx vitest run > /tmp/vitest.log 2>&1` per the testing skill's
  output-to-file convention.

  ## Key Files

  - `src/dashboard/server.ts` — wire two routes
  - `src/dashboard/issues-reader.ts` (new) — list + detail readers
  - `src/issue-tracker/yaml.ts` — re-use `parseIssue` (do NOT modify)
  - `src/__tests__/dashboard/issues-reader.test.ts` (new)
  - `src/__tests__/dashboard/issues-routes.test.ts` (new)

  ## Out of Scope

  - SSE / streaming
  - Mutation endpoints
  - Cross-repo aggregation
  - Caching layer
