    text: |-
      <!-- danxbot -->

      ## Code Review

      **Critical:** none.

      **Major (all addressed):**
      - `useIssues.ts` ŌĆö timer not reset on repo change ŌåÆ race cadence. Fixed: `watch(repo)` now calls `startTimer()` after `load()`.
      - `useIssues.ts` ŌĆö concurrent loads could clobber later result with earlier response. Fixed: monotonic `currentReq` id; only the latest outstanding load commits.
      - `IssueBoard.vue` ŌĆö `as ColumnId` silent cast on string-mangled status would drop unknown statuses silently. Fixed: explicit `Record<IssueStatus, ...>` map keyed by the backend union; unknown status logs a `console.warn` instead of falling through.
      - `TypeBadge.vue` ŌĆö `?? META.Feature` was dead but lied if it ever fired. Fixed: dropped the fallback (TS narrowing guarantees presence).

      **Minor:**
      - Extracted `relativeTime` to `dashboard/src/utils/relativeTime.ts` ŌĆö pre-empts duplication in the future drawer / detail view.
      - Restructured `IssueBoard` to key columns directly by `IssueStatus` ŌĆö removed the parallel `ColumnId` enum + string-mangling bridge; the lowercase `id` is still defined per-column for `data-test` selectors only.
      - Parent-id chip rendered as a plain non-interactive span (no scope-to-epic wiring until later phase) ŌĆö comment in template explains the deferral.
      - Epic accents (left border, tinted bg, "N phases" chip) deliberately deferred ŌĆö card description scopes them to Phase 3.
