title: "Issues board > Phase 2: board skeleton, columns, minimal card, repo wiring"
description: |-
  ## Context

  Phase 2 of DX-60. Backend (DX-61) ships first; this phase puts a working
  board on screen against the live endpoints. Minimal card only ŌĆö Phase 3
  adds rich content (epic accents, phase checklist, AC bar). Drawer + filters
  + scope come in later phases.

  ## Solution

  ### Tab + page wiring

  - `dashboard/src/components/DashboardHeader.vue` ŌĆö add an `issues` tab
    between `dispatches` and `agents`. Keep existing tab styling
    (`border-bottom: 2px solid #6366f1` when active, indigo text). Update
    `TabId` union to `"dispatches" | "issues" | "agents" | "settings"`.
  - `dashboard/src/App.vue` ŌĆö render `<IssuesPage />` when `activeTab ===
    "issues"`. Reuse the existing repo selector from the header ŌĆö both
    `dispatches` and `issues` share `selectedRepo`.

  ### New files (Vue 3 + `<script setup lang="ts">`)

  - `dashboard/src/components/issues/IssuesPage.vue` ŌĆö top-level page;
    consumes `selectedRepo` (prop), uses `useIssues(selectedRepo)`, renders
    `<IssueBoard>`. Loading skeleton + empty state ("No issues yet" /
    "Select a repo to see issues").
  - `dashboard/src/components/issues/IssueBoard.vue` ŌĆö six-column grid.
    Column ids/labels/order match `STATUS_COLUMNS` in
    `docs/design/issues-board/IssuesFixtures.jsx`:
    `review`, `todo`, `in_progress`, `needs_help`, `done`, `cancelled`.
    Map backend `IssueStatus` ŌåÆ column id (lowercase, spaces ŌåÆ `_`).
    Done + Cancelled collapsed by default, expandable per-column.
    Column accents from `COLUMN_ACCENTS` in `IssueBoard.jsx`.
    `ColumnHeader` matches design (6├Ś6px dot, uppercase label, count chip,
    Ō¢Š/Ō¢Ė glyph, bottom border tinted with accent).
  - `dashboard/src/components/issues/IssueCard.vue` ŌĆö **minimal version
    this phase**: id chip + type badge (`TypeBadge.vue`, see below) +
    2-line clamped title + footer (parent_id chip if present, comment
    count if > 0, retro tag if has_retro, relative time on the right).
    No phase checklist, no AC bar, no blocked accent yet ŌĆö Phase 3.
    Click ŌåÆ emits `select` (no drawer wired yet, just the event).
  - `dashboard/src/components/issues/TypeBadge.vue` ŌĆö Epic/Bug/Feature
    badge using `ISSUE_TYPE_META` palette from `IssuesFixtures.jsx`.
  - `dashboard/src/composables/useIssues.ts` ŌĆö fetches list via
    `fetchIssues(repo)`, polls every 30s, exposes `issues`, `loading`,
    `error`, `refresh()`. Selected-issue detail fetch comes in Phase 5.

  ### API client

  - `dashboard/src/api.ts` ŌĆö add `fetchIssues(repo, opts?)` and
    `fetchIssueDetail(repo, id)` typed wrappers over `fetchWithAuth`.
  - `dashboard/src/types.ts` ŌĆö re-export `IssueListItem` and `Issue` types
    matching the backend (use the spec from DX-61).

  ### Visual fidelity

  Pixel-match against `docs/design/issues-board/`:
  - background `#020617` (already on `<body>`)
  - card background `rgb(15 23 42 / 0.7)`, border `#1e293b`, radius 8,
    padding 10/12
  - column gap `12px`, card gap `8px`
  - header label `font-size: 11px, weight 600, uppercase, letterSpacing
    .05em, color #cbd5e1`
  - count chip `font-size: 10px, color #64748b, bg rgb(51 65 85 / .4)`

  Use `danx-ui` components when they fit (e.g. `chip`, `badge`,
  `button`); fall through to inline-styled divs where they don't (the
  prototype uses inline styles throughout ŌĆö keep one source of truth via
  a small `<style>` block per SFC, not Tailwind, so values match the
  prototype exactly).

  ## Out of Scope (this phase)

  - Filter toolbar (Phase 4)
  - Drawer (Phase 5)
  - Epic accents / phase checklists / AC bar / blocked accent (Phase 3)
  - Scope filter / highlight (Phase 6)
  - URL state (Phase 4)

  ## Verify

  - `cd /home/newms/web/danxbot && docker compose up -d` then visit
    `http://localhost:5566` ŌåÆ log in ŌåÆ click Issues tab ŌåÆ see 6 columns
    with cards from the live `/api/issues` endpoint for the selected
    repo, Done + Cancelled collapsed, click toggles expand.
  - `cd dashboard && npx vue-tsc --noEmit` clean.

  ## Key Files

  - `dashboard/src/components/DashboardHeader.vue` ŌĆö add tab
  - `dashboard/src/App.vue` ŌĆö render `<IssuesPage>` when active
  - `dashboard/src/components/issues/IssuesPage.vue` (new)
  - `dashboard/src/components/issues/IssueBoard.vue` (new)
  - `dashboard/src/components/issues/IssueCard.vue` (new, minimal)
  - `dashboard/src/components/issues/TypeBadge.vue` (new)
  - `dashboard/src/composables/useIssues.ts` (new)
  - `dashboard/src/api.ts` ŌĆö add `fetchIssues`, `fetchIssueDetail`
  - `dashboard/src/types.ts` ŌĆö add `IssueListItem`, `Issue`
