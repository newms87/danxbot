title: "Issues board > Phase 3: rich IssueCard (epic accents, phase checklist, AC bar, blocked, parent chip)"
description: |-
  ## Context

  Phase 3 of DX-60. Phase 2 shipped a minimal card; this phase grows it to
  pixel-match `docs/design/issues-board/IssueCard.jsx`. Drawer + filters +
  scope still come later.

  ## Solution

  Replace the minimal IssueCard.vue with the full design. Source of truth:
  `docs/design/issues-board/IssueCard.jsx`. Follow it line-by-line; do not
  invent palette or spacing.

  ### Card shell

  - Background:
    - epic: `rgb(30 27 75 / 0.45)`
    - non-epic: `rgb(15 23 42 / 0.7)`
  - Border: `1px solid #1e293b`
  - Left bar: `3px solid #ef4444` if `blocked`; else for epic
    `3px solid #6366f1`; else default 1px border (no left bar).
  - Radius `8px`, padding `10px 12px`.
  - Hover: lift `translateY(-1px)` 100ms; mouseleave returns.

  ### Header row (id + type + meta)

  - `font-size: 10px, weight 600, color #64748b, tabular-nums` for the id.
  - `<TypeBadge type="epic|bug|feature" compact />` (already exists from
    Phase 2 — make sure `compact` variant uses `padding: 1px 6px`).
  - Epic only: phase-count chip
    `<N> phases` with `color #a5b4fc, bg rgb(99 102 241 / 0.12), padding
    1px 6px, radius 4`.
  - Blocked badge pinned to the right via `marginLeft: auto` —
    `⛔ Blocked` glyph + `font-size: 10px, weight 600, color #fca5a5`,
    `title` attr = `issue.blocked.reason`.

  ### Title

  Two-line clamp via `display: -webkit-box; WebkitLineClamp: 2;
  WebkitBoxOrient: vertical; overflow: hidden;`. `font-size: 13, weight
  500, color #e2e8f0, line-height 1.35`.

  ### Body content

  - **Epic**: render the `PhaseChecklist` — one row per phase. Each row
    has a 16×16 status-glyph chip (`PHASE_STATUS_META` palette: ✓ done /
    ◐ in_progress / ○ todo / ⛔ blocked) plus `<i+1>: <p.name>`. Done
    phases get `text-decoration: line-through` and `color: #64748b`.
  - **Non-epic** with `ac.length > 0`: render an `<ACBar>` — a 4px-tall
    progress track (`bg rgb(51 65 85 / .6)`) with the filled portion
    `#10b981` at 100% else `#6366f1`. To the right show
    `<done>/<total>` in `color #94a3b8, font-size 11, tabular-nums`.

  ### Footer

  - `parent_id` chip (clickable): `↑ <parent_id>`, `color #a5b4fc, bg
    rgb(99 102 241 / 0.12), border rgb(99 102 241 / 0.25), padding 1px
    6px, radius 4`. Click stops propagation and emits
    `parent-click` with the parent id (the page handles scope in
    Phase 6 — for now just emit the event).
  - `comments_count > 0` → `💬<n>` icon-text.
  - `has_retro` → green `retro` tag, `color #86efac, font-size 10`.
  - `relativeTime(updated_at)` pinned right (`font-size 10`). Use the
    helper from `IssuesFixtures.jsx` — copy into a TS util at
    `dashboard/src/utils/relativeTime.ts`.

  ### Backend → frontend mapping

  Backend status values are **schema-cased** (`"In Progress"`,
  `"Needs Help"`); design uses lowercase ids (`in_progress`,
  `needs_help`). Phase 2 already centralized this via
  `statusToColumnId(status)` in IssueBoard.vue. Same mapping for
  phase status: `"Complete"` → `"done"`, `"Pending"` → `"todo"`,
  `"Blocked"` → `"blocked"`, `"In Progress"` → `"in_progress"`.
  Map type values `"Epic" | "Bug" | "Feature"` → `"epic" | "bug" |
  "feature"` for the design's palette lookup.

  Note: list endpoint returns `phases_total`/`phases_done` only — to
  render the phase checklist with names + per-phase status the card
  needs `phases[]`. **Extend the list shape (DX-61)?** No — instead,
  for epics include `phases: { name: string, status: PhaseStatusId }[]`
  in the list response. Add this to DX-61's AC before that phase
  starts; this card's implementation depends on it. If DX-61 already
  shipped, the implementer of THIS phase pushes the addition to DX-61
  via a follow-up commit before continuing.

  ## Verify

  - Side-by-side compare with `docs/design/issues-board/index.html`
    rendered locally (`npx serve docs/design/issues-board/`). Card
    visuals match: hover lift, blocked left-bar, epic accent + phase
    chip, AC bar percentage colors at 100% vs partial.
  - `cd dashboard && npx vue-tsc --noEmit` clean.

  ## Key Files

  - `dashboard/src/components/issues/IssueCard.vue` — replace
  - `dashboard/src/components/issues/PhaseChecklist.vue` (new)
  - `dashboard/src/components/issues/ACBar.vue` (new)
  - `dashboard/src/utils/relativeTime.ts` (new)
  - `dashboard/src/components/issues/issuePalette.ts` (new) — exports
    `ISSUE_TYPE_META`, `PHASE_STATUS_META`, `COLUMN_ACCENTS`,
    `statusToColumnId`, `phaseStatusToId` so every issue component
    consumes one source of truth
