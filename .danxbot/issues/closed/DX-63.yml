      ## Notes from Phase 2

      Phase 2 (DX-62, commit `5cce516`) shipped the minimal card. Phase 3 layers rich content on top. Pickup notes:

      **Files to edit:**
      - `dashboard/src/components/issues/IssueCard.vue` — current minimal version: id chip + TypeBadge + 2-line title + footer (parent chip / comments / retro / time). Add: epic accents, `PhaseChecklist`, `ACBar`, blocked accent.
      - Optionally split `PhaseChecklist` and `ACBar` into sibling SFCs in `dashboard/src/components/issues/` if they grow.

      **Reusable already in repo:**
      - `dashboard/src/utils/relativeTime.ts` — already used by IssueCard.
      - `TypeBadge.vue` — already imported.
      - `IssueListItem` from `@backend/dashboard/issues-reader.js` re-exported via `dashboard/src/types.ts`. Has `ac_total`, `ac_done`, `phases_total`, `phases_done`, `blocked: boolean`, `comments_count`, `has_retro`, `updated_at`. Render AC bar + phase progress chip directly from these — NO detail fetch needed for the bar.

      **Watch out for:**
      - The full phase checklist needs phase titles + per-phase statuses, which are NOT on `IssueListItem`. Either (a) extend `IssueListItem` in backend with a slim `phases: {title, status}[]` shape, or (b) fetch detail on hover/click via the existing `fetchIssueDetail` wrapper. Recommend (a) — phase checklist is a board-level affordance, lazy-fetch is jarring. Coordinate the backend tweak as part of this card.
      - Blocked accent: `IssueListItem.blocked: boolean` only. Reason text comes from detail fetch. Min-viable: 3px red left border + "⛔ Blocked" badge with no tooltip; tooltip can ship with drawer (Phase 5).
      - Parent chip is currently a plain `<span class="parent-chip">`. Phase 6 turns it into a button. Phase 3 should NOT wire scope.
      - Epic accent values direct from `docs/design/issues-board/IssueCard.jsx` lines 83-108: left border `3px solid #6366f1`, background `rgb(30 27 75 / 0.45)`, "N phases" chip with `phases_total`.

      **Type-check command:** `cd dashboard && npx vue-tsc --noEmit` (still required).
