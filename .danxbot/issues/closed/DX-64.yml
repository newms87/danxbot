title: "Issues board > Phase 4: FilterToolbar + URL-state persistence"
description: |-
  ## Context

  Phase 4 of DX-60. With the board (Phase 2) and rich cards (Phase 3) on
  screen, this phase adds the filter / search chrome and persists every
  filter to the URL query string so links are shareable.

  ## Solution

  ### Component

  New `dashboard/src/components/issues/FilterToolbar.vue`. Pixel-match
  `docs/design/issues-board/IssueBoard.jsx` `FilterToolbar` block (lines
  47â€“177). Renders above the board grid in `IssuesPage.vue`.

  ### Filters in scope this phase

  - **Free-text search input** â€” `padding: 5px 10px, radius 6, bg
    rgb(15 23 42 / 0.4)` (rest), `rgb(30 41 59 / 0.8)` + border `#334155`
    when non-empty. Glyph `âŚ•`, placeholder
    `"Search id, title, description, commentsâ€¦"`, `Ă—` clear button when
    populated. Debounced 200ms via `useDebouncedRef` (or a tiny inline
    helper). Match against `id + title + description` plus
    `comments[].text` if loaded â€” for v1, the list response doesn't
    include comments[], so search matches `id + title` only and a TODO
    comment in code calls out adding description/comments once the
    list ships them. **Add description to the list response** in
    DX-61's AC; same follow-up rule as DX-63.
  - **Type chips** â€” three buttons (Epic / Bug / Feature) using
    `ISSUE_TYPE_META`. Multi-select; active = filled with that type's
    `bg/fg/border`; inactive = `bg rgb(30 41 59 / 0.5)`, `color
    #94a3b8`, `border #334155`. Empty selection = no type filter.
  - **Blocked-only toggle** â€” single pill button. Active styling:
    `color #fca5a5`, `bg rgb(239 68 68 / 0.15)`, `border rgb(239 68 68 /
    0.35)`. Glyph `â›” Blocked only`.
  - **Show closed checkbox** â€” visibility-only on Done + Cancelled
    columns. Native `<input type="checkbox">`, `accentColor: #6366f1`.
    The columns themselves are still always rendered; the checkbox
    auto-expands them and overrides the per-column collapsed state when
    on. Off â†’ cards in those columns hidden (column header still shows
    the count).
  - **Count display** pinned right: `<visible> of <total>`,
    `font-size 11, color #64748b`.

  ### URL state

  Use `URLSearchParams` against `window.location` â€” no router dep:

  - `q=<search>` â€” only when non-empty
  - `type=epic,bug` â€” comma-joined
  - `blocked=1` â€” only when true
  - `closed=1` â€” only when true
  - `repo=<name>` â€” already maintained by the existing
    repo selector if it's URL-aware; if not, this phase adds it.

  Two-way binding: composable `useIssueFilters()` reads `location.search`
  on mount, exposes typed reactive refs, and on each change calls
  `history.replaceState` (NOT `push` â€” avoid clogging back/forward).
  Browser back works because state is read on mount + popstate listener.

  ### Wire to board

  `IssueBoard.vue` accepts the filtered list as a prop (or consumes the
  composable). Filtering is client-side over the already-loaded
  `issues[]` from `useIssues`. No re-fetch on filter changes.

  ### Visibility logic

  - Type filter: empty array = pass; non-empty = include only matching
    types (case-mapped to lowercase ids).
  - Blocked-only: `i.blocked === true`.
  - Search: case-insensitive match.
  - Show-closed: when off, the Done + Cancelled columns render but
    contain zero cards (the count badge in `ColumnHeader` should reflect
    the filtered count, NOT the total â€” confirm with the design's
    `count` semantics, which use the visible-after-filtering count).

  Always show the count display "X of Y" even if filters are empty.

  ## Out of Scope (this phase)

  - Epic scope filter / highlight (Phase 6 â€” adds the scoped-epic row
    inside the toolbar)
  - Drawer (Phase 5)

  ## Verify

  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - Type a query â†’ URL updates `?q=...` without page reload; back/forward
    browser buttons restore state.
  - Apply Type=Bug + Blocked-only â†’ only blocked bugs visible; URL has
    `?type=bug&blocked=1`.
  - Show-closed off â†’ Done + Cancelled columns empty (header count = 0);
    on â†’ cards render. Reload page with `?closed=1` â†’ state restored.
  - `<visible> of <total>` updates live as filters change.

  ## Key Files

  - `dashboard/src/components/issues/FilterToolbar.vue` (new)
  - `dashboard/src/composables/useIssueFilters.ts` (new)
  - `dashboard/src/components/issues/IssuesPage.vue` â€” render toolbar
  - `dashboard/src/components/issues/IssueBoard.vue` â€” accept filters
