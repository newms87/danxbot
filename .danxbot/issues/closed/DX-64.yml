    text: |-
      <!-- danxbot -->

      ## Code Review

      No critical findings. Two priority fixes applied before commit:

      1. **`IssueBoard.vue` show-closed off-branch reset** â€” original watch reset Done/Cancelled `collapsed` to `collapsedByDefault` when `showClosed` flipped off, silently clobbering user manual state. Cards are already filtered upstream, so the off-branch is unnecessary. Narrowed watch to true-only force-expand.
      2. **`useIssueFilters.ts` unsafe `Array<unknown>` cast** â€” combined-source `watch` used `as Parameters<typeof watch>[0]` to satisfy overload typing. Split into `watch([q, types, blockedOnly, showClosed], writeToUrl)` plus optional `watch(selectedRepo, writeToUrl)` â€” eliminates the cast.

      Other notes (low-impact, accepted): `description` field on every list row will scale fine at current size; sort canonicalization on `type=` URL param is intentional.
