title: "Issues board > Phase 5: IssueDrawer slide-over with 4 tabs"
description: |-
  ## Context

  Phase 5 of DX-60. Click an IssueCard â†’ right-side slide-over panel
  showing full issue detail with 4 tabs (Overview / Comments / Retro /
  Raw YAML). Pixel-match `docs/design/issues-board/IssueDrawer.jsx`.

  ## Solution

  ### Component layout

  - `dashboard/src/components/issues/IssueDrawer.vue` â€” top-level drawer.
    Renders a `<dialog>` or absolute slide-over (the prototype uses
    inline-styled fixed-position divs with a scrim + slide animation â€”
    match exactly). Width `min(560px, 100vw)`, right-anchored,
    `bg #0b1220, borderLeft 1px solid #1e293b`.
    Animations:
    ```
    @keyframes iss-slide { from { transform: translateX(100%); } to { transform: translateX(0); } }
    @keyframes iss-fade  { from { opacity: 0; } to { opacity: 1; } }
    ```
    Slide 200ms `cubic-bezier(.2,.8,.2,1)`; fade 150ms ease-out.
  - Scrim â€” fixed `inset:0`, `bg rgb(2 6 23 / 0.5)`, click closes.

  Reuse `danx-ui`'s `dialog` component if its animation can be customized
  to match; otherwise inline divs (the prototype path). Don't sacrifice
  visual fidelity for the abstraction.

  ### Header (`DrawerHeader`)

  `padding: 16px 20px 12px`, `borderBottom: 1px solid #1e293b`,
  flex-column gap 10. Top row: id chip Â· `<TypeBadge>` Â· status pill Â·
  blocked badge (when blocked) Â· relative time pinned right Â· close `Ă—`
  button. Below: H2 title (`font-size 18, weight 600, line-height 1.3,
  letterSpacing -0.01em, color #f1f5f9`). Below: relationships row when
  parent_id or children present â€” see Phase 6 for the scope-toggle
  button (this phase ships the static parent / children chips only).

  ### Tabs strip

  Underneath the header, before the body. Tabs:

  - `Overview` (default)
  - `Comments<count if > 0>`
  - `Retro` (disabled when `!has_retro` â€” opacity 0.5, cursor not-allowed)
  - `Raw YAML`

  Active tab has `borderBottom 2px solid #6366f1, color #a5b4fc`.

  ### OverviewTab

  Sections, top to bottom (skip empty ones):

  1. `Description` â€” uppercase 11px label, then markdown rendered into
     `font-size 13, color #cbd5e1, line-height 1.55, textWrap pretty`.
     Use `danx-ui`'s `markdown-editor` in read-only mode if it accepts
     a `readonly` flag â€” otherwise add a tiny markdown renderer
     (description content is markdown today: `##` headers, `**bold**`,
     code fences, backticks). The card description in DX-60/61 etc.
     uses these features â€” the renderer must handle them.
  2. `Blocked panel` (when `blocked` non-null) â€” `bg rgb(239 68 68 /
     0.08), border rgb(239 68 68 / 0.25), padding 10/12, radius 6`.
     Title `â›” Blocked` (`#fca5a5`). Reason text. `by:` row with one
     chip per blocker id (`#fecaca, bg rgb(239 68 68 / 0.15)` chips,
     clickable â€” emits `jump-issue` with that id; cross-card nav lands
     in Phase 6).
  3. `Acceptance Criteria` â€” uppercase label + count `<done>/<total>`.
     One row per AC item. Done = green check chip + line-through.
     Pending = empty grey chip.
  4. `Phases` â€” uppercase label + one card-row per phase. Each row has
     a 22Ă—22 status-glyph chip (PHASE_STATUS_META palette), `<i+1>.
     <name>` text, status pill on the right.
  5. `Children Â· <N>` (epic only) â€” one row per child id. Click emits
     `jump-issue` with that id (cross-card nav: Phase 6). Each row
     shows id chip + TypeBadge + ellipsized title + status text.

  ### CommentsTab

  Empty state: centered grey `"No comments yet."`. Otherwise one bubble
  per comment: `padding 10/12, radius 6`. `danxbot`-authored bubbles
  use `bg rgb(30 27 75 / 0.4), border rgb(99 102 241 / 0.25), name
  color #a5b4fc`. Others: `bg rgb(15 23 42 / 0.6), border #1e293b,
  name color #e2e8f0`. Time = relative.

  ### RetroTab

  Three sections (`What went well` / `What didn't` / `Action items`)
  rendered as bulleted lists when populated. Heading colors `#6ee7b7
  / #fca5a5 / #fcd34d`. Plus `Commits` row of monospace chips when
  `retro.commits` non-empty.

  Issue YAML model has `retro.good / retro.bad` as strings (not
  arrays). Split on newlines + filter empty lines for the bulleted
  rendering. `retro.action_items` already an array. Adapt accordingly.

  ### RawTab

  Mono-pre dump of the issue's core fields. Use the prototype's
  pseudo-YAML shape from `IssueDrawer.jsx` `RawTab`. Optionally use
  `danx-ui`'s `code-viewer` if it supports yaml + dark theme cleanly;
  the prototype's plain `<pre>` with `bg #020617, font-size 12, color
  #cbd5e1, whitespace pre-wrap` is acceptable.

  ## State wiring

  - `IssuesPage.vue` tracks `selectedIssueId`. When non-null, fetch full
    detail via `fetchIssueDetail(repo, id)` (cached in a `Map<string,
    Issue>` so reopening is instant). While loading, render the drawer
    shell with a centered spinner.
  - On `select` from card â†’ set selectedIssueId; on `close` from drawer
    â†’ clear it.
  - Push `?issue=<id>` to URL via `replaceState` so deep-linking works.
    Initial load reads `?issue` and opens that drawer if present.

  ## Out of Scope (this phase)

  - Epic scope toggle button in the header (Phase 6)
  - Cross-card jump from blocked-by chips / children rows / parent chip
    (Phase 6 â€” emit the events here, but the page handler that scopes /
    swaps drawer issue lands in Phase 6)
  - Comment authoring / editing
  - Markdown of `comments[].text` if comments contain markdown â€” render
    plain text for v1 (line breaks honored, no other formatting)

  ## Verify

  - Click any card on the live board â†’ drawer slides in from the right
    in 200ms with the spec animation.
  - Tabs switch instantly with the indigo underline; Retro tab is
    disabled when `has_retro === false`.
  - Reload `http://localhost:5566/?issue=DX-60` â†’ drawer auto-opens to
    that issue.
  - `cd dashboard && npx vue-tsc --noEmit` clean.

  ## Key Files

  - `dashboard/src/components/issues/IssueDrawer.vue` (new)
  - `dashboard/src/components/issues/DrawerHeader.vue` (new)
  - `dashboard/src/components/issues/OverviewTab.vue` (new)
  - `dashboard/src/components/issues/CommentsTab.vue` (new)
  - `dashboard/src/components/issues/RetroTab.vue` (new)
  - `dashboard/src/components/issues/RawTab.vue` (new)
  - `dashboard/src/components/issues/MarkdownView.vue` (new) â€” small
    read-only markdown renderer (or wraps `danx-ui` markdown-editor
    read-only)
  - `dashboard/src/composables/useIssues.ts` â€” extend with
    `fetchDetail(id)` + cache
