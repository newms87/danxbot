      ## Retro

      **What went well:** Markdown renderer kept tiny â€” no marked/markdown-it dep, ~80 LOC. PUA-codepoint placeholder sentinel (U+E000/E001) prevents user-typed collision after escapeHtml.
      Detail cache invalidates per-id by mtime instead of on every poll â†’ reopen-same-drawer stays instant while stale data can't linger.
      Cwd-bind to existing IssueListItem flow (allIssues prop) means OverviewTab Children rows reuse the already-fetched list â€” no extra API.

      **What went wrong:** First MarkdownView Edit attempt corrupted the file with NUL bytes (regex literal in old_string with U+0020 space matched against U+0000 NUL silently). Caught via cat -A, rewrote whole SFC.
      RawTab is a partial pseudo-YAML serializer (matches prototype + AC) â€” would be cleaner backed by js-yaml on a future pass.
      Italic regex still hand-rolled; tighter than original but a real markdown lib remains the right answer for v2.

      **Action items:** Nothing
      **Commits:** 66c212f
