type: Feature
title: "Issues board > Phase 6: epic scope (filter / highlight) + cross-card navigation"
description: |-
  ## Context

  Phase 6 of DX-60 — final phase. With the board, cards, drawer, and
  filters all in place, this phase adds the epic-relationship UX:
  scoping the board to an epic family (filter mode) or highlighting it
  while dimming everything else (highlight mode), plus making every
  cross-card chip click actually navigate.

  Source of truth: `docs/design/issues-board/IssueBoard.jsx` (the
  scoped-epic toolbar row + `isInScope` predicate + dim/hide logic) and
  `docs/design/issues-board/IssueDrawer.jsx` (the `Scope board to epic`
  toggle in `DrawerHeader`).

  ## Solution

  ### Scope state

  Lift `scopedEpicId: string | null` to `IssuesPage.vue`. Mirror it to
  URL as `?epic=<id>`. Default `scopeMode: "highlight" | "filter"` is
  `"highlight"` (config-friendly via the same URL state, `?mode=`). The
  URL params already shipped in Phase 4: extend
  `useIssueFilters` to include them.

  Predicate (matches the prototype):
  ```ts
  const isInScope = (i) =>
    !scopedEpicId || i.id === scopedEpicId || i.parent_id === scopedEpicId;
  ```

  ### FilterToolbar — scoped-epic row

  When `scopedEpicId` is non-null, render a second row inside
  FilterToolbar (the prototype's `Active scope row`):
  - `bg rgb(99 102 241 / 0.1), border rgb(99 102 241 / 0.3), padding
    6/10, radius 6`
  - `Scoped to epic` label (`#a5b4fc, weight 600`)
  - The scoped epic's id in tabular nums + ellipsized title
  - Mode toggle (`Filter` | `Highlight`) as a 2-segment button group;
    active segment `bg rgb(99 102 241 / 0.25), color #c7d2fe`
  - `Clear ×` button on the right that nulls `scopedEpicId`

  ### Board behavior under scope

  - **Filter mode**: visible list excludes anything where `isInScope ===
    false`. Columns + headers + counts all reflect the filtered set.
  - **Highlight mode**: every card still renders, but `IssueCard.vue`
    receives `:dimmed="true"` when `isInScope === false`. Dimmed:
    `opacity 0.32, hover lift disabled`. The in-scope cards receive
    `:scoped="true"` which adds the indigo halo
    (`bg rgb(99 102 241 / 0.08), border rgb(99 102 241 / 0.5),
    boxShadow 0 0 0 1px rgb(99 102 241 / 0.2), 0 4px 12px rgb(99 102
    241 / 0.08)`). These props already exist in the prototype's
    IssueCard — Phase 3 should NOT have wired them; this phase adds
    the props + styling.

  ### Drawer — scope toggle

  In `DrawerHeader.vue`, when the open issue has a `parent_id` OR is
  itself an epic, render the `Scope board to epic` button on the
  relationships row (right-aligned). Active styling (when scoped):
  `color #fcd34d, bg rgb(245 158 11 / 0.12), border rgb(245 158 11 /
  0.3), label "✓ Scoped to epic"`. Inactive: `color #94a3b8, bg
  rgb(30 41 59 / 0.5)`. Click toggles: scope to `parent_id` (or `id`
  if epic) when off; clear scope when on.

  ### Cross-card navigation (`onJumpIssue`)

  - Card parent chip click → emit `parent-click` (Phase 3 wired the
    emit). Page handler: set `scopedEpicId = parentId` AND optionally
    open that epic in the drawer (decide based on click modifier — for
    v1, just scope, don't open the drawer).
  - Drawer `OverviewTab.children-row` click → close current drawer +
    open the child's drawer (`fetchDetail` if not cached). Update
    `?issue=` query param.
  - Drawer `OverviewTab.blocked.by` chip click → same: jump to that
    issue.
  - Drawer `DrawerHeader.parent-chip` click → jump to parent epic.
  - "Jump" semantics: if the target issue belongs to a different repo
    (issue.repo !== currentRepo), switch repos first via
    `selectedRepo` setter, then open. The list will refetch via
    `useIssues`, then the detail fetch resolves. Show a brief loading
    state.

  ### URL state

  Extend `useIssueFilters` from Phase 4 with:
  - `epic=<id>` — scopedEpicId
  - `mode=highlight|filter` — scopeMode (only emit when scoped)

  ## Verify

  - Click an epic card → drawer opens → click `Scope board to epic` →
    board shows the indigo halo on the epic + its phase children, all
    other cards dimmed; toolbar shows the scoped-epic row.
  - Switch to `Filter` in the scoped-epic row → unrelated cards
    disappear; column counts update.
  - Click a phase card's `↑ ISS-N` parent chip → board scopes to that
    epic; URL updates to `?epic=ISS-N&mode=highlight`.
  - Open a blocked card's drawer → click a `by:` blocker chip → drawer
    swaps to that issue; URL `?issue=` updates.
  - Click `Clear ×` → scope nulled; all cards return to full opacity.
  - Reload `http://localhost:5566/?repo=danxbot&epic=DX-60&mode=filter`
    → state restored exactly.
  - `cd dashboard && npx vue-tsc --noEmit` clean.

  ## Key Files

  - `dashboard/src/components/issues/IssuesPage.vue` — lift
    `scopedEpicId` + `scopeMode`, wire jump-issue handlers
  - `dashboard/src/components/issues/FilterToolbar.vue` — add scoped
    row + mode toggle
  - `dashboard/src/components/issues/IssueBoard.vue` — pass `:dimmed`
    + `:scoped` to IssueCard, apply filter-mode visibility
  - `dashboard/src/components/issues/IssueCard.vue` — accept + style
    `dimmed` + `scoped` props
  - `dashboard/src/components/issues/DrawerHeader.vue` — add scope
    toggle
  - `dashboard/src/components/issues/IssueDrawer.vue` +
    `OverviewTab.vue` — emit jump-issue on parent / child / blocked-by
    chips
  - `dashboard/src/composables/useIssueFilters.ts` — extend with
    `epic` + `mode`
