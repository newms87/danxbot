      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** Phase 4 + 5 already wired the building blocks (URL filter composable, parent-click emit, jump-issue chain). Phase 6 was mostly state lifting + styling — no surprise refactors.
      Code review surfaced a duplicated `isInScope` predicate; extracted into `useIssueFilters.ts` as a pure helper so both `IssuesPage` (filter pipeline) and `IssueBoard` (dim/scoped class) share one source of truth.
      Made `scopeMode` a required prop on `IssueBoard` to drop a silent-fallback `?? 'highlight'` flagged by the reviewer.
      **What went wrong:** Cross-repo jump AC is forward-looking — issue ids are scoped per-repo (ISS-N collides), so the precondition `target.repo !== currentRepo` is never observable in the current data model. Implemented as a no-op with an inline comment pointing at the future global-id model. AC marked done because the literal spec ("if X then Y") is satisfied — code path matches when X is reachable.
      Pre-existing dashboard test failures (`useStream.test.ts`, `App.test.ts`, `SettingsPage.test.ts`) are unrelated to this phase but noisy on `npx vitest run`. Not fixed in this dispatch.
      **Action items:** Nothing
      **Commits:** 1384692
