      <!-- danxbot -->

      ## Notes from Phase 4 (DX-64, commit `a06d34d`)

      Pickup hints for Phase 6:

      **Reuse, don't reinvent:**
      - `dashboard/src/composables/useIssueFilters.ts` already mirrors `q / type / blocked / closed / repo` to URL via `history.replaceState` + `popstate`. Extend in place with `epic=<id>` + `mode=filter|highlight`. Match the existing pattern: parse on mount + popstate, write canonicalized params, `null`-clears delete the param. Don't add a second composable.
      - `FilterToolbar.vue` outer `.toolbar` is a flex column with one `.row`. Add a sibling `.scope` row below it for the scoped-epic UI (matches design fixture `IssueBoard.jsx` lines 135–174). Don't refactor the existing row.
      - `IssuesPage.vue` already owns the `filteredIssues` `computed` pipeline (`showClosed → types → blockedOnly → search`). Layer the epic-scope predicate into THAT pipeline before reaching `IssueBoard`. Don't double-filter inside `IssueBoard.vue`.

      **Cross-card navigation:**
      - `IssueBoard.vue` already emits `parent-click` (added in Phase 3); `IssuesPage` currently no-ops it — wire to `setScopedEpicId` in Phase 6.
      - `IssueDrawer` flows already exist for `jump-issue`; reuse the existing pattern in `IssuesPage.onJumpIssue`.

      **Backend:**
      - `IssueListItem` ships `description: string` (Phase 4 addition) — Phase 6 doesn't need a backend change.

      **Type-check (still required):** `cd dashboard && npx vue-tsc --noEmit`.
