      <!-- danxbot -->

      ## Phase 3 Handoff (epic close)

      **Built:** DX-88 (Slice C) at commit `bf93dd1`. Outbound full-fidelity
      mirror audit + idempotency. Trackers project `card.idLabels` into a
      transient `Issue.labels?: ManagedLabels` on `getCard()`; `syncIssue`'s
      Step 4c diff now compares against `remoteCard.labels` directly.
      Eliminated the every-tick Triaged/Blocked label flicker on Trello.

      **Discoveries:** the audit itself caught a real idempotency bug — the
      previous diff derived `remoteLabels.triaged` / `.blocked` from
      `remoteCard.triaged.timestamp` / `remoteCard.blocked`, but neither
      field round-trips on Trello (no native data column). Memory tracker
      surfaced the same break in tests but production traffic on Trello
      had been silently rewriting labels every ~60s.

      **Corrections:** none to DX-67 description. Phase 3 epic-AC items
      checked off based on direct verification (hydrate test landed in
      Phase 2; outbound audit landed here; suite + tsc clean).

      **Next-agent context:** the audit doc-block above `syncIssue`
      (`src/issue-tracker/sync.ts`) is the canonical source for "which
      Issue field reaches the tracker via which call." `parent_id` /
      `children` / `dispatch_id` are intentionally local-only. New
      tracker backends must populate `Issue.labels` inside their
      `getCard()` or `syncIssue` will throw.

      All three phases (DX-86, DX-87, DX-88) Done — closing the epic.
