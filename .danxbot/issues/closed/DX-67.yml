      <!-- danxbot -->

      ## Phase 1 Handoff

      **Built:** DX-86 / Phase 1 (Slice A) — local YAML drives the
      poller's dispatch source. Commit `76618fe`.

      **Discoveries:**
      - `list_kind` is NOT persisted on the YAML schema; it's a tracker-
        IssueRef-only field. The helper `listDispatchableYamls` accepts
        an optional `excludeExternalIds: ReadonlySet<string>` and the
        call site in `_poll` builds it from `actionItemRefs.map(c =>
        c.external_id)`. Phase 2 / DX-87 will likely encounter the
        same gap when deciding which inbound cards are dispatchable
        vs. just blocker-discoverable.
      - `blocked === null` filter inside the helper means blocked-
        resolution needs a separate sweep. Added
        `listBlockedTodoYamls`; `_poll` runs `resolveBlockedCards` over
        that and appends cleared cards to the dispatchable list.
      - `recoverStuckCards` (out-of-`_poll` failure path) was reading
        `tracker.fetchOpenCards` — same anti-pattern AC #3 forbids.
        Switched to `listInProgressYamls` + projection. Phase 2 / 3
        should re-audit any other `_poll`-adjacent code that still
        reads tracker for state-of-truth decisions.

      **Corrections:** none to epic / sibling phase descriptions. The
      design held.

      **Next-agent context (for Phase 2 / DX-87):**
      - Helper module: `src/poller/local-issues.ts`. 3 walkers
        (Dispatchable / InProgress / BlockedTodo). Reuse for any
        local-YAML scan.
      - `localIssueToRef` projection sits in `src/poller/index.ts` (top
        of file, below `log`). Drops `list_kind` deliberately.
      - `vi.mock("./local-issues.js")` test infra: see
        `src/poller/index.test.ts` head (the DX-86 mock block) and the
        wrapping factory pattern in
        `src/__tests__/integration/poller-memory-tracker.test.ts`. The
        memory-tracker test captures fetchOpenCards via a Proxy-style
        wrap so the local-issues mock derives Issue[] from
        `lastOpenCards.value` synchronously.
      - Tests: 2922 pass, `npx tsc --noEmit` clean.
      - Inbound channel (Phase 2's job) is still served by the
        existing `bulkSyncMissingYamls` + `pushOrphans` calls in
        `_poll`. Nothing in Phase 1 changed those — only WHAT happens
        AFTER they run.
