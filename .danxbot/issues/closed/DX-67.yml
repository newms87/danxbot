type: Epic
title: "Fix: poller dispatch decision must read local YAML, not Trello"
description: |-
  ## Problem

  The poller currently reads from the backend tracker (Trello) to decide
  which cards to dispatch. `src/poller/index.ts#_poll` calls
  `tracker.fetchOpenCards()` and filters the returned `IssueRef[]` to
  `status === "ToDo"` for the dispatch list. The local
  `<repo>/.danxbot/issues/open/*.yml` files are then hydrated FROM the
  tracker view (`bulkSyncMissingYamls`), with a band-aid orphan-push to
  cover hand-written YAMLs.

  This makes the tracker the de facto source of truth for "what is
  dispatchable," which is wrong. The local YAML is the source of truth.
  A YAML written via `danx_issue_create` or by hand should be the
  dispatch input; the tracker should be a one-way mirror with a narrow
  inbound channel for (a) cards born on the tracker and (b) human
  comments.

  Symptom that motivated this card: 7 phase YAMLs (DX-60..DX-66)
  written by hand into `.danxbot/issues/open/` with `status: ToDo` were
  invisible to the poller until the orphan-push side-effect ran on a
  later tick.

  ## Source-of-Truth Contract (target state)

  Documented in `~/.claude/rules/issues.md` "Source of Truth" section
  and `<repo>/CLAUDE.md` "Source of Truth" section as of this card.

  - **Local YAML is the single source of truth.** Title, description,
    status, AC, phases, comments, retro, blocked, labels — all
    canonical in YAML.
  - **Outbound (every tick):** every YAML field is mirrored to the
    tracker so humans see current state.
  - **Inbound — narrow exceptions only:**
    1. **New cards.** A card created on the tracker that has no
       matching local YAML gets hydrated into a fresh YAML on the next
       tick (one-time migration into the local source of truth).
    2. **New comments.** Human-authored tracker comments get pulled
       into the YAML's `comments[]`. Bot-mirrored comments are
       detected (e.g. via author or marker text) and skipped to avoid
       echo loops.
  - **Everything else inbound is ignored.** Tracker-side status drags,
    title edits, AC checkbox ticks, label changes — none of it
    propagates back. The next tick re-asserts YAML state.

  ## Solution

  Three slices:

  ### Slice A — flip dispatch decision to local YAML

  - New helper (likely `src/poller/local-issues.ts`):
    `listDispatchableYamls(repoPath): Issue[]` — scan
    `<repo>/.danxbot/issues/open/*.yml`, parse each via existing
    `parseIssue`, filter to `status === "ToDo"` AND
    `blocked === null` AND `list_kind !== "action_items"`. Sort by a
    deterministic priority (mtime asc, id asc as tiebreak).
  - In `_poll`, replace the Trello-fetch-then-filter dispatch path
    with `listDispatchableYamls`. The Trello fetch still runs (still
    needed for the inbound channel — see Slice B), but its result no
    longer drives dispatch.
  - Stuck-card recovery / orphan-resume currently keys off
    `inProgressCards` derived from `tracker.fetchOpenCards()`. Flip
    to a local scan: list YAMLs with `status === "In Progress"` from
    the same `<repo>/.danxbot/issues/open/` walk.
  - Pickup-prefix filter (`getTrelloPollerPickupPrefix`) keeps
    operating, but on the local-YAML-derived list.

  ### Slice B — inbound channel: new cards + human comments

  - Keep `tracker.fetchOpenCards()` running each tick. Use its result
    ONLY for two purposes:
    1. **Card hydration**: for any tracker card whose `external_id`
       matches no local YAML, write a fresh YAML at
       `<repo>/.danxbot/issues/open/<next-ISS-N>.yml` populated from
       the tracker shape. Existing `bulkSyncMissingYamls` already
       does most of this; reuse / refactor.
    2. **Comment pull**: for each hydrated card and each card with a
       local YAML, fetch tracker comments. Detect bot-authored
       comments (e.g. by author === danxbot user, or by a marker
       prefix) and skip them. Append remaining (human-authored)
       comments to the YAML's `comments[]` if not already present
       (dedup by `id` field, which the tracker assigns). Persist via
       `writeIssue`.
  - Status drags, title edits, AC edits, label changes on the tracker
    are NOT propagated. The next outbound tick re-asserts YAML state
    over them. This is intentional — explicitly documented in the
    rules.

  ### Slice C — full-fidelity outbound mirror

  - Audit existing outbound sync. Verify EVERY YAML field reaches the
    tracker on every tick: title, description, status (list move),
    AC (Trello checklist mirror), phases, labels, blocked record,
    comments authored by the bot. Anything missing — wire it.
  - Ensure outbound is idempotent: if the tracker already matches the
    YAML, no-op (avoid Trello API rate-limit churn).

  ## Concurrency note (resolved)

  The earlier orphan-push WIP referenced here has landed
  (`src/poller/orphan-push.ts` + `orphan-push.test.ts` are on main).
  `pushOrphans` is the outbound-mirror seed for Slice C; this epic
  builds on it. No remaining concurrency block.

  ## Phase Split

  Three phase children (`children[]`):

  - **DX-86 (Phase 1, Slice A)**: `listDispatchableYamls` helper +
    flip dispatch source + flip stuck-card recovery to local YAML.
  - **DX-87 (Phase 2, Slice B)**: inbound channel — tracker-born
    cards + human comments only; explicit bot-comment skip.
  - **DX-88 (Phase 3, Slice C)**: outbound full-fidelity mirror
    audit + idempotency tests.

  Phase 2 and Phase 3 are `blocked: by [prev]` — serial ordering.
  Phase 2 reads local YAML for the per-card loop, so it needs
  Phase 1's helper. Phase 3 is orthogonal but cleaner last.

  ## Out of Scope

  - Two-way conflict resolution (status drags, title edits on tracker
    propagating back) — explicitly NOT done. Tracker is mirror-only
    for non-comment fields.
  - Multi-repo combined dispatch.
  - Replacing the in-process `fetchOpenCards` call entirely — it
    still runs every tick for inbound. We just stop using it for
    dispatch decisions.

  ## Key Files

  - `src/poller/index.ts` — flip `_poll` dispatch source
  - `src/poller/local-issues.ts` (new) — `listDispatchableYamls`
  - `src/issue-tracker/sync.ts` — outbound full-mirror audit
  - `src/issue-tracker/trello.ts` — bot-vs-human comment detection
  - `src/__tests__/poller/*` — rewrite dispatch decision tests
  - `src/__tests__/issue-tracker/sync.test.ts` — outbound mirror coverage

  ## Verify

  - Hand-write a YAML at `.danxbot/issues/open/ISS-N.yml` with
    `status: ToDo`, `external_id: ""`, no Trello card. Within one
    poll tick, the poller dispatches it. Trello card gets created
    via outbound mirror.
  - Manually drag a card on Trello from In Progress back to ToDo —
    verify next tick re-asserts In Progress and YAML status is
    untouched.
  - Add a comment on Trello as a human user — verify next tick
    appends to YAML `comments[]`.
  - Add a comment via the bot path — verify the inbound pull does
    NOT re-import the bot's own comment (no echo loop).
  - `npx vitest run` clean. `npx tsc --noEmit` clean.
