      ## Retro

      **What went well:** Clean TDD cycle: 9 red tests → impl → green, then 4 more from the
      test-reviewer + code-reviewer feedback (queued state, missing
      status, no-summary completed, updateDispatch reject → 500). Reused
      `isTerminalStatus` from `dashboard/dispatches.ts` instead of
      hand-rolling the terminal check, and extracted
      `mapCompleteToDispatchStatus` so the critical_failure asymmetry
      (response = critical_failure, row = failed) is encoded once.
      **What went wrong:** `handleStopFromDb` and the in-memory `handleStop` branch still
      duplicate the writeFlag/autoSync ordering. A full extraction would
      need to abstract `job.stop` vs `updateDispatch` behind a finalizer
      callback — left for a follow-up since the in-memory branch's
      job.stop does cleanup beyond the DB write.
      **Action items:** Nothing
      **Commits:** 25230512ad1341d4aa0f3edfde3394b47133cb8d
