type: Bug
title: "Fix: handleStop /api/stop/:jobId 404s after worker restart — add DB fallback"
description: |-
  ## Problem

  `worker/dispatch.ts::handleStop` looks up jobs in the in-memory
  `activeJobs` Map only. After a worker restart, that Map is empty, so
  every long-running dispatched agent that calls `danxbot_complete`
  hits HTTP 404 from `/api/stop/:jobId` and dies without finalizing
  its dispatch row, syncing the tracked YAML, or running
  `autoSyncTrackedIssue`. The agent's claude process kept running
  across the restart (parent is `script -q -f`, not the worker
  daemon), but the worker has no record of it.

  Burned a real dispatch on this during DX-53: agent finished the
  card cleanly but `danxbot_complete` returned 404 → MCP tool error →
  agent thought it failed → no terminal-state propagation. Worse, the
  poller saw the card without an active dispatch and re-claimed it,
  spawning a duplicate dispatch against the same card.

  ## Root cause

  `src/worker/dispatch.ts:863`:

      const job: AgentJob | undefined = getActiveJob(jobId);
      if (!job) {
        json(res, 404, { error: "Job not found" });
        return;
      }

  `getActiveJob` is in-memory-only. No DB fallback.

  ## Solution

  When `getActiveJob(jobId)` misses, query `getDispatchById(jobId)`
  before returning 404. If the row exists and is in a non-terminal
  status (`queued` / `running`):

  1. Mark the dispatch row terminal via `updateDispatch` — status
     mapped from the request body's `status` field (`completed` /
     `failed` / `critical_failure` per the existing parseStopStatus
     contract).
  2. Run `autoSyncTrackedIssue(jobId, repo)` to push the local YAML
     edits to the tracker (same as the in-memory path).
  3. For `critical_failure`, also write the flag file via `writeFlag`.
  4. Return 200 with the resolved status.

  The in-process job is gone (different worker incarnation); we
  cannot signal `job.stop()`, but we don't need to — the DB update
  is the only side effect that hadn't already happened.

  Return 404 only when the dispatch row genuinely does not exist
  (caller bug or wrong jobId).

  Idempotency: if the row is already in a terminal status, return 200
  with the existing status (no-op). Don't re-mark — preserves the
  original terminal reason.

  ## Tests

  Add to `src/worker/dispatch.test.ts`:

  - `handleStop with active job — current behavior` (existing) still passes.
  - `handleStop falls back to DB when activeJobs is empty (worker-restart
     simulation)` — pre-seed a `running` dispatch row, call handleStop,
     assert 200 + DB row updated to `completed`.
  - `handleStop returns 404 when neither activeJobs nor DB has the row`.
  - `handleStop is idempotent on already-terminal rows`.

  ## Key files

  - `src/worker/dispatch.ts` — `handleStop` (the change)
  - `src/dashboard/dispatches-db.ts` — `getDispatchById`, `updateDispatch`
  - `src/worker/dispatch.test.ts` — tests
