type: Bug
title: "Fix: poller re-dispatches still-running cards after worker restart"
description: |-
  ## Problem

  When the danxbot worker restarts, every dispatched claude process
  whose parent shell is `script -q -f` (host-mode dispatches) keeps
  running across the restart — the worker daemon dies and respawns,
  but the agent processes are NOT children of the worker. The new
  worker has zero in-memory record of those active dispatches.

  On the next poll tick, the poller treats those cards as available
  for re-dispatch. The tracker-side lock TTL is the only guard, and
  it's wall-clock based — if the lock is "stale enough" (per
  `src/issue-tracker/lock.ts` reclamation rules), the poller
  reclaims and re-dispatches. Result: TWO claude processes for the
  same card, both editing the YAML, racing each other.

  Observed during DX-53: my dispatch (`3ad2ccc0`) kept running after
  the operator's worker restart. Poller spawned `1f9a0446` for the
  same card, then `8d49ca37`. All three claude processes alive
  simultaneously, all believing they own DX-53.

  ## Root cause

  Two missing reconciliation steps:

  1. **Worker startup**: scan `dispatches` table for rows whose
     `status` is non-terminal but whose owning worker process no
     longer exists. The previous worker's PID is gone; the row needs
     to be marked `failed` with a clear reason ("Worker restarted
     while dispatch was running"). Without this, the poller's lock
     reclamation eventually reclaims the card but the original
     dispatch row stays `running` forever.

  2. **Poller pre-claim DB check**: before acquiring the tracker-side
     lock, query the dispatches table for the card's `external_id`.
     If a non-terminal dispatch row exists, AND the host PID for
     that dispatch is alive, skip this tick — the existing dispatch
     is still working. Lock-stale + active-PID is a contradiction
     that means the lock TTL is too short for this card's actual
     workload.

  Step 1 is the higher-value half: even without step 2, marking
  orphaned rows terminal at startup at least keeps the DB honest
  and the dashboard accurate. Step 2 prevents the duplicate-dispatch
  race directly.

  ## Solution

  ### Step 1: worker startup reconciliation

  In `src/worker/server.ts` (or wherever the worker boot sequence
  lives), before the HTTP listener starts:

  - Query `getDispatches({ status: "running" })` (or extend
    `dispatches-db.ts` with `findNonTerminalDispatches(repoName)`).
  - For each row: if the row has a host PID column AND that PID is
    no longer running, mark it `failed` with summary `"Worker
    restarted while dispatch was running — agent process orphaned"`.
  - For host-mode rows without a recorded PID (legacy rows from
    before this fix lands), mark them all `failed` with the same
    summary — they predate the fix.
  - Add a `host_pid` column to `dispatches` if not present;
    populate at spawn time in `agent/launcher.ts`.

  ### Step 2: poller pre-claim DB guard

  In `src/poller/index.ts` (right before `tryAcquireLock`):

  - Query the dispatches table for non-terminal rows referencing
    this card (lookup by trello card id in `triggerMetadata`, or by
    `parentJobId` chain). If a `running` row exists AND the
    recorded host PID is alive (`process.kill(pid, 0)` test), skip
    this card this tick.
  - Log: `[<repo>] <title> already has live dispatch <jobId> (host
    PID alive) — skipping`.
  - If the row is `running` but its host PID is dead, leave the
    poller path unchanged (lock TTL takes over) — startup
    reconciliation should have caught this; the duplicate would
    only happen mid-restart-window.

  ## Tests

  - `worker startup marks orphaned running dispatches as failed`
    (seed a row with PID=999999 → unreachable, run startup, assert
    row is now `failed`).
  - `worker startup leaves rows with live PIDs alone` (PID = current
    process — guaranteed alive).
  - `poller skips card with live-PID running dispatch` (seed a row
    pointing to current PID, run poller tick, assert no spawn).
  - `poller proceeds with card whose dispatch row has dead PID` (lock
    TTL behavior unchanged).

  ## Key files

  - `src/worker/server.ts` — boot sequence, add startup reconciliation step
  - `src/agent/launcher.ts` — record host PID at spawn
  - `src/dashboard/dispatches-db.ts` — `findNonTerminalDispatches`,
    add `host_pid` column + migration
  - `src/poller/index.ts` — pre-claim DB guard
  - `src/issue-tracker/lock.ts` — context only (lock TTL still load-bearing)

  ## Order of operations

  Land DX-68 first (handleStop DB fallback) — it's prerequisite for
  any agent that survives a restart to reach a clean terminal state.
  Then DX-69 closes the duplicate-dispatch race at both ends.
