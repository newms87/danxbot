type: Epic
title: "Autonomous worker restart: agent triggers worker restart when validation requires it"
description: |-
  ## Goal

  Eliminate the "human must restart the worker" gate that today
  blocks dispatched agents from validating any change to danxbot
  itself, claude flag plumbing, workspace `.claude/settings.json`,
  injected hooks, the workspace resolver, or any other code path
  loaded once at worker startup. Today's workflow:

  1. Agent commits danxbot change.
  2. Agent recognizes the change won't take effect until restart.
  3. Agent files a Needs Help card asking the operator to restart.
  4. Operator restarts.
  5. Re-dispatch eventually picks up the validation work.

  Real cost observed during DX-53: the danxbot patch landed at the
  end of the dispatch cycle, validation was gated on operator
  restart, DX-61 sat as Needs Help for hours, two re-dispatches
  burned tokens trying to pick up the blocked card before the
  operator action arrived.

  Target workflow:

  1. Agent commits danxbot change.
  2. Agent calls `mcp__danxbot__danxbot_restart_worker({ repo:
     "<repo>" })`.
  3. The worker daemon for `<repo>` self-restarts (drains in-flight
     dispatches OR records them as orphaned per DX-69, then execs
     the new build).
  4. Agent's own dispatch survives the restart (per DX-68's DB
     fallback handleStop) and continues to validation.
  5. Card moves to Done with full live verification — zero human
     gate.

  ## Worker identification

  Each connected repo runs its own worker (host mode listens on a
  per-repo port: 5562 for gpt-manager, 5563 for danxbot itself,
  etc., per `<repo>/.danxbot/config/repo-config.md`). Identification
  by:

  - Caller passes `repo: "<repo-name>"` (canonical, matches
    `RepoContext.name`).
  - Worker resolves to `repo.workerPort` from
    `repo-config.md`.
  - Optional sanity check: `lsof -i :<port>` confirms a node
    process owns the port; the dispatch handler verifies the
    process matches a danxbot worker (cmdline contains
    `tsx src/index.ts`).

  ## API surface (proposal)

  New MCP tool on the danxbot server, alongside `danxbot_complete`:

  ```
  mcp__danxbot__danxbot_restart_worker({
    repo: string,         // required — repo whose worker to restart
    reason: string,       // required — non-empty; logged + recorded on the new dispatch's audit
    drain_in_flight: boolean = true,  // wait for active dispatches to terminate (or hit a max-drain timeout)
    timeout_ms: number = 60000        // overall restart deadline
  })
  ```

  Behavior:

  1. Resolve worker port from `repo` → check process is alive.
  2. (`drain_in_flight=true`) Send SIGTERM to the worker daemon, NOT
     to its dispatched claude children. Wait up to
     `timeout_ms - reservedRespawnMs` for the daemon to exit
     gracefully (worker should drain its `/api/cancel` handlers +
     finalize any in-flight DB rows on SIGTERM).
  3. Re-launch via `make launch-worker-host REPO=<repo>` (or the
     equivalent docker target).
  4. Poll the worker's `/health` endpoint until it returns 200 or
     timeout expires.
  5. Return `{ restarted: true, oldPid, newPid, durationMs }` on
     success, or `{ restarted: false, reason }` on timeout/failure.

  ## Safeguards

  - **Caller verification**: tool callable only from agents whose
    dispatch row's `repo` matches the requested restart target. An
    agent dispatched against gpt-manager cannot restart the danxbot
    worker (different scope). Enforced by checking the calling
    dispatch's `repoName` against the requested `repo` param.
  - **Cooldown**: refuse a restart within N seconds of the last
    successful restart for that repo (e.g. 30s). Prevents restart
    loops if validation continues to fail.
  - **Self-protection**: an agent cannot restart its OWN repo's
    worker if the call would terminate its own claude process.
    Host-mode dispatched agents survive worker restart (parent is
    `script -q -f`, not the worker daemon) — this safeguard exists
    only for the docker-mode case where the worker container hosts
    the agent process. In docker-mode, refuse with a clear error.
  - **Audit**: every restart records a row in a new
    `worker_restarts` table or appends to the dispatch's audit log:
    requesting dispatch id, repo, reason, oldPid, newPid, duration.

  ## Dependencies

  - **DX-68** (handleStop DB fallback) MUST land first — without
    it, the agent that triggers a restart cannot finalize its own
    dispatch after the restart completes.
  - **DX-69** (poller reclaim guard + startup reconciliation) MUST
    land first — without it, the agent's still-running dispatch
    after restart races against the new poller tick that wants to
    re-claim the card.

  Both DX-68 and DX-69 are prerequisites; this card is blocked on
  both.

  ## Why this matters

  Without autonomous restart, every danxbot-touching change ends in
  Needs Help. With it, the dispatch chain becomes:
  edit → commit → push → restart_worker → validate → mark Done.
  Same dispatch, no human gate, no stale Needs Help cards
  accumulating.

  ## Tests

  - `restart_worker resolves repo to correct port from config`
  - `restart_worker SIGTERMs daemon, waits for drain, re-execs`
  - `restart_worker returns 200 health check after re-launch`
  - `restart_worker rejects cross-repo callers`
  - `restart_worker enforces cooldown`
  - `restart_worker refuses docker-mode self-restart`
  - `restart_worker audit log captures all required fields`

  ## Key files

  - `src/mcp/danxbot-server.ts` — register new MCP tool
  - `src/worker/restart.ts` (new) — restart orchestration logic
  - `src/worker/server.ts` — graceful SIGTERM handler if not present
  - `Makefile` — verify `launch-worker-host` is idempotent (no-op if
    already running) so agent-initiated restarts compose cleanly
