      <!-- danxbot -->

      ## Epic split

      Promoted to `type: Epic` after scope evaluation: 9 ACs, ~700 LOC,
      crosses MCP server / worker HTTP / orchestration / audit DB.
      Split into two phase cards so each ships testable value with a
      clean commit boundary.

      - **Phase 1** — Worker-side restart route + orchestration logic
        (`src/worker/restart.ts`, `POST /api/restart/:dispatchId`,
        audit table, all guards, `/health` poll, SIGTERM/drain/re-exec).
        Operator can `curl` it directly. Covers ACs: port resolution,
        SIGTERM/drain/re-exec, /health poll, cross-repo guard, cooldown,
        docker self-restart guard, audit log fields, and tests for
        every branch.
      - **Phase 2** — MCP tool surface. Register
        `mcp__danxbot__danxbot_restart_worker`, plumb
        `DANXBOT_RESTART_WORKER_URL` through `DanxbotToolUrls` /
        `mcp-types` / `mcp-registry` / `dispatch/core`, advertise-filter
        case, dispatcher case, tests. Covers AC: tool registered + schema.

      Live end-to-end self-restart cannot be safely exercised inside the
      dispatch implementing it (the agent runs against the same danxbot
      worker it would restart). ACs are checked off via unit + integration
      tests with mocked `spawn` + fake `/health`. A first live exercise
      lands on the next danxbot dispatch after Phase 2 ships.
