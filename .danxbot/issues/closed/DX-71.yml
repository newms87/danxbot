type: Feature
title: "Autonomous worker restart > Phase 1: Worker-side restart route + orchestration"
description: |-
  ## Goal

  Ship the server-side half of `mcp__danxbot__danxbot_restart_worker`:
  a `POST /api/restart/:dispatchId` route on the worker that an
  operator (or, after Phase 2, a dispatched agent) can call to make
  the worker daemon for `<repo>` self-restart. All safeguards land in
  this phase. The MCP tool that fronts this route ships in Phase 2
  (parent epic DX-70).

  This phase is fully callable with curl after merge — it is NOT
  stopgap scaffolding waiting on a future capability.

  ## Architecture

  Two new artifacts:

  - `src/worker/restart.ts` — pure orchestration (no HTTP). Exports
    `restartWorker(input, deps): Promise<RestartResult>`. `deps` is a
    factory hook that lets tests substitute `spawn` (re-exec target),
    `now`, `fetch` (the /health poller), the cooldown clock, the
    PID source, and the audit row writer. Same pattern as
    `src/worker/dispatch.ts`'s testable seams.
  - `src/worker/server.ts` — register `POST /api/restart/:dispatchId`
    body `{repo, reason, drainInFlight?, timeoutMs?}`. Resolves the
    requesting dispatch row via `dispatches-db` (cross-repo guard)
    and forwards to `restartWorker`.

  And one DB artifact:

  - New table `worker_restarts` (id, requesting_dispatch_id, repo,
    reason, old_pid, new_pid, started_at, completed_at,
    duration_ms, outcome `'success' | 'cooldown' | 'cross_repo' |
    'docker_self' | 'spawn_failed' | 'health_timeout'`). Migration
    in the existing `src/dashboard/migrations/` directory; written-to
    by `restart.ts` via a small repository helper added alongside
    `src/dashboard/dispatches-db.ts` (or extending it — pick whichever
    is more honest about the read/write surface).

  ## Guard order (mechanical — implement exactly)

  1. `repo` field present + non-empty → 400 if not.
  2. `reason` field present + non-empty → 400 if not.
  3. Cross-repo: requested `repo` != `RepoContext.name` of this worker
     → audit `cross_repo`, return 403.
  4. Docker-mode self-restart: `config.runtime === "docker"` AND
     requested repo == own repo → audit `docker_self`, return 409.
  5. Cooldown: in-memory `Map<repo, lastRestartAt>` plus seed-from-DB
     on first call after worker boot. If `now - lastRestartAt < 30s`
     (default; configurable) → audit `cooldown`, return 429.
  6. PID sanity: read `process.pid`, sanity-check it owns the expected
     port (best-effort `lsof -i :<port>` — fall back to skipping check
     if `lsof` not available rather than failing the restart).
  7. Audit `started_at` row.
  8. Spawn detached re-launcher (host: `make launch-worker-host
     REPO=<repo>`; docker would have been blocked by guard 4).
     Detached + `unref()` so the parent SIGTERM doesn't kill it.
  9. Send SIGTERM to `process.pid`. The HTTP response is flushed
     BEFORE the SIGTERM fires (`res.end()` followed by
     `setImmediate(() => process.kill(process.pid, "SIGTERM"))`).
  10. Detached re-launcher polls `/health` until 200 or
      `timeoutMs - reservedRespawnMs` exceeded, then writes the
      `completed_at`, `new_pid`, `duration_ms`, `outcome` columns to
      `worker_restarts` for the row started at step 7.

  Note: the API caller does NOT see `newPid` or `durationMs` in the
  HTTP response — by the time those exist, the original worker
  process is gone. The audit row IS the post-restart record. Phase 2's
  MCP tool can return the audit row id so the agent can poll for
  completion if needed; today's response is `{started: true,
  oldPid, restartId, outcome: "started"}`.

  ## /health poll detail

  `/health` already exists in `src/worker/health.ts`. The poll is a
  loop: every 1s, `fetch(http://localhost:<port>/health)`, return
  on first 200, give up at `deadline`. Total wait capped by
  `timeoutMs - reservedRespawnMs` (default 60_000 - 5_000 = 55_000ms).

  ## Cross-repo guard

  Worker only knows its own `RepoContext.name`. If `body.repo !=
  ctx.name`, refuse. No cross-worker proxying — each repo's agents
  hit their own worker's `/api/restart` directly. (Future: dashboard
  proxy could add cross-worker routing; out of scope for this card.)

  ## Cooldown source of truth

  Primary: in-memory map. Re-seed on worker startup from the
  `worker_restarts` table — query the latest `success` row's
  `completed_at` per repo. This survives restart-then-restart-again
  attempts that would otherwise bypass the cooldown.

  ## Audit table fields

  | column | type | notes |
  |---|---|---|
  | id | INT auto | PK |
  | requesting_dispatch_id | VARCHAR | dispatch that called the route |
  | repo | VARCHAR | target repo |
  | reason | TEXT | non-empty per request |
  | outcome | ENUM | success / cooldown / cross_repo / docker_self / spawn_failed / health_timeout |
  | old_pid | INT NULL | populated for outcomes that reach SIGTERM |
  | new_pid | INT NULL | populated by the detached re-launcher |
  | started_at | DATETIME | request received |
  | completed_at | DATETIME NULL | populated when /health returns 200 OR timeout |
  | duration_ms | INT NULL | completed_at - started_at, set with completed_at |

  ## Tests (must all land green this phase)

  `src/worker/restart.test.ts`:
  - resolves `repo` to current worker's port
  - cross-repo restart attempt → 403, audit row outcome=cross_repo
  - cooldown within 30s → 429, audit row outcome=cooldown
  - cooldown rehydrates from DB on cold worker start
  - docker-mode self-restart → 409, audit row outcome=docker_self
  - happy path: spawns detached re-launcher (mocked `spawn`),
    SIGTERMs `process.pid` (mocked), writes audit row
  - /health poll returns on first 200
  - /health poll times out after `timeoutMs - reservedRespawnMs`
  - audit row captures requesting_dispatch_id + repo + reason +
    old_pid + new_pid + duration_ms

  `src/worker/server.test.ts`:
  - `POST /api/restart/:dispatchId` 400s on missing repo
  - `POST /api/restart/:dispatchId` 400s on missing reason
  - returns `{started:true, oldPid, restartId}` on success
  - flushes response BEFORE SIGTERM fires (response complete check)

  ## Key files

  - `src/worker/restart.ts` (new)
  - `src/worker/restart.test.ts` (new)
  - `src/worker/server.ts` (route registration, +20 lines)
  - `src/worker/server.test.ts` (route tests, +50 lines)
  - `src/dashboard/migrations/<next>_create_worker_restarts_table.sql` (new)
  - `src/dashboard/worker-restarts-db.ts` (new — small repo helper)
  - `src/dashboard/worker-restarts-db.test.ts` (new)

  ## Live validation

  Cannot be performed in the dispatch implementing this phase (would
  kill the agent's own worker). The /health-poll, SIGTERM, and
  re-exec branches are unit-tested with mocked `spawn` + fake fetch.
  Live exercise lands on the next danxbot dispatch after Phase 2,
  whose explicit purpose is "agent calls the restart tool to validate
  its own change".

  ## Out of scope

  - MCP tool registration / advertise filter / URL injection — Phase 2.
  - Dashboard cross-worker proxy — future card.
  - Restarting a worker for a DIFFERENT repo from this worker — future
    card; this phase rejects all cross-repo callers.
