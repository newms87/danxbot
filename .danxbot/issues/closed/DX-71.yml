      ## Retro

      **What went well:** Deps-injected orchestration in restart.ts kept guards, audit, spawn, and
      SIGTERM unit-testable without real forks or kills — every guard branch
      plus the postFlush ordering invariant is covered by mocks.
      spawn_failed now writes a real spawn_failed audit row (not just a stuck
      'started' row) — caught by code review and fixed in-session per Step 1.5.
      lsof helper extracted to src/worker/lsof-pid.ts so the route's old-PID
      guard and the finalizer's new-PID resolution share one impl. Full backend
      suite green: 2849 tests, type check clean.
      **What went wrong:** Card description pointed at src/dashboard/migrations/ but the real
      migration dir is src/db/migrations/ — fixed in commit. Initial pass
      skipped the spawn_failed audit transition (deferred behavior comment in
      code) — code-reviewer correctly flagged it as audit dishonesty; addressed
      by adding a completeRestart call in the spawn-throw branch. Tests across
      sibling describe blocks shared mock state (mockInsertRestart) — ate one
      re-run before adding an explicit reset in the seed→cooldown chain test.
      **Action items:** Nothing
      **Commits:** 09b6b53
