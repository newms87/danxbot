type: Feature
title: "Autonomous worker restart > Phase 2: MCP tool surface"
description: |-
  ## Goal

  Wire the `mcp__danxbot__danxbot_restart_worker` MCP tool to the
  worker route shipped in Phase 1. After merge, a dispatched agent
  can call the tool, the danxbot MCP server forwards to
  `POST /api/restart/:dispatchId` on its worker, and the response
  flows back as the tool's text content.

  Phase 1 (the route + orchestration + audit + guards) is a hard
  prerequisite. This card is `blocked` on the Phase 1 sibling card
  via `blocked.by[]`; the poller auto-unblocks once Phase 1 reaches
  Done.

  ## Surface (no behaviour beyond plumbing)

  ```
  mcp__danxbot__danxbot_restart_worker({
    repo: string,                  // required
    reason: string,                // required, non-empty
    drain_in_flight?: boolean,     // default true; forwarded
    timeout_ms?: number            // default 60000; forwarded
  })
  ```

  Returns the worker's HTTP response body verbatim — the agent sees
  `{started: true, oldPid, restartId, outcome: "started"}` on
  success or `{started: false, outcome: "<guard>"}` on a guarded
  rejection. Network / 4xx / 5xx are surfaced as JSON-RPC errors.

  ## Files (mirrors `danx_issue_save` pattern verbatim)

  - `src/agent/mcp-types.ts` — add `restartWorker?: string` to
    `DanxbotToolUrls`.
  - `src/dispatch/core.ts` — auto-inject
    `DANXBOT_RESTART_WORKER_URL = http://localhost:<workerPort>/api/restart/<dispatchId>`
    into the per-dispatch overlay alongside the existing
    `DANXBOT_STOP_URL`, `DANXBOT_ISSUE_SAVE_URL`, etc.
  - `src/agent/mcp-registry.ts` — pass `restartWorker` through to the
    danxbot MCP server's URL bag.
  - `src/mcp/danxbot-server.ts`:
    - extend `DanxbotToolUrls` (already shared with mcp-types)
    - add a `TOOLS` entry for `danxbot_restart_worker` with the
      schema above
    - add `callDanxbotRestartWorker(args, urls)` — POSTs verbatim
      JSON to `urls.restartWorker` with fail-loud guard if the URL
      is missing (same pattern as `callDanxIssueSave`)
    - add the dispatcher case in `callTool`
    - add the advertise-filter case in `buildActiveTools` keyed on
      `urls.restartWorker`
  - `src/mcp/danxbot-server.test.ts` — extend with:
    - schema present in `TOOLS`
    - advertised iff URL present
    - dispatcher routes to `callDanxbotRestartWorker`
    - `callTool` throws when URL absent
    - `callTool` POSTs the body verbatim to the URL on happy path

  ## Out of scope

  - The actual restart orchestration (Phase 1).
  - Cross-worker proxying via dashboard (future card).
  - Adding `danxbot_restart_worker` to docs/agents — fold into the
    same commit if trivial; otherwise a follow-up.
