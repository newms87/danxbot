      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** Pattern was already cleanly established by `danx_issue_save` /
      `danx_issue_create` — extending it to a third tool was almost
      mechanical. Snake_case → camelCase translation kept the Phase 1
      worker contract untouched. Renamed the internal helper
      `postIssueRoute` → `postWorkerRoute` so the third call site reads
      naturally. Tests pin every regression mode the sibling suites
      pin (advertise gating including empty-string env, fail-loud guard,
      body shape).

      **What went wrong:** Test reviewer correctly flagged that the danxbot-server.test.ts
      coverage alone leaves the wiring between dispatch → registry → MCP
      subprocess unverified at the unit layer — added matching cases in
      src/__tests__/unit/mcp-registry.test.ts and src/dispatch/core.test.ts
      after the first review pass. Should have started there knowing the
      sibling pattern.

      **Action items:** Nothing
      **Commits:** 5d146a7
