title: "Fix: orphan-resume duplicates host-mode dispatch after worker restart"
description: |-
  ## Problem

  Worker restart wipes in-memory `activeJobs`. The poller's
  `tryResumeOrphan` only checked `getActiveJob(issue.dispatch_id)` —
  also wiped — so when host-mode claude survived the restart (`script
  -q -f` reparents claude to PID 1, immune to SIGTERM cascade),
  orphan-resume saw "no live job" + a JSONL on disk → stamped a NEW
  `dispatch_id` and spawned a duplicate claude.

  Observed today on DX-66: original agent finalized + committed
  `[DX-66] Phase 6` with `dispatch_id: 1cbb878b-...`. A worker
  restart between mid-work and finalize triggered orphan-resume,
  spawning a second claude with `dispatch_id: 5d8a9dd3-...` — the
  duplicate ran in parallel, redoing Phase 6 from scratch.

  ## Root Cause

  Two checks guard against duplicate spawn:
  - `getActiveJob` — in-memory, lost on worker restart.
  - `hasLiveDispatchForCard` — DB-backed, persists across restarts
    (DX-69).

  DX-69 wired `hasLiveDispatchForCard` into the ToDo dispatch path
  but NOT the orphan-resume path. Orphan-resume runs first on every
  tick — the duplicate fires before the ToDo guard ever runs.

  ## Solution

  Mirror DX-69 inside `tryResumeOrphan`: after the in-memory
  `getActiveJob` check, also call the existing
  `hasLiveDispatchForCard(repo.name, ref.external_id)` wrapper.
  Continue (skip the card) when DB shows a non-terminal row with a
  live `host_pid`. Existing wrapper already swallows DB failures and
  fails open, so symmetry with the ToDo path is preserved.

  ## Key Files

  - `src/poller/index.ts` — added probe inside `tryResumeOrphan`
    loop; reuses the in-module wrapper added by DX-69.
  - `src/poller/index.test.ts` — added `findNonTerminalDispatches` +
    `isPidAlive` module mocks and a regression test "skips orphan
    resume when DB has a non-terminal dispatch row with a live
    host_pid for the card".

  ## Verify

  - `npx vitest run src/poller/index.test.ts` clean (103 tests).
  - `npx vitest run` clean (153 files).
  - `npx tsc --noEmit` clean.
