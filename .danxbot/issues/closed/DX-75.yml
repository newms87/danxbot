      <!-- danxbot -->

      ## Code Review

      Findings + dispositions:

      1. **Silent fallback in `resolveLabelIds`** when `needsApprovalLabelId` empty â€” accepted as the rollout contract (label provisioning lags list provisioning). Comment + `types.ts` doc updated to call out the contract explicitly.
      2. **Empty-string defaults in `loadTrelloIds`** â€” accepted; matches the optional-during-rollout pattern. Belt-and-suspenders guards already in place: `fetchOpenCards` skips empty list ids, `listIdToStatus` truthy-checks before mapping, `allManagedLabelIdsForFiltering` skips empty label id.
      3. **Unrelated `dashboard/src/style.css` change** â€” pre-existing modification by another agent. Excluded from this commit.
      4. **DRY: 4 duplicate `ManagedLabels`-shaped literal types** â€” extracted `ManagedLabels` interface in `interface.ts`; consumers (trello.ts, memory.ts, IssueTracker contract) now reference the single type.
      5. **`types.ts:111` comment accuracy** â€” rewritten to match the actual thrown message + describe the read-side short-circuit invariants.
  - id: 69fa801bc0b778e5903a1034
    author: test-reviewer
    timestamp: 2026-05-05T23:41:15.033Z
    text: |-
      <!-- danxbot -->

      ## Test Review

      Gaps closed:

      - `statusToListId("Needs Approval")` empty-listId throw (`trello.test.ts` Needs Approval suite).
      - `setLabels({needsApproval:true})` positive path â€” label applied when provisioned.
      - `setLabels` empty `needsApprovalLabelId` silently skips â€” no `""` in `idLabels`.
      - `allManagedLabelIdsForFiltering` empty-id skip â€” preserved-label filter does not strip non-managed labels.
      - `getCard` on a card whose `idList === needsApprovalListId` â†’ `status: "Needs Approval"`.
      - `listIdToStatus` regression guard for the truthy-check (empty `needsApprovalListId` does not match an empty card `idList`).
      - `loadTrelloIds` covers both paths (default `""` when key absent; configured value when provisioned).
      - `sync.ts` derives `needsApproval: true` from `status === "Needs Approval"` (mirrors the existing `needsHelp` test).
      - `parseIssue` round-trips `Needs Approval` (yaml.test.ts).
      - Worker `persistAfterSync` keeps `Needs Approval` files in `open/` (issue-route.test.ts).

      All 7 ACs have direct test evidence.
