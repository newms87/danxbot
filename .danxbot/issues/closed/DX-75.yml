    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Schema-only phase shipped clean: `IssueStatus` extension, tracker mapping, label flag, dashboard column, full test coverage, all in one commit.
      - DRY win: extracted `ManagedLabels` interface during code review â€” adding the next managed label is now a one-line edit instead of four type-literal updates.
      - Fail-loud invariants preserved at every site that reads the new optional config slot. `loadTrelloIds` defaults to `""`; `statusToListId` throws on empty list id; `setLabels` silently skips empty label id; `allManagedLabelIdsForFiltering` excludes `""` so the preserved-label filter cannot strip on blank.
      - Reviewers caught the test gaps that mattered: empty-listId throw, empty-label silent-skip, `listIdToStatus` truthy guard, sync-derives-needsApproval, `loadTrelloIds` rollout fallback. All addressed in-session.
      **What went wrong:** - Operator action still required to provision the actual Trello list + label on the danxbot board. Until the operator adds the IDs to `<repo>/.danxbot/config/trello.yml`, any agent or human that flips a YAML to `Needs Approval` will hit the fail-loud throw on the next sync. This is the intended rollout contract, but the next agent should expect to either provision the IDs or document the fail-loud surface in Phase 4 (DX-78) before the triage agent starts emitting Needs Approval.
      - Touched ~13 fixture files just to add two strings each (`needsApprovalListId`, `needsApprovalLabelId`). Used a Python script to do the mechanical insert; tedious but unavoidable until a `defaultTrelloConfig()` test helper consolidates the literals.
      **Action items:** Nothing
      **Commits:** 3841bd4
