title: "Auto-triage Epic > Phase 1: Add Needs Approval issue status"
description: |-
  ## Context

  Parent epic: DX-74. We need a fifth non-dispatchable issue status â€”
  `Needs Approval` â€” distinct from the existing `Needs Help` so the
  triage agent (Phase 4) and humans can express:

  > "An agent could write code for this, but I am not certain it is
  > the right direction. Human, please review the architectural choice
  > / disruptive scope / cross-cutting risk before we proceed."

  Today the only "park this card" terminal-but-not-closed status is
  `Needs Help`, which by `~/.claude/rules/issues.md` is reserved for
  cards where a human must SUPPLY information (creds, missing decision
  input, ambiguous AC). Conflating direction-approval with
  information-required loses signal â€” operators triaging the Needs
  Help list cannot tell which kind of intervention is needed.

  ## Solution

  ### Schema change (`src/issue-tracker/interface.ts`)

  Extend the `IssueStatus` union with `"Needs Approval"`. Add to
  `ISSUE_STATUSES` array. Status remains in the `open/` directory
  on terminal save (NOT closed) â€” analogous to `Needs Help`.

  ### YAML lifecycle (`src/poller/yaml-lifecycle.ts`)

  Confirm `Needs Approval` does NOT trigger the `open/` â†’ `closed/`
  move. Today only `Done` and `Cancelled` move; verify and add
  explicit test coverage.

  ### Worker move enforcement (`src/poller/index.ts`)

  Wherever the worker forces `status: ToDo` on `blocked` clear, leave
  `Needs Approval` alone â€” same treatment as `Needs Help`. Approval
  is cleared only by a human moving the card back to ToDo (mirrors
  Needs Help today).

  ### Tracker mirror

  Trello board needs a new "Needs Approval" list. Add list config slot
  to `<repo>/.danxbot/config/trello.yml` schema and the danxbot board's
  trello-config.md. Outbound mirror's `moveToStatus` maps
  `Needs Approval` â†’ that list id.

  ### Label

  Add a Trello label "Needs Approval" mirroring the existing "Needs
  Help" label workflow if labels are auto-applied per status. (Audit
  current behavior â€” only add if the existing pattern does so.)

  ### Tests

  - `parseIssue` accepts `Needs Approval` and round-trips.
  - `yaml-lifecycle.test.ts`: `Needs Approval` keeps file in `open/`.
  - Status-to-list mapping covers the new entry.

  ### Docs

  - `~/.claude/rules/issues.md` â€” add `Needs Approval` row to the
    status field reference; add a "Needs Approval vs Needs Help"
    section paralleling the existing "Needs Help vs Blocked" section.
  - `.claude/rules/trello-config.md` â€” add the new list id placeholder.
  - `.claude/rules/settings-file.md` â€” no change.

  ## Out of scope

  - Triage skill behavior â€” Phase 4 (DX-78) wires it.
  - Poller spawn logic â€” Phase 5 (DX-79).

  ## Key Files

  - `src/issue-tracker/interface.ts`
  - `src/poller/yaml-lifecycle.ts` + `.test.ts`
  - `src/poller/index.ts` (audit only â€” should be additive)
  - `src/issue-tracker/trello.ts` (status â†’ list map)
  - `src/__tests__/issue-tracker/*` â€” extend status-mapping coverage
  - `<repo>/.danxbot/config/trello.yml` â€” add Needs Approval list id (operator step, document in card comment if a new tracker list must be created by a human)
  - `~/.claude/rules/issues.md`
  - `.claude/rules/trello-config.md`

  ## Verify

  - Edit a YAML to `status: "Needs Approval"`, run worker tick,
    confirm file stays in `open/` and tracker mirrors to the new list.
  - `npx vitest run` clean. `npx tsc --noEmit` clean.
  - Existing `Needs Help` flow unaffected.

  ## Operator note

  Creating the new Trello list + label on the danxbot board is a
  human action (board IDs live in `trello-config.md`). If the tracker
  list does not exist yet when this card is picked up, the agent
  should set the YAML to `Needs Help` and explain in a comment so an
  operator creates the list, then resume.
