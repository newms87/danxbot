type: Feature
title: "Auto-triage Epic > Phase 2: Rename trelloPoller → issuePoller"
description: |-
  ## Context

  Parent epic: DX-74. Per DX-67 the tracker (Trello today, possibly
  others later) is a one-way mirror; the local YAML is canonical. The
  per-repo settings key + dashboard label still call the loop "trello
  poller", which is misleading — it is the **issue poller** that
  dispatches off local YAML and pushes / pulls to whatever tracker is
  wired up.

  This card renames the user-facing names without changing behavior.

  ## Solution

  ### Settings file (`src/settings-file.ts`)

  - `Feature` union: replace `"trelloPoller"` with `"issuePoller"`.
  - `FEATURES` array updated.
  - `SettingsOverrides.trelloPoller` → `SettingsOverrides.issuePoller`.
    `TrelloPollerOverride` → `IssuePollerOverride` (keep the
    `pickupNamePrefix` slot — same semantics, tracker-agnostic name).
  - `WriteSettingsPatchOverrides` updated.
  - `defaultSettings()` updated.
  - `normalizeOverrides`: read from new key first; **fall back to legacy
    `trelloPoller` key when present**, copying its value into the
    `issuePoller` slot. Next write canonicalizes (write-side never
    emits the legacy key).
  - `getTrelloPollerPickupPrefix` → `getIssuePollerPickupPrefix`.
    Update all call sites (`src/poller/index.ts`).
  - `envDefault`: case `"issuePoller"` → `ctx.trelloEnabled` (env var
    name unchanged for now — operators don't need a forced rotation).

  ### Dashboard

  - `dashboard/src/components/agents/RepoCard.vue`: FeatureToggle
    `feature="trelloPoller"` → `feature="issuePoller"`, `label="Issue
    poller"` (replaces "Trello poller").
  - `dashboard/src/composables/useAgents.ts` + tests: rename type slot
    + key references.
  - `src/dashboard/server.ts` + agents API: any explicit `"trelloPoller"`
    string literal updated.

  ### Tests

  - `settings-file.test.ts`: round-trip writes use new key; legacy-key
    read → migrated into `issuePoller` slot; default settings shape.
  - `useAgents.test.ts`: toggle key + label.
  - Snapshot / fixture JSON in tests must not contain raw
    `"trelloPoller"` after this card lands.

  ### Docs

  - `~/.claude/rules/issues.md` — already uses generic "tracker"
    language, no change expected (audit).
  - `.claude/rules/settings-file.md` — schema block + writer table:
    rename to `issuePoller`. Add a one-paragraph note: "Read-side
    accepts legacy `trelloPoller` key for one release; write-side
    always emits `issuePoller`."
  - `CLAUDE.md` (project root) — any `trelloPoller` references in the
    feature-toggle list / dashboard description.

  ## Out of scope

  - Renaming `DANX_TRELLO_ENABLED` env var (keep — would force an
    operator rotation).
  - Renaming the `Trello` MCP server, the `trello.yml` config file, or
    the `IssueTracker` Trello implementation. Those are tracker-specific
    and correctly named.
  - Removing the legacy-key read fallback. Leave the fallback in place
    until a follow-up card explicitly retires it.

  ## Key Files

  - `src/settings-file.ts` + `src/settings-file.test.ts`
  - `src/poller/index.ts` (call site of `getTrelloPollerPickupPrefix`)
  - `dashboard/src/components/agents/RepoCard.vue`
  - `dashboard/src/composables/useAgents.ts` + `useAgents.test.ts`
  - `src/dashboard/server.ts` + agents-route tests
  - `.claude/rules/settings-file.md`
  - `CLAUDE.md`

  ## Verify

  - `grep -RIn '"trelloPoller"' src dashboard` → only present inside
    the legacy-key migration block in `normalizeOverrides`.
  - Dashboard renders "Issue poller" toggle, behavior identical.
  - Existing settings.json files in dev repos with the legacy key
    still load and toggle correctly; next write emits `issuePoller`.
  - `npx vitest run` + `cd dashboard && npx vitest run` + `npx tsc
    --noEmit` + `cd dashboard && npx vue-tsc --noEmit` clean.
