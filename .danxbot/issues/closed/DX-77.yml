type: Feature
title: "Auto-triage Epic > Phase 3: autoTriage feature toggle"
description: |-
  ## Context

  Parent epic: DX-74. After Phase 2 the per-repo Feature surface is
  `slack | issuePoller | dispatchApi | ideator`. This card adds a
  fifth slot, `autoTriage`, mirroring `ideator`'s shape exactly — env
  default `false`, runtime override via dashboard.

  No behavior change yet — the toggle is read by Phase 5's
  `checkAndSpawnTriage`. This phase only adds the schema + UI plumbing.

  ## Solution

  ### Settings file (`src/settings-file.ts`)

  - Extend `Feature` union with `"autoTriage"`. Add to `FEATURES` array.
  - `SettingsOverrides.autoTriage: FeatureOverride`.
  - `WriteSettingsPatchOverrides.autoTriage` slot.
  - `defaultSettings().overrides.autoTriage = { enabled: null }`.
  - `normalizeOverrides`: handle the new key with `normalizeOverride`.
  - `envDefault`: case `"autoTriage"` returns `false` (explicit opt-in,
    same rationale as ideator — recurring agent spawn that costs
    tokens).

  ### Dashboard (`dashboard/src/components/agents/RepoCard.vue`)

  - Add a `FeatureToggle` row next to `ideator`. Suggested order
    in the grid: `slack | issuePoller | dispatchApi | ideator | autoTriage`.
    The grid template currently uses `lg:grid-cols-4`; bump to
    `lg:grid-cols-5` (or wrap on smaller breakpoints — designer call,
    keep minimal CSS change).
  - Subline: `"triages Action Items + Review when ToDo is empty"`.

  ### Tests

  - `settings-file.test.ts`: default settings include `autoTriage`
    slot; round-trip; envDefault returns `false`; explicit override
    `true` / `false` honored.
  - `useAgents.test.ts`: type slot present; toggle write goes through.
  - Dashboard `RepoCard.vue` snapshot / render test (if one exists)
    updated for new toggle.

  ### Docs

  - `.claude/rules/settings-file.md` — extend the schema example +
    writer table with `autoTriage`. Note env default `false` and
    semantics (Phase 4/5 behavior referenced but not duplicated).

  ## Out of scope

  - Wiring the toggle into the poller — Phase 5 (DX-79).
  - Skill behavior — Phase 4 (DX-78).
  - Any tracker / list config — Phase 1 (DX-75).

  ## Key Files

  - `src/settings-file.ts` + `src/settings-file.test.ts`
  - `dashboard/src/components/agents/RepoCard.vue`
  - `dashboard/src/composables/useAgents.ts` + `useAgents.test.ts`
  - `.claude/rules/settings-file.md`

  ## Verify

  - Settings file with no `autoTriage` key reads back with the slot
    initialized to `{ enabled: null }`.
  - Toggling on the dashboard writes `overrides.autoTriage.enabled`
    and meta.updatedBy carries the operator.
  - `isFeatureEnabled(repo, "autoTriage")` returns `false` by default,
    `true` when the operator flips the toggle.
  - All type-checks + tests clean (backend + dashboard).
