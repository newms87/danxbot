title: "Auto-triage Epic > Phase 4: danx-triage auto mode + Needs Approval outcome"
description: |-
  ## Context

  Parent epic: DX-74. Phases 1–3 are schema / dashboard plumbing.
  This phase teaches the existing `danx-triage` skill how to be
  invoked by the poller in **auto mode** with a fixed scope (Action
  Items list FIRST, Review list SECOND) and how to emit the new
  `Needs Approval` decision.

  Existing skill spec:
  `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md`.
  Reads, edits, and saves YAMLs; classifies into 6 states; maps
  terminal cases to `status` moves; never touches the tracker
  directly.

  ## Solution

  ### New invocation: `/danx-triage auto`

  Add to the SKILL.md scope table:

  | `/danx-triage auto` | Scope = Action Items list (priority 1) + Review list (priority 2). Ignore the default open-YAML scope. Skip already-triaged AND <24h floors. NEVER skip; every card gets a decision. |

  In auto mode the orchestrator's Step 1 ("Resolve Scope") becomes:
  1. Use `mcp__danx-issue__danx_issue_list({status: "ToDo", list_kind: "action_items"})` (or equivalent fetch — confirm actual MCP surface) to enumerate Action Items.
  2. Use `mcp__danx-issue__danx_issue_list({status: "Review"})` to enumerate Review.
  3. Concatenate Action Items first, then Review. This is the priority order the report uses.

  ### New outcomes — split `Ambiguous`

  Today `Ambiguous` → `status: Needs Help`. After Phase 1 ships
  `Needs Approval`, split:

  | New `triaged.status` | When | YAML `status` |
  |---|---|---|
  | `NeedsHelp` | Card spec is incomplete; agent needs a human to SUPPLY information (creds, decision input, missing AC). | `Needs Help` |
  | `NeedsApproval` | Card is implementable but direction is uncertain (architectural ambiguity, disruptive scope, cross-cutting risk, plausible-but-not-obvious ask). Agent should NOT proceed without a human signing off. | `Needs Approval` |

  Update Step 2c "Classify into one of N states":
  - Replace `Ambiguous` row with two rows for `NeedsHelp` and
    `NeedsApproval` per the table above.
  - Provide 2-3 worked examples for each so the subagent can
    distinguish.

  Update Step 2f terminal-move table accordingly.

  Update Step 6 completion summary template to reference the new
  outcomes.

  Update Step 5 report column to render `NeedsHelp` vs `NeedsApproval`
  distinctly.

  ### Auto-mode reporting

  In auto mode, Step 5's report MUST also call out:
  - Count of cards moved into ToDo (now dispatchable on next tick).
  - Count of `NeedsApproval` cards — these need human attention.
  - The card titles + ISS-N for any `NeedsApproval` outcome (operators
    skim Trello but the report comment is ground truth).

  ### Triage prompt template (`src/poller/constants.ts`)

  Add a sibling to `IDEATOR_PROMPT` named `TRIAGE_AUTO_PROMPT`. Body
  invokes the skill in auto mode and emphasizes:
  - Action Items first, Review second.
  - Never skip; every card gets one of: ToDo / Done / Cancelled / Needs Help / Needs Approval.
  - Use `Needs Approval` when uncertain about direction; `Needs Help`
    only when missing information from a human.

  Phase 5 (DX-79) imports this constant. Defining it here keeps the
  spawn site small.

  ## Out of scope

  - Poller integration — Phase 5.
  - Settings toggle — Phase 3.
  - Adding new tracker MCP tools — use existing `danx_issue_list` /
    `danx_issue_save`.

  ## Key Files

  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md`
  - `src/poller/constants.ts` — add `TRIAGE_AUTO_PROMPT`
  - Possible: small JSON fixture / unit test asserting prompt contents
    contain the auto-mode markers.

  ## Verify

  - SKILL.md auto-mode section is self-contained (zero-context test).
  - `TRIAGE_AUTO_PROMPT` exported and importable from
    `src/poller/constants.ts`.
  - Manual smoke (no need to wire poller yet): `/danx-triage auto` in
    a dispatched issue-worker classifies an Action Items card and a
    Review card, with one of the five outcomes each, and writes the
    YAML correctly.
  - `npx vitest run` clean. `npx tsc --noEmit` clean.

  ## Depends on

  - DX-75 (Needs Approval status). Without it the YAML save fails
    validation. Phase 5 enforces the dependency at the poller level;
    here it's a soft order — pickup of DX-78 should happen after
    DX-75 is Done.
