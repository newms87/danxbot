      ## Retro

      **What went well:** - Spec edits to `danx-triage/SKILL.md` (auto-mode scope, classification split, terminal-move table, Step 5/6 addenda) shipped self-contained — zero-context test holds.
      - `TRIAGE_AUTO_PROMPT` exported with stable invariants pinned in `constants.test.ts` (first-line spawn contract, priority ordering, status enumeration). Phase 5 has a clean handoff target.
      - Code-reviewer feedback on Step 1.auto scope ambiguity addressed before commit — the doc now honestly distinguishes "explicit partition (Phase 5)" from "implicit glob partition (manual smoke)" instead of pretending list_kind is on disk.
      - Smoke-by-dry-run: classified one Review epic (DX-82 → Keep → ToDo) and one ToDo card (DX-14 → NeedsHelp → Needs Help, since description + AC are empty) without mutating their YAMLs — the procedure produced valid IssueStatus outcomes for real cards.

      **What went wrong:** - The running worker still requires the legacy `phases: []` field on save even though `src/issue-tracker/yaml.ts` (modified by the parallel DX-81 worker) no longer validates it. Had to re-add `phases: []` to DX-78 + DX-79 YAMLs to land the saves. Once DX-81 ships and the worker rebuilds, this hack drops out — but the cross-agent timing is awkward.
      - `list_kind` is not persisted on YAML (lives only on `IssueRef`), so standalone `/danx-triage auto` cannot distinguish Action Items from regular ToDo on disk. Documented honestly in Step 1.auto rather than papered over; Phase 5 supplies the partition explicitly via `tracker.fetchOpenCards()`.

      **Action items:** Nothing
      **Commits:** 592c941
