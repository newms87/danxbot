      <!-- danxbot -->

      ## Notes from Phase 1 (DX-75)

      **Schema is in place — your job is the agent behavior.** Phase 1 (commit 3841bd4) shipped:

      - `IssueStatus` union + `ISSUE_STATUSES` array carry `"Needs Approval"`. `parseIssue` round-trips it. Worker `persistAfterSync` keeps the YAML in `open/` (non-terminal). The poller does NOT dispatch cards in this status (verify in `src/poller/index.ts` — Needs Approval is not in any dispatch source).
      - `ManagedLabels` interface (`src/issue-tracker/interface.ts`) is the canonical shape for the booleans we push to the tracker. `sync.ts` already derives `needsApproval: status === "Needs Approval"` and pushes via `setLabels`. You don't need to touch any of this.
      - Tracker mapping: `TrelloConfig` carries `needsApprovalListId` + `needsApprovalLabelId`; `loadTrelloIds` reads them as ROLLOUT-OPTIONAL with empty-string default. `statusToListId("Needs Approval")` THROWS when the list id is empty. `setLabels` silently skips applying the label when label id is empty.

      **CRITICAL operator-action gate before your skill ships:**

      The actual Trello list + label do NOT exist on the danxbot board yet. Until the operator (a) creates the list "Needs Approval" + label "Needs Approval" on the board, and (b) updates `<repo>/.danxbot/config/trello.yml` to add `lists.needs_approval: <id>` and `labels.needs_approval: <id>`, ANY card flipped to `status: Needs Approval` will throw on the next sync.

      Implications for your skill:
      1. **Document this loudly in the auto-mode SKILL.md.** Before emitting `Needs Approval` for the first time, the skill should pre-check that `lists.needs_approval` is non-empty in trello.yml. If empty, the auto-triage agent should fall back to `Needs Help` for that card with a comment "Direction approval needed; Trello board not yet provisioned" so the operator sees the blocker.
      2. Alternatively, file a Needs Help action-item card (separate from this Phase 4 card) explicitly asking the operator to provision the Trello list + label, then proceed with `Needs Help` as the parking status until the operator unblocks. Either path is acceptable — pick what fits your skill's classification flow.
      3. The placeholder rows are documented in `.claude/rules/trello-config.md` (gitignored, but human-readable in the danxbot repo) and the danxbot self-config `.danxbot/config/trello.yml` carries commented placeholder lines.

      **Outcome → status mapping (from epic DX-74):**

      | Outcome | Status to set |
      |---|---|
      | Already complete | `Done` |
      | Obsolete / superseded | `Cancelled` |
      | Ready, direction clear | `ToDo` |
      | Spec incomplete, human SUPPLIES info | `Needs Help` |
      | Direction unclear, architectural risk | `Needs Approval` (if board provisioned) |

      **Concurrent agent activity to watch:** another agent (DX-81) is reshaping `src/issue-tracker/interface.ts` (removed the `phases[]` field on the `Issue` type — epics now use `children[]` exclusively for phase cards). Their changes were uncommitted at Phase 1 commit time. If they ship between now and your dispatch, expect to see no `phases[]` field on the `Issue` interface and the `IssuePhase` type may also be gone. The `phases[]` checklist on cards lives on the YAML schema only via that interface, so re-read interface.ts before assuming any phase-related shape.

      **Useful paths:**
      - Skill spec: `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md`
      - `IssueStatus` union: `src/issue-tracker/interface.ts:37`
      - Tracker `moveToStatus` + `setLabels`: `src/issue-tracker/trello.ts`
      - YAML save: `mcp__danxbot__danx_issue_save({id})` (worker route at `src/worker/issue-route.ts`)
      - Phase 3 toggle (already shipped): `overrides.autoTriage.enabled` in `<repo>/.danxbot/settings.json`. Read via `isFeatureEnabled(ctx, "autoTriage")`.
