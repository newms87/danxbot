      ## Needs Help — live-environment smoke needs operator action

      **What's done:**

      - Wiring landed in commit `38e0fed`. `checkAndSpawnTriage` runs before `checkAndSpawnIdeator` in `_poll`'s empty-ToDo branch, gates on `isFeatureEnabled(repo, "autoTriage")`, filters Action Items / Review candidates minus those whose local YAML carries non-empty `triaged.timestamp`, fails CLOSED on read errors, and spawns via the new shared `spawnPollerApiAgent` helper with `endpoint: "poller/auto-triage"`.
      - 8 of 9 ACs verified via the unit suite. Full backend `npx vitest run` (2897 tests) + `npx tsc --noEmit` clean.
      - Docs updated in `CLAUDE.md` (per-repo feature toggles section now lists 5 toggles incl. `autoTriage`) and `.claude/rules/agent-dispatch.md` (Poller path specifics gained an empty-ToDo branch ordering bullet).

      **What's still needed (live-environment smoke per Verify section):**

      1. Toggle `autoTriage` ON for the danxbot repo via the dashboard Agents tab (or edit `<repo>/.danxbot/settings.json`'s `overrides.autoTriage.enabled` to `true`).
      2. Ensure the ToDo list is briefly empty (drain or pause card creation).
      3. Place a fixture card on the Trello Action Items list (e.g. a no-op "smoke fixture — delete after").
      4. Wait one poll tick (~60s). Confirm via `make logs REPO=danxbot`:
         - `[danxbot] Auto-triage: 1 untriaged card — spawning triage`
         - A new dispatch row tagged `endpoint: "poller/auto-triage"` shows in the dashboard.
         - The fixture card's local YAML at `<repo>/.danxbot/issues/open/<id>.yml` gains a non-empty `triaged.timestamp` and a triage-classified `status` within the spawned session.
      5. Disable `autoTriage`, repeat — confirm ideator path runs (or no-op when Review is full enough).

      **Why this needs human/host help:**

      The smoke requires (a) operator toggle on the dashboard, (b) Trello write to place the fixture card (agent path is forbidden from `mcp__trello__*` per project CLAUDE.md — the danxbot worker is the sole tracker writer), and (c) observing a live poller tick from outside the dispatched session that this agent runs in. Unit tests prove the wiring path branch-by-branch, but the live-system confirmation is operator-territory.

      **Incomplete ACs:**

      - End-to-end smoke against danxbot repo passes per Verify section

      **Final AC check:** Before Done, every AC must be `checked: true`. After the operator runs the smoke and confirms the four observations above, set the smoke AC to `checked: true` and move the card to Done.
