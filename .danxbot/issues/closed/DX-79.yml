      <!-- danxbot -->

      ## Notes from Phase 4 (DX-78)

      Phase 4 shipped (commit `592c941`). Skill + prompt are ready for the poller to invoke.

      **What's available for Phase 5:**

      - `TRIAGE_AUTO_PROMPT` exported from `src/poller/constants.ts` — multi-line slash-command prompt. First line is `/danx-triage auto`; subsequent lines emphasize Action Items priority 1, Review priority 2, the five outcomes, and the Needs Help vs Needs Approval distinction. Spawn this verbatim — Phase 5 should NOT inline a hand-rolled prompt.
      - `danx-triage` SKILL.md auto-mode branch (Step 1.auto) — Phase 5 can either:
        1. **Implicit partition** — spawn with no extra prompt body. The skill globs `<repo>/.danxbot/issues/open/*.yml`, partitions ToDo as priority 1 and Review as priority 2, and triages everything. ToDo here includes Action Items because `list_kind` is NOT persisted on YAML (lives only on `IssueRef`).
        2. **Explicit partition (recommended)** — Phase 5 calls `tracker.fetchOpenCards()`, picks `IssueRef.list_kind === "action_items"` for priority 1 and `status === "Review"` for priority 2, and appends the resolved id list to `TRIAGE_AUTO_PROMPT` so the skill triages exactly that scope. Step 1.auto already documents this dual-mode contract — read the prompt for explicit ids first, fall back to glob if absent.

      **Critical operator gate (carried forward from DX-75):** `Needs Approval` outcomes only succeed once `<repo>/.danxbot/config/trello.yml` has `lists.needs_approval` + `labels.needs_approval` populated. Until then, the auto-mode skill falls back to `Needs Help` for those cards (documented in Step 1.auto). Phase 5 does NOT need to gate the spawn on this — the skill handles it.

      **Toggle:** Phase 3 already shipped `overrides.autoTriage.enabled` (default `false`). Phase 5 reads via `isFeatureEnabled(ctx, "autoTriage")`. When false, do not spawn; when true and ToDo queue is empty, spawn the auto-triage agent.

      **Useful paths:**
      - `src/poller/constants.ts` — `TRIAGE_AUTO_PROMPT` (alongside `IDEATOR_PROMPT`)
      - `src/poller/constants.test.ts` — auto-mode prompt invariants pinned in tests
      - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md` — auto-mode spec (Step 1.auto, Step 2c, Step 2f, Step 5 addendum, Step 6 summary)
