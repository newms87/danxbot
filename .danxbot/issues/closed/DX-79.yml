title: "Auto-triage Epic > Phase 5: poller checkAndSpawnTriage on empty ToDo"
description: |-
  ## Context

  Parent epic: DX-74. Final phase. Phases 1–4 add the status,
  the toggle, and the skill behavior. This phase wires the poller to
  spawn the triage agent when ToDo is empty AND the operator has
  enabled `autoTriage`.

  ## Solution

  ### `src/poller/index.ts`

  In `_poll`, after `resolveBlockedCards` and before the existing
  empty-ToDo branch:

  ```
  if (cards.length === 0) {
    if (await checkAndSpawnTriage(repo, tracker)) {
      return; // single-dispatch invariant
    }
    log.info(`[${repo.name}] No cards in ToDo — checking if ideator needed`);
    await checkAndSpawnIdeator(repo, tracker);
    return;
  }
  ```

  New `checkAndSpawnTriage(repo, tracker): Promise<boolean>` —
  returns `true` when it spawned (caller returns immediately to honor
  the per-tick single-dispatch invariant), `false` otherwise.

  Implementation skeleton (mirror `checkAndSpawnIdeator`):

  1. `if (!isFeatureEnabled(repo, "autoTriage")) return false;`
  2. Fetch open cards from tracker (already cached in caller — pass
     in instead of re-fetching, or accept a small extra round-trip).
  3. Compute eligibility:
     - Action Items list cards (`list_kind === "action_items"`).
     - Review cards (`status === "Review"`).
     - Skip cards whose local YAML carries non-empty
       `triaged.timestamp` (already triaged within the idempotence
       window — re-triage requires explicit `/danx-triage refresh`).
     - If eligible set is empty, return `false`.
  4. Tag dispatch as API trigger (same pattern as ideator):
     `metadata.endpoint: "poller/auto-triage"`.
  5. `spawnClaude(repo, TRIAGE_AUTO_PROMPT, {...})`.
  6. Return `true`.

  ### Tests (`src/poller/index.test.ts`)

  - autoTriage off → no spawn (existing ideator gating still wins or
    skips per current behavior).
  - autoTriage on, ToDo empty, Action Items list has 1+ untriaged
    cards → triage spawned, ideator NOT called.
  - autoTriage on, ToDo empty, NO untriaged Action Items / Review
    cards → triage NOT spawned, ideator path runs.
  - ToDo non-empty → triage NOT considered (existing dispatch path).
  - Triage runs BEFORE ideator (assertion via mock spawn order).

  ### Docs

  - `CLAUDE.md` (project root) — add `autoTriage` to the per-repo
    feature toggle list. Brief sentence on what it does.
  - `.claude/rules/agent-dispatch.md` — under "Spawn Flow End-To-End"
    or "Poller path specifics", note that an empty ToDo can spawn
    triage before ideator when `autoTriage` is on.

  ## Single-dispatch invariant

  Per existing poller contract, ONE spawn per tick. Triage spawn
  preempts ideator spawn — never both in the same tick. Both still
  preempted by any `cards.length > 0` ToDo dispatch.

  ## Out of scope

  - Re-triaging cards on a recurring schedule (the `<24h` floor +
    `triaged.timestamp` idempotence handle drift naturally).
  - Triaging open YAMLs that are NOT in Action Items / Review (Phase 4
    skill default scope already covers manual `/danx-triage` for
    that).

  ## Key Files

  - `src/poller/index.ts`
  - `src/poller/constants.ts` (import `TRIAGE_AUTO_PROMPT`)
  - `src/poller/index.test.ts`
  - `CLAUDE.md`
  - `.claude/rules/agent-dispatch.md`

  ## Verify

  - Local end-to-end: enable `autoTriage` on the danxbot repo, drain
    ToDo, place a fixture card in Action Items, wait one poll tick,
    confirm triage spawns and the card is reclassified within the
    spawned session.
  - Disable `autoTriage`, repeat, confirm ideator path runs (or no-op
    if Review is full enough).
  - `npx vitest run` clean. `npx tsc --noEmit` clean.

  ## Depends on

  - DX-77 (autoTriage toggle exists in settings + dashboard).
  - DX-78 (TRIAGE_AUTO_PROMPT constant exists; skill knows auto mode).
  - DX-75 (Needs Approval status exists; otherwise triage decisions
    will fail validation when emitting that outcome).
