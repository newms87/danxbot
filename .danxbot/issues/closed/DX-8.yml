      ## Retro

      **What went well:** Fix already shipped in commit `9bf2e50` from a prior dispatch — the
      close-handler now drains the watcher before reading
      `getLastAssistantText()`, so the JSONL bytes for the final
      assistant block are guaranteed to be ingested before summary
      capture. Re-verified in this dispatch by running the targeted test
      plus the full `dispatch-pipeline.test.ts` suite (14/14 green,
      62s). No further code change required.
      **What went wrong:** Card came back through ToDo because the prior agent's terminal
      save did not flip `status` to Done — the retro comment landed but
      the YAML status stayed ToDo, so the poller re-dispatched the
      fully-fixed card. Cost was a single re-verification run.
      **Action items:** Nothing
      **Commits:** 9bf2e50
