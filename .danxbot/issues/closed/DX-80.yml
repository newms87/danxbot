title: "Fix: dashboard vitest yaml CJS import breaks 43 tests"
description: |-
  ## Problem

  After commit `a263ddf` (`[Dashboard > Issues] MarkdownEditor + CodeViewer
  in drawer; AC tab`), running the full dashboard test suite
  (`cd dashboard && npx vitest run`) reports `3 failed | 17 passed (20)` /
  `43 failed | 132 passed (175)`. Backend suite + tsc + vue-tsc are clean.
  Failures all share the same root error:

  ```
  SyntaxError: Named export 'parse' not found. The requested module
  '../../node_modules/yaml/browser/dist/public-api.js' is a CommonJS
  module, which may not support all module.exports as named exports.
  ```

  Affected test files (none touched by recent feature work):
  - `dashboard/src/components/SettingsPage.test.ts` (entire suite fails)
  - `dashboard/src/App.test.ts` (5 cases)
  - `dashboard/src/composables/useStream.test.ts` (~37 cases)

  ## Root Cause (TBD — needs verification)

  `yaml` package has dual exports (`node` ESM + `default` browser CJS-ish).
  Vitest in `happy-dom` env resolves `default` → CJS bundle → ESM consumers
  cannot use named `parse` import. Transitive: `@backend/dashboard/issues-reader.js`
  → `../issue-tracker/yaml.js` (`import { parse } from "yaml"`) — pulled
  into the dashboard test graph by issues-tab components that import types
  from `@backend/dashboard/issues-reader.js`. New imports added in
  `a263ddf` widened the import surface enough to trigger the resolution.

  ## Solution

  Likely fix in `dashboard/vitest.config.ts`:

  ```ts
  resolve: {
    alias: { "@backend": resolve(__dirname, "../src") },
    conditions: ["node"],   // prefer Node ESM over browser CJS
  },
  ```

  Verify with: `cd dashboard && npx vitest run` → expect 175/175 passing.
  If `conditions` doesn't suffice, alias `yaml` directly to its Node entry
  (`yaml: resolve(__dirname, "../node_modules/yaml/dist/index.js")`).

  ## Out of scope

  - Refactor of issues-reader / drawer code — this is purely a test-config
    regression.

  ## Key Files

  - `dashboard/vitest.config.ts`
  - `dashboard/src/App.test.ts`
  - `dashboard/src/components/SettingsPage.test.ts`
  - `dashboard/src/composables/useStream.test.ts`
  - `node_modules/yaml/package.json` (reference only — read its `exports`)

  ## Verify

  - `cd dashboard && npx vitest run` exits 0 with all suites passing.
  - `cd dashboard && npx vue-tsc --noEmit` still clean.
  - No regressions to backend suite or `npx tsc --noEmit`.
