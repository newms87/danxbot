    text: |-
      <!-- danxbot -->

      ## Bug Diagnosis

      **Problem:** `cd dashboard && npx vitest run` exits 1. Two
      independent failure modes accounted for all 43 reported
      failures:

      1. `SyntaxError: Named export 'parse' not found` against
         `node_modules/yaml/browser/dist/public-api.js` — broke
         `SettingsPage.test.ts` (suite-level fail, 0 tests run) and
         all 5 cases in `App.test.ts`.
      2. Every test in `useStream.test.ts` (38) reported as failed.

      **Root Cause:**

      1. `danx-ui` ships a vendored copy of `yaml` at
         `dashboard/node_modules/danx-ui/dist/node_modules/yaml/`.
         There is no `package.json` inside the vendored dir, so
         vite-node walks up to danx-ui's `package.json` (which is
         `"type": "module"`) — but vite-node's externalization /
         CJS-interop path still flagged the `browser/dist/*.js`
         files as CJS, which broke the named ESM `import { parse }
         from "yaml"` chain reaching them through `SettingsPage.vue`
         → `danx-ui` → vendored yaml. Verified by grepping the
         danx-ui dist tree.
      2. Vitest 4.1.4's default `useFakeTimers()` toFake set hangs
         `vi.useRealTimers()` inside `afterEach`. Verified with a
         minimal repro: empty test, `beforeEach(() => vi.useFakeTimers())`,
         `afterEach(() => vi.useRealTimers())` — afterEach reports
         `Hook timed out in 10000ms`. Pinning toFake to the standard
         set resolves it. Independently confirmed the useStream
         suite was broken at commit `313bb3e` (3 commits before
         `a263ddf`) via worktree, ruling out an a263ddf regression
         for that half.

      **Solution:** Add two blocks to `dashboard/vitest.config.ts`:

      - `test.server.deps.inline: ["danx-ui"]` — Vite transforms
        danx-ui through its own pipeline, sidestepping the CJS-as-ESM
        misclassification.
      - `test.fakeTimers.toFake: [<standard list>]` — explicit set
        excludes whatever new vitest-4 default entry breaks teardown.

      Verification: dashboard `vitest run` 179/179, `vue-tsc` clean,
      backend `vitest run` 2873/2873, backend `tsc` clean.
