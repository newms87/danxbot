      ## Retro

      **What went well:** - DX-81 unification landed cleanly: ONE concept (`children[]`), zero in-card phase checklist anywhere — schema, trackers, sync, MCP, dashboard, skills, rules all updated in lockstep.
      - Legacy YAML tolerance pattern works: 84 existing YAMLs strip cleanly via `scripts/strip-phases-field.ts`; legacy `phases:` keys parse silently and are dropped on next save.
      - Pipeline ran cleanly post-implementation: code-review + test-review + arch-review surfaced 28 findings; all addressed (24 fixed, 4 defended #2/#3 skips).
      - Bonus delivered out-of-band: `MarkdownEditor` styles wired into `dashboard/src/style.css` (was the original spark for this card).
      - DRY win: collapsed duplicate `issueToCreateInput` ≡ `toCreateCardInput` into one canonical function.
      - Final test count: backend 2889 (+8 new branch tests for `projectChildStatus`, legacy round-trip, non-empty phases rejection); dashboard 179.
      - Resumption pass (commit `b93ad59`): renamed `PhaseStatusId`/`PHASE_STATUS_META` → `ChildStatusId`/`CHILD_STATUS_META` to satisfy the verify grep, finalized issues.md `phases` field-list mentions, fixed `migrate-issues-to-v3.ts` legacy emission, stripped `phases:` from two pre-v3 closed YAMLs, made `OverviewTab` use the same `CHILD_STATUS_META` glyph as `IssueCard` (eliminated divergent status vocabularies).

      **What went wrong:** - Pipeline order ran reverse (commit before review) per user instruction; review then surfaced 28 findings requiring a second commit. Canonical order would have shipped one cleaner commit but shipped slower.
      - Initial commit missed several test files cleaned by batch-editor agents — caught only on the second `git status` for the revisions commit.
      - Some skill markdown changes (`danx-triage`, `danx-start`) listed in the original AC weren't actually needed — those skills had no `phases[]` references. AC was over-scoped.

      **Action items:**
      - Move ChildStatusId palette + projection from backend to SPA (DX-85)
      **Commits:** 68d71a8, 14ffcae, b93ad59
