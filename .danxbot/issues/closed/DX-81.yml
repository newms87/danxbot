type: Feature
title: Unify phases[] and children[] into one concept (children = phases)
description: |-
  ## Context

  Today the `Issue` schema has TWO related-but-distinct fields:

  - `phases[]` — `IssuePhase[]` checklist (`{check_item_id, title, status, notes}`) on the card itself, projected as a Trello "Implementation Phases" checklist. Used for in-card sequential work that doesn't warrant separate cards.
  - `children[]` — `string[]` of `ISS-N` ids on Epic cards, listing the child phase cards. Reverse linkage via `parent_id`.

  This split confuses the model: agents have to decide between "phases on one card" vs "split into epic" at planning time, and the two paths use different fields, different docs, different skill steps. Operators see two different "phase" surfaces (in-card checklist + child cards under an Epic) that mean different things.

  ## Solution

  **Unify to ONE concept: `children[]` — ordered list of `ISS-N` ids.** Phases MUST be cards. Drop the `phases[]` field entirely.

  - `children[]` is available on every card type.
  - Epic's `children[]` = its phases. UI/skills label them **Phases** when `type === "Epic"`.
  - Non-epic's `children[]` = sub-cards. UI/skills label them **Children**.
  - One card per phase. Each phase card defines its full scope (description, AC). Epic stays In Progress while phases work; flips Done when all children are Done.

  Existing `phases[]` data on YAMLs is dropped on next normalize/save (legacy field stripped silently). No auto-conversion to child cards — operators triage anything important manually.

  ## Acceptance Criteria

  Every AC item below is a concrete deliverable. Mark `checked: true` only when verified by test, command output, or runtime behavior.

  ### Schema + types

  - `IssuePhase` interface and `PhaseStatus` type removed from `src/issue-tracker/interface.ts`.
  - `phases` field removed from `Issue` and `CreateCardInput` interfaces.
  - `addPhaseItem` / `updatePhaseItem` / `deletePhaseItem` removed from the `IssueTracker` interface.
  - `PHASE_STATUSES` constant removed.
  - All consumers in `src/` updated to compile clean (`npx tsc --noEmit`).

  ### Validation + normalize

  - `validateIssue` (or equivalent) accepts YAMLs WITHOUT a `phases` field as valid; treats incoming `phases:` as legacy and drops it silently on the next save.
  - `normalize` (or YAML read path) strips `phases` from parsed objects so downstream code never observes the legacy field.
  - Tests added covering: legacy YAML with `phases[]` parses + saves cleanly with the field removed; YAML without `phases` parses + saves cleanly.

  ### Tracker implementations

  - `MemoryTracker` no longer stores or returns `phases`. All phase-related methods deleted. Tests updated.
  - `TrelloTracker` no longer creates, reads, or writes the "Implementation Phases" checklist on cards. The phase checklist constant and any `PHASES_CHECKLIST_NAME` references removed. Existing Trello checklists named "Implementation Phases" are NOT auto-deleted by this change — operators may delete them manually; the worker just stops touching them. Tests updated.
  - `getCard` returns `Issue` without `phases` populated.
  - `createCard` input no longer accepts `phases`.
  - `addComment`, `setLabels`, `moveToStatus`, AC handling all unchanged.

  ### Existing YAMLs migration

  - All YAMLs in `/home/newms/web/danxbot/.danxbot/issues/{open,closed}/*.yml` have their `phases:` key removed. Any non-empty `phases[]` content discovered during the strip is logged in this card's `comments[]` for operator awareness — agents then decide manually whether to file follow-up cards for the discarded work.
  - All YAMLs across connected repos with `phases:` keys are stripped on next worker boot via the normalize-on-read path (no separate one-shot migrator script required — the read path handles it lazily).

  ### MCP surface

  - `danx_issue_create` rejects `phases` field with a clear error (`"phases field removed; use children[] for sub-cards"`).
  - `danx_issue_save` accepts YAMLs whose `phases:` key is present (legacy) and silently strips it on save.
  - MCP tool descriptions updated to mention only `children[]`, never `phases`.

  ### Skills (workspace inject)

  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md` — Step 3 (epic split) rewritten: small multi-step work tracked via `ac[]` only (no in-card phase checklist exists anymore); large multi-step work split into Epic + child cards. Step 3.2 phase-creation block updated to set `parent_id` + append id to epic's `children[]` only (no `phases[]` writes). The `blocked.by` stamping on phase 2..N (added earlier this session) preserved. References to `phases[i].status: Complete` changed to "child phase card reaches Done".
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-epic-link/SKILL.md` — phase-detection logic stays (regex match `Phase N:` in title to order siblings). Step 3.5 (`blocked.by` stamping) preserved. Any references to writing `phases[]` removed.
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md` — phase-handling references replaced with children-handling. ICE-score on epic cards reads `children[]` to find phase cards.
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-start/SKILL.md` — same treatment.
  - Schema reference table in `danx-next/SKILL.md` updates `phases` row → drops it; `children` row gets the dual-label note.

  ### Rules docs

  - `~/.claude/rules/issues.md` — "YAML Schema" table drops `phases` row; `children` row updated with the unified semantics ("Epic = phases, non-epic = sub-cards"). "Phases vs Epics" section rewritten: there is ONE shape ("children = ordered child cards"); the small-multi-step path now uses `ac[]` only or splits into epic + children.
  - `~/.claude/rules/planning.md` — "Phases" section updated: each phase = one card, no in-card checklist option.

  ### Dashboard

  - `dashboard/src/components/IssueDrawer.vue` (or wherever the phases panel renders) — phases panel removed. Children list rendered with header "Phases" when issue type is Epic, "Children" otherwise. Each child renders as a clickable link that opens the child issue in the drawer.
  - Markdown editor styles imported correctly (already fixed this session — verify still loads).
  - `npx vue-tsc --noEmit` clean.

  ### Tests

  - `npx vitest run` clean across backend + dashboard.
  - All test fixtures with `phases:` updated to drop the field. Where a test was specifically asserting phase-checklist behavior, the test is deleted (the behavior no longer exists) and the deletion noted in the test file's git diff via removed lines.
  - New test in `src/issue-tracker/validate.test.ts` (or equivalent): legacy YAML with `phases[]` round-trips through normalize → save without the field reappearing.
  - New test in `src/poller/yaml-lifecycle.test.ts`: epic + child cards interact via `children[]` only; no `phases[]` reference anywhere in lifecycle.

  ### Verify

  - `npx vitest run` clean.
  - `cd dashboard && npx vitest run` clean.
  - `npx tsc --noEmit` clean.
  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - `grep -rn "phases\[" src/ dashboard/src/` returns zero matches in code (only comments referencing legacy migration may remain).
  - `grep -rn "IssuePhase\|PhaseStatus\|PHASE_STATUSES\|addPhaseItem" src/ dashboard/src/` returns zero matches.
  - Boot worker locally; pick up an existing card with `phases:` in its YAML; confirm worker save strips the field cleanly without breaking sync.
  - Open dashboard Issues drawer on an Epic; confirm Phases header + child links render; on a non-epic with children, confirm Children header.

  ## Out of scope

  - Auto-converting old `phases[]` items into child cards. Lossy by design — the items lacked descriptions + AC.
  - Cleaning up existing Trello "Implementation Phases" checklists on the board (operator does manually).
  - Backfilling `children[]` on legacy non-epic cards that should have had sub-cards. Existing data stays as-is.

  ## Key Files

  - `src/issue-tracker/interface.ts`
  - `src/issue-tracker/memory.ts`
  - `src/issue-tracker/trello.ts`
  - `src/issue-tracker/validate.ts` (or wherever Issue validation lives)
  - `src/poller/yaml-lifecycle.ts`
  - `src/danx-issue-mcp/*` (MCP create/save handlers)
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-next/SKILL.md`
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-epic-link/SKILL.md`
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md`
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-start/SKILL.md`
  - `dashboard/src/components/IssueDrawer.vue` (or equivalent phases-panel renderer)
  - `~/.claude/rules/issues.md`
  - `~/.claude/rules/planning.md`
  - All `.danxbot/issues/{open,closed}/*.yml` (strip `phases:` field)
