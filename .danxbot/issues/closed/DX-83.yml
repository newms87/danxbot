title: "[Dashboard > Issues] Agent Chat > Phase 1: UI shell + drawer/toolbar integration"
description: |-
  ## Context

  Phase 1 of the Agent Chat epic (DX-82). Ship the visual shell only — fixtures-only, no backend wiring. Lets us validate design pixel-fidelity against the handoff before touching dispatch infra.

  Design source: `/tmp/design_pkg/danxbot-design-system/project/ui_kits/dashboard/AgentChat.jsx`, `IssueDrawer.jsx`, `IssueBoard.jsx`. Read those files top-to-bottom before starting — every styling rule, color, animation, copy string is in the JSX. Match the visual output, not the JSX structure (the design uses inline `style` objects; the dashboard uses scoped `<style>` blocks — port to scoped CSS).

  Phase 2 (DX-84) replaces the fixtures path with real backend. No backwards-compat shim — when Phase 2 lands, the fixtures imports are deleted outright.

  ## Solution

  Vue port of the design's chat components. New `dashboard/src/components/chat/` directory.

  ### New components

  - `AgentChat.vue` — main shell, two modes via `mode: "issue" | "board"` prop. Renders `SessionContextBar` + `ChatTimeline` + `ChatComposer`. Issue mode wires to `FIXTURE_ISSUE_SESSIONS` keyed by issue id; board mode shows `BoardSessionPicker` until a session is picked.
  - `ChatTimeline.vue` — pairs adjacent `tool_use` + `tool_result` blocks into a single collapsible row keyed by `toolUseId`. Renders user, assistant_text, thinking (collapsed by default w/ first 60 chars inline), tool_use+tool_result pair, and a "danxbot is working …" streaming dots indicator at the tail. Reuse the existing `SessionTimeline.vue` block style if it composes; otherwise port the JSX inline.
  - `ChatComposer.vue` — textarea autogrow up to 160px, Enter sends, ⇧Enter newline, ⌘Enter sends. Submit pill on the right enabled when text non-empty. Footer hint row matches the JSX.
  - `SessionContextBar.vue` — pills row (Live/Resumable badge, dispatch link, scope chip, turns/tools/sub-agents counters, `TokenMeter` slot, Stop button when streaming).
  - `TokenMeter.vue` — chip showing total tokens + thin bar + context-window pct, hover popover with input/output/cache breakdown. Color thresholds: ≥90% red, ≥70% amber, else indigo.
  - `BoardSessionPicker.vue` — list of recent board sessions for current repo + `+ New chat` button.
  - `BoardChatOverlay.vue` — 640px right-side drawer wrapping `AgentChat mode="board"` with header + close button.
  - `ChatThinking.vue`, `ChatToolUse.vue`, `ChatUserBlock.vue`, `ChatAssistantText.vue` — granular block components consumed by `ChatTimeline.vue`. Match design styles verbatim (border, bg, font sizes).

  ### Fixtures

  - `dashboard/src/components/chat/chatFixtures.ts` — port `FIXTURE_BOARD_SESSIONS` + `FIXTURE_ISSUE_SESSIONS` + `FIXTURE_LIVE_FEED` from `AgentChat.jsx` lines 9–105. Typed via interfaces declared in the same file. Pure module — no Vue imports. Phase 2 deletes this file outright.

  ### IssueDrawer integration

  - Widen drawer width 560px → 640px.
  - Add `Chat` tab between AC and Comments. Label is `Chat` always; later phase may show `Chat · resume` when an issue dispatch exists. Phase 1 just wires the tab — disabled state not needed.
  - Chat tab body bypasses the existing `.body` overflow-y wrapper — chat owns its own scroll region. Render conditionally so the wrapper applies only to non-chat tabs.
  - Trim `OverviewTab.vue` to description + blocked banner only. AC, phases, children moved entirely into ACTab. (Verify current state — design says Overview was already simplified; this AC only fires if drift exists.)

  ### IssuesPage / FilterToolbar integration

  - `FilterToolbar.vue` — add `💬 Chat with danxbot` button right-aligned, indigo tint matching design lines 131-137. Emits `open-board-chat` event.
  - `IssuesPage.vue` — owns `boardChatOpen` ref, mounts `BoardChatOverlay` when true. Picks current repo from existing repo selector composable.

  ### Streaming behavior (mocked)

  - `AgentChat.vue` `onSend` mocks the design's three-step stream: 700ms thinking block, 1500ms tool_use+tool_result pair, 2400ms assistant_text. Drives `streaming` state for the dots indicator + Stop button visibility. Stop sets streaming false.

  ### Visual parity

  - Chat-pulse keyframe + chat-blink keyframe ported.
  - Drawer slide animation unchanged.
  - Drawer scrim opacity 0.5 unchanged; board overlay scrim 0.7 (design uses darker).
  - `textWrap: "pretty"` → `text-wrap: pretty` in CSS.

  ## Acceptance Criteria

  - `dashboard/src/components/chat/AgentChat.vue` mounts in both modes (`issue`, `board`) without runtime errors.
  - Issue drawer renders `Chat` tab between AC and Comments; clicking switches body to `AgentChat mode="issue"`.
  - Drawer width is 640px (CSS).
  - Issue mode w/ `FIXTURE_ISSUE_SESSIONS["ISS-XX"]` populated renders the timeline (user → thinking → tool calls → assistant_text) without scroll bugs.
  - Issue mode w/ no fixture for the issue renders the empty-state pane with "Start new session →" button.
  - `BoardChatOverlay.vue` opens from the new toolbar button, shows the session picker by default, switches to the chat shell on pick.
  - `+ New chat` from the picker creates a fresh in-memory session and switches into chat shell.
  - Composer Enter sends, ⇧Enter newline, ⌘Enter sends. Empty submit disabled.
  - Mock stream produces the 3-block sequence at 700/1500/2400ms; Stop button cancels.
  - Token meter chip shows formatted total (`fmtTokens`), bar, and pct; hover opens popover with breakdown.
  - Color thresholds verified at <70%, 70-89%, ≥90% (test with manual fixture override).
  - `OverviewTab.vue` shows description + blocked banner ONLY (no AC, phases, children).
  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - `cd dashboard && npx vitest run` clean (UI-tests-not-required exemption applies — see CLAUDE.md "UI Frontend Test Exemption" — but if tests written, must pass).
  - Manual: open issue drawer on any seeded issue, click Chat tab, scroll timeline, send a message, hit Stop mid-stream, verify smooth.
  - Manual: click Chat with danxbot from toolbar, pick existing session, send message, return to picker via "← All sessions".

  ## Out of scope

  - All backend wiring (resume, JSONL stream, issue→dispatch lookup, board-chat workspace). All Phase 2.
  - Real token usage. Phase 1 reads from fixtures only.
  - Chat history persistence beyond in-memory session state.

  ## Key Files

  - `dashboard/src/components/chat/AgentChat.vue` (new)
  - `dashboard/src/components/chat/ChatTimeline.vue` (new)
  - `dashboard/src/components/chat/ChatComposer.vue` (new)
  - `dashboard/src/components/chat/SessionContextBar.vue` (new)
  - `dashboard/src/components/chat/TokenMeter.vue` (new)
  - `dashboard/src/components/chat/BoardSessionPicker.vue` (new)
  - `dashboard/src/components/chat/BoardChatOverlay.vue` (new)
  - `dashboard/src/components/chat/ChatThinking.vue` (new)
  - `dashboard/src/components/chat/ChatToolUse.vue` (new)
  - `dashboard/src/components/chat/ChatUserBlock.vue` (new)
  - `dashboard/src/components/chat/ChatAssistantText.vue` (new)
  - `dashboard/src/components/chat/chatFixtures.ts` (new, deleted in Phase 2)
  - `dashboard/src/components/issues/IssueDrawer.vue` (Chat tab + width)
  - `dashboard/src/components/issues/FilterToolbar.vue` (chat button)
  - `dashboard/src/components/issues/IssuesPage.vue` (overlay mount)
  - `dashboard/src/components/issues/OverviewTab.vue` (trim if needed)

  Design ref: `/tmp/design_pkg/danxbot-design-system/project/ui_kits/dashboard/AgentChat.jsx`, `IssueDrawer.jsx`, `IssueBoard.jsx`.
