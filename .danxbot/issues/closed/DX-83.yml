      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Visual port from JSX→Vue landed cleanly: 12 new components in
        `dashboard/src/components/chat/` plus 4 modified `issues/*.vue`
        files, all using scoped CSS + composition API.
      - `vue-tsc --noEmit` and the dashboard vitest suite (188 passed)
        both clean on first compile.
      - Code reviewer's P1 + P2 findings (mid-stream reset race,
        `aria-expanded` on disclosures, Escape-close + focus on board
        overlay, keyboard-accessible TokenMeter popover, type-safe
        `ChatToolUse` summary helper) all addressed before commit.

      **What went wrong:** - Initial drop of the mock-stream timers used closure-spread
        mutation that would have leaked into the next session if mode/
        issue switched mid-flight; addressed by adding a `streamEpoch`
        counter that each `setTimeout` callback checks before pushing.

      **Action items:** Nothing
      **Commits:** 489d2be
