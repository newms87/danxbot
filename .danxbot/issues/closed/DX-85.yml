type: Feature
title: Move ChildStatusId palette + projection from backend to SPA
description: |-
  ## Context

  DX-81 introduced `ChildStatusId = "done" | "todo" | "blocked"` and `projectChildStatus(child)` in `src/dashboard/issues-reader.ts` to feed the SPA's `CHILD_STATUS_META` palette in `dashboard/src/components/issues/issuePalette.ts`. The wire shape `IssueListChild.status` carries the projected design-system status.

  Architecture review on DX-81 flagged two related issues:

  1. **Backend owns a frontend palette decision.** The set of keys (`done|todo|blocked`) is a 3-color palette choice; the `projectChildStatus` docstring literally says "Cancelled is conflated with Done to keep the palette to three colors — if operators ever need to distinguish 'shipped' from 'won't ship,' split into a fourth `cancelled` state." That is design-system reasoning placed inside a backend reader. Any second consumer of the issues API that wants a different palette has no path to the raw fields.

  2. **OverviewTab.vue / IssueCard.vue rendering inconsistency** — addressed inline in DX-81. `OverviewTab` now consumes the parent's `children_detail[]` and renders the same `CHILD_STATUS_META` chip as `IssueCard`/`ChildrenChecklist`. Remaining work is the location move only.

  ## Solution

  Move `ChildStatusId` + `projectChildStatus` from `src/dashboard/issues-reader.ts` to `dashboard/src/components/issues/issuePalette.ts` (or sibling). Reshape `IssueListChild` to carry RAW data the projection can derive from:

  ```ts
  export interface IssueListChild {
    id: string;
    name: string;
    status: IssueStatus;   // raw — "ToDo" | "In Progress" | ...
    blocked: boolean;       // raw — was the child's blocked record non-null?
  }
  ```

  SPA's `issuePalette.ts` owns both the projection (`projectChildStatus(status, blocked) → ChildStatusId`) and the palette (`CHILD_STATUS_META`). Co-locates one design-system decision in one module.

  Update `OverviewTab.vue` to consume `props.issue.children_detail` (already in scope on the IssueDetail prop's parent listing) and render the same `CHILD_STATUS_META` chip + glyph as `ChildrenChecklist.vue`. Re-evaluate whether the `allIssues` prop is still needed once `children_detail` covers the per-child render — likely only the TypeBadge needs the full Issue lookup; everything else comes from `children_detail`.

  ## Acceptance Criteria

  - `ChildStatusId` type removed from `src/dashboard/issues-reader.ts` (and its re-export from `dashboard/src/types.ts`); same name re-defined in `dashboard/src/components/issues/issuePalette.ts`.
  - `projectChildStatus` removed from `src/dashboard/issues-reader.ts`; same logic re-implemented in `issuePalette.ts` taking `(status: IssueStatus, blocked: boolean)`.
  - `IssueListChild` wire shape updated: `status: IssueStatus`, new `blocked: boolean`.
  - `toListItem` in `issues-reader.ts` populates new fields directly from `child.status` + `child.blocked !== null`.
  - `ChildrenChecklist.vue` derives the `ChildStatusId` per row by calling `projectChildStatus(c.status, c.blocked)` then indexing `CHILD_STATUS_META`.
  - `OverviewTab.vue` consumes `props.issue.children_detail` (NOT `allIssues.find(...)`) for child rows; renders the same `CHILD_STATUS_META` chip + glyph as `IssueCard`. TypeBadge can still use a parent-listing lookup if needed but only for that one node.
  - Backend tests at `src/__tests__/dashboard/issues-reader.test.ts` covering `projectChildStatus:*` cases UPDATED to assert raw `child.status` + `child.blocked` flow through to `IssueListChild` (no projection done in backend).
  - New SPA test at `dashboard/src/components/issues/issuePalette.test.ts` covering `projectChildStatus` Done/Cancelled/Needs Help/Needs Approval/blocked-record/normal cases (logic, not presentation — not exempt from coverage).
  - `npx tsc --noEmit` clean.
  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - `npx vitest run` clean.
  - `cd dashboard && npx vitest run` clean.
  - Visual smoke: open dashboard, pick an Epic with child phases at multiple statuses (ToDo, In Progress, Needs Help, Done), confirm `OverviewTab` and `IssueCard` show the SAME status glyph for each child.

  ## Out of scope

  - Adding a fourth `cancelled` palette state — orthogonal call once palette lives in SPA.
  - Reworking `OverviewTab.allIssues` prop entirely — keep if TypeBadge still needs the full Issue lookup.

  ## Key Files

  - `src/dashboard/issues-reader.ts`
  - `src/__tests__/dashboard/issues-reader.test.ts`
  - `dashboard/src/types.ts`
  - `dashboard/src/components/issues/issuePalette.ts`
  - `dashboard/src/components/issues/issuePalette.test.ts` (new)
  - `dashboard/src/components/issues/ChildrenChecklist.vue`
  - `dashboard/src/components/issues/OverviewTab.vue`
