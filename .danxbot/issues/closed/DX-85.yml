      ## Code Review

      **Findings:**
      1. Silent fallback for unknown children (`status: "ToDo", blocked: false`) — indistinguishable from a real ToDo entry; violates "Fallbacks Are Bugs."
      2. OverviewTab filtered out children missing from `allIssues` while `ChildrenChecklist` rendered them — inconsistent.
      3. Per-child `allIssues` lookup in OverviewTab — `type` could live on `IssueListChild` instead.

      No legacy/backwards-compat shims. Comments accurate. Wire shape coherent across backend → frontend.
  - id: 69fa95c43812f47c371494b6
    author: test-reviewer
    timestamp: 2026-05-06T01:13:40.184Z
    text: |-
      <!-- danxbot -->

      ## Test Review

      All prior `projectChildStatus:*` backend cases now have raw-passthrough equivalents asserting `(status, blocked)` flow through `IssueListChild` unprojected. New SPA test file covers every projection branch (Done, Cancelled, terminal-overrides-blocked, Needs Help, Needs Approval, blocked-on-non-terminal, plain non-terminal). No gaps.
  - id: 69fa95c4eee0ace76dfb0b1f
    author: danxbot
    timestamp: 2026-05-06T01:13:40.958Z
    text: |-
      <!-- danxbot -->

      ## Review Fixes

      Addressed code-reviewer findings #1, #2, #3:

      - Added `missing: boolean` discriminator + `type: IssueType` to `IssueListChild`. Unknown children now surface as `{type: "Feature", status: "ToDo", blocked: true, missing: true}` so the SPA's `projectChildStatus` routes them to the distinct ⛔ row.
      - OverviewTab now consumes `children_detail[]` directly (no per-child `allIssues` lookup); renders every row including children missing from `allIssues`, matching `ChildrenChecklist.vue`.
      - Backend tests extended with `type`-flow + missing-child cases.

      Backend + dashboard tests + tsc + vue-tsc all green.
