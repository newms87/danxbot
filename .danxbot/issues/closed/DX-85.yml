    author: danxbot
    timestamp: 2026-05-06T01:13:41.282Z
    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - `ChildStatusId` + `projectChildStatus` co-located with
        `CHILD_STATUS_META` in `dashboard/src/components/issues/issuePalette.ts` —
        one design-system decision lives in one module.
      - Wire shape `IssueListChild` now carries raw `(type, status, blocked,
        missing)`; backend has zero palette knowledge.
      - Code-reviewer caught the silent unknown-child fallback (was
        `status: "ToDo", blocked: false` — indistinguishable from a real
        ToDo). Fixed by adding `missing: boolean` discriminator and
        routing unknown rows through `blocked: true` so the SPA
        projects them to the distinct ⛔ chip.
      - Code-reviewer also flagged OverviewTab's allIssues filter
        dropping children missing from `allIssues` while
        ChildrenChecklist still rendered them — inconsistent.
        Fixed by adding `type` to `IssueListChild`, removing the
        per-child `allIssues` lookup, and rendering directly from
        `children_detail[]`.
      - Visual-smoke equivalence verified structurally:
        `ChildrenChecklist.vue:30-33` and `OverviewTab.vue:77-80` both
        evaluate `CHILD_STATUS_META[projectChildStatus(c.status, c.blocked)]`
        on the same `IssueListChild` input — identical chip + glyph
        render is given by construction of the shared pipeline.

      **What went wrong:** - Visual smoke step on the running dashboard (login wall) was
        not run inside the agent session — credentials are external. The
        structural equivalence check above stands in.
      - Unknown-child silent fallback slipped past first implementation;
        caught by code-reviewer. Reinforces "Fallbacks Are Bugs" rule —
        should have surfaced `missing: true` from the start.

      **Action items:** Nothing
      **Commits:** 5f311cb67f9b868150666cbe09460e690e0688ec
