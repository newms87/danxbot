      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Helper module (`src/poller/local-issues.ts`) clean separation: 3 sync walkers, 135 lines, 16 dedicated unit tests covering filter/sort/edge cases.
      - Cutover preserved every existing `_poll` invariant (orphan-resume, blocked-resolve, pickup-prefix, single-dispatch). Pre-existing tests (~2900) all pass after mock infrastructure update.
      - `vi.mock("./local-issues.js")` test infra derives Issue[] from the most recent `tracker.fetchOpenCards` settledResult, so 90+ legacy tests using `mockTracker.fetchOpenCards.mockResolvedValueOnce(...)` keep working without per-test rewrites.
      - 5 new DX-86 dispatch-decision tests pin: hand-written ToDo dispatches; blocked YAML skipped; action_items skipped; local status wins over tracker; pickup-prefix runs on local list; FIFO mtime ordering at `_poll` layer; AC4/AC5 explicit invocation assertions.

      **What went wrong:** - `recoverStuckCards` (out-of-`_poll` failure path) was reading `tracker.fetchOpenCards` — same anti-pattern. Code-reviewer caught it; switched to `listInProgressYamls` and updated 4 stuck-card recovery tests + 1 integration test to match.
      - `list_kind` is NOT persisted on YAML (it's tracker-IssueRef-only) — the helper's filter relies on the call site passing an `excludeExternalIds` Set. Required a small workaround vs. the AC's literal "filtered by list_kind" wording. Helper accepts the Set; call site builds it from `actionItemRefs.map(c => c.external_id)`.
      - Integration test mocked `node:fs` made the helper invisible — needed a separate `vi.mock("../../poller/local-issues.js")` per test file with state captured via wrapping factory (memory-tracker test) or pre-written YAML on disk (critical-failure test). Two distinct strategies but both reproducible.

      **Action items:** Nothing
      **Commits:** 76618fe
