title: "Fix: poller dispatch decision must read local YAML, not Trello > Phase 1: Slice A — listDispatchableYamls + flip dispatch source to local YAML"
description: |-
  ## Context

  Parent epic: DX-67. Today the poller decides what to dispatch by
  reading `tracker.fetchOpenCards()` and filtering to
  `status === "ToDo"` (`src/poller/index.ts` ~line 283-285). Local
  `<repo>/.danxbot/issues/open/*.yml` files are hydrated FROM that
  tracker view via `bulkSyncMissingYamls` + `pushOrphans`. This makes
  the tracker the de facto dispatch source — wrong per the
  Source-of-Truth contract documented in
  `~/.claude/rules/issues.md` and `<repo>/CLAUDE.md`.

  Symptom: hand-written YAMLs land in `.danxbot/issues/open/` with
  `status: ToDo` but stay invisible to dispatch until orphan-push
  side-effects on a later tick.

  ## Solution

  Replace the dispatch source. Tracker fetch keeps running each tick
  — Slice B (Phase 2) still needs it for inbound. But it no longer
  drives dispatch decisions.

  ### Steps

  1. Add `src/poller/local-issues.ts` exporting
     `listDispatchableYamls(repoPath: string): Issue[]`. Walk
     `<repo>/.danxbot/issues/open/*.yml`, parse each via the existing
     `parseIssue` helper, filter to:
     - `status === "ToDo"`
     - `blocked === null`
     - `list_kind !== "action_items"` (action-items items hydrate
       with `list_kind: "action_items"` so they're discoverable as
       blockers but not dispatchable)
     Sort deterministically: by file `mtime` ascending (oldest first
     = FIFO), tiebreak by `id` ascending.

  2. Add `listInProgressYamls(repoPath: string): Issue[]` in the
     same file. Same walk, filters to `status === "In Progress"`.
     This drives stuck-card / orphan-resume recovery.

  3. Edit `src/poller/index.ts#_poll`:
     - Keep `tracker.fetchOpenCards()` running (Slice B uses it).
     - Replace `cards = openCards.filter(c => c.status === "ToDo" && c.list_kind !== "action_items")`
       with the local-YAML-derived list. The downstream code expects
       `IssueRef[]`-shaped objects in `cards`; the helper returns
       full `Issue[]`. Either (a) return a subset shape from
       `listDispatchableYamls` matching what `_poll` consumes, or
       (b) project `Issue → IssueRef` at the call site. Pick the
       cleaner one based on actual call sites (likely ~5 fields:
       `external_id`, `id`, `title`, `status`, `list_kind`).
     - Replace `inProgressCards = openCards.filter(c => c.status === "In Progress")`
       with `listInProgressYamls(repo.localPath)` (same shape concern).
     - The pickup-prefix filter
       (`getTrelloPollerPickupPrefix` / `pickupNamePrefix`) keeps
       operating, but now on the local-YAML-derived list.

  4. Rewrite the affected poller tests under
     `src/__tests__/poller/` (and `src/poller/index.test.ts`). New
     dispatch-decision tests cover:
     - YAML on disk with `status: ToDo`, `external_id: ""`, no
       Trello card → dispatched on next tick.
     - YAML with `blocked: {...}` → NOT dispatched.
     - YAML with `list_kind: "action_items"` → NOT dispatched.
     - Tracker has a ToDo card whose YAML has `status: "In Progress"`
       locally → dispatch reads "In Progress" (local wins).
     - Sort order: two YAMLs both ToDo with different mtimes →
       older wins.
     - Pickup-prefix filter still applied.

  ## Out of Scope (this phase)

  - Slice B: inbound channel hardening (Phase 2).
  - Slice C: outbound mirror audit (Phase 3).
  - Multi-repo combined dispatch.

  ## Key Files

  - `src/poller/local-issues.ts` (new)
  - `src/poller/local-issues.test.ts` (new)
  - `src/poller/index.ts` — flip dispatch + stuck-card sources
  - `src/poller/index.test.ts` — rewrite affected dispatch tests
  - `src/__tests__/poller/*` — any existing dispatch decision tests

  ## Verify

  - `npx vitest run` clean (full suite, not just poller)
  - `npx tsc --noEmit` clean
  - Manual: hand-write a YAML at `.danxbot/issues/open/ISS-N.yml`
    with `status: ToDo`, `external_id: ""`. Within one poll tick the
    poller dispatches it (orphan-push from Slice C still creates the
    Trello card on the same tick or next).
