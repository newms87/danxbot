      ## Notes from Phase 1 (DX-86)

      Phase 1 landed at commit `76618fe`. Reusable infrastructure +
      gotchas you will want before starting Phase 2:

      ### Reusable
      - `src/poller/local-issues.ts` exports
        `listDispatchableYamls`, `listInProgressYamls`,
        `listBlockedTodoYamls`. Phase 2's per-card inbound-merge loop
        will likely want a "list every open YAML" walker — extend
        this module rather than rolling a fourth ad-hoc walk.
      - `localIssueToRef(issue)` projection sits at the top of
        `src/poller/index.ts` (just below `log`). Drops `list_kind`
        deliberately — that field lives only on tracker `IssueRef`s.
      - `_poll`'s tracker-side partitioning happens at the top:
        `trackerToDoRefs`, `trackerInProgressRefs`, `actionItemRefs`.
        Phase 2's hydration / comment-pull will want to read the full
        `openCards` list (no filter) — already available; just don't
        re-call `fetchOpenCards`.

      ### Gotchas
      - `list_kind` is NOT persisted on the YAML schema. Phase 1
        worked around this by passing `excludeExternalIds:
        Set<string>` from the call site into the helper. If Phase 2
        needs to distinguish "Action Items YAML" from "regular YAML"
        on disk, the same Set-from-tracker pattern is the path; OR
        Phase 2 can extend the schema to persist `list_kind` — that's
        a bigger change but cleaner long-term. Decide and call out.
      - Bot-vs-human comment detection: the description references
        the `DANXBOT_COMMENT_MARKER` already used by retro / lock /
        recovery comments — check `src/issue-tracker/markers.ts` for
        the canonical marker. `syncIssue` (`src/issue-tracker/sync.ts`
        ~line 100) is where the inbound merge happens today.
      - The integration tests live under
        `src/__tests__/integration/poller-memory-tracker.test.ts`
        (uses `MemoryTracker` directly) and
        `critical-failure-end-to-end.test.ts` (uses real fs + a
        fake-claude wrapper). Both required DX-86-specific changes;
        the patterns (capture `fetchOpenCards` via wrapping factory;
        pre-write a YAML on disk) are documented inline.

      ### Verify before merging Phase 2
      - `npx vitest run` clean (Phase 1: 2922 tests, all pass).
      - `npx tsc --noEmit` clean.
      - Manual: add a tracker-only card, verify the next tick writes
        a YAML and a subsequent tick dispatches it. Add a tracker
        comment as a human, verify it appends to `comments[]` AND
        that the bot's own re-mirror of that comment doesn't cause
        an echo loop.
