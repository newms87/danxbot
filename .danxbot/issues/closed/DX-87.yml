  - id: 69faa81a4a859d35057960d9
    author: code-reviewer
    timestamp: 2026-05-06T02:31:54.533Z
    text: |
      <!-- danxbot -->

      ## Code Review

      **1. Silent fallback risk — `c.text.includes(DANXBOT_COMMENT_MARKER)` is fuzzy.**
      Anchoring to `startsWith` matches outbound stamping convention
      (marker at position 0) and avoids suppressing human replies that
      quote the marker mid-body. Same correctness, narrower blast
      radius. **Fixed** — extracted to `isBotMirroredComment` in
      `markers.ts` using `startsWith`.

      **2. DRY — bot-detection should be a named predicate.**
      Inline `text.includes(...)` would be duplicated as soon as
      another inbound path (hydrate, future bulk-pull) needs the same
      skip. **Fixed** — `isBotMirroredComment(comment)` is now the
      single source of truth.

      **3. Test smell — completeness test asserted `Array.isArray` /
      `toBeDefined` instead of structural values.** Hydration bug that
      returns `[]` for a non-empty AC list would have passed.
      **Fixed** — assertions now check concrete values from the
      `defaultCreate` fixture (`status: "ToDo"`, `type: "Feature"`,
      `title: "Card title"`, AC `title: "AC1"`, etc.).

      **4. Doc-block quality — good.** Clear, links source-of-truth
      rule, enumerates exceptions, explains what's NOT propagated.
      Kept.

      No backwards-compat shims. No SOLID violations.
