title: "Fix: poller dispatch decision must read local YAML, not Trello > Phase 2: Slice B — inbound channel: tracker-born cards + human comments only"
description: |-
  ## Context

  Parent epic: DX-67. Phase 1 flipped the dispatch source to local
  YAML; the tracker fetch still runs every tick. This phase locks
  down what the tick is allowed to consume from the tracker.

  Per the Source-of-Truth contract
  (`~/.claude/rules/issues.md` "Source of Truth"), the inbound
  channel has TWO narrow exceptions:

  1. **New cards.** A card created on the tracker that has no
     matching local YAML gets hydrated into a fresh YAML on the
     next tick.
  2. **New comments.** Human-authored tracker comments get pulled
     into the YAML's `comments[]`. Bot-mirrored comments are
     detected and skipped to avoid echo loops.

  Everything else inbound is ignored — status drags, title edits,
  AC checkbox ticks, label changes on the tracker have no effect.

  ## Current State

  - Card hydration: `bulkSyncMissingYamls` already imports
    tracker-born cards into local YAMLs each tick. Likely already
    correct.
  - Comment merge: `syncIssue` (`src/issue-tracker/sync.ts` ~line
    100-116) already merges remote comments by `id` dedup. BUT
    there's no explicit bot-comment skip on the inbound side — the
    only thing keeping locally-stamped bot comments out is that
    they already have an `id` after the worker POSTed them. A bot
    comment that lands on the tracker via a different path
    (different danxbot deployment, or worker write that didn't
    stamp the id back) could be re-imported as a "human" comment
    and trigger an echo loop.
  - The card description envisions a tick-level "for each card,
    fetch tracker comments" loop. The current architecture does it
    inside `syncIssue` per-card during outbound. Same effect.

  ## Solution

  ### Step 1 — Audit + tighten card hydration

  - Verify `bulkSyncMissingYamls` writes a complete YAML for any
    tracker card with no matching local file (every required field
    populated, `dispatch_id: null`, `comments: []` initial — the
    next tick's `syncIssue` pulls remote comments).
  - Confirm the inbound side does NOT re-assert tracker title /
    description / status / AC / labels onto an existing YAML —
    `syncIssue` is local-as-truth (verified in Slice C / Phase 3
    too, but assert it here).
  - Add a regression test: edit a card's title on the tracker
    (mock), with the local YAML already present and unchanged →
    next sync re-asserts the local title onto the tracker. The
    YAML's title is untouched.

  ### Step 2 — Explicit bot-comment skip

  - Define the bot-comment marker (likely the existing
    `DANXBOT_COMMENT_MARKER` from `src/issue-tracker/markers.ts`).
    Bot comments POSTed by `syncIssue` already carry the marker
    prefix.
  - In the inbound merge inside `syncIssue` (lines ~100-116),
    after dedup by `id`, also skip any comment whose `text`
    starts with `DANXBOT_COMMENT_MARKER`. Belt-and-suspenders: if
    the same bot deployment has already stamped the id, dedup
    already wins; if a different bot stamped it (or the id is
    missing), the marker check catches it. No echo loop possible.
  - Tests:
    - Comment authored by human (no marker) on tracker, no local
      copy → appended to local `comments[]` after sync.
    - Comment with `DANXBOT_COMMENT_MARKER` prefix on tracker, no
      matching local id → SKIPPED (no append).
    - Comment with marker AND matching local id → already
      deduped (existing behavior, just re-confirm).

  ### Step 3 — Document inbound boundaries in code

  - Update the comment block at the top of `syncIssue` (or add a
    new one above the inbound-merge block) explicitly enumerating
    the two narrow inbound exceptions. Future readers should not
    have to grep `~/.claude/rules/issues.md` to know what's
    allowed inbound.

  ## Out of Scope (this phase)

  - Slice C outbound mirror audit (Phase 3). Even though this
    phase touches `syncIssue`, the work here is bounded to the
    INBOUND merge side.
  - Multi-repo combined dispatch.

  ## Key Files

  - `src/issue-tracker/sync.ts` — inbound merge tighten + comment
    block
  - `src/issue-tracker/sync.test.ts` — bot-skip + human-pull
    coverage
  - `src/poller/index.ts` — `bulkSyncMissingYamls` call site
    (verify only, likely no edit)
  - `src/__tests__/poller/*` (or equivalent) — hydration
    regression test

  ## Verify

  - `npx vitest run` clean
  - `npx tsc --noEmit` clean
  - Manual: edit a tracker card's title (different from local
    YAML) → next tick reverts on the tracker, YAML unchanged.
  - Manual: post a human comment on the tracker → next tick
    appends to YAML `comments[]`.
  - Manual: post a bot-marked comment on the tracker (simulate via
    direct API call) → next tick does NOT re-import.
