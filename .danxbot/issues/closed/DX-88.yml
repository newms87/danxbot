    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** Audit caught a real outbound idempotency bug: the previous label diff
      derived `remoteLabels.triaged` / `.blocked` from `remoteCard.triaged.timestamp`
      / `remoteCard.blocked`, but neither field round-trips on Trello (no native
      triaged-record / blocked-record column). Result: every tick re-wrote the
      Triaged + Blocked labels even though the labels were already correct.

      Fix landed cleanly: trackers project `card.idLabels` into a transient
      `Issue.labels: ManagedLabels?` field inside `getCard()`, and `syncIssue`'s
      Step 4c diff compares local-derived intent against `remoteCard.labels`
      directly. No extra HTTP round-trip on Trello — the projection reuses the
      already-fetched `card.idLabels`. Memory tracker mirrors via `card.labels`
      on its `toIssue()`.

      Audit doc-block above `syncIssue` enumerates every Issue field with its
      outbound write path or local-only justification.

      **What went wrong:** First implementation added a separate `tracker.getLabels(externalId)`
      method on `IssueTracker`. Code review caught the redundancy: Trello.getLabels
      issued a SECOND `GET /cards/<id>?fields=idLabels` even though `syncIssue`
      had just called `getCard()` ~50 lines earlier with the same idLabels in
      hand. Refactored to project labels inside `getCard()` (private
      `projectLabels` helper on TrelloTracker) and dropped `getLabels` from the
      interface entirely. Should have spotted the redundancy on the first pass —
      the doc-block claim "three reads are explicit so trackers can answer them
      efficiently" was undercut by the implementation doing the opposite on the
      Trello side.

      **Action items:** Nothing
      **Commits:** bf93dd1
