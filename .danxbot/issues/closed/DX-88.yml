title: "Fix: poller dispatch decision must read local YAML, not Trello > Phase 3: Slice C — outbound full-fidelity mirror audit + idempotency"
description: |-
  ## Context

  Parent epic: DX-67. Phases 1 + 2 flipped the dispatch source
  to local YAML and locked down the inbound channel. This phase
  audits the OUTBOUND mirror — every YAML field reaching the
  tracker on every tick — and ensures the mirror is idempotent.

  ## Current State

  `syncIssue` (`src/issue-tracker/sync.ts`) already covers the
  major fields:

  - title / description (line ~127-137)
  - status / list move (line ~139-143)
  - labels: type, needsHelp, needsApproval, triaged, blocked (line
    ~145-178)
  - AC adds / updates / deletes (line ~180-237)
  - comments POST + retro renderer (line ~244-336)

  And `pushOrphans` (`src/poller/orphan-push.ts`) handles
  YAML → tracker for new local-orphan cards (`external_id: ""`).

  ## Solution — audit + plug gaps + idempotency tests

  ### Step 1 — Field-by-field audit

  Walk every field on the `Issue` type
  (`src/issue-tracker/interface.ts`) and confirm each has a path
  to the tracker. Document the table (in code via comment or in
  a new doc) with: field → tracker write call → diff source.

  Fields to confirm:

  - `id` — used in title prefix (already wired)
  - `external_id` — tracker primary key (created by `pushOrphans`
    + `createCard`)
  - `parent_id` — local-only; intentionally NOT mirrored (already
    documented at line ~363)
  - `children` — local-only ordered list. Confirm not mirrored.
  - `dispatch_id` — local-only metadata
  - `status` — covered
  - `type` — via labels
  - `title` — covered
  - `description` — covered
  - `triaged` — via triaged label
  - `ac` — covered
  - `comments` (bot-authored) — covered
  - `retro` — covered (rendered comment)
  - `blocked` — via Blocked label (local-only structured data)

  ### Step 2 — Plug any gap found in Step 1

  Wire any missing field through `syncIssue` or `pushOrphans` per
  the audit. If everything is already covered, document the audit
  result (close the loop publicly so future readers don't repeat
  it).

  ### Step 3 — Idempotency tests

  For every tracker write `syncIssue` issues, write a test that:

  1. Calls `syncIssue` once → asserts expected writes.
  2. Calls `syncIssue` again with the SAME local + remote state
     → asserts ZERO writes.

  Cover:

  - title / description match: no patch
  - status match: no list move
  - labels match: no setLabels
  - AC item match: no add / update / delete
  - all comments stamped: no add
  - retro already posted with matching body: no edit / no add

  ### Step 4 — pushOrphans idempotency

  Confirm `pushOrphans` is idempotent: a YAML with `external_id`
  already set is skipped (likely already true via the
  `!external_id` filter; assert via test).

  ### Step 5 — Stale concurrency note removal

  Edit DX-67 epic description: strike or rewrite the
  "Concurrency note (DO NOT START YET)" section — the orphan-push
  WIP it referenced has landed. Replace with: "orphan-push.ts is
  the outbound-mirror seed for Slice C; this phase audits + plugs
  remaining gaps."

  ## Out of Scope

  - Slice A / Slice B (covered by Phase 1 + Phase 2).
  - Two-way conflict resolution.
  - New tracker backends.

  ## Key Files

  - `src/issue-tracker/sync.ts` — audit + any gap fixes
  - `src/issue-tracker/sync.test.ts` — idempotency coverage
  - `src/poller/orphan-push.ts` — confirm idempotent
  - `src/poller/orphan-push.test.ts` — idempotency coverage if
    missing
  - `src/issue-tracker/interface.ts` — reference for field walk
  - `repos/danxbot/.danxbot/issues/open/DX-67.yml` — strike
    stale concurrency note

  ## Verify

  - `npx vitest run` clean
  - `npx tsc --noEmit` clean
  - Idempotency: run a poll tick twice in a row against an
    unchanged YAML → second tick issues zero tracker writes
    (verified via test or recorded log).
  - Orphan-push: run twice against same YAML → second run
    issues zero `createCard` calls.
  - End-to-end: hand-write a YAML, watch it flow YAML → tracker
    on tick 1, no further writes on tick 2.
