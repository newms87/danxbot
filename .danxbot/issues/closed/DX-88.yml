      ## Notes from Phase 2 (DX-87)

      Phase 2 landed at commit `e57722d`. Reusable infrastructure and
      gotchas you will want before starting Phase 3:

      ### Reusable
      - `isBotMirroredComment(comment)` in
        `src/issue-tracker/markers.ts` — anchored
        `startsWith(DANXBOT_COMMENT_MARKER)` predicate. Use this for
        every bot-vs-human inbound check; do NOT inline
        `text.includes(...)` (would suppress human replies that quote
        the marker mid-body).
      - `syncIssue` (`src/issue-tracker/sync.ts`) carries a doc-block
        above the inbound-merge block enumerating the two narrow
        inbound exceptions. Phase 3 audits the OUTBOUND side — extend
        the doc-block (or add a sibling block) if you formalize
        outbound invariants there.

      ### Gotchas
      - `MemoryTracker.updateCard` accepts arbitrary patches and the
        `getCard` round-trip preserves them (verified by DX-87 test
        "tracker-side title edit reverted"). If Phase 3 wants to
        assert "outbound write happened with shape X", the
        `tracker.getRequestLog()` is the canonical inspection point —
        not `getCard()` post-hoc, because the local-as-truth diff
        already overwrote the test mutation.
      - The `local-as-truth wins on every non-comment field` test at
        sync.test.ts:444 is the closest existing baseline for "no
        inbound propagation." Phase 3's outbound audit can lean on
        that pattern.
      - The new DX-87 hydration completeness test in
        `src/poller/yaml-lifecycle.test.ts` asserts every required
        field on the hydrated Issue with concrete VALUES (not just
        types). If Phase 3 changes hydrate's shape (e.g. wires through
        `children[]` from the tracker), update the assertion VALUES
        not just the field list.

      ### Verify before merging Phase 3
      - `npx vitest run` clean (Phase 2: 2929 tests, all pass).
      - `npx tsc --noEmit` clean.
