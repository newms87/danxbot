    text: |-
      ## Phase 1 + 2 + 3 complete

      Migration done in single dev session. Outstanding ACs are runtime smoke + GitHub push (operator gates).

      ### What shipped

      **Monorepo at `~/web/claude-plugins/`** (git-init'd, not yet pushed):
      - 7 plugins, 30 SKILL.md files total
      - `marketplace.json` advertises all 7
      - All plugins pass `claude plugin validate`

      **Plugin contents:**
      - `base/skills/`: process-kill, monitor-polling, bash-exit-capture, sub-agent-delegation, tool-discipline
      - `investigate/skills/investigate` (new, authored from scratch — read-only diagnostic methodology)
      - `dev/skills/`: debugging, testing, code-quality, git-discipline
      - `pipeline/skills/`: flow-{code-review,commit,quality-check,report,finish}, wow, docs, explain, collaboration, planning-discipline, host-environment
      - `issues/skills/`: issue-card-workflow
      - `danxbot/skills/`: danxbot
      - `issue-worker/skills/`: danx-{epic-link,ideate,next,start,triage}, comment-style, halt-flag

      Rules-as-skills: every rule file ported to a SKILL.md with MANDATORY-style trigger description (plugins don't have a `rules/` convention; skills are the only context-injection mechanism).

      **Settings wiring (committed):**
      - `~/.claude/settings.json` (user) — marketplace registered, `base` enabled
      - `<repo>/.claude/settings.json` for danxbot, gpt-manager, platform — full dev plugin set
      - Workspace inject `.claude/settings.json` for issue-worker, slack-worker, system-test — per-workspace plugin set per the install matrix

      **Container baking:**
      - `Dockerfile` adds `COPY .build-claude-plugins /opt/claude-plugins` plus inline `~/.claude/settings.json` write declaring marketplace at `/opt/claude-plugins`
      - `Makefile`: new `sync-claude-plugins` target rsyncs `~/web/claude-plugins/` → `<danxbot>/.build-claude-plugins/` before `make build`. Auto-runs as `build` prereq.
      - `.gitignore`: added `.build-claude-plugins/`
      - Old `make sync-dev-rules` target removed

      **Cleanup:**
      - `~/.claude/dev/` → `/tmp/claude-dev-backup-<ts>/`
      - `~/.claude/{rules,skills}/` → `/tmp/claude-rules-skills-backup-<ts>/`
      - `~/.claude/CLAUDE.md` rewritten as lean plugin pointer
      - Symlinks in `<danxbot>/.claude/{rules,skills}/` reverted (replaced by plugin marketplace install)
      - Inject mirror files in `<danxbot>/src/poller/inject/workspaces/issue-worker/.claude/{rules,skills}/` for dev content removed (now ship via plugins)

      ### Verified

      - `claude plugin validate` passes for all 7 plugins
      - `claude plugin marketplace add ~/web/claude-plugins` succeeded → registered as `newms-plugins`
      - `claude plugin install base@newms-plugins` → enabled in user settings
      - YAML frontmatter parse fix: `tmp/fix-frontmatter.py` quoted all multi-line `description:` values to avoid colon-ambiguity (29/30 SKILL.md files updated)

      ### Outstanding

      1. **Workspace dispatch smoke** — needs `make build && make launch-worker REPO=<repo>` then a `/api/launch` dispatch to confirm plugins load in container. Operator action.
      2. **Slack-worker plugin set verification** — same path; confirms slack agent has investigate but NOT dev.
      3. **GitHub push** — `~/web/claude-plugins/` is a fresh git init with one commit. Needs operator to create `github.com/newms87/claude-plugins` repo and push. Once pushed, settings.json files can switch from `directory` source to `github` source for portability across other devs / EC2 hosts.

      ### Known gotchas for follow-up

      - `extraKnownMarketplaces` schema uses `source: "directory"` (not `"local"` as I'd guessed pre-research). Verified empirically by adding via CLI and inspecting settings.json diff.
      - Frontmatter YAML colon ambiguity: any unquoted `description:` value containing `:` after the first whitespace breaks the parse. Future skills authored manually should single-quote the description string.
      - Container path is `/opt/claude-plugins` (Dockerfile COPY target). Host path is `/home/newms/web/claude-plugins`. Repo + workspace settings.json files use the path appropriate to their runtime — DO NOT reconcile by symlink.
