type: Feature
title: Migrate global ~/.claude rules + skills to claude-plugins monorepo
description: |-
  ## Context

  `~/.claude/{rules,skills,dev}/` is the user's global Claude Code config. Today it loads via:
  - Global `~/.claude/CLAUDE.md` + `~/.claude/rules/*.md` (host-only — empty in containers)
  - Per-repo symlinks (just-added, fragile cross-env) into `~/.claude/dev/`
  - Workspace inject pipeline mirroring `~/.claude/dev/` files into `<danxbot>/src/poller/inject/workspaces/issue-worker/.claude/`

  Cross-env path resolution (newms host vs ubuntu EC2 vs danxbot container) breaks committed symlinks. Inject mirror duplicates content. Symlink approach is workaround, not architecture.

  Migrate to Claude Code plugins — first-class mechanism: monorepo of plugins, marketplace.json, per-env install via `settings.json`, no path tricks.

  Key benefit: each dispatched workspace declares EXACTLY which plugins it needs. Slack-worker (no code-writing) gets `base + investigate-readonly + issues + danxbot`. Issue-worker (writes code) gets `base + investigate + dev + issues + danxbot + issue-worker`. System-test (smoke only) gets `base + danxbot`.

  ## Plugin Breakdown (7 plugins)

  | Plugin | Contents | Install scope |
  |---|---|---|
  | `base` | rules: bash-exit-capture, sub-agent-delegation, tools. skills: process-kill, monitor-polling | Global default — every claude instance |
  | `investigate` | rule: investigation discipline (read-only diagnostic, no fixes). skill: `investigate` (NEW — authored from scratch as derivative of debugging skill, stripped of TDD/fix workflow) | Code-writers + Slack-worker |
  | `dev` | rules: code-quality, debugging, testing, git. skills: debugging (full), testing | Code-writing instances only |
  | `pipeline` | rules: collaboration, planning, environment. skills: flow-code-review, flow-commit, flow-quality-check, flow-report, flow-finish, wow, docs, explain | Human-in-loop dev sessions only — NOT autonomous dispatch |
  | `issues` | rule: issues (YAML schema + tracker contract) | Anything touching cards |
  | `danxbot` | rule: danxbot domain pointer. skill: danxbot | danxbot-aware repos + workspaces |
  | `issue-worker` | rules: danx-comment-style, danx-halt-flag. skills: danx-epic-link, danx-ideate, danx-next, danx-start, danx-triage | Issue-worker workspace only |

  ## Install Matrix

  | Env | base | investigate | dev | pipeline | issues | danxbot | issue-worker |
  |---|---|---|---|---|---|---|---|
  | Newms global (`~/.claude/settings.json`) | ✓ | | | | | | |
  | `<repo>/.claude/settings.json` (danxbot, gpt-manager, platform) | ✓ | ✓ | ✓ | ✓ | ✓ | ✓ | |
  | Workspace `issue-worker/.claude/settings.json` | ✓ | ✓ | ✓ | | ✓ | ✓ | ✓ |
  | Workspace `slack-worker/.claude/settings.json` | ✓ | ✓ | | | ✓ | ✓ | |
  | Workspace `system-test/.claude/settings.json` | ✓ | | | | | ✓ | |

  ## Distribution

  Single monorepo at `~/web/claude-plugins/` with structure:

  ```
  claude-plugins/
    .claude-plugin/
      marketplace.json     # advertises all 7 plugins
    base/
      plugin.json
      rules/
      skills/
    investigate/
    dev/
    pipeline/
    issues/
    danxbot/
    issue-worker/
    README.md
  ```

  Push to `github.com/newms87/claude-plugins` once stable.

  ## Container Install Strategy

  Worker Dockerfile pre-bakes plugins at build time:
  ```dockerfile
  RUN claude plugin marketplace add <git-url-or-path> \
   && claude plugin install base@newms-plugins issue-worker@newms-plugins ...
  ```
  Workspace `.claude/settings.json` (committed, real file in inject dir) declares which plugins are active. No runtime fetch; container is offline-safe.

  ## New Skill: `investigate`

  Currently no read-only investigation skill exists. Author from scratch covering:
  - Hypothesis → evidence → findings → options pattern
  - Read/Grep/Bash for evidence gathering
  - "Report findings, do NOT apply fixes" hard constraint
  - Methodology lighter than full `debugging` skill — no failing test → fix → verify cycle
  - Triggers: "investigate", "look into", "why is X", "what's happening", live system probing
  - Distinct from `debugging` skill (which assumes you'll write a fix)

  Slack-worker uses `investigate` for live-system Q&A. Dev sessions use BOTH `investigate` (for the diagnostic phase) AND `debugging` (when about to fix). Plugin install order ensures `dev` plugin's debugging skill supersedes investigate when both present.

  ## Cleanup After Migration

  - Revert symlinks in `<danxbot>/.claude/{rules,skills}/` (just-created)
  - Drop `<danxbot>/src/poller/inject/workspaces/issue-worker/.claude/{rules,skills}/dev-mirror-files`
  - Drop `make sync-dev-rules` Makefile target
  - Delete `~/.claude/dev/` (content migrated)
  - Trim `~/.claude/CLAUDE.md` further — replace dev-bucket section with plugin-install instructions
  - Move `~/.claude/skills/` content into appropriate plugins (debugging → dev, testing → dev, process-kill → base, monitor-polling → base, danxbot → danxbot)
  - Move `~/.claude/rules/*.md` into appropriate plugins
  - `~/.claude/CLAUDE.md` becomes minimal pointer: "rules + skills come from plugins; see ~/.claude/settings.json"

  ## Out of Scope

  - Publishing to public marketplace (private monorepo first; push to GitHub once stable)
  - Plugin versioning / git tags (defer)
  - Auto-update mechanism (claude code handles this)
  - Per-plugin tests (add later if surface grows)
