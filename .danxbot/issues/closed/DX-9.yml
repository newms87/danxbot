    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** Phase 5 cleanly closed the deferred refactor: every fetch / move / comment / status
      call on the poller hot path now flows through the IssueTracker interface, and the
      legacy direct-HTTP module is gone. Reviewer-recommended polish landed in the same
      pass — switching the spawn-time guard to `instanceof TrelloTracker` removed the
      only `process.env` read on the poller hot path and gave "which tracker is active"
      a single source of truth. New Layer 2 integration test pins the cache invariant
      (factory invoked once, MemoryTracker survives across ticks) — exactly the property
      Layer 3 system tests would need to drive a poller-driven memory lifecycle. All
      2593 tests pass, tsc clean, every AC verified.

      **What went wrong:** The `src/poller/index.test.ts` rewrite was bigger than expected because the old
      test surface modeled four separate Trello-list fetches as four mocks; the unified
      `tracker.fetchOpenCards` call meant rewiring sequencing in every test that had
      set per-list values. Took two iterations to get all describe blocks reseting
      `mockIsFeatureEnabled` correctly — `vi.clearAllMocks()` does NOT reset
      implementations, so the prior block's `mockReturnValue(true)` for ideator leaked
      into the next describe and silently flipped a few empty-ToDo tests into the
      ideator path. First test-reviewer pass also caught two "cache invariant"
      assertions that didn't actually exercise the cache (both reset state between
      ticks) — fixed both to assert factory call count across back-to-back `poll()`
      calls without `_resetForTesting`.

      **Action items:** Nothing
      **Commits:** c02afbe
