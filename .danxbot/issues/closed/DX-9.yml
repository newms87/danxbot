title: "[Danxbot] Refactor poller hot path → IssueTracker (deferred from Phase 5)"
description: |-
  ## Context

  Phase 5 of tracker-agnostic-agents shipped the worker-side retro renderer + action-items spawner + workspace rename, but deferred the poller-internal refactor that AC #3 ("Dead Trello-direct call sites removed from src/poller/index.ts and src/poller/trello-client.ts — only calls behind IssueTracker remain") demanded in its strict reading.

  **Why deferred:** the swap is mechanical at call sites (`fetchTodoCards` → `tracker.fetchOpenCards().filter(c => c.status === "ToDo")` etc.) but rewires every test in `src/poller/index.test.ts` (153 mock invocations across ~2400 lines) and `src/__tests__/integration/critical-failure-end-to-end.test.ts`. Phase 5 already shipped 5 sub-units of work; bundling a 50+-test rewrite would have ballooned the commit and risked test correctness regressions. Card description Section "Poller cleanup" explicitly authorized the deferral with a follow-up filed.

  ## Solution

  1. Add `getRepoTracker(repo): IssueTracker` cache helper in `src/poller/index.ts` so MemoryTracker preserves state across poll ticks (essential for Layer 3 `DANXBOT_TRACKER=memory` system test).
  2. Replace direct `trello-client.ts` imports in `src/poller/index.ts`:
     - `fetchTodoCards` → `tracker.fetchOpenCards().filter(c => c.status === "ToDo")`
     - `fetchNeedsHelpCards` → same with `"Needs Help"`
     - `fetchReviewCards` → same with `"Review"`
     - `fetchInProgressCards` → same with `"In Progress"`
     - `fetchLatestComment` + `isUserResponse` → `tracker.getComments(externalId)` + last-element check on `.text.includes(DANXBOT_COMMENT_MARKER)`
     - `fetchCard` → `tracker.getCard(externalId)` (returns Issue with status; replace `card.idList !== todoListId` with `card.status !== "ToDo"`)
     - `moveCardToList` → `tracker.moveToStatus`
     - `addComment` → `tracker.addComment`
  3. Delete `src/poller/trello-client.ts` + `src/poller/trello-client.test.ts` (HTTP-level coverage already exists in `src/__tests__/issue-tracker/trello.test.ts`).
  4. Rewrite `src/poller/index.test.ts`: drop `vi.mock("./trello-client.js", ...)` block, replace per-function mock fns with a single `mockTracker` returned by `createIssueTracker` mock. Each test sets `mockTracker.fetchOpenCards.mockResolvedValueOnce([{external_id, title, status}, ...])` instead of `mockFetchTodoCards.mockResolvedValue([{id, name}, ...])`.
  5. Rewrite `src/__tests__/integration/critical-failure-end-to-end.test.ts` similarly: drop `trelloMocks`, drive everything through `setIssueTracker` (already partially in place — extend stub method coverage to include `fetchOpenCards`, `moveToStatus`, `addComment`).
  6. After refactor, extend `src/__tests__/system/run-system-tests.sh#test_yaml_memory` (or add a new scenario) to boot a worker with `DANXBOT_TRACKER=memory`, drive a full ToDo → In Progress → Done lifecycle through the poller, and assert the MemoryTracker singleton contains the expected card sequence — this is the AC #6 "strict reading" deferred from Phase 4.

  ## Key files

  - `src/poller/index.ts` — call-site swaps + `getRepoTracker` cache
  - `src/poller/trello-client.ts` — DELETE
  - `src/poller/trello-client.test.ts` — DELETE
  - `src/poller/index.test.ts` — mock surface rewrite
  - `src/__tests__/integration/critical-failure-end-to-end.test.ts` — extend `setIssueTracker`, drop `trelloMocks`
  - `src/__tests__/system/run-system-tests.sh` — add poller-driven memory-tracker scenario

  ## Acceptance Criteria

  - `rg "trello-client" src/` → zero matches.
  - `rg "fetchTodoCards|fetchNeedsHelpCards|fetchReviewCards|fetchInProgressCards|fetchLatestComment|fetchCard\b|moveCardToList|isUserResponse" src/poller/` → zero matches.
  - `npx vitest run src/poller/ src/__tests__/integration/ src/__tests__/worker/` → green.
  - New Layer 3 scenario in `make test-system-poller` (or equivalent) drives a full ToDo→Done lifecycle through the poller against MemoryTracker; the JSONL contains zero `mcp__trello__*` calls and the MemoryTracker request log shows the expected `fetchOpenCards`/`moveToStatus`/`addComment` sequence.
  - All comments in `src/poller/index.ts` referencing `trello-client` callers are removed or updated.

  ## Out of scope

  - Slack agent path — untouched.
  - `/api/launch` external dispatch — untouched.
  - Phase 5 retro/action-items rendering (already shipped).
  - TrelloTracker / MemoryTracker internals (already covered).
