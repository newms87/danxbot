title: Poller triage rework — per-card triage + active-dispatch tracking + ICE-sorted dispatch
description: |
  ## Context

  Today's poller triage is bulk: one orchestrator agent ingests the full Action Items list per tick, sub-agents fan out, decisions land back as `triaged.{timestamp,status,explain}`. Limitations:

  - **No re-triage cadence.** Once triaged, a card never gets re-evaluated. `Needs Help` cards stale-block forever even after the underlying condition resolves (see DX-81 — punted to Needs Help citing "needs production verification" when the work was 100% local; sat parked until manual re-audit).
  - **No Hard Gate audit on Needs Help.** Agents punt cards to `Needs Help` rationalizing a human-only blocker that doesn't actually exist. The new `unblock` skill in `claude-plugins/issues/skills/unblock/` formalizes the misclassification audit, but it's only fired manually by an operator typing `/unblock`. We need it on every Needs Help card automatically.
  - **`Action Items` is a tracker `list_kind` concept, not a card status.** Filter at `src/poller/local-issues.ts:74` excludes `list_kind: action_items` from dispatch — a parallel taxonomy on top of `status: Review`. Two truths for the same idea ("not ready to work yet, needs triage").
  - **Dispatch sort is FIFO, not priority.** Triaged cards with ICE 80 sit behind untriaged cards or low-ICE noise. We capture ICE in triage comments today but never read it back at dispatch time.
  - **Active-dispatch tracking is bare.** `dispatch_id` is a UUID with no PID, no host, no kind. Poller restart loses the mapping; cannot reattach.

  ## Goal

  Replace bulk triage with **per-card triage on a TTL cadence**, sort dispatchable ToDo by ICE, track active dispatches with PID/host/kind so the poller is restart-safe, collapse `Action Items` into `status: Review`.

  ## Architecture

  Single-dispatch-per-poller-tick. Each tick:

  1. Active-dispatch check (in-memory + YAML reattach)
  2. Work-ready dispatch (status=ToDo, blocked=null, sorted untriaged-first then ICE desc)
  3. Triage dispatch (status in {Review, Needs Help, Blocked} AND triage.expires_at <= now)
  4. Idle

  Triage agent is a **single-card direct agent** (no orchestrator/sub-agent split) running in the existing `issue-worker` workspace with its own skill `danx-triage-card`. Decision per status:

  | Status | Action | TTL |
  |---|---|---|
  | Review | ICE score → set ToDo / Needs Approval / Cancelled | 24h |
  | Needs Help | Hard Gate audit (reuse `unblock` misclassification logic) → demote to ToDo OR confirm + write reassess_hint | 3h |
  | Blocked | Re-check `blocked.by[]` — if all terminal → clear `blocked` | 1h |
  | ToDo / In Progress | not triaged at all | n/a |
  | Done / Cancelled | terminal — never re-triaged | n/a |

  ## YAML schema additions

  Replace `triaged: {timestamp, status, explain}` with:

  ```yaml
  triage:
    expires_at: ""           # ISO 8601; "" forces re-triage on next tick
    reassess_hint: ""        # 1-line "how next agent quickly rechecks"
    last_status: ""          # Keep | Cancel | Approve | Demote | Confirm-Block
    last_explain: ""
    ice:
      total: 0               # i × c × e
      i: 0                   # Impact 1-5
      c: 0                   # Confidence 1-5
      e: 0                   # Ease 1-5
    history:                 # append-only, cap at 10
      - { timestamp, status, explain, expires_at, ice: {total, i, c, e} }
  ```

  Replace `dispatch_id: <uuid>` with:

  ```yaml
  dispatch:
    id: <uuid>               # poller-generated
    pid: <int>               # OS PID on host
    host: <hostname>         # for cross-host correlation
    kind: "work" | "triage"
    started_at: <iso>
    ttl_seconds: <int>       # liveness threshold
  ```

  ## Acceptance

  - All 5 phase cards reach Done.
  - Migration script populates new `triage` block on every existing open card with `expires_at: ""` (forces re-triage); `triaged` field removed.
  - Poller's main loop reduced to a single-dispatch-per-tick decision tree (active-check / work / triage / idle), no parallel orchestrator/sub-agent triage.
  - `Action Items` list_kind filter removed from `local-issues.ts`; tracker's "Action Items" list maps to `status: Review` on hydration.
  - ToDo dispatch order: untriaged cards first, then triaged cards by `triage.ice.total` desc.
  - On poller restart, every YAML with a live `dispatch.pid` is reattached without redispatching.

  ## Out of scope

  - Plugin (claude-plugins) changes for the new triage agent prompt — lives in `issue-worker` workspace, not a new plugin.
  - Schema-builder dispatches — orthogonal to issue triage.
  - Trello UI/board renames — keep "Action Items" list name on the board; sync layer remaps to status: Review on hydration so no operator-facing change.
