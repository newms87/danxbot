      ## Resume re-dispatch — blocking epic on DX-91 to break the loop

      The poller's `tryResumeOrphan` path (newly landed in Phase 1 commit `e9303e8`) found this epic still In Progress with the prior dispatch's JSONL on disk and resumed it as dispatch `3317af8c`. There's no actionable work for the epic itself — every phase except Phase 1 is blocked by DX-91, and DX-91 is in Needs Help awaiting the human npm publish.

      To stop the resume loop, this dispatch sets `blocked.by: [DX-91]` on the epic. The poller mechanically forces `status: ToDo` while `blocked` is non-null and skips dispatching the card while any blocker is non-terminal. Once a human runs `make publish-danx-issue-mcp` from gpt-manager, ticks DX-91's AC 1, and moves DX-91 to Done, the poller will auto-clear this `blocked` record on the same tick and the epic is free to either move to Done (when phases finish) or stay In Progress while phases work — whatever the dispatched agent decides.

      Note for follow-up: the orphan-resume change in commit `e9303e8` was designed for phase / leaf cards, not epics. Epics legitimately stay In Progress while phases work; resuming them creates a busy loop when the prior session's only work was to dispatch phases. A small fix in `src/poller/index.ts#tryResumeOrphan` to skip cards where every dispatchable child is non-terminal-blocked would prevent this loop without giving up the orphan-resume safety net for leaf cards. Filed as a retro-bad on this dispatch rather than a separate action item — the bug is small and the fix lives in the same file Phase 2 will touch.
