      <!-- danxbot -->

      ## Needs Help ‚Äî npm publish of `@thehammer/danx-issue-mcp@1.0.0` requires human authorization

      Phase 1 of the poller-triage rework is **functionally complete on disk**: schema migration, validator strictness, structured `dispatch{}` + `triage{}` blocks, migration script, consumer updates, and skill doc updates all landed. The only remaining work is the destructive npm publish, which agent guardrails forbid without explicit human approval.

      **What's done:**

      - **Schema migration** ‚Äî danxbot commit `e9303e8`, danx-issue-mcp commit `547ecb2`. New types (`IssueIce`, `IssueTriageHistoryEntry`, `IssueTriage`, `IssueDispatch`) added to `src/issue-tracker/interface.ts`. `Issue.triage` replaces `Issue.triaged`; `Issue.dispatch` replaces `Issue.dispatch_id`. Same for `CreateCardInput`.
      - **Strict validator** ‚Äî `validateIssue` rejects legacy `triaged` and `dispatch_id` fields with a migration-pointer error. New per-block validators (`validateTriage`, `validateIce`, `validateTriageHistory`, `validateDispatch`). `dispatch.id` requires non-empty string. `validateTriageHistory` caps at 10 entries.
      - **Migration script** (`scripts/migrate-issues-to-triage-v3.ts`) ‚Äî idempotent, stagger-aware, v1/v2/v3 chain inlined, post-write `parseIssue` round-trip. Verified across **199 real YAMLs** (danxbot + gpt-manager repos): 0 errors on second run.
      - **Consumers** ‚Äî `src/poller/yaml-lifecycle.ts`, `src/poller/index.ts`, `src/dispatch/staged-files.ts`, every test fixture across `src/__tests__/issue-tracker/`, `src/__tests__/integration/`, `src/__tests__/worker/`, `src/poller/*.test.ts` updated to the new schema. Orphan-resume now correctly handles cards with `dispatch: null` (resets to ToDo when no live host_pid).
      - **Skill docs** ‚Äî `issue-card-workflow/SKILL.md` (claude-plugins), `danx-{ideate,next,triage}/SKILL.md` (workspace inject) updated with the new schema. `danx-triage` carries a Phase-1 transition note.
      - **Quality gates** ‚Äî `code-reviewer` + `test-reviewer` subagents ran in parallel. P0 / Medium findings addressed in `e9303e8` (empty-`dispatch.id` rejection; `isTriaged` helper consolidation across `MemoryTracker`/`TrelloTracker`/`syncIssue`; +24 validator branch tests in `yaml.test.ts`).
      - **Verified** ‚Äî 2979/2979 vitest tests pass; `npx tsc --noEmit` clean; `npm run build` succeeds in `danx-issue-mcp` (esbuild bundle 70.6kb).

      **What's still needed (the human action):**

      1. From `gpt-manager` repo, run:

         ```bash
         cd /home/newms/web/gpt-manager
         make publish-danx-issue-mcp
         ```

         This runs `npm run build && npm version patch --no-git-tag-version` in `../danx-issue-mcp`, then `npm publish --access public`. The local `package.json` is at `1.0.0` (manually bumped for the breaking schema change); `npm version patch` will bump it to `1.0.1` before publish.

         If the major bump should publish as `1.0.0` rather than `1.0.1`, edit the Makefile target temporarily to skip `npm version patch` for this one publish, OR set `package.json` to `0.1.6` first so `patch` lands on `1.0.0` after the bump.

      2. After the publish completes, clear npm + npx caches on every consumer host so the next `npx -y @thehammer/danx-issue-mcp` resolves the new version (the Makefile already does this for the local host ‚Äî for remote production hosts, run `make publish-danx-issue-mcp` again or manually `rm -rf ~/.npm/_npx`).

      3. Verify post-publish: `npm view @thehammer/danx-issue-mcp@<new-version> version` should match.

      4. Move this card to Done and tick AC 1.

      **Why this needs human help:**

      `npm publish` is a destructive production action ‚Äî once a version lands on the public registry, it cannot be unpublished except via the npm `unpublish` window. Per the danxbot agent guardrails (`CLAUDE.md` + global rules), production-affecting actions require explicit human authorization before invoking. The schema change is also breaking for any consumer pinned to `0.1.x`, so coordinating the rollout (publish, then run the migration script on consumer repos) is a human judgment call.

      **Incomplete ACs:**

      - "@thehammer/danx-issue-mcp published w/ new schema (triage{} + dispatch{}); legacy triaged field rejected on save" ‚Äî the **rejection** half is verified by `yaml.test.ts` (legacy fields rejected with migration-pointer errors); the **publish** half awaits the human action above.

      **Final AC check:** Before Done, every AC must be `checked: true`. AC 1 will be tickable once `make publish-danx-issue-mcp` completes successfully.
