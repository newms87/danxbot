title: "[Poller Triage Rework > Phase 1] Schema migration ‚Äî triage{} + dispatch{} blocks"
description: |
  ## Context

  Phase 1 of DX-90. Foundation for everything downstream. Replace `triaged: {timestamp, status, explain}` w/ richer `triage{}` block, replace bare `dispatch_id` w/ structured `dispatch{}` block, migrate every existing card.

  ## Schema changes

  ### `triage` (replaces `triaged`)

  ```yaml
  triage:
    expires_at: ""           # ISO 8601; "" forces re-triage on next poll
    reassess_hint: ""        # 1-line "how next agent rechecks quickly"
    last_status: ""          # Keep | Cancel | Approve | Demote | Confirm-Block
    last_explain: ""
    ice:
      total: 0               # i * c * e
      i: 0                   # 1-5
      c: 0                   # 1-5
      e: 0                   # 1-5
    history:                 # append-only, cap at 10 (oldest dropped on overflow)
      - { timestamp, status, explain, expires_at, ice: {total, i, c, e} }
  ```

  Default for new cards (poller hydration + agent-create): every field at empty/zero, `history: []`. Triage agent populates on first triage.

  ### `dispatch` (replaces `dispatch_id`)

  ```yaml
  dispatch:
    id: <uuid>               # poller-generated UUID per dispatch
    pid: <int>               # OS PID on host
    host: <hostname>         # cross-host correlation
    kind: "work" | "triage"  # which kind of dispatch occupies this slot
    started_at: <iso>
    ttl_seconds: <int>       # poller's liveness check threshold
  ```

  Default: `dispatch: null` when no active dispatch. Phase 2 implements PID tracking + liveness + reattach; Phase 1 just lands the schema shape.

  ## Migration

  One-shot script (lives in danxbot, run once on rollout):

  - For every open + closed card: create `triage` block. Copy old `triaged.timestamp/status/explain` ‚Üí `triage.history[0]` AND ‚Üí `triage.last_*`. Set `triage.expires_at = ""` so all open cards get re-triaged once on rollout.
  - For every open + closed card: replace `dispatch_id: <uuid|null>` with `dispatch: null` if id was null, OR `dispatch: {id: <uuid>, pid: 0, host: "", kind: "work", started_at: "", ttl_seconds: 0}` if id was set (Phase 2 fills in real values when it scans live PIDs).
  - Drop top-level `triaged` field after copy.

  ## Stagger to avoid rollout stampede

  Migration assigns staggered `expires_at` timestamps (now, now+5min, now+10min, ...) on the first N cards so the triage queue drains gradually rather than blocking work for hours on day 1. Stagger interval configurable; default 5min.

  ## Validator changes (`@thehammer/danx-issue-mcp`)

  - Replace `triaged` schema in `Issue` Zod/JSON-schema definition.
  - Add `triage` block w/ all required fields.
  - Replace `dispatch_id: string|null` with `dispatch: DispatchBlock|null`.
  - Update every test fixture in `danx-issue-mcp/tests/` (search `triaged:` + `dispatch_id:`).
  - `mcp__danx-issue__danx_issue_save` rejects cards w/ legacy `triaged` field ‚Äî forces migration before next save.
  - Bump major version (breaking schema change).
  - `make publish-danx-issue-mcp` after green tests.

  ## Update consumers

  - `danxbot/src/poller/local-issues.ts` ‚Äî read `triage.expires_at`, not `triaged.timestamp`.
  - `danxbot/src/poller/yaml-lifecycle.ts` ‚Äî write `triage` block on hydration of new cards.
  - `danxbot/src/poller/index.ts` ‚Äî any `triaged.*` references.
  - `claude-plugins/issues/skills/issue-card-workflow/SKILL.md` ‚Äî document new schema.
  - `claude-plugins/issue-worker/skills/danx-triage/` ‚Äî placeholder until Phase 3 replaces it.

  ## Acceptance

  - `@thehammer/danx-issue-mcp` published with `triage{}` + `dispatch{}` schema. Old `triaged` field rejected on save.
  - Migration script runs idempotently on `gpt-manager` + `danxbot` issues dirs without data loss; spot-check 5 cards have `triage.history[0]` populated from old `triaged.*`.
  - All consumers updated; `grep -r "triaged\." danxbot/src/` returns zero hits in source code (test fixtures may keep one for migration-test purposes).
  - Stagger logic: re-running migration on already-migrated cards is a no-op; first migration assigns expires_at across `now ‚Üí now + 5min*N` window.
  - issue-card-workflow skill doc reflects new schema.
