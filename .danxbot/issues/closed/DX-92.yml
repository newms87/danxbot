type: Feature
title: "[Poller Triage Rework > Phase 2] Active-dispatch tracking — PID/host/kind + reattach"
description: |
  ## Context

  Phase 2 of DX-90. With Phase 1's `dispatch{}` block landed, implement the actual PID tracking, liveness check, and reattach logic.

  ## Behaviors

  ### Dispatch start

  When poller dispatches a card (work or triage), it writes:

  ```yaml
  dispatch:
    id: <new-uuid>
    pid: <child-pid>
    host: <hostname (os.hostname() or HOST env)>
    kind: "work" | "triage"
    started_at: <now-iso>
    ttl_seconds: <kind-specific default>
  ```

  Defaults:
  - `kind: "work"` → `ttl_seconds: 7200` (2h, matches `AgentDispatch::MAX_RUNTIME_SECONDS` in gpt-manager)
  - `kind: "triage"` → `ttl_seconds: 600` (10m, triage is small)

  In-memory `activeDispatches: Map<cardId, DispatchBlock>` mirrors YAML state.

  ### Dispatch end (work or triage completes)

  Worker clears `dispatch: null` on terminal status save (Done / Cancelled / Needs Help / Needs Approval / Blocked transitions). In-memory map drops the entry.

  ### Liveness check (per poll tick + on poller startup)

  For each card with non-null `dispatch.pid`:

  1. **Same-host fast path:** `os.hostname() === dispatch.host` → `kill(pid, 0)` (POSIX existence check). False → process gone, clear dispatch.
  2. **Cross-host:** check the existing remote heartbeat mechanism (review `live-dispatch-guard.ts` — extend if needed). For local-only deploys, cross-host = error log + clear (operator intervention).
  3. **TTL expired:** `started_at + ttl_seconds < now` → clear regardless of PID state. Logs WARNING — TTL expiry on a still-running PID is a sign of a hang.

  ### Poller startup reattach

  On boot, BEFORE entering the dispatch loop:

  1. Scan all open card YAMLs for non-null `dispatch.pid`.
  2. For each: run liveness check.
     - Live + same-host → register in `activeDispatches`, attach to existing process (no redispatch, no double-work).
     - Dead/expired/cross-host → clear `dispatch: null`, save card.
  3. Now the activeDispatches map matches reality.

  ### Worker-spawn machinery

  Poller's existing dispatch path returns the spawned process handle (PID + lifecycle hooks). Capture PID synchronously before resolving the dispatch promise, write to YAML before allowing next poller tick.

  ## Files

  - `danxbot/src/poller/live-dispatch-guard.ts` — extend for kind/TTL semantics + host check.
  - `danxbot/src/poller/index.ts` — add startup reattach phase before main loop.
  - `danxbot/src/agent/claude-invocation.ts` — surface PID synchronously.
  - `danxbot/src/poller/local-issues.ts` — write `dispatch{}` block on dispatch start.
  - Workspace exit hooks (`enforce-terminal-tool.sh` etc.) — clear `dispatch: null` on terminal save (or handle in worker on dispatch completion).

  ## Tests

  Unit:
  - liveness with live PID → returns alive
  - liveness with dead PID → returns dead, clears YAML
  - liveness with TTL expired → returns dead, logs WARNING
  - liveness with cross-host PID → unable-to-verify path
  - reattach on startup with mix of live/dead → activeDispatches matches live cards only

  Integration:
  - dispatch a sleep-30 child, kill poller mid-flight, restart → poller reattaches, does not redispatch.
  - dispatch a sleep-30 child, let TTL expire (lower TTL to 5s for test) → poller clears + redispatches on next tick.

  ## Acceptance

  - YAML `dispatch{}` block populated with real PID/host/kind/started_at/ttl_seconds on every dispatch.
  - Liveness check catches dead PIDs + TTL expiries; clears YAML in both cases.
  - Poller restart reattaches to live dispatches without redispatching (verified via integration test).
  - In-memory `activeDispatches` always == YAML state after every tick (invariant test).
  - No regressions on existing dispatch lifecycle tests (`live-dispatch-guard.test.ts`, `index.test.ts` orphan-push, etc).
