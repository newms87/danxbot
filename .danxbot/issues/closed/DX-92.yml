      | P0 #1 | AC #5 integration test missing | Added `AC #5 — worker restart with alive PID does NOT redispatch` test in `src/poller/index.test.ts` | exercises full reattach → poll → orphan-resume → YAML-based skip path |
      | P0 #2 | AC #6 integration test missing | Added `AC #6 — TTL-expired dispatch is cleared by reattach` test | seeds expired-TTL YAML, asserts clearDispatchAndWrite + map doesn't register |
      | P1 #4 | corrupt-YAML tolerance untested | Added `runStartupReattach — corrupt-YAML tolerance` describe block | one corrupt sibling logged + skipped, healthy ones still processed |
      | P1 #5 | YAML-missing during eviction | Added `evictDeadDispatches — YAML missing on disk` describe block | confirms in-memory entry drops, no clearDispatchAndWrite call |
      | P1 #6 | post-spawn pid:0 fallback | Added `post-spawn falls back to pid: 0 when result.job.handle is missing` test | placeholder write, in-memory entry registers with pid:0 |
      | P1 #7 | pre-spawn failure cleanup | Added `clears YAML + drops in-memory entry on pre-spawn failure` test | dispatch() rejects → clearDispatchAndWrite + map clean |
      | P1 #8 | onComplete clear on timeout/fail status | Added two tests covering `status: timeout` and `status: failed` | both paths clear YAML + drop map entry |
      | P1 #11 | createDockerHandle pid:0 sentinel | Tightened guard to `child.pid <= 0`; added pid:0 + negative-pid rejection tests | POSIX broadcast sentinel now fail-loud |

