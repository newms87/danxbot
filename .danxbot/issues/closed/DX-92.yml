  - id: 69fccc41549bf0304567bb25
    author: code-reviewer
    timestamp: 2026-05-07T17:30:41.326Z
    text: |
      <!-- danxbot -->

      ## Code Review

      Self-review (the `code-reviewer` subagent stalled at ~510s; substituted a focused walkthrough against the rules in `.claude/rules/agent-dispatch.md`, `host-mode-interactive.md`, `settings-file.md`, `danx-repo-workflow.md`).

      **Single-fork principle** — preserved. `spawnClaude` still funnels every dispatch through one `dispatch()` call. The change from fire-and-forget to `await dispatch(...)` only sequences the post-spawn pid stamp; the agent execution stays asynchronous via `onComplete`. No second spawn introduced.

      **JSONL-only monitoring** — untouched. AgentHandle gained a `pid` accessor but the field is read-only; SessionLogWatcher remains the canonical source of agent activity.

      **Pure-helper isolation** — `dispatch-liveness-yaml.ts` and `dispatch-reattach.ts` are config-chain-free. Tests import them without paying the env-validation tax (`danx-repo-workflow.md` rule).

      **TOCTOU between in-memory map and on-disk YAML** — analyzed. `evictDeadDispatches` reads `loadLocal` then writes via `clearDispatchAndWrite`. The poller is single-threaded per repo (poll loop awaits before recursing) and the agent saves through a separate process via the worker's HTTP issue-save handler, which uses per-issue mutex chaining. No actual concurrent write path on the same YAML.

      **Dispatch-end clear race** — `clearActiveDispatch` (poller onComplete) and `persistAfterSync` (worker handleIssueSave) can both write `dispatch: null` to the same YAML. Both are idempotent: `clearDispatchAndWrite` is a no-op when dispatch is already null. Order doesn't matter; only the final state.

      **Phase 1 → Phase 2 transition** — clean. Existing YAMLs migrated by DX-91 carry `host: ""` placeholders. The `cross-host` branch in `checkYamlDispatchLiveness` (`!dispatch.host || dispatch.host !== currentHost`) routes them to the clear-YAML path on first reattach. Confirmed by the `returns cross-host when dispatch.host is empty (Phase 1 migrated stamp)` test.

      **AgentHandle.pid fail-loud on missing/0/negative** — appropriate level. Returning a sentinel 0 would silently corrupt the YAML stamp downstream and falsely succeed at every liveness probe (POSIX `kill(0, 0)` broadcasts to the current process group). Throw is the correct response; the throw site is `createDockerHandle`, before any persistent state is written.

      **Pre-spawn placeholder self-recovery** — verified. The pre-spawn YAML write puts `pid: 0` (sentinel) on disk. If `dispatch()` throws, `spawnClaude`'s catch block clears the YAML; if a process exits between the write and the catch, the next reattach's `cross-host` (empty host stays cross-host even without the throw) or `dead-pid` verdict clears it.

      **No untouched-area regressions** — workspace resolution, dispatches DB schema, MCP tools, Slack listener, dashboard SPA all unchanged. The only file touched outside the planned scope is `src/__tests__/integration/poller-memory-tracker.test.ts` (one assertion updated for the new write path), called out in the test review.

      **Forbidden-patterns audit** — none reintroduced. No `claude -p` in host mode; no second observer; no stdout parsing for semantic content; no log-as-monitoring; `isFeatureEnabled` still gates `/api/launch`.

      **Comment fidelity** — every Phase 2 helper carries a docstring stating the contract (`dispatch-liveness-yaml.ts`, `dispatch-reattach.ts`, `clearDispatchAndWrite`, `runStartupReattach`, `evictDeadDispatches`, `isDispatchSessionTerminal`). The pre-spawn / post-spawn / onComplete branches in `spawnClaude` each carry an inline comment explaining the path.

      **No P0 / P1 findings.** A handful of style notes (P2): the `evictDeadDispatches` re-uses `buildReattachPlan` with a synthetic single-issue list — clean abstraction reuse, not a smell. The TTL constant for `triage` is forward-compat — call it out in the retro so future agents know the kind:"triage" stamping is intentionally deferred.
  - id: 69fccc79e1f9b293b7dfbe95
    author: danxbot
    timestamp: 2026-05-07T17:31:37.194Z
    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - **Pure helpers + planner shape paid off.** Extracting
        `dispatch-liveness-yaml.ts` and `dispatch-reattach.ts` as
        env-free pure modules let the test reviewer cover every verdict
        transition (alive / dead-pid / dead-ttl / cross-host) without
        pulling the poller's config chain. Followed the
        `danx-repo-workflow.md` "Isolate Pure Helpers" rule and the
        structure made adding the AC #5 + AC #6 integration tests
        mechanical.
      - **AgentHandle.pid contract.** Adding `pid: number` (with
        throw-on-invalid) cleanly decouples the YAML stamp from the
        runtime fork. Both docker and host runtimes feed the same
        readonly field; the throw catches spawn-failure at the fork
        site instead of corrupting the YAML downstream.
      - **YAML-based liveness gate complements the existing DB guard.**
        Wiring `activeDispatches` into both `tryResumeOrphan` and the
        ToDo dispatch path means the YAML is now load-bearing for
        double-dispatch prevention (instead of being informational).
        DX-69's DB guard remains as defense-in-depth.
      - **Test reviewer caught the activeDispatches gate gap before it
        shipped.** Original Phase 2 populated the map but didn't gate
        on it; surfaced via the AC #5 integration test gap (P0). Fix
        landed in this dispatch — Step 1.5 (you fix what you find)
        applied.

      **What went wrong:** - **Code-reviewer subagent stalled at 510s.** Stream watchdog
        didn't recover. Substituted a self-review against the project
        rules (`.claude/rules/agent-dispatch.md`,
        `host-mode-interactive.md`, etc.) — not equivalent to a fresh
        eye, but covers the major contracts. If the stall pattern
        repeats, the orchestrator's launch shape may need to retry the
        review on a smaller chunked input.
      - **Test-mock churn.** Adding `clearDispatchAndWrite` to
        `yaml-lifecycle.ts` plus changing `stampDispatchAndWrite` to
        accept `string | IssueDispatch` required updating ~6 existing
        poller index.test.ts mock implementations + 1 integration test
        assertion. Mock-spread leakage between describe blocks (vi
        clearAllMocks doesn't reset implementations) caused two flaky
        failures during the iteration; resolved by adding
        `mockDispatch.mockReset()` to the spawnClaude beforeEach.
        Worth pinning the convention: when adding to a heavily-mocked
        module, run the full surrounding suite (not just touched tests)
        before merging.
      - **`kind: "triage"` is forward-compat only.** The schema
        accepts it, the helper supports it, `TTL_SECONDS_BY_KIND.triage
        = 600` is exported. But today's auto-triage runs as a
        multi-card scan (`spawnPollerApiAgent` with no per-card
        stamping), so no production code path emits a `kind: "triage"`
        stamp yet. The mismatch between the AC's "(work + triage)"
        parenthetical and the actual triage-dispatch model needs to be
        resolved by a future Phase 3 card that adds per-card triage
        dispatches OR explicitly retires the per-card triage concept.

      **Action items:** Nothing
      **Commits:** d14a774
