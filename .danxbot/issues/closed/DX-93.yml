type: Feature
title: "[Poller Triage Rework > Phase 3] Single-card triage agent — danx-triage-card skill + workspace MCP wiring"
description: |
  ## Context

  Phase 3 of DX-90. Replaces the bulk orchestrator-based triage (`/danx-triage auto`) with a single-card direct triage agent dispatched 1-card-per-loop by the new poller.

  ## Agent shape

  - **No orchestrator/sub-agent split.** Single Claude session reads ONE card via `mcp__danx-issue__danx_issue_get`, decides, writes back via `mcp__danx-issue__danx_issue_save`.
  - Lives in **existing `issue-worker` workspace** (no new workspace needed). Existing rules + skills (Hard Gate, unblock, issue-card-workflow) all apply.
  - Skill name: `danx-triage-card`. Replaces `danx-triage` in `claude-plugins/issue-worker/skills/`.

  ## Workspace MCP wiring

  Today `gpt-manager/.danxbot/workspaces/issue-worker/.mcp.json` declares only `playwright`. Triage agent needs `danx-issue` MCP. Add:

  ```json
  {
    "mcpServers": {
      "danx-issue": { ...same as parent .mcp.json... },
      "playwright": { ... }
    }
  }
  ```

  Note: workspace `.mcp.json` REPLACES parent (does not merge). Without this addition, the dispatched agent sees zero `mcp__danx-issue__*` tools — fail loud.

  Same wiring for `danxbot/.danxbot/workspaces/issue-worker/.mcp.json` if/when one exists.

  ## Decision tree (in skill body)

  Per status:

  | Status | Decision | TTL on success |
  |---|---|---|
  | **Review** | ICE score (1-5 each, total = i*c*e). Decide: Keep → set `status: ToDo` + capture ICE in `triage.ice`. Cancel → set `status: Cancelled`. Approve → set `status: Needs Approval`. | `expires_at = now + 24h` (re-triages only if it bounces back to Review) |
  | **Needs Help** | Hard Gate audit per `claude-plugins/issues/skills/issue-card-workflow/SKILL.md` ("Needs Help — Hard Gate Before Saving") + `claude-plugins/issues/skills/unblock/SKILL.md` (Misclassification Audit). Two outcomes: (a) every "operator must do" step is locally executable → demote to `ToDo` + comment naming the misclassification; (b) genuine human-only blocker → confirm + write `triage.reassess_hint` (one line: "what to check fast next time"). | `expires_at = now + 3h` |
  | **Blocked** | Re-check `blocked.by[]` — if every blocker terminal (Done/Cancelled) → clear `blocked: null`. Otherwise update `triage.reassess_hint` w/ which blockers are still pending. | `expires_at = now + 1h` |
  | ToDo / In Progress / Done / Cancelled | Not triaged. Triage agent rejects + logs (poller shouldn't have dispatched it). | n/a |

  ## reassess_hint examples

  - "Check if AGD-148..158 dispatches all completed cleanly (canonical path observer log)" — for an old DX-81-style verification card.
  - "Check if `package.json` upstream merge has shipped" — for a card blocked on external dep.
  - "Check if user has signed Google Workspace contract" — genuine Needs Help, hint tells next agent what one-liner check decides.

  Hint must be answerable in ≤30 seconds by the next triage agent. Keep it terse, factual, action-shaped.

  ## ICE rubric (in skill body)

  | Score | Impact (I) | Confidence (C) | Ease (E) |
  |---|---|---|---|
  | 5 | Unblocks production / blocks epic | All AC anchors verified in code | <1 hour, isolated edit |
  | 4 | Major UX or perf improvement | Most anchors verified | 1-3 hours, contained scope |
  | 3 | Cleanup or moderate feature | Some anchors stale | Half-day, some discovery |
  | 2 | Nice-to-have | Anchors uncertain | Multi-session, cross-cutting |
  | 1 | Speculative / vague | Card needs rewrite first | Heavy refactor |

  Total = I × C × E (1-125). Persisted in `triage.ice.{i,c,e,total}`.

  ## Files

  - `claude-plugins/issue-worker/skills/danx-triage-card/SKILL.md` — new skill.
  - Optional: keep `danx-triage` as a thin alias pointing at `danx-triage-card` for backwards-compat during rollout, then delete in Phase 5.
  - `gpt-manager/.danxbot/workspaces/issue-worker/.mcp.json` — add `danx-issue` MCP server.
  - Workspace `.claude/settings.json` — confirm `issue-worker` plugin set still loads (no change unless the skill rename breaks `enabledSkills`).

  ## Acceptance

  - `danx-triage-card` skill ships with full per-status decision tree, ICE rubric, reassess_hint contract.
  - Workspace `.mcp.json` adds `danx-issue` MCP; smoke test: dispatched agent in `issue-worker` workspace can call `mcp__danx-issue__danx_issue_get`.
  - Manual smoke: invoke skill on each card status (Review, Needs Help, Blocked), verify YAML written w/ correct `triage.expires_at`, `triage.ice` (Review only), `triage.reassess_hint` (Needs Help / Blocked), `triage.history` appended.
  - On Needs Help cards, audit re-fires the `unblock` skill's misclassification check + correctly demotes locally-executable cards.
  - Old `danx-triage` skill body becomes a single-line redirect to `danx-triage-card` (or deleted, if Phase 5 ordering makes that cleaner).
