      ## Code Review — code-reviewer subagent

      Verdict: **shippable**. 1 HIGH (silent ambiguity between `mcp__danx-issue__*` and `mcp__danxbot__*` tool namespaces — both expose `danx_issue_save`/`danx_issue_create`), 5 MEDIUM, 10 LOW findings. Of the actionable findings, fixed in this dispatch:

      - **H1 (silent tool-namespace ambiguity)** — added explicit "CRITICAL — use `mcp__danx-issue__*` exclusively" section to `danx-triage-card/SKILL.md`. The infra `mcp__danxbot__danx_issue_*` tools remain advertised (they're shared by `danx-next` / `danx-start` workflows), but the skill now tells the LLM unambiguously which prefix to use.
      - **M2 (in-scope vs out-of-scope SKILL.md table contradiction)** — restated the `blocked != null` precedence inline in both tables. A fast-skimming LLM can no longer hit the `ToDo \| Refuse` row and bail on a legitimate Blocked card.
      - **M3 (`/danx-triage auto` poller hook still active)** — added explicit "If invoked with the `auto` argument" section to the redirect SKILL.md describing the per-card loop via `mcp__danx-issue__danx_issue_list`. Caps loop at 5 cards/dispatch. `autoTriage` is currently `false` everywhere (verified across danxbot/gpt-manager/platform settings.json), so this is forward-looking.
      - **M5 (workspace.yml description omitted skills)** — listed every shipped skill including the deprecated redirect.
      - **L2 (Reassess hint comment shape)** — tightened the comment-policy table; explicit "DO NOT include this line" wording for non-applicable decision branches.
      - **L3 (smoke-test arithmetic for Cancel)** — added Cancel branch to the smoke checklist.
      - **L10 (stale `DispatchInput.overlay` doc)** — enumerated all auto-injected keys in two groups (danxbot infra URLs + per-repo MCP env block).

      Deferred (M1, M4, L1/L4/L5/L7/L8/L9, code-reviewer-acknowledged-good L6) — defensive guards + cosmetic polish + cost-optimisation suggestions; none block this phase, all tracked in this comment for the Phase 4 / Phase 5 follow-ups.
