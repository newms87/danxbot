    text: |-
      <!-- danxbot -->
      <!-- danxbot-retro -->

      ## Retro

      **What went well:** - Smoke dispatch on DX-13 verified the entire wiring end-to-end in 89s and produced a clean YAML diff that matched every documented contract bullet — no need to mock the agent or trust the LLM alone.
      - The danx-issue MCP server's pre-launch probe surfaced the missing `TRELLO_API_KEY` / `TRELLO_API_TOKEN` overlay BEFORE spawning the agent (rather than failing silently mid-dispatch), which made the env-wiring bug visible in seconds.
      - Test-reviewer + code-reviewer in parallel turned up 1 HIGH skill-body bug + 4 high-priority test gaps that would have shipped silently otherwise. Time to fix the entire batch was ~10 minutes; would have been hours if either reviewer had run sequentially.

      **What went wrong:** - Initial draft of the danx-triage-card skill body conflated "Blocked" as a `status` value with "Blocked" as a `blocked != null` predicate — caught by the smoke test setup and fixed pre-commit, but a mechanical schema-vs-rule check earlier in the workflow would have surfaced it without the manual cross-read.
      - Had to manually mirror the inject source files into the connected repo workspace dirs (`<repo>/.danxbot/workspaces/issue-worker/`) for the smoke dispatch to use them, because the worker's poller had cached the OLD inject pipeline state. The poller's tick-based mirror is fine for the steady state, but during phased rollouts where the agent wants to smoke-test its own changes, there's no escape hatch.
      - Test-reviewer flagged a real skill-body ambiguity (M2) AND a real silent foot-gun (H1, the `mcp__danx-issue__*` vs `mcp__danxbot__*` namespace overlap) — both are LLM-instruction-quality issues that mechanical tests can't fully prevent. Long-term, the danxbot infra server should suppress its `danx_issue_save`/`danx_issue_create` tools when the workspace declares the `danx-issue` MCP server (filed as M3.5 in code-reviewer follow-ups; not blocking this phase).

      **Action items:** Nothing
      **Commits:** 1ba7f10, claude-plugins: 53054b9
