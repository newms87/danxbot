      ## Test Review — test-reviewer subagent

      Verdict: **8 good, 3 improve, 5 high-priority missing**. Fixed in this dispatch:

      - **HIGH 1 (precedence test only covers 1/4 keys)** — parameterised via `it.each` to pin precedence for `DANX_REPO_ROOT`, `DANX_TRACKER`, `TRELLO_API_KEY`, `TRELLO_API_TOKEN`. Regression in spread order for any of the 3 trello keys would now fail.
      - **HIGH 2 (no mirror-drift test)** — added two byte-equality tests in `workspace-shape.test.ts` comparing the danxbot inject copy of `danx-triage-card/SKILL.md` and `danx-triage/SKILL.md` against the `claude-plugins` marketplace mirror. Skipped gracefully when the marketplace path isn't mounted (CI / fresh checkouts).
      - **HIGH 3 (ICE 1-5 scale not pinned)** — added explicit body-anchor regexes for `1–5 scale`, `1–125` product max, and `i × c × e` formula. A regression to the legacy 1-10 scale (which would fail the schema validator on every Review save) is now caught at unit-test time.
      - **HIGH 4 (issue-worker gate not tested)** — added `rejects dispatch with WorkspaceGateError when overrides.issuePoller.enabled = false` to mirror the slack-worker gate test.
      - **MEDIUM-coverage (decision enum + reassess_hint constraint + Hard Gate-unblock anchor + Rationalisation detector + danx-triage redirect content + routing precedence rule)** — pinned via 6 additional `expect` assertions in the consolidated SKILL.md test.
      - **Brittleness — `Object.keys().sort()` exhaustive set check** — softened to `toContain` so future MCP-server additions don't fail this test for the wrong reason.

      Coverage for the 4 new lines in `dispatch/core.ts` (lines 621-624): every key has at least one happy-path verification + the parameterised precedence test now covers all 4. Both branches of the `trelloEnabled ? "trello" : "memory"` ternary are covered.

      Final test counts: 41 in the focused subset (workspace-shape.test.ts: 9 tests, dispatch/core.test.ts: 32 tests). Full backend suite: 3057 passing (one flaky non-related timeout in `list-target-repos.test.ts` passed on rerun).
