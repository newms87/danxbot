    text: |
      <!-- danxbot -->

      ## Implementation summary

      Phase 4 of DX-90 lands the new poller decision tree:

      ```
      every <poll_interval>:
        1. evictDeadDispatches (per-tick liveness scan)
        2. (boot reattach already populated activeDispatches — invariant)
        3. work-ready: listDispatchableYamls (status: ToDo, blocked: null,
           dispatch: null) — sort untriaged-first, then ICE total DESC
        4. triage-due: listTriageDueYamls (status ∈ {Review, Needs Help}
           OR blocked != null, AND triage.expires_at empty/past) —
           sort never-triaged-first, then expires_at ASC
        5. idle → ideator (if enabled) or sleep
      ```

      Single dispatch per tick. Work-ready preempts triage; triage preempts ideator.

      ### Files

      | File | Change |
      |---|---|
      | `src/poller/local-issues.ts` | Dropped `excludeExternalIds`. New `workReadyCompare` (untriaged → ICE DESC → FIFO). Added `listTriageDueYamls(repoLocalPath, now)` with `triageDueCompare` (never-triaged → expires_at ASC → FIFO). |
      | `src/poller/index.ts` | Wired triage-due path before ideator. New `tryTriageDispatch` — single-card per-tick triage spawn with `kind: "triage"` dispatch stamp via `buildStartStamp`. Dropped action_items partition. Added `Review` + `Needs Help` to bulk-sync. Replaced `checkAndSpawnTriage` with `tryTriageDispatch`. |
      | `src/poller/constants.ts` | `TRIAGE_AUTO_PROMPT = ""` (legacy retired). New `TRIAGE_CARD_PROMPT(issueId)`. |
      | `src/poller/dispatch-liveness-yaml.ts` | New `buildStartStamp` helper; updated `triage` TTL comment. |
      | `src/issue-tracker/trello.ts` | `fetchOpenCards` + `listIdToStatus` map Action Items list → `status: "Review"`. |
      | `src/issue-tracker/interface.ts` | Marked `IssueRef.list_kind` `@deprecated` for Phase 5 deletion. |
      | `src/poller/triage-loop.test.ts` | New file — 9 wiring/composition tests. |
      | Updated tests | `local-issues.test.ts`, `index.test.ts`, `constants.test.ts`, `trello.test.ts`, `poller-memory-tracker.test.ts`, `restage-route.test.ts` (incidental mock path fix). |

      ### Test results

      - Backend: **3092/3092** vitest tests pass
      - TypeScript: **0** errors (`npx tsc --noEmit`)
      - Dashboard SFC tests: pre-existing yaml-import failures (unrelated; UI Frontend Test Exemption applies)
