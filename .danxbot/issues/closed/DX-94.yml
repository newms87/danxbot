    text: |
      <!-- danxbot -->

      ## Code Review

      **Verdict: No blockers — land it.**

      ### What landed cleanly

      - Decision-tree composition (`work-ready` → `triage-due` → `ideator`) lives in one place at `src/poller/index.ts:_poll` with a clear comment trail.
      - `kind: "triage"` flows through the same `dispatchStamp` lifecycle as `kind: "work"` — pre-stamp, post-spawn pid update, `onComplete` clear, pre-spawn-failure rollback. Strong parity.
      - `triage-loop.test.ts` is well-scoped and reads as documentation for the new contract.
      - Trello action-items → Review mapping is symmetric (`fetchOpenCards` + `listIdToStatus`) so `getCard` / `syncIssue` round-trips don't move the card.
      - Bulk-sync coverage extended to `Review` + `Needs Help` so per-card triage agents always have a local YAML.
      - Pipeline-incidental fix to `restage-route.test.ts` (mock path follows the file move) — narrow, correct.

      ### High-priority follow-up (not blocking)

      **Silent token-burn risk**: a triage agent that signals `danxbot_complete({status:"completed"})` without persisting `triage.expires_at` is invisible to every guard:

      - `consecutiveFailures` does not increment (status=completed)
      - `recoverStuckCards` does not fire
      - The next tick's `listTriageDueYamls` returns the same card
      - Same broken agent dispatched against the same card every interval

      Filed as DX-104 (action item) for a worker-side `triage{}`-progressed validator OR a poller post-dispatch guard for `kind: "triage"`. Phase 4 introduces the surface but does not regress prior behavior — the legacy bulk-triage path had the same shape.

      ### Resolved inline (this dispatch)

      | Reviewer item | Action |
      |---|---|
      | Stale `TTL_SECONDS_BY_KIND.triage` comment | Updated to reflect Phase 4 per-card semantics |
      | Three near-identical `IssueDispatch` start-stamp constructions | Extracted `buildStartStamp(dispatchId, kind, host)` helper in `dispatch-liveness-yaml.ts`; all three call sites converted |
      | `tryTriageDispatch` recomputes `TRIAGE_CARD_PROMPT(stamped.id)` twice + diverges on `initialPrompt` slice | Hoisted `prompt` local; `initialPrompt` now uses the canonical `slice(0, 500)` |
      | `IssueRef.list_kind` interface comment misleading | Marked `@deprecated` with Phase 5 deletion plan |

      ### Pre-existing tech debt (not introduced)

      `src/poller/index.ts` is 2475 lines — far above the project's 150-200 line limit. Phase 4 added ~165 lines but did not introduce the violation. A "split poller/index.ts" follow-up is overdue but out of scope for this card.
