type: Feature
title: "[Poller Triage Rework > Phase 4] Poller loop rewrite + ICE-sorted dispatch"
description: |
  ## Context

  Phase 4 of DX-90. With Phase 1 schema, Phase 2 active-dispatch tracking, and Phase 3 triage agent landed, rewrite the poller's main loop to single-dispatch-per-tick.

  ## New main loop

  ```
  every <poll_interval> seconds:
    1. activeDispatches non-empty? → log + sleep, return
    2. (handled by Phase 2 startup reattach — invariant: in-memory matches YAML)
    3. work-ready: find oldest open card matching:
         status == "ToDo"
         AND blocked == null
         AND dispatch == null
       sort: untriaged first (triage.expires_at == ""), then by triage.ice.total DESC
       → dispatch worker (kind: "work"); return
    4. triage-due: find oldest open card matching:
         status in {"Review", "Needs Help", "Blocked"}
         AND (triage.expires_at == "" OR triage.expires_at <= now)
         AND dispatch == null
       → dispatch triage agent (kind: "triage"); return
    5. idle → sleep
  ```

  Single dispatch per tick. After every dispatch (work OR triage), the next tick re-evaluates from step 1.

  ## ToDo dispatch sort

  ```ts
  function workReadySort(a: Issue, b: Issue): number {
    const aUntriaged = a.triage.expires_at === "";
    const bUntriaged = b.triage.expires_at === "";
    if (aUntriaged !== bUntriaged) return aUntriaged ? -1 : 1; // untriaged first
    return b.triage.ice.total - a.triage.ice.total; // then ICE desc
  }
  ```

  Untriaged ToDo cards = priority unknown → flush them before triaged ones (they may be high-priority bug fixes the operator just filed). Within triaged: highest ICE first.

  ## Triage-due selection

  ```ts
  function triageDueSort(a: Issue, b: Issue): number {
    const aExp = a.triage.expires_at;
    const bExp = b.triage.expires_at;
    if (aExp === "" && bExp !== "") return -1; // never-triaged first
    if (bExp === "" && aExp !== "") return 1;
    return aExp.localeCompare(bExp); // oldest expiry first
  }
  ```

  ## Filter changes

  - Drop `list_kind === "action_items"` filter from `local-issues.ts:74` — replaced by `status: Review` filter.
  - `Action Items` Trello list → still mirrored on hydration but maps to `status: Review` (Phase 5 finalizes the Trello-side rename / mapping).

  ## Edge cases

  - **Idle infinite loop guard.** If every triage-due card fails to triage (agent crashes, returns `errors`), poller still progresses by stamping a short-TTL `triage.expires_at` (say `now + 5min`) on the failed card so it's not re-attempted every tick. Logged WARNING.
  - **Mass migration day 1.** Every existing card has `triage.expires_at = ""` (forces re-triage). Stagger from Phase 1 spreads them across `now → now + 5min*N` so work dispatches get interleaved between triages instead of blocked behind a triage backlog.
  - **In Progress cards.** Have an active `dispatch{}` block; step 1 catches them. No triage applies.

  ## Files

  - `danxbot/src/poller/index.ts` — main loop rewrite.
  - `danxbot/src/poller/local-issues.ts` — drop action_items filter, add work-ready + triage-due selectors.
  - `danxbot/src/poller/index.test.ts` — extensive existing dispatch tests; rewrite for new loop shape.
  - New test: `danxbot/src/poller/triage-loop.test.ts` — covers single-dispatch-per-tick + sort + idle.

  ## Tests

  Behavioral:
  - Tick with 1 work-ready ToDo card → dispatches work, returns.
  - Tick with 0 work-ready, 1 triage-due Review card → dispatches triage, returns.
  - Tick with 5 ToDo (3 untriaged, 2 triaged ICE 60+40) → dispatches untriaged-first oldest.
  - Tick with 5 ToDo all triaged (ICE 80, 60, 40, 20, 10) → dispatches ICE 80.
  - Tick with active dispatch in memory → no new dispatch, sleep.
  - Tick with active dispatch in YAML but not memory (post-restart, before reattach completes) → reattaches, no double-dispatch.
  - Triage-due card whose triage agent crashes → poller stamps short TTL, advances on next tick.

  ## Acceptance

  - Poller dispatches AT MOST ONE card per tick (work OR triage; never both, never zero work-ready when both exist).
  - ToDo dispatch order: untriaged first, then ICE total desc.
  - Triage-due selection: never-triaged first, then oldest expiry.
  - `list_kind: "action_items"` filter removed (Phase 5 finalizes Trello mapping).
  - Test suite green; new triage-loop test covers all 7 behavioral cases above.
  - Idle-loop guard: triage failures don't busy-loop (verified by injecting a thrown agent in test).
