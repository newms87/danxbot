title: "[Poller Triage Rework > Phase 5] Cleanup — Action Items collapse + bulk-triage removal"
description: |
  ## Context

  Phase 5 of DX-90. Final cleanup. Phases 1-4 land the new system in parallel with the legacy bulk triage; this phase rips out the legacy path.

  ## Action Items collapse

  Two integration points:

  1. **Tracker hydration.** When the poller hydrates a card from a Trello "Action Items" list, today it sets `list_kind: "action_items"` on the local YAML's `IssueRef` projection. New behavior: hydrate with `status: "Review"` regardless of which Trello list the card lives on. The `list_kind` field is dropped from the schema (or kept temporarily as advisory metadata if other code reads it — audit + clean up).
  2. **Trello board.** No board rename required (per DX-90 scope). The "Action Items" list name stays; the sync layer remaps it to `status: Review` at hydration time. New cards set to `status: ToDo` will be moved to the `ToDo` list on the next outbound sync (poller's normal status-list mapping).

  ## Old triage skill removal

  - Delete `claude-plugins/issue-worker/skills/danx-triage/` (replaced by `danx-triage-card` in Phase 3).
  - Delete `danxbot/src/poller/constants.ts` `auto-triage` prompt block (lines ~99-115).
  - Delete the orchestrator-style triage prompt + sub-agent definitions in `gpt-manager/.danxbot/workspaces/issue-worker/.claude/agents/orchestrator.md` (any triage-specific sections).
  - Delete `inject` workspace files for the old triage skill if they exist in `danxbot/src/poller/inject/workspaces/`.

  ## Schema cleanup

  - Drop legacy `triaged` field from `Issue` schema in `@thehammer/danx-issue-mcp`. (Phase 1 marked it deprecated; Phase 5 deletes the field, bumps version.)
  - Audit YAML migration script — confirm zero open + closed cards still carry the legacy field. Run grep across `gpt-manager/.danxbot/issues/` + `danxbot/.danxbot/issues/`.
  - Drop `list_kind` field from `IssueRef` schema if no remaining consumers.
  - Update `claude-plugins/issues/skills/issue-card-workflow/SKILL.md` — delete any references to legacy `triaged` field, Action Items list_kind, bulk triage flow.

  ## Documentation

  - `claude-plugins/issues/skills/issue-card-workflow/SKILL.md` — update to reflect:
    - New `triage{}` block shape (already added in Phase 1).
    - Per-card triage cadence (Review 24h, Needs Help 3h, Blocked 1h).
    - ToDo dispatch sort: untriaged first, ICE desc.
    - `Action Items` no longer a status concept — collapsed into `Review`.
  - Add a "Triage Lifecycle" diagram (mermaid) showing the new state machine.
  - `claude-plugins/danxbot/skills/danxbot/SKILL.md` — update poller behavior docs.

  ## Verification

  - `grep -r "list_kind" danxbot/src/` returns zero hits (or only test fixtures asserting the cleanup).
  - `grep -r "triaged\." gpt-manager/ danxbot/` returns zero hits in source code + skills.
  - `grep -r "/danx-triage auto" danxbot/src/ claude-plugins/` returns zero hits.
  - All open cards re-triaged at least once under the new system within `now + 5min*N` of rollout (validates Phase 1 stagger logic actually works end-to-end).
  - End-to-end smoke: file a fresh card on the "Action Items" Trello list → poller hydrates with `status: Review` → triage agent runs → card lands in `ToDo` with ICE captured.

  ## Acceptance

  - Trello "Action Items" list hydrates as `status: Review` (no `list_kind` flag).
  - `danx-triage` skill removed; `danx-triage-card` is the only triage skill.
  - Bulk triage `auto` prompt deleted from `danxbot/src/poller/constants.ts`.
  - Legacy `triaged` field removed from `@thehammer/danx-issue-mcp` schema; new major version published.
  - All open + closed YAMLs verified clean of legacy `triaged` field via grep.
  - Documentation updates landed in `claude-plugins/issues/skills/issue-card-workflow/` + `claude-plugins/danxbot/skills/danxbot/`.
  - End-to-end smoke (Action Items → Review → triage → ToDo) passes.
