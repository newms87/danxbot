      ## AC Verification Evidence

      Per-AC test / inspection evidence captured before checking off.

      ### AC 1 — Action Items list hydrates as `status: "Review"`; no `list_kind`

      Source: `src/issue-tracker/trello.ts#listIdToStatus` returns `"Review"` for both `reviewListId` and `actionItemsListId`. `IssueRef` interface (`src/issue-tracker/interface.ts`) no longer carries `list_kind`. Tests:

