type: Bug
title: "Fix yaml-lifecycle-memory-tracker.test.ts teardown leak. afterAll rmSync on testState.logsDir runs while EventForwarder still has pending writes to <logsDir>/event-queue/*.jsonl, producing ENOENT unhandled rejection that fails Vitest exit even when all 2588 tests pass. Drain or stop the forwarder before rmSync, or unref the queue write loop. Reproduce: npx vitest run from repo root."
description: |
  ## Problem

  `src/__tests__/integration/yaml-lifecycle-memory-tracker.test.ts` mints
  a `testState.logsDir` via `vi.hoisted` + `mkdtempSync`, mocks
  `config.logsDir` to point at it, then `afterAll` runs `rmSync` on it.

  The dispatch fork inside `spawnAgent` registers the EventForwarder /
  EventQueue against `<config.logsDir>/event-queue/<jobId>.jsonl`. The
  cleanup path (`launcher.ts#runCleanup`) intentionally fires the final
  `forwarderFlush?.()` as `void` â€” fire-and-forget â€” to keep cleanup
  latency short for production. The flush internally writes batches to
  the queue file and may keep retrying for tens of seconds against the
  Laravel events endpoint.

  Result: when `afterAll` removes `testState.logsDir`, in-flight queue
  writes can ENOENT (parent dir gone). The previous fix
  (`fa15457`, Trello `69f7844004a63103a75b2bd5`) wrapped `drainAndSend`
  in an inner try/catch so the rejection no longer escapes â€” but the
  underlying TEARDOWN LEAK remains: the forwarder is still doing async
  work after the test completes, which (a) keeps vitest's event loop
  warm with pending timers/I/O, (b) re-introduces the ENOENT class of
  symptoms the moment the inner catch is removed or a new code path
  forgets the wrap.

  ## Fix shape

  Drain pending cleanup work â€” including the forwarder flush â€” at the
  test-suite level BEFORE `rmSync`. Two changes:

  1. **launcher.ts** â€” track the forwarder flush promise on the
     `AgentJob` (`job._forwarderFlush`) so callers can await it
     explicitly. `runCleanup` keeps the flush fire-and-forget for
     production cleanup latency, but the promise is reachable.
  2. **dispatch/core.ts** â€” add `_drainPendingCleanupsForTesting()` that
     iterates `listActiveJobs()`, awaits each `j._cleanup?.()` (cached
     promise â€” cheap when already resolved), and awaits each
     `j._forwarderFlush` so any in-flight queue writes finish before
     the caller proceeds.
  3. **yaml-lifecycle-memory-tracker.test.ts** â€” call the drain helper
     in `afterEach` BEFORE `resetDispatchCore()` and BEFORE
     `rmSync(tempDir)`, and call it again in `afterAll` BEFORE
     `rmSync(testState.logsDir)`.
  4. **Regression test** â€” assert that calling the drain helper after a
     completed dispatch leaves no pending writes (no `ENOENT` warn line
     when the queue dir is removed immediately after).

  Reproduce: `npx vitest run` from repo root. The leak is masked today
  by the inner try/catch in `drainAndSend`, but timer activity from
  `scheduleFlush`'s setTimeout + retry backoff in `postEventsWithRetry`
  is observable as event-loop weight after the dispatch terminates.
