type: Feature
title: Auto-derive epic status from children in poller
description: |
  ## Context

  Today an Epic card's `status` is set manually by agents and humans. Children move through the lifecycle independently, and there is no automatic propagation back to the epic. Result: epics drift out of sync with their phase cards. A user looking at the epic sees stale status while the children tell a different story.

  ## Solution

  Make epic status a **computed read-only field** maintained by the poller. Every tick, after `bulkSyncMissingYamls` runs, walk every open YAML with non-empty `children[]` (epic OR non-epic parent) and recompute `status` from the union of child statuses using the priority rules below. If the derived status differs from the on-disk status, write the new status to the parent's YAML and let the existing tracker mirror push it on the next sync.

  Agents only update child card statuses going forward. Skills + docs must reflect that the epic's `status` field is no-longer-author-editable from the agent path; any agent edit is overwritten on the next poller tick.

  ## Priority rules

  Apply in order. First match wins:

  1. **Any child `Needs Help`** → parent `Needs Help`
  2. **Any child `In Progress`** → parent `In Progress`
  3. **Any child `ToDo`** → parent `ToDo`
  4. **All non-cancelled children `Review`** → parent `Review`
  5. **All non-cancelled children `Done`** → parent `Done`
  6. **All children `Cancelled`** → parent `Cancelled`

  Cancelled children are excluded from rules 4 and 5. Rule 6 fires only when the entire child set (no exceptions) is Cancelled. `Needs Approval` participates as a non-dispatchable status — treat the same as `Needs Help` for derivation? **Decision needed during implementation:** propose treating `Needs Approval` like `Needs Help` (non-dispatchable, blocks the parent) and document the choice in the commit. If the child has no listed status (defensive), skip it from derivation.

  Children may live in `open/` or `closed/`. The walker must read from both — closed children carry terminal statuses (Done / Cancelled).

  ## Manual override

  None. Derivation always wins. An operator setting an epic's status manually will see it overwritten on the next tick. Document this in the workflow skill so operators understand the contract.

  ## Dispatch behavior

  Cancelled epic does NOT block child dispatch. Children block children — an epic is only Cancelled when ALL children are Cancelled, so by definition no children are dispatchable at that point. No new filter needed in `listDispatchableYamls`.

  ## Implementation outline

  - New module `src/poller/epic-status.ts` exporting:
    - `deriveStatus(children: Issue[]): IssueStatus | null` — pure function applying the priority rules. Returns `null` when `children` is empty (caller should not call). 100% unit-testable.
    - `recomputeParentStatuses(repoLocalPath: string): { id: string; before: IssueStatus; after: IssueStatus }[]` — walks `<repo>/.danxbot/issues/open/*.yml`, finds every YAML with non-empty `children[]`, resolves each child via `findIssueById` (open + closed), calls `deriveStatus`, writes back to the parent YAML if the derived status differs. Returns the list of changed parents for log output.
  - Wire `recomputeParentStatuses(repo.localPath)` into `_poll` AFTER `bulkSyncMissingYamls` and BEFORE the dispatch decisions, so the same tick that hydrates a new child card propagates its status up.
  - The poller's existing tracker push (`syncIssue` on the parent's next reconcile) handles the outbound mirror — no extra tracker call needed.

  ## Skill / doc updates

  - `claude-plugins/issues/skills/issue-card-workflow/SKILL.md`: add a section "Epic status is computed, not edited" explaining that agents must only edit child statuses; epic status is derived from children every tick. Reference this card for the exact priority rules.
  - `claude-plugins/issue-worker/skills/danx-next/SKILL.md` + `danx-start/SKILL.md`: add a sentence noting that when finishing a phase card, the agent does NOT set the epic's status — the poller handles it. Saves agents from overwriting derivation.
  - Bump `issues@newms-plugins` plugin version (minor) so the skill change reaches consumers via the auto-update path that just landed.

  ## Key files

  - `src/poller/epic-status.ts` (new)
  - `src/poller/epic-status.test.ts` (new — unit tests for derive function)
  - `src/poller/index.ts` (wire `recomputeParentStatuses` into `_poll`)
  - `src/poller/yaml-lifecycle.ts` (may need a `findIssueById` helper that scans both `open/` + `closed/` if one doesn't already exist)
  - `~/web/claude-plugins/issues/skills/issue-card-workflow/SKILL.md`
  - `~/web/claude-plugins/issue-worker/skills/danx-next/SKILL.md`
  - `~/web/claude-plugins/issue-worker/skills/danx-start/SKILL.md`
  - `~/web/claude-plugins/issues/.claude-plugin/plugin.json` (version bump)

  ## How to verify

  - Unit tests for `deriveStatus` covering each priority rule + edge cases (all cancelled, mix of cancelled + done, empty after exclusion).
  - Integration test: scaffold a fake repo with an epic YAML referencing 3 child YAMLs, vary child statuses, run `recomputeParentStatuses`, assert the epic's on-disk status matches the expected derivation.
  - End-to-end: run the poller against a real repo, edit a child's status by hand, watch the epic update on the next tick.
  - Spot-check existing in-flight epics in `gpt-manager` + `danxbot` repos after first run — derived status should match what a human reader would expect from reading the children.
