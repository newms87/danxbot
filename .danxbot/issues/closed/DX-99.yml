type: Epic
title: Per-repo configurable issue ID prefix (DX / SG / FD) — replace hardcoded ISS-
description: |
  ## Problem

  Issue IDs are hardcoded `ISS-<N>` everywhere: filename stems, YAML `id` /
  `parent_id` / `children[]` / `blocked.by[]`, tracker title prefix
  (`#ISS-N: <title>`), regex validators, dashboard rendering, skill prose,
  agent rules. With multiple connected repos sharing one danxbot brain
  (danxbot, gpt-manager, platform), card IDs collide visually in logs,
  comments, and Slack — `DX-90` could mean anything.

  Per-repo prefix gives each repo its own ID namespace and makes every
  cross-reference unambiguous at a glance.

  | Repo | Prefix |
  |---|---|
  | danxbot | `DX` |
  | gpt-manager | `SG` |
  | platform | `FD` |

  Trello-side card titles are NOT updated by this epic — purely a local
  YAML + code + UI change. The next tick's outbound mirror will rewrite
  Trello titles to the new prefix as a side effect; that's fine.

  ## Goal

  1. `issue_prefix: <STR>` field on `<repo>/.danxbot/config/config.yml`
     — validated 2-4 uppercase letters, defaults to `ISS` if absent
     (legacy compat for one release, then required).
  2. Every code path that today hardcodes `ISS-` reads the prefix from
     `RepoContext` instead.
  3. One-shot migration renames every YAML file + rewrites every
     internal reference in danxbot's own repo (DX), gpt-manager (SG),
     and platform (FD).
  4. Dashboard Settings/Agents tab exposes an edit field for
     `issue_prefix` per repo; saving writes back to
     `<repo>/.danxbot/config/config.yml` and triggers the migration.
  5. Skills, rules, and docs use a `<PREFIX>-N` placeholder convention
     so workspace-static skill files don't have to be re-rendered per
     repo.

  ## Architecture

  ### Config + RepoContext

  - Add `issue_prefix: string` to `RepoContext` in `src/types.ts` /
    `src/repo-context.ts`. Validate `^[A-Z]{2,4}$` at load time; throw
    on bad shape; warn-once if missing → use `"ISS"` default.
  - `config.yml` schema bump in setup skill (`/setup`) so new repos are
    seeded with a prefix.

  ### ID generation + validation

  - `src/issue-tracker/yaml.ts`:
    - `ISSUE_ID_REGEX` becomes `buildIssueIdRegex(prefix: string)` →
      `/^${prefix}-\d+$/`. Every existing `ISSUE_ID_REGEX.test(...)`
      callsite takes the prefix from the validation context.
    - `parseIssue` / `validateIssue` accept the prefix (already plumbed
      via `parseOptions`?).
  - `src/issue-tracker/id-generator.ts`:
    - `nextIssueId(issuesRoot, prefix)` and `maxIssueNumber(issuesRoot, prefix)`
      take the prefix; regex inside `parseIssueNumber` is built from it.
  - `src/issue-tracker/trello.ts`:
    - `formatCardName({id, title})` and the title-parse regex
      (`/^#(ISS-\d+):\s*(.*)$/`) become prefix-aware. Inbound parser
      accepts ANY `^#([A-Z]{2,4}-\d+):\s*` so legacy `#ISS-N` titles
      keep parsing through the migration window.

  ### Migration

  One-shot script `scripts/migrate-issue-prefix.ts`:

  1. Read each connected repo's `config.yml` for the new `issue_prefix`.
  2. For every `<repo>/.danxbot/issues/{open,closed}/ISS-<N>.yml`:
     - `git mv` to `<PREFIX>-<N>.yml` (preserves history if repo is
       under git; `fs.rename` fallback otherwise).
     - Rewrite YAML fields: `id`, `parent_id`, `children[]`,
       `blocked.by[]` from `ISS-<N>` → `<PREFIX>-<N>`.
     - Rewrite free-text occurrences in `description`, `comments[].text`,
       `retro.commits[]` strings via boundary-aware
       `\bISS-(\d+)\b` → `<PREFIX>-$1`.
  3. Numbering is preserved per-repo (no renumbering — `DX-90`
     becomes `DX-90`).
  4. Idempotent: running twice is a no-op once files already match the
     prefix.

  ### Dashboard / Settings UI

  - Agents tab grows a "Issue prefix" field per repo (text input,
    `[A-Z]{2,4}` pattern, helper text "2-4 uppercase letters").
  - `PUT /api/agents/:repo/issue-prefix` writes the new prefix to
    `<repo>/.danxbot/config/config.yml` (the worker owns this file via
    a new writer path, since today `config.yml` is hand-edited).
    - Auth: same dashboard auth as the rest of `/api/agents/*`.
    - On success: trigger migration in-process (or queue a one-shot
      worker task that runs `migrate-issue-prefix.ts`).
  - SettingsFile (`<repo>/.danxbot/settings.json`) is **not** the home
    for `issue_prefix` — `config.yml` is the source of truth because
    the prefix is structural (filenames depend on it), not an
    operator runtime toggle.

  ### Skills / rules / docs

  - All workspace skills under
    `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-*/SKILL.md`
    and rules under `.../.claude/rules/danx-*.md` rewritten to use
    `<PREFIX>-N` placeholder convention. The poller's per-repo file
    renderer (`renderPerRepoFilesIntoWorkspaces`) substitutes the
    actual prefix into a single rendered `danx-issue-prefix.md` rule
    so skills can grep for the live value when needed; prose stays
    generic.
  - `.claude/rules/*.md` (host repo dev rules) rewritten to
    `<PREFIX>-N` similarly.

  ### Tests

  Every test that hardcodes `ISS-` (≈40 files in
  `src/__tests__/`, `src/issue-tracker/*.test.ts`,
  `src/poller/*.test.ts`) updated to either:

  - Pass an explicit `prefix` arg to the unit under test, OR
  - Use `ISS` as the default-fallback prefix where backwards-compat
    behavior is being asserted.

  Add new prefix-roundtrip tests for `id-generator`, `yaml`,
  `trello#parseExternalId`/`formatCardName`, and the migration script.

  ## Phase split

  Likely 4 phases:

  1. **Phase 1 — Schema + RepoContext + id-generator + yaml validator**
     prefix-awareness. No file renames yet. Defaults to `ISS`. All
     existing tests stay green by passing `"ISS"` through. Adds
     `issue_prefix` to config.yml schema + `RepoContext`.
  2. **Phase 2 — Tracker layer + dispatch / poller / dashboard reader
     callsites** updated to thread the prefix. Trello title parser
     accepts any `[A-Z]{2,4}-\d+`. Still no migration.
  3. **Phase 3 — Migration script + one-shot run** for danxbot (DX),
     gpt-manager (SG), platform (FD). Updates YAML filenames + contents
     + free-text refs. Verifies parse-roundtrip on every migrated card.
  4. **Phase 4 — Dashboard Settings UI** for editing prefix; final
     pass on skills / rules / docs to swap to `<PREFIX>-N` convention;
     remove `"ISS"` fallback (require `issue_prefix` in
     `config.yml`).

  ## Acceptance

  - All 4 phase cards reach Done.
  - `<repo>/.danxbot/config/config.yml` carries
    `issue_prefix: <DX|SG|FD>` for every connected repo; setup skill
    seeds it for new repos.
  - Every YAML file in danxbot, gpt-manager, and platform `.danxbot/issues/`
    is named with the new prefix and parses cleanly (matching `id` field).
  - Cross-references (`parent_id`, `children`, `blocked.by`,
    free-text body refs) are rewritten consistently inside each
    repo — running the poller does not regress any card.
  - Dashboard Issues tab renders the new IDs; Settings tab can edit
    the prefix end-to-end (read → edit → save → migration → reload).
  - `npx vitest run` and `cd dashboard && npx vitest run` pass.
  - `make test-system-poller` still green against a card prefixed
    with the test repo's prefix (use `pickupNamePrefix` to isolate).

  ## Out of scope

  - Trello-side card title rewrite as a deliberate batch operation —
    happens passively on the next outbound sync tick, no migration
    code talks to Trello.
  - Renumbering issues across the global ID space — each repo keeps
    its existing number; only the prefix changes.
  - Per-card prefix override (every card in a repo shares the repo's
    prefix; no escape hatch).
  - Multi-prefix history within a single repo — once migrated, the
    repo has exactly one prefix forever.
