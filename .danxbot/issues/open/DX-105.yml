title: "Fix: Normalize inject pipeline writers — single helper + auto-generated banner"
description: |-
  ## Context

  `src/poller/index.ts#syncRepoFiles` invokes 11 separate writer fns covering rules / skills / tools / workspaces / docs. Three prepend their own banner inline (`renderRepoConfigMarkdown`, `copyRepoConfigDocs`, `writeTrelloConfigRule`); the other 8 use bare `copyFileSync` and ship NO "auto-generated" banner. Result: agents (and humans) opening generated files like `<repo>/.danxbot/workspaces/<name>/.claude/skills/<skill>/SKILL.md` cannot tell they're regenerated and edit them in place — those edits are silently overwritten on the next poll tick. This trap was hit live by an agent editing both inject source AND workspaces copy after every change because the lack of banner left the source-of-truth direction ambiguous.

  ## Solution

  One canonical `writeInjectedFile(srcAbs, dstAbs, srcRelToRepoRoot)` helper in `src/poller/index.ts`:

  - Read source verbatim.
  - Prepend extension-aware banner naming the source path. `.md` → `<!-- AUTO-GENERATED by danxbot from <relPath>. Do NOT edit — overwritten on next poll. Edit the source. -->`. `.yml`/`.yaml`/`.sh`/`.py`/`.toml` → `# AUTO-GENERATED by danxbot from <relPath>. ...`. `.json`/`.jsonc` → no comment syntax → skip banner (pass-through copy). Single offender today is workspace `.mcp.json`.
  - For `.sh`, banner goes AFTER the shebang line if present (else shell breaks).
  - Write destination via `writeIfChanged` (idempotence — no inode bump on no-op).

  All 10 sync writers (everything except the one-time seed) funnel through this helper. Inline banner code in `renderRepoConfigMarkdown` and `copyRepoConfigDocs` is removed (helper owns it).

  `copyFeaturesOnce` becomes `copyFeatures` — runs every tick, drop the `existsSync(dest)` bail. Operator-authored content lives in the source `<repo>/.danxbot/features.md`, not in the generated copy. Restores the DRY contract: source-of-truth = source, generated = derivable.

  ## Phases

  1. **Helper + callsite refactor.** Add `writeInjectedFile`. Migrate all 10 sync writers. Strip inline banner code from 3 existing-banner writers. Make `copyFeaturesOnce` idempotent. Tests in `src/poller/index.test.ts` covering banner per extension, `.json` pass-through, `.sh` shebang preservation, idempotence (no double-prepend), source files unchanged after sync.
  2. **Pre-dispatch sync hook.** `dispatch()` in `src/dispatch/core.ts` calls `syncRepoFiles(repo)` before `spawnAgent`. Every dispatch path (poller, HTTP `/api/launch`, Slack) gets fresh workspace state at launch — guarantees correct file state even if poller hasn't ticked since the last source edit. Tests in `src/dispatch/core.test.ts`.

  ## Key Files

  - `src/poller/index.ts` — helper + all 10 writer callsites
  - `src/poller/index.test.ts` — banner + idempotence + per-extension coverage
  - `src/dispatch/core.ts` — Phase 2 pre-spawn sync hook
  - `src/dispatch/core.test.ts` — Phase 2 tests
  - `src/workspace/generate.ts` — re-use existing `writeIfChanged`; do not reimplement

  ## How to Verify

  1. Run poller once — every inject output (`.md`, `.yml`, `.sh`) starts with the banner naming its source path. `.mcp.json` unchanged (no banner).
  2. Edit a workspace file by hand, trigger a dispatch — agent's pre-spawn sync writes canonical content back, the manual edit is reverted.
  3. Trigger a non-poller dispatch (HTTP `/api/launch`) on a connected repo — workspace files refreshed before claude spawns even with the poller off.
  4. `npx vitest run src/poller src/dispatch` clean. `npx tsc --noEmit` clean.

  ## Gotchas

  - Workspace `.mcp.json` has no comment syntax — banner MUST skip JSON or the file becomes invalid.
  - `.sh` shebang must remain line 1 — banner inserted after shebang, not before.
  - `writeIfChanged` already enforces idempotence — re-use, don't reimplement.
  - `src/poller/index.test.ts` asserts repo-root cleanliness (zero writes outside `<repo>/.danxbot/workspace/.claude/`). Preserve that invariant.
  - Phase 2 sync runs on Slack dispatches too — `writeIfChanged` keeps it fast on no-op ticks.
