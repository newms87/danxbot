title: "[Danxbot] Agent isolation > Phase 5: Clean repo root + docs"
description: |-
  ## Context

  Part of the "Agent isolation" epic. Final phase — stop all danxbot writes to `<repo>/.claude/`, retarget the poller inject pipeline to `<repo>/.danxbot/workspace/.claude/`, clean up legacy files from previously-injected repo roots, and document the new architecture.

  What exists today (after Phases 1–4): `.danxbot/workspace/` is fully populated and dispatched agents use it. But `src/poller/inject/` still writes rules/subagents/skills into `<repo>/.claude/`. The repo root remains polluted with danxbot-owned files (`danx-*` prefixed rules, `danx-*` skills, etc.). Interactive CLI (#1) developers see both dev content AND stale danxbot content in their project scope.

  ## Solution

  1. Change the inject destination in `src/poller/inject/` from `<repo>/.claude/` to `<repo>/.danxbot/workspace/.claude/`. The inject list shrinks to a single authoritative location.
  2. Add a cleanup pass on poller startup that removes any `danx-*`-prefixed files from `<repo>/.claude/` (rules, skills, agents). Idempotent — re-runs safely.
  3. Update `.gitignore` in each connected repo to expect `.danxbot/workspace/` instead of the `danx-*` paths under `.claude/`. The poller's `.gitignore` sync step is the right hook.
  4. Rewrite `.claude/rules/agent-dispatch.md` to document the workspace model + dispatch profiles (replace the "inject destination" and "single-fork" sections as needed).
  5. Rewrite `.claude/rules/docker-runtime.md` to describe the new isolation contract (workspace = dispatched agent cwd; repo root = dev's interactive CLI).
  6. Update `.claude/rules/settings-file.md` to clarify settings.json is operator-toggle only; dispatched agent configuration lives in `.danxbot/workspace/.claude/settings.json`.
  7. Add new spec doc `docs/superpowers/specs/YYYY-MM-DD-agent-isolation.md` describing the full architecture, the three-dimensional isolation boundary (cwd, MCP, settings), and why direnv is the dev-side analog of `env_file`.

  ## Key Files

  - `src/poller/inject/*` — retarget destination
  - `src/poller/index.ts` — add cleanup pass
  - `.claude/rules/agent-dispatch.md`, `docker-runtime.md`, `settings-file.md` — rewrites
  - `docs/superpowers/specs/YYYY-MM-DD-agent-isolation.md` (new)
  - Tests

  ## How to Verify

  Start worker for a connected repo that previously had `danx-*` files in `<repo>/.claude/` — confirm cleanup removed them, and `.danxbot/workspace/.claude/` now has the injected set. Dispatched agents still complete end-to-end. Interactive `claude` at repo root (use case #1) shows zero `danx-*` rules / subagents / skills in `/doctor` and `/skills`. `make test` passes; `npx tsc --noEmit` clean.
