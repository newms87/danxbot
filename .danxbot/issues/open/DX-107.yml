title: "[Danxbot] Agent isolation > Phase 4: /api/launch per-request MCP + tools overrides"
description: |-
  ## Context

  Part of the "Agent isolation" epic. Depends on Phase 2 (profile registry exists). This phase extends `/api/launch` so external callers (gpt-manager, dashboard smoke tests, curl) can opt into non-default MCP servers and a broader tool allowlist per request.

  What exists today: `/api/launch` body = `{repo, task, api_token, ...}`. No knobs for MCP / tool allowlist. The `http-launch` profile from Phase 2 sets a minimal default (only `danxbot` MCP, only built-ins + `danxbot_complete`).

  ## Solution

  Extend the body schema to accept two optional fields:

  - `mcp: { trello?: boolean }` — flip `mcp.trello = true` to include the trello MCP server in this dispatch only. Unknown keys → 400.
  - `allowed_tools: string[]` — merged into the profile's default allowlist (union, deduped).

  Both validated strictly. Bearer-token auth is the existing gate — no change.

  Update `src/worker/dispatch.ts` `handleLaunch` to read these fields from the body into `DispatchInput.overrides`. Extend `DispatchInput` type. Update `src/dispatch/profiles.ts` merge helper (or add one) that applies overrides on top of the profile default. Update `src/dashboard/dispatch-proxy.ts` to forward the fields verbatim.

  Keep the proxy allowlist strict — only known fields forwarded, no open-ended passthrough.

  ## Key Files

  - `src/worker/dispatch.ts` — handleLaunch body parsing
  - `src/dispatch/core.ts` — accept overrides on DispatchInput
  - `src/dispatch/profiles.ts` — merge logic
  - `src/dashboard/dispatch-proxy.ts` — forward fields
  - TypeScript types on both sides
  - Tests: unit (merge logic), integration (curl roundtrip via dashboard proxy)

  ## How to Verify

  `curl -sS -X POST https://danxbot.sageus.ai/api/launch -H "Authorization: Bearer $TOKEN" -d '{"repo":"gpt-manager","task":"List Trello lists","mcp":{"trello":true},"allowed_tools":["mcp__trello__*"]}'` — dispatched agent's claude has trello MCP available and can call `mcp__trello__get_lists`. Same curl WITHOUT `mcp.trello` — dispatched agent lacks trello MCP (confirm via its attempt + failure). Bad bearer → 401 unchanged. Unknown mcp key (e.g. `mcp.foo=true`) → 400.
