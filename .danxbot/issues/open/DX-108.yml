title: "[Danxbot] Agent isolation > Phase 3: Spawn cwd switch to .danxbot/workspace/"
description: |-
  ## Context

  Part of the "Agent isolation" epic. Depends on Phase 1 (workspace dir exists) and Phase 2 (strict MCP + allowed-tools flags wired). This phase changes the spawn cwd so Claude Code's `.claude/` + `CLAUDE.md` discovery resolves to the danxbot workspace instead of the repo root.

  What exists today: `src/agent/launcher.ts` sets `agentCwd = join(getReposBase(), options.repoName)`. Claude Code discovery walks UP from that cwd — so it currently hits repo-root `.claude/`, repo-root `CLAUDE.md`, repo-root `.mcp.json`. The dispatched agent sees the developer's config.

  ## Solution

  Change `agentCwd` to `join(getReposBase(), options.repoName, '.danxbot', 'workspace')` — the workspace dir generated in Phase 1. Walk-up from there terminates at `.danxbot/workspace/.claude/` and `.danxbot/workspace/CLAUDE.md`; the repo-root `.claude/` is never discovered.

  To preserve file-access capability (the agent still needs to read and edit source files), pass `--add-dir <repo>` so the agent has explicit access to the parent tree. This grants read/write but doesn't count as "project scope" for config discovery.

  Also pass `--settings <workspace>/.claude/settings.json` explicitly — belt-and-suspenders on top of cwd-based discovery, so the settings file is unambiguous.

  Both runtime modes must use the new cwd and flags:
  - **Docker runtime:** `spawn("claude", args, {cwd: workspace})` in `launcher.ts`.
  - **Host runtime:** the bash script in `src/terminal.ts` must `cd <workspace>` before exec'ing claude (or the script builder sets cwd via the `wt.exe` wrapper).

  ## Key Files

  - `src/agent/launcher.ts` — agentCwd calculation, flag builder
  - `src/terminal.ts` — buildDispatchScript cd path
  - `src/dispatch/core.ts` — if it passes cwd
  - Tests

  ## How to Verify

  Dispatch an agent that prints `pwd` via the Bash tool — confirm `.danxbot/workspace/`. Have the agent read `src/config.ts` — confirm `--add-dir` granted access. Place a rule file at `<repo>/.claude/rules/dev-only.md` that does NOT exist in workspace; dispatch agent reads `.claude/rules/` — confirm `dev-only.md` is NOT visible. Confirm `.danxbot/workspace/.claude/settings.json` values (permissions, hooks) are honored.
