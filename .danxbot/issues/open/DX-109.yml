title: "[Danxbot] Agent isolation > Phase 2: Dispatch profiles + strict MCP + allowed-tools"
description: |-
  ## Context

  Part of the "Agent isolation" epic. See the epic card for the full architecture. Depends on Phase 1 only for the workspace `.mcp.json` existing â€” this phase is primarily a spawn-flag refactor and doesn't require Phase 3's cwd change.

  What exists today: `src/dispatch/resolve-tools.ts` (or equivalent) produces a per-dispatch settings.json with `mcpServers`. The poller passes a hardcoded `POLLER_ALLOW_TOOLS` constant from `src/poller/constants.ts`. `/api/launch` uses its own flow. `--strict-mcp-config` is NOT currently passed, so claude merges project + user scope with the per-dispatch file, leaking repo-root MCP servers into dispatched agents.

  ## Solution

  Introduce a `DispatchProfile` concept that names the MCP servers and allowed tools for a dispatch. Two built-in profiles: `poller` and `http-launch`.

  1. Create `src/dispatch/profiles.ts` exporting `DispatchProfile` type + two constants `POLLER_PROFILE` and `HTTP_LAUNCH_PROFILE`.
  2. Refactor `resolveDispatchTools` to take a profile name + optional overrides, return `{mcpServers, allowedTools}`.
  3. Add `--strict-mcp-config` to the claude flag array in `buildClaudeInvocation` unconditionally for dispatched agents.
  4. Always pass `--allowed-tools` derived from the profile's allowedTools list.

  The `danxbot` MCP server (provides `danxbot_complete`) is always in every profile â€” it's infrastructure.

  - **Poller profile:** servers = `trello` + `danxbot`, allowedTools = `POLLER_ALLOW_TOOLS` (existing constant).
  - **HTTP-launch profile:** servers = `danxbot`, allowedTools = built-ins + `mcp__danxbot__danxbot_complete`.

  Per-request overrides (Phase 4) will extend/override profile defaults.

  ## Key Files

  - `src/dispatch/profiles.ts` (new)
  - `src/dispatch/resolve-tools.ts` â€” refactor
  - `src/dispatch/core.ts` â€” accept profile name on DispatchInput
  - `src/agent/launcher.ts` â€” flag builder adds `--strict-mcp-config` + `--allowed-tools`
  - `src/poller/index.ts` â€” pass `"poller"` profile
  - `src/worker/dispatch.ts` â€” /api/launch passes `"http-launch"` profile
  - `src/poller/constants.ts` â€” existing POLLER_ALLOW_TOOLS
  - Tests

  ## How to Verify

  Run a poller dispatch â€” confirm the claude process flag array contains `--strict-mcp-config` and `--allowed-tools <POLLER_ALLOW_TOOLS joined>`. Run an HTTP dispatch â€” same flags with http-launch allowlist. Rename the trello server key in `<repo>/.mcp.json` and confirm poller dispatch still has it (proves project-scope no longer leaks).
