title: "[Danxbot] Agent isolation > Phase 1: Workspace dir + boot-time config generation"
description: |-
  ## Context

  Part of the "Agent isolation" epic. See the epic card for the full architecture. This phase lays the foundation: create a `.danxbot/workspace/` directory per connected repo, owned entirely by danxbot, and generate its contents at worker boot. No spawn changes yet — that's Phase 3. No profile logic yet — that's Phase 2.

  What exists today: `.danxbot/settings.json` is generated at worker boot by `syncSettingsFileOnBoot` in `src/settings-file.ts`. Workers read `<repo>/.danxbot/.env` via `env_file` and have all `DANX_*` vars in process env. The poller injects rules/subagents/skills into `<repo>/.claude/` via `src/poller/inject/`.

  ## Solution

  Extend boot-time sync to also build `.danxbot/workspace/`. Write three files:

  1. `.danxbot/workspace/.mcp.json` — danxbot-owned MCP server declarations with `${DANX_TRELLO_API_KEY}`, `${DANX_TRELLO_API_TOKEN}`, and the board ID from `.danxbot/config/trello.yml`. Commands match prod (`npx -y @thehammer/mcp-server-trello`).
  2. `.danxbot/workspace/.claude/settings.json` — danxbot-owned permissions, hooks list, subagent refs.
  3. `.danxbot/workspace/CLAUDE.md` — danxbot-specific system prompt derived from `.danxbot/config/overview.md` + `workflow.md` + `tools.md`.

  Boot is the authoritative build step — files overwrite on every worker start. Content derives from `.danxbot/config/` + `RepoContext`. No operator-toggle content (`overrides.*`) lives in these files — those stay in `<repo>/.danxbot/settings.json`.

  The poller's inject pipeline is unchanged in this phase — it still writes to `<repo>/.claude/`. The switch to workspace happens in Phase 5.

  Add `.danxbot/workspace/` to the connected repo's `.gitignore` (the poller's `.danxbot/.gitignore` sync step is the right place, or add a `.danxbot/.gitignore` manually for now).

  ## Key Files

  - `src/settings-file.ts` — extend `syncSettingsFileOnBoot`
  - `src/worker/boot.ts` (or wherever boot is wired)
  - `src/poller/inject/` — read-only in this phase
  - Tests under `src/__tests__/`

  ## How to Verify

  Start a worker for any connected repo. Observe `.danxbot/workspace/` exists with the expected files. Delete it, restart worker, verify regenerated identically. Confirm `<repo>/.claude/` is untouched by this phase. `make test` and `npx tsc --noEmit` green.
