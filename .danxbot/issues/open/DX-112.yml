title: "Dispatch viewer > Phase 5: Dashboard UI — list view"
description: |-
  Part of epic #83 — `[Danxbot > Dashboard] Dispatch tracking + session history viewer` (https://trello.com/c/DAdy3itc). Depends on Phase 4 (API routes must exist).

  ## Context

  Phase 1 gutted the dashboard UI (deleted `MessagesTable`, `AnalyticsCards`, etc.). The backend now has `/api/dispatches` working from Phase 4. This phase builds the list view at `/history` — the primary landing tab of the dashboard.

  The mockup we're matching is at `.superpowers/brainstorm/53132-1776448847/content/dispatch-viewer-v3.html` (View 1). Match it visually — dark theme, Tailwind CSS 4, existing Vue 3 SFC patterns in `dashboard/src/components/`.

  ## Solution

  ### `dashboard/src/composables/useDispatches.ts`

  State management. Exports a composable returning `{ dispatches, filters, loading, error, setFilter, refresh }`. Debounces search input. Fetches from `/api/dispatches` on filter change. Sortable locally (in-memory) since cap is 500.

  Types (imported from `src/types.ts` re-exports): `Dispatch`, `TriggerType`, `DispatchStatus`.

  ### Components

  - `dashboard/src/components/DispatchList.vue` — the table. Columns exactly per mockup: Started (stacked date/time), Trigger, Repo, Summary (grey context line above bold summary), Status, Duration, Tools, Sub-ag (pink pill), Tok total, Tok in, Tok out. Click row → navigate to `/history/:id`.
  - `dashboard/src/components/DispatchFilters.vue` — the filter pill bar. All trigger / repo / status pills, last-24h pill, search input on the right.
  - `dashboard/src/components/TriggerBadge.vue` — reusable. Color per trigger (slack purple `#e9d5ff` bg `rgba(74,21,75,0.3)`, trello blue `#bfdbfe` bg `rgba(7,71,166,0.3)`, api green `#a7f3d0` bg `rgba(6,95,70,0.3)`). Sizes: `sm` (table), `md` (detail header).
  - `dashboard/src/components/StatusBadge.vue` — reusable. Running amber, completed green, failed red, cancelled grey. Pill shape.

  ### Routing

  `dashboard/src/App.vue` — wire `/history` to `DispatchList`. Make it the default tab. Use the existing tab component pattern (look at how tabs are wired pre-gutting — if removed, use a minimal router or simple v-if on a route ref).

  ### Formatting helpers

  - Duration formatter: `< 60s → "47s"`, `< 3600s → "4m 12s"`, else `"1h 32m"`. Put in `dashboard/src/utils/format.ts`.
  - Timestamp formatter: `YYYY-MM-DD` / `HH:mm:ss` split for the stacked date/time cell.
  - Tabular numeric right-alignment for all number columns.

  ### Summary context line per trigger

  The grey context line above the summary:
  - slack: `@userName in #channelName: "truncated messageText"`
  - trello: `Card: cardName`
  - api: `endpoint — caller or first line of initialPrompt`

  Compute this client-side from `trigger_metadata` (already on the row from list API). If list API trimmed it in Phase 4, extend the list API to return a small `contextLine` pre-computed server-side.

  ## Key Files

  **Create:**
  - `dashboard/src/composables/useDispatches.ts`
  - `dashboard/src/components/DispatchList.vue`
  - `dashboard/src/components/DispatchFilters.vue`
  - `dashboard/src/components/TriggerBadge.vue`
  - `dashboard/src/components/StatusBadge.vue`
  - `dashboard/src/utils/format.ts`

  **Modify:**
  - `dashboard/src/App.vue` — wire the History tab as default, mount `DispatchList`.
  - `dashboard/src/api.ts` — add `listDispatches(filters)` wrapper.
  - `dashboard/src/types.ts` — re-export Dispatch types from backend.
  - (Phase 4 server) If `trigger_metadata` is trimmed from list response, add `context_line` field. Otherwise compute client-side.

  ## How to verify

  - Vite dev (`npm run dashboard:dev` on port 5173) shows the list at `/history` matching the mockup pixel-by-pixel enough (stacked date/time, pill shapes, column order, alignment).
  - Clicking a row navigates to `/history/:id` (Phase 6 will render the detail; placeholder OK here).
  - Filter pills toggle — changing a filter triggers a refetch with the correct query params (verify in Network tab).
  - Search box is debounced (~250ms) — no request per keystroke.
  - Component tests: mount `DispatchList` with fake data, assert columns render, sort toggles work, filter pill clicks emit events.
  - No Vue warnings in the test console (per `.claude/rules/testing.md`).

  ## Gotchas

  - Tailwind CSS 4 uses the new `@theme` directive pattern — match the existing setup in `dashboard/src/style.css`.
  - Date formatting: use `Intl.DateTimeFormat` consistently; do not use ad-hoc `toLocaleString()` calls that vary by locale.
  - The sub-agent pill should render with the muted style when count is 0 — not hidden. Per mockup: grey bg, no bold. Visual consistency across rows.
  - Don't introduce `vue-router` if the existing App doesn't already use it — stay with the minimal route pattern that was there pre-gutting.
  - The list API caps at 500 rows. If `hasMore` comes back true, show a banner "Showing 500 most recent — add filters to narrow" at the bottom. No server-side pagination UI in this phase — keep it simple.
  - Match the existing dashboard's dark-mode toggle (`useTheme.ts`) if it still exists post-Phase-1. If deleted, skip dark mode toggle for this phase.

  ## Out of scope for this phase

  - Detail view (Phase 6).
  - SSE live-tail for list view (not needed — list is static until user refreshes or adds a live-updating composable later).
  - Server-side pagination UI.
