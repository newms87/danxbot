title: "Dispatch viewer > Phase 4: Dashboard API + retention cron"
description: |-
  Part of epic #83 — `[Danxbot > Dashboard] Dispatch tracking + session history viewer` (https://trello.com/c/DAdy3itc). Depends on Phases 2 (`dispatches` rows exist) and 3 (`jsonl-reader` works).

  ## Context

  By this phase the DB has dispatch rows and the JSONL reader parses sessions. The dashboard backend has no new API yet — the old `/api/events*` routes were deleted in Phase 1. This phase adds the four dispatch API routes plus the daily retention cron that keeps JSONLs bounded.

  Dashboard API lives in `src/dashboard/server.ts` (Node HTTP server, no Express — see existing routing pattern around line 44: `url.pathname === "/health"`, etc.). Add new branches alongside the existing ones. Reuse existing helpers for JSON response, query parsing, and SSE.

  ## Solution

  ### `GET /api/dispatches`

  Query params: `trigger` (slack|trello|api, repeatable), `repo` (repeatable), `status` (repeatable), `since` (unix ms lower bound on `started_at`), `q` (free-text substring match on `summary`). Returns JSON: `{ dispatches: Dispatch[] }` (no `trigger_metadata` in list response — trim payload; full row comes from detail route). Sort: most recent first. Cap at 500 rows per request (return `hasMore: true` if truncated).

  ### `GET /api/dispatches/:id`

  Returns `{ dispatch: Dispatch; entries: JsonlEntry[]; totals: JsonlTotals }`. Calls `jsonl-reader.readJsonl(dispatch.jsonl_path)`. If the JSONL file is missing (deleted or never attached), return the row with `entries: []` and a warning field `jsonlMissing: true` — do not 500. If the dispatch is still in a non-terminal state, totals are computed from what's currently readable.

  ### `GET /api/dispatches/:id/raw`

  Streams the raw JSONL file with `Content-Type: application/x-ndjson`. 404 if file missing. No transformation. Supports `Range` requests for partial downloads if trivial — skip otherwise.

  ### `GET /api/dispatches/:id/follow` (SSE)

  Uses `jsonl-reader.tailJsonl(path, fromOffset)`. Emits one `event: entry\ndata: <json>\n\n` per new JsonlEntry. Also emits `event: status\ndata: <json>\n\n` when the dispatch transitions (running → completed/failed/cancelled) — polls the dispatch row every 2s to detect. When status reaches a terminal state, emit a final `event: done` and close. Standard SSE keep-alives every 15s.

  ### Retention cron

  New file `src/dashboard/dispatches-retention.ts`. Exports `runRetentionSweep({ now = Date.now(), maxAgeMs = 30 * 86400 * 1000 })`. Behavior:
  1. Select dispatches with `started_at < now - maxAgeMs` AND `status IN ('completed', 'failed', 'cancelled')`. Non-terminal dispatches (`running`, `queued`) are preserved even if older.
  2. For each candidate, `fs.unlink(row.jsonl_path)` best-effort (catch ENOENT).
  3. `DELETE FROM dispatches WHERE id = ?`.
  4. Optional second sweep: list files in `~/.claude/projects/<encoded-cwd>/` matching `*.jsonl` with mtime older than `maxAgeMs` and not referenced by any surviving dispatch row. Delete those too.
  5. Return `{ deletedDispatches, deletedOrphans, errors }` for logging.

  Schedule: call `runRetentionSweep()` once at dashboard startup, then every 24h via `setInterval`. No external scheduler — dashboard uptime is sufficient.

  ## Key Files

  **Create:**
  - `src/dashboard/dispatches-retention.ts` (+ test)

  **Modify:**
  - `src/dashboard/server.ts` — add four routes. Follow existing dispatch pattern (no framework). Reuse existing SSE helper used by `/api/stream` (see line ~134).
  - Wherever `createDashboardServer` is invoked — schedule the retention cron at startup.

  ## How to verify

  - Unit tests for each route: happy path + edge cases (missing dispatch → 404, missing JSONL → 200 with `jsonlMissing`, invalid query param → 400).
  - Retention test: seed a 31-day-old completed dispatch + JSONL file + a 31-day-old RUNNING dispatch + JSONL file + a 15-day-old completed dispatch. Run sweep. Assert: completed 31d deleted (row + file), running 31d preserved, 15d preserved.
  - Orphan sweep test: drop a bogus `.jsonl` file in `~/.claude/projects/<cwd>/` with an mtime 31d old, not referenced by any dispatch. Run sweep. Assert deleted.
  - SSE follow integration test: seed an empty JSONL, open the follow endpoint, append 3 lines, assert 3 SSE entry events received, then mark the dispatch completed, assert `event: done` close.
  - Live run: start a dispatch, hit `/api/dispatches/:id/follow` with `curl -N` — watch events stream as the agent works.

  ## Gotchas

  - `src/dashboard/server.ts` uses Node's raw HTTP server — no Express magic. Look at the existing `/api/stream` handler for the SSE plumbing (headers, keep-alive, graceful close).
  - `tailJsonl` may yield rapidly at first (when opening a mostly-written file). Backpressure: if the client is slow (write buffer full), pause tailing.
  - Retention sweep running while a dispatch is being finalized is a race — be careful to re-read the row's status before deleting, not rely on the prior snapshot.
  - `~/.claude/projects/<encoded-cwd>/` resolution: the cwd encoding differs per runtime mode. Use the `jsonl_path` value from the row directly — don't re-encode. For the orphan sweep, read the directory containing any known JSONL path (derive from the dispatch table); if no dispatches exist, skip the orphan sweep (nothing to anchor).
  - The dashboard container bind-mount MUST include `~/.claude/projects/` so files are readable. Verify the docker-compose mount — if not mounted, the reader will see ENOENT for every path. Fix in compose if needed (this is repo-level infra; flag to user if you hit it).
  - Don't run retention every N minutes. Daily is enough. More frequent creates churn and race risk.

  ## Out of scope for this phase

  - UI that calls these routes (Phases 5-6).
  - Cross-repo aggregations or analytics endpoints.
  - Export/CSV.
