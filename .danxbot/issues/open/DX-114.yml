title: "Dispatch viewer > Phase 3: JSONL reader"
description: |-
  Part of epic #83 — `[Danxbot > Dashboard] Dispatch tracking + session history viewer` (https://trello.com/c/DAdy3itc). Depends on Phase 2 (needs dispatch row shape + stub to replace).

  ## Context

  Claude Code writes a full session JSONL per run at `~/.claude/projects/<encoded-cwd>/<session-uuid>.jsonl`. Each line is a JSON object capturing one event: assistant message, user message, tool_use, tool_result, thinking block, usage report, system message, or sub-agent (Task tool) invocation. Sub-agents have their OWN child JSONL in the same directory, referenced by UUID from the parent.

  We've been reinventing a parser (`src/agent/log-parser.ts` + `buildFullParsedLog`) to reconstruct this from stdout. All of that was deleted in Phase 1. This phase builds the one true reader that reads the JSONL directly.

  The reader is used in two places:
  1. `src/dashboard/dispatches.ts` — the stubbed `readTotalsFromJsonl(path)` becomes real. Feeds finalizer totals at `job.stop()`.
  2. The dashboard detail API (Phase 4) calls the reader to produce the timeline entries rendered by the UI (Phase 6).

  ## Solution

  ### `src/dashboard/jsonl-reader.ts` (+ tests)

  Exports:
  - `JsonlEntry` — discriminated union of normalized block types: `{ type: "user"; text; timestamp }` | `{ type: "assistant_text"; text; turnIndex; timestamp }` | `{ type: "thinking"; text; turnIndex; timestamp }` | `{ type: "tool_use"; name; input; toolUseId; turnIndex; timestamp }` | `{ type: "tool_result"; toolUseId; content; isError; timestamp }` | `{ type: "system"; text; timestamp }` | `{ type: "usage"; input; output; cacheRead; cacheWrite; turnIndex; timestamp }` | `{ type: "subagent"; name; taskDescription; entries: JsonlEntry[]; totals: JsonlTotals; timestamp }`.
  - `JsonlTotals` — `{ tokensTotal; tokensIn; tokensOut; cacheRead; cacheWrite; toolCallCount; subagentCount }`.
  - `readJsonl(path): { entries: JsonlEntry[]; totals: JsonlTotals }` — synchronous full read for completed dispatches.
  - `tailJsonl(path, fromOffset): AsyncIterable<JsonlEntry>` — streams new lines as they land. Used by the SSE follow route in Phase 4.
  - `readTotalsOnly(path): JsonlTotals` — cheap totals-only scan for the finalizer. Replaces Phase 2's stub.

  ### Sub-agent nesting

  When a parent JSONL line is a `tool_use` for `Task`, the reader MUST find and parse the child JSONL referenced by the Task invocation and emit a `subagent` entry containing the child's full entry list + its own totals. Sub-agent entries count toward the parent's `toolCallCount` as one call AND contribute to `subagentCount` as +1. Their tokens/tool counts roll up into parent totals (so `tokensTotal` includes sub-agent tokens).

  The reference from parent to child is in the child's first-line system metadata (child knows its parent's session UUID). Resolution strategy: scan the same `~/.claude/projects/<encoded-cwd>/` directory for any JSONL whose first entry references the parent's session UUID + tool_use_id. Cache the directory listing per call.

  ### Totals derivation

  Walk the entries:
  - `usage` entries contribute input/output/cache tokens.
  - `tool_use` entries contribute +1 to `toolCallCount`. `tool_use` with `name === "Task"` also contributes +1 to `subagentCount`.
  - `nudge_count` is NOT derived from the JSONL — it comes from `StallDetector` at runtime. Keep that wired via the existing path (don't duplicate into the reader).

  ### Fixtures

  Before writing tests, capture 2-3 real JSONL files from actual danxbot runs (one with sub-agents, one without, one that failed mid-run). Copy them into `src/dashboard/__fixtures__/jsonl/` and write tests against these real files. No synthetic JSONL fixtures — they'll drift from Claude Code's actual format.

  ## Key Files

  **Create:**
  - `src/dashboard/jsonl-reader.ts`
  - `src/dashboard/jsonl-reader.test.ts`
  - `src/dashboard/__fixtures__/jsonl/*.jsonl` (real captures, committed to the repo)

  **Modify:**
  - `src/dashboard/dispatches.ts` (or wherever Phase 2 placed the stub) — replace stubbed totals with `readTotalsOnly(path)`.

  ## How to verify

  - `npx vitest run src/dashboard/jsonl-reader` — all fixture-based tests pass.
  - A test that uses the multi-subagent fixture verifies the resulting `entries` tree nests correctly (parent → subagent → child entries).
  - A test verifies that `readTotalsOnly` returns the same totals as the full `readJsonl` (consistency).
  - `tailJsonl` test: seed a JSONL file, start tailing from offset, append new lines, assert the iterable yields them.
  - Live validation: run a real agent, open its JSONL path, run `readJsonl` — visually inspect the entry tree matches what the agent actually did.

  ## Gotchas

  - JSONL entries don't have a universal schema — Claude Code uses several shapes. The reader must be defensive: skip lines it doesn't recognize rather than throwing.
  - `input` for `tool_use` can be very large. Don't truncate in the reader — the UI decides what to show. Reader returns the full blob.
  - `tool_result` `content` can be a string OR an array of blocks (text, image). Normalize to the union type — don't flatten.
  - Sub-agent resolution must be deterministic: if multiple candidate child JSONLs reference the same parent tool_use_id (shouldn't happen but could), log a warning and pick the earliest by mtime. Never throw on ambiguity.
  - Fixture files may contain real session content (file paths, repo names). That's fine — they're test data from this repo. Just don't commit anything sensitive (review before `git add`).
  - Be careful with very large JSONLs (multi-MB). `readJsonl` loads all into memory — acceptable at current scales. If a dispatch JSONL exceeds 100MB, stream-parse instead. Log if you encounter one.
  - `tailJsonl` must handle the file being rotated/truncated by Claude Code (rare but possible). On size decrease, restart from offset 0 and replay — consumer is responsible for deduping.

  ## Out of scope for this phase

  - API routes (Phase 4).
  - UI rendering (Phase 6).
  - Retention cron (Phase 4).
