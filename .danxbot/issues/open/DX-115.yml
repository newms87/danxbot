title: "Dispatch viewer > Phase 2: Dispatch lifecycle + trigger wiring"
description: |-
  Part of epic #83 — `[Danxbot > Dashboard] Dispatch tracking + session history viewer` (https://trello.com/c/DAdy3itc). Depends on Phase 1 (`dispatches` table must exist, legacy events code must be gone).

  ## Context

  The `dispatches` table exists from Phase 1 but has no writer. `SessionLogWatcher` still resolves each run's Claude-Code JSONL via the dispatch tag (`<!-- danxbot-dispatch:<jobId> -->`) but nothing persists what it sees. This phase wires the dispatch lifecycle into `src/agent/launcher.ts` and threads trigger metadata from the three spawn sites (Slack, Trello, HTTP API).

  Per `.claude/rules/agent-dispatch.md`: one fork per dispatch, one JSONL, one watcher. This phase adds one dispatch row per spawn — created at `spawnAgent()`, updated when the watcher attaches, finalized at `job.stop()`.

  ## Solution

  ### `src/dashboard/dispatches.ts`
  TypeScript API over the table. Exports:
  - `Dispatch` type (row shape)
  - `TriggerType = "slack" | "trello" | "api"`
  - `DispatchStatus = "queued" | "running" | "completed" | "failed" | "cancelled"`
  - `DispatchTriggerMetadata` discriminated union: `{ trigger: "slack"; channelId; threadTs; messageTs; user; userName; messageText }` | `{ trigger: "trello"; cardId; cardName; cardUrl; listId; listName }` | `{ trigger: "api"; endpoint; callerIp; statusUrl; initialPrompt }`
  - `createDispatch(input)` — returns the created row. Called at spawn.
  - `attachSession(id, sessionUuid, jsonlPath)` — called from the watcher subscriber in `launcher.ts`.
  - `finalizeDispatch(id, { status, summary, error, totals })` — called from `job.stop()`.
  - Derivation of `tokens_total`, `tokens_in`, `tokens_out`, `cache_read`, `cache_write`, `tool_call_count`, `subagent_count`, `nudge_count` comes from Phase 3's `jsonl-reader.ts`. For Phase 2, stub the derivation as `readTotalsFromJsonl(path)` returning zeros — Phase 3 replaces the stub with the real implementation. Dispatch finalizer calls the stub today, the real derivation after Phase 3.

  ### `src/dashboard/dispatches-db.ts` (+ tests)
  Pure SQL layer. `insert`, `updateSession`, `finalize`, `getById`, `list(filters)`. TDD.

  ### `src/agent/launcher.ts` wiring
  - At top of `spawnAgent()`: resolve trigger metadata from caller, compute `danxbot_commit` via `execSync("git rev-parse HEAD", { cwd: danxbotRepoRoot })`, call `createDispatch({ id: jobId, repo_name, trigger, trigger_metadata, runtime_mode, danxbot_commit, started_at: Date.now(), status: "running" })`.
  - `SessionLogWatcher` already emits an "attached" event when it finds the JSONL. Subscribe: call `attachSession(jobId, sessionUuid, jsonlPath)`.
  - `job.stop(status, summary, error?)`: before killing, call `finalizeDispatch(jobId, { status, summary, error, totals: readTotalsFromJsonl(jsonlPath) })`.
  - Remove any remaining references to legacy `MessageEvent` / `createEvent` helpers if Phase 1 missed them.

  ### Trigger wiring at spawn sites
  - `src/slack/listener.ts`: when dispatching an agent, pass `{ trigger: "slack", channelId, threadTs, messageTs, user, userName, messageText }`. Router-only responses DO NOT call spawnAgent — no dispatch row is created for them.
  - `src/poller/index.ts`: when picking up a Trello card, pass `{ trigger: "trello", cardId, cardName, cardUrl, listId, listName }`.
  - `src/worker/dispatch.ts` (`/api/launch` handler): pass `{ trigger: "api", endpoint: "/api/launch", callerIp: req.socket.remoteAddress, statusUrl: body.statusUrl, initialPrompt: body.prompt }`.

  ### `src/types.ts`
  Export the new types created above. Ensure no legacy type remains.

  ## Key Files

  **Create:**
  - `src/dashboard/dispatches.ts`
  - `src/dashboard/dispatches-db.ts` (+ test)

  **Modify:**
  - `src/agent/launcher.ts` — lifecycle wiring (create → attach → finalize)
  - `src/slack/listener.ts` — pass slack trigger metadata
  - `src/poller/index.ts` — pass trello trigger metadata
  - `src/worker/dispatch.ts` — pass api trigger metadata
  - `src/types.ts` — export new types

  ## How to verify

  - `npx tsc --noEmit` clean
  - `npx vitest run` green
  - TDD: every new method in `dispatches-db.ts` has a unit test. The launcher wiring has an integration test that spawns a fake claude (reuse `src/__tests__/integration/helpers/fake-claude.ts`) and asserts a dispatch row is created, attached, and finalized correctly.
  - Live run: send a Slack message that triggers an agent — verify one dispatch row appears in the DB with `trigger="slack"` and slack metadata populated. Pick up a Trello card — verify a row with `trigger="trello"`. POST `/api/launch` — verify a row with `trigger="api"`.
  - `danxbot_commit` is the git SHA of the danxbot repo at spawn time (not the connected repo).

  ## Gotchas

  - Totals derivation is stubbed in Phase 2. Phase 3 replaces the stub. Do not block Phase 2 on implementing the reader — just leave the stub call and a TODO comment.
  - The dispatch tag in the prompt is critical — the watcher uses it to find the JSONL. Leave the tag-prepending logic alone.
  - `job.stop()` sets status BEFORE killing (per existing contract in `.claude/rules/agent-dispatch.md`). Call finalize BEFORE kill as well, so the DB shows terminal status even if the kill takes a moment.
  - Capturing `danxbot_commit` via `execSync` must be resilient to `.git` being absent in some test environments — wrap in try/catch and store `"unknown"` on failure.
  - Slack router-only messages are explicitly NOT dispatches. Do not create rows for them, even with `status: "completed"` and zero totals. They're out of scope for this system.

  ## Out of scope for this phase

  - JSONL parsing (Phase 3). Stub it.
  - API routes or dashboard UI (Phases 4-6).
  - Retention cron (Phase 4).
