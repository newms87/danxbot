title: "[Danxbot > Worker] Add unit tests for worker server HTTP endpoints"
description: |
  **Context:** `src/worker/server.ts` (230 lines) is the HTTP dispatch API for each connected repo handling POST /api/launch, GET /api/status/:id, POST /api/cancel/:id, and GET /health. Despite being a critical server entry point, it has zero test coverage. All other major modules (agent, poller, Slack listener, dashboard) have substantial test files. This gap means launch/cancel/status logic is only verified in production.

  **Solution:** Create `src/worker/server.test.ts` covering the four HTTP endpoints - happy paths and key error paths - using the existing test patterns (vitest, mocked imports for launchAgent/cancelJob/getJobStatus).

  **ICE Score:** 420 = 7 x 6 x 10 (I: 7 - the worker server handles all agent dispatch; a regression here would silently break connected repo integrations. C: 6 - test patterns are well-established but requires mocking the child-process-based launcher. E: 10 - isolated to one new file, under 300 lines.)
