type: Feature
title: "[Danxbot > Dashboard] Filter SSE stream by repo in multi-repo mode"
description: |
  **Context:** The dashboard's SSE endpoint (`/api/stream`) broadcasts every event to all connected clients regardless of repo. The `/api/events` REST endpoint already accepts a `?repo=` filter, and the Vue frontend uses this filter when a specific repo is selected. However the SSE stream ignores the repo filter entirely — so in multi-repo setups, a client viewing only the 'platform' repo still receives real-time events from all other repos, causing spurious UI updates and unnecessary data transfer.

  **Solution:** Accept an optional `?repo=` query parameter on `/api/stream`. When present, only broadcast events whose `repoName` matches. This requires per-client filter state: replace the current `Set<SSEClient>` with a `Map<SSEClient, string | undefined>` where the value is the repo filter.

  **ICE Score:** 480 = 8 x 8 x 7 (I: 8 — every multi-repo dashboard user is affected; spurious updates confuse the UI and waste bandwidth. C: 8 — the broadcast function is a single place and the pattern is identical to what /api/events already does. E: 7 — touches events.ts broadcast/addSSEClient/removeSSEClient and server.ts SSE handler, isolated to 2 files.)
