title: "[Danxbot > Poller] Route auto-generated error cards to Review list"
description: |-
  **Context:** `notifyError` in `src/errors/trello-notifier.ts` creates Trello cards in the `todoListId` by default. The ToDo list is processed by autonomous agents — so auto-generated bug cards (agent timeouts, router errors, handler crashes) get picked up as work items. Agents cannot fix these errors themselves; the cards just create noise and waste agent cycles.

  **Solution:** Change the default target list in `notifyError` to `reviewListId` so auto-generated error cards land in Review for human triage rather than ToDo for agent processing. Operational errors (billing/credit issues) are already sent to the Needs Help list via an explicit override — that path is unaffected.

  **ICE Score:** 567 = 7 × 9 × 9 (I: 7 — prevents agents from picking up unfixable error cards and wasting budget; keeps the workflow clean. C: 9 — single-line default change with very clear path. E: 9 — isolated to one file, under 5 lines changed.)
