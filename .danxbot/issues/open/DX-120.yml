title: "[Danxbot > Agent] Add log rotation and size cap to agent log directory"
description: |-
  **Context:** `agent.ts` writes a JSON file per agent session to `config.logsDir` (default: `./logs/` on host, `/danxbot/logs/` in Docker). There is no rotation, size cap, or periodic cleanup. A busy deployment running tens of agent sessions per day will steadily fill disk; over weeks this can cause process crashes when the disk fills.

  **Solution:** Add a periodic log cleanup that (1) deletes log files older than a configurable age (default: 7 days, matching `EVENTS_MAX_AGE_DAYS`), and (2) enforces a max file count (default: 500). The cleanup should run at startup and then on the same 6-hour interval as the existing event cleanup. Add a `AGENT_LOGS_MAX_AGE_DAYS` env var for the age threshold and `AGENT_LOGS_MAX_FILES` for the count cap. Expose a `startLogCleanup` / `stopLogCleanup` pair similar to `startEventCleanup`.

  **ICE Score:** 336 = 6 × 8 × 7 (I: 6 — prevents disk-full crashes in production; all deployments accumulate logs indefinitely today. C: 8 — proven pattern already used by `events-db.ts` and `threads-db.ts` cleanup. E: 7 — new `log-cleaner.ts` utility + hook into shutdown.ts, a few hours of work.)
