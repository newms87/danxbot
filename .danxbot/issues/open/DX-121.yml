title: "[Danxbot > Slack] Add per-user message rate limiting to prevent queue flooding"
description: |-
  **Context:** The Slack listener processes messages sequentially per thread using the message queue (`src/slack/message-queue.ts`). There is no per-user rate limit — a user can send messages rapidly and build up a large queue, causing extended API costs and lock-out of other users' responses. The existing queue also counts all threads independently, so a single user opening multiple threads can run several agents simultaneously.

  **Solution:** Add a per-user rate limiter in `message-queue.ts`: (1) track message counts per userId within a sliding window (e.g., 5 messages per 60 seconds), (2) if a user exceeds the limit, drop the message and post a friendly rate-limit notice to Slack instead of queuing it. Add `SLACK_RATE_LIMIT_MESSAGES` and `SLACK_RATE_LIMIT_WINDOW_MS` env vars with sensible defaults. The rate limiter should clean up expired windows automatically.

  **ICE Score:** 245 = 5 × 7 × 7 (I: 5 — prevents cost runaway and queue congestion from fast users; real risk in shared channels. C: 7 — message-queue.ts already has isolated state, adding a userId counter map is straightforward. E: 7 — isolated to message-queue.ts + one call site in listener.ts, ~2 hours.)
