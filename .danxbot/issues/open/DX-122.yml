title: "[Danxbot > Worker] Cap activeJobs map size to prevent unbounded memory growth"
description: |-
  **Context:** `src/worker/server.ts` tracks all dispatched jobs in an `activeJobs` Map. Completed jobs are cleaned up 1 hour after completion via a `setInterval`. However there is no cap on the map's size — in a long-running worker that receives many dispatch requests, completed-but-not-yet-cleaned jobs accumulate in memory. The 1-hour cleanup interval means up to 1 hour of jobs can be held before removal.

  **Solution:** Add a MAX_ACTIVE_JOBS constant (e.g., 1000) and trim the oldest completed jobs when the map exceeds this limit. Since completed jobs are only needed for status queries (which are typically checked immediately after launch), evicting old completed entries is safe. Alternatively, reduce the cleanup interval from 60 minutes to 5 minutes to limit the window of accumulation without needing an explicit cap.

  **ICE Score:** 243 = 3 × 9 × 9 (I: 3 — unlikely to cause issues in practice since job objects are small, but a correctness improvement for long-running workers. C: 9 — trivial map maintenance, completely contained. E: 9 — 10 lines of change in worker/server.ts.)
