title: "[Danxbot > Dashboard] Add pagination to /api/events endpoint"
description: |-
  **Context:** The dashboard's `/api/events` endpoint returns all in-memory events (up to 500) in a single JSON response. For busy deployments that hit the 500-event cap, this is a ~multi-MB payload on every page load or refresh. The Vue frontend renders the full list in the MessagesTable component without virtualization. For low-traffic deployments this is fine today, but it will degrade as usage grows.

  **Solution:** Add `offset` and `limit` query parameters to `/api/events` in `src/dashboard/server.ts` (e.g., `?offset=0&limit=50`). Default to returning all events when no params are provided (backwards compatible). Update the Vue frontend's `useEvents.ts` composable to fetch the first page on load and support load-more. The SSE stream continues to push full event objects for real-time updates (unchanged).

  **ICE Score:** 224 = 4 × 8 × 7 (I: 4 — meaningful for high-traffic deployments; for current usage the 500-event cap keeps payloads manageable but this is a growth concern. C: 8 — REST pagination is a well-understood pattern with clear implementation path. E: 7 — API change is trivial; Vue composable update takes ~2 hours.)
