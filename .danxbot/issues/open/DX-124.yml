title: "Fix: POLLER_ENABLED breaks two poller start() tests"
description: |
  **Problem:** Two tests in `poller/index.test.ts` fail after the POLLER_ENABLED flag was added to `config`. The test mock at the top of the file sets `mockConfig = { pollerIntervalMs: 60000, isHost: true }` without `pollerEnabled`. Because JavaScript object property access returns `undefined` for missing keys, `!config.pollerEnabled` evaluates to `true` and `start()` returns early — before touching the lock file. The two affected tests are "removes stale lock file at startup and proceeds normally" and "crashes if unlinkSync fails on stale lock file".

  **Root Cause:** The `POLLER_ENABLED` commit added `pollerEnabled` to the `config` object but did not update the `mockConfig` in `poller/index.test.ts` to include `pollerEnabled: true`.

  **Solution:** Add `pollerEnabled: true` to `mockConfig` in `src/poller/index.test.ts`. Also add a test case that verifies `start()` returns early and logs when `pollerEnabled: false`.

  **ICE Score:** 600 = 6 × 10 × 10 (I: 6 — CI will catch this and block merges; breaks test suite confidence. C: 10 — Root cause is trivially identified, fix is one field addition. E: 10 — Single file, single-line change.)
