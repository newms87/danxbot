title: "[Danxbot > Worker] Expose poller state in /health endpoint"
description: |
  **Context:** The worker server's `/health` endpoint (`src/worker/server.ts`) reports Slack connectivity, DB connectivity, queued message counts, and uptime. It does not report poller state — whether polling is enabled, whether a team is currently running, or when the last poll cycle ran. When debugging a stuck worker (no cards being processed), there is no observable signal from the health endpoint.

  **Solution:** Expose poller state in the `/health` response. Export a `getPollerHealth()` function from `src/poller/index.ts` that returns `{ enabled: boolean, teamRunning: boolean, lastPollAt: Date | null }`. Update `getHealthStatus()` in `server.ts` to call it and include the fields in the response. Update `allHealthy` to consider `pollerEnabled` — if polling is disabled, flag the status as `degraded` (unless intentional, which could be documented via a separate field).

  **ICE Score:** 320 = 5 × 8 × 8 (I: 5 — Valuable for debugging stuck workers in production; not user-facing but ops-critical. C: 8 — Clear pattern, same style as existing health fields. E: 8 — Small addition to two files with no cross-cutting concerns.)
