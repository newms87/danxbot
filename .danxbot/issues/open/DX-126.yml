title: "[Danxbot > Poller] Add REVIEW_MIN_CARDS to validateConfig numeric rules"
description: |
  **Context:** `validateConfig()` in `src/config.ts` validates all numeric env vars (maxTurns, maxBudgetUsd, timeoutMs, etc.) using a rules array. However, `TRELLO_REVIEW_MIN_CARDS` — parsed in `src/poller/constants.ts` — is not in this validation. If someone sets `TRELLO_REVIEW_MIN_CARDS=foo`, it silently becomes `NaN` and the `reviewCards.length >= REVIEW_MIN_CARDS` comparison always returns `false`, causing the ideator to spawn on every empty ToDo poll regardless of how many Review cards exist.

  **Solution:** Move `REVIEW_MIN_CARDS` parsing into `config.ts` so it can be added to the existing `validateConfig()` numeric rules. Export it from config. Update `constants.ts` to import it from config, or duplicate the validation there if moving is too disruptive. The rule should require value >= 1 (exclusive of 0).

  **ICE Score:** 270 = 3 × 9 × 10 (I: 3 — Low probability misconfiguration but would cause runaway ideator spawning. C: 9 — Proven pattern — same numeric rules array, same structure. E: 10 — One rule addition, single file change.)
