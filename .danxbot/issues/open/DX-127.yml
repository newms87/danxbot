title: "[Danxbot > Slack] Extract shared response finalization logic from listener.ts"
description: |
  **Context:** `src/slack/listener.ts` has two nearly-identical code paths for handling agent responses: the `very_low` fast path (lines ~281-408) and the full agent path (lines ~412-682). Both paths contain identical logic for SQL block counting, `processSqlInResponse()`, `markdownToSlackMrkdwn()`, `splitMessage()`, `chat.update()` for the first chunk, overflow chunk posting, `addMessageToThread()`, `uploadCsvAttachments()`, `swapReaction()`, `updateEvent()` for responseTs, and adding thumbsup/thumbsdown reactions. This is approximately 60-80 lines duplicated across both paths, with the only differences being heartbeat management and the placeholder color.

  **Solution:** Extract a `finalizeResponse()` helper function that takes the Slack client, channel/thread context, placeholder TS, response text, dashEvent, and optional attachments — and handles everything from SQL processing through reaction adding. Both the `very_low` path and the full path call this helper. This eliminates the duplication and makes future changes (e.g. adding new attachment types) a single-location edit.

  **ICE Score:** 160 = 5 × 8 × 4 (I: 5 — Reduces maintenance burden and future bug surface in a frequently-changed file. C: 8 — Clear refactor path with well-understood behavior. E: 4 — Requires careful extraction across ~300 lines in a high-complexity function; risk of subtle behavioral differences.)
