    text: |
      ## Needs Human Help

      This card requires manual Slack configuration that cannot be automated.

      **What needs to be done:**

      1. **Create or reuse a Slack app** for the danxbot repo. Options:
         - Create a new Slack app at https://api.slack.com/apps with Socket Mode enabled and a bot token scope (`chat:write`, `channels:history`, etc.)
         - Or reuse the existing platform Slack app and point it at a new `#danxbot` channel

      2. **Create a `#danxbot` Slack channel** (or pick an existing one) for danxbot self-messages

      3. **Fill in credentials** in `/home/newms/web/danxbot-flytebot/.danxbot/.env`:
         - `DANX_SLACK_BOT_TOKEN=xoxb-...`
         - `DANX_SLACK_APP_TOKEN=xapp-...`
         - `DANX_SLACK_CHANNEL_ID=C...`

      Once credentials are filled in, move this card back to ToDo so the agent can verify and restart the worker.

