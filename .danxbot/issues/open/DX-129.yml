title: "[Danxbot] Set up danxbot Slack channel"
description: |-
  ## Context

  The danxbot repo itself has no Slack integration — its .danxbot/.env has empty DANX_SLACK_* vars. Platform has Slack configured and working. This card sets up a Slack channel for the danxbot repo so agents working on danxbot code can be triggered and respond via Slack.

  ## Solution

  Either create a second Slack app for danxbot, or use the same bot with DANX_SLACK_CHANNEL_ID pointing to a different channel. Fill in DANX_SLACK_BOT_TOKEN, DANX_SLACK_APP_TOKEN, DANX_SLACK_CHANNEL_ID in danxbot-flytebot/.danxbot/.env.

  ## Key Files

  - /home/newms/web/danxbot-flytebot/.danxbot/.env — add DANX_SLACK_* vars
