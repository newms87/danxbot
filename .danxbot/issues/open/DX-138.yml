title: "[Dashboard] Card history — status + blocked transitions with actor + dispatch id, plus History tab"
description: |-
  ## Context

  Today the YAML schema records the **current** state of a card (status, blocked, dispatch) but loses every prior transition. When a card moves Review → ToDo → In Progress → Needs Help → ToDo → In Progress → Done, only the last state is on disk. Operators auditing "why did this card flip back and forth" or "who marked this Needs Help last week" have to grep worker logs (rotated, partial) or open Trello's audit trail (incomplete + Trello-only).

  Worse — there is no record of WHO did what. A status change can come from:

  - A dashboard operator clicking a toggle.
  - A dispatched agent's `danx_issue_save` call.
  - The poller's auto-derive (`epic-status.ts` — DX-98) computing parent status from children.
  - The worker's healer pass (Phase 3 of DX-130 — once shipped).
  - The setup skill seeding initial state.
  - Inbound Trello hydrate (`bulkSyncMissingYamls` adopting a tracker-born card).
  - A human editing the YAML directly on disk.

  All of those land as identical-looking writes. There is no audit trail and no actor identification.

  ## Solution

  Add an append-only `history[]` field to the `Issue` schema. Every mutation that changes `status`, `blocked`, or creates the card pushes an entry. Each entry identifies the actor with a structured prefix so the dashboard can render it usefully.

  ### Schema

  ```yaml
  history:
    - timestamp: 2026-05-08T03:14:22.500Z
      actor: dispatch:5b079a93-f937-4ada-8867-0b741ffcac09
      event: created
      to: ToDo
    - timestamp: 2026-05-08T03:20:11.812Z
      actor: dispatch:5b079a93-f937-4ada-8867-0b741ffcac09
      event: status_change
      from: ToDo
      to: In Progress
    - timestamp: 2026-05-08T03:42:01.144Z
      actor: worker:auto-derive
      event: status_change
      from: In Progress
      to: Done
      note: All children Done — derived per DX-98
    - timestamp: 2026-05-08T04:01:18.000Z
      actor: dashboard:dan
      event: blocked
      to: ToDo
      note: Blocked on DX-200
  ```

  Field rules:

  - `timestamp` — ISO 8601, server-side wall clock.
  - `actor` — required. Format: `<source>:<id>`. Sources defined below.
  - `event` — `created` | `status_change` | `blocked` | `unblocked`.
  - `from` / `to` — for `status_change`: previous + new status. For `blocked` / `unblocked`: the status the card holds (always `ToDo` per worker invariant). For `created`: only `to` is set.
  - `dispatch_id` — DEPRECATED before it ships; the dispatch id lives inside `actor` as `dispatch:<uuid>`. Don't duplicate.
  - `note` — optional human-readable. Use for derive reasons, healer reasons, blocker `by[]` summary on `blocked`, etc. Capped at 200 chars; longer → truncate + ellipsis.

  ### Actor sources (canonical list)

  | Source prefix | Examples | Set by |
  |---|---|---|
  | `dispatch:<uuid>` | `dispatch:5b079a93-...` | Worker `runSync` when the save originated from an agent dispatch |
  | `dashboard:<username>` | `dashboard:dan` | Dashboard write-paths (Agents tab today; future card-edit endpoints) |
  | `worker:<reason>` | `worker:auto-derive`, `worker:heal`, `worker:retry-queue`, `worker:reconcile` | Worker auto-mutations not tied to a single dispatch |
  | `tracker:<name>` | `tracker:trello` | Inbound hydrate / new-card adoption |
  | `setup` | `setup` | Install / setup skill seeding |
  | `unknown` | `unknown` | Last-resort fallback when an actor cannot be determined; emits a `system_errors` event so the gap is visible |

  Adding a new source prefix is a deliberate decision — extend this table in this file's history (recursion intended) and the rendering logic together. No silently-introduced prefixes.

  ### Append rules

  - `created` — exactly one entry per card. Pushed by `danx_issue_create` (worker route) and by `bulkSyncMissingYamls` (Trello inbound hydrate).
  - `status_change` — push when `status` changes between the loaded YAML and the saved YAML. Worker `runSync` compares before/after. Auto-derive (`epic-status.ts`) uses `worker:auto-derive`.
  - `blocked` — push when `blocked` transitions from `null` to a record. Actor = whoever made the save.
  - `unblocked` — push when `blocked` transitions from a record to `null`. Worker auto-clears on all blockers terminal → actor `worker:auto-derive` or `worker:heal` depending on path.
  - Append-only. Never edit existing entries. Never reorder. Truncate at 1000 entries (rolling window — drop oldest); 1000 transitions on a single card means the card is mis-scoped, not that history is wrong.
  - Migration: existing YAMLs ship with empty `history: []`. No retroactive synthesis.

  ### Worker integration points

  - `src/worker/issue-route.ts` — `runSync` (Phase 1 of DX-130 will have already moved persist before sync; history append happens INSIDE `persistAfterSync` since that's the canonical local-write step). Diff old/new issue, build entries, append before write.
  - `src/worker/issue-route.ts` — `handleIssueCreate` adds the `created` entry before the first `persistAfterSync`.
  - `src/poller/epic-status.ts` — when derive flips parent status, append `worker:auto-derive` entry.
  - `src/poller/index.ts` — `healLocalYamls` (Phase 3) appends `worker:heal` entry on every move.
  - `src/issue-tracker/trello.ts` (or wherever `bulkSyncMissingYamls` writes hydrated YAMLs) — `tracker:trello` `created` entry.
  - Dashboard write-paths that mutate status/blocked — pass actor `dashboard:<username>` from the auth-resolved user.

  ### Actor resolution at the worker route

  `runSync` already receives `dispatchId`. The actor is derived: if the request came from an agent dispatch (which is every `danx_issue_save` call), actor = `dispatch:${dispatchId}`. Dashboard-driven saves go through different routes (the existing Agents-tab toggle endpoint already authenticates via `DASHBOARD_PREFIX`); pass that prefix as the actor on those routes. No actor available → `unknown` + system_errors event.

  ### Dashboard surface

  New "History" tab in the card drawer (`dashboard/src/components/IssueDrawer.vue` or the equivalent — locate the existing tab strip with "Description" / "AC" / "Comments" / "Children"). Tab shows entries reverse-chronological with:

  - Relative timestamp (e.g. "2 minutes ago", "yesterday at 4:13 PM"; tooltip = full ISO).
  - Event icon + label (e.g. ⇄ for status_change, ⛔ for blocked, ✅ for unblocked, ＋ for created).
  - Actor pill: `dispatch:<short>` rendered as a clickable pill linking to the dispatches view; `dashboard:<user>` renders the username with an avatar; `worker:*` renders a robot icon + the reason; `tracker:trello` renders the Trello logo.
  - From → To diff for status_change.
  - Note line below if present.

  Empty history (legacy cards) → "No history recorded — card predates the history schema (or was created before this feature shipped)."

  ## Files

  - `src/issue-tracker/interface.ts` — extend `Issue` type with `history: HistoryEntry[]`
  - `src/issue-tracker/parse.ts` (or wherever YAML parse lives) — accept `history`; default to `[]`; validate each entry
  - `src/issue-tracker/serialize.ts` — round-trip `history` in YAML output (ordered after `comments`, before `retro`)
  - `src/worker/issue-route.ts` — diff old/new on `runSync`, append `created` on `handleIssueCreate`, push entries
  - `src/poller/epic-status.ts` — `worker:auto-derive` append on parent flip
  - `src/poller/index.ts` — `worker:heal` append in Phase 3 healer (when that lands; until then, this card adds a TODO comment in the right place)
  - `src/issue-tracker/trello.ts` — `tracker:trello` `created` append on hydrate
  - `dashboard/src/components/IssueDrawer.vue` (or actual tab-host) — new History tab
  - `dashboard/src/components/HistoryTab.vue` (new) — entry rendering
  - `src/issue-tracker/__tests__/history.test.ts` (or sibling) — round-trip + diff + actor format tests

  ## Test plan (TDD)

  1. YAML round-trip preserves `history[]` exactly (order + fields).
  2. Parse rejects an entry with missing `actor` or unknown `event`.
  3. `runSync` appends `status_change` when status differs; no append when status unchanged.
  4. `runSync` appends `blocked` when transitioning null → record; `unblocked` when record → null.
  5. `handleIssueCreate` appends exactly one `created` entry.
  6. `epic-status.ts` derive append uses actor `worker:auto-derive` and includes a `note` describing the rule that fired.
  7. History over 1000 entries → oldest dropped (rolling cap).
  8. Unknown actor scenario → `unknown` actor + `system_errors` event emitted.

  Frontend: per CLAUDE.md exemption, dashboard SFCs don't require tests. Type-check + manual smoke verify.

  ## Acceptance

  - `Issue.history` field exists, parses, serializes, round-trips through YAML.
  - All worker write-paths that mutate `status` / `blocked` push a history entry.
  - All worker auto-mutations (auto-derive, heal, retry-queue, reconcile mismatch) push a history entry with the right `worker:*` actor.
  - `created` entries are pushed by `danx_issue_create` AND inbound Trello hydrate.
  - Dashboard renders a History tab on every card with at least one entry; empty-state message for legacy cards.
  - 8 backend tests pass; tsc + vue-tsc clean; no existing tests regressed.
  - Manual smoke: create a card via the dashboard, dispatch it, watch it move ToDo → In Progress → Done, see all 3 entries appear in the History tab with correct actors.

  ## Out of scope

  - History on `description`, `ac[]`, `comments[]`, `retro` edits — only status + blocked + create. Comment + AC mutation history is a separate larger feature; punt.
  - Diffing the prior YAML at every other field for richer audit — out of scope for this card.
  - Backfilling history for existing closed cards — they ship empty.
  - Dashboard UI for filtering / searching history — list view only for v1.
  - Pushing history to the Trello tracker — Trello has its own audit trail; the YAML history is the canonical record and stays local.
