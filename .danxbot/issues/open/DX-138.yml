    text: |
      <!-- danxbot -->

      ## Phase 3 Handoff (DX-147 → DX-148)

      **Built:** Auto-mutation history appends. Commit `be94d96`. AC #5 + AC #6 of this epic now mechanically achievable. 32 new tests (epic-status +6, blocked-resolver +7, heal +7, yaml-lifecycle +2); full backend suite 3476/3476 green; tsc clean.

      ### Coverage of the four non-dispatch write paths

      | Path | Actor | Event | Note format |
      |---|---|---|---|
      | `recomputeParentStatuses` (epic-status auto-derive) | `worker:auto-derive` | `status_change` | Priority-rule string (e.g. `"All non-cancelled children Done — parent Done"`) |
      | `resolveBlockedCards` (auto-clear when all blockers terminal) | `worker:auto-derive` | `unblocked` | `"All blockers terminal: ISS-X, ISS-Y"` |
      | `healLocalYamls` inverse pass (closed/ → open/ on status drift) | `worker:heal` | `status_change` | `"Healer moved closed → open to match status"` |
      | `hydrateFromRemote` (Trello / MemoryTracker first hydrate) | `tracker:<name>` (dynamic) | `created` | `"Hydrated from tracker external_id <id>"` |

      The typical `open/` → `closed/` heal move emits NO history (no real status delta — janitorial filesystem fix). Per AC #3 of DX-147 ("no filesystem-noise entries").

      **Discoveries:**

      - `resolveBlockedCards` was inline in `src/poller/index.ts` and not exported. Extracted to `src/poller/blocked-resolver.ts` so the auto-clear path is testable without paying the env-validation tax of pulling `index.ts` into a unit test (per `.claude/rules/danx-repo-workflow.md` "Isolate Pure Helpers"). Phase 4 dashboard rendering should NOT need to touch this — read history entries via the standard YAML parse.
      - The hydrate idempotency guard `if (history.length === 0)` was unreachable in the current code (every tracker returns `history: []` from `getCard`; bulk-sync gates on `findByExternalId`). Removed per Rule 3 (no dead code). If a future card threads `remote.history` through trackers, the guard returns alongside that change.
      - `deriveStatus` refactored to return `{status, rule}` instead of `IssueStatus | null`. The `rule` string is what the dashboard's History tab renders as the `note` for an auto-derive entry — same string flows into the poller's per-flip log line at `src/poller/index.ts:721` for log-correlated debugging.
      - Heal's `closed/` → `open/` inverse pass needed a `from` value for the `status_change` entry. Implemented `inferPriorTerminalStatus`: walks history for the most recent terminal status, falls back to `"Done"` for legacy YAMLs (Phase 4 should surface this distinction in the History tab — either render the entry as inferred-from-history or inferred-from-default so a stale audit entry doesn't read as ground truth).
      - Mid-session, another agent committed DX-201 (commit `9828791`) which wired `injectDanxIssueMcp` into `_poll`. That helper uses `node:fs#renameSync`, but the integration test `src/__tests__/integration/poller-memory-tracker.test.ts` mocks `node:fs` without `renameSync`. Picked up the failure during the gap-fix-pass full-suite run; one-line fix added `renameSync: vi.fn()` to that mock.

      **Corrections:** None to the epic description or other phase cards.

      **Next-agent (DX-148 / Phase 4) context:**

      - Backend type: `IssueHistoryEntry` is the canonical shape (`src/issue-tracker/interface.ts`). Re-export to the dashboard via the existing `src/dashboard/issue-detail.ts` (or sibling) projection so the SPA reads the same type the worker writes.
      - Dashboard tab placement: the Issues drawer already renders a tab strip with Description / AC / Comments / Children. Add `History` AFTER `Comments` (so legacy users find it where the Trello audit-trail link sat). Empty-state rendering for legacy cards (every existing pre-Phase-1 YAML has `history: []`) — show "No history recorded — card predates the history schema" rather than a blank tab.
      - Actor-pill rendering: each `actor` is a `<source>:<id>` string per the canonical actor table on this epic's description. Render:
        - `dispatch:<uuid>` → short uuid pill, click opens dispatches tab filtered by job_id.
        - `dashboard:<username>` → username + avatar pill.
        - `worker:<reason>` → robot icon + reason (e.g. `worker:auto-derive` shows ⚙️ + "auto-derived").
        - `worker:heal` specifically — render note "Healer moved closed → open to match status" verbatim; the inferred-from-history vs default-`Done` distinction is in the prose only for now (see Discoveries — improve in a future card).
        - `tracker:<name>` → tracker logo + name.
        - `setup` / `unknown` → bare label.
      - Relative-time rendering: existing dashboard utilities (search `formatRelative` in `dashboard/src/utils/`) — reuse, don't reimplement.
      - From-To diff: status names render as colored chips matching the dashboard's existing status palette. Look at how `IssueDetail.vue` renders the current status pill and reuse the component.
      - Per CLAUDE.md exemption, dashboard SFCs do NOT require unit tests. `vue-tsc --noEmit` is still required.
      - Backend smoke for AC #11: a 4-tick poller run that walks Review → ToDo → In Progress → Done should produce a card with at least 4 history entries (created from hydrate, status_change ToDo→In Progress from dispatch, status_change In Progress→Done from dispatch, then auto-derive on the parent epic). The integration test `src/__tests__/integration/poller-memory-tracker.test.ts` is the right harness; extend it with a history-readback assertion.
