    text: |-
      <!-- danxbot -->

      ## Phase 1 Handoff (DX-145 → DX-146)

      **Built:** Schema-only landing of `Issue.history[]`. Commit `4476b6a`. AC #1 + AC #7 of this epic now mechanically achievable by the worker phases. 43 dedicated tests + 3343 backend tests pass; tsc clean.

      **Discoveries:**

      - Code reviewer caught two contract-drift findings during review — the JSDoc on `IssueHistoryEntry.actor` (and on optional `from`/`to`) promised enforcement that no code performed. Closed in this phase: `appendHistory` now throws `IssueHistoryAppendError` on malformed actor or missing per-event fields. `validateHistory` mirrors the per-event check on the parse path so a non-`appendHistory` writer can't sneak a malformed entry through.
      - The actor format is `^([^:]+:.+|setup|unknown)$` — matches `dispatch:<uuid>`, `dashboard:<user>`, `worker:<reason>`, `tracker:<name>`, plus bare `setup` and `unknown`. Anything else is a `IssueHistoryAppendError` at append-time.
      - Per-event field invariants now enforced at BOTH parse-time (`validateHistory` returns error string) and append-time (`appendHistory` throws). `status_change` requires both `from` + `to`; `created` / `blocked` require `to`; `unblocked` has no required transition fields.
      - `HISTORY_CAP = 1000` and `HISTORY_NOTE_CAP = 200` are exported from `src/issue-tracker/yaml.ts`. Phase 2 + 3 callers: import them, don't redefine.
      - Legacy YAMLs (no `history:` line) parse with `history: []` defaulted in. First post-Phase-1 save adds the line between `comments:` and `retro:` — one-shot diff per existing card. Documented in the legacy-migration test.

      **Corrections:** Updated the validator cap comment on `validateHistory` to note the strictness divergence from `validateTriageHistory` (the latter is lenient on missing strings; the former rejects).

      **Next-agent (DX-146 / Phase 2) context:**

      - `appendHistory(history, entry)` is the ONLY append entry point. It applies the rolling cap + note truncation + actor format + per-event invariants. Phase 2 callers in `src/worker/issue-route.ts` MUST use it — never push directly into `issue.history`.
      - The worker's `runSync` already runs INSIDE `chainOnIssueLock` AFTER `parseIssue` of the on-disk YAML. The "old" issue (pre-existing on-disk) and "new" issue (saved body) are both available before `forceBlockedToToDo` normalization. Per the description, take the diff AFTER normalization so a `blocked: {…}, status: Needs Help` save doesn't double-count.
      - Three diff rules (each independent — multiple events can append for one save):
        - `old.status !== new.status` → `status_change` with `from`/`to`.
        - `null → record` on blocked → `blocked` event with `to: new.status` (forced ToDo). `note` carries blocker `by[]` summary.
        - `record → null` on blocked → `unblocked`. Optional note.
      - For `handleIssueCreate`: append exactly ONE `created` entry AFTER `tracker.createCard` succeeds, BEFORE `writeFileSync(targetPath, serializeIssue(stamped))`. Use `actor: \`dispatch:${dispatchId}\``. Note: `_dispatchId` is currently underscore-prefixed (unused) — remove the underscore to thread it through.
      - Actor for `runSync` is `dispatch:${dispatchId}`. The worker route already receives `dispatchId` from the URL path.
      - Unknown-actor scenario (AC #8 of the epic): if no actor is resolvable, push with `actor: "unknown"` and emit a `system_errors` event (track at `src/dashboard/events.ts` — search for `recordSystemError`). The bare `unknown` actor is grandfathered through `appendHistory`'s format check.
