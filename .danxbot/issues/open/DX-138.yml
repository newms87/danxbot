      ## Epic Split

      Promoted from `Feature` to `Epic` and split into 4 serial phases. The work spans two domains (backend schema + worker write-paths + poller derive paths, then dashboard SPA) and ~700-1000 LOC, well past the single-card threshold.

      ### Phase plan

      | # | Phase | Scope |
      |---|-------|-------|
      | 1 | Schema | `IssueHistoryEntry` type, parse/serialize round-trip, validation, 1000-entry rolling cap. Lays the on-disk shape every other phase appends to. |
      | 2 | Worker write-paths | `runSync` diff old/new for status_change + blocked/unblocked, `handleIssueCreate` `created` entry, actor resolution `dispatch:<id>`, `unknown` fallback + `system_errors` event. |
      | 3 | Auto-mutation appends | `epic-status.ts` `worker:auto-derive` with note, `heal.ts` `worker:heal`, Trello hydrate (`bulkSyncMissingYamls`) `tracker:trello` `created`. |
      | 4 | Dashboard History tab | `HistoryTab.vue` + tab strip wiring in `IssueDetailView.vue`, actor pills, relative timestamps, from→to diff, empty-state for legacy cards. Backend type extension on `IssueDetail`. |

      ### Phase ordering

      Serial. P2 needs P1's schema. P3 also needs P1 (and the diff helpers from P2 for shape consistency). P4 needs P1 (data shape) plus populated entries from P2/P3. Each phase is `blocked.by` the previous one.

      ### AC mapping

      - P1: AC #1, #7
      - P2: AC #2, #3, #4, #8
      - P3: AC #5, #6
      - P4: AC #9, #10, #12 (dashboard) and #11 (final tsc + vue-tsc + test count gate)
