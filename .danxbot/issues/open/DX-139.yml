title: "[Danxbot] DB = dispatch registry — idempotent worker restart across every dispatch type"
description: |-
  ## Context

  Today the worker has TWO partial liveness paths:

  1. **DB-driven** (`src/worker/reconcile.ts`): reads `dispatches` rows on boot, marks dead PIDs `failed`. Updates rows ONLY — does not register live PIDs into `activeJobs`, does not attach `SessionLogWatcher`, does not run `StallDetector`, does not resume heartbeat. Reconciled-as-alive rows are functionally orphans from the worker's runtime perspective.
  2. **YAML-driven** (`src/poller/index.ts:235` reattach + `:894` `evictDeadDispatches`): reads `<repo>/.danxbot/issues/open/*.yml` for `dispatch{}` blocks, registers live PIDs into `activeDispatches`. ONLY works for poller-dispatched issue cards — Slack agents have no YAML, /api/launch dispatches that finish a save then linger have no YAML reference once the save clears `dispatch.id`.

  Plus: NO process-table scan. A `script -q -f` + claude pair whose DB row is terminal AND whose YAML reference was cleared is invisible. Today's DX-95 / DX-90 / DX-99 incident left 4 such orphans alive after the worker restarted, all consuming tokens with no monitoring, no completion routing, no stall detection.

  ## Solution — DB is the single dispatch registry

  Every dispatch in the system has exactly one `dispatches` row that is the source of truth for its lifecycle. The `host_pid` column reflects the actual OS process. Termination is recorded explicitly when the agent calls `danxbot_complete` OR when reconcile/health-checks confirm the PID is dead. Worker restart re-attaches the full monitoring stack (`activeJobs` + `SessionLogWatcher` + `StallDetector` + heartbeat + completion routing) for every non-terminal row whose PID is alive — regardless of whether the dispatch was poller-driven, /api/launch, Slack, or any future dispatch type.

  Three independent capabilities, three phases:

  - **Phase 1 (DX-140) — Atomic paired write of host_pid + YAML dispatch.pid at spawn.** Both stamped together or rollback. Reconcile + reattach see the same value. (Subsumes the original DX-130 Phase 7 / DX-137 scope, which was Cancelled in favor of this larger epic.)
  - **Phase 2 (DX-141) — Reconcile rewrite — DB-driven full-stack reattach.** Replace the current "update DB row only" reconcile with a pass that, for every non-terminal row whose PID is alive: registers in `activeJobs`, locates the JSONL via dispatch tag, attaches `SessionLogWatcher` from EOF, attaches `StallDetector`, resumes heartbeat. Works for ALL dispatch types — poller, /api/launch, Slack — because the DB row is the universal anchor.
  - **Phase 3 (DX-142) — Process-table orphan scan.** `pgrep` for the dispatch tag prefix → enumerate every live dispatch process on the host. Cross-reference with the DB. Process exists + no DB row + no YAML → orphan. SIGTERM + log + emit `system_errors` event (assumes DX-130 Phase 4's dashboard channel is shipped, otherwise log-only).

  ## Why DB-as-registry is the right invariant

  - **Dispatch-type-agnostic.** Slack reply agents, /api/launch, poller, future dispatch types — all funnel through `dispatch()` in `src/dispatch/core.ts` which already calls `insertDispatch`. DB row is universal; YAML is poller-only.
  - **Survives YAML mutation.** Terminal saves clear `dispatch{}`; auto-derive rewrites parent rows; healer moves files. None of those should kill liveness tracking.
  - **Cross-host correlation.** `dispatch.host` already exists. DB-as-registry means any worker on any host can introspect the dispatch fleet.
  - **Single completion contract.** `danxbot_complete` writes status terminal + completedAt. No other path may flip a row to terminal except (a) the agent itself, (b) reconcile confirming dead PID, (c) /api/cancel handler. Three sources, all recorded.

  ## Out of scope

  - Replacing host-mode `script -q -f` with a less-orphan-prone wrapper (separate epic — that touches the entire dispatch-spawn shape).
  - Cross-worker / cross-host coordination beyond the existing `dispatch.host` column.
  - DB schema migrations beyond a small `pid_terminated_at` column added in Phase 1.
  - Replacing in-memory `activeJobs` with a DB-backed structure — `activeJobs` is the runtime cache, DB is durable; keep both, ensure sync.
