title: "[DB registry > Phase 2] Reconcile rewrite — DB-driven full-stack reattach"
description: |-
  ## Context

  `src/worker/reconcile.ts:53-95` today scans `findNonTerminalDispatches(repoName)` and only updates DB rows. It does NOT:

  - Register alive PIDs into `activeJobs` (in-memory map). Result: `getJobStatus`, `cancelJob`, the `/api/jobs` route, the `/api/status/:id` route all return "no such job" for reconciled-as-alive dispatches.
  - Attach `SessionLogWatcher`. Result: no usage tracking, no event forwarding to Laravel, no terminal-output streaming to dashboard.
  - Attach `StallDetector`. Result: a stuck agent never gets nudged or killed across worker restarts.
  - Resume heartbeat. Result: external `statusUrl` callers see stale status.
  - Wire the `/api/stop/:id` callback URL. Result: `danxbot_complete` from the agent's MCP call may 404 the worker if the URL was tied to the prior worker's lifetime.

  The poller's YAML-driven reattach (`src/poller/index.ts:235`) DOES some of this for issue-card dispatches, but ONLY for dispatches that have an issue-card YAML. Slack reply agents and most /api/launch dispatches don't have a YAML.

  ## Solution — DB-driven full-stack reattach

  Replace the current `reconcileOrphanedDispatches` with `reattachOrResolveDispatches(repoName)` that:

  For every row in `findNonTerminalDispatches(repoName)`:

  1. **Probe liveness** — `isPidAlive(host_pid)`.
  2. **Dead PID** — set `pid_terminated_at = NOW`, `status = failed`, `summary = ORPHAN_SUMMARY`. (Same as today.)
  3. **Alive PID** — full reattach:
     - Locate the JSONL via `findSessionFileByDispatchId(dispatchId)` (already exists in `session-log-watcher.ts`).
     - Construct an `ActiveJob` placeholder with the existing pid + dispatchId + cards-it-was-working-on.
     - Insert into `activeJobs`.
     - Spawn a `SessionLogWatcher` from EOF (don't replay history; we only care about new entries).
     - Spawn a `StallDetector` with the watcher's event stream.
     - If the row has `statusUrl + apiToken`, spawn a `LaravelForwarder` + heartbeat tied to those.
     - Read the dispatch's per-dispatch MCP settings.json from the temp dir (the path is in the row OR a new column) so the worker knows the live `DANXBOT_STOP_URL` for callback routing — OR rewrite the per-dispatch MCP file with the new worker's URL on the spot.

  After reattach, the dispatch behaves as if the worker had spawned it directly — same monitoring, same completion routing, same cancel semantics.

  Boot flow becomes:

  1. `reattachOrResolveDispatches(repoName)` — one pass, dual-purpose
  2. Poller starts (its YAML reattach becomes redundant for issue-card dispatches but still runs as a safety net + drives `activeDispatches` map)

  ## Per-dispatch MCP settings rewrite

  Per-dispatch MCP settings file (`/tmp/danxbot-mcp-XXXX/settings.json`) embeds `DANXBOT_STOP_URL = http://localhost:<old_port>/api/stop/<id>`. If the worker restarts on the same port, the URL still works. If port changes, the URL is stale. Two options:

  - **Option A** — at reattach, rewrite the temp file with the current worker's port. (Filesystem mutation, may race with the running agent reading it. Low risk because the file is read once at MCP server startup and cached, but not zero.)
  - **Option B** — store `DANXBOT_STOP_URL` template in the DB row (`callback_url` column), and on reattach, write a NEW per-dispatch MCP file. This requires the agent's MCP server to refresh its config (not currently supported by the MCP protocol — would require a watcher there).

  Option A is the pragmatic ship-now path. Add a row column for the temp dir path so reattach can find it. If port matches the prior worker's port, no rewrite needed.

  ## Files

  - `src/worker/reconcile.ts` — replaced wholesale; or kept as a thin wrapper around new `reattach.ts`
  - `src/worker/reattach.ts` (new) — the new pass
  - `src/agent/launcher.ts` — extract `attachMonitoringStack` from `spawnAgent` so reattach can call the same helper
  - `src/dashboard/dispatches-db.ts` — add `mcp_settings_path` column (or similar) to find the per-dispatch MCP file
  - Tests across `src/worker/reattach.test.ts`, `src/agent/launcher.test.ts`

  ## Test plan (TDD)

  1. Worker restart with a non-terminal dispatch row + alive PID → after boot, `getJobStatus(dispatchId)` returns the active job, watcher is attached, stall-detector is running.
  2. Worker restart with a non-terminal row + dead PID → row marked failed + pid_terminated_at set.
  3. Reattach for a Slack-originated dispatch (no issue-card YAML) → activeJobs registered correctly.
  4. /api/launch dispatch reattach → statusUrl heartbeat resumes; external caller sees fresh status.
  5. JSONL-not-found case (rare — claude session was cleaned up) → reconcile marks row failed with a distinct summary "session log gone."
  6. Same-port worker restart → no MCP settings rewrite needed; agent's danxbot_complete reaches the new worker.
  7. Different-port restart (manual env override) → reattach rewrites the per-dispatch MCP settings file; agent's next danxbot_complete reaches the new worker.
  8. activeJobs entry created via reattach is cancellable via /api/cancel/:id (full lifecycle parity with normally-spawned jobs).

  ## Acceptance

  - Reconcile is replaced by reattach + resolve; alive PIDs are fully monitored after worker restart.
  - Dispatch-type agnostic — works for poller, /api/launch, and Slack dispatches.
  - 8 new tests pass; no existing tests regressed; tsc clean.
  - Manual smoke: kill worker mid-dispatch, restart, observe agent's next save lands; observe danxbot_complete routes correctly; observe stall-detector fires on a stuck agent.

  ## Out of scope

  - Process-table scan (Phase 3).
  - Cross-host reattach (a worker on host A reattaching a dispatch from host B).
  - Replacing the per-dispatch MCP settings file with a runtime-config endpoint.
