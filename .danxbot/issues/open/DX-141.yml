    text: |-
      <!-- danxbot -->

      ## Phase 2 Split — Three Sub-Phases

      Pickup found this card too large for a single dispatch (>500 LOC across 5+ files: schema migration, `launcher.ts` extract, new `reattach.ts`, boot wiring, 8 tests). Per the danx-next workflow's Step 3.1 split criteria, promoted DX-141 to an `Epic` with three sub-phase children. Each sub-phase is independently shippable and testable; together they deliver the original DX-141 ACs.

      ### Sub-phases

      | Phase | Card | Scope |
      |---|---|---|
      | 2a | `DX-207` | `mcp_settings_path` column + migration 016 + `insertDispatch` wiring. `dispatch()` populates the column with the resolved per-dispatch MCP settings path. No reader yet. |
      | 2b | `DX-208` | Extract `attachMonitoringStack` helper from `spawnAgent`. Pure refactor — watcher/usage/forwarder/heartbeat/cleanup/stop wiring becomes a callable seam. Behavior preserving (all existing tests pass). |
      | 2c | `DX-209` | `reattach.ts` — DB-driven full-stack reattach for alive PIDs. Reads non-terminal rows, builds shim `AgentHandle` wrapping the existing PID, calls Phase 2b's helper, registers in `activeJobs`, attaches `StallDetector`, rewrites `mcp_settings_path` if port changed. Replaces `reconcileOrphanedDispatches` in boot flow. |

      ### Ordering (waiting_on)

      - DX-207 — unblocked, dispatches first.
      - DX-208 — `waiting_on: [DX-207]`. The extract shares a contract with the column persistence; landing them together avoids two churns over the same files.
      - DX-209 — `waiting_on: [DX-208]`. Reattach consumes both prior phases. Once 207 + 208 are Done, the poller auto-clears DX-209's `waiting_on` and dispatches it.

      ### Original DX-141 ACs → sub-phase mapping

      | Original DX-141 AC | Owned by |
      |---|---|
      | reattachOrResolveDispatches replaces reconcile | DX-209 |
      | activeJobs + watcher + StallDetector + heartbeat reattached | DX-209 |
      | Slack + /api/launch reattach works (no YAML) | DX-209 |
      | MCP settings rewrite on port change | DX-209 (consumes DX-207's column) |
      | Reattached jobs cancellable + status-queryable | DX-209 |
      | 8 new tests pass + tsc clean | Total across DX-207 (4) + DX-208 (3) + DX-209 (8) ≥ 8 |
      | Manual smoke (kill-worker + restart) | DX-209 retro |

      Total test count across the three sub-phases comfortably exceeds the original 8-test bar; per-phase counts ensure each ships with its own coverage instead of a single mega-suite.

      ### Why not single-shot

      - Phase 2b is a load-bearing refactor of `spawnAgent` (~80 lines moved). Failure leaves every dispatch path broken. Shipping it isolated lets the Test Reviewer + Code Reviewer audit it without entanglement with new logic.
      - Phase 2a is a schema migration. Migrations should land alone so a failed `make deploy` rolls back cleanly.
      - Phase 2c's reattach logic is the only sub-phase introducing new behavior. Isolating it keeps the test failure surface focused.

      DX-141 itself stays In Progress until all three children are Done; the poller's epic-status derivation handles the propagation. DX-142 (Phase 3 — process-table orphan scan) remains blocked on DX-141 reaching Done, which now means all of DX-207 + DX-208 + DX-209.
