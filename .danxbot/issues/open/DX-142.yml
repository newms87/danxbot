title: "[DB registry > Phase 3] Process-table orphan scan — pgrep dispatch tags + reap untracked"
description: |-
  ## Context

  Phase 1 makes DB + YAML PIDs converge at spawn. Phase 2 makes worker boot reattach the full monitoring stack for every non-terminal DB row. Both passes assume the durable state (DB row OR YAML) still references the live PID.

  But the failure mode that bit us May 7 was: durable state was CLEARED (terminal save evicted the YAML's `dispatch{}`, prior reconcile marked the DB row failed) but the OS process was still alive — host-mode `script -q -f` reparents to PID 1 and survives every worker death. Result: 4 orphan dispatches running unmonitored after the worker restart, consuming tokens, racing each other on the same cards.

  Neither Phase 1 nor Phase 2 catches this — both look at known records and ask "is the recorded PID alive?" Neither asks "is there a live process I have no record of?"

  ## Solution — Process-table enumeration

  Every dispatched claude process carries a unique cmdline tag: `<!-- danxbot-dispatch:<uuid> -->`. The worker can `pgrep -af '<!-- danxbot-dispatch:'` to enumerate every dispatch process on the host. Cross-reference each PID's tag-extracted dispatchId against:

  - `findNonTerminalDispatches` (DB).
  - `activeDispatches` (in-memory poller map).

  Decision per process:

  | DB row | activeJobs | Process | Action |
  |---|---|---|---|
  | non-terminal, host_pid matches | yes | alive | healthy, leave alone |
  | non-terminal, host_pid mismatch | — | alive | log + emit `system_errors` (mismatch event); DO NOT auto-kill — Phase 1's atomic stamp should prevent this |
  | terminal | — | alive | ORPHAN — SIGTERM (graceful), wait 5s, SIGKILL if alive; emit `system_errors` |
  | no DB row at all | — | alive | ORPHAN — same kill path |
  | non-terminal, host_pid alive, but not in activeJobs | — | alive | reattach via Phase 2's helper (recovery from a missed boot reattach) |

  Pass cadence: run after `reattachOrResolveDispatches` at boot, then every poller tick at the same time as `healLocalYamls`. Single-pass, no concurrency control needed (read-only OS access).

  ## Other repos / cross-talk

  Multi-repo workers each run independent reconcile. The pgrep scan must filter by THIS worker's repo — extract `cwd` (or repo path embedded in the cmdline) and skip processes belonging to other repos. The `<!-- danxbot-dispatch:<uuid> -->` tag is shared across repos; the differentiator is the workspace path (`<repo>/.danxbot/workspaces/<name>/`).

  ## Kill safety

  Auto-kill is gated:
  - The cmdline must contain `<!-- danxbot-dispatch:` (not just any "claude" process).
  - The dispatchId must NOT correspond to any non-terminal row with this PID.
  - The cwd must belong to this worker's repo.
  - SIGTERM first, 5s wait, SIGKILL only if still alive (no immediate -9).
  - Every kill emits a `system_errors` event AND logs the full cmdline that was killed, so the operator can audit + roll back if the gate logic was wrong.

  ## Files

  - `src/worker/process-scan.ts` (new) — `enumerateDispatchProcesses`, `reapOrphans`
  - `src/worker/reattach.ts` — call `reapOrphans` at end of pass (Phase 2 dependency)
  - `src/poller/index.ts` — call `reapOrphans` at the same point in the tick as `healLocalYamls` (after boot)
  - `src/worker/process-scan.test.ts` (new)

  ## Test plan (TDD)

  1. `enumerateDispatchProcesses` returns a list of `{pid, dispatchId, repoPath}` for every alive process whose cmdline contains the tag prefix.
  2. Process with a non-terminal DB row + matching host_pid → no kill, no warning.
  3. Process with a non-terminal DB row + mismatching host_pid → no kill, system_errors event emitted (mismatch).
  4. Process with a terminal DB row → SIGTERM; if still alive after 5s, SIGKILL.
  5. Process with no DB row → SIGTERM + SIGKILL fallback.
  6. Process belonging to a different repo (cmdline cwd doesn't match) → skipped.
  7. Non-tagged claude processes (developer's own interactive `claude`) → skipped.
  8. Reap pass logs the full cmdline of every killed process and emits a system_errors event per kill.

  ## Acceptance

  - `pgrep`-based enumeration runs at boot + every poller tick.
  - Orphan processes (terminal/missing DB row, alive in OS) are reaped via SIGTERM → SIGKILL.
  - Repo isolation holds — dispatches from other repos are skipped.
  - Untagged processes are skipped.
  - 8 new tests pass; no existing tests regressed; tsc clean.
  - Manual smoke recreates the May-7 incident — kill worker, manually clear DB row, observe orphan, restart worker, observe pgrep scan reaps it.

  ## Out of scope

  - Killing dispatches across hosts (SSH-based fleet management is a separate epic).
  - Process trees beyond the tagged `script -q -f` parent (claude children die when the parent does).
  - Per-tick rate limiting on the scan (it's read-only + fast — premature optimization).
