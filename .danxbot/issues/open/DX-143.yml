title: Auto-provision missing Trello labels + lists at worker startup
description: |-
  ## Context

  Worker boot resolves Trello label / list ids by ID (from `<repo>/.danxbot/config/trello.yml`) or by name lookup against the live board. If a managed label / list is missing from BOTH the yml AND the board, the resolver throws — and `bulk-sync` swallows the throw as a `warn` log, then continues. Hydration silently skips affected cards on every poll tick.

  Real example (platform worker, 2026-05-08):

  ```
  [platform] bulk-sync: failed to hydrate 69f0e3560ac9924fe3e79d9a:
    Trello board has no Triaged label configured
  ```

  Cause: platform's Trello board never had a "Triaged" label created. Setup wizard collected only what existed at install time, so trello.yml has no `triaged:` entry, and the worker has no provisioning logic.

  This is the exact "silent fallback" pattern `base:fail-loudly` forbids — worker emits warn, hydration fails, poller skips the card, but the tick continues. Sync degrades indefinitely without operator awareness.

  ## Solution

  Auto-provision missing managed labels + lists at worker startup. Idempotent — runs every boot, only creates what's missing.

  ### Ordering note — interaction with DX-231

  `DX-231` retires the `Needs Approval` status and replaces it with the orthogonal `requires_human` field on every Issue. The managed label / list sets below reflect the **post-DX-231 world**. There are two ship orders:

  - **DX-231 lands first (preferred):** P1 (DX-232) drops `"Needs Approval"` from `IssueStatus`; P3 (DX-234) drops `lists.needs_approval` + `labels.needs_approval` from `trello.yml` and adds `labels.requires_human`. By the time DX-143 ships, the managed sets here are correct as written.
  - **DX-143 lands first:** implement against the post-DX-231 sets anyway (no `Needs Approval` list/label provisioning, do provision a `requires_human` label). DX-234 then becomes a no-op for the provisioning path — only the sync-layer `setLabels` work remains.

  Either way DX-143 must NOT provision a `Needs Approval` list or label.

  ### Managed sets

  Managed labels to ensure: `Bug`, `Feature`, `Epic`, `Needs Help`, `Blocked`, `Triaged`, `requires_human`. Color picks per existing convention (or omit `color` and let Trello assign). Orange suggested for `requires_human` to match the dashboard 👤 indicator.

  Managed lists to ensure: `Review`, `ToDo`, `In Progress`, `Needs Help`, `Done`, `Cancelled`, `Action Items`. Position = end of board.

  Flow at worker boot (in `repo-context.ts` or first poller tick):

  1. Fetch existing labels via `GET /1/boards/<id>/labels`.
  2. For each managed label name not present → `POST /1/labels?idBoard=<id>&name=<n>&color=<c>`. Cache returned id.
  3. Same for lists via `GET /1/boards/<id>/lists` + `POST /1/lists?idBoard=<id>&name=<n>&pos=bottom`.
  4. Persist resolved ids back into `<repo>/.danxbot/config/trello.yml` so subsequent boots short-circuit (no API calls when yml is fully populated).
  5. Trello API failures (network, 4xx) → log warn, continue boot. Trello is a SECONDARY concern — the worker operates without Trello sync. Do NOT halt. (Surface to dashboard error stream — that work is DX-144.)

  ## Files

  - `src/issue-tracker/trello.ts` — new `provisionMissingManagedConfig()` method on `TrelloTracker`. Called once at boot.
  - `src/repo-context.ts` — invoke provisioning during repo-context boot (or first poller tick — pick whichever has cleaner failure semantics).
  - `src/issue-tracker/trello.test.ts` — TDD: existing label present (no-op), missing label (POST + cache), API throws (log warn, no halt).
  - `.claude/skills/setup/SKILL.md` — strip the "operator must create label X on Trello board first, then paste id" steps from the wizard. Replace with: operator only supplies board id + API creds; worker auto-provisions every managed label / list on first boot. The wizard writes a minimal `trello.yml` with just `board_id:` (lists / labels left empty); first worker boot fills them in.
  - `.claude/rules/trello-config.md` — remove any "operator action required" footnotes on managed labels / lists. Replace with note that worker auto-provisions every missing managed label + list at boot. (Pre-DX-231 footnotes about `Needs Approval` are gone after DX-234 — if those land before this card, the footnote is already absent.)
  - `install.sh` — sanity check that any prompt asking the operator to manually create labels gets dropped.
  - Connected-repo `<repo>/.danxbot/config/trello.yml` — strip the `# operator action: create X label, paste id` comments. Worker fills these in on next boot.

  ## Out of scope

  - Worker error surface in dashboard (separate card DX-144).
  - Halt behavior on Trello failures (explicitly NOT done — fail-loud-in-logs only).
  - Trello board creation itself (operator still creates the board manually before first `make launch-worker`).

  ## Validation Plan — Use Platform as Acceptance Target

  Platform's Trello board (`6660bb18772702f88512e59d`) is intentionally being left in a degraded state for this card to validate against. Current state at time this card was filed:

  - `platform/.danxbot/config/trello.yml` has NO `triaged:` entry (and no `requires_human:` entry once DX-231 is in).
  - The Trello board itself has no `Triaged` label and (post-DX-231) no `requires_human` label.
  - Platform worker boot emits 4× warns per tick: `[platform] bulk-sync: failed to hydrate <card-id>: Trello board has no Triaged label configured`.

  Validation steps for the implementing agent (run AFTER all code ACs above are green):

  1. Confirm pre-condition: `cat platform/.danxbot/config/trello.yml` shows no `triaged:` line; Trello board has no `Triaged` label (operator screenshot or API GET `/1/boards/<id>/labels`).
  2. Restart the platform worker: `make launch-worker-host REPO=platform`.
  3. Inspect boot logs. Expect: explicit `provisioning Triaged label on board 6660bb18772702f88512e59d` (or equivalent) entries — one per missing managed label / list.
  4. `cat platform/.danxbot/config/trello.yml` again — file now has `triaged: <id>` + (post-DX-231) `requires_human: <id>` lines + any other previously-missing managed entries. Yml content otherwise preserved (no clobber of existing `bug` / `feature` / etc. ids). Critically: no `needs_approval:` line and no `Needs Approval` list — those are retired.
  5. Restart worker AGAIN: boot is silent on provisioning (idempotent). Zero `POST /1/labels` API calls — verify with a network trace OR a counter the implementation exposes.
  6. Confirm bulk-sync warns gone: poller tick logs show `[platform] bulk-sync: hydrated N cards` (or equivalent) with zero `failed to hydrate` warns.
  7. Confirm cards visible in YAML: `ls platform/.danxbot/issues/open/` shows hydrated cards (was empty before this fix landed).

  All seven steps green → ACs check off. If any step fails, that's a real blocker on the card — do not mark Done.

  Note: this validation is mechanical; do NOT perform it in production / deployed targets. Local platform worker is the validation harness.
