title: Surface worker errors in dashboard Agents tab
description: |-
  ## Context

  Worker code emits `log.warn` / `log.error` for non-halt failures (Trello API errors, hydration skips, label-config gaps, etc.). Without a halt-flag write, these errors are invisible to operators unless they tail container logs. Phase 4 of the agent-isolation epic referenced "dashboard surface" as the visibility plan but never landed.

  Real example precipitating this card: platform worker emitted `bulk-sync: failed to hydrate ... Trello board has no Triaged label configured` four times in a row at boot. Operator only saw it because they happened to be watching the make-launch-worker stdout. In a deployed worker the warns would have rotated out of `docker logs` within a day, and the operator would have no signal at all.

  Trello is a SECONDARY concern — the worker operates with or without Trello sync working. Halting the poller for a degraded sync is the wrong response. The right response is: continue operating, surface the degradation visibly so the operator decides when to fix.

  ## Solution

  Per-repo recent-errors panel on the dashboard's Agents tab. Backend captures every `log.warn` / `log.error` from worker code paths into an in-memory ring buffer (e.g. last 100 events per repo, oldest evicted), exposed via `/api/agents/<repo>/errors` JSON endpoint. SSE stream broadcasts new errors live so the panel updates without polling.

  Panel shape (Vue SFC):

  - Section in the Agents tab per-repo card: "Recent worker errors (N)".
  - Each row: timestamp, level (warn/error), component, one-line message.
  - Filter: level dropdown (all / errors-only / warns-only).
  - Click row → expand for full message + any structured fields.
  - Empty-state: "No errors in the last 24h." (rolling window).
  - Persistent across worker restarts? — NO, ring buffer is in-memory; restart resets. (If persistence is needed later, separate card.)

  Capture mechanism: extend the existing `log` helper (`src/log.ts`) to fan out warn/error entries to the dashboard event stream. Reuse `src/dashboard/events.ts` if it already supports per-repo channels; otherwise add a dedicated channel.

  ## Files

  - `src/log.ts` — fan out warn/error to event stream.
  - `src/dashboard/events.ts` (or new sibling) — error ring buffer, SSE channel.
  - `src/dashboard/server.ts` — `/api/agents/<repo>/errors` route + SSE wiring.
  - `dashboard/src/composables/useAgentErrors.ts` (new) — typed fetch + SSE.
  - `dashboard/src/components/AgentsTab/RecentErrorsPanel.vue` (new) — UI section.
  - Tests: backend unit (event-stream fan-out) + integration (SSE broadcast). Dashboard SFC tests OPTIONAL per CLAUDE.md UI exemption.

  ## Out of scope

  - Trello label/list auto-provisioning (separate card DX-143).
  - Persistent error storage / DB-backed history.
  - Email / Slack notifications on new errors (future enhancement).
  - Per-error dismissal / acknowledgement (future enhancement).
