title: "Issues DB Mirror > Phase 3: Chokidar watcher + writer + RFC 6902 history + boot scan + 10-min reconcile + read-your-writes"
description: |-
  ## Context

  Phase 3 of the Issues DB Mirror epic (DX-151). After Phase 1 (DX-152) and Phase 2 (DX-153) ship, Postgres is live and the `issues` + `issue_history` tables exist but nothing writes to them. This phase adds the engine that mirrors filesystem state into the DB.

  Full epic spec: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md`. Read sections "Architecture", "Write pipeline", and "Read-your-writes contract" before starting — those are the contracts this phase implements.

  Filesystem stays the source of truth. The DB is a derived projection; if wiped, a boot scan rebuilds it.

  ## Solution outline

  One new module: `src/db/issues-mirror.ts`. Exports a single function `startIssuesMirror(ctx: RepoContext): IssuesMirror`. The returned object has `stop()`, `awaitMirror(repoName, id, contentHash): Promise<void>`, and `simulateWatcherEvent(...)` (for tests).

  `startIssuesMirror` does five things:

  1. **Initial boot scan** of `<repo>/.danxbot/issues/{open,closed}/` — read every YAML, hash it, upsert any divergent rows, append `source: boot-scan` history rows. Tombstone any `issues` rows whose YAML no longer exists. Block until done so subsequent readers see a consistent DB.
  2. **Start the chokidar watcher** on `open/` AND `closed/` for that repo, with `awaitWriteFinish: { stabilityThreshold: 100, pollInterval: 50 }` and `ignoreInitial: true` (initial state covered by the boot scan).
  3. **Start the periodic reconcile timer** that re-walks `open/` only, every 10 minutes (configurable via env `DANXBOT_ISSUES_RECONCILE_INTERVAL_MS`, default 600000). Closed YAMLs are not periodically scanned — they rarely change, and chokidar covers runtime mutations.
  4. **Expose `awaitMirror(repoName, id, contentHash)`** — returns a `Promise<void>` that resolves once the watcher (or boot scan or reconcile) has upserted a row whose `content_hash` matches. Implemented as an in-process map of pending hashes to resolver callbacks; the upsert step resolves any matching pending entry. Used by `writeIssue()` for read-your-writes (see below).
  5. **Wire DB-write failure to the existing `CRITICAL_FAILURE` flag.** Any uncaught error from the upsert / history-insert transaction calls `writeFlag(ctx, { source: "issues-db-mirror", error, at })` (the helper from `src/critical-failure.ts`) and logs at `error` level. Mirror keeps running; the poller halts on its next tick because of the flag. Active dispatches finish naturally.

  ### Per-event flow (chokidar `add`/`change`)

  ```
  on file event (path):
    if ignoring (debounce window) → bail
    read file (handle ENOENT — the watcher races deletes)
    parseSimpleYaml → Issue object (on parse error: upsert with data = { _malformed: true, raw: <text> }, log warn)
    contentHash = sha256(canonicalize(data))
    select existing row from issues for (repoName, id)
    if existing.content_hash === contentHash → no-op (debounce already-seen state)
    patch = rfc6902.compare(existing?.data ?? {}, newData)  -- empty initial state for first-create
    BEGIN
      UPSERT issues SET data, content_hash, mirror_updated_at = now()
      INSERT issue_history (... patch, prev_hash = existing?.content_hash, next_hash = contentHash, source)
    COMMIT
    resolve any pending awaitMirror promise keyed (repoName, id, contentHash)
  ```

  ### Per-event flow (chokidar `unlink`)

  ```
  on unlink (path):
    repoName + id derived from path
    select existing row → if missing, no-op
    BEGIN
      INSERT issue_history (patch = remove-everything, prev_hash = existing.content_hash, next_hash = '', source)
      DELETE FROM issues WHERE repo_name = $1 AND id = $2
    COMMIT
    history rows survive (no FK to issues)
  ```

  ### Read-your-writes — `writeIssue()` integration

  The brainstorm picked option A: `writeIssue()` writes the file, then awaits an in-process ack from the mirror, then returns.

  Concretely:

  - `src/poller/yaml-lifecycle.ts#writeIssue(repoLocalPath, issue)` keeps its current contract for the file write.
  - After `writeFileSync`, compute the same `contentHash` the mirror will compute, then `await mirror.awaitMirror(repoName, issue.id, contentHash)` with a 5-second timeout. Timeout logs a warning but returns successfully (the file IS written; the DB will catch up via reconcile). Read-your-writes is best-effort by design — Phase 1 of the epic still treats the filesystem as authoritative.

  - The mirror handle is registered globally per repo on worker boot via `getMirrorForRepo(repoName)`. `writeIssue` looks it up by reading `repoName` from the path. If no mirror is active (e.g. unit-test environment without the worker started), `writeIssue` skips the await entirely — that path is exactly the legacy file-only behavior.

  Agents calling `Edit` / `Write` on YAML files do NOT go through `writeIssue` — they use Claude Code's tools. They get eventual consistency through the watcher; that is acceptable because agents read their own card from the YAML, not from the DB. Internal Node code goes through `writeIssue` and gets read-your-writes.

  ## Files

  Create:

  - `src/db/issues-mirror.ts` — `startIssuesMirror`, `IssuesMirror` interface, hash + canonicalize helpers
  - `src/db/issues-mirror.test.ts` — unit tests (use a fake clock + simulated watcher events)
  - `src/__tests__/integration/issues-mirror.test.ts` — integration test using real chokidar + a tmpdir repo + real PG (test DB harness from Phase 1)
  - `src/db/canonicalize.ts` — pure helper that canonicalizes a parsed YAML object for hashing (sorted keys recursively), exported alongside a `sha256()` helper. Standalone so the `writeIssue` side can compute the same hash independently.
  - `src/db/canonicalize.test.ts`

  Modify:

  - `src/poller/yaml-lifecycle.ts` — `writeIssue` integration
  - `src/worker/server.ts` — call `startIssuesMirror(ctx)` during boot, ahead of the poller
  - `src/repo-context.ts` (or wherever `RepoContext` is mutable) — store the mirror handle on the context so `writeIssue` can look it up
  - `package.json` — add `chokidar`, `rfc6902` (or equivalent JSON Patch lib — pick one with a small footprint and zero deps), confirm `node-sha256` not needed (use `crypto.createHash`).

  ## Test plan (TDD)

  Use real chokidar in the integration tests; never simulate at the watcher boundary in integration tests. Use `simulateWatcherEvent()` in unit tests where the focus is the upsert logic itself.

  ### Unit (`src/db/issues-mirror.test.ts`) — fake clock + mocked DB

  1. `add` event with new YAML → upsert row, history row with `prev_hash: null`, `source: "watcher"`.
  2. `change` event where contentHash equals stored hash → no-op (no history insert).
  3. `change` event with new contentHash → upsert + history with correct `prev_hash` + `next_hash`.
  4. `unlink` event → DELETE issues row + history row with `next_hash: ""`.
  5. Parse-error YAML → upsert with `data: {_malformed:true, raw}` + log warning, no crash.
  6. DB write throws → `writeFlag` called once with the right shape + log at error level.
  7. `awaitMirror(repo,id,hash)` resolves when the matching upsert lands; rejects via timeout if not.
  8. Two pending `awaitMirror` calls for the same key are both resolved by one upsert.
  9. Boot scan: pre-existing YAMLs in tmpdir → upsert N rows + N history rows tagged `boot-scan`. DB rows whose YAML disappeared during the scan window get tombstoned.

  ### Integration (`src/__tests__/integration/issues-mirror.test.ts`) — real chokidar + real PG

  10. Write a fresh YAML, await mirror, query DB → row present with the right `data`.
  11. Edit the YAML, await mirror, query DB → row updated, history row count incremented by 1.
  12. Edit again with the SAME content (no-op write) → history row count unchanged.
  13. Delete the YAML, await mirror, query DB → row gone, history row count incremented.
  14. Operator-style external write (sidestep `writeIssue`, use plain `fs.writeFileSync`) → mirror picks it up via watcher, history `source: "watcher"`.
  15. Trigger periodic reconcile by jumping the fake interval (or by calling the exposed reconcile method) on a tmpdir with one drifted YAML → DB resyncs; history `source: "reconcile"`.
  16. Boot scan from tmpdir with 5 pre-existing YAMLs → 5 rows after `startIssuesMirror` returns; history `source: "boot-scan"`.

  ### Read-your-writes (`src/poller/yaml-lifecycle.test.ts` extension)

  17. `writeIssue` called with mirror active → returns only after the DB upsert is observable.
  18. `writeIssue` called without an active mirror → returns synchronously after the file write (legacy path).
  19. `writeIssue` called with mirror active but DB stuck (simulate by throwing in the upsert) → the 5s timeout fires, function still returns successfully, warning logged.

  ## Acceptance

  - `src/db/issues-mirror.ts` + `src/db/canonicalize.ts` exist with the documented API.
  - All 19 tests above pass.
  - `npx tsc --noEmit` clean; `npx vitest run` green; `cd dashboard && npx vue-tsc --noEmit` clean.
  - `make launch-worker REPO=danxbot` boots, the boot scan logs the row count, the watcher logs file events at debug level, and the worker remains healthy under `make logs REPO=danxbot` for 60s.
  - Manual smoke: `echo "broken: yaml: :::" > <repo>/.danxbot/issues/open/DX-99.yml` → mirror logs a warn, the row exists with `data._malformed = true`, no flag written.
  - Manual smoke: stop the danxbot-postgres container while the worker is running → next mirror write triggers `CRITICAL_FAILURE` flag → poller halts → dashboard shows the red banner. Restart PG, clear the flag → resumes.
  - No reader callsite is changed in this phase.

  ## Out of scope

  - Migrating any reader (DX-155, DX-156).
  - Retiring `danx_issue_save` (DX-157).
  - Outbound tracker push integration — unchanged.
  - Periodic reconcile of `closed/` (intentional).
  - Watcher restart after process crash recovery semantics — Worker manager already restarts on crash; chokidar rebooting on worker boot covers it.
