comments:
  - author: danxbot
    timestamp: 2026-05-09T21:18:30Z
    text: |-
      ## Phase 4 Handoff

      **Built:** Persona block injection wired into `dispatch()` (DX-162); agent-finalize.sh squash-merge helper shipped to every connected repo via `injectDanxbotScripts`; issue-worker SKILL Step 7a routes the agent to the script with exit-code-driven recovery semantics. Commit `2d2c925`.

      **Discoveries:**

      - The agent-finalize.sh script CANNOT do `git checkout main` inside the worktree (git refuses — main is checked out at the parent repo's worktree). Workaround: `git reset --soft <merge-base>` + `git push origin HEAD:main` produces the same outcome (single squash commit fast-forwarded onto origin/main).
      - The push-race integration test had a load-bearing bug in test infra, not the script: pre-push hooks inherit `GIT_DIR` / `GIT_INDEX_FILE` / `GIT_WORK_TREE` / `GIT_PREFIX` from the parent push, so `git push` from inside a sibling clone in the hook actually pushed the agent's repo. Fix: `unset GIT_DIR ...` at the top of any pre-push hook that wants to do real work in another repo. Worth recording for any future test that exercises push hooks.
      - Operator-authored bios are NOT trusted input — a bio containing `Your worktree:` / `Your branch:` / `You are ` would corrupt the SKILL's persona-block routing invariants. `buildPersonaPrefix` throws at build time so the dashboard CRUD layer surfaces the error to the operator on save. Phase 5/dashboard CRUD should also validate at save time (defense in depth).

      **Corrections:**

      - none on the epic body. Phase 5 (DX-200) wiring is unchanged: poller picks `(agent, card)` and passes `agent: PersonaContext` into `dispatch()`. The persona shape `{name, bio}` is intentionally slim — the worktree path is derived from `repo.localPath + agent.name` so a future change to the worktree layout needs editing only `persona.ts`.

      **Next-agent context (Phase 5 / DX-200):**

      - `dispatchWithRecovery` in `src/dispatch/recovery-mode.ts` already inherits `agent` via `...input` spread (verified by 2 new tests in `recovery-mode.test.ts`). No additional plumbing needed there.
      - The `agent: PersonaContext` shape on `DispatchInput` is `{name: string, bio: string}`. The poller pick path will need to assemble this from `<repo>/.danxbot/settings.json`'s `agents{}` map (Phase 1 schema).
      - `agent-finalize.sh` exits `0` (success), `1` (rebase conflict), `2` (push race exhausted, cap=5), `64` (usage error: bad card id / multi-line title), `65` (wrong branch). The SKILL's Step 7a routes each to a distinct recovery action.
      - The danx-issue card YAML schema gained a `priority` field + bumped `schema_version` to 5 mid-flight (other agent's WIP). Be aware when wiring picker logic — the DB mirror is at v5.
