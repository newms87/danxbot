retro:
  good: |-
    - **mutateAgents helper added before shipping the bug.** Code review caught a lost-update race: handlers were doing `readSettings → mutate → writeSettings({agents})` outside the per-file lock, so two near-simultaneous POST creates would each read `{}`, compute their own one-entry map, and the second writer would silently clobber the first. Fixed by adding a `mutateAgents(localPath, fn, writtenBy)` helper that acquires the lock BEFORE the read. Concurrent-write regression test pins the contract — Promise.all of two creates lands both records. Better than catching this in production after a rare two-tab repro.
    - **SSE broadcast on every mutation matches the existing pattern.** Code review flagged the absence; addressed in the same commit (not deferred). Each handler publishes `agent:updated` with a fresh repo snapshot via `publishAgentSnapshot`, mirroring `handlePatchToggle` and `handlePutIssuePrefix`. A second tab editing the same repo sees the snapshot bump without polling.
    - **Validation hardening landed in the same commit, not deferred.** Code review flagged 4 small issues (avatar_path writable from PATCH/POST, no bio cap, capabilities not deduped, IANA validator duplicated). All four fixed in this PR. The Bio cap (4 KB) is non-trivially load-bearing — `settings.json` is read on every Slack message + poller tick + `/api/launch`, so an oversized bio degrades hot paths.
    - **Test-reviewer's recommended high-value tests added in same commit.** Boundary-at-1MB-exact (silent off-by-one risk), webp parity, jpg-alias parity, traversal defense, route ordering. 78 backend route tests total — well above the 16 the spec asked for.
    - **Avatar upload deviation documented as decision, not bug.** Card spec said "multipart upload"; implementation uses raw POST with `Content-Type: image/<ext>`. No multipart parser ships with this codebase, browser `fetch(url, {body: file})` works directly with `File` blobs and `file.type` populates Content-Type. Same security posture (MIME + size validation), fewer moving parts. Documented in `handlePostAvatar`'s docstring and this retro.
    - **Reuse-first.** Avatar fetch goes through `fetchWithAuth` (authed bearer) and converts to `blob:` URL — `<img src>` works with auth without leaking the token in a query string. `AgentAvatar.vue` revokes the URL on unmount + on prop change. `MarkdownEditor` from `@thehammer/danx-ui` was reused for the bio editor; existing `AgentsPage.vue` empty-state shell preserved its `data-test` selectors so the Phase 1 SFC tests continued passing.
  bad: |-
    - **Visual browser smoke (AC #8) couldn't be performed in dispatched-agent context** — same constraint as DX-159 AC #7. Chrome MCP extension isn't connected and the Playwright proxy requires the bot dispatch token (intentionally not exposed to dispatched agents). Verification is indirect — 78 backend route tests + 191 SFC tests in jsdom + static code review of `AgentsPage.vue` wiring + `vue-tsc --noEmit` clean. Operator should confirm visually after the merge by opening `http://localhost:5566`, switching to the Agents tab, creating "alice" + "bob", uploading avatars, editing alice's schedule, deleting bob, and verifying `<repo>/.danxbot/settings.json` reflects each change.
    - **`agents-routes.ts` is now 1517 lines** — well over the soft-cap. Pre-existing pattern (the file already hosted list/snapshot, toggles, critical-failure clear, issue-prefix migration before DX-160); the CRUD additions tipped it past sustainable. Filed DX-214 for the file split.
    - **DELETE busy check is conservative until Phase 5.** Today, ANY non-terminal dispatch in the repo blocks deleting ANY agent. Phase 5 (DX-200) narrows this to `assigned_agent === <name>` once the lock-stamp lands on YAMLs. Acceptable Phase-2 behavior — explicitly noted in `handleDeleteAgent`'s docstring.
    - **Test-reviewer flagged 4 lower-priority backfill tests not added** — 500-fallback for read/write throws across 5 handlers, invalid-JSON-body 400 for POST/PATCH/DELETE, full-update PATCH (every field at once). Folded into DX-214's scope rather than ballooning this PR. The 500 fallbacks all share the same `try/catch → json(res, 500, ...)` shape; one parameterized test in DX-214 closes them all.
