    text: |-
      ## Implementation summary

      ### What landed

      - **5 new backend handlers** in `src/dashboard/agents-routes.ts`:
        `handlePostAgent`, `handlePatchAgent`, `handleDeleteAgent`,
        `handlePostAvatar`, `handleGetAvatar`. All require user bearer
        (the dispatch token is rejected). Routes registered ahead of
        the blanket `/api/*` user-auth gate for mutations; GET avatar
        sits under the gate.
      - **Atomic per-agent mutations** via a new `mutateAgents` helper
        in `src/settings-file.ts`. Acquires the per-file lock BEFORE
        the read so concurrent CRUD calls (e.g. two POSTs racing the
        5-cap check) can't interleave their read+write phases. Replaces
        the unsafe `readSettings` → mutate → `writeSettings` pattern in
        every Phase-2 handler. Concurrent-write race regression test
        added to `settings-file.test.ts`.
      - **SSE broadcast** on every mutation (`agent:updated`, repo
        snapshot payload) so a second tab sees the change without
        polling — mirrors the existing `handlePatchToggle` /
        `handlePutIssuePrefix` pattern.
      - **Validation hardening:**
        - `avatar_path` is read-only on POST/PATCH bodies (only
          `handlePostAvatar` stamps it server-side; rejecting client
          values prevents stale paths and cross-agent reference attacks).
        - `bio` capped at 4 KB — `settings.json` is on the hot path
          for every Slack message + poller tick + `/api/launch`.
        - Capabilities are deduped on validation.
        - `isValidIanaTimeZone` exported from `settings-file.ts` and
          reused by the route validator (DRY).
      - **Avatar upload/serve:** raw POST with `Content-Type:
        image/<png|jpeg|webp>` (deviation from card-spec "multipart"
        — no parser shipped, simpler frontend integration via
        `fetch(url, {body: file})`). Validates MIME (415), size (413,
        1 MB cap enforced at chunk-arrival to prevent DoS), persists
        at `<repo>/.danxbot/agents/<name>/avatar.<ext>`. GET serves
        bytes with the right Content-Type; defense-in-depth path-
        traversal guard via `assertWithinAgentsRoot`.
      - **Frontend (Vue UI exempt from test requirement):** new
        components `AgentCard.vue`, `AgentEditDrawer.vue`,
        `AgentScheduleEditor.vue`, `AgentDeleteModal.vue`,
        `AgentAvatar.vue`. `AgentsPage.vue` replaced its empty-state
        stub with a CRUD UI: roster grid, edit drawer (drag-drop
        avatar uploader, schedule per-day editor, capability
        checkboxes, bio markdown editor), delete confirm modal.
        5-cap enforced via button-disabled + tooltip. Typed API
        wrappers added to `dashboard/src/api.ts`: `createAgent`,
        `updateAgent`, `deleteAgent`, `uploadAgentAvatar`,
        `fetchAgentAvatarUrl` (returns `blob:` URL via authed fetch).

      ### Verification

      - `npx vitest run` (with envs set): **3585 backend tests pass,
        112 skipped**. Includes 78 tests in
        `src/dashboard/agents-routes.test.ts` (every spec test
        plan item #1–#16 plus webp parity, jpg-alias parity, 1 MB
        boundary, traversal defense, route ordering, avatar_path
        rejected on PATCH).
      - `cd dashboard && npx vitest run`: **191 dashboard SFC tests
        pass.**
      - `npx tsc --noEmit` and `cd dashboard && npx vue-tsc --noEmit`
        both clean.
      - `agents/` added to `.danxbot/.gitignore`; verified via
        `git check-ignore`.

      ### Out of scope (Phase 3+)

      - **Worktree creation/teardown** — Phase 3 (DX-161). DELETE
        currently removes the settings record + per-agent dir but
        does NOT touch git worktrees or branches. Comment in
        `handleDeleteAgent` references DX-161 for the wiring.
      - **`assigned_agent` lock narrowing** — Phase 5 (DX-200). The
        DELETE busy check is conservative today: any non-terminal
        dispatch in the repo blocks. Once Phase 5 lands the YAML
        `assigned_agent` field, the busy check tightens to
        `assigned_agent === <name>`.
      - **Live busy badge** — Phase 6 (DX-164). The `AgentCard.vue`
        currently renders a static grey dot.

      ### Action items

      One follow-up card (DX-214): split
      `src/dashboard/agents-routes.ts` (now 1517 lines after this
      change) into 6 cohesive per-concern modules. Pre-existing soft-
      cap violation; DX-160 was the tipping point flagged by code
      review. Same card folds in the test-reviewer's recommended
      500-fallback / invalid-JSON-body / full-update PATCH backfill.
