    text: |-
      <!-- danxbot -->

      ## Implementation summary

      ### What landed

      - **`src/agent/worktree-manager.ts`** — `WorktreeManager` interface
        (`bootstrap` / `teardown` / `validate` / `resetClean`) backed by an
        injectable `GitRunner`. Default runner uses
        `node:child_process.execFile` (no shell — argv-shaped, immune to
        injection). Idempotent bootstrap detects existing worktrees via
        `git worktree list --porcelain` and short-circuits. Defense-in-
        depth `AGENT_NAME_SHAPE` re-validation on every method (code-review
        L1) so a manager-direct caller can't pass a malformed name.
      - **Three-file recovery module split** (code-review M1):
        - `src/dispatch/recovery-prompt.ts` — pure prompt builders
          (`buildRecoveryPrompt`, `buildStillDirtyComment`). No IO, no
          dispatch import — easy to load in any test context.
        - `src/dispatch/recovery-card-update.ts` — default IO helpers.
          The `appendNeedsHelpComment` helper now uses the codebase's
          existing `yaml` parser (parse → mutate `comments[]` → stringify)
          instead of regex splice — fixes code-review C1 (the regex would
          have prepended new entries to populated `comments:` lists and
          terminated mid-body when comment text contained lines like
          `bash:` or `output:`).
        - `src/dispatch/recovery-mode.ts` — routing only
          (`dispatchWithRecovery`, `dispatchInRecoveryMode`). Required
          `deps.dispatch` (no default) — drops the `vi.mock("./core.js")`
          smell from the previous draft. Caller's `onComplete` is
          try/catch-wrapped so a buggy caller can't block the post-recovery
          re-validate (code-review H1).
      - **Recovery-mode dispatch marker** — `apiDispatchMeta.metadata.endpoint
        = "internal:recovery"` so dashboards + log readers can spot recovery
        runs without a schema change. Pairs with the schema extension
        (`IssueDispatch.kind` now `"work" | "triage" | "recovery"` +
        `TTL_SECONDS_BY_KIND.recovery = 1800`) that Phase 4/5 will write
        through the poller path.
      - **Wiring** — `POST /api/agents` calls `bootstrap()` after the
        settings record lands; on bootstrap failure the handler runs a
        second `mutateAgents` to delete the just-added record (rollback)
        and returns 500 with the underlying git error. `DELETE /api/agents/:name`
        calls `teardown()` BEFORE the settings record is removed; on
        teardown failure the record stays so the operator can retry.
        `WorktreeManager` is wired via `DispatchProxyDeps.worktreeManager`
        (optional — handlers skip both side-effects when absent, preserving
        the legacy/test path).
      - **`.danxbot/.gitignore`** — added `worktrees/`.

      ### Verification

      | Layer | Count | Status |
      |---|---|---|
      | Backend `vitest run` | 3772 passed, 4 skipped | green |
      | Dashboard `vitest run` | 191 passed | green |
      | `tsc --noEmit` | 0 errors | green |
      | `vue-tsc --noEmit` | 0 errors | green |

      New tests for this card (59 total, well above the AC's "20"):

      | File | Tests |
      |---|---|
      | `src/agent/worktree-manager.test.ts` | 21 (mocked `GitRunner`) |
      | `src/__tests__/integration/worktree-manager.test.ts` | 8 (real-git tmpdirs) |
      | `src/dispatch/recovery-prompt.test.ts` | 6 (pure prompt content) |
      | `src/dispatch/recovery-mode.test.ts` | 7 (routing + post-completion) |
      | `src/dispatch/recovery-card-update.test.ts` | 8 (real YAML parser shapes) |
      | `src/dashboard/agents-crud.test.ts` | 9 new wiring tests |

      Test-reviewer's highest-leverage adds were folded in (sibling-survival
      rollback assertion, 409-busy → teardown-NOT-called invariant, 409-cap
      → bootstrap-NOT-called invariant, rollback-failure path, sibling-
      prefix worktree-list false-match guard, AGENT_NAME_SHAPE defense-in-
      depth across every method).

      Code-reviewer findings addressed: C1 (regex YAML splice), H1 (caller
      onComplete try/catch), M1 (file split into 3 modules), M2 (dropped
      `vi.mock("./core.js")`), M3 (recovery dispatch marker), L1
      (AGENT_NAME_SHAPE re-validation), L2 (fetch-failure prompt special-
      case), L4 (backticked worktree path in still-dirty comment), and
      teardown's "remote ref does not exist" log downgrade. Deferred to
      Phase 5 (DX-200): `assigned_agent` lookup in `findLastModifiedOpenCard`
      (the field doesn't exist in the YAML schema yet — recovery prompt's
      step 2 documents this Phase-5 dependency); H3 atomicity gate (the
      single-poller invariant + Phase 5's per-agent dispatch lock provide
      this property by construction).

      ### Out of scope (future phases)

      - Persona injection (Phase 4 / DX-162).
      - Agent + card lock queries + triage-precursor (Phase 5 / DX-200).
      - Card UI badges + busy state (Phase 6 / DX-164).
      - Slack / API dispatch worktree integration — those dispatches don't
        write code, so they intentionally stay in a shared workspace.

      ### Notes for the operator (AC #9 manual smoke)

      The "Manual smoke — create alice, observe worktree, trigger recovery"
      AC is verified indirectly by the integration test
      `src/__tests__/integration/worktree-manager.test.ts` which exercises
      the same lifecycle against a real git repo in a tmpdir (bootstrap →
      validate clean → modify file → validate dirty → resetClean → teardown
      → branch gone locally + remotely). The recovery-prompt content half
      is verified by `recovery-prompt.test.ts` against every required
      substring. Operator can confirm the end-to-end UX after merge by
      running `make test-system` or by creating an agent through the
      dashboard once Phase 4/5 wires the dispatch path through
      `dispatchWithRecovery`.
