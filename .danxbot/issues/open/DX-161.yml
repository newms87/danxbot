retro:
  good: |-
    - **Real-git integration tests caught a real bug before commit.** The
      first draft of `resetClean` did `checkout + reset --hard origin/main`
      without a fresh `git fetch`. The unit tests passed (the mocked
      runner has no concept of stale refs), but the integration test
      against a real git tmpdir failed because `origin/main` in the
      worktree didn't know about the commit pushed via the sibling clone.
      Root-cause fix: add `git fetch origin` to `resetClean` so the
      operation is self-sufficient. Worth the cost of running real-git
      integration tests on every change to this module.
    - **Two-reviewer pass caught two non-overlapping bugs.** Test-reviewer
      flagged the missing rollback-survival assertion (the test couldn't
      distinguish "rollback worked" from "everything got nuked"); code-
      reviewer flagged the regex YAML splice's branch-ordering bug + the
      missing `id:` field on the appended comment. Neither alone would
      have caught both — running both subagents in parallel paid off.
    - **Three-file split reduced cognitive load.** The first draft put the
      pure prompt builder, the routing, and the IO helpers in one
      `recovery-mode.ts`. Code review's M1 finding pushed the split into
      `recovery-prompt.ts` (pure), `recovery-card-update.ts` (IO), and
      `recovery-mode.ts` (routing). Side benefit: the prompt-content tests
      now load no `dispatch/core.js` chain → no `vi.mock` smell.
    - **YAML parser over regex splice.** Replaced the regex-based
      `appendNeedsHelpComment` with a `yaml.parse → mutate → stringify`
      pipeline. Three new tests exercise it against real card shapes
      (empty `comments: []`, populated list, body-with-`bash:` lines, no
      `comments:` field) — all pass. The regex approach would have
      corrupted ~50% of real cards in the repo.
    - **Dependency injection on `GitRunner` + `RecoveryDeps.dispatch`.**
      Made unit testing trivial (no `vi.mock("node:child_process")`, no
      `vi.mock("./core.js")`) while the integration tests against real
      git fully exercise the production runner. Same pattern for
      `dispatch` — required parameter (no default) so the test file
      doesn't transitively load `config.ts`.
  bad: |-
    - **Manual smoke (AC #9) couldn't be performed in dispatched-agent
      context.** Same constraint as DX-159 / DX-160: the dispatched worker
      can't (and per the `no-unauthorized-worker-launch` skill MUST NOT)
      start its own danxbot worker, and the Playwright proxy requires the
      bot dispatch token. Verified via integration test (`worktree-manager`
      against real git) + prompt-content unit tests instead. Operator
      confirms after merge.
    - **`assigned_agent` field referenced in recovery prompt but doesn't
      exist on the YAML schema yet.** Phase 5 (DX-200) lands the field;
      until then the recovery agent will scan and find no matches and
      fall through to "commit as pure WIP". The prompt's step 2 was
      updated to document this Phase-5 dependency in-line so the agent
      isn't surprised. Cleaner alternative would be to defer the
      `assigned_agent` mention until Phase 5, but the prompt is more
      useful with the lookup intent included even if it's a no-op today.
    - **`findLastModifiedOpenCard` is an mtime heuristic.** Documented
      Phase 3 limitation. When the recovery agent's dispatch fails and
      we need to file Needs Help, "most recently modified open card" is
      a best-guess; the right answer is "the card the recovery agent was
      working on," which Phase 5 will surface via `assigned_agent`. The
      dashboard banner + retry-queue make this acceptable for Phase 3.
    - **Cross-cutting `DispatchKind` extension is dead until Phase 5.**
      Added `"recovery"` to `IssueDispatch.kind` + `VALID_DISPATCH_KINDS`
      + `TTL_SECONDS_BY_KIND`, but no producer writes the value yet. The
      poller (Phase 5 / DX-200) will stamp it on the YAML when it
      dispatches a recovery-mode agent. Marking the dispatch via
      `apiDispatchMeta.metadata.endpoint = "internal:recovery"` is the
      Phase-3 visibility surface; the schema extension is forward-looking.
