title: "Multi-Worker > Phase 6: Card UI badges + agent busy state + end-to-end system test"
description: |-
  ## Context

  Final phase of the Multi-Worker Dispatch epic (DX-158). After Phase 5 (DX-200) ships, the poller dispatches multiple agents concurrently. This phase makes that visible in the dashboard (`<avatar><name>` chips on issue list rows + drawer header, live busy state on the Agents tab roster) and adds the system-test fixture that proves end-to-end concurrency.

  Full epic spec: `docs/superpowers/specs/2026-05-08-multi-worker-dispatch-design.md`. "Dashboard UI" + "Multi-worker tests against multi-card concurrency" sections are the source of truth.

  ## Solution

  ### Card UI — agent badge

  Component: `dashboard/src/components/AgentBadge.vue`. Props: `repoName: string`, `agentName: string`, `size: "sm" | "md"`.

  Renders: `<img class="rounded-full"> <span class="font-medium">{name}</span>`. Image src points at `/api/agents/<name>/avatar?repo=<repo>` (Phase 2 endpoint). Initials fallback when `404`.

  Uses:

  - **Issue list row** (`dashboard/src/components/IssueListRow.vue` or equivalent — find via grep on existing list-row component) — append the badge after the title when `issue.assigned_agent` is set. Size `"sm"`.
  - **Issue drawer header** (`dashboard/src/components/IssueDrawer.vue` or equivalent) — render the badge (size `"md"`) below the title. Click → routes to `/agents/<name>?repo=<repo>` (Agents tab + scrolled to the card).
  - **All Dispatches view** — add a filter dropdown by agent (lists agents from the same `useAgents` composable).

  ### Agents tab — live busy state

  The Agents tab roster cards (Phase 2) show a placeholder grey dot. This phase wires real busy state:

  - Backend: extend `GET /api/agents?repo=<name>` to include `busyOn?: { card_id: string, started_at: string }` per agent (joined from the `dispatches` table).
  - Frontend: composable `useAgents` polls every 5s OR subscribes to the existing dashboard SSE stream — pick the simpler path (SSE already exposes dispatch events; agent CRUD reusing the same channel is cheap).
  - Card renders: `green dot + "running DX-N (3m)"` when busy; `grey dot + "idle"` when free.

  ### System test — concurrent dispatch

  New scenario in `src/__tests__/system/run-system-tests.sh`:

  ```bash
  # Test: multi-worker concurrent dispatch
  # Setup: 3 agents (alice/bob/charlie) all w/ issue-worker capability
  # Inject 3 fixture cards on disjoint files
  # Expect: all 3 dispatched within 30s; all 3 squash-merge cleanly to main; 3 commits land
  ```

  Fixtures: 3 prebuilt cards under `src/__tests__/system/fixtures/multi-worker-*.yml`, each touching a different file with a tiny no-op edit.

  Helper: `make test-system-multi-worker` target in the Makefile.

  ## Files

  Create:

  - `dashboard/src/components/AgentBadge.vue`
  - `src/__tests__/system/fixtures/multi-worker-alice.yml`
  - `src/__tests__/system/fixtures/multi-worker-bob.yml`
  - `src/__tests__/system/fixtures/multi-worker-charlie.yml`
  - `src/__tests__/system/multi-worker-test.sh` (called by the orchestrator)

  Modify:

  - `dashboard/src/components/IssueListRow.vue` (or equivalent) — render `<AgentBadge>` when `issue.assigned_agent` set
  - `dashboard/src/components/IssueDrawer.vue` (or equivalent) — same
  - `dashboard/src/components/AgentCard.vue` (from DX-160) — wire real busy state
  - `dashboard/src/composables/useAgents.ts` — add busy-state polling / SSE subscription
  - `src/dashboard/agents-route.ts` — extend GET response with `busyOn`
  - `src/__tests__/system/run-system-tests.sh` — add `multi-worker` target
  - `Makefile` — add `make test-system-multi-worker`

  ## Test plan

  UI (frontend tests optional per project rule, but type-check required):

  1. `vue-tsc --noEmit` clean for all modified components.
  2. Manual smoke at `http://localhost:5566`:
     - Issue list shows agent badges on rows where `assigned_agent` set.
     - Drawer header shows the badge; clicking routes to Agents tab.
     - Agents tab card shows green dot + card id while a dispatch runs; flips to grey on completion.

  Backend:

  3. `GET /api/agents?repo=<name>` includes `busyOn` for each running dispatch (test mocks dispatches table).
  4. SSE channel emits an `agent_dispatch` event when dispatch starts / completes (test verifies the event shape).

  System (Layer 3):

  5. `make test-system-multi-worker` exits 0:
     - 3 fixture cards inserted into ToDo
     - 3 agents seeded into settings.json
     - poller tick triggers 3 concurrent dispatches
     - all 3 finish within budget (5 min, $1)
     - 3 commits on main, each Conventional Commits format with the right scope (DX-N from the fixture)
     - All 3 cards moved to Done

  Epic-level:

  6. After this phase ships, DX-158 (epic) ACs all checkable.

  ## Acceptance

  - `<AgentBadge>` component renders avatar + name; initials fallback on missing avatar.
  - Issue list rows + drawer header show the badge when `assigned_agent` set.
  - Agents tab cards show live busy state (green/grey + card id + elapsed).
  - GET /api/agents response extended with `busyOn` per agent.
  - System test fixture + `make test-system-multi-worker` target green.
  - `make test` green; `make test-system` (full suite) green; `make deploy-smoke TARGET=gpt` green.
  - Manual smoke at `http://localhost:5566` shows badges + busy state in real time.
  - Epic DX-158 every AC checkable.

  ## Out of scope

  - Slack / API dispatch UI badges — issue-worker only.
  - Per-agent dispatch history view (could be added in a follow-up; the Agents tab card already shows current state).
  - Auto-scaling agent count.
