title: "Issues DB Mirror > Phase 1.2: Re-author all 15 numbered migrations in PG syntax"
description: |-
  ## Context

  Second sub-phase of DX-152 (Phase 1 of the Issues DB Mirror epic, DX-151). Read the parent epic (DX-152) for the full split rationale + sub-phase table. **Blocked on Phase 1.1 (DX-163)** — Phase 1.1 ships the new `pg.Pool`-shaped runner + helpers; this phase has nothing to call into until that lands.

  This sub-phase rewrites every `src/db/migrations/*.ts` file from MySQL syntax to PG syntax. After this phase, the runner from Phase 1.1 can apply all 15 migrations to a clean PG database and produce the same final schema we ran with on MySQL — no historical no-op steps, no half-migrations.

  **No data is migrated.** The brainstorm decision is locked: drop MySQL entirely, start PG empty. Users get re-seeded via `make create-user` (Phase 1.4 verifies). Dispatches / events / analytics tables start fresh.

  Full epic spec: `docs/superpowers/specs/2026-05-08-issues-db-mirror-design.md`.

  ## Files (verified at split time)

  All 15 numbered migrations to rewrite:

  - `src/db/migrations/001_initial_schema.ts` (14 lines today)
  - `src/db/migrations/002_events_table.ts` (42 lines) + `002_events_table.test.ts` (71 lines)
  - `src/db/migrations/003_events_router_complexity.ts` (13 lines)
  - `src/db/migrations/004_threads_users_tables.ts` (30 lines) + `004_threads_users_tables.test.ts` (63 lines)
  - `src/db/migrations/005_usage_tracking.ts` (21 lines)
  - `src/db/migrations/006_sql_queries_processed.ts` (15 lines)
  - `src/db/migrations/007_heartbeat_snapshots.ts` (15 lines)
  - `src/db/migrations/008_repo_name_column.ts` (9 lines)
  - `src/db/migrations/009_dispatches_table.ts` (41 lines)
  - `src/db/migrations/010_dispatch_parent_job_id.ts` (18 lines)
  - `src/db/migrations/011_users_auth_and_api_tokens.ts` (42 lines) + `011_users_auth_and_api_tokens.test.ts` (86 lines)
  - `src/db/migrations/012_dispatches_slack_columns.ts` (26 lines)
  - `src/db/migrations/013_dispatches_host_pid.ts` (39 lines)
  - `src/db/migrations/014_worker_restarts_table.ts` (46 lines)
  - `src/db/migrations/015_dispatches_pid_timestamps.ts` (42 lines) + `015_dispatches_pid_timestamps.test.ts` (46 lines)

  Plus the runner-level test:

  - `src/db/migrate.test.ts` — gets new assertions for the final-state schema (queried via `information_schema.columns`).

  ## Common transforms (apply mechanically; flag anything ambiguous in a comment on the card)

  | MySQL | Postgres |
  |---|---|
  | `LONGTEXT` | `text` |
  | `TEXT` | `text` |
  | `JSON` | `jsonb` |
  | `DATETIME(6)` | `timestamptz` (drop precision; PG default is microseconds) |
  | `BIGINT UNSIGNED AUTO_INCREMENT` | `bigserial` (or `bigint generated always as identity` — pick `bigserial` for brevity, all our id columns are simple) |
  | `INT UNSIGNED AUTO_INCREMENT` | `serial` |
  | `TINYINT(1)` | `boolean` |
  | `ON UPDATE CURRENT_TIMESTAMP` | drop — use app-level `updated_at` writes |
  | `ENUM('a', 'b', 'c')` | `text CHECK (col IN ('a', 'b', 'c'))` |
  | `KEY x(col(64))` (prefix index) | drop the prefix — PG's GIN/B-tree handles `text` natively without prefix limits |
  | `INDEX foo (col)` | `CREATE INDEX ON tbl (col)` (separate statement) — PG's CREATE TABLE accepts indexes inline only via `CONSTRAINT`, simpler to follow with a separate `CREATE INDEX` |
  | `UNIQUE KEY uq_x (a, b)` | `UNIQUE (a, b)` (inline column constraint) or `CREATE UNIQUE INDEX` |
  | `INSERT IGNORE` | `INSERT ... ON CONFLICT DO NOTHING` |
  | `ON DUPLICATE KEY UPDATE` | `ON CONFLICT (...) DO UPDATE SET ...` (Phase 1.3 territory — but if a migration's `up` does it, transform now) |
  | `CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci` | drop entirely — PG defaults to UTF-8 |
  | `ENGINE=InnoDB` | drop — PG only has one engine |

  ## Approach

  1. For each numbered file 001..015:
     - Replace `import type { Pool } from "mysql2/promise"` with `import type { PoolClient } from "pg"`.
     - Change the `up` signature from `(pool: Pool) => Promise<void>` to `(client: PoolClient) => Promise<void>`.
     - Rewrite the SQL body using the transform table above.
     - Replace `pool.execute(sql)` with `client.query(sql)`.
     - For multi-statement migrations: PG's `client.query()` accepts a single statement per call, but driver versions also allow multiple statements separated by `;` if you don't pass parameters. Easier path — call `client.query()` once per statement.
  2. For each test file (002, 004, 011, 015):
     - Update its mock pool to a `pg`-shaped mock (or use the new `withTx` helper from Phase 1.1).
     - Re-run the test against a real PG container (or the mock if the test was already mock-only) — assert the same schema-shape invariants but in PG terms.
  3. Update `src/db/migrate.test.ts` to assert the final-state schema after all 15 migrations apply. Query `information_schema.columns` (or the equivalent PG catalog) to verify column types, nullability, defaults. Pin the exact final-state — anyone editing migrations in the future has to update this assertion.
  4. Confirm a clean PG database picks up all 15 versions in `schema_migrations` and the resulting tables match expectations.

  ## Acceptance

  - All 15 files in `src/db/migrations/` re-authored in PG syntax.
  - Each file's `up` signature is `(client: PoolClient) => Promise<void>`.
  - No `mysql2` imports in `src/db/migrations/`.
  - `src/db/migrate.test.ts` asserts schema_migrations rows match versions 1..15 after a fresh `migrate()` against an empty DB.
  - `src/db/migrate.test.ts` asserts the final-state schema (column types + indexes for every table) — this is the canonical reference for "what does the schema look like after migrate."
  - Clean PG database after `migrate()` produces a schema equivalent to the union of all 15 historical MySQL migrations: same tables, same columns, same indexes (PG-shaped).
  - `npx vitest run src/db/migrations src/db/migrate.test` is green.
  - The 4 per-migration test files (002, 004, 011, 015) pass when run.

  ## Out of scope

  - Porting any `*-db.ts` consumer module (Phase 1.3).
  - Removing `mysql2` from `package.json` (Phase 1.4).
  - End-to-end operator verification (Phase 1.4).

  ## Notes for the agent

  - Re-read the existing migration body before rewriting to make sure the FINAL state is right. Some migrations are pure schema edits; some have data-fix `UPDATE` statements that rely on MySQL-specific behavior. Translate carefully.
  - For `bigserial` columns: PG's `bigserial` auto-creates a sequence named `<table>_<col>_seq`. If a later migration `ALTER`s the column or drops the table, remember to drop the sequence too (PG raises if you try to recreate a column on top of an orphaned sequence).
  - For `text CHECK (col IN (...))` enums: PG's check constraints are at the column level, not column-set level — if you need to extend the enum later (Phase 2/3), `ALTER TABLE ... DROP CONSTRAINT ... ADD CONSTRAINT`. Plan for this when the constraint name is implicit.
  - PG is strict about timezone awareness. `timestamptz` stores in UTC and converts on read. mysql2 returned naive `DATETIME` strings; pg returns `Date` objects. Don't fight this in migrations — let it surface and Phase 1.3 handles consumer normalization.
  - Don't try to preserve MySQL row counts or seed data. The decision is locked: empty PG, re-seed users via `make create-user`. Any `INSERT INTO ... VALUES (...)` in a migration should remain (those are seed inserts the system needs to function); any row-fixing data migration should also remain (those run on a fresh DB but populate a default state).

  ## Forbidden patterns

  - Running these migrations from a session that ALSO ports consumer modules. Phase 1.3 is the consumer-port phase; this phase is migrations-only. Mixing them risks a 1500-line megacommit nobody can review.
  - Adding new tables not in the original 15 migrations. The `issues` and `issue_history` tables are DX-153, not this phase.
  - Skipping any of the 15 migrations because "the table that introduced is dropped later anyway." The runner enumerates files in order; missing one breaks `schema_migrations` consecutivity. If a table is later dropped, the dropped state is the final state — preserve that.
