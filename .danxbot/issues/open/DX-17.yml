title: "[Danxbot] Add MemoryTracker.seedCard(externalId, fields) helper for integration tests"
description: |-
  ## Context

  Phase 2 of tracker-agnostic-agents (https://trello.com/c/ZDb7FOGO) needed integration tests to mock the new `createIssueTracker(repo)` factory so the brand-new-card hydration path doesn't 401 against a real Trello API with test creds.

  Today's workaround in `src/__tests__/integration/critical-failure-end-to-end.test.ts` hand-overrides `MemoryTracker.getCard` and `getComments` after construction because `MemoryTracker.createCard` mints its own `mem-N` external_id rather than honoring a caller-supplied id. The stub works, but the override is ugly + drift-prone.

  ## Solution

  Add a public `MemoryTracker.seedCard(externalId, fields)` helper that:

  1. Accepts a caller-supplied `external_id` instead of allocating one.
  2. Stores the card under that id in `MemoryTracker`'s internal map.
  3. Returns void (or the seeded `Issue`).

  Then refactor the critical-failure integration test (and any future tests that need a memory tracker seeded with a specific id) to use `seedCard(STUCK_CARD_ID, {title, status, ...})` and drop the manual `getCard` / `getComments` overrides.

  ## Key files

  - `src/issue-tracker/memory.ts` — add `seedCard` method
  - `src/__tests__/issue-tracker/memory.test.ts` — unit tests for the new helper
  - `src/__tests__/integration/critical-failure-end-to-end.test.ts` — refactor to use the helper

  ## How to verify

  - New unit test: `seedCard("specific-id", {title: "X"})` → subsequent `getCard("specific-id")` returns an Issue with that id + title; `getRequestLog()` records the seed as a non-mutating `seedCard` entry (or no entry, if seeding is intentionally invisible to the request log — design decision).
  - Refactored integration test still passes without the manual `getCard` / `getComments` stubs.

  ## Origin

  Code-reviewer finding from Phase 2 review (https://trello.com/c/ZDb7FOGO comment thread). Filed as Action Item per `~/.claude/rules/self-improvement.md`.

