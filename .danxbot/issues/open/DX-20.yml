title: Replace deploy/exec.ts module-level dry-run flag with DeployContext
description: |-
  ## Context

  Action item from card uHECTOjj. Today the deploy CLI's dry-run state lives at module-level in `deploy/exec.ts` (`let dryRunEnabled = false; setDryRun(value)`). It works for the single CLI invocation today, but:

  - Two parallel deploys in the same Node process would race on the flag.
  - `setDryRun(false)` resets in tests must be added explicitly per `describe` block — easy to forget.
  - The flag is implicit context that helpers (`run`, `runStreaming`, `tryRun`, every isDryRun() consumer) read from a singleton.

  ## Solution

  Thread a `DeployContext { dryRun: boolean }` through the call chain instead. `cli.ts main()` constructs it once; every helper takes it as a parameter. Eliminates the singleton; makes parallel deploys naturally safe; tests pass `{ dryRun: true }` instead of calling `setDryRun(true)`.

  Blast radius: every function in `deploy/` that calls `run`/`runStreaming`/`tryRun` or `isDryRun()`. Probably 8-10 files. Not urgent — single-process CLI works fine today.

  ## Key files

  - `deploy/exec.ts` (introduce DeployContext, deprecate setDryRun/isDryRun)
  - All deploy/*.ts callers
  - All deploy/*.test.ts

  ## Found while

  Code review nitpick N1 on card uHECTOjj (commit `7dd4abb`). Reviewer noted "Not blocking today; cli.ts main() is the only setter."
