title: Retire DANX_TRACKER from @thehammer/danx-issue-mcp — make server YAML-only
description: |-
  ## Context

  The `@thehammer/danx-issue-mcp` package today requires the `DANX_TRACKER` env var (`"memory"` | `"trello"`) at startup and uses it to pick a tracker implementation. Under `tracker: "trello"` the server makes **synchronous** calls into the Trello driver — most importantly `tracker.createCard(...)` inside the `danx_issue_create` handler.

  This violates the architectural rule documented in `<repo>/CLAUDE.md` ("Trello Is Background Infrastructure — Never In The Agent's Critical Path"): Trello is a one-way, async, background mirror owned exclusively by the danxbot worker's poll loop (`src/poller/index.ts`, `src/poller/orphan-push.ts`, `<repo>/.danxbot/.trello-retry/`). The agent flow MUST be local-YAML-only. Trello errors must surface ONLY in the dashboard, never in agent or MCP output.

  The DX-201 inject defaults to `tracker: "memory"` to dodge the trap, but the env var itself is a remnant of a wrong design and should not exist on the MCP server at all.

  ## Solution

  Refactor `@thehammer/danx-issue-mcp` (source: `/home/newms/web/danx-issue-mcp/`) to remove the `DANX_TRACKER` env var entirely. The server becomes purely a YAML manipulator:

  - `danx_issue_create` allocates the next `ISS-N` (atomic file create), writes the canonical YAML to `<repo>/.danxbot/issues/open/<id>.yml` with `external_id: ""`, returns `{created: true, id, path, external_id: ""}`. **No tracker call. Ever.** The worker's poll loop sees the orphan and pushes to Trello on the next tick.
  - `danx_issue_save` validates the YAML on disk + returns. No reconcile, no tracker.update, no upstream side effects.
  - `danx_issue_get` / `danx_issue_list` / `danx_issue_close` — already YAML-only; no change needed beyond removing any remaining tracker reference.

  Retire `src/repo.ts` lines 61-93 (the DANX_TRACKER parsing + validation block). Retire the `IssueTracker` interface usage from the MCP server entirely if practical — the server doesn't need it. The interface stays in danxbot (`src/issue-tracker/`) where the worker owns the upstream-mirror logic.

  Once the server is shipped tracker-less, retire the `DANX_TRACKER` and `TRELLO_API_KEY` / `TRELLO_API_TOKEN` keys from danxbot's `buildDanxIssueEntry` (`src/poller/inject/inject-root-mcp.ts`). The canonical injected entry shrinks to just `DANX_REPO_ROOT`.

  ## Files

  External (separate npm package):

  - `/home/newms/web/danx-issue-mcp/src/repo.ts` — drop tracker selection (lines 61-93 today)
  - `/home/newms/web/danx-issue-mcp/src/index.ts` — drop the JSDoc reference to "Backend tracker selection via DANX_TRACKER env"
  - `/home/newms/web/danx-issue-mcp/src/handlers/*` — drop `tracker.createCard` from `danx_issue_create`; drop any other tracker mutation
  - `/home/newms/web/danx-issue-mcp/package.json` — bump version, publish

  Inside danxbot (after server is shipped):

  - `src/poller/inject/inject-root-mcp.ts` — drop `DANX_TRACKER` + `TRELLO_API_KEY` + `TRELLO_API_TOKEN` from `buildDanxIssueEntry`. Canonical entry becomes `{type:"stdio", command:"npx", args:[...], env:{DANX_REPO_ROOT: <literal>}}`.
  - `src/poller/inject/inject-root-mcp.test.ts` — update test snapshots
  - `.claude/rules/docker-runtime.md` — update "Root .mcp.json injection contract" to reflect the simpler entry
  - `CLAUDE.md` — strike the `tracker: "memory"` mention from the "Trello Is Background Infrastructure" table; the server has no tracker concept anymore

  ## Test plan (TDD)

  External package:

  1. Failing test: `danx_issue_create` writes YAML + returns `external_id: ""`. **No** Trello / tracker call inside the handler. Use a fixture repo with a `.danxbot/issues/open/` skeleton; assert exactly one new YAML appears + zero outbound network.
  2. Failing test: `danx_issue_save` returns `{saved: true}` even when no Trello creds in the env. (Today fails under `DANX_TRACKER=trello` without creds.)
  3. Failing test: server starts with only `DANX_REPO_ROOT` set; no tracker error.

  Danxbot:

  4. Failing test: `buildDanxIssueEntry(repoRoot)` returns the new shape (`env` has only `DANX_REPO_ROOT`).
  5. Existing inject tests update to the new shape.

  Manual smoke:

  6. `cd <repo> && claude` with TRELLO_API_KEY + TRELLO_API_TOKEN unset → `/mcp` shows `danx-issue` connected, no warnings. Run `mcp__danx-issue__danx_issue_create({type:"Bug", title:"...", description:"..."})` → returns `ISS-N`. Wait one poll tick → card appears in Trello (worker did the push).

  ## Acceptance

  - `@thehammer/danx-issue-mcp` no longer references `DANX_TRACKER`, `IssueTracker`, `tracker.createCard`, or any Trello API call.
  - Server starts with only `DANX_REPO_ROOT` in env.
  - `danx_issue_create` is local-only; orphan-push picks up + mirrors to Trello async.
  - Danxbot's canonical inject entry contains exactly `{DANX_REPO_ROOT}` in env.
  - All existing tests green; new tests above pass.
  - Manual smoke confirms host-session `claude` connects with zero Trello creds.

  ## Out of scope

  - Changing the worker's poll-loop sync logic. Untouched.
  - Changing the `IssueTracker` interface in danxbot (`src/issue-tracker/`). Stays — the worker uses it.
  - Refactoring the orphan-push pipeline. It already handles `external_id: ""` cards correctly.
