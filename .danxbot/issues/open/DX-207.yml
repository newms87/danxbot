      ## Reverted to ToDo — premature dispatch

      Operator interrupted this dispatch: "We are not supposed to be
      working on this yet."

      **Root cause.** Grandparent epic `DX-139` carries
      `waiting_on: { by: [DX-151] }` (Issues DB Mirror). The
      dependency was never propagated when `DX-141` (parent) was split
      into `DX-207` / `DX-208` / `DX-209` — the split comment on
      DX-141 declared `DX-207` "unblocked, dispatches first," but
      DX-141 itself should have been `waiting_on: [DX-151]`. As a
      result the poller saw DX-207 with `waiting_on: null` and
      dispatched it.

      **Action taken on this card.** Set `waiting_on: by: [DX-151]`
      with a reason explaining the chain (DX-207 → DX-141 → DX-139 →
      DX-151). Worker will normalize `status` to `ToDo` on save.

      **Out of scope (left for the operator or the next pickup of the
      relevant card).** `DX-141` itself still has
      `waiting_on: null` — when DX-151 ships, the operator should
      verify DX-141's `waiting_on` and the chain on its other
      children (DX-208 / DX-209) before letting any of them dispatch.
      Re-checking the parent before resuming this work prevents the
      same premature-dispatch trap from firing on DX-208.
