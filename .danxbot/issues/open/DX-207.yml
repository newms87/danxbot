title: "[DB registry > Phase 2a] mcp_settings_path column — find per-dispatch MCP file at reattach"
description: |-
  ## Context

  Sub-phase 2a of `DX-141` (DB-driven full-stack reattach). Phase 2c
  (reattach pass) needs to locate each dispatch's per-dispatch MCP
  settings file (`/tmp/danxbot-mcp-XXXX/settings.json`) so it can
  rewrite `DANXBOT_STOP_URL` when the worker restarts on a different
  port. Today the path lives only in the spawning worker's memory and
  is lost across restart.

  This sub-phase persists the path to the `dispatches` table so the
  reattach pass in Phase 2c can resolve it from the row alone — no
  cross-session ferrying required.

  ## Solution

  - **Migration 016** — `mcp_settings_path VARCHAR(512) NULL` on
    `dispatches`. Idempotent. Down direction drops the column.
  - **`Dispatch` interface** (`src/dashboard/dispatches.ts`) — add
    `mcpSettingsPath: string | null`. Header doc explains the column
    is the path to the per-dispatch MCP settings JSON written by
    `dispatch()` (`src/dispatch/core.ts`) during workspace
    resolution. NULL when the dispatch was created without a per-
    dispatch MCP overlay (e.g. legacy rows).
  - **`dispatches-db.ts`** — extend `COLUMN_MAP` (`mcpSettingsPath` →
    `mcp_settings_path`), `DispatchRow`, `rowToDispatch`. Loose
    `==`-null check matching `hostPid`/`hostPidAt` (so legacy rows +
    test fixtures parse).
  - **`dispatch-tracker.ts#startDispatchTracking`** — accept new
    optional `mcpSettingsPath` and persist via `insertDispatch`.
  - **`dispatch/core.ts`** — pass the resolved per-dispatch settings
    dir's `settings.json` path to `startDispatchTracking` (it already
    knows the path — it just wrote the file via
    `writeMcpSettingsFile`).

  ## Files

  - `src/db/migrations/016_dispatches_mcp_settings_path.ts` (new) +
    test
  - `src/dashboard/dispatches.ts` (extend interface)
  - `src/dashboard/dispatches-db.ts` (extend column map / row /
    parser)
  - `src/dashboard/dispatch-tracker.ts` (accept + persist)
  - `src/dispatch/core.ts` (pass the path through)
  - test fixtures across `src/__tests__/` updated for new field

  ## Test plan (TDD)

  1. Migration 016 adds `mcp_settings_path` column; idempotent (re-
     run after first apply is a no-op).
  2. Migration 016 down direction drops the column.
  3. `insertDispatch` round-trips `mcpSettingsPath` (string + null).
  4. `dispatch()` populates `mcpSettingsPath` on insert when the
     workspace had a per-dispatch MCP file written.

  ## Acceptance

  - `mcp_settings_path` column exists; migration is idempotent.
  - Every dispatch inserted post-migration carries the column value
    (string for normal flows, null only for legacy / no-MCP test
    paths).
  - 4 new unit tests pass; no existing tests regress; `tsc --noEmit`
    clean.

  ## Out of scope

  - Reading the column or rewriting the file — Phase 2c.
  - Backfilling NULL for pre-migration rows — they will simply not be
    reattachable and Phase 2c falls through to mark-failed.
