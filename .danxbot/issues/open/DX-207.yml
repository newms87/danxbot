  - author: code-reviewer
    timestamp: 2026-05-10T04:21:30.000Z
    text: |-
      ## Code Review

      ### P0 — `src/dispatch/core.ts:501` stale `mcp_settings_path` after stall respawn

      The gate `mcpSettingsPath: isRespawn ? undefined : settingsPath`
      was incorrect. Each `spawnForDispatch` call invokes
      `writeMcpSettingsFile`, which `mkdtempSync`s a fresh
      `/tmp/danxbot-mcp-XXXX/` directory. On respawn:

      1. The previous job's `onComplete` runs
         `cleanupMcpSettings(settingsDir)` — old dir **deleted**.
      2. `spawnForDispatch(..., true)` writes a NEW dir at a NEW path.
      3. The old gate skipped the DB update → row pointed at deleted dir.

      Phase 2c (DX-209) reattach would have read a non-existent file or,
      after `mkdtemp` randomness, an unrelated dispatch's settings.
      **Comment was factually wrong** ("re-stamping would overwrite it
      with the (still-correct) same string") — the path changes every
      spawn.

      **Fix shipped.** On respawn, fire-and-forget
      `updateDispatch(dispatchId, { mcpSettingsPath: settingsPath })`
      before the new spawn. Initial spawn still goes through
      `startDispatchTracking` → `insertDispatch` for the atomic
      stamp. Comment rewritten to match. Two new tests in
      `core.test.ts`:
      - respawn syncs path to fresh dir (asserts new path != initial,
        and `updateDispatch` patch matches the spawnAgent argument)
      - initial spawn does NOT issue an `mcpSettingsPath`
        `updateDispatch` (locks the gate)

      ### P1 — comment quality

      - `core.ts` respawn comment rewritten to explain the cleanup
        race correctly.
      - `dispatches.ts` / `agent-types.ts` docstrings explain WHY (Phase
        2c reattach, DX-209) — kept as-is.
      - Migration 019 header explains rationale, NULL semantics,
        idempotency contract — kept as-is.

      ### P2 — DRY (pre-existing, deferred)

      `dispatches-db.test.ts` duplicates a 30-element `orderedKeys`
      literal across multiple tests. Pre-existing pattern (also present
      in the `parentJobId` tests). Deferring: each new column propagates
      the duplication, but consolidating would touch tests outside
      DX-207's scope. Out of scope here.

      ### What's correct

      - Loose `==` null check matches `agentName`/`hostPid` precedent.
      - `String(row.mcp_settings_path)` cast handles non-string driver
        values defensively without the `Number(undefined) → NaN` foot-gun.
      - snake_case ↔ camelCase mapping consistent.
      - Migration test follows the `016_issues_mirror.test.ts` skipIf
        pattern faithfully.
      - `SpawnAgentOptions.mcpSettingsPath?: string | null` correctly
        optional — non-`dispatch()` callers (none today) need no churn.
      - No backwards-compat shims; no defensive code hiding bugs after
        the P0 fix.
  - author: danxbot
    timestamp: 2026-05-10T04:23:00.000Z
    text: |-
      ## Review Fixes

      Code-reviewer P0 (`isRespawn ? undefined : settingsPath` gate)
      addressed in `src/dispatch/core.ts`:

      - On respawn, `spawnForDispatch` now fires an
        `updateDispatch(dispatchId, { mcpSettingsPath: settingsPath })`
        before the new `spawnAgent` call. The initial spawn still
        stamps the column atomically via `startDispatchTracking` →
        `insertDispatch`.
      - `mcpSettingsPath` is now passed to `spawnAgent` unconditionally
        (initial uses it via the launcher's `startDispatchTracking`
        call; on respawn the launcher's `dispatch === undefined` branch
        skips tracking, so the value is ignored — but the explicit
        pre-spawn `updateDispatch` keeps the row in sync).
      - Inline comment rewritten to describe the cleanup race correctly.

      Test-reviewer P1 (missing respawn coverage) addressed in
      `src/dispatch/core.test.ts`:

      - New test: `respawn syncs mcp_settings_path to the freshly
        written settings dir (DX-207 + DX-209 reattach contract)` —
        asserts that after a stall fires, `updateDispatch` was called
        with the new path AND that the new path differs from the
        initial path (proving a fresh file was actually written, not a
        stale capture).
      - New test: `initial spawn does NOT issue an mcp_settings_path
        updateDispatch` — pins the gate so a future regression that
        double-stamps via insert + update on initial would fail loudly.

      Existing nudgeCount stall test updated from
      `toHaveBeenNthCalledWith(N, ...)` to `toHaveBeenCalledWith(...)`
      since the new respawn-resync `updateDispatch` interleaves
      between nudge updates — call positions are no longer load-bearing
      for that assertion's intent.

      All 38 tests in `core.test.ts` green. 222 tests across every file
      DX-207 touched green. `tsc --noEmit` clean.

      Ten pre-existing failures across `issues-reader.test.ts` (3) and
      `integration/issues-mirror.test.ts` (7) are unrelated to DX-207:
      issues-reader fails because of a peer agent's uncommitted DX-164
      modifications to `src/dashboard/issues-reader.ts`; issues-mirror
      fails on chokidar real-fs timeout flakes. Per
      `danx-no-false-blockers.md` Pattern 1, peer agents' uncommitted
      diffs stay untouched.
