retro:
  good: |
    - Migration 019 shipped clean: `ADD COLUMN IF NOT EXISTS` on the up
      direction + `DROP COLUMN IF EXISTS` on the down direction made
      both halves idempotent without per-step probes.
    - The `dispatch()` → `spawnAgent` → `startDispatchTracking` chain
      already had room for the new field — only one explicit forward in
      `core.ts` and a `?? null` fallback in the launcher and tracker
      were needed; no signature churn.
    - Reviewer caught a real P0: the original
      `isRespawn ? undefined : settingsPath` gate would have left
      Phase 2c (DX-209) reading a deleted-file path on every
      stall-recovery respawn. The cleanup chain in
      `spawnForDispatch.onComplete` runs `cleanupMcpSettings` BEFORE
      the new spawn writes a fresh dir, so the old path is gone by
      the time the new one is written.
    - Loose `==`-null checks in `rowToDispatch` matching the
      `agentName` / `hostPid` precedent caught the legacy-fixture
      branch in tests — the 3-branch `rowToDispatch` test (string /
      null / missing column) pins the contract a future
      "fix to ===" refactor would silently break.
    - 12 new tests landed (4 migration + 3 dispatches-db + 2
      dispatch-tracker + 3 dispatch core) against the AC's bar of 4.
      Every assertion targets observable boundaries (DB column shape,
      COLUMN_MAP positional binding, end-to-end argument plumbing).
  bad: |
    - The original `isRespawn ? undefined : settingsPath` gate copied
      the `pairedWriteYaml` / `apiDispatchMeta` precedent without
      checking the underlying invariant: those represent immutable
      origination metadata stamped once at row creation, but
      `mcpSettingsPath` represents a transient filesystem location
      that changes every spawn. The reviewer-flagged P0 was a real
      bug that would have surfaced only on Phase 2c reattach in
      production. Pre-pass thinking should have asked "does this
      value change across respawns?" before borrowing the gate shape.
    - Migration number drift: the AC text said "Migration 016" but
      016 was already taken by `issues_mirror`; shipped as 019.
      Updated the AC title to match. Worth noting that Phase-card
      bodies referencing migration numbers can drift between draft
      time and pickup time when intervening migrations land — future
      epic splits should leave the migration number to the pickup
      agent rather than baking it into the description.
    - Pre-existing test failures from a peer agent's uncommitted
      DX-164 modifications in `src/dashboard/issues-reader.ts` (3
      tests) and from `chokidar` real-fs timeout flakes in
      `issues-mirror.test.ts` (7 tests) had to be triaged as
      unrelated per `danx-no-false-blockers.md` Pattern 1. Cost ~5
      minutes to verify they predated this work.
