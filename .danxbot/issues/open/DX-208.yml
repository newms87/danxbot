title: "[DB registry > Phase 2b] Extract attachMonitoringStack helper from spawnAgent"
description: |-
  ## Context

  Sub-phase 2b of `DX-141` (DB-driven full-stack reattach). Phase 2c
  (reattach pass) needs to attach a SessionLogWatcher +
  StallDetector + heartbeat + cleanup chain to an ALREADY-running
  agent process ā€” exactly the same monitoring stack `spawnAgent`
  builds for a fresh spawn. Today that stack is inlined in
  `spawnAgent` with no reusable seam.

  This sub-phase extracts the watcher / usage / forwarder /
  inactivity-timer / heartbeat / cleanup / stop-handler wiring into
  a standalone helper so:

  - Phase 2c can reattach to a running PID without re-implementing
    the wiring (and risking divergence).
  - `spawnAgent`'s body shrinks to: preflight ā†’ invocation builder ā†’
    `attachMonitoringStack(job, options)` ā†’ runtime fork ā†’
    `pairedWriteHostPid`.

  Behavior-preserving refactor. All ~3354 existing tests pass
  unchanged.

  ## Solution

  New module `src/agent/attach-monitoring-stack.ts` exporting
  `attachMonitoringStack({job, jobId, options, agentCwd, ...}) ā†’
  {cleanup, stop, dispatchTracker, ...}`. The helper takes a
  partially-constructed `AgentJob` (id + skeleton) and returns the
  full lifecycle handles.

  Inputs come from the caller's context:
    - `job` (skeleton from `runSpawnPreflight` OR a reattach shim)
    - `agentCwd` (for SessionLogWatcher session dir)
    - `options.eventForwarding`, `statusUrl`, `apiToken`,
      `timeoutMs`, `maxRuntimeMs` ā€” same as today
    - `dispatchTrigger` (optional ā€” only fresh spawns insert a row;
      reattach hands the existing tracker in via a new branch in
      Phase 2c)
    - `existingDispatchTracker` (optional ā€” Phase 2c passes its
      reattached tracker reference)
    - `notifyTerminalStatus` (kept identical)

  Outputs:
    - `cleanup` (cached promise, same semantics as today)
    - `stop` (the existing buildJobStopHandler wrapping)
    - `dispatchTracker` (set when fresh-spawn or reattach provides it)

  Does NOT include: runtime fork, paired-write, MCP settings file
  cleanup. Those stay in their current homes ā€” only the monitoring
  + lifecycle chain is extracted.

  ## Files

  - `src/agent/attach-monitoring-stack.ts` (new) ā€” the extracted
    helper. Lives next to `agent-cleanup.ts` / `agent-stop.ts` /
    `agent-types.ts`.
  - `src/agent/launcher.ts` ā€” `spawnAgent` rewires to call
    `attachMonitoringStack`. Net loss of ~80 lines.
  - `src/agent/launcher.test.ts` (existing) ā€” must still pass; no
    test changes required.
  - `src/agent/attach-monitoring-stack.test.ts` (new) ā€” 2-3 unit
    tests targeting the helper directly with mocked watcher / queue
    so future maintainers can drive the helper without spinning up a
    full spawn.

  ## Test plan (TDD)

  1. Existing `launcher.test.ts` (and every spawnAgent caller) still
     passes with no test changes ā€” proves behavior preservation.
  2. `attachMonitoringStack` builds a watcher subscriber that
     accumulates usage with messageId-dedup (same as today).
  3. `attachMonitoringStack` resets the inactivity timer on every
     watcher entry.
  4. `attachMonitoringStack` skips eventForwarding when
     `options.eventForwarding` is undefined (Slack-router-only
     parity).

  ## Acceptance

  - `attachMonitoringStack` module exists and is consumed by
    `spawnAgent`.
  - `spawnAgent` body is reduced to its three runtime concerns
    (preflight, attach, fork + pair-write).
  - `npx vitest run` passes ā€” no existing tests modified.
  - 3 new unit tests for the helper pass.
  - `npx tsc --noEmit` clean.

  ## Out of scope

  - Runtime-fork extraction (runHostModeFork + spawnDockerMode are
    fine where they are).
  - Paired-write (`pairedWriteHostPid`) extraction ā€” already its own
    module.
  - Reattach consumer ā€” that's Phase 2c.
