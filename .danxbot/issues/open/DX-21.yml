title: Extend --dry-run to secrets-push and destroy commands
description: |-
  ## Context

  Action item from card uHECTOjj ([Danxbot] Implement --dry-run for deploy CLI). The current implementation scopes `--dry-run` to the `deploy` command only — `secrets-push gpt --dry-run`, `destroy gpt --dry-run`, etc. print "not implemented for X" and exit 0.

  Both are obvious user expectations:
  - `secrets-push --dry-run`: preview which SSM put-parameter commands would run before pushing real values. Already feasible — `pushSecrets` honors `isDryRun()` for the dispatch token + the runStreaming wrappers.
  - `destroy --dry-run`: preview the terraform destroy plan. `terraformDestroy` already calls `writeTfVars` (dry-run-aware) and `runStreaming("terraform destroy")` (dry-run-aware) — should work today; just need to drop the gate in `cli.ts:main()`.

  ## Solution

  In `cli.ts main()`, drop the "deploy-only" check and add `setDryRun(true)` for any command + `--dry-run`. Verify each command path tolerates dry-run by walking through to ensure no execSync-direct calls bypass the gate.

  ## Key files

  - `deploy/cli.ts` (drop the early-exit branch at lines 411-422)
  - Tests for each command's dry-run behavior

  ## Found while

  Code review of dry-run feature in card uHECTOjj (commit `7dd4abb`).
