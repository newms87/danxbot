    text: |-
      <!-- danxbot -->

      ## Phase 3 Handoff (DX-218 → DX-219)

      **Built:** Reconcile step 7 outbound tracker push lives in `src/issue/reconcile/trello.ts` (`pushTrelloDiff` + per-card serial queue). Retry queue is event-driven (`setTimeout`-armed timers, `bootRescheduleRetryQueue` at worker boot) — `_poll` no longer calls `drainRetries` or `pushOrphans`. `auto-sync.ts` is now a thin ~99-LOC wrapper that calls `reconcileIssue(repo, id, "lifecycle")` so terminal YAML state lands at Trello before `danxbot_complete`'s SIGTERM. Commit: `49f6709` (rebase SHA after origin/main merge).

      **Discoveries (relevant to remaining phases):**

      - The slot/mutex separation pattern (reconcile mutex inside steps 1-6; per-card slot map outside steps 7) generalizes — Phase 4's dispatch scheduler should replicate it: dispatch decision inside reconcile mutex, `setTimeout`-armed dispatch poke OUTSIDE.
      - `src/issue/reconcile/push-hash-cache.ts` is the cycle-broken shared cache pattern. Both reconcile (read on step 7 gate) and retry-queue (write on timer-armed retry success) update it. Phase 4's `lastDispatchedHashByCard` (or equivalent dispatch-dedup state) should follow the same shape.
      - `lifecycle` reconcile trigger AWAITS the trailing tracker push. Phase 4 dispatch poke should NOT use `lifecycle` — pick a non-awaited trigger so the dispatch body doesn't block on Trello's network round-trip.

      **Corrections:** none to the epic body. Phase 3's spec held; the only working-tree drift was DX-242 disabling `_poll`'s legacy spawnClaude path mid-Phase-3 (commit `cd2c9b3`). Phase 4 picks up that scheduler work cleanly because the integration tests `_poll` exercised are skip-marked with the `[DX-242 SKIP]` pattern.

      **Next-agent context (for DX-219 Phase 4):**

      - Workspace boundary: `_poll` now ONLY runs `bulkSyncMissingYamls`. Every other event flows through reconcile (chokidar trigger) or a `setTimeout` (retry queue). Phase 4's scheduler is the third event-driven path — same shape.
      - Reusable helpers — see DX-219's "Notes from Phase 3" comment (just appended).
      - Carryover from DX-218 retro.bad: duplicate repo-registries between `reconcile.ts` + `retry-queue.ts`; `retry-queue.ts` 770 LOC; `attemptPush` / `doPush` shape duplication. Phase 4 may consolidate alongside its own scheduler state, or leave for Phase 5/6 cleanup card.
