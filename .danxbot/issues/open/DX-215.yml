title: "[Event-Driven Worker] Centralized reconcileIssue + retire poller tick loop"
description: |-
  ## Context

  Today `src/poller/index.ts` (~2965 LOC) runs `_poll(repo)` every `pollerIntervalMs` (~30-60s). Each tick performs ~20 sequential operations: `syncRepoFiles`, `healLocalYamls`, `healExternalIds`, `drainRetries`, `evictDeadDispatches`, `recomputeParentStatuses` (twice), `tracker.fetchOpenCards`, `bulkSyncMissingYamls`, `pushOrphans`, `listDispatchableYamls`, `tryResumeOrphan`, `resolveWaitingOnCards`, multi-agent picker (DX-200), legacy single-card dispatch, triage spawn, ideator spawn. Most steps are local-state work that has no reason to wait for a tick boundary — they could run the moment the YAML changed.

  Two pieces of the system are already event-driven:
  - `src/db/issues-mirror.ts` — chokidar watcher mirrors every YAML change to Postgres. Exposes `awaitMirror(repo, id, hash)` for read-your-writes.
  - `src/worker/auto-sync.ts` — pushes the dispatched YAML to Trello immediately on `danxbot_complete`.

  The rest of state management still rides the tick. This causes:
  - Up to 60s lag between an agent saving a YAML and the dispatcher seeing it as eligible.
  - Up to 60s lag between a YAML change and Trello reflecting it.
  - A monolithic `_poll` body that mixes 6+ concerns and is the single point of failure (DX-149 added a top-level try/catch when one tracker call killed the worker).
  - No single canonical place to read to understand "what happens when card X changes."

  ## Goal

  Introduce ONE central function, `reconcileIssue(repo, id, trigger)`, that owns every piece of state-management logic for a single card: validate, compute derived state, atomically write, mirror to DB, push to tracker, poke the dispatch scheduler, recurse on parent + dependents. Every entry point (chokidar event, dispatch lifecycle, scheduler, cron audit, Trello inbound hydration) calls this function. A per-card mutex serializes concurrent reconciles for the same id.

  The poller's `_poll` body shrinks to ~50 LOC: the only thing it still owns is the Trello inbound fetch (which has no webhook substitute) and a 1-min invariant audit pass that walks every open YAML and calls `reconcileIssue(card, "audit")`.

  ## Architecture

  ```
                                    +----------------------------------------+
  chokidar /.danxbot/issues/*  →    | reconcileIssue(repo, id, trigger)      |
  dispatch lifecycle (start/stop) → |   1. load YAML / detect tombstone      |
  scheduler agent-free →            |   2. validate (throw on shape error)   |
  cron audit →                      |   3. compute derived state:            |
  new-card hydration (Trello in) →  |        parent status from children     |
                                    |        waiting_on auto-clear           |
                                    |        blocked⇔status invariant        |
                                    |        dispatch liveness (PID, TTL)    |
                                    |        terminal status + open/ → mv    |
                                    |   4. diff vs prior canonical → no-op?  |
                                    |   5. atomic write YAML                 |
                                    |   6. await DB mirror upsert            |
                                    |   7. tracker outbound diff push        |
                                    |   8. emit DispatchableChanged          |
                                    |   9. recurse on parent_id              |
                                    |  10. recurse on dependents (waiting_on)|
                                    |   → ReconcileResult{changed, fanout[]} |
                                    +----------------------------------------+

  per-minute cron:
    - tracker.fetchOpenCards → bulkSyncMissingYamls (UNCHANGED — Trello has no push)
    - pull human comments from Trello (UNCHANGED)
    - audit: for each open YAML → reconcileIssue(card, "audit")
  ```

  The cron survives ONLY for (a) the Trello inbound fetch (no webhook in our setup) and (b) a one-minute drift audit that calls the same reconcile function as every other trigger. There is no second path for state mutation.

  ## Why centralized vs pub/sub bus

  Issue state is tightly coupled. `status⇔blocked⇔waiting_on⇔dispatch⇔parent` invariants are not independent — step N must read the output of step N-1. Decentralized subscribers either race each other or need explicit ordering directives that recreate a centralized fn under another name.

  Single fn:
  - atomic per-card semantics (one mutex covers all eight steps)
  - one stack trace covers a full state transition
  - cron audit is `for each open: reconcileIssue(card, "audit")` — one line
  - recursive cascades (parent + dependents) handled with an explicit visited set; no event-bus cycle hazard
  - table-driven tests cover state transitions in one place

  Tradeoffs (see Phase 1 description for mitigation):
  - One fat module — split into per-step helper modules (`reconcile/parent.ts`, `reconcile/trello.ts`, etc.) called in fixed order from `reconcile.ts` to keep individual files small.
  - Adding a derived field requires editing `reconcile.ts`. Acceptable because derived fields are not independent.
  - Per-step error policy must be explicit (validation throws abort write; tracker push fails non-fatal → enqueue retry, continue scheduler poke).

  ## Phases

  | Card | Phase | Scope |
  |---|---|---|
  | Phase 1 | `src/issue/reconcile.ts` foundation + per-card mutex + `ReconcileResult` type | Build the function with steps 1, 2, 4, 5, 6 wired (validate, no-op detect, write, await mirror). Steps 3/7/8/9/10 are stubs that delegate to the existing poller helpers in this phase — the goal is to introduce the chokepoint without changing behavior. Wire chokidar → `reconcileIssue` (do not yet remove the old subscribers). Behavior-parity test: every state transition `_poll` produces, reconcile produces an identical canonical YAML on the same input. |
  | Phase 2 | Move parent-status derive + healer (open/closed file move) + `waiting_on` resolver into reconcile step 3 | Each helper becomes a pure function called from reconcile. Delete the corresponding calls from `_poll`. Cron audit picks up any drift via the 1-min sweep that also calls reconcile. Tests: existing parent-status + healer test suites repurposed to drive reconcile directly. |
  | Phase 3 | Tracker outbound into reconcile step 7 | Per-card serial queue replaces `_poll`'s per-tick mirror + `pushOrphans` + the standalone `auto-sync.ts`. Diff vs last pushed snapshot (DB `data` is the source) — push only on change. Retry queue stays; failed pushes enqueue and `setTimeout` schedules replay. `auto-sync.ts` becomes a thin `flushPerCardQueue(jobId)` called on `danxbot_complete`. |
  | Phase 4 | Event-driven dispatch scheduler | New `src/dispatch/scheduler.ts`. State: per-repo `Map<agentName, idle\|busy>`, `Set<dispatchableCardId>`. Inputs: reconcile output (`DispatchableChanged`), dispatch lifecycle stop, settings.json change (roster reload). Picker (existing DX-200 multi-agent pick) runs once per input. Triage `expires_at` becomes a `setTimeout` per card scheduled by reconcile. `evictDeadDispatches` becomes a lifecycle-event handler with a per-dispatch TTL `setTimeout`. |
  | Phase 5 | Slim cron + audit | `_poll` body retains only: Trello fetch + `bulkSyncMissingYamls` + comment pull. Append: `for each open YAML: reconcileIssue(card, "audit")`. Drift between expected and reconciled state surfaces as `recordSystemError({source: "audit-drift"})` for one release; once zero drift is observed, the audit becomes belt-and-suspenders. Rename `src/poller/index.ts` to `src/cron/sync-and-audit.ts` once code is moved. |
  | Phase 6 | Cleanup + docs | Delete dead code paths (`_poll` backoff bookkeeping, single-dispatch-per-tick invariant comments). Update `agent-dispatch.md` Spawn-Flow section: dispatch is event-driven. New `event-driven.md` rule documenting the reconcile contract: triggers, ordering, per-step error policy, mutex semantics. Update CLAUDE.md "Architecture" diagram. Final cleanup of helper module shape. |

  ## Locked decisions

  - **Centralized fn, not a pub/sub bus.** Issue state is tightly coupled; a bus reintroduces ordering hazards. See "Why centralized" above.
  - **Per-card mutex.** One reconcile per card-id at a time. Concurrent triggers on the same id queue. Different ids run in parallel.
  - **Read-your-writes via existing `awaitMirror`.** Reconcile awaits the DB mirror upsert before any DB read in subsequent steps.
  - **Recursion bounded by visited set.** Parent + dependents recurse through reconcile; visited-id set prevents cycles. Cap depth at a small constant (5) as a runtime guard.
  - **Trello inbound stays on the cron.** Trello has no webhook in our setup. The 1-min cadence is unchanged for inbound.
  - **Cron audit calls the same fn.** No second code path for state mutation. The audit is purely a drift catcher.
  - **Per-step error policy.** Validation throws → abort write. Tracker push fails non-fatal → enqueue retry queue, do not abort the rest of fanout. Scheduler poke fails → log + continue. Each step has an explicit class.
  - **Helpers split by step.** `src/issue/reconcile.ts` orchestrates; per-step logic lives in `src/issue/reconcile/{validate,parent,waiting_on,liveness,heal,trello,scheduler}.ts`. Keeps each file focused.
  - **Dispatch scheduler is event-driven, not interval-driven.** Lifecycle stop, reconcile output, roster change. No setInterval.

  ## Hard dependency

  Issues DB Mirror (DX-151, closed) — already shipped. Reconcile leans on `awaitMirror` for read-your-writes consistency.

  Multi-Worker Dispatch (DX-158) — Phase 4 of this epic depends on the multi-agent picker landed in DX-200 + the worktree manager landed in DX-161. Phases 1-3 do not touch the dispatch surface and can ship before DX-158 finishes (DX-164 / Phase 6 is still open).

  ## Acceptance (epic-level — verified after Phase 6)

  - `src/issue/reconcile.ts` is the sole entry point for every card-state mutation. Every other module reads-only or delegates to it.
  - Chokidar event → reconcile → DB + Trello + scheduler in <1s on local. Cron audit observes zero drift over a release window.
  - `src/poller/index.ts` is renamed `src/cron/sync-and-audit.ts`, contains <300 LOC, performs only Trello inbound fetch + 1-min audit sweep.
  - Dispatch latency: a card written by an agent at t=0 is offered to the scheduler at t<1s; previous behavior was up to 60s.
  - Trello mirror latency: a YAML change pushed to Trello at t<1s; previous behavior was up to 60s.
  - `make test`, `make test-system`, `make deploy-smoke TARGET=gpt` all pass.
  - No regression in the multi-worker concurrency tests (DX-164 system test scenario).

  ## Out of scope

  - Replacing the 10-min DB reconcile (already exists in `issues-mirror.ts`; complementary safety net).
  - Webhook-based Trello inbound (separate effort if Trello ever exposes one for the relevant boards).
  - Cross-repo reconcile (each repo runs its own watcher + scheduler).
  - Auto-scaling agent count (out of scope per DX-158).
  - Re-introducing any agent-facing save MCP tool (forbidden by DX-157).
