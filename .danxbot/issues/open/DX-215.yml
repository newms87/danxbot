      <!-- danxbot -->

      ## Phase 4b inserted (DX-287) — full event-driven scheduler engine

      DX-219 (Phase 4) shipped an AC-scoped delivery: 4 protections ported into `src/dispatch/scheduler.ts` (~220 LOC). Its retro is explicit that the broader Phase 4 scope described in DX-219's body — reconcile step 8 wiring, triage `setTimeout`, TTL `setTimeout`, settings.json file-watch + `onAgentRosterChange`, `_poll` dispatch-decision deletion — was **not** delivered.

      Phase 5 (DX-220) cannot meaningfully proceed until that broader scope lands: DX-220's description presumes "the poller no longer derives state, mirrors Trello outbound, or makes dispatch decisions" and that `scheduler.bootRehydrate` re-arms triage + TTL timers (neither of which exist yet). `src/poller/index.ts` is currently ~2938 LOC with 14 spawn references and every dispatch-decision branch the description says to delete.

      Per DX-219 retro's own suggestion (*"a new phase card gets inserted between DX-219 and DX-220 if the operator wants the full Phase-4-as-described before moving on"*), I'm inserting **DX-287 — Phase 4b: Full event-driven scheduler engine + `_poll` dispatch-decision deletion** between DX-219 and DX-220. DX-287 captures the 5 missing deliverables; DX-220 is stamped `waiting_on: [DX-287]` so the poller auto-unblocks DX-220 the moment DX-287 lands.

      ### Updated phase order

      | # | Card | Phase | Status |
      |---|---|---|---|
      | 1 | DX-216 | reconcile foundation | shipped |
      | 2 | DX-217 | parent-status + healer | shipped |
      | 3 | DX-218 | tracker outbound | shipped |
      | 4 | DX-219 | 4 protection ports → scheduler | shipped (AC-scoped) |
      | 5 | DX-287 | full scheduler engine + `_poll` deletion | **NEW — ToDo** |
      | 6 | DX-220 | slim cron + audit + module rename | waiting_on DX-287 |
      | 7 | DX-221 | cleanup + docs + epic acceptance | ToDo |

      ### Scope split rationale

      DX-287 alone is ~5 deliverables spanning reconcile, scheduler, settings-file, poller (4 new modules + 4 modified). DX-220 is a separate concern (cron slimming + module rename + audit pass + inject move). Keeping them as two phase cards rather than one mega-card preserves DX-220's targeted scope (meaningful once its prerequisites land) and matches the granularity of phases 1-3.

      DX-221 also depends transitively on DX-287 via DX-220, but no `waiting_on` stamp is needed there — DX-221's own work won't make sense until DX-220 ships, and the chain DX-221 → DX-220 → DX-287 is computed by the poller from each card's direct blocker (only DX-220's direct `by` is needed; DX-221 will be picked up after DX-220 reaches Done).
