      <!-- danxbot -->

      ## Routing to Waiting On DX-287 — Phase 4 broader scope was not delivered

      DX-220's description begins with: *"After Phase 4 (DX-219) lands, every state mutation flows through `reconcileIssue`. The poller no longer derives state, mirrors Trello outbound, or makes dispatch decisions."* That premise does not hold — Phase 4 (DX-219) shipped 4 protection ports into `src/dispatch/scheduler.ts` but explicitly deferred the broader Phase 4 scope. From DX-219's own retro:

      > Phase 4's broader scope is NOT delivered here. The card description called for reconcile step 8 wiring, triage `setTimeout`, TTL `setTimeout`, settings.json file-watch, and `_poll` deletion. The `ac[]` did not. Phase 5 (DX-220) and Phase 6 (DX-221) will need to absorb the rest, OR a new phase card gets inserted between DX-219 and DX-220 if the operator wants the full Phase-4-as-described before moving on.

      ### Code-state evidence (worktree `murphy`, branch `murphy` @ `origin/main`)

      | Claim from DX-220 description | Reality on disk |
      |---|---|
      | "The poller no longer ... makes dispatch decisions" | `src/poller/index.ts` is **2938 LOC**, 14 `spawnClaude`/`spawnAgent` references; multi-agent picker, `tryTriageDispatch`, `checkAndSpawnIdeator`, `recoverStuckCards`, `evictDeadDispatches` all still called from `_poll` |
      | "Replaced by per-dispatch TTL timers (Phase 4)" — re: `live-dispatch-guard.ts` | `src/poller/live-dispatch-guard.ts` still exists (79 LOC), TTL timers not built |
      | "Replaced by per-card triage `setTimeout` (Phase 4)" — re: `triage-loop.ts` | `src/poller/triage-loop.ts` deleted, but per-card `setTimeout` arming never built; only the file removal happened |
      | "Boot scan logic moves into `src/dispatch/scheduler.ts#bootRehydrate`" — re: `dispatch-reattach.ts` | `src/poller/dispatch-reattach.ts` still exists (83 LOC); `scheduler.ts` has no `bootRehydrate` export |
      | "Phase 5 (DX-220) remove the legacy `spawnClaude` call site entirely" (per DX-215 epic comment) | DX-242-disabled block still present at `src/poller/index.ts:1012`-`1039` |
      | "After Phase 4, every state mutation flows through `reconcileIssue`" | `reconcileIssue` exists but Phase 4's step-8 wiring (`fanout.dispatchableChanged` → scheduler) is missing; scheduler has no `onReconcileResult` / `onDispatchStart` / `onDispatchStop` / `onAgentRosterChange` / `onTriageExpiry` / `onTtlExpiry` methods |
      | 17 `[DX-242 SKIP — DX-215 EPIC AGENTS HANDLE]` markers in `src/poller/index.test.ts` — DX-215 epic comment says DX-219 should have cleared those | Still present |

      ### What this dispatch did

      1. Cleared stale `waiting_on: [DX-260]` (a 2026-05-11T07:26:21Z conflict-check timeout stamp; DX-260 is Done — operational artifact, not an active blocker).
      2. Created **DX-287 — "Event-Driven Worker > Phase 4b: Full event-driven scheduler engine + `_poll` dispatch-decision deletion"** with 8 ACs covering the 5 missing deliverables (reconcile step 8 emission, triage `setTimeout`, TTL `setTimeout`, settings.json chokidar + `onAgentRosterChange`, `_poll` dispatch-decision deletion + skip-marker cleanup).
      3. Inserted DX-287 into `DX-215.children[]` between DX-219 and DX-220; appended an epic comment summarizing the scope split.
      4. Stamped this card with `waiting_on: {by: [DX-287]}`. Per the worker's `forceWaitingOnToToDo` invariant, status normalizes to `ToDo` on save.

      ### What the next dispatch sees

      Once DX-287 reaches `status: Done`, the poller's reconcile auto-clears DX-220's `waiting_on` and re-offers the card for dispatch on the same tick. The next dispatch on DX-220 reads a code-state where the poller has been gutted of dispatch decisions, scheduler `bootRehydrate` exists, and timers are armed — meaning DX-220's *original* description-scope (slim cron + audit + rename `src/poller/index.ts` → `src/cron/sync-and-audit.ts` + inject move) becomes a self-contained ~200-LOC migration. No re-scoping needed here.

      ### Step 1.5 audit (You Fix What You Find)

      Mechanical "could I fix this in 10–30 minutes" check:

      - DX-287's scope is ~5 deliverables × ~200-800 LOC each + ~17 skip-marked tests to migrate + new test suites for `triage-timer` / `ttl-timer`. Realistic envelope: **~3000-5000 LOC across ~15-20 files, 2-3 dispatches**. Categorically not "30 minutes" and not "one dispatch."
      - The DX-219 retro itself proposed this exact split ("a new phase card gets inserted between DX-219 and DX-220") as a documented alternative.
      - No human action required — DX-287 is autonomous-dispatchable as soon as the poller picks it up.

      Therefore Step 10b (Waiting On), not Step 10 (Blocked) and not in-session implementation.
