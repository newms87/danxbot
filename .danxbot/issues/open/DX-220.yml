title: "Event-Driven Worker > Phase 5: Slim cron sweep + audit reconcile + rename poller module"
description: |-
  ## Context

  Phase 5 of the Event-Driven Worker epic (DX-215). After Phase 4 (DX-219) lands, every state mutation flows through `reconcileIssue`. The poller no longer derives state, mirrors Trello outbound, or makes dispatch decisions. The remaining poller work is (a) Trello inbound (no webhook substitute), (b) optional drift audit. This phase finalizes both.

  ## Solution

  ### Cron body — what stays

  The per-minute sweep retains exactly:

  1. `tracker.fetchOpenCards()` — Trello cannot push; minute cadence is unchanged.
  2. `bulkSyncMissingYamls(repo, tracker, refs)` — hydrate new tracker-born cards into `<repo>/.danxbot/issues/open/<id>.yml`. After hydration, the chokidar watcher fires → `reconcileIssue(card, "hydrate")` runs the full pipeline.
  3. Comment pull — Human-authored comments on the tracker copied into YAML's `comments[]`. After pull, watcher fires → reconcile.
  4. **Audit pass** — `for each open YAML: await reconcileIssue(card, "audit")`. Drift between current YAML state and what reconcile would produce is logged via `recordSystemError({source: "audit-drift"})` for one release. After zero drift observed in production, the audit becomes belt-and-suspenders (still runs; no longer alarms).

  That's it. ~200 LOC of cron body.

  ### Module rename

  Rename `src/poller/index.ts` → `src/cron/sync-and-audit.ts`. Every import updates. The `start()` / `shutdown()` exports keep their names. `setInterval` stays — this IS a 1-min cron now, not a tick loop.

  Delete from `src/poller/`:

  - `local-issues.ts` — `listDispatchableYamls`, `listInProgressYamls`, `listTriageDueYamls`, `listBlockedTodoYamls`. The scheduler reads from DB directly via the mirror-backed queries; no more YAML walks.
  - `live-dispatch-guard.ts` — replaced by per-dispatch TTL timers (Phase 4).
  - `triage-loop.ts` — replaced by per-card triage `setTimeout` (Phase 4).
  - `dispatch-reattach.ts` — boot scan logic moves into `src/dispatch/scheduler.ts#bootRehydrate`.
  - `orphan-push.ts` — already deleted in Phase 3.

  Keep but move:

  - `inject/` subtree — moves to `src/inject/` (skill + workspace inject is unrelated to polling).

  ### Boot rehydrate

  Worker boot order:

  1. Postgres + run migrations (unchanged).
  2. `startIssuesMirror` (chokidar + boot scan; unchanged).
  3. `scheduler.bootRehydrate(repo)` — read DB for in-progress dispatches, re-arm TTL timers; read every open YAML, re-arm triage timers.
  4. `startWorkerServer` (HTTP listener; unchanged).
  5. Slack listener (unchanged).
  6. `startCronSync(repo)` — the renamed minute-cadence sweep.

  ### Deleted from `_poll`

  After this phase the deletions list is:

  - `syncRepoFiles` per-tick call → moves to `inject` subtree triggered by config-file watch.
  - The DX-149 try/catch wrapper around `_poll` → still relevant; wraps the new cron body.
  - `parentChangesEarly` + `parentChanges` derivation calls → already deleted in Phase 2.
  - `pickupNamePrefix` filter, multi-agent pick, legacy dispatch path, `tryTriageDispatch`, `checkAndSpawnIdeator`, `recoverStuckCards`, `evictDeadDispatches` → already deleted in Phase 4.

  What remains in the renamed `sync-and-audit.ts`: ~200 LOC.

  ## Files

  Create:

  - `src/cron/sync-and-audit.ts` (renamed `src/poller/index.ts`).
  - `src/cron/audit-pass.ts` (the `for each open: reconcile(card, "audit")` loop with drift logging).
  - `src/cron/inbound-fetch.ts` (the `tracker.fetchOpenCards` + `bulkSyncMissingYamls` + comment pull).

  Modify:

  - `src/index.ts` — update import paths; new boot order.
  - `src/dispatch/scheduler.ts` — add `bootRehydrate` for triage + TTL timers.
  - Every importer of `src/poller/*` — update paths.
  - `Makefile` — any references to `src/poller/` change.

  Delete:

  - `src/poller/local-issues.ts`
  - `src/poller/live-dispatch-guard.ts`
  - `src/poller/triage-loop.ts`
  - `src/poller/dispatch-reattach.ts`
  - The old `src/poller/index.ts` after copy.

  Move:

  - `src/poller/inject/` → `src/inject/`.

  Update tests:

  - `src/poller/index.test.ts` → `src/cron/sync-and-audit.test.ts`. Strip every dispatch-decision case (Phase 4 owns those). Keep: Trello inbound fetch, hydration, comment pull, audit drift detection.
  - Every test importing `src/poller/*` updates to `src/cron/*` or `src/dispatch/*` per the move.

  ## Test plan

  1. `npx vitest run src/cron/` — cron sweep tests green.
  2. `npx vitest run src/dispatch/scheduler.test.ts` — boot rehydrate cases green.
  3. `npx vitest run` (full backend) green; no test imports the deleted modules.
  4. `make test-system` — full system suite green.
  5. `make deploy-smoke TARGET=gpt` — smoke test against a deploy target.
  6. `npx tsc --noEmit` green.
  7. **Drift audit observation:** run the cron sweep against a populated dev environment for at least 24h before merging Phase 6; record any `audit-drift` system errors. Zero drift required to ship Phase 6's deletion of the drift-error logging.

  ## Acceptance

  - `src/poller/index.ts` no longer exists. `src/cron/sync-and-audit.ts` is the renamed module, ~200 LOC.
  - Cron body retains only Trello inbound + audit reconcile loop.
  - Worker boot order rehydrates triage + TTL timers via `scheduler.bootRehydrate`.
  - Drift audit logs observed for 24h on a dev environment; zero drift required.
  - All tests updated to new paths; full suite + system tests + deploy-smoke green.
  - `src/poller/inject/` moved to `src/inject/`; no references to `poller/inject` remain.

  ## Out of scope

  - Cleanup of dead code paths beyond the deletions above (Phase 6).
  - Updating CLAUDE.md / `agent-dispatch.md` architecture diagrams (Phase 6).
  - New dispatch policies / new cron behaviors (kept to migration only).
  - Removing the audit pass entirely (kept as belt-and-suspenders even after drift = 0).
