title: 'SSE Phase 2: Codify "no client-side polling for server state" rule + audit'
description: |
  ## Context

  Phase 2 of DX-225. After Phase 1 lands, document the posture so a future contributor doesn't reintroduce a polling tab. Current source-check guard in `useDispatches.test.ts:192` and `useAgents.test.ts:232` (and after Phase 1, `useIssues.test.ts`) only fires on those three composables — the rule needs a written home.

  ## Solution

  ### 1. Add to `.claude/rules/dashboard.md`

  New section near the top, "Real-time Updates Are Mandatory":

  > Every dashboard composable that owns server state subscribes to `/api/stream` via `useStream`. **No `setInterval` may call into `api.ts`** — server state updates flow through the SSE bus, not a client clock.
  >
  > The backend pattern: in-process eventBus → `/api/stream` SSE topic → composable reducer. New panels must follow this chain — see `useDispatches.ts` (canonical reference), `useAgents.ts`, `useIssues.ts` (post-DX-226).
  >
  > If the server can't push the event (e.g. external-system pull): add an event source on the worker / dashboard that observes the change (chokidar for files, dispatch-tracker for in-process state, etc.) and publishes through the bus. Do not add a polling fallback.
  >
  > **Allowed:** purely-cosmetic local timers that re-render existing data without a server call (e.g. `AgentCard.vue`'s 60s elapsed-tick `now.value = Date.now()` to refresh "running 5m" labels). These never call `fetch*` from `api.ts`. Adding such a timer is fine; if it ever needs to call the server, you've crossed the line — convert to SSE.
  >
  > **Test guard:** every composable test file MUST include the source-check `expect(source).not.toMatch(/setInterval\s*\(/)` against its own composable file.

  ### 2. Audit pass

  - Grep `dashboard/src` for `setInterval` + `setTimeout.*\(refresh\|reload\|poll\|fetch` after Phase 1 lands.
  - Confirm only `AgentCard.vue`'s cosmetic tick remains.
  - For any newly-discovered violation, fix in this card (likely none after Phase 1).

  ### 3. Tests

  - `dashboard/src/components/agents/AgentCard.test.ts` (or smallest existing test file in that dir, write a small one if needed) — explicitly assert AgentCard's local tick does NOT import from `../../api`. Locks the cosmetic-only escape hatch in code, not just docs.
  - Repository-level test under `dashboard/src/__tests__/no-poll-imports.test.ts` (new) — programmatic sweep: read every `dashboard/src/composables/*.ts`, fail if any contains `setInterval` (lints the canonical layer once instead of needing per-file source-check guards).

  ## Acceptance

  - `.claude/rules/dashboard.md` updated with the new section and an explicit "AgentCard's clock tick is the only allowed local timer".
  - Repo-level no-poll-imports source-check test added under `dashboard/src/__tests__/`.
  - Cosmetic-only escape hatch test added (AgentCard does not import `api`).
  - `git grep "setInterval" dashboard/src` returns only the cosmetic timer (and tests).
  - All tests green; vue-tsc + tsc clean.

  ## Out of scope

  - Phase 1 work (DX-226).
  - New SSE topics beyond what Phase 1 introduces.
  - Backend rule changes — server-side polling (e.g. poller-tick interval) is unrelated; the rule scopes to client-side server-state freshness.
