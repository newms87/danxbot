title: "[Dashboard > Issues] Show created_at in drawer header alongside the age (updated_at) indicator"
description: |
  ## Context

  The issue drawer header (`dashboard/src/components/issues/DrawerHeader.vue:51`) shows ONLY the relative "updated X ago" label (`relativeTime(issue.updated_at)`). Operators frequently need to know when a card was first created — to triage stale Review queue entries, to decide whether a card has been sitting too long, to spot duplicates that arrived back-to-back. Today: no surface for that.

  The YAML doesn't carry `created_at` directly. Two viable sources exist already:

  1. **Trello card id is creation-encoded** — `external_id` is a MongoDB ObjectId; the first 8 hex chars are creation unix-seconds. Deterministic, no DB schema change. Works for every card that has ever been mirrored to Trello.
  2. **DB fallback** — for YAMLs created locally that haven't been pushed to Trello yet (`external_id: ""`), use the issues row's earliest `mirror_updated_at` (already tracked by chokidar in `src/db/issues-mirror.ts`).

  ## Solution

  ### Backend

  1. `src/dashboard/issues-reader.ts`
     - Add `created_at: number` (epoch ms) to `IssueListItem` AND `IssueDetail`.
     - Compute via new helper `deriveCreatedAt(issue, mirrorRow)`:
       - If `issue.external_id` matches `^[a-f0-9]{24}$` → parse first 8 hex chars as unix seconds, return `seconds * 1000`.
       - Else → return `mirrorRow.created_at_ms` (new column — see migration below) OR fall back to `mirrorRow.mirror_updated_at_ms` if the column hasn't backfilled yet.
     - Populate in both list (`buildIssueListItem`) and detail (`fetchIssueDetail`) paths.

  2. New migration `db/migrations/NNN_add_issues_created_at.sql`
     - `ALTER TABLE issues ADD COLUMN created_at TIMESTAMPTZ;`
     - Backfill: `UPDATE issues SET created_at = mirror_updated_at WHERE created_at IS NULL;` (one-time; the mirror's earliest-seen timestamp is the best retroactive proxy).
     - On future inserts (`src/db/issues-mirror.ts` — `INSERT … ON CONFLICT … UPDATE`), set `created_at = excluded.created_at` only on first insert (`COALESCE(issues.created_at, NOW())` in the UPDATE branch).

  ### Frontend

  3. `dashboard/src/types.ts` — re-export reflects the new field automatically (it lives in the backend type).
  4. `DrawerHeader.vue`
     - Render two labels in the existing meta row: `created <relative>` then `· updated <relative>` (existing label).
     - Tooltip on each shows the absolute ISO timestamp (`title="2026-04-01T13:42:00Z"`) — same pattern Vue uses for the elapsed badge in `AgentCard.vue`.
     - Style: small muted text, no layout change.

  ### Tests

  Backend (mandatory):

  1. `issues-reader.test.ts`
     - `deriveCreatedAt`: known Trello id `64f1a2b3c4d5e6f78901234` → returns `parseInt("64f1a2b3", 16) * 1000`.
     - `deriveCreatedAt`: empty `external_id` + mirror row with `created_at` → returns the mirror value.
     - `deriveCreatedAt`: empty `external_id` + null mirror `created_at` → falls back to `mirror_updated_at`.
  2. `issues-mirror.test.ts` — new insert sets `created_at = NOW()`; subsequent UPDATE on same row preserves the original `created_at`.
  3. Migration test (`db/migrations/*.test.ts` if the convention exists, else inline) — backfill assigns `created_at` from `mirror_updated_at` on existing rows.

  Dashboard SPA:

  4. `DrawerHeader.test.ts` (smallest existing equivalent) — renders both `created` and `updated` relative labels; tooltips show ISO; created label uses `data-test="drawer-created"` for the next reviewer.

  ### Manual smoke

  5. Open a Trello-born card in the drawer — `created` label shows the actual card creation time (matches Trello's "Added" timestamp).
  6. Create a fresh card via `danx_issue_create` (empty `external_id`) — `created` shows "just now"; after Trello mirrors back, refresh — same value (Trello id derivation matches the row's stored `created_at` within a second).

  ## Acceptance

  - `IssueListItem` + `IssueDetail` carry `created_at: number`.
  - `deriveCreatedAt` deterministic on Trello ids; falls back cleanly when missing.
  - Migration adds `created_at` column + backfills + insert path preserves first-seen.
  - Drawer header shows both `created <rel>` and `updated <rel>` with tooltips; no layout regression.
  - Backend + dashboard tests green; tsc + vue-tsc clean.

  ## Out of scope

  - A `Created` sort key on the IssueBoard (separate UX request if it comes up).
  - Backfilling `created_at` from git history of the YAML file (added complexity, marginal gain).
  - Per-status timestamps (`first_seen_in_progress`, etc.) — the lifecycle history already exists separately.
