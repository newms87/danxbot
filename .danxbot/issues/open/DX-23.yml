title: Expose danxbot_commit in /api/status response so docker workers can self-verify deploys
description: |-
  ## Why

  Trello [QqvncYfR](https://trello.com/c/QqvncYfR) ("Verify in prod: dispatches.danxbot_commit non-NULL after next gpt deploy") has now looped Needs Help → ToDo → in-progress → Needs Help twice. Each loop burns a full dispatch re-discovering the same constraint:

  - The card requires reading `dispatches.danxbot_commit` after a fresh prod dispatch.
  - Docker workers can hit `/api/launch` and `/api/status/:jobId` with the prod `DANXBOT_DISPATCH_TOKEN` (when materialized), but `getJobStatus` in `src/agent/launcher.ts:1027` does NOT include `danxbot_commit`.
  - The route that DOES expose it (`/api/dispatches`) is gated by `requireUser` (user bearer), per `src/dashboard/server.ts:204-247`.

  So even a fully credentialed external dispatcher can't close the loop on a "did the SHA make it into the row" verification today.

  ## Solution

  Add `danxbot_commit` to the `getJobStatus` return shape:

  ```ts
  // src/agent/launcher.ts:1027 — getJobStatus
  return {
    job_id: job.id,
    status: job.status,
    // ...existing fields...
    danxbot_commit: getDanxbotCommit(),  // ← new
  };
  ```

  `getDanxbotCommit()` already lives in `src/agent/danxbot-commit.ts` and reads `process.env.DANXBOT_COMMIT` first (with `git rev-parse` fallback). Calling it inside `getJobStatus` is cheap.

  ## Acceptance Criteria

  - `getJobStatus` returns `danxbot_commit: string | null` (string when env var or git is available, null otherwise).
  - Updated unit test in `src/agent/launcher.test.ts` (or wherever `getJobStatus` is currently tested) asserts the field is present with a known value when `DANXBOT_COMMIT` is set in the env.
  - `npx vitest run` green.
  - `npx tsc --noEmit` clean.
  - Once shipped to prod, parent card QqvncYfR can be auto-verified by a docker worker that hits `/api/launch` → `/api/status/:jobId` and reads back the SHA.

  ## Key Files

  - `src/agent/launcher.ts` (~line 1027)
  - `src/agent/launcher.test.ts` or whichever test file currently covers `getJobStatus`
  - Possibly the dashboard `dispatch-proxy.ts` if it strips fields on forward (does NOT today — verify before shipping).

  ## Found while

  Working on Trello QqvncYfR a second time (re-pickup loop).
