title: Orphaned dispatch processes hold agent slots — reattach must restore stall detection + JSONL-staleness liveness
description: |-
  ## Problem

  Multi-agent dispatches can become orphaned in three ways:

  1. **Worker restarted mid-dispatch.** The worker's `StallDetector` + `SessionLogWatcher` + `LaravelForwarder` for the in-flight dispatch live in worker memory; they die with the worker. `runStartupReattach` (`src/poller/dispatch-reattach.ts`) reads each open YAML's `dispatch{}` block, runs `checkYamlDispatchLiveness`, and registers the dispatch in `activeDispatches` so the poller's pick step skips it. **It does not recreate any of the runtime watchers.** The dispatched claude process keeps running with no monitoring.

  2. **Host-mode terminal tab closed by the operator.** The `script -q -f` + `claude` chain spawned via `wt.exe` gets reparented to `init` (PID 1) when the WT tab closes. PID stays alive, sometimes for hours. Same effect as #1: liveness check sees the alive PID and holds the agent slot.

  3. **Stuck claude (modal prompt, mid-tool-call hang).** Process burns CPU but produces no JSONL turn writes. `checkYamlDispatchLiveness` is PID-only — alive PID → verdict `alive` → slot held.

  **Observed in production today.** Dani (PID 18253, dispatch `d2ab2c73-...`) ran 1h+ at ~5–9% CPU with the session JSONL `7ce3abd8...` frozen for 46+ minutes. The poller correctly counted dani as busy via the DB row, refused to dispatch DX-215 + 6 other ToDo cards, and there was no automatic recovery — the operator had to `kill -TERM 18253` manually before slots could free.

  ## Effective recovery latency

  The only existing automatic recovery is the `dead-ttl` branch of `checkYamlDispatchLiveness`:

  ```
  checkYamlDispatchLiveness:
    if started_at + ttl_seconds * 1000 < now → dead-ttl  (cleanup path SIGTERMs)
    if pid <= 0 OR !isPidAlive(pid)          → dead-pid
    else                                      → alive
  ```

  Default `ttl_seconds = 7200` (2 hours). A stuck dispatch occupies one of the agent's slots for up to 2h before TTL evicts it, regardless of how long the JSONL has been silent. With `agentDefaults.maxConcurrent` typically equal to roster size, a single stuck dispatch can halve repo throughput for 2 hours.

  ## Proposed fixes (need design + brainstorm)

  **A. Reattach must re-establish runtime monitoring.** `runStartupReattach` should, for each `alive` verdict, locate the dispatch's JSONL by tag (`<!-- danxbot-dispatch:<id> -->`) under `~/.claude/projects/<encoded-cwd>/`, attach a fresh `SessionLogWatcher`, wire `StallDetector` + `LaravelForwarder` to it, and resume heartbeat. Concretely the `Job`-equivalent record needs to be reconstructed from the YAML's `dispatch{}` block + the located JSONL file. Open question: how to recover `Job.process` for cancellation when the original spawn handle is gone — likely a fresh `process.kill(pid, ...)` against the YAML's `dispatch.pid` is enough, but the `_cleanup` chain in `src/agent/launcher.ts#job.stop` needs to be runnable against a re-attached job too.

  **B. Add JSONL-staleness to liveness verdict.** Extend `LivenessVerdict` with a `dead-stalled` branch and a `JSONL_STALE_THRESHOLD_MS` (suggest 15 min, configurable via `agentDefaults`). When `now - jsonlMtime > threshold` AND the PID is alive, the verdict becomes `dead-stalled` and the cleanup path SIGTERMs the orphan. This is independent of (A) — even without restoring full StallDetector, a per-tick liveness check that knows about JSONL freshness would have evicted dani inside 15 minutes instead of waiting 2h.

  **C. Tighten TTL defaults / make per-workspace.** 7200s is too generous for the typical card. A 30–60min ceiling for `issue-worker` workspace + per-card override (`dispatch.ttl_seconds` already supports this) would lower the worst-case orphan dwell-time even if (A) and (B) fail.

  (A) + (B) together close the recovery loop; (C) lowers blast radius. Build (B) first — single-file change in `dispatch-liveness-yaml.ts`, lowest risk. Then (A).

  ## Acceptance Criteria

  - [ ] `checkYamlDispatchLiveness` returns `dead-stalled` when JSONL mtime is older than `JSONL_STALE_THRESHOLD_MS` AND PID is alive. Threshold lives in a constant (`src/poller/constants.ts`) with a TODO to lift to `agentDefaults`. Unit tested in `src/poller/dispatch-liveness-yaml.test.ts`.
  - [ ] Per-tick liveness scan (the `_poll` consumer of the planner) evicts `dead-stalled` entries the same way it evicts `dead-pid` / `dead-ttl` and SIGTERMs the orphan PID. Integration test: spawn a fake-claude that exits without writing JSONL, run a tick, assert eviction + kill.
  - [ ] On worker boot, `runStartupReattach` for each `alive` action: locates the dispatch JSONL by tag, attaches a `SessionLogWatcher`, wires `StallDetector` + `LaravelForwarder`, restarts heartbeat. New test in `src/poller/dispatch-reattach.test.ts`.
  - [ ] `Job` cleanup chain in `src/agent/launcher.ts` is reusable against a reconstructed (post-reattach) job — the `_cleanup` callback list, the close-listener registration, and `job.stop` must work without the original spawn handle.
  - [ ] Dashboard surfaces a `stalled` reason when a dispatch is evicted via `dead-stalled` so operators see why a slot freed (existing dispatches list — add a column or badge).
  - [ ] System test (`src/__tests__/system/run-system-tests.sh`) covers the orphan-recovery flow end-to-end: spawn a dispatch, kill the worker, restart it, confirm reattach restores monitoring AND a JSONL-stalled dispatch gets killed.
  - [ ] CLAUDE.md / `.claude/rules/agent-dispatch.md` "Stall Recovery" section updated to document the new `dead-stalled` verdict and reattach-restores-monitoring contract.

  ## Repro (today's actual incident)

  1. Worker started ~03:50 BRT.
  2. Dani's dispatch `d2ab2c73-...` was running before the worker restart (started 03:25).
  3. Worker boot reattach registered dani as `alive` (PID 18253 still alive, TTL not expired).
  4. No `StallDetector` / `SessionLogWatcher` recreated. Dani's session JSONL `7ce3abd8` last write 03:42 — process burned 5–9% CPU producing no semantic output for 46 minutes.
  5. Multi-agent picker correctly counted dani as busy via `dispatches` DB row (`agent_name=dani, status=running`), so DX-215 + 6 other ToDo cards waited.
  6. Operator had to `kill -TERM 18253` manually to free the slot. Without manual intervention, the slot would have stayed held until ~05:25 BRT (TTL expiry, 2h after `started_at`).

  ## Out of Scope

  - Cross-host orphan recovery (the `cross-host` verdict is fine for the local-only deploys we have today; multi-host design is its own card).
  - Replacing the host-mode `wt.exe` decoupling — closing the WT tab will continue to leave a reparented process; this card fixes the recovery side, not the prevention side.
