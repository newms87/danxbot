title: "[Danx UI Adoption] Toggle + RangeSlider components for agent schedule UI"
description: |-
  ## Context

  The danxbot dashboard's `AgentScheduleEditor.vue` (DX-160 Phase 2) currently uses raw `<input type="text">` for `HH:MM-HH:MM` per-day windows + a native `<input type="checkbox">` for the agent-level enable. The redesigned schedule UI (24/7 master toggle + per-day on/off + dual-handle range slider for the active window) wants two reusable primitives danx-ui doesn't yet ship:

  1. **`DanxToggle`** ŌĆö accessible boolean switch with v-model, sized variants, disabled state, three-tier CSS tokens.
  2. **`DanxRangeSlider`** ŌĆö single OR dual-handle range input with v-model, min/max/step, keyboard support, disabled state, value formatter slot.

  `~/web/danx-ui` (the `@thehammer/danx-ui` package source) currently has: `badge`, `button`, `chip`, `code-viewer`, `dialog`, `field-wrapper`, `icon`, `input`, `markdown-editor`, `popover`, `progress-bar`, `select`, `skeleton`, `tabs`, `textarea`, `toast`, `tooltip`. Neither toggle nor slider exists. (`useNestedJsonToggle.ts` is a code-viewer composable, not a component.)

  This epic owns the upstream component build, the publish, and the danxbot-side swap. A temporary native-input implementation lands in danxbot first (separate small commit) so the schedule UX is shipped before this epic completes; the swap phase (DX-251) replaces those temporary inputs once `@thehammer/danx-ui` exposes the new components.

  ## Goals

  - Build `DanxToggle` + `DanxRangeSlider` in `~/web/danx-ui` per its component-architecture rules: `defineModel`, `<script setup lang="ts">`, named exports, three-tier tokens, 100% test coverage, demo page registered in all three places (`demo/main.ts`, `demo/App.vue`, `demo/composables/useLivePreview.ts`), `docs/*.md` user reference, `yarn test:coverage` clean, `/flow-verify` passing.
  - Publish a new `@thehammer/danx-ui` minor version exposing the two components + their styles via `package.json` exports. Publishing IS the completion step (`thehammer-publish` skill ŌĆö standing autonomous-publish authorization). No operator gate.
  - Swap `AgentScheduleEditor.vue` in danxbot from native inputs ŌåÆ `DanxToggle` + `DanxRangeSlider`. Verify visually + via existing dashboard tests.

  ## Phases

  | Card | Phase | Scope |
  |---|---|---|
  | DX-248 | Phase 1 | `DanxToggle` component in `~/web/danx-ui/src/components/toggle/`. Sizes (sm/md/lg), v-model boolean, disabled, label slot, ARIA `role="switch"`, three-tier tokens (`--dx-toggle-*`), 100% coverage, demo page, `docs/toggle.md`. |
  | DX-249 | Phase 2 | `DanxRangeSlider` component in `~/web/danx-ui/src/components/range-slider/`. v-model `number \| [number, number]` (single vs dual-handle inferred from initial value or `dual` prop), `min`/`max`/`step`/`disabled`, value formatter slot, keyboard arrow + page nav, ARIA `role="slider"` per handle, three-tier tokens (`--dx-range-*`), 100% coverage, demo page, `docs/range-slider.md`. |
  | DX-250 | Phase 3 | Publish `@thehammer/danx-ui` minor bump (`yarn build` ŌåÆ `npm publish`) with both components exported. Verify `package.json#exports` exposes `./components/toggle`, `./components/toggle/styles`, `./components/range-slider`, `./components/range-slider/styles`. Smoke test: `npm view @thehammer/danx-ui dist.tarball` shows the new files. Publishing follows the standing-authorization rule for `@thehammer/*` (no operator gate). |
  | DX-251 | Phase 4 | In danxbot: `yarn add @thehammer/danx-ui@latest` in `dashboard/`. Replace the temporary native-input UI in `AgentScheduleEditor.vue` with `DanxToggle` (24/7 master + per-day on/off) and `DanxRangeSlider` (per-day window). Update `dashboard/src/components/__tests__/` accordingly. Confirm `cd dashboard && npx vitest run` + `cd dashboard && npx vue-tsc --noEmit` pass. |

  ## Locked decisions

  - **Two separate cards for the components.** Toggle + RangeSlider are independent surface; one PR per component lets test/doc/demo work parallelize cleanly.
  - **Dual-handle inferred from v-model shape.** `v-model="num"` ŌåÆ single. `v-model="[lo, hi]"` ŌåÆ dual. Avoids a `mode` prop that conflicts with the model.
  - **No emit for "release" vs "input".** RangeSlider emits `update:modelValue` on every value change. If a consumer needs throttling that's their concern.
  - **CSS tokens only, no styling props.** Per danx-ui forbidden-patterns table. Variants (danger/success/etc.) via the shared `useVariant` composable.
  - **Publish is autonomous.** `thehammer-publish` skill carries the standing authorization. Phase 3 does not pause for operator approval.
  - **Temp native-input UI ships separately.** A small companion commit in danxbot (NOT a card in this epic ŌĆö temporary by design) implements the new schedule shape (`always_on` master + per-day on/off + range slider) using native `<input type="checkbox">` + two native `<input type="range">`. Lives until DX-251 swaps them out.

  ## Out of scope

  - No new variant types specific to toggle/range ŌĆö reuse `VariantType` from `src/shared/types`.
  - No theme overhaul of existing components.
  - No backend schema changes ŌĆö the schedule data shape (`AgentSchedule`) gets one additive field (`always_on: boolean`) handled in the temp-impl commit, not this epic.

  ## Acceptance (epic-level ŌĆö verified after Phase 4)

  - `import { DanxToggle, DanxRangeSlider } from "@thehammer/danx-ui"` works in danxbot's dashboard.
  - `AgentScheduleEditor.vue` contains zero native `<input type="checkbox">` / `<input type="range">` ŌĆö every interactive control is a Danx UI component.
  - `cd ~/web/danx-ui && yarn test:coverage` passes 100% thresholds.
  - `cd ~/web/danxbot && npx vitest run` + `cd dashboard && npx vitest run` + `cd dashboard && npx vue-tsc --noEmit` all green.
  - `npm view @thehammer/danx-ui versions` includes the new minor with both components.
