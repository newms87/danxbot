  - **NEW** `src/components/toggle/DanxToggle.vue`
  - **NEW** `src/components/toggle/toggle.css`
  - **NEW** `src/components/toggle/types.ts`
  - **NEW** `src/components/toggle/index.ts`
  - **NEW** `src/components/toggle/__tests__/DanxToggle.test.ts`
  - **NEW** `demo/pages/TogglePage.vue`
  - **NEW** `docs/toggle.md`
  - **EDIT** `src/index.ts` ‚Äî add `export * from "./components/toggle"`
  - **EDIT** `package.json#exports` ‚Äî add `./components/toggle` + `./components/toggle/styles`
  - **EDIT** `vite.config.ts` (library entries if needed)
  - **EDIT** `demo/main.ts` ‚Äî route entry
  - **EDIT** `demo/App.vue` ‚Äî sidebar `<RouterLink>`
  - **EDIT** `demo/composables/useLivePreview.ts` ‚Äî `REGISTERED_COMPONENTS` + `AVAILABLE_VALUES`

  ## Acceptance

  - [ ] `DanxToggle.vue` exists with full comment block (Purpose, @props, @emits, @slots, @tokens, @example)
  - [ ] Native `<input type="checkbox">` is the underlying control (visually hidden, not removed)
  - [ ] `Space`/`Enter` keypresses toggle; clicks on the optional label slot also toggle
  - [ ] `disabled` prop blocks interaction + applies dimmed token
  - [ ] `variant` prop wires through `useVariant` w/o creating a component-specific variant type
  - [ ] `size` variants render via top-level BEM modifier blocks (`.danx-toggle--sm`, `.danx-toggle--lg`) ‚Äî NOT `&--suffix` concatenation
  - [ ] `toggle.css` contains zero raw color values (only `var()` to semantic tokens)
  - [ ] `__tests__/DanxToggle.test.ts` covers: prop rendering, `update:modelValue` emission, slot rendering, disabled blocks updates, keyboard toggling, ARIA attributes, all three sizes, variant style application
  - [ ] Zero `[Vue warn]` in test stderr
  - [ ] `yarn test:coverage` passes 100% line/function/branch/statement thresholds
  - [ ] Demo page exists at `demo/pages/TogglePage.vue` showing all sizes, disabled, variants, with-label, label-clickability
  - [ ] Demo registered in `demo/main.ts`, `demo/App.vue`, AND `demo/composables/useLivePreview.ts` (all three)
  - [ ] `docs/toggle.md` user reference: install, basic usage, props table, events, slots, tokens table, examples
  - [ ] `src/index.ts` re-exports `DanxToggle` + types
  - [ ] `package.json#exports` adds `./components/toggle` + `./components/toggle/styles` paths
  - [ ] `yarn typecheck` + `yarn lint` clean
  - [ ] `/flow-verify` passes (mandatory pre-commit gate per danx-ui CLAUDE.md)
  - [ ] Commit follows danx-ui's conventional commit style; PR-ready (no publish in this card ‚Äî DX-250 handles publish)
