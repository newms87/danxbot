title: "Danx UI > Phase 1: DanxToggle component"
description: |-
  ## Context

  Phase 1 of DX-247. `~/web/danx-ui` does not currently ship a toggle/switch primitive. The danxbot dashboard's redesigned `AgentScheduleEditor.vue` needs one for the 24/7 master switch and per-day on/off toggles. Building it in danx-ui first (rather than inline in danxbot) preserves the zero-tech-debt rule on shared primitives and gives every other danx-ui consumer access to the component.

  Work happens in `~/web/danx-ui/`. The agent picking this up MUST first read `~/web/danx-ui/CLAUDE.md` + `~/web/danx-ui/.claude/rules/component-architecture.md` + `tailwind-v4.md` + `testing.md` + `demo-live-preview.md`.

  ## Solution

  ### New component: `src/components/toggle/`

  ```
  src/components/toggle/
  ‚îú‚îÄ‚îÄ DanxToggle.vue
  ‚îú‚îÄ‚îÄ toggle.css
  ‚îú‚îÄ‚îÄ types.ts
  ‚îú‚îÄ‚îÄ index.ts
  ‚îî‚îÄ‚îÄ __tests__/
      ‚îî‚îÄ‚îÄ DanxToggle.test.ts
  ```

  ### Component contract

  ```vue
  <DanxToggle v-model="enabled" />
  <DanxToggle v-model="enabled" size="lg" />
  <DanxToggle v-model="enabled" disabled />
  <DanxToggle v-model="enabled">
    <span>Always on</span>
  </DanxToggle>
  ```

  | Prop | Type | Default | Notes |
  |---|---|---|---|
  | `modelValue` | `boolean` | required (via `defineModel<boolean>`) | v-model |
  | `size` | `"sm" \| "md" \| "lg"` | `"md"` | Sizing variants |
  | `disabled` | `boolean` | `false` | Locks interaction; visual dim via tokens |
  | `variant` | `VariantType` | `""` | Reuses shared `useVariant` for danger/success/etc. |

  | Slot | Purpose |
  |---|---|
  | default | Optional label rendered next to the switch (clickable) |

  | Event | Payload |
  |---|---|
  | `update:modelValue` | New boolean value (emitted by `defineModel`) |

  ARIA: root element gets `role="switch"`, `aria-checked` mirrors model, `aria-disabled` when disabled. Keyboard: `Space` + `Enter` toggle. Native `<input type="checkbox">` is the underlying control (visually hidden) so form submission + a11y trees still work.

  ### Tokens (component ‚Üí semantic)

  ```css
  .danx-toggle {
    --dx-toggle-track-bg: var(--color-surface-muted);
    --dx-toggle-track-bg-on: var(--color-accent);
    --dx-toggle-thumb-bg: var(--color-on-accent);
    --dx-toggle-thumb-shadow: var(--shadow-sm);
    --dx-toggle-track-w-md: 36px;
    --dx-toggle-track-h-md: 20px;
    --dx-toggle-thumb-size-md: 16px;
    /* sm/lg variants */
  }
  ```

  Component token file (`toggle.css`) MUST contain only `var()` references per `tailwind-v4.md`. If a needed semantic token is missing, add it to the semantic layer first.

  ### Variant integration

  Use `useVariant` from `src/shared/composables/useVariant.ts`:

  ```ts
  const variantStyle = useVariant(computed(() => props.variant), "toggle", {
    "--dx-toggle-track-bg-on": "bg",
    "--dx-toggle-thumb-bg": "text",
  });
  ```

  Apply via `:style="variantStyle"` on the track element.

