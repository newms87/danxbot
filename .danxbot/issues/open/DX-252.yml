      <!-- danxbot -->

      ## Related fixes landed 2026-05-11 — re-evaluate this card after they're in effect

      A poller-idle-with-ToDo-queue stall was observed today with the SAME symptom (zero dispatches, queue full, no `multi-agent pick` log lines) but a DIFFERENT root cause than the teamRunning hypothesis here.

      **Root cause this time**: 6 ToDo YAMLs carried stale `dispatch:` blocks from previous failed dispatches. `listDispatchableYamls` filters every card with non-null `dispatch` (`if (i.dispatch !== null) return false`), so all 6 cards became invisible to the picker. Stamps accumulated because:

      1. `multi-agent-pick.ts` catch on dispatch failure logged + continued — it did NOT clear the just-stamped YAML.
      2. `serializeIssue` crashed (`Cannot read properties of undefined (reading 'reason')`) on YAMLs predating DX-231 that lacked the `requires_human` field, so boot reattach couldn't clean up the stamps either.

      Either bug alone would have prevented the wedge; together they made it self-sustaining.

      **Commits**:
      - `3bb361e` — fix(poller): clear stamped YAML on dispatch failure + tolerate missing requires_human
      - `0665a35` — refactor(poller): derive effective waiting_on at read time (DX-219 follow-up, unrelated to this bug but landed in the same session)

      **Action for this card**: re-evaluate whether the teamRunning-stuck path is still reproducible. If the original 2026-05-10 14:18 incident might have been the YAML-stamp variant (the `87174bb3` recovery dispatch could have failed post-stamp without clearing) — root-cause hypothesis A above stops applying. If teamRunning is provably still stuck via a different path, keep this card and the diagnostics it proposes; if not, move to Done with a retro noting that the YAML-stamp fixes likely closed the same window.
