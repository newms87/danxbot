title: "Dashboard toggle: Playwright MCP vs Claude-in-Chrome for host-mode dispatch"
description: |-
  ## Context

  Host-mode dispatches (`make launch-worker-host`) currently inject the workspace `.mcp.json` verbatim from `src/poller/inject/workspaces/issue-worker/.mcp.json`. That config declares a `playwright` MCP server pointing at `http://playwright:3000` — the danxbot-net Docker DNS name. The host worker cannot resolve that hostname (`danxbot-playwright-1` has no host-port binding), so the agent's TUI reports `1 MCP server failed` at boot and every `playwright_*` tool call would time out.

  Meanwhile Claude Code ships built-in browser automation (`mcp__claude-in-chrome__*` tools) that work directly in the operator's Chrome via the extension — natively available in host-mode dispatch, never available in headless docker-mode dispatch.

  Different runtimes have different best-fit browser tools:

  - **Docker-mode worker** — Playwright MCP works (container-to-container DNS). Claude-in-Chrome won't (no Chrome / no extension in headless container).
  - **Host-mode worker** — Claude-in-Chrome works natively. Playwright requires either a host port-map or a remote-URL config.

  Today the inject pipeline picks one for both, optimised for docker. Host-mode operators eat the broken playwright entry on every dispatch.

  ## Goal

  Per-repo operator toggle on the dashboard **Agents tab** that selects the browser-tool surface for THIS repo's dispatches. Toggle interacts with runtime detection:

  - `docker` runtime → default `playwright`, opt-in `claude-in-chrome` allowed but flagged "rare; needs Chrome on the worker host".
  - `host` runtime → default `claude-in-chrome` (zero setup), opt-in `playwright` requires the operator to configure a reachable URL (host port-map OR remote/public URL).

  Toggle's job:

  1. Pick the browser-tool surface for the dispatched agent.
  2. Drive the inject step that writes the workspace `.mcp.json` so the agent sees only servers it can actually reach.
  3. Persist via `<repo>/.danxbot/settings.json` `overrides` (three-valued `playwright | claude-in-chrome | null`) per the contract in `.claude/rules/settings-file.md`.

  The toggle MUST survive every deploy + restart, follow the existing `isFeatureEnabled` precedent for runtime reads, and not require a worker restart to take effect (poller reads settings every tick).

  ## Acceptance

  - [ ] Phase 1 (investigation) lands first; its output fills the rest of this epic's phase children.
  - [ ] Operator can toggle per-repo browser-tool surface on the dashboard Agents tab.
  - [ ] Host-mode dispatch with toggle = `claude-in-chrome` → workspace `.mcp.json` has NO playwright entry → no `1 MCP server failed` noise.
  - [ ] Host-mode dispatch with toggle = `playwright` → workspace `.mcp.json` has the playwright entry + correctly-substituted `PLAYWRIGHT_URL` the host can actually reach.
  - [ ] Docker-mode dispatch default preserved (playwright on, claude-in-chrome off).
  - [ ] Settings file ownership rules followed — `overrides` survive every deploy + restart (per `.claude/rules/settings-file.md`).
  - [ ] Tests: workspace `.mcp.json` shape under each `{runtime, toggle}` combo.
  - [ ] `.claude/rules/docker-runtime.md` + `.claude/rules/agent-dispatch.md` cross-reference the toggle and document the runtime-default behaviour.

  ## Notes

  - Observed during 2026-05-11 incident: every host-mode dispatch logs `1 MCP server failed` because the inject-shipped playwright entry can't reach `http://playwright:3000`. The agent runs through (built-in tools fine) so the failure is cosmetic, not blocking — but operators see noise on every dispatch.
  - Stripping the playwright entry blindly in host-mode is the obvious quick fix. This epic chooses the durable path: operator-chosen surface with proper plumbing so both modes are first-class.
  - `.claude/rules/agent-dispatch.md` row "Forbidden Patterns" already warns against runtime-coupled hacks; the toggle keeps the inject pipeline runtime-neutral and surfaces the choice to the operator.
