title: "[Dashboard] Card-edit completeness — DX-231 follow-up gaps"
description: |-
  ## Context

  DX-231 ("Kill `Needs Approval` status; add `requires_human` field + full dashboard card interactivity") shipped via phase cards DX-232..DX-239 in the kickoff session on 2026-05-10. Re-reading that session's transcript surfaced four scope items the user approved during brainstorming that were **not** captured into any of the original phase cards. This epic owns the cleanup so the original DX-231 vision is fully delivered.

  ## Gaps captured here (each a phase card)

  1. **Same-column reordering** — DX-237 implemented column-to-column DnD only. User said "just like Trello" which implies intra-list drag-to-reorder with a persisted position field. No card owns this.
  2. **Auto-cleanup of legacy `Needs Approval` list + label** on connected repo Trello boards. DX-234 explicitly punts ("operator removes by hand"); user intent "get rid of" implies automated removal. Also covers migration of any stray Review-list cards that still carry the old label.
  3. **Comments author rendering** — DX-236 stamps `comments_append.author` server-side from the bearer-token user; DX-238 composer never surfaces that author in the rendered comments list. Comments display today shows text + timestamp only.
  4. **Epic-level `requires_human` aggregate badge** — §2 of the original brainstorm spec called for "Epic UI surfaces child count". DX-239 indicators cover the per-card / drawer / epic-children-list indicators but no rollup count badge on the epic itself.

  ## Phases are independent

  Different files, different domains (DnD position field vs Trello config sync vs comments SFC vs epic header SFC). No `waiting_on` chain — phases dispatch in any order.

  ## Out of scope (separate card)

  The `claude-plugins/danxbot` publish-step ownership gap is unrelated to dashboard card editing — filed as a standalone card sibling to this epic.
