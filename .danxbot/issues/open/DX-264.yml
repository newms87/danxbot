title: "Card-edit gaps > Phase 1: Same-column drag-to-reorder + persisted position"
description: |-
  ## Context

  DX-237 ("Dashboard DnD board â€” drag cards between columns with tilted-card visual") shipped column-to-column drag only. Within a column, cards render in the dashboard's existing sort order (created_at / triage.ice.total â€” see `dashboard/src/components/IssuesBoard.vue` and `src/dashboard/issues-aggregator.ts`). The user's brainstorm ask was "just like Trello" which includes drag-to-reorder *within* a list to set human priority, distinct from triage's automated ICE ranking.

  The poller's dispatch sort (`src/poller/local-issues.ts#listDispatchableYamls`) is "untriaged first, then `triage.ice.total` DESC, FIFO by mtime within tier". Adding a manual position field gives the operator an override that wins over the ICE tier â€” useful when the human knows context the triage agent doesn't.

  ## Solution

  Add a `position` numeric field to the YAML schema (sparse â€” most cards have `position: null` and fall back to ICE-then-mtime ordering). Sort within a column: cards with non-null `position` first ASC, then existing ICE / mtime tier. DnD drop within the same column writes the dragged card's new `position` value.

  Position values use the standard "fractional indexing" / "lexorank" approach to avoid mass-renumbering on every drop: insert between two neighbors â†’ new position = average of neighbors' positions; insert at top / bottom â†’ neighbor Â± gap. Reuse a small npm helper (`fractional-indexing`) rather than hand-rolling.

  PATCH `/api/issues/:id` (`src/dashboard/issue-write.ts`) extends the allowlist with `position: number | null`. Worker's poller dispatch sort updated to honor the field. SSE `issue:updated` payload already covers downstream UI refresh.

  ## Key files

  - `src/issue-tracker/interface.ts` â€” add `position` to `Issue` type + bump `schema_version` minor (loader passthrough â€” no migration needed since `null` is the default).
  - `src/dashboard/issue-write.ts` â€” extend patch allowlist + validate finite number or null.
  - `src/poller/local-issues.ts#listDispatchableYamls` â€” add `position` ASC tier above the existing ICE tier.
  - `src/dashboard/issues-aggregator.ts` â€” same sort applied to dashboard board ordering.
  - `dashboard/src/components/IssuesBoard.vue` â€” wire intra-column drop event â†’ PATCH `position`.
  - `dashboard/package.json` â€” add `fractional-indexing` dep.

  ## How to verify

  - Drag two cards within ToDo to swap order â†’ refresh page â†’ order persists.
  - `mcp__danx-issue__danx_issue_get` on a reordered card shows the `position` value.
  - Poller picks the manually-top card next, regardless of ICE score (verify with two ToDo cards where the lower-ICE card is dragged to top).
