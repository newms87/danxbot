title: "Card-edit gaps > Phase 4: Epic-level `requires_human` aggregate count badge"
description: |-
  ## Context

  The §2 design in the DX-231 brainstorm spec called for "Epic UI surfaces child count" of phases that have `requires_human != null`. DX-239 ("Indicators") delivered:
  - Per-card indicator on `IssueCard.vue` when the card itself has `requires_human`.
  - Drawer indicator with reason + steps.
  - Subscript on the epic's children list (per-child marker).

  What's missing: a **rollup aggregate badge on the epic's own card / drawer header** showing the count of children with `requires_human` set. Without it, an operator scanning the board sees a clean epic card while one of its phases is silently parked. The drawer's children panel is a click-deeper view; the badge belongs at the epic glance level.

  The data flow already exists — every `Issue` is in the dashboard's reactive store and `children[]` is `ISS-N` references. The aggregator + UI changes only.

  ## Solution

  Compute the count in the existing issues aggregator (`src/dashboard/issues-aggregator.ts` or its dashboard-side equivalent — the field that powers the board view). For every Epic, walk `children[]`, look up each child in the same store, count `requires_human != null`. Emit on the parent issue payload as `requires_human_child_count: number`.

  Render the badge in two places:
  - `IssueCard.vue` (board view) — small badge top-right of the card, only when `type === "Epic" && requires_human_child_count > 0`. Click → opens drawer with children panel scrolled to the first flagged child.
  - `IssueDrawer.vue` header (when an Epic is open) — same number with text "X phase(s) need human action".

  SSE `issue:updated` already broadcasts on every child write — the aggregator recomputes on the same event, so the badge stays live without extra subscriptions.

  The badge **does NOT** affect epic status derivation (the parent rollup ignores `requires_human` per the issue-card-workflow contract — that's intentional and stays).

  ## Key files

  - `src/dashboard/issues-aggregator.ts` (or wherever the issues SSE payload is shaped) — add `requires_human_child_count`.
  - `src/issue-tracker/interface.ts` — extend `Issue` (or a sibling DTO) with the optional aggregate field; document as "computed, not persisted".
  - `dashboard/src/components/IssueCard.vue` — render badge for Epics.
  - `dashboard/src/components/IssueDrawer.vue` — render header text for Epics.
  - `dashboard/src/types.ts` — pick up the new optional field via the existing re-export.

  ## How to verify

  - Create an Epic with two phase children; flag one child via the dashboard's "Flag for human" affordance → epic card shows badge `1`; drawer header reads "1 phase needs human action".
  - Clear the flag on the child → badge disappears within one SSE tick.
  - Existing per-child indicators still render (no regression).
  - Backend vitest covers the aggregator branch; dashboard vitest covers the badge render.
