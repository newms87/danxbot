title: "Plugin consolidation > Phase 1: Reconcile 5 drifted skills/rules into plugin (newer wins)"
description: |-
  ## Context

  Five files exist in BOTH `~/web/claude-plugins/danxbot/skills/<name>/SKILL.md` AND `~/web/danxbot/src/poller/inject/workspaces/issue-worker/.claude/{rules,skills}/<name>/...`. They have drifted. Audit (2026-05-11):

  | Plugin path | Inject path | Plugin lines | Inject lines | Newer side |
  |---|---|---|---|---|
  | `danxbot/skills/comment-style/SKILL.md` | `rules/danx-comment-style.md` | 43 | 38 | needs diff |
  | `danxbot/skills/halt-flag/SKILL.md` | `rules/danx-halt-flag.md` | 86 | 81 | needs diff |
  | `danxbot/skills/no-unauthorized-worker-launch/SKILL.md` | `rules/danx-no-launch-worker.md` | 86 | 87 | inject 1 line newer |
  | `danxbot/skills/danx-next/SKILL.md` | `skills/danx-next/SKILL.md` | 617 | 684 | inject 67 lines newer |
  | `danxbot/skills/danx-triage-card/SKILL.md` | `skills/danx-triage-card/SKILL.md` | 344 | 359 | inject 15 lines newer |

  Also `danx-no-launch-worker.md` is triple-drifted (slack-worker copy is 74 lines, issue-worker 87, plugin 86) — slack-worker is yet a third version. Reconcile all three into the plugin's single source.

  ## Solution

  Per file:
  1. `diff` the plugin vs inject content semantically (not just line count — could be additions on either side).
  2. Manually merge: usually inject is newer (agent edits land there first because dispatched agents have no plugin write path), so inject content wins; cherry-pick any plugin-only additions that came from the operator session.
  3. Write merged content to plugin file (preserve plugin's frontmatter — `name`, `description`, etc.).
  4. `cd ~/web/claude-plugins && git diff` to verify changes look right.
  5. Commit + push the plugin repo. NOT yet deleted from inject (Phase 3).

  This phase only edits + pushes the plugin. Inject files stay until Phase 3 swaps the writer.

  ## Key files

  - `~/web/claude-plugins/danxbot/skills/comment-style/SKILL.md`
  - `~/web/claude-plugins/danxbot/skills/halt-flag/SKILL.md`
  - `~/web/claude-plugins/danxbot/skills/no-unauthorized-worker-launch/SKILL.md`
  - `~/web/claude-plugins/danxbot/skills/danx-next/SKILL.md`
  - `~/web/claude-plugins/danxbot/skills/danx-triage-card/SKILL.md`
  - Source-of-truth inject paths: `~/web/danxbot/src/poller/inject/workspaces/{issue-worker,slack-worker}/.claude/{rules,skills}/...`

  ## How to verify

  - `for s in comment-style halt-flag no-unauthorized-worker-launch danx-next danx-triage-card; do diff <(sed '1,/^---$/d; 1,/^---$/d' ~/web/claude-plugins/danxbot/skills/$s/SKILL.md) <(grep -v '^---' ~/web/danxbot/src/poller/inject/workspaces/issue-worker/.claude/{rules,skills}/$s*/...) ; done` shows zero meaningful body diffs (frontmatter expected to differ).
  - Plugin commit pushed to `git@github.com:newms87/claude-plugins`.
  - Run `/reload-plugins` in this session → no errors.
