title: "Plugin consolidation > Phase 3: Delete inject duplicates + retire writer code paths"
description: |-
  ## Context

  After Phase 1 (5 reconciled into plugin) + Phase 2 (5 added to plugin), every static rule / skill in the inject pipeline has a plugin equivalent. Time to delete the inject copies AND remove the writer code that mirrors them into each connected repo's workspace dir on every poll tick.

  11 files to delete:

  **issue-worker rules:**
  - `src/poller/inject/workspaces/issue-worker/.claude/rules/danx-comment-style.md`
  - `.../rules/danx-halt-flag.md`
  - `.../rules/danx-no-launch-worker.md`
  - `.../rules/danx-no-false-blockers.md`
  - `.../rules/danx-no-interactive.md`
  - `.../rules/danx-requires-human.md`

  **issue-worker skills:**
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-epic-link/SKILL.md`
  - `.../skills/danx-ideate/SKILL.md`
  - `.../skills/danx-next/SKILL.md`
  - `.../skills/danx-start/SKILL.md`
  - `.../skills/danx-triage-card/SKILL.md`
  - `.../skills/issue-blocker/SKILL.md`

  **slack-worker rules:**
  - `src/poller/inject/workspaces/slack-worker/.claude/rules/danx-no-launch-worker.md`
  - `.../rules/danx-slack-agent.md`

  (That's 14 files including slack-worker. Same set of skills/rules — just deduplicated across workspaces.)

  ## Solution

  1. **Delete the source files** under `src/poller/inject/workspaces/<workspace>/.claude/{rules,skills}/` per the list above. Leave the workspace structural files (`.mcp.json`, `workspace.yml`, `CLAUDE.md`, `.claude/settings.json`) — those stay in inject. Leave per-repo rendered files alone — those are written by `renderPerRepoFilesIntoWorkspaces`, not by the workspace inject.
  2. **Update `injectDanxWorkspaces`** (in `src/poller/index.ts` / `src/poller/inject/...`) — its mirror-tree-into-workspace step still copies whatever remains in `src/poller/inject/workspaces/<workspace>/.claude/`. With files deleted, the mirror naturally stops copying them. Verify no hard-coded paths reference the deleted files (`grep -rn 'danx-comment-style\\|danx-halt-flag\\|danx-no-launch-worker\\|danx-no-false-blockers\\|danx-no-interactive\\|danx-requires-human\\|danx-slack-agent\\|issue-blocker' src/`).
  3. **Scrub on next poll tick**: `injectDanxWorkspaces` already mirrors verbatim, but does not prune. Existing connected repos' workspace dirs will keep stale copies of the 11 files until manually cleaned. Add a one-shot `pruneRetiredWorkspaceFiles(workspaceDir)` call inside `injectDanxWorkspaces` that deletes any file in `<workspaceDir>/.claude/{rules,skills}/` whose basename is in the retired-files allowlist. Idempotent.
  4. **Update tests**: `src/poller/index.test.ts` and any inject-related tests that assert on the deleted files. Replace assertions with the new "no `danx-*` rules under workspace" invariant.
  5. **CLAUDE.md cross-reference cleanup**: `~/web/danxbot/CLAUDE.md` Skill triggers table references the old skill names (e.g. `danxbot:issue-card-workflow`). Verify each row points to a still-existing skill name.

  ## Key files

  - 14 deletions under `src/poller/inject/workspaces/<workspace>/.claude/{rules,skills}/`.
  - `src/poller/index.ts` (or wherever `injectDanxWorkspaces` lives) — add `pruneRetiredWorkspaceFiles` step.
  - `src/poller/index.test.ts` — adjust assertions.
  - `~/web/danxbot/CLAUDE.md` — verify references.

  ## How to verify

  - `find src/poller/inject/workspaces -name 'danx-*' -o -name 'issue-blocker' -o -name 'danx-slack-agent.md'` returns ONLY structural files (none of the 14 deleted).
  - After running the poller against a connected repo for one tick: `ls <repo>/.danxbot/workspaces/issue-worker/.claude/rules/` shows only the 4 per-repo rendered files (`danx-repo-config.md`, `danx-repo-overview.md`, `danx-repo-workflow.md`, `danx-tools.md`). Ditto skills dir → empty (or just retains structural fixtures, not the 5 retired skills).
  - `npx vitest run src/poller/` passes.
  - `npx tsc --noEmit` passes.
