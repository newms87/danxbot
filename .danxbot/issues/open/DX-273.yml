title: "Plugin consolidation > Phase 4: Smoke verify dispatched agents load skills via plugin"
description: |-
  ## Context

  After Phase 3 deletes the inject copies, dispatched workers MUST resolve every retired skill / rule via the `danxbot@newms-plugins` plugin (auto-installed in container `/home/danxbot/.claude/` per the baseline `settings.json`). This phase confirms it.

  ## Solution

  1. **Container plugin sanity** — `docker exec danxbot-worker-<repo> ls /home/danxbot/.claude/plugins/repos/newms-plugins/danxbot/skills/` should list every plugin skill (not just the legacy ones).
  2. **Live dispatch smoke** — `make launch-worker REPO=danxbot` (with user authorization), then trigger a dispatch via the issue worker on a fresh ToDo card. Watch the dispatched session's JSONL (`~/.claude/projects/.../...jsonl`) for skill-trigger evidence: a `Skill` tool call resolving to one of the migrated names (e.g. `danxbot:halt-flag`, `danxbot:no-false-blockers`, `danxbot:requires-human`). One trigger per skill is enough.
  3. **Slack-worker smoke** — fake a Slack message via the dashboard's slack-test affordance OR (cheaper) `make test-system-slack` with `REAL_CLAUDE=0` to exercise the slack-worker dispatch path. Verify `slack-agent` skill loads.
  4. **Negative test** — confirm none of the 14 retired files reappear in connected repo workspaces after a few poll ticks. The pruner from Phase 3 is enforcing.
  5. **Per-workspace settings.json sanity** — `cat <repo>/.danxbot/workspaces/issue-worker/.claude/settings.json` shows `enabledPlugins: { "danxbot@newms-plugins": true, ... }`. If any workspace was missing the plugin enablement, fix here (slack-worker / board-chat / system-test all need at minimum `danxbot` enabled to load these skills).

  ## Key files

  - `~/web/danxbot/Makefile` (`launch-worker`, `test-system-*` targets).
  - `~/.claude/projects/.../*.jsonl` for trigger evidence.
  - Per-workspace `settings.json` under `src/poller/inject/workspaces/<workspace>/.claude/`.

  ## How to verify

  - ACs below directly enumerate the smokes.
  - Any failure → halt at Phase 4, file action items, do NOT proceed to Phase 5 (docs) until the runtime is proven.
