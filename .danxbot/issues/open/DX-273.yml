    text: |-
      <!-- danxbot -->

      ## Waiting On audit — Phase 3 prerequisite unmet

      Picked this card up, then verified the prerequisite state. The epic
      description (DX-269) explicitly orders the phases: "P3 (delete inject
      + writer change) waits on both [P1, P2]. P4 (smoke verify) waits on
      P3. P5 (docs) waits on P4." The phase YAMLs were created without the
      `waiting_on` chain stamped, so the poller dispatched this card while
      Phase 3 is unstarted. Restoring the missing `waiting_on` on this
      card; DX-274 will need the same treatment when picked up.

      ### What I verified

      **Phase 2 (DX-271) plugin work — already shipped.** `claude-plugins`
      commit `3d5891c` ("danxbot: add 5 worker skills
      (no-false-blockers, autonomous-mode, requires-human, issue-blocker,
      slack-agent) (DX-271)") is on `main`. All 20 expected danxbot skills
      are present under `~/web/claude-plugins/danxbot/skills/`:
      `autonomous-mode`, `comment-style`, `danx-epic-link`, `danx-ideate`,
      `danx-next`, `danx-start`, `danx-triage-card`, `danxbot`,
      `dispatch-deep`, `docker-deep`, `halt-flag`, `issue-blocker`,
      `issue-card-workflow`, `no-false-blockers`,
      `no-unauthorized-worker-launch`, `prod-access`, `requires-human`,
      `settings-deep`, `slack-agent`, `unblock`. DX-271's YAML is stale
      (status still `ToDo`) but the work is on remote — the next pickup
      should detect-and-close it via Step 1.1.

      **Phase 1 (DX-270) reconcile — partial / needs verification.** Plugin
      side has all 5 skill files; semantic-diff vs inject not run here.

      **Phase 3 (DX-272) inject deletion — NOT done.**
      `find src/poller/inject/workspaces -type f \( -name 'danx-*' -o -name 'SKILL.md' \)` returns all 14 retired files.
      `grep -rln "pruneRetiredWorkspaceFiles" src/` returns nothing — the
      pruner helper does not exist. No danxbot-repo commits reference
      DX-272.

      ### Why this card cannot proceed yet

      - **AC 4** (no retired filename reappears in any connected repo
        workspace dir after 3 ticks) is structurally impossible while
        Phase 3 still mirrors those filenames into workspaces every tick.
        Verified just now:
        `ls repos/danxbot/.danxbot/workspaces/issue-worker/.claude/rules/`
        shows all 6 retired `danx-*.md` files present and live (the same
        ones I'm reading from at this very dispatch).
      - **AC 1, 2, 5** can be partially audited now, but the audit is
        meaningless until Phase 3 establishes that the plugin is the SOLE
        loader. While inject coexists, "I loaded a Skill via plugin" is
        ambiguous — the agent could be reading either source.

      ### Sub-findings worth keeping on the card for the next pickup

      - `board-chat` workspace inject has NO `.claude/settings.json`
        (only `CLAUDE.md` + `workspace.yml`). AC 5 will need either
        an exemption note ("stub workspace, plugin not applicable") or
        a settings.json with `enabledPlugins.danxbot@newms-plugins`.
      - The other 4 workspaces (`issue-worker`, `skill-eval`,
        `slack-worker`, `system-test`) already declare
        `danxbot@newms-plugins: true`.
      - Skills-tool fire as Phase 4 evidence works **right now** for this
        very dispatch — the harness loaded
        `danxbot:issue-card-workflow`, `danxbot:halt-flag`,
        `danxbot:no-false-blockers`, `danxbot:requires-human`,
        `danxbot:issue-blocker`, `danxbot:slack-agent` per the available-
        skills list. After Phase 3 deletes inject, a fresh dispatch of
        this card will satisfy AC 2 immediately.

      ### Status

      Setting `waiting_on.by: [DX-272]`. Poller will skip dispatching
      this card until DX-272 reaches Done / Cancelled; then it auto-
      clears `waiting_on` and re-dispatches. No human action needed.
