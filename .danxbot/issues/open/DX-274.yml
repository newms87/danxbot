title: 'Plugin consolidation > Phase 5: Docs cleanup — kill "edit in two places" mentions'
description: |-
  ## Context

  `~/.claude/CLAUDE.md` (user-global) and `~/web/danxbot/CLAUDE.md` (repo) both contain language reflecting the OLD model where rules lived in BOTH the inject pipeline AND the plugin and operators had to mirror-edit. After Phase 3+4, ONE source of truth = the plugin. Docs must reflect that.

  Specific edit targets:

  1. `~/.claude/CLAUDE.md` "Rule placement — main session vs dispatched-agent" section: rewrite to drop the dual-location framing. Replacement guidance: "Rule for danxbot dispatched agents OR operator session → plugin skill in `~/web/claude-plugins/danxbot/skills/`. Rule that's truly per-repo or per-workspace → inject pipeline. Default: plugin."

  2. `~/.claude/CLAUDE.md` "MANDATORY pre-edit check — discipline rules + skills" section: simplify. The "edit plugin source, commit + push, /reload-plugins" flow is the ONLY flow now (for danxbot rules/skills). Remove the "Repo-local edits are ONLY acceptable when the rule is truly repo-specific" carve-out — the only repo-local files left are templated per-repo (`danx-repo-config.md` etc.) which agents never edit by hand.

  3. `~/web/danxbot/CLAUDE.md` Skill triggers table: verify each skill name still resolves. Remove any references to retired inject paths.

  4. `~/web/danxbot/.claude/rules/agent-dispatch.md` "Workspace isolation — the cwd contract" section: the bullet list of files mirrored from `src/poller/inject/workspaces/<name>/.claude/` should drop the rules + skills entries. Replace with: "Static rules + skills resolve via the `danxbot@newms-plugins` plugin (enabled in `.claude/settings.json`). Workspace `.claude/{rules,skills}/` contains ONLY per-repo rendered files."

  5. `~/web/claude-plugins/danxbot/skills/danxbot/SKILL.md` overview section: update to mention the plugin is now the single source for danxbot rules + skills (was previously dual-housed).

  ## Key files

  - `~/.claude/CLAUDE.md`
  - `~/web/danxbot/CLAUDE.md`
  - `~/web/danxbot/.claude/rules/agent-dispatch.md`
  - `~/web/claude-plugins/danxbot/skills/danxbot/SKILL.md`

  ## How to verify

  - `grep -n 'inject pipeline\\|inject path\\|mirror-edit\\|two places' ~/.claude/CLAUDE.md ~/web/danxbot/CLAUDE.md ~/web/danxbot/.claude/rules/agent-dispatch.md` returns only intentional context (history / migration callouts), not active workflow instructions.
  - claude-plugins repo committed + pushed (for the SKILL.md update).
  - Re-run epic DX-269's audit script (from epic description's "Acceptance" section) → zero drift, zero duplication.
