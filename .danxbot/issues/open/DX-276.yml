title: "Skill-eval > Phase 1: Harness skeleton — /skill-eval skill + dispatch wiring + JSONL trigger-assertion"
description: |-
  ## Goal

  Minimal end-to-end harness: take ONE prompt + expected skill name, dispatch via host-mode, parse the resulting JSONL, return PASS if Skill(<name>) was invoked before the first assistant text block; FAIL otherwise. No iteration yet, no eval-set format yet — just the runner core proving interactive dispatch + JSONL parsing works for trigger-detection.

  ## Why first

  Without a working trigger-detection primitive, every other phase is speculative. This phase is the smallest unit that proves the architecture is viable end-to-end on real Claude API.

  ## Scope

  1. **Skill at `<danxbot>/.claude/skills/skill-eval/SKILL.md`** — invocation: `/skill-eval --query "<prompt>" --expect-skill <plugin>:<skill>`. Returns one PASS/FAIL line + JSONL path.
  2. **Dispatch wiring** — reuse existing `dispatch()` from `src/dispatch/core.ts`. Use a NEW dedicated workspace `<danxbot>/repos/danxbot/.danxbot/workspaces/skill-eval/` so eval dispatches don't pollute the issue-worker / system-test workspace JSONLs. Workspace `.mcp.json` mirrors `issue-worker` (full plugin set installed).
  3. **JSONL trigger-assertion** — parse `<repo>/claude-projects/-home-newms-web-danxbot--danxbot-workspaces-skill-eval/<sessionId>.jsonl` (DX-240 host-projects-symlink path). Locate the dispatch tag, walk entries in order, find the first `assistant` text block, scan all `tool_use` entries with `name: "Skill"` between session-start and that text block, check `input.skill === expected_skill`.
  4. **One smoke test** — manually run `/skill-eval --query "Look at /tmp/danxbot-test-system6.log and tell me what the test results were." --expect-skill dev:debugging`. Should PASS if `dev:debugging` triggers, FAIL with prompt + JSONL excerpt if not. Confirms harness mechanics on a known-broken case (proves it can detect the regression we already observed).

  ## NOT in scope (deferred to later phases)

  - Eval-set JSON file format (P2)
  - 60/40 train/test split, 3x runs, accuracy aggregation (P2)
  - Iteration loop / description-fix proposals (P3)
  - Multi-skill coverage (P4)
  - Reporting templates beyond a single PASS/FAIL line (P4)

  ## Implementation notes

  - Skill MUST live at `<danxbot>/.claude/skills/skill-eval/` per epic AC — danxbot repo, NOT plugin repo (this is danxbot-repo-specific tooling, not a portable skill).
  - Workspace `<repo>/.danxbot/workspaces/skill-eval/`: gitignored per existing convention; generated by inject pipeline if added to inject sources, or hand-rolled for V1.
  - Use `mcp__danx-issue__danx_issue_get` style — invoke skill via Skill tool, no slash-command alias needed for V1.
  - Dispatch token + worker URL: same as `make test-system` — read from `<repo>/.danxbot/.env` `DANXBOT_WORKER_PORT`.
  - ONE concurrent dispatch only in P1; parallel runs land in P2.

  ## Test plan

  - Workspace exists + has CLAUDE.md + .mcp.json with full plugin set.
  - Skill loads when invoked (`Using /skill-eval to ...`).
  - Dispatch round-trip completes within timeout against host-mode worker on port 5563.
  - JSONL parser correctly identifies a Skill(dev:debugging) tool-use entry.
  - PASS/FAIL output matches manual JSONL inspection on at least 2 hand-picked cases (one expected-pass, one expected-fail using the bug-language regression).

  ## Acceptance

  - /skill-eval skill file exists at <danxbot>/.claude/skills/skill-eval/SKILL.md
  - skill-eval workspace exists at <danxbot>/repos/danxbot/.danxbot/workspaces/skill-eval/ with .mcp.json + CLAUDE.md
  - Single-query invocation: `/skill-eval --query "..." --expect-skill <plugin>:<skill>` returns PASS or FAIL + JSONL path
  - Hand-tested smoke case: bug-language summary prompt → FAIL when dev:debugging not loaded, with JSONL excerpt showing absence of Skill tool-use
  - No `claude -p` usage anywhere in the runner (must use host-mode interactive dispatch)
  - No new MCP servers, no new HTTP routes — reuse existing dispatch infra wholesale
