title: "Skill-eval > Phase 2: Eval-set format + first eval-set for dev:debugging (20 queries, train/test split)"
description: |-
  ## Goal

  Adopt skill-creator's JSON eval-set format. Author the first eval-set (`dev:debugging`, 20 queries: 10 should-trigger + 10 should-NOT-trigger). Extend `/skill-eval` to consume an eval-set file, run each query 3× for stable trigger-rate, split 60/40 train/test, report accuracy matrix with per-query failure samples.

  ## Why second

  P1 proves the trigger-detection primitive. P2 layers the standard eval-set shape on top so downstream phases (iteration, expansion) plug in without rework. Picks `dev:debugging` first because it's the skill we already have empirical evidence is broken.

  ## Eval-set format

  `<danxbot>/tests/skill-evals/<plugin>-<skill>/eval-set.json`:

  ```json
  [
    {"query": "Look at /tmp/X.log and tell me what the test results were.", "should_trigger": true},
    {"query": "Summarize the failures from this build output", "should_trigger": true},
    {"query": "Why is the dispatch agent stuck on DX-244?", "should_trigger": true},
    {"query": "Rename function foo to bar in src/baz.ts", "should_trigger": false},
    {"query": "List the files in src/agent/", "should_trigger": false},
    ...
  ]
  ```

  Format constraints (per skill-creator + Anthropic guidance):
  - 20 queries total (skill-creator-recommended)
  - 8-10 should_trigger, 8-10 should_NOT_trigger
  - Negatives must be GENUINELY tricky (near-misses), not obvious irrelevant ("write a fibonacci"). Negatives that are obviously off-topic don't test the description.
  - Queries must be realistic + concrete (specific paths, names, context). No abstract "ask about X" placeholders.

  ## dev:debugging eval-set seed (P2 deliverable)

  10 should_trigger queries covering:
  1-3. Bug-language reporting (test-log summary, post-build report, "what is broken")
  4-5. Investigation framing (why-X, dig-into-Y) WITHOUT explicit "bug" word
  6-7. Factual assertion about runtime behavior ("how does Y work", "what config value is used for Z")
  8-10. Failing-test recovery + post-mortem framings

  10 should_NOT_trigger queries covering:
  1-3. Pure read tasks (list dirs, grep for symbol, show file contents) — orientation only
  4-5. Pure rename/refactor with no failure context
  6-7. Documentation edits / typo fixes
  8-9. New feature requests where no bug exists yet
  10. Test-log summaries that explicitly contain ONLY passes (no `✗` / `Failed:` tokens)

  ## Runner extensions (on top of P1 skeleton)

  - `/skill-eval <plugin>:<skill>` (no --query — discovers eval-set by convention path)
  - Run each query 3× (skill-creator default); count as "triggered" if ≥2/3 fire
  - 60/40 split: first 12 queries = train, last 8 = held-out test (deterministic shuffle by seed for reproducibility)
  - Aggregate report (markdown):
    - Trigger rate on train (should-trigger / should-NOT-trigger)
    - Trigger rate on held-out test
    - Per-failed-query: prompt + 3-run trigger result + JSONL paths
    - Cost: total tokens × pricing
  - Bounded parallelism: default 3 concurrent dispatches (configurable)

  ## NOT in scope (P3+)

  - Iteration loop (P3)
  - Description-edit proposal generation (P3)
  - Coverage beyond dev:debugging (P4)

  ## Acceptance

  - Eval-set JSON shape matches skill-creator's format exactly (drop-in compatible if Anthropic ships #36570/#556 fixes)
  - <danxbot>/tests/skill-evals/dev-debugging/eval-set.json exists with 20 queries (10/10 split)
  - Negatives are genuinely tricky — code-reviewer subagent verifies "no obvious-irrelevant negatives" before AC tick
  - /skill-eval <plugin>:<skill> runs full eval-set, reports train + test accuracy, exits 0 if both ≥95% / 1 otherwise
  - 3× runs per query with ≥2/3 majority threshold
  - Bounded parallelism (default 3, --parallel N override)
  - Markdown report includes per-failure forensics (prompt + JSONL excerpt link)
  - Cost reported per run
