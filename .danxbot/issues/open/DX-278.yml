title: "Skill-eval > Phase 3: Iteration loop — agent-driven description-fix flow until skill goes green"
description: |-
  ## Goal

  Close the loop. After P2 reports failures, the CC agent (driving `/skill-eval`) reads the failure pattern, proposes a SKILL.md description edit, commits + pushes the plugin source, runs `/reload-plugins`, re-runs `/skill-eval` against the same eval-set, repeats until both train + test ≥95% OR a max-iterations cap (default 5) hits. Mirrors skill-creator's `run_loop` algorithm, replacing its broken `claude -p` runner with our host-mode dispatch.

  ## Why third

  P1 + P2 give pass/fail. P3 turns pass/fail into IMPROVEMENT — the actual loop the user asked for ("CC agent runs the test so they can iterate"). Without P3, harness is a binary alarm; with P3, it's a self-improving system.

  ## Algorithm (skill-creator parity)

  ```
  iteration = 0
  best_test_score = 0
  best_description = current_description
  loop:
    results = /skill-eval <plugin>:<skill>           # train + test both run
    if train >= 95% AND test >= 95%:
      print "GREEN", break
    if iteration >= max_iterations:
      print "MAX ITERATIONS HIT — best_description was iteration N (test=X%)", break
    if test > best_test_score:
      best_test_score = test
      best_description = current_description
    failures = results.train_failures
    proposal = ask_claude("Given current description + these failures, propose a tighter description") 
    apply(proposal)                                  # Edit plugin source SKILL.md
    commit_push(plugin_repo)                         # so /reload-plugins picks up
    reload_plugins()                                 # via Bash invocation? CC slash command? — see implementation note
    iteration += 1
  end
  restore(best_description)                          # if final iteration didn't beat best_test_score
  report final state + which iteration won
  ```

  60/40 train/test split is the OVERFITTING DEFENSE — the proposal step sees train failures only; "best" is selected by held-out test score so the agent doesn't drift descriptions to memorize the train set.

  ## Implementation notes

  - **Description-only edits.** No body edits, no rules edits, no skill-renames in P3 — keep the iteration surface narrow + safe to revert. Renaming + body restructuring lands in a separate manual phase if description tuning hits a ceiling.
  - **Single-skill loop.** P3 iterates ONE skill at a time. Multi-skill orchestration ("bring all green") is operator-driven via P4.
  - **Plugin reload mechanism.** Open question: can `/reload-plugins` be invoked from a danxbot-spawned dispatch, or only from the operator's session? If only operator: surface the iteration loop as "agent proposes, operator applies + reloads + re-runs" (semi-autonomous). If dispatch can self-reload: full autonomy. Spike this in the first hour of P3 — design adapts.
  - **Commit + push to plugin repo:** use `git -C ~/web/claude-plugins ...`. The user has standing authorization for plugin commits (per CLAUDE.md edit flow).
  - **Rollback safety.** If the final iteration's description has WORSE test score than `best_description`, restore `best_description` from git stash before exit. Don't leave the plugin worse than we found it.
  - **Cost cap.** Each iteration = 1 full eval-set run (~$0.50) + 1 Haiku proposal call (~$0.01). 5 iterations = ~$2.55 max per skill. Hard-fail at 8 iterations regardless to prevent runaway.

  ## NOT in scope (P4)

  - Cross-skill orchestration (P4)
  - Reporting templates / cost dashboards (P4)
  - Hooks for CI / scheduled regression sweeps (post-epic)

  ## Risks + mitigations

  | Risk | Mitigation |
  |---|---|
  | Proposal step generates worse descriptions consistently | Held-out test selects best; rollback to best on exit. Surface "no improvement found" cleanly. |
  | Plugin reload race (commit pushed, dispatch re-runs before reload propagates) | Add a sanity check: dispatch a no-op probe + verify SKILL.md description match before iteration's eval starts. Bail with clear error if drift detected. |
  | Description grows unboundedly long | Add a length budget in the proposal prompt (≤500 chars per description, fail proposal if exceeded). |
  | Agent edits more than just description (renames, body changes) | Restrict edit surface programmatically: only allow YAML frontmatter `description:` field replacement; reject any other diff. |

  ## Acceptance

  - /skill-eval <plugin>:<skill> --iterate runs the propose-fix-retest loop
  - Stops on green (≥95%/95%) OR max-iterations OR cost cap
  - Restores best_description if final iteration regressed
  - Edit surface restricted to SKILL.md description field only
  - 5-iteration cap default, --max-iterations N override (hard-fail at 8)
  - Sanity-check probe before each iteration's eval confirms reload propagated
  - End-to-end demo: dev:debugging starts at <80% trigger rate, harness drives it to ≥95% in ≤5 iterations OR cleanly reports "no improvement" with diagnostic
  - All description proposals committed individually + pushed (full git history of iterations for postmortem)
