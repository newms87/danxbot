title: Sweep redundant setTimeout waits in session-log-watcher.test.ts
description: |-
  ## Context

  Surfaced while fixing H4JrjJrn (commit `dfb1cac`). The flaky `back-fills agent_type when meta.json appears after the jsonl` and sibling `propagates lineage on sub-agent tool_result (user) entries` tests were migrated from `setTimeout`-based waits to `await watcher.drain()`. Test-reviewer + code-reviewer both flagged the same pattern across the rest of the file as a latent flake class.

  ## Problem

  `src/agent/session-log-watcher.test.ts` has ~30 tests that use `await new Promise((r) => setTimeout(r, 100-300))` after `watcher.start()` and/or after appending bytes. Two issues:

  1. **Post-`start()` `setTimeout` is redundant.** `start()` synchronously awaits `discoverSessionFile()` then `await this.poll()` before resolving. After `await watcher.start()`, the initial poll has fully completed and all already-existing entries are in `entries[]`. The `setTimeout(100)` adds latency without any synchronization benefit.

  2. **Post-write `setTimeout` is racy.** Same root cause as H4JrjJrn — under suite load, a 50ms scheduled poll can be delayed past the 200ms wait window. Should use `await watcher.drain()` (session-log-watcher.ts:399) which deterministically awaits any in-flight poll and runs a fresh synchronous poll.

  ## Suggested Fix

  - Remove every `setTimeout` immediately after `await watcher.start()`.
  - Replace every post-write `setTimeout(100-300)` with `await watcher.drain()` before `watcher.stop()`.
  - The `tolerates malformed meta.json without crashing the watcher` test (line ~1163) was specifically called out as Improve — start with that.

  ## Key Files

  - `src/agent/session-log-watcher.test.ts` — sweep all `setTimeout` patterns
  - `src/agent/session-log-watcher.ts` — read `start()` (L358) and `drain()` (L399) for the contract; no source changes expected

  ## Acceptance

  - Zero `setTimeout` calls in `session-log-watcher.test.ts` outside intentional waiting tests (e.g. discovery polling)
  - Full test file runs faster (the H4JrjJrn fix dropped one test from 312ms → 14ms)
  - All 79 existing tests still pass after the sweep

  ## Found While

  Code-reviewer + test-reviewer subagent reports during H4JrjJrn fix.
