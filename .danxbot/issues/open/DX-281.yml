title: Worker settings.json writer clobbers operator agent records via cached read-modify-write race
description: |-
  ## Symptom

  Operator agent records get silently wiped from `<repo>/.danxbot/settings.json#agents` between dispatches. Reproduced TWICE this session — `phil` agent wiped two separate times, both during normal `make test-system` runs. Each wipe persisted; manual restore via direct YAML edit + dashboard PUT both worked, but the next dispatch tick re-wiped.

  ## Affects

  Every operator-driven agent record in `<repo>/.danxbot/settings.json#agents` on any repo where the worker is actively dispatching. Loss is silent — no warning, no retry, no log entry on the wipe path. Operator just notices an agent missing from the dashboard later.

  ## Env

  - Host runtime worker (`make launch-worker-host REPO=danxbot`, port 5563)
  - Concurrent dispatches running (any test or real card)
  - Pre-existing operator agents in `agents{}` map (dani, murphy, phil this session — phil was the wipe victim both times)

  ## Scenario (suspected race)

  1. Worker reads `settings.json` at dispatch start (caches `agents` map in memory)
  2. Operator OR another dispatch concurrently mutates `settings.json` (test seeded alice/bob/charlie via `_multi_worker_seed_agents` in P5; restored via EXIT trap; phil added between read + write windows of separate worker writes)
  3. Worker finishes dispatch, writes settings.json reflecting the CACHED agents map (which lacks phil OR has the test-seeded set the cache snapshot saw)
  4. Last-writer-wins → phil disappears from disk

  Confirmed `meta.updatedBy: "worker"` stamp post-wipe both times — worker IS the writer that erased phil.

  ## Expected

  Worker writes that touch `settings.json` MUST re-merge the on-disk `agents{}` map with the in-memory state, not blindly overwrite. Per existing writer-merge invariant in `.claude/rules/settings-file.md`: "display-only patch never clobbers overrides, vice versa." Same invariant must extend to `agents{}` — operator-driven map should survive every worker write.

  ## Actual

  Worker write replaces `agents{}` wholesale with cached version → operator additions made between cache-read and write-time get erased.

  ## Reproduce

  1. `make launch-worker-host REPO=danxbot` (worker active)
  2. Add a new agent via dashboard `POST /api/agents?repo=danxbot` (e.g. `phil`)
  3. Trigger any dispatch (e.g. `make test-system-dispatch`)
  4. After dispatch settles, check settings.json — phil sometimes missing
  5. Repeatable across multiple dispatch cycles; not deterministic per dispatch but high probability over a session

  ## Likely fix locations

  - `src/settings-file.ts` — writer path; likely a `writeSettings(merge: AgentsMap)` that takes a partial + merges with on-disk reads at write-time, NOT at dispatch-start cache time
  - Any `dispatch()` / `onComplete` path that snapshots `settings.json` then writes back — must re-read agents map at write moment
  - Per-id mutex inside settings writer to serialize concurrent worker + dashboard writes (dashboard already has per-id mutex per `dashboard.md` DX-236 — worker side may not)

  ## Acceptance

  - Reproduce the wipe deterministically in a unit / integration test (seed 1 agent → trigger settings write from worker hot path → assert agent survives)
  - Add same-merge-as-display invariant to writer for `agents{}` map (re-read on-disk agents at write moment, merge instead of clobber)
  - Add to writer-merge invariant docs in `.claude/rules/settings-file.md`
  - Verify against the manual repro scenario above — fresh phil add survives 5 consecutive dispatches

  ## NOT in scope

  - Backfilling existing wipe-victims (operator manually restores)
  - General `settings.json` schema validation hardening (separate concern)
