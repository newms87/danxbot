title: "Event-Driven Worker > Phase 4b: Full event-driven scheduler engine + `_poll` dispatch-decision deletion"
description: |-
  ## Context

  Phase 4 (DX-219) shipped a tightly-AC-scoped delivery: four protections ported into a new `src/dispatch/scheduler.ts` (~220 LOC) — multi-env tracker-comment lock re-export, pre-claim DB liveness guard, TrelloTracker creds guard, post-dispatch progress check. The retro on DX-219 is explicit that the broader Phase 4 scope described in DX-219's body was **not** delivered:

  > "Phase 4's broader scope is NOT delivered here. The card description called for reconcile step 8 wiring, triage `setTimeout`, TTL `setTimeout`, settings.json file-watch, and `_poll` deletion. The `ac[]` did not. Phase 5 (DX-220) and Phase 6 (DX-221) will need to absorb the rest, OR a new phase card gets inserted between DX-219 and DX-220 if the operator wants the full Phase-4-as-described before moving on."

  This card is that inserted phase. Phase 5 (DX-220 — slim cron sweep + audit + rename `src/poller/index.ts` → `src/cron/sync-and-audit.ts`) presumes the poller has been gutted of dispatch decisions and that triage/TTL `setTimeout`s exist for `bootRehydrate` to re-arm. Neither holds today: `src/poller/index.ts` is still ~2938 LOC and contains every dispatch decision the Phase 5 description says to delete. Without this card landing, DX-220 has no meaningful slimming/rename target — it would have to first build everything below.

  ## Scope — five deliverables (a single coherent change, split for tractability)

  ### 1. Reconcile step 8 — emit DispatchableChanged + scheduler subscribes

  Reconcile's `ReconcileResult` already includes a `fanout` shape (introduced in Phase 3 for parent + waiting_on recursion). Extend it with a `dispatchableChanged: boolean` field that flips true when reconcile's view of dispatch-eligibility for the card changes (became dispatchable or stopped being dispatchable). After the YAML write + DB mirror + tracker queue (step 7) complete, reconcile invokes `scheduler.onReconcileResult(result)` on the per-repo scheduler instance.

  Same slot/mutex separation pattern Phase 3 (DX-218) established for `pushTrelloDiff`: the scheduler poke runs OUTSIDE the reconcile per-card mutex so reconcile body returns fast and a slow scheduler run doesn't pile up other reconciles for the same id. Use a non-`lifecycle` trigger string (per DX-218 carryover note — `lifecycle` AWAITS trailing pushes, which would re-introduce the lag the event-driven path is meant to eliminate).

  ### 2. Triage `expires_at` as per-card `setTimeout`

  Replace the per-tick triage walk (`tryTriageDispatch` over `listTriageDueYamls`) with per-card `setTimeout` arming. On every reconcile that touches a card's `triage.expires_at`, arm (or replace) a `setTimeout(handleExpiry, expires_at - now)`. On expiry, reconcile with trigger `"audit"` to recompute state freshness; the resulting `DispatchableChanged` poke offers the card to the scheduler's triage-capable agents.

  Edge case: process restart loses timers. Boot rehydrate (Phase 5's `scheduler.bootRehydrate` per DX-220 description) re-arms timers from open YAMLs. Until Phase 5 lands, this card adds a thin boot-scan inside `bootScheduler` that re-arms timers on worker start.

  New module: `src/dispatch/triage-timer.ts` (per-card arming + boot-scan re-arm). Tests use `vi.useFakeTimers()`.

  ### 3. Dead-dispatch eviction as per-dispatch TTL `setTimeout`

  Replace `evictDeadDispatches` (per-tick walk) with per-dispatch TTL timer: when `dispatch()` stamps `dispatch.ttl_seconds` on the YAML, schedule `setTimeout(checkLiveness, ttl_seconds * 1000)` on the scheduler. On expiry, check PID liveness (existing `isPidAlive`); if dead, clear the dispatch record via reconcile (which re-emits `DispatchableChanged` so the slot is offered again). Live dispatches re-arm a fresh timer on every heartbeat that reaches the worker (the worker already has a heartbeat hook — wire the re-arm there).

  New module: `src/dispatch/ttl-timer.ts`. Tests use fake timers; assert dead PID clears the YAML's `dispatch` field via reconcile.

  ### 4. `settings.json` file-watch + `onAgentRosterChange`

  Chokidar-watch `<repo>/.danxbot/settings.json` from `src/settings-file.ts`. On change, parse + emit `scheduler.onAgentRosterChange()`. The scheduler rebuilds its agent map; newly-idle agents (added to the roster) get poked through the existing picker. Existing readers (`isFeatureEnabled` hot-path, `src/settings-file.ts#readSettings`) are unchanged — the watch is additive.

  Care: `<repo>/.danxbot/.settings.lock` is a sibling. The chokidar setup must filter it out so lock writes during an in-flight settings save don't double-fire `onAgentRosterChange`. Test: rapid-fire two settings writes within the lock window emit a single roster-change event.

  ### 5. `_poll` dispatch-decision deletion

  Delete from `src/poller/index.ts`:

  - The legacy `// DX-242: legacy single-card unscoped dispatch DISABLED` block + the surrounding prep block (the commented-out `await spawnClaude(...)` at line ~1039 + its prelude).
  - `tryResumeOrphan` if no longer called from anywhere (it shouldn't be — DX-242 disabled the legacy path that called it; verify with grep).
  - The multi-agent picker invocation from `_poll` (the pick now runs from the scheduler).
  - `tryTriageDispatch` from `_poll` (timers replace it).
  - `checkAndSpawnIdeator` from `_poll` (becomes scheduler-driven when the scheduler observes an idle ideator-capable agent).
  - `recoverStuckCards` from `_poll` (becomes a lifecycle-event handler on dispatch stop).
  - `evictDeadDispatches` from `_poll` (TTL timers replace it).
  - `dispatchableIssues` / `inProgressIssues` / `cards` partitioning (no consumer).
  - `resolveWaitingOnCards` from `_poll` (auto-clearing waiting_on is reconcile's job in step 3 — verify it actually does this; if it does, drop the per-tick call; if it doesn't, add it to reconcile in this card).

  What remains in `_poll` after this card lands (Phase 5's slimming target): `syncRepoFiles`, `tracker.fetchOpenCards`, `bulkSyncMissingYamls`, comment-pull. ~400 LOC. Phase 5 then trims further + renames the module.

  ### Skipped tests cleanup

  `src/poller/index.test.ts` carries 17 `[DX-242 SKIP — DX-215 EPIC AGENTS HANDLE]` skip markers. Each cites either DX-219 (Phase 4) or DX-220 (Phase 5) as the responsible phase. Walk the list (`grep -n "DX-242 SKIP" src/poller/index.test.ts`):

  - Tests whose body says "port to scheduler" → write equivalent in `src/dispatch/scheduler.test.ts` / `triage-timer.test.ts` / `ttl-timer.test.ts`; delete the skip-marked version.
  - Tests whose body says "delete (covered by dispatch.test.ts)" → delete the skip-marked version; verify dispatch.test.ts coverage exists.

  After this card lands, zero `[DX-242 SKIP — DX-219]` markers should remain. `[DX-242 SKIP — DX-220]` and `[DX-242 SKIP — DX-221]` markers may remain for Phase 5/6 to clear.

  ## Files

  Create:

  - `src/dispatch/triage-timer.ts` — per-card `setTimeout` arming + boot-scan re-arm.
  - `src/dispatch/triage-timer.test.ts` — fake-timer-driven tests.
  - `src/dispatch/ttl-timer.ts` — per-dispatch eviction timer.
  - `src/dispatch/ttl-timer.test.ts` — fake-timer-driven tests, dead-PID-clears-via-reconcile.

  Modify:

  - `src/issue/reconcile.ts` — step 8 emits `dispatchableChanged` in `ReconcileResult.fanout`; orchestrates the scheduler poke after the slot map releases.
  - `src/issue/reconcile-types.ts` — add `dispatchableChanged: boolean` to the fanout shape.
  - `src/dispatch/scheduler.ts` — add `onReconcileResult`, `onDispatchStart`, `onDispatchStop`, `onAgentRosterChange`, `onTriageExpiry`, `onTtlExpiry`. State map: `Map<agentName, "idle" | { dispatchId, cardId, startedAt }>`, `Set<dispatchableCardId>`, `Map<cardId, NodeJS.Timeout>` (triage), `Map<dispatchId, NodeJS.Timeout>` (TTL).
  - `src/dispatch/scheduler.test.ts` — extend the existing 22-test suite with input-table cases for the new methods (no-op when card not dispatchable, picker fires once per `DispatchableChanged`, rapid-fire roster change debounce).
  - `src/dispatch/core.ts` (`dispatch()`) — emit `scheduler.onDispatchStart` after the spawn lands; emit `onDispatchStop` from the existing stop handler. Wire TTL timer arming.
  - `src/settings-file.ts` — chokidar-watch the file; filter lock sibling; emit `onAgentRosterChange`. Tear down on shutdown.
  - `src/poller/index.ts` — delete the modules listed in deliverable 5.
  - `src/poller/index.test.ts` — delete the skip-marked tests after porting; assert via spy that `_poll` no longer dispatches.

  Delete:

  - The `// DX-242: legacy single-card unscoped dispatch DISABLED` block.
  - Any dead branch revealed once the listed `_poll` calls are removed.

  ## Test plan

  1. `npx vitest run src/dispatch/scheduler.test.ts src/dispatch/triage-timer.test.ts src/dispatch/ttl-timer.test.ts` — fake-timer suites green.
  2. `npx vitest run src/issue/reconcile.test.ts` — step 8 `dispatchableChanged` emission asserted.
  3. `npx vitest run src/poller/index.test.ts` — spy assertions: `_poll` makes ZERO dispatch decisions; all `[DX-242 SKIP — DX-219]` markers cleared.
  4. `npx vitest run` — full backend green.
  5. `npx tsc --noEmit` green.
  6. `make test-system-multi-worker` (DX-164) — concurrent dispatch through the scheduler path still works.
  7. `make test-system-dispatch` — measure latency: YAML write → claude spawn <2s on local (vs previous ~up-to-60s).

  ## Acceptance

  - Reconcile emits `fanout.dispatchableChanged`; scheduler subscribes via `onReconcileResult` and runs the picker once per change.
  - Triage `expires_at` is per-card `setTimeout`-driven; boot scan re-arms after restart. No `tryTriageDispatch` call survives in `_poll`.
  - Dead-dispatch eviction is per-dispatch `setTimeout`-driven; replaces `evictDeadDispatches` in `_poll`.
  - `settings.json` chokidar watch fires `onAgentRosterChange`; newly-idle agents get poked through the picker. `.settings.lock` filtered.
  - `_poll` no longer dispatches: spy in `src/poller/index.test.ts` asserts zero invocations of the spawn path.
  - Zero `[DX-242 SKIP — DX-219]` markers remain in `src/poller/index.test.ts`.
  - `npx vitest run`, `npx tsc --noEmit`, `make test-system-multi-worker`, `make test-system-dispatch` all green.
  - No regression in DX-164 acceptance criteria (multi-worker concurrency).

  ## Out of scope (left for DX-220 Phase 5 / DX-221 Phase 6)

  - Module rename `src/poller/index.ts` → `src/cron/sync-and-audit.ts` (Phase 5).
  - Cron audit pass `for each open: reconcileIssue(card, "audit")` (Phase 5).
  - `scheduler.bootRehydrate` consolidated boot scan (Phase 5).
  - `src/poller/inject/` → `src/inject/` move (Phase 5).
  - Architecture-diagram + `event-driven.md` rule (Phase 6).
  - Remaining `[DX-242 SKIP — DX-220]` / `[DX-242 SKIP — DX-221]` markers (handled in their respective phases).

  ## Dependency

  Blocks: DX-220 (Phase 5 cannot meaningfully slim the cron or rename the module until the dispatch decisions are gone from `_poll`), DX-221 (Phase 6 cleanup operates on the post-Phase-5 module shape).
