      <!-- danxbot -->

      ## Split into 3 phase cards

      Original card framed five deliverables as "single coherent change, split for tractability." Per Step 3.1 of `danx-next/SKILL.md` (>500 LOC, 3+ implementation phases, multiple domains) the work is being executed as an epic + 3 sequential phase cards. The coherence the author wanted is preserved by `waiting_on` chains — Phase 5 (DX-220) still depends on the entire Phase 4b shipping; that gate now resolves when DX-290 reaches Done.

      ### Phases

      | Card | Scope | Deliverables from DX-287 |
      |---|---|---|
      | **DX-288** — Phase 4b.1 | Reconcile `dispatchableChanged` + `scheduler.onReconcileResult` (event edge) | Deliverable 1 |
      | **DX-289** — Phase 4b.2 | Triage timer + TTL timer + `settings.json` file-watch (additive modules) | Deliverables 2, 3, 4 |
      | **DX-290** — Phase 4b.3 | `_poll` dispatch-decision deletion + 17 SKIP marker cleanup (final migration) | Deliverable 5 |

      DX-289 is `waiting_on` DX-288 (timers integrate with the scheduler's event surface from 4b.1). DX-290 is `waiting_on` DX-289 (deletion presumes the additive paths are wired and tested). The poller dispatches phases sequentially once each prior phase reaches Done.

      ### Why split

      Even with a 1M-context model, the original card's surface area (~1500 LOC of changes across 8+ files, 17 test SKIP markers to walk, 4 new modules to write) makes a single-dispatch completion unstable — partial work cannot ship cleanly because `danxbot_complete` gates on all ACs being satisfied. Three sequential dispatches each fit a clean Done state.
