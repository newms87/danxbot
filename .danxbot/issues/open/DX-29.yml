title: Clean up leftover untracked files in trello-worker workspace
description: |-
  ## Context

  While working SndPotYQ (sql-executor classification), discovered the trello-worker workspace's `repos/danxbot` checkout has 5 untracked files left over from prior dispatches that never got cleaned up:

  - `.danxbot/dispatch-blocked.md`
  - `src/dev-compose-override.test.ts`
  - `src/dev-compose-override.ts`
  - `src/worker/jsonl-dir-assertion.test.ts`
  - `src/worker/jsonl-dir-assertion.ts`

  These cause `npx vitest run` from the repo root to report **9 failing tests** every dispatch (8 in `src/index.test.ts` triggered by stale module imports, 1 in `src/dev-compose-override.test.ts` itself). Verified pre-existing via `git stash` and re-running — every dispatch starts with a noisy baseline that has to be filtered out manually.

  ## Suggested fix

  1. Decide whether the `dev-compose-override.ts` and `jsonl-dir-assertion.ts` files are work-in-progress that should be tracked + tested, or scaffolding to delete.
  2. If WIP — file proper Trello cards and check them into a feature branch.
  3. If scaffolding — `rm` and ensure the worktree's git checkout is clean before the next dispatch.
  4. Investigate why `src/index.test.ts` fails when `dev-compose-override.ts` exists — likely a transitive import side effect that needs a defensive guard or test isolation.

  ## Found while

  Working SndPotYQ. The 9 failures are unrelated to that card (sql-executor.test.ts and connection.test.ts both green, 106/106) but make every future dispatch's "is my change green?" check noisy and error-prone.
