title: "Event-Driven Worker > Phase 4b.3: _poll dispatch-decision deletion + 17 SKIP marker cleanup"
description: |-
  ## Context

  Final sub-phase under DX-287. Phase 4b.1 (DX-288) shipped the reconcile → scheduler event edge; Phase 4b.2 (DX-289) shipped the three additive modules (triage timer, TTL timer, settings watch). This card deletes the legacy per-tick walks from `_poll` now that the event-driven replacements are in place, and walks the 17 `[DX-242 SKIP — DX-219]` markers in the poller test suite.

  This card is `waiting_on` DX-289 — every deletion below presumes the corresponding event-driven path is wired and tested.

  ## Scope (DX-287 deliverable 5)

  Delete from `src/poller/index.ts` (`_poll` body + related helpers):

  - The legacy `// DX-242: legacy single-card unscoped dispatch DISABLED` block + the surrounding prep block (the commented-out `await spawnClaude(...)` at line ~1039 + its prelude).
  - `tryResumeOrphan` if no longer called from anywhere (DX-242 disabled the legacy path that called it; verify with grep first).
  - The multi-agent picker invocation from `_poll` (`tryMultiAgentDispatch`) — the pick now runs from the scheduler's `runPicker` callback wired in Phase 4b.1.
  - `tryTriageDispatch` from `_poll` (timers replace it — wired in Phase 4b.2).
  - `checkAndSpawnIdeator` from `_poll` (becomes scheduler-driven when the scheduler observes an idle ideator-capable agent — wire the hook in this card or document for a follow-up if it expands scope beyond the deliverable).
  - `recoverStuckCards` from `_poll` (becomes a lifecycle-event handler on dispatch stop — wire from `dispatch()` onComplete or the scheduler's `onDispatchStop` hook).
  - `evictDeadDispatches` from `_poll` (TTL timers replace it — wired in Phase 4b.2).
  - `dispatchableIssues` / `inProgressIssues` / `cards` partitioning (no consumer once dispatch decisions are gone).
  - `resolveWaitingOnCards` from `_poll` — auto-clearing `waiting_on` is reconcile's job in step 3 of `src/issue/reconcile.ts`. Verify it actually does this; if it does, drop the per-tick call. If it doesn't, add it to reconcile in this card.

  What remains in `_poll` after this card lands (Phase 5's slimming target): `syncRepoFiles`, `tracker.fetchOpenCards`, `bulkSyncMissingYamls`, comment-pull. ~400 LOC. Phase 5 (DX-220) then trims further + renames the module.

  ### Skipped tests cleanup

  `src/poller/index.test.ts` carries 17 `[DX-242 SKIP — DX-215 EPIC AGENTS HANDLE]` skip markers. Each cites either DX-219 (Phase 4) or DX-220 (Phase 5) as the responsible phase. Walk the list (`grep -n "DX-242 SKIP" src/poller/index.test.ts`):

  - Tests whose body says "port to scheduler" → write equivalent in `src/dispatch/scheduler.test.ts` / `triage-timer.test.ts` / `ttl-timer.test.ts`; delete the skip-marked version.
  - Tests whose body says "delete (covered by dispatch.test.ts)" → delete the skip-marked version; verify dispatch.test.ts coverage exists.

  After this card lands, zero `[DX-242 SKIP — DX-219]` markers should remain. `[DX-242 SKIP — DX-220]` and `[DX-242 SKIP — DX-221]` markers may remain for Phase 5/6 to clear.

  ### Add `_poll` spy assertion

  In `src/poller/index.test.ts`, add a top-level describe block that constructs a fake-repo fixture, exercises one `_poll` tick with a single dispatchable ToDo card on disk, and asserts via spy that the dispatch path (`dispatch` from `src/dispatch/core.ts` AND `tryMultiAgentDispatch` from `src/poller/multi-agent-pick.ts`) was invoked ZERO times. The scheduler's event edge is the only path that should dispatch.

  ## Files

  Modify:
  - `src/poller/index.ts` — delete the modules listed above. After the deletions, the `_poll` body should be ~400 LOC and contain only sync + audit work.
  - `src/poller/index.test.ts` — delete the skip-marked tests after porting; add the zero-dispatch spy assertion.
  - `src/dispatch/scheduler.ts` — wire `recoverStuckCards` as `onDispatchStop` hook (or document why deferred); wire `checkAndSpawnIdeator` (or document deferral).
  - `src/dispatch/scheduler.test.ts` — extend with assertions for `onDispatchStop` recovery and ideator-driven dispatch (if wired here).

  Delete:
  - The `// DX-242: legacy single-card unscoped dispatch DISABLED` block.
  - Any dead branch revealed once the listed `_poll` calls are removed.

  ## Test plan

  1. `npx vitest run src/poller/index.test.ts` — `_poll` spy asserts ZERO dispatch invocations; all `[DX-242 SKIP — DX-219]` markers cleared.
  2. `npx vitest run src/dispatch/scheduler.test.ts` — recovery + ideator wiring assertions green.
  3. `npx vitest run` — full backend green.
  4. `npx tsc --noEmit` green.
  5. `make test-system-multi-worker` (DX-164) — concurrent dispatch through the scheduler path still works (no regression).
  6. `make test-system-dispatch` — measure latency: YAML write → claude spawn < 2s on local (vs previous up-to-60s).

  ## Acceptance

  - `_poll` no longer dispatches: spy in `src/poller/index.test.ts` asserts zero invocations of the spawn path AND the multi-agent picker.
  - Zero `[DX-242 SKIP — DX-219]` markers remain in `src/poller/index.test.ts`.
  - `recoverStuckCards` runs from `onDispatchStop` (or follow-up card filed with explicit scope).
  - `evictDeadDispatches`, `tryTriageDispatch`, `tryResumeOrphan`, `resolveWaitingOnCards` are gone from `_poll`.
  - `npx vitest run`, `npx tsc --noEmit`, `make test-system-multi-worker`, `make test-system-dispatch` all green.
  - No regression in DX-164 acceptance criteria (multi-worker concurrency).
  - Latency observed: YAML write → claude spawn < 2s on local.
