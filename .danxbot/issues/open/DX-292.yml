title: "DX-291 > Phase 1: Settings schema ŌĆö prepMode toggle + agents.&lt;name&gt;.broken field"
description: |-
  ## Context

  Parent epic: DX-291 ŌĆö pre-dispatch prep step on agent worktree. This phase lands the persistence layer the rest of the epic builds on: a new per-repo toggle controlling how prep runs, and a new per-agent broken-state field that the poller reads as a dispatch gate + the dashboard surfaces to operators.

  ## What changes

  Two additions to `<repo>/.danxbot/settings.json` schema. Both edits live in `src/settings-file.ts`; both readers consumed by later phases.

  ### 1. `agentDefaults.prepMode` (per-repo)

  - Field: `agentDefaults.prepMode: "combined" | "separate"`
  - Default: `"combined"`
  - Reader: `getPrepMode(repoLocalPath: string): "combined" | "separate"` ŌĆö never throws, defaults to `"combined"` on any read failure (matches the env-default fallback pattern of `isFeatureEnabled`).
  - Writer: covered by the existing writer-merge invariant ŌĆö `display`-only patches never clobber `agentDefaults`; vice versa.

  ### 2. `agents.<name>.broken` (per-agent)

  - Field on each `AgentRecord`:
    ```ts
    broken: null | {
      reason: string;        // non-empty
      suggested_steps: string[];  // ordered, may be empty
      set_at: string;        // ISO 8601
    }
    ```
  - Default on agent creation: `null`.
  - Reader: `readAgents(repoLocalPath)` already exists ŌĆö extend the parsed type to include `broken`. Helpful predicate: `isAgentBroken(record: AgentRecordWithName): boolean = record.broken !== null`.
  - Writer: extend `AgentRecord` writer paths in `src/dashboard/agents-toggles.ts` + any agent-mutation endpoints so a PATCH can set `broken` (used in Phase 7 dashboard surface) or clear it (`broken: null`). Direct file writes from the worker (Phase 5 verdict handler) go through the same write helper.

  ### 3. Poller dispatch gate

  In `src/poller/pick-agent.ts#pickFreeAgent`, exclude any agent whose `broken !== null` from the eligible set. Same filter as `busy`. Add a debug log `[<repo>] pick: skipping agent <name> ŌĆö broken (set_at=<ts>, reason=<first 80 chars>)` so operators can see the skip in worker logs.

  ## Key files

  - `src/settings-file.ts` ŌĆö schema types + readers + writers (`readAgents`, new `getPrepMode`)
  - `src/settings-file.test.ts` ŌĆö schema migration + reader fallback tests
  - `src/dashboard/agents-toggles.ts` ŌĆö writer paths
  - `src/poller/pick-agent.ts` ŌĆö `pickFreeAgent` skip
  - `src/poller/multi-agent-pick.test.ts` ŌĆö assert broken-agent skip

  ## AC

  - `agentDefaults.prepMode` reads `combined` as default when the field is missing.
  - `agentDefaults.prepMode = "separate"` round-trips through `readSettings` + `writeSettings` without clobber.
  - `agents.<name>.broken` accepts `null` and `{reason, suggested_steps, set_at}` shape; rejects malformed input fail-loud at write time.
  - A broken agent is excluded from `pickFreeAgent` results; clearing the field returns the agent to the eligible pool.
  - Unit tests cover both readers + the picker exclusion.
  - `vitest run` (backend) + `cd dashboard && vitest run` both green.

  ## Test plan

  - `src/settings-file.test.ts` adds tests for: `prepMode` default + round-trip, `broken` round-trip on agents.
  - `src/poller/multi-agent-pick.test.ts` adds tests for: broken-agent skip in pickFreeAgent.
  - No integration test needed at this layer ŌĆö the broken-state end-to-end test lives in P5.
