title: "DX-291 > Phase 3: danxbot_prep_verdict MCP tool + worker route + DispatchInput overlay"
description: |-
  ## Context

  Parent epic: DX-291. The prep skill (P4) emits its decision via a new MCP tool the worker routes back to per-dispatch state. This phase lands the wire format + transport.

  ## What changes

  ### 1. New MCP tool `danxbot_prep_verdict` in `src/mcp/danxbot-server.ts`

  Args:

  ```jsonc
  {
    "verdict": "ok" | "waiting_on" | "blocked" | "abort",
    "reason": "string (non-empty)",
    "blocked_by": ["DX-N", ...]    // required when verdict === "waiting_on"
    "broken_details": {            // required when verdict === "abort"
      "suggested_steps": ["str", ...]
    }
  }
  ```

  The tool POSTs the payload to `DANXBOT_PREP_VERDICT_URL` (new env, auto-injected per-dispatch — see overlay below) and returns the worker's ack to the agent. Same fail-loud + fallback chain as `danxbot_complete` (HTTP first, DB fallback when configured, filesystem queue at `<repo>/.danxbot/dispatch-stops/<dispatchId>.json` — except this queue file path is `<repo>/.danxbot/prep-verdicts/<dispatchId>.json` so completion and verdict queues don't collide).

  ### 2. New `mapVerdictToTerminal` helper

  Co-located with the tool definition (mirrors `mapCompleteToTerminalStatus`). Single source of truth for verdict → consequences:

  | verdict | yaml side-effect | agents side-effect | dispatch status after |
  |---|---|---|---|
  | `ok` | none | none | dispatch keeps running (combined mode) OR ends `completed` (separate mode) |
  | `waiting_on` | stamp `waiting_on: {reason, timestamp: now, by: blocked_by}` on candidate YAML | none | dispatch ends `completed` |
  | `blocked` | stamp `status: "Blocked"` + `blocked: {reason, timestamp: now}` on candidate YAML | none | dispatch ends `completed` |
  | `abort` | none on YAML | stamp `agents.<name>.broken = {reason, suggested_steps: broken_details.suggested_steps, set_at: now}` | dispatch ends `failed` w/ summary `"agent env aborted prep — see broken record"` |

  ### 3. New worker route `POST /api/prep-verdict/:dispatchId`

  In `src/worker/server.ts` + new handler in `src/worker/prep-verdict-route.ts`. Auth: per-dispatch token (same as `/api/stop/...`). Body: the verdict payload. Behavior:

  1. Validate args + payload shape; 400 on malformed.
  2. Look up dispatch by id in `activeJobs`; 404 if absent.
  3. Apply YAML + settings side-effects via `mapVerdictToTerminal` outputs.
  4. Stash the verdict on `job.prepVerdict` so the wrapping multi-agent-pick code (P5) reads it on `onComplete`.
  5. For `ok` in combined mode: do nothing else — agent continues into work.
  6. For `ok` in separate mode: invoke `job.stop("completed", "prep ok")`.
  7. For `waiting_on`/`blocked`/`abort`: invoke `job.stop` with the matching status + summary.
  8. Return 200 + the applied side-effect summary so the agent's MCP tool returns it.

  ### 4. DispatchInput overlay auto-injection

  `src/dispatch/core.ts#dispatch` auto-injects `DANXBOT_PREP_VERDICT_URL = http://localhost:<workerPort>/api/prep-verdict/<dispatchId>` AND advertises the tool only when the URL is present (mirrors the `DanxbotToolUrls` filter pattern in `src/mcp/danxbot-server.ts#buildActiveTools`). Adds the new field to `DanxbotToolUrls` + `McpFactoryOptions` (`src/agent/mcp-types.ts`) + the registry.

  ### 5. Tests

  - Unit: `src/mcp/danxbot-server.test.ts` for tool def + fail-loud branches.
  - Unit: `src/worker/prep-verdict-route.test.ts` for each verdict branch.
  - Unit: `src/dispatch/core.test.ts` adds an overlay-injection assertion for `DANXBOT_PREP_VERDICT_URL`.
  - Integration: round-trip test that spawns a real (fake-claude) dispatch, emits a verdict, asserts the worker applied the YAML stamp + the dispatch row status.

  ## Key files

  - `src/mcp/danxbot-server.ts` — tool definition + advertise filter + `mapVerdictToTerminal`
  - `src/worker/prep-verdict-route.ts` — new handler
  - `src/worker/server.ts` — route table entry
  - `src/dispatch/core.ts` — overlay auto-injection
  - `src/agent/mcp-types.ts` — `DanxbotToolUrls` shape
  - `src/agent/mcp-registry.ts` — wire-up

  ## AC

  - New MCP tool definition registered + filtered on URL presence (mirrors `danxbot_complete` pattern).
  - New worker route accepts the four verdict shapes and applies each side-effect end-to-end.
  - DispatchInput overlay injects DANXBOT_PREP_VERDICT_URL automatically.
  - Fail-loud on missing `blocked_by` for `waiting_on` verdict + missing `broken_details` for `abort` verdict.
  - HTTP + DB + filesystem-queue fallback chain working (DX-242 pattern, distinct queue dir from `dispatch-stops`).
  - All unit + integration tests green.

  ## Test plan

  - Tool-def unit tests (existing pattern in danxbot-server.test.ts).
  - Route handler unit tests with fake worker context.
  - Integration test in `src/__tests__/integration/prep-verdict.test.ts` using `fake-claude` to drive the tool from a real dispatch.
