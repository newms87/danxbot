    text: |-
      <!-- danxbot -->

      ## Pickup — moving to Waiting On DX-292

      Phase 3 ships the `danxbot_prep_verdict` MCP tool, the `POST /api/prep-verdict/:dispatchId` worker route, and the DispatchInput overlay auto-injection. AC #3 requires the abort verdict to be end-to-end functional — which per the card description includes stamping `agents.<name>.broken = {reason, suggested_steps, set_at}` on settings.json. That schema field + its writer is Phase 1's scope (DX-292) — see DX-292 description "Direct file writes from the worker (Phase X verdict handler) go through the same write helper".

      ### Why this is a real blocker, not in-session fix-it-yourself work

      - `src/settings-file.ts` currently has no `broken` field on `AgentRecord`. `normalizeOneAgent` strips unknown fields on every read, so a direct `mutateAgents({broken: {...}})` write round-trips to nothing. The abort verdict's settings side-effect would be silently no-op.
      - Adding the field here (in P3) duplicates P1's scope: schema type + normalizer extension + writer helper + tests. P1 is unowned and `waiting_on: [DX-289]` — but DX-289 is now Done (closed), so the poller will auto-clear and dispatch P1 on the next tick. Implementing the schema in P3 would race a parallel P1 dispatch and create a merge conflict in `src/settings-file.ts`.
      - The other phase cards (P4=DX-295, P5=DX-296, P6=DX-297, P7=DX-298) all carry serial `waiting_on` stamps from the epic split. P3 was missed — should have had `waiting_on.by: [DX-292]` from the start.

      ### What the resumed P3 dispatch needs to land

      1. Extend `DanxbotToolUrls` (`src/agent/mcp-types.ts`) with `prepVerdict?: string`.
      2. Wire it through `src/agent/mcp-registry.ts` (env var read at MCP boot).
      3. Auto-inject `DANXBOT_PREP_VERDICT_URL = http://localhost:<workerPort>/api/prep-verdict/<dispatchId>` in `src/dispatch/core.ts#dispatch`.
      4. Add the `danxbot_prep_verdict` tool definition + dispatcher case in `src/mcp/danxbot-server.ts`. Mirror the `danxbot_complete` shape (fail-loud on missing URL, HTTP/DB/fs fallback chain — separate queue dir `.danxbot/prep-verdicts/` so it doesn't collide with `.danxbot/dispatch-stops/`).
      5. Add `mapVerdictToTerminal` co-located with the tool — single source of truth for `verdict → {yaml side-effect, agents side-effect, dispatch status}`.
      6. Build the route handler at `src/worker/prep-verdict-route.ts` (new file) + register it in `src/worker/server.ts`. Behavior per the four-verdict table in the card description.
      7. Use P1's `setAgentBroken` writer (or whatever P1 names it) for the abort verdict's `agents.<name>.broken` stamp. P1's description anticipates this caller.
      8. Tests: tool-def unit (`src/mcp/danxbot-server.test.ts`), route handler unit (`src/worker/prep-verdict-route.test.ts` new), overlay-injection assertion (`src/dispatch/core.test.ts`), end-to-end integration (`src/__tests__/integration/prep-verdict.test.ts` new).

      ### Fallback-queue path

      Use `<repo>/.danxbot/prep-verdicts/<dispatchId>.json` — distinct from `dispatch-stops/`. Add a sibling boot-replay scanner in worker boot (mirror `replay-stop-queue.ts`) for the prep-verdict queue. The replay can be a follow-up if it inflates this phase, but the queue write IS part of P3's fallback chain AC.

      ### Dispatch artifact

      No code changed in this dispatch — only the YAML edits below. Status flipped to `In Progress` on pickup, then `waiting_on` set with `by: [DX-292]`. Worker normalizes status back to `ToDo` on the post-completion auto-sync per the Step 10b contract. Poller auto-clears `waiting_on` once DX-292 reaches Done, and a fresh dispatch picks up P3 from this card.
