title: "DX-291 > Phase 5: multi-agent-pick rewrite — dispatch prep, drop conflict-check, branch on prepMode"
description: |-
  ## Context

  Parent epic: DX-291. Waits on P1 (settings — DX-292), P2 (worktree sync — DX-293), P4 (prep skill — DX-295). This phase rewires the poller's per-tick orchestration to dispatch the prep step instead of the legacy `runConflictCheck` precursor and lets the prep verdict drive the YAML / settings / dispatch outcome.

  ## What changes

  ### 1. Drop `runConflictCheck` call from `src/poller/multi-agent-pick.ts`

  Remove the entire block at lines ~310-367 of today's file:

  - The `liveInProgress` filter via `liveDispatchIssueIds` STAYS (still useful for prep + as a perf optimization).
  - The `runConflictCheck` invocation, the malformed-JSON handling, the `waiting_on` stamping branch — all DELETED.

  ### 2. Dispatch prep instead

  Per-card flow becomes:

  1. Existing healing + agent pick + card pick + live-dispatch guard + tracker lock acquire — UNCHANGED.
  2. After `stampDispatchAndWrite`, build the task body based on `getPrepMode(repo.localPath)`:
     - `combined` → `task = "/danx-prep " + stamped.id + "\n\n/danx-next\n\nEdit " + yamlPath + " directly..."`
     - `separate` → `task = "/danx-prep " + stamped.id`
  3. Use `dispatchWithRecovery` (already worktree-aware after P2) to spawn. The dispatch lifecycle is the same as today; the agent's first job IS prep.
  4. The new MCP tool emits the verdict mid-dispatch; the worker route (P3) applies the YAML / settings side-effects + stops the dispatch on non-ok verdicts.
  5. The wrapping `onComplete` callback (already wired) sees the final job status:
     - `job.status === "completed"` AND `job.prepVerdict?.verdict === "ok"` AND prepMode === "combined" — work completed; existing card-progress check applies.
     - `job.status === "completed"` AND `job.prepVerdict?.verdict === "ok"` AND prepMode === "separate" — prep ran clean but no work yet; SKIP the card-progress check (no card movement is expected) — poller picks the card again next tick for the actual work dispatch.
     - `job.status === "completed"` AND `job.prepVerdict?.verdict === "waiting_on"` / `"blocked"` — YAML already stamped by the worker route; SKIP card-progress check.
     - `job.status === "failed"` AND `job.prepVerdict?.verdict === "abort"` — agent stamped broken by the worker route; SKIP card-progress check (env failure, not card failure). DO NOT write CRITICAL_FAILURE — that's for environment-level breakage on the worker side, not a single broken agent.
     - Any other failure shape → existing failure handling (clear dispatch block, etc.).

  ### 3. Separate-mode follow-up dispatch on next tick

  After a separate-mode prep dispatch finishes with `ok`, the candidate card is still claimed (`assigned_agent` stays) + `dispatch` is cleared. Next tick, `pickCardForAgent` picks it again via the self-claim branch — but now the YAML has a `prep_completed_at` timestamp the worker route added (so the next dispatch knows to skip prep and go straight to work).

  **Wait** — that complicates the protocol. Simpler: separate-mode's follow-up work dispatch ALSO runs `/danx-prep` (which detects a fresh worktree + no WIP + no overlap + emits `ok` quickly) then proceeds to `/danx-next`. The cost of an extra prep on the work dispatch is amortized — the skill is cheap on a clean worktree. So we use `combined` prompt shape ALWAYS for the work dispatch, regardless of `prepMode` — the toggle ONLY decides whether a separate prep-only dispatch precedes it. Simpler state machine, no `prep_completed_at` field.

  Update the description accordingly: **separate-mode = TWO dispatches per card (prep alone, then combined prep+work on next tick); combined-mode = ONE dispatch (prep+work in one go).** The `combined` prompt shape is always used at the work dispatch.

  ### 4. Cleanup

  - Remove `runConflictCheck` + `isConflictCheckEnabled` imports if unused.
  - The `isConflictCheckEnabled` reader stays for P6 (until conflict-check.ts is deleted in P6 too).

  ### 5. Tests

  - Update `src/poller/multi-agent-pick.test.ts`:
    - Remove conflict-check-related cases (rejection, malformed, etc.).
    - Add: combined-mode prep dispatch happy path.
    - Add: separate-mode dispatch — two ticks, two dispatches, prep then work.
    - Add: verdict=waiting_on → YAML stamped, no work dispatch.
    - Add: verdict=abort → agent.broken stamped, agent skipped next tick.
  - Integration test under `src/__tests__/integration/prep-flow.test.ts` driving the full happy path via fake-claude.

  ## Key files

  - `src/poller/multi-agent-pick.ts` — primary edit
  - `src/poller/multi-agent-pick.test.ts`
  - `src/__tests__/integration/prep-flow.test.ts` (new)

  ## AC

  - `runConflictCheck` no longer called from multi-agent-pick (compiler / grep enforces).
  - Combined-mode flow: ONE dispatch per card, agent runs prep then work in same session, card progress check applies.
  - Separate-mode flow: TWO dispatches per card across two ticks; first is prep-only; second is combined prep+work.
  - Verdict `waiting_on` stamps `waiting_on.by` correctly + skips card-progress check.
  - Verdict `abort` stamps `agents.<name>.broken` correctly + skips card-progress check; next tick excludes that agent.
  - Verdict `ok` (combined mode) → card progresses through work + standard onComplete.
  - All multi-agent-pick unit + integration tests green.

  ## Test plan

  Unit + integration as listed. The integration test is the load-bearing acceptance — it exercises the worker route, the YAML / settings side-effects, and the poller's onComplete branching together.
