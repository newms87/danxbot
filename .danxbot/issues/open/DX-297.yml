title: "DX-291 > Phase 6: Retire conflict-check module + recovery-mode dirty branch + docs"
description: |-
  ## Context

  Parent epic: DX-291. Waits on P5 (multi-agent-pick rewrite — DX-296). The prep flow subsumes both the legacy conflict-check and the dirty-validate recovery prompt. This phase deletes the dead modules + updates the documentation that still references them.

  ## What changes

  ### 1. Delete `src/dispatch/conflict-check.ts` + tests

  Confirm zero remaining callers post-P5 (grep `runConflictCheck`, `extractJsonVerdict`, `coerceVerdict`, `conflictCheckStagingDir`). Delete the file + `src/dispatch/conflict-check.test.ts`. Remove the related settings reader `isConflictCheckEnabled` from `src/settings-file.ts` + the `overrides.conflictCheck` field if no other consumer remains.

  ### 2. Collapse recovery-mode dirty path

  `src/dispatch/recovery-mode.ts` today routes `validate() === "dirty"` to `dispatchInRecoveryMode` (the legacy recovery prompt). The new prep skill covers branch-recovery as part of its WIP recovery step (P4). Decision per P5: `dispatchWithRecovery` becomes a thin wrapper that:

  1. Calls `manager.fetchOrigin` (unchanged).
  2. Skips `validate` (informational only — prep skill handles state inspection itself).
  3. Calls `manager.syncWorktree` (from P2).
  4. On `syncWorktree.kind === "abort"` — stamp `agents.<name>.broken` immediately + return a failed dispatch result without spawning. Agent skipped next tick.
  5. Otherwise — call `deps.dispatch(input)` (the prep-then-work dispatch).

  `dispatchInRecoveryMode` + the recovery prompt builder (`buildRecoveryPrompt`, `buildStillDirtyComment`, `findLastModifiedOpenCard`) are deleted. The post-recovery re-validate is also retired — the prep skill's verdict is the new authority on "is the agent ready?".

  ### 3. Documentation updates

  - `.claude/rules/agent-dispatch.md`:
    - **Forbidden Patterns** table: add a row "Reintroducing `runConflictCheck` or any separate pre-dispatch conflict-check dispatch" with the rationale (prep covers it).
    - **Forbidden Patterns** table: add a row "Using `git reset --hard` / `git checkout <ref>` / `git restore` / `git clean -f` in any dispatch / worktree / recovery code path" citing the global git-discipline rule.
    - Remove the "DX-200 / Phase-5 conflict-check" subsection if present.
    - Add a new subsection "Prep step" describing the combined / separate modes + the verdict tool + the `agents.<name>.broken` field as a dispatch gate.

  - `CLAUDE.md`:
    - Skill-triggers table: keep `danxbot:issue-card-workflow`, `dev:git-discipline`. Add a reference to the new prep skill name (`danx-prep`) under the Trello/poller architecture section.
    - Remove any reference to `conflictCheckEnabled` if it appeared.

  - `src/poller/inject/workspaces/issue-worker/.claude/rules/`:
    - Update or remove `danx-conflict-check.md` if it exists.
    - The new `danx-prep` SKILL.md (P4) is authoritative for the agent-facing rule.

  - `~/web/claude-plugins/danxbot/skills/danxbot/SKILL.md`:
    - Add a paragraph on the prep step + the `agents.<name>.broken` dispatch gate.
    - Bump the plugin version via `./scripts/publish.sh patch danxbot` so consumers refresh.

  ### 4. System test

  Add `src/__tests__/system/run-prep-system-test.sh` exercising:

  - Real worker, real fake-claude.
  - Happy path: clean worktree → prep ok → work dispatch → card moves to Done.
  - Conflict path: synthetic in-progress sibling with overlapping file scope → prep waiting_on → YAML stamped.
  - Abort path: rebase conflict against origin/main → prep abort → agents.<name>.broken stamped → next tick excludes agent.

  Wire into `make test-system` and document in `.claude/rules/make-commands.md`.

  ## Key files

  - `src/dispatch/conflict-check.ts` (delete)
  - `src/dispatch/conflict-check.test.ts` (delete)
  - `src/dispatch/recovery-mode.ts` (collapse dirty branch)
  - `src/dispatch/recovery-mode.test.ts` (update)
  - `src/dispatch/recovery-prompt.ts` + `recovery-card-update.ts` (delete if unused)
  - `src/dispatch/recovery-prompt.test.ts` (delete if unused)
  - `src/settings-file.ts` (remove isConflictCheckEnabled if unused)
  - `.claude/rules/agent-dispatch.md`
  - `CLAUDE.md`
  - `src/poller/inject/workspaces/issue-worker/.claude/rules/` (audit + clean)
  - `~/web/claude-plugins/danxbot/skills/danxbot/SKILL.md`
  - `src/__tests__/system/run-prep-system-test.sh` (new)
  - `Makefile` (test-system target wire-up)

  ## AC

  - `src/dispatch/conflict-check.ts` + its test deleted; grep on the diff confirms zero remaining references.
  - `dispatchInRecoveryMode` + recovery prompt builder deleted; `dispatchWithRecovery` collapsed to fetch + syncWorktree + spawn.
  - `.claude/rules/agent-dispatch.md` Forbidden Patterns table includes the conflict-check-reintroduction row AND the destructive-git row.
  - `CLAUDE.md` references prep-step concept; `danxbot:issue-card-workflow` skill triggers still correct.
  - `~/web/claude-plugins/danxbot/skills/danxbot/SKILL.md` updated AND plugin version bumped + pushed via publish.sh so consumers refresh.
  - New system test runs green via `make test-system-prep` (or analogous target).
  - Full backend vitest suite + tsc + dashboard vitest + vue-tsc all green.

  ## Test plan

  - Grep-based AC for dead-code deletion.
  - System test as the integration ceiling.
  - Manual smoke: `make launch-worker-host REPO=danxbot` w/ a fixture card; observe the prep then work flow in a Windows Terminal tab.
