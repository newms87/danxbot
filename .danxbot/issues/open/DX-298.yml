title: "DX-291 > Phase 7: Dashboard broken-agent surface — banner, reason, steps, Mark Resolved"
description: |-
  ## Context

  Parent epic: DX-291. Waits on P1 (DX-292 — broken field on agent record). This phase is the operator-facing UI: a broken agent must be visible at a glance, and the human must be able to clear the broken record from the dashboard once they've taken the suggested steps.

  ## What changes

  ### 1. Read path

  `GET /api/agents?repo=<name>` (existing endpoint, `src/dashboard/agents-server.ts` or wherever agent listing lives) returns each agent with its `broken` field intact. SSE topic `agents:updated` (new or existing) re-emits when the field changes — driven by the worker's settings file writer.

  ### 2. Write path

  `PATCH /api/agents/:name?repo=<name>` — auth-gated per-user bearer (NOT the dispatch token). Allowlisted patch fields:

  | Field | Type | Notes |
  |---|---|---|
  | `broken` | `null` only (cannot SET broken from dashboard; only clear) | Clearing returns the agent to the dispatchable pool on next tick. Always paired with the operator's action — they've fixed the underlying env. |

  Anything else 400.

  ### 3. Vue dashboard surface

  `dashboard/src/components/Agents...` — augment the existing Agents tab:

  - When `agent.broken !== null`, render a red banner on the agent card:
    - Title: `⚠ Agent <name> is broken`
    - Subtitle (italic): `Set at: <relative time> ago`
    - Body: `agent.broken.reason` as prose
    - **Suggested steps** list: `agent.broken.suggested_steps[]` rendered as ordered list (when populated)
    - Footer: a "Mark Resolved" button — confirmation dialog ("Confirm the agent's env is fixed. Cleared records cannot be recovered without a re-stamp from a future prep dispatch.") → calls `PATCH /api/agents/<name>` with `{broken: null}`.
  - Agent cards with `broken === null` render normally.

  ### 4. SSE topic

  `issue:updated` already exists for YAML edits. Add `agents:updated` topic (or reuse if already present) so the Agents tab live-updates when a worker stamps `broken` via the verdict route (P3).

  ### 5. Tests

  - Backend: `src/dashboard/agents-server.test.ts` (or analogous) covers GET shape + PATCH allowlist (`broken: null` accepted, any other patch shape 400).
  - Dashboard: `dashboard/src/components/Agents*.test.ts` covers the banner render + click-handler → API call.

  ## Key files

  - `src/dashboard/agents-server.ts` (or wherever the agent routes live — confirm via grep first)
  - `dashboard/src/components/Agents*.vue`
  - `dashboard/src/api.ts` — add `patchAgent` wrapper
  - `src/dashboard/agents-server.test.ts`
  - `dashboard/src/components/Agents*.test.ts`

  ## AC

  - GET /api/agents returns broken field intact.
  - PATCH /api/agents/:name accepts `{broken: null}` only; other fields 400.
  - Agents tab renders red banner when broken !== null, with reason + suggested_steps.
  - "Mark Resolved" button confirms then PATCHes; agent card returns to normal state on success.
  - SSE topic broadcasts agents:updated on broken changes so the tab live-updates.
  - Backend + dashboard tests green.

  ## Test plan

  - Dashboard test: render Agents component with a fixture agent.broken populated, assert banner present + click handler hits the right endpoint.
  - Backend test: route handler unit tests for GET shape + PATCH allowlist.
  - Manual smoke: stamp broken via the worker route directly (P3 integration test fixture), watch dashboard auto-refresh.
