title: "DX-301 > Phase 2: atomic .env writer + Trello credential PATCH route"
description: |-
  Parent epic: **DX-301** — Dashboard Settings: per-repo Trello config section.

  Builds on Phase 1's `trelloSync` toggle. This phase adds the **credential rotation surface**: an atomic per-repo `.env` writer module + a PATCH route that lets the dashboard rotate `DANX_TRELLO_API_KEY` / `DANX_TRELLO_API_TOKEN` without operators having to SSH and hand-edit `<repo>/.danxbot/.env`.

  Credentials live in the env file (not `settings.json`) because the existing pattern routes secrets through `<repo>/.danxbot/.env` (see `.claude/rules/docker-runtime.md` — DANX_* vars). settings.json carries display mirrors only.

  ## Writer module

  New file: `src/dashboard/repo-env-writer.ts`.

  Surface:
  ```ts
  export async function writeRepoEnvVars(args: {
    repoLocalPath: string;
    updates: Record<string, string>;   // key -> new value
    writtenBy: string;                 // for logging / audit
  }): Promise<void>;
  ```

  Implementation contract:

  - Reads `<repo>/.danxbot/.env`. If missing, throws — operators must have an existing .env (created by `./install.sh`); we never auto-create one from the dashboard.
  - Parses line-by-line. Preserves blank lines, comments (`#`), and unrelated `KEY=value` pairs verbatim — only the specified keys are rewritten in place.
  - Updates an existing key's value in-place if present; appends `KEY=value` at the end if absent.
  - Values are written raw (no auto-quoting). Trello API key + token are alphanumeric so no escaping needed; reject any value containing newlines or null bytes fail-loud at the route layer.
  - Atomic write: temp file in same dir + `renameSync`. Preserve file permissions (read-modify-rewrite using existing mode).
  - Serialize concurrent writes per file via an in-process promise chain keyed by absolute .env path (same pattern as `settings-file.ts#inProcessQueues`).
  - Logs `[repo-env-writer] wrote N keys to <path> (by <writer>)` after each successful write.

  ## PATCH route

  Extend `src/dashboard/agents-toggles.ts` (or factor a sibling file `agents-credentials.ts` if the toggles file gets crowded — operator's call):

  ```
  PATCH  /api/agents/:repo/trello-credentials
  body:  { apiKey?: string; apiToken?: string }
  auth:  per-user bearer (NOT dispatch token)
  ```

  Validation (fail-loud, 400 on each):

  - Body parses as JSON object.
  - At least one of `apiKey` / `apiToken` is present; both absent → 400 (`No credential field to update`).
  - For each present field: must be a non-empty string, must not contain `\n`, `\r`, `\0`, or whitespace-only.
  - 401 when no user bearer; reject the dispatch token if present.

  On success: 200 with `{updated: ["apiKey", "apiToken"]}` (just the keys touched — never the raw values). The response does NOT echo the new secret back.

  ## Worker re-read

  `<repo>/.danxbot/.env` is loaded by `src/repo-context.ts` at worker boot. To pick up rotations without a restart:

  - Add a chokidar watcher on `<repo>/.danxbot/.env` in the worker's `startWorkerMode` boot path (mirror the existing `watchSettingsFile` shape in `src/settings-file.ts`).
  - On `change`, re-run `loadRepoContext(repoName)` and replace the in-memory `RepoContext` reference used by `dispatch()`, `autoSyncTrackedIssue`, etc.
  - Single-fire debounce (200ms) to coalesce the temp+rename event sequence.
  - Log `[<repo>] reloaded RepoContext from .env change` on each reload.

  Acceptable shortcut if the RepoContext-replacement plumbing balloons: log a clear `Worker restart required to pick up new credentials` at the PATCH response and document it in the AC. Production-grade reload is the better outcome; the shortcut is on the table only if integration cost is excessive.

  ## Tests

  - `src/dashboard/repo-env-writer.test.ts`:
    - Round-trip: write `{FOO: "bar"}` to a tmp .env that has `OTHER=keep` + `FOO=old`; FOO becomes `bar`, OTHER untouched.
    - Append: write a key not present; appended at file end; nothing else changes.
    - Concurrent: two `writeRepoEnvVars` calls in parallel land both edits losslessly (in-process queue).
    - Atomic: writer fails mid-write → original file intact (kill the process between temp-write and rename, or simulate via mock).
    - Missing .env throws.
    - Newline / null byte in value rejected at route layer (validation lives in route, not writer).
  - `src/dashboard/agents-toggles.test.ts` (or `agents-credentials.test.ts`):
    - PATCH with valid `apiKey` + `apiToken` → 200, .env contains both new values.
    - PATCH with only `apiKey` → 200, .env has new `apiKey`, existing `apiToken` untouched.
    - PATCH with both fields absent → 400.
    - PATCH with empty string → 400.
    - PATCH with newline-containing value → 400.
    - PATCH without user bearer → 401.
    - PATCH with dispatch token instead → 401.
  - `cd dashboard && npx vue-tsc --noEmit` and `npx tsc --noEmit` green.

  ## Out of scope (this phase)

  - Vue UI panel + masked input + reveal toggle → Phase 3.
  - Rotating any non-Trello credential (Slack, GitHub) → future cards if/when those need rotation surfaces.
  - Validating Trello credentials against the Trello API (sanity-check call) — caller flips the toggle to test; we never want to hit Trello during a credential-rotation PATCH.

  ## Key files

  | File | Change |
  |---|---|
  | `src/dashboard/repo-env-writer.ts` | NEW — atomic .env writer module |
  | `src/dashboard/repo-env-writer.test.ts` | NEW |
  | `src/dashboard/agents-toggles.ts` | New `handlePatchTrelloCredentials` handler |
  | `src/dashboard/agents-toggles.test.ts` | Cover the new handler (or new sibling test file) |
  | `src/dashboard/server.ts` | Route registration for `PATCH /api/agents/:repo/trello-credentials` |
  | `src/worker/server.ts` (or wherever the worker boot wires watchers) | Add `.env` chokidar watcher + `loadRepoContext` reload |
  | `src/repo-context.ts` | Verify the loader is safe to re-call mid-process; export a setter if needed |
