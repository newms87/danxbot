title: "[Danxbot > Dispatch] Backfill stall-recovery terminateWithGrace test in dispatch/core.test.ts"
description: |-
  ## Context

  Surfaced during the test-review on card SWTli9Jz (AgentHandle discriminated-union refactor). The exported `terminateWithGrace(job, graceMs)` helper is now the only path used by stall recovery in `src/dispatch/core.ts:395`:

  ```ts
  await terminateWithGrace(currentJob, 5_000);
  ```

  That callsite has zero test coverage — `StallDetector` is fully stubbed in `core.test.ts` (a class with no-op `start`/`stop` methods at lines 64-70), so the real `onStall` callback is never invoked.

  ## Solution

  Refactor the `StallDetector` mock to capture the `onStall` callback the launcher passes into the ctor, then add tests that:
  1. Capture `onStall` from the StallDetector ctor invocation.
  2. Invoke it with `(reason, isInputStall)`.
  3. Assert `terminateWithGrace` was called with the current job and `5_000`.
  4. (Bonus) Verify nudgeCount is incremented before terminate, and the resume spawn happens after grace.

  ## Key files

  - `src/dispatch/core.ts:395` — the uncovered call-site.
  - `src/dispatch/core.test.ts` — extend the existing StallDetector mock to capture `onStall`.

  ## How to verify

  `npx vitest run src/dispatch/core.test.ts` — new test passes; covers the previously-untested code path.

  ## Found while

  Test-review of card SWTli9Jz (AgentHandle refactor). Flagged Critical by test-reviewer; deferred to keep that card scoped.
