title: "[Danxbot > Docs] Document manual workspace .mcp.json unblock in agent-dispatch.md"
description: |-
  ## Problem

  When a connected repo has the trello poller disabled, the workspace `.mcp.json` files under `<repo>/.danxbot/workspaces/*/` never refresh from the baked inject source. Operators / future agents hitting this will see opaque MCP-tool-missing errors with no obvious recovery path.

  Until the inject pipeline is fixed (separate Action Items card), document the manual unblock recipe in `.claude/rules/agent-dispatch.md` so the next person hitting it doesn't have to rediscover it.

  ## Recipe

  ```bash
  # Inside the worker container (local: docker exec danxbot-worker-<repo>;
  # prod: ssh ec2 then docker exec on EC2):

  # 1. Copy fresh inject sources over the bind-mounted workspace files:
  docker exec danxbot-worker-<repo> bash -c '
    for ws in trello-worker slack-worker system-test; do
      cp /danxbot/app/src/poller/inject/workspaces/$ws/.mcp.json \
         /danxbot/app/repos/<repo>/.danxbot/workspaces/$ws/.mcp.json 2>/dev/null
    done
  '

  # 2. Clear any CRITICAL_FAILURE flag the failed dispatch wrote:
  docker exec danxbot-worker-<repo> rm -f \
    /danxbot/app/repos/<repo>/.danxbot/CRITICAL_FAILURE

  # 3. Re-dispatch — playwright (or whatever new MCP server was added) is now available.
  ```

  ## Acceptance criteria

  - Recipe added to `.claude/rules/agent-dispatch.md` under a clearly named section (e.g. "Workspace .mcp.json drift — manual unblock")
  - Recipe references the underlying Action Items card so the doc can be removed once auto-sync ships
  - Cross-link from the "Critical failure flag — poller halt" section so an operator clearing CRITICAL_FAILURE finds the workspace-drift symptom too

  ## Why this matters

  Production incident on 2026-04-27 (Trello foOZwh09): the prod gpt-manager worker silently ran against a 6-day-stale workspace `.mcp.json` after a deploy that shipped a new playwright MCP entry. Took ~30 min to diagnose. The diagnosis is non-obvious because the inject SOURCE on the image is correct — only the bind-mounted DESTINATION is stale.

  ## References

  - Trello foOZwh09 — incident + retro
  - Sibling Action Items card — the real fix (auto-sync on worker boot)
