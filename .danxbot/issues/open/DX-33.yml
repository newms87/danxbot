title: "[Danxbot > Inject] Sync workspace .mcp.json on worker boot + first dispatch (not only poller)"
description: |-
  ## Problem

  `injectDanxWorkspaces` (`src/poller/index.ts#syncRepoFiles`) is the only mechanism that copies `src/poller/inject/workspaces/*/.mcp.json` from the baked danxbot image into `<repo>/.danxbot/workspaces/*/.mcp.json` on the connected repo's bind mount. It runs ONLY inside the poll tick loop, gated by `overrides.trelloPoller.enabled`.

  When a connected repo has the trello poller disabled (the default for any repo that uses danxbot only as an external dispatch endpoint, e.g. gpt-manager prod), the poll loop never executes, so the workspace `.mcp.json` never refreshes. Every worker rebuild + redeploy bakes a NEW inject source into the image but the bind-mounted workspace stays whatever it was the last time the poller ran (potentially weeks stale).

  ## Repro

  Verified during Trello card foOZwh09 (commit 7042162):

  1. Local worker rebuilt with `eae2d4d` adding playwright entry to `src/poller/inject/workspaces/trello-worker/.mcp.json`
  2. Deployed to gpt prod via `make deploy TARGET=gpt`. Image SHA `3ff09d3c8e91` shipped successfully; new mcp.json present at `/danxbot/app/src/poller/inject/workspaces/trello-worker/.mcp.json` inside the container
  3. Dispatched agent against `trello-worker` workspace
  4. Agent failed: `mcp__playwright__playwright_screenshot tool is not available. Tools list shows only mcp__danxbot__* and mcp__trello__* MCP tools`
  5. Inspected bind-mounted workspace: `/danxbot/app/repos/gpt-manager/.danxbot/workspaces/trello-worker/.mcp.json` last modified 6 days earlier (Apr 27 13:40), contained NO playwright entry
  6. Manual unblock: `docker exec ... cp inject/.mcp.json -> workspaces/.mcp.json && rm CRITICAL_FAILURE` then re-dispatch succeeded

  ## Root cause

  In `src/poller/index.ts`, `syncRepoFiles` (which calls `injectDanxWorkspaces`) is invoked from `pollTick`, which exits early when `isFeatureEnabled(ctx, "trelloPoller") === false`. Workers that boot with the poller disabled NEVER call `syncRepoFiles`, so their workspace dir is whatever the last poll-enabled boot left there.

  ## Solution

  Move `syncRepoFiles` (or at least the `injectDanxWorkspaces` portion of it) to run independently of the poller gate:

  **Option A â€” sync on worker boot.** Call `syncRepoFiles(ctx)` once in worker startup (`src/index.ts` worker mode, after `RepoContext` loaded but before `startPoller` / `startWorkerServer`). Idempotent writes mean re-running on every boot is safe.

  **Option B â€” sync on first dispatch.** Hook into `dispatch()` in `src/dispatch/core.ts`: before `resolveWorkspace()`, call `syncRepoFiles(ctx)` if the workspace dir is older than the inject source (or unconditionally â€” writes are idempotent).

  **Option C â€” both.** Worker boot for the deploy-time refresh; first dispatch as a safety net for any post-deploy modification of inject sources (rare, but covers the edge case).

  Recommended: A. Cheap, deterministic, runs at the moment the new image first executes. The poller gate stays ONLY for the actual Trello card-polling work, not for inject sync.

  ## Key files

  - `src/poller/index.ts` â€” `pollTick`, `syncRepoFiles`, `injectDanxWorkspaces` (line ~586 has the write-only contract docstring)
  - `src/index.ts` â€” worker mode entrypoint where `RepoContext` is built
  - `src/dispatch/core.ts` â€” `dispatch()` function, the single dispatch entry
  - `src/repo-context.ts` â€” context loader

  ## Acceptance criteria

  - Worker boot in a repo with `overrides.trelloPoller.enabled = false` populates `<repo>/.danxbot/workspaces/*/.mcp.json` from the baked inject source EVEN when no poll tick runs
  - Existing poll-tick sync behavior preserved when poller is enabled (no double-write race)
  - Test asserts: spin up a worker against a repo with stale workspace `.mcp.json` + disabled poller â†’ boot â†’ workspace `.mcp.json` matches inject source byte-for-byte
  - Test asserts: poller-enabled repo still syncs on tick (regression guard)

  ## Why this matters

  Every external-dispatch-only repo (anyone using `/api/launch` without a Trello board, e.g. integrations from upstream apps) silently runs against stale workspace config until someone notices the agent missing tools. The fix is small and removes a footgun that cost ~30 min of debugging in the foOZwh09 retro alone.

  ## References

  - Trello foOZwh09 â€” full incident retro
  - Commit 7042162 â€” playwright text-block fix where the gap was discovered
  - Commit eae2d4d â€” workspace wiring that prod failed to pick up
