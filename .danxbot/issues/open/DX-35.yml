title: "Cleanup: stale danx-self-terminate.sh refs in injected SKILL.md files"
description: |-
  ## Context

  `danx-self-terminate.sh` was deleted in commit badf68d on 2026-04-21 — replaced by the `danxbot_complete` MCP tool. The `DANXBOT_EPHEMERAL` env var was retired alongside it.

  Surfaced while working Trello `26M1i7rf` (the `launcher.test.ts` rename). The card-grep verification (`grep -rn "DANXBOT_EPHEMERAL\|DANXBOT_PROJECT_ROOT" src/`) still returns hits in two SKILL.md files — operator-facing instructions that tell agents to run a script that no longer exists.

  ## Problem

  These files reference the deleted script and env var:

  - `src/poller/inject/workspaces/trello-worker/.claude/skills/danx-next/SKILL.md:218-220` — section "If the ToDo list was empty (from Step 1 of top-level Steps)" tells agents to run `.claude/tools/danx-self-terminate.sh $PPID` after `danxbot_complete`.
  - `src/poller/inject/workspaces/trello-worker/.claude/skills/danx-triage/SKILL.md:300-304` — "Step 10 — Self-Terminate" tells agents the same thing.

  Both are dead instructions: the script is gone, and `danxbot_complete` already handles termination (the worker SIGTERMs the Claude process on stop).

  ## Solution

  Delete the now-redundant termination sections from both SKILL.md files (they are at the very end of each file). `danxbot_complete` is sufficient.

  For danx-triage: also remove or renumber any "Step 10" cross-references earlier in the file if they exist.

  ## Key files

  - `src/poller/inject/workspaces/trello-worker/.claude/skills/danx-next/SKILL.md`
  - `src/poller/inject/workspaces/trello-worker/.claude/skills/danx-triage/SKILL.md`

  ## Verification

  `grep -rn "DANXBOT_EPHEMERAL\|DANXBOT_PROJECT_ROOT\|danx-self-terminate" src/` should return zero results.

  The skill files are injected by the poller into every connected repo on the next tick after merge — no extra step needed.
