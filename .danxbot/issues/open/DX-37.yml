title: Backfill historical dispatches table â€” token counts inflated 2-5Ă—
description: |-
  ## Problem

  Every dispatch row in `dispatches` (MySQL) currently carries `input_tokens` / `output_tokens` / `cache_read_input_tokens` / `cache_creation_input_tokens` inflated 2-5Ă— by the multi-block-msg-id over-count fixed in commit `d11b63d` ([Danxbot] Fix: dedup usage by message.id...). The dashboard reads from this table for the Tokens panel, the Cost panel (when computed), and analytics â€” all of which display wrong numbers for every historical dispatch.

  ## Solution

  One-shot incremental backfill script. The JSONL session files are still on disk under each repo's `~/.claude/projects/<encoded-cwd>/<session-uuid>.jsonl`, so the deduped values are recoverable.

  Algorithm:
  1. Iterate `dispatches WHERE started_at < <fix-deploy-time>` (incremental â€” never reprocess fixed rows).
  2. For each row, locate the JSONL by repo + dispatch tag (the `<!-- danxbot-dispatch:<jobId> -->` marker that `SessionLogWatcher` uses).
  3. Re-aggregate using the new dedup-aware `parseJsonlContent` from `src/dashboard/jsonl-reader.ts`.
  4. Update the row only if the deduped values DIFFER from the stored values (idempotent).
  5. Store a high-water mark `started_at` after each batch â€” re-runs only process new pre-fix rows since the last mark.

  ## Verification

  - Pick 5 historical rows with known reproduction (gpt-manager `830cbd99` is one â€” real `200,956 â†’ 100,478`); run the backfill in dry-run mode and confirm the recomputed values match the JSONL's `parseJsonlContent` totals.
  - Compare 10th-run cost vs 1st-run cost: must be identical for the recurring case (just rescans the high-water mark) and vastly cheaper for the one-shot pass.
  - After full backfill, re-query gpt-manager `830cbd99` via `/api/status` â€” expect `input_tokens=6, output_tokens=110, cache_creation_input_tokens=100,362`.

  ## Key Files

  - `src/dashboard/jsonl-reader.ts#parseJsonlContent` â€” the deduped aggregator (already shipped in `d11b63d`)
  - `src/dashboard/dispatches-db.ts` â€” the row updater
  - New: `scripts/backfill-dispatches-tokens.ts` â€” entry point
  - `dispatches.started_at` index â€” verify it exists for the incremental cursor

  ## Reference

  Discovered during gpt-manager production verification (gpt-manager job `830cbd99`). The fix in `d11b63d` corrects new dispatches; without backfill, all pre-d11b63d rows remain wrong. Cost analytics, throughput dashboards, and any rate-limit decisions made off historical numbers are 2-5Ă— too high.
