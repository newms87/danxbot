title: "Fix: workspace gate `repo.trelloEnabled` reads env-default, ignores override"
description: |-
  ## Problem

  `src/workspace/resolve.ts:156` defines the gate `"repo.trelloEnabled = true": (repo) => repo.trelloEnabled === true`. `repo.trelloEnabled` is loaded ONCE at boot from `DANX_TRELLO_ENABLED` env var (`src/repo-context.ts:116`). The runtime override `overrides.trelloPoller.enabled` in `<repo>/.danxbot/settings.json` is NEVER consulted by the gate.

  Result: an operator can flip the Trello poller toggle on the Agents tab → poller runs → poller picks up cards → `dispatch()` calls `resolveWorkspace("trello-worker")` → workspace gate evaluates `repo.trelloEnabled = true` against the stale env-time value → throws `WorkspaceGateError: workspace "trello-worker" gate failed: "repo.trelloEnabled = true"` → no spawn.

  ## Reproduction (verified during gpt-manager prod verification, this session)

  Set `DANX_TRELLO_ENABLED=false` in the repo's `.danxbot/.env`, then write `overrides.trelloPoller.enabled=true` to `settings.json`. Poller logs "Found 1 card — starting team", immediately followed by `WorkspaceGateError`. Workaround used: also flip `DANX_TRELLO_ENABLED=true` in SSM and recreate the worker container.

  ## Root Cause

  The poller enforcement path uses `isFeatureEnabled(ctx, "trelloPoller")` which is override-aware (per `.claude/rules/settings-file.md`). The workspace gate uses `repo.trelloEnabled` directly. Two sources of truth for the same concept; the gate's source is the wrong one for an operator-flippable runtime control.

  ## Solution

  Change `src/workspace/resolve.ts:156` to evaluate the gate via `isFeatureEnabled(repo, "trelloPoller")` instead of `repo.trelloEnabled`. Same change wherever any other gate references the static repo trait when an override exists.

  Verify by writing a unit test in `src/workspace/resolve.test.ts` that builds a `RepoContext` with `trelloEnabled: false` but a settings.json override `enabled: true`, then calls `resolveWorkspace` against the trello-worker workspace and asserts no `WorkspaceGateError` is thrown.

  ## Key Files

  - `src/workspace/resolve.ts:156` — gate definition
  - `src/repo-context.ts:116` — env-default loader
  - `src/settings-file.ts` — `isFeatureEnabled`
  - `src/workspace/resolve.test.ts` — add coverage

  ## Reference

  Discovered during gpt-manager production verification (this session). The gate failure was the second blocker after the EROFS auth fix; cost ~10 minutes to diagnose and required an SSM update + worker recreate as workaround. A future operator who flips the toggle expecting the documented "no restart needed" behavior (`.claude/rules/settings-file.md`) will hit this same wall.
