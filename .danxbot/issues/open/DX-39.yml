title: "Fix: LaravelForwarder over-counts per-turn usage on multi-block assistant turns"
description: |-
  ## Problem

  Same root cause as the launcher / jsonl-reader dedup fix shipping in this commit, but in a sibling consumer that the dedup did NOT cover.

  Claude Code splits a multi-block assistant turn (text + tool_use, thinking + text + tool_use, etc.) into one JSONL line per content block, but stamps the IDENTICAL response-level `message.usage` on every line. The watcher emits one entry per JSONL line, so for a 3-block turn the watcher emits 3 entries â€” each carrying the same `usage`.

  `LaravelForwarder.attachUsageToAssistantEvents` runs per-entry and attaches `data.usage` to every event batch. The downstream gpt-manager Laravel app receives the same `usage` block 3Ă— per turn. Per-turn usage on the gpt-manager dashboards / DB is therefore inflated 2-5Ă— the real number â€” same blast radius as the danxbot dashboard before this commit's fix.

  ## Root Cause

  `src/agent/laravel-forwarder.ts:108-120` `attachUsageToAssistantEvents` and `:286-287` `mapEntryToEvents` operate on every assistant entry without checking `entry.data.messageId`. The `messageId` is now surfaced by `convertJsonlEntry` (this commit's session-log-watcher.ts change) so the dedup key is already available â€” the forwarder just needs to use it.

  ## Solution

  Track a closure-local `seenForwardedMessageIds: Set<string>` on the forwarder (analogous to launcher.ts:584's accumulator dedup). On each watcher entry:

  - If `entry.data.messageId` is present and seen â†’ forward the event WITHOUT the `usage` field (the entry's text/tool_use payload still matters for the timeline; only the response-level `usage` is duplicated).
  - If `messageId` is present and new â†’ add to set, attach usage as today.
  - If `messageId` is missing â†’ defensively attach (same fail-loud rationale as launcher.ts).

  Defensive `log.warn` once-per-forwarder when an entry has `usage` but no `messageId`, mirroring the warn-once pattern in launcher.ts and jsonl-reader.ts.

  ## Verification

  - TDD: failing test in `src/agent/laravel-forwarder.test.ts` driving 2 watcher entries with the same `messageId` and asserting the POSTed body contains `usage` exactly once. Production reproduction numbers (gpt-manager job 830cbd99: real in=6/out=110/cache_creation=100,362) match the baseline.
  - Run `make test` to verify no regressions.
  - After deploying to gpt target, fire `/api/launch` against gpt-manager with workspace=system-test and confirm the gpt-manager Laravel `dispatches` row reports the deduped totals (compare against danxbot dashboard which is already correct after this commit).

  ## Key Files

  - `src/agent/laravel-forwarder.ts` â€” `attachUsageToAssistantEvents`, `mapEntryToEvents`, `consume`
  - `src/agent/laravel-forwarder.test.ts` â€” add the dedup test
  - `src/agent/session-log-watcher.ts` â€” already exposes `entry.data.messageId` (no change needed)

  ## Reference

  This was discovered during code review of the danxbot dashboard / launcher dedup fix (revisions plan: `/tmp/claude-code-reviews/danxbot/revisions-2026-04-27-1215.md`). The danxbot side ships in commit "Fix: dedupe usage by message.id...". Once that lands, the danxbot Tokens panel shows correct numbers; the gpt-manager Laravel dashboards remain inflated until this card is fixed.
