title: "[Danxbot] Wire test-system-slack REAL_CLAUDE=1 path (case #11 — real Haiku + Opus)"
description: |-
  ## Problem

  The free-mode harness for the Slack agent E2E (Trello CudG7AJy) shipped 10 scenarios in `src/__tests__/system/slack-agent-e2e.test.ts`. The card called for an 11th case behind `REAL_CLAUDE=1`: a single happy-path scenario that runs against the REAL Anthropic API (Haiku router + Opus dispatch) to catch tool-use prompt drift, real heartbeat-line generation, and any production-only behavior the free-mode harness can't see. Cost target: under $0.15.

  The Makefile target `test-system-slack` exists; the `REAL_CLAUDE=1` branch currently echos a pointer to this card and falls back to free mode.

  ## Approach

  1. Build the real-mode harness as a separate file (`src/__tests__/system/slack-agent-e2e-real.test.ts`?) so vitest's filter can keep free + real distinct.
  2. The real-mode test should:
     - Skip cleanly when `ANTHROPIC_API_KEY` is unset.
     - Use `claude-haiku-4-5` for the router + `claude-opus-4-7` for the dispatched agent (matches production model selection).
     - Spawn fake-claude in PATH? OR use the real claude CLI? Card says "Real Haiku router + Opus dispatch" — that means real claude CLI, not fake.
     - Use the existing CaptureServer + FakeSlackApp helpers from the free-mode test.
     - Assert observable post-conditions (substituted text, reactions, captured posts).
  3. Update the Makefile's `test-system-slack` target so `REAL_CLAUDE=1` runs the real-mode file instead of falling through to free mode.
  4. Add a budget guard — fail loud if a single run exceeds $0.20 of real API spend.

  ## AC

  - [ ] `make test-system-slack REAL_CLAUDE=1` exits 0, posts substituted text + reactions to the fake bolt's CaptureClient, costs under $0.15
  - [ ] Skips cleanly with a clear "ANTHROPIC_API_KEY not set" message when run without an API key
  - [ ] Updates `.claude/rules/make-commands.md` row for `test-system-slack` to reflect the real-mode behavior

  ## Reference

  Trello CudG7AJy — original Slack agent E2E harness card. Free-mode case #11 was deferred to this card to keep the original card's scope tight + avoid blocking ship on a real-API run.
