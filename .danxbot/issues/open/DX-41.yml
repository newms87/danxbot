title: Per-repo namespace for compose env vars (e.g. rename DANXBOT_WORKER_PORT → per-repo prefix)
description: |-
  Spawned from card oGbjLtjN retro. The shadowing class of bug has now bitten danxbot twice (oGbjLtjN, plus the prior `.env.local` Laravel APP_ENV trap). Both stem from a per-repo `.env` value being silently overridden by an outer scope.

  For DANXBOT_WORKER_PORT specifically, consider:
  - Per-repo prefix in compose.yml (e.g. `DANX_PORT_PLATFORM`, `DANX_PORT_DANXBOT`, `DANX_PORT_GPT_MANAGER`) so collision becomes impossible by construction.
  - OR — keep the var name but enforce in the helper that the per-repo value MUST equal the parent value when both are present (loud failure on mismatch instead of silent overwrite).
  - OR — strip `DANXBOT_WORKER_PORT` from any caller env before sourcing the helper so the per-repo extract is the only writer.

  Prefer option 1 — naming a port after its repo is what makes the collision impossible. The current fix in worker-env.sh defends against the leak but does not eliminate the namespace issue.

  Source comment in scripts/worker-env.sh references the leak. Tests cover the override behavior end-to-end. This card is the "deeper fix" that the bug card explicitly deferred.
