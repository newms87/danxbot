      ## Triage (2026-04-28)

      **State:** Keep — not implemented. Description proposes per-repo prefix (e.g. `DANX_PORT_PLATFORM`) so collision is impossible by construction.

      **Code evidence (still using flat `DANXBOT_WORKER_PORT`):**
      - `src/repo-context.ts:24-30` — `readWorkerPort` reads `process.env.DANXBOT_WORKER_PORT` then falls back to per-repo `.env`'s `DANXBOT_WORKER_PORT`. Same name in both scopes = the shadowing class this card targets.
      - `.danxbot/config/compose.yml:20,115,125` — references `${DANXBOT_WORKER_PORT}` directly (env injection + port mapping + healthcheck). Every connected repo's compose template has the same shape.
      - `src/config.ts:16-70` — `REPO_WORKER_PORTS` parser exists for the dashboard's per-repo port map but does NOT propagate a namespaced var into compose.

      **Git evidence:**
      - `1282ca5` — leak-defense fix in `scripts/worker-env.sh` (the bug card oGbjLtjN this card is the "deeper fix" for). Defends against shell-level leak but keeps the flat name.
      - No commits implementing per-repo prefix.

      **ICE:** I=6 (prevents repeat shadowing class — two incidents already), C=4 (recurring trap; per-collision debug cost), E=4 (touches every compose.yml + worker-env.sh + repo-context + deploy/secrets SSM keys + every `.danxbot/.env`; rename across templates is meaningful but mechanical). **Total ≈ 60 (6 × 4 × 4 / something) — keep moderate priority.**

      **Deps:** none explicit. Implicit dependency on deploy/secrets SSM key naming convention (`/<ssm_prefix>/repos/<name>/*`) — that path is already namespaced, so option-1 prefix can mirror it cleanly.

      Stays in Action Items.
