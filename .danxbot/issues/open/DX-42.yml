title: "Lint guard: catch ${VAR:-} compose env that overrides image-baked ENV"
description: |-
  Action item from Trello auX4nTRk. While fixing the danxbot_commit NULL bug, I introduced a regression that the code-reviewer caught: adding `DANXBOT_COMMIT: ${DANXBOT_COMMIT:-}` to the worker compose `environment:` block silently overrides the image-baked `ENV DANXBOT_COMMIT=<sha>` with empty whenever the host shell doesn't export the var. Same trap could bite any future env baked at image-build time (eg. `BUILD_VERSION`, `RELEASE_TAG`, `GIT_REV`).

  Possible shape:
  - A vitest unit test in `src/__tests__/unit/` that walks every `compose.yml` in the repo, parses the `environment:` block, and warns when any `${VAR:-}` empty-default key is also declared as `ENV VAR` in the corresponding Dockerfile.
  - OR a pre-commit hook / `make lint` step that runs the same check.
  - OR a single regression test guarding only the keys we know are image-baked (DANXBOT_COMMIT today; extend as needed).

  Out of scope for the original card — purely defensive tooling. Low priority but cheap to write.

  Reference: Trello auX4nTRk's "Review Fixes (round 2)" comment + `worker-compose-mounts.test.ts`'s "does not override the baked DANXBOT_COMMIT" test as the prior-art shape.
