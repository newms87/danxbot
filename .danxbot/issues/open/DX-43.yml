title: "[Danxbot > Tooling] Pre-stage warning when other agent's edits would be swept into this commit"
description: |-
  ## Context

  Discovered while shipping Trello 3l2d7i46 (claude-auth preflight). Two danxbot agent sessions worked on the same shared working tree at the same time. Agent A was wiring a preflight call into `src/agent/launcher.ts` + writing tests in `src/agent/launcher.test.ts`. Agent B was finishing an unrelated SessionLogWatcher token-undercount fix.

  Agent B's `/flow-commit` ran first. Whatever staging it used (likely `git add -A` or staging by relative path) swept Agent A's edits to `launcher.ts` + `launcher.test.ts` into Agent B's commit `0b6653a` — which was titled "[Danxbot] Fix: SessionLogWatcher token undercount via cleanup drain race (Trello Ga8V0lZr)" and had nothing to do with the preflight.

  Result:
  - The preflight feature ships correctly on main (the launcher integration is in 0b6653a, the new module + worker wiring is in 7780b5d).
  - Commit history is wrong: launcher's preflight changes are attributed to a token-undercount commit. A future bisect / blame on those lines points at the wrong commit message.
  - No data was lost. This is an attribution / history-cleanliness issue, not a correctness issue.

  ## Why the existing rule didn't help

  `~/.claude/CLAUDE.md` and `~/.claude/rules/git.md` both say "Check for other agents' staged work — if `git status` shows staged files that are NOT yours, another agent may be mid-commit. Poll, then ask the user."

  That rule is REACTIVE. It catches the case where Agent A is about to commit AND the unstaged tree shows files staged by Agent B. It does NOT catch the case where Agent B's staging mechanism scoops up Agent A's UNSTAGED edits — Agent A had no idea their files were being staged from underneath them.

  ## Solution (sketch)

  Two complementary surfaces:

  1. **`/flow-commit` strict-staging guard.** Refuse to run `git add` against any path that the current session has not visibly touched. Cross-reference the file list to be staged with `git diff --name-only HEAD` filtered against files the current Claude session edited (Edit/Write tool history). Files modified outside this session get held back unless the operator explicitly OKs each one. Removes the "we both ran git add -A" failure mode.

  2. **Pre-stage poll for unstaged-but-foreign edits.** Before staging, run `git diff --name-only` and check if any unstaged file's most recent modification timestamp is younger than this session's first tool call. If yes, surface those files to the operator with a "another agent is editing these — wait or ask?" prompt. Catches the race direction where Agent A's edits are about to get swept up.

  Both are heuristics, not guarantees. In a multi-agent shared tree without per-session worktrees, the only structural fix is `using-git-worktrees` for every dispatch. That's a much larger change with separate ergonomic costs.

  ## Acceptance Criteria

  - `/flow-commit` (or the equivalent staging step) refuses to silently include unstaged files from another agent's session.
  - The operator sees the cross-session attribution risk BEFORE the commit lands, with enough information to either wait or take ownership of the files explicitly.

  ## Key Files

  - `~/.claude/skills/flow-commit/SKILL.md` (or the equivalent skill content danxbot loads)
  - `src/agent/launcher.ts` — illustrative file that got swept in this incident; useful for testing the guard

  ## Why This Is Not Part of 3l2d7i46

  3l2d7i46 is the claude-auth preflight feature. This card is the meta-tooling improvement to prevent the next preflight-style feature from ending up split across two unrelated commits.
