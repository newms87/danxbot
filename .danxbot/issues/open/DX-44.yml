title: "Fix: per-dispatch MCP/terminal temp-dir cleanup leaks (1373+ stale dirs in /tmp on dev workstation)"
description: |-
  ## Problem

  `make test-system-cleanup` failed at session 2026-04-25 with 1373 orphaned `/tmp/danxbot-mcp-*` dirs and 1 orphaned `/tmp/danxbot-term-*` dir, all older than 60 minutes. After manual cleanup the test passes — but new dirs accumulate: ~30 new dirs accrued over a ~1 hour active development window (about one dir per dispatch, occasionally more).

  ## Root Cause (TBD)

  `src/dispatch/core.ts#cleanupMcpSettings` is wired into the `onComplete` callback of `spawnAgent`. The cleanup runs for the most recent spawn's settings dir, but on stall-and-respawn there are TWO settingsDirs (parent + nudge respawn). The parent's cleanup may not fire if the parent's onComplete is short-circuited by the respawn path.

  Other suspects:
  - Container-restart kills mid-dispatch (worker SIGTERM bypasses cleanup chain)
  - Test cleanup paths in `_allow_tools_cleanup` only handle the flag and probe card, not the per-dispatch temp dir
  - `terminateWithGrace` calls inside the stall detector may not propagate to onComplete

  The leak is pre-existing and independent of P6 — confirmed by checking dir mtimes (most stale dirs are days old, predating the P6 session). 1403 dirs total at session start; cleanup happened ~5–30 dirs/day in normal operation.

  ## Solution

  1. Audit `src/dispatch/core.ts` cleanup paths: list every code path that creates a `danxbot-mcp-*` or `danxbot-term-*` dir, and verify each has a paired cleanup that fires on every termination path (clean exit, stall-respawn, SIGTERM, host-kill, exception).
  2. Move cleanup to a finally-block / process-exit handler so kill-9 and worker-restart still trigger cleanup of the dispatch's own dirs.
  3. Add a startup sweep: when the worker boots, find `/tmp/danxbot-mcp-*` dirs older than ~10 minutes that don't correspond to active dispatches and remove them. The 60-minute threshold the test uses is too lenient for a maintenance sweep — anything older than the longest dispatch timeout is provably stale.
  4. Add a unit test that covers stall-and-respawn cleanup ordering.

  ## Verification

  - `make test-system-cleanup` passes after a long dev session (no manual /tmp cleanup needed)
  - Counter: number of `danxbot-mcp-*` dirs older than 1h on a dev workstation that has been running danxbot daily for a week, verified to be near-zero

  ## Key Files

  - `src/dispatch/core.ts#runResolved` — cleanup chain wiring around `spawnForDispatch` retries
  - `src/dispatch/core.ts#cleanupMcpSettings` — current cleanup helper
  - `src/agent/launcher.ts#spawnAgent` — onComplete invocation
  - `src/__tests__/system/run-system-tests.sh#test_cleanup` — current test (60-minute threshold)

  ## Discovered

  During P6 verification (Trello [WWYKnQhc](https://trello.com/c/WWYKnQhc)). Independent of P6 — the leak's mtimes show accumulation over weeks.
