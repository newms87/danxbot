      ## Triage 2026-04-28

      State: **Kept**. Real, reproducible, code paths verified.

      ### Code audit

      `src/dispatch/core.ts#runResolved`:
      - `writeMcpSettingsFile` mkdtemp's `/tmp/danxbot-mcp-XXXXXX` per spawn.
      - Cleanup wired two ways: `onComplete` callback (cleanupMcpSettings before caller's hook — ordering is load-bearing) AND a `try/catch` around the `spawnAgent` call that cleans on spawn failure.
      - Stall-respawn (`spawnForDispatch(prompt, isRespawn=true)`) creates a NEW settingsDir each respawn. Each respawn's `onComplete` fires when its own `spawnAgent` job terminates — so per-spawn cleanup IS wired correctly.

      `src/agent/launcher.ts#spawnAgent`:
      - mkdtemp's `/tmp/danxbot-prompt-XXXXXX` for `prompt.md`.
      - Host mode also mkdtemp's `/tmp/danxbot-term-XXXXXX` (registered via `registerTermDir`).
      - `runCleanup` has a `finally` block that rmSync's `promptDir` + `termSettingsDirToClean` — survives observer throws.

      ### Real failure modes (uncovered by code)

      1. **Worker SIGTERM during active dispatch** — there is no `process.on("SIGTERM")` shutdown hook that drains active jobs and runs their cleanup chains. Compose `down`, `make stop-worker`, container restart all leak whatever's mid-flight. This is by far the largest source given dev workflow.
      2. **SIGKILL / OOM** — same, no recovery possible. Only a startup sweep helps.
      3. **Tests** — fake-claude / capture-server tests that bypass the `dispatch()` path can mkdtemp via direct calls; `_allow_tools_cleanup` was retired but residue of older test scaffolding may still leak.
      4. **Stall mid-cleanup race** — if `dispatchTracker.finalize` throws synchronously before the `finally` block (extremely unlikely; `finalize` is async), it would bypass `rmSync`. Currently NOT a leak path.

      ### Current /tmp state on this workstation

      - `/tmp/danxbot-mcp-*`: 42
      - `/tmp/danxbot-term-*`: 0
      - `/tmp/danxbot-prompt-*`: 0

      42 down from 1373 — partial improvement since card was filed (P6 + later cleanup commits). Still leaking, just slower.

      ### ICE

      - I=7 (1373→42 trajectory shows fix is needed; affects every dev box; eventually fills `/tmp` causing weird failures)
      - C=4 (startup sweep is trivial; SIGTERM handler is medium; stall-respawn audit + unit test is medium; ~1–2 hour fix total)
      - E=8 (single-repo, well-isolated, mechanical; risk only if shutdown hook accidentally triggers cleanup of OTHER worker's dispatches — addressed by scoping sweep to dispatchId mtime > timeout)
      - Total: 7+4+8 = **19**

      ### Deps

      None. Self-contained. Card already references `WWYKnQhc` (P6) which is in Done; this is the orphaned cleanup tail.

      ### Recommended scope for Kept impl

      1. Worker SIGTERM/SIGINT handler in `src/worker/server.ts` that calls each active job's `_cleanup`.
      2. Startup sweep in worker boot: rm `/tmp/danxbot-{mcp,term,prompt}-*` with mtime > 2 × longest dispatch timeout.
      3. Unit test for stall-respawn cleanup ordering (already proposed in card).
      4. Skip the 60→10-minute test threshold change; once #1+#2 land, the existing 60-min test is the right canary.
