      ## Triage — 2026-04-28

      **State:** Keep

      **ICE:** 96 (4×6×4)
      - Impact (4): Defense-in-depth on a credential-rotation regression that already burned us once (Trello 0bjFD0a2 / 9ZurZCK2). Existing unit tests cover the literal compose.yml revert, so the marginal value of a system test is the deeper "compose looks dir-bind-shaped but Docker engine behavior differs" class of regression — narrower blast radius.
      - Confidence (6): Approach is well-defined in the description (write A → SHA256 → atomic-rename → SHA256 → assert). Real Docker behavior is what's being asserted, so passing locally proves the contract. Risk: needs `make launch-worker REPO=danxbot` plumbing into the system test runner with a fixture `CLAUDE_CREDS_DIR`, which adds setup complexity.
      - Ease (4): Layer-3 system test cost — needs Docker infra running, fixture credentials dir, container-side SHA256 capture (`docker exec`), and integration with `run-system-tests.sh` shell harness. Not trivial; ~half-day of work.

      **Evidence:**
      - Git: 6781fd7 (dir-bind .claude/ fix), b680fee (file-level binds + symlink entrypoint, 9ZurZCK2), cc0a789 (drop :ro on binds, PHevzRil), 79c0c1e (compose silent fallback :? required-var, th8GCprR)
      - Code:
        - `src/__tests__/integration/claude-auth-setup.test.ts:105-153` — Layer-1 symlink-through-dir analog (the test the card calls out as insufficient — confirmed: it explicitly states "uses symlink path resolution rather than a real Docker bind")
        - `src/__tests__/unit/worker-compose-mounts.test.ts:188-194` — Layer-1 compose-shape assertion that DOES catch a literal compose.yml file-bind revert (the card's stated regression vector). Premise is partially out-of-date here.
        - `src/__tests__/system/` — only `slack-agent-e2e.test.ts` + `run-system-tests.sh`. No credentials-mount Layer-3 test exists.
        - `repos/danxbot/.danxbot/config/compose.yml` — the contract under test (dir-bind on `.claude/`)

      **Dependencies:** None

      **Decision:** Keep. The card's premise is partially out-of-date — `worker-compose-mounts.test.ts:188` already catches the literal "someone reverts compose.yml to a file-bind" regression at Layer-1 unit cost. However, no Layer-3 system test exercises the actual Docker bind-mount + atomic-rename behavior (only the symlink filesystem analog in `claude-auth-setup.test.ts`). The deeper system test still adds value as defense-in-depth against compose constructs that pass the shape-check but produce different Docker runtime behavior. ICE is modest because the cheap regression vector is already covered. When picked up, the card description should be updated to acknowledge the existing unit-test coverage and reframe the system test as catching runtime/Docker-engine behavior divergence rather than compose.yml edits.

