title: "System test: file-bind vs dir-bind regression coverage for credentials mount"
description: |-
  ## Context

  After Trello 0bjFD0a2 the rename-tolerance assertion in `src/__tests__/integration/claude-auth-setup.test.ts` is a Layer-1 unit test using a symlink-through-dir analog. It catches name/path-resolution regressions but does NOT catch the actual Docker behavior difference between a file-bind (pins inode at compose-up) and a dir-bind (exposes current file table). Someone could revert `repos/danxbot/.danxbot/config/compose.yml` to two file-binds and the unit test would still pass.

  The real regression coverage for "this layout is rename-tolerant" requires a Layer-3 system test against live Docker.

  ## Solution direction

  Add a system test under `src/__tests__/system/` (alongside `run-system-tests.sh`):

  1. Spin up the danxbot worker via `make launch-worker REPO=danxbot` with `CLAUDE_CREDS_DIR=/tmp/test-claude` set to a fixture dir
  2. Write `.credentials.json` content A to that dir
  3. Capture the SHA256 of the file as seen inside the container
  4. Atomic-rename: `printf <new content> > /tmp/x && mv /tmp/x /tmp/test-claude/.credentials.json`
  5. Capture SHA256 again from inside the container
  6. Assert: the second SHA256 matches the new content (a file-bind would fail this — would still see content A)

  ## Key files

  - `src/__tests__/system/run-system-tests.sh`
  - `src/__tests__/system/` (new test file)
  - `repos/danxbot/.danxbot/config/compose.yml` (the contract under test)
