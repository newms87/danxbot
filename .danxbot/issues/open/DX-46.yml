title: Consolidate split-mount rationale into a single rule file
description: |-
  ## Context

  After Trello 0bjFD0a2 the split-mount design (file-bind for `.claude.json` + dir-bind for `.claude/`) is documented in long form across four places:
  - `repos/danxbot/.danxbot/config/compose.yml` (mount-block comment)
  - `scripts/claude-auth-setup.sh` (header docstring)
  - `deploy/remote.ts` (uploadClaudeAuth docstring)
  - `deploy/workers.ts` (buildLaunchCommand inline comment)
  - `.env.example` (also has a multi-line block)

  Five blocks restate the same invariant. When the design is touched again, all five need to be kept in sync — single-source-of-truth violation that foreshadows future drift.

  ## Solution direction

  Create `.claude/rules/claude-auth-mount.md` (auto-loaded) as the canonical reference. Shorten each in-file comment to one or two lines plus "see `.claude/rules/claude-auth-mount.md`". The rule file describes:
  - The split mount design (file-bind + dir-bind, why)
  - The canonical layout: `.claude.json` at root, `.claude/.credentials.json` in subdir
  - Why rename-over-mount needs a dir-bind (Docker file-binds pin host inode)
  - The four consumer locations (compose, script, deploy, env.example) that must stay in sync

  ## Key files

  - `.claude/rules/claude-auth-mount.md` (new)
  - `repos/danxbot/.danxbot/config/compose.yml`
  - `scripts/claude-auth-setup.sh`
  - `deploy/remote.ts`
  - `deploy/workers.ts`
  - `.env.example`
