      ## Triage — 2026-04-28

      **State:** Keep

      **ICE:** 84 (3×7×4)
      - Impact (3): Doc-only correctness; prevents a future agent reading the spec from coding to the obsolete flat layout (small but real comments-don't-match-behavior risk per code-quality.md).
      - Confidence (7): Fix path is unambiguous — either edit lines 43/47/96/191 to describe the subdir layout or prepend a one-line "superseded by 0bjFD0a2, see scripts/claude-auth-setup.sh" note.
      - Ease (4): Single-file doc edit, no tests, but the spec is long-form prose so the edit must stay coherent across multiple call sites and explain WHY .claude/ is a dir-bind vs .claude.json file-bind.

      **Evidence:**
      - Git: spec last touched in da51b21 (initial add); layout migration landed in 6781fd7 + b680fee + cc0a789 + 7780b5d, none of which updated the spec. `scripts/claude-auth-setup.sh` header is now the canonical layout description.
      - Code: `docs/superpowers/specs/2026-04-17-production-deploy-port-design.md:43` (`/danxbot/claude-auth/` description), `:47` (`claude_auth_dir` references `.claude.json` and `.credentials.json` flat), `:96` (SCP step lists flat files), `:191` (`gpt.yml` example claims dir contains `.claude.json` + `.credentials.json`). Canonical layout: `scripts/claude-auth-setup.sh:9-26`.

      **Dependencies:**
      - None

      **Decision:** Real doc/behavior drift introduced when 0bjFD0a2 migrated `.credentials.json` into a `.claude/` subdir. The spec still describes the pre-migration flat layout. Keep — small doc fix, but worth doing because the spec is the entry point a future agent would read before extending the deploy/auth pipeline.

