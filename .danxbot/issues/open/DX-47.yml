title: Update production-deploy-port-design.md spec — references flat claude-auth layout
description: |-
  ## Context

  Found during code review of Trello 0bjFD0a2 (rename-over-mount fix). The deploy-port design spec at `docs/superpowers/specs/2026-04-17-production-deploy-port-design.md` describes the auth-dir layout with `.credentials.json` at the root (flat layout). After 0bjFD0a2 the canonical layout is `.claude.json` at root + `.claude/.credentials.json` in a subdir. A future agent reading this spec to add a feature would produce code matching the OLD layout — a comments-don't-match-behavior violation (per `code-quality.md`).

  ## Solution direction

  Either update the references (lines noted as 47, 96, 191 by the code reviewer) to describe the canonical subdir layout and link the rationale to `scripts/claude-auth-setup.sh`, OR add a one-line note at the top of the file that the layout was migrated under Trello 0bjFD0a2 and point at the current canonical description.

  ## Key files

  - `docs/superpowers/specs/2026-04-17-production-deploy-port-design.md`
  - `scripts/claude-auth-setup.sh` — current authoritative description of the layout
