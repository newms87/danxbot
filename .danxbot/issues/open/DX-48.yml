title: Add unit tests for deploy/remote.ts uploadClaudeAuth (mkdir + subdir mv command shape)
description: |-
  ## Context

  Discovered during code review of Trello 0bjFD0a2 (rename-over-mount fix). `deploy/remote.ts#uploadClaudeAuth` was modified to read local creds from `<authDir>/.claude/.credentials.json` and emit a remote shell sequence including `sudo mkdir -p /danxbot/claude-auth/.claude && sudo chown ... && sudo mv ... && sudo chown ...`. There is no `deploy/remote.test.ts` — the method has zero unit coverage even though the migration command string is now non-trivial and load-bearing for prod auth provisioning.

  ## Solution direction

  Add `deploy/remote.test.ts` following the same pattern as `deploy/workers.test.ts` (string-shape assertion on the issued shell commands). Inject a fake RemoteHost-shaped recorder and assert:

  1. Throws when local `<authDir>/.claude/.credentials.json` is absent (subdir-layout migration guard)
  2. Throws when local `<authDir>/.claude.json` is absent
  3. Uploads `.claude.json` via `scpUpload(claudeJson, "/tmp/.claude.json")` and emits the expected `sudo mv /tmp/.claude.json /danxbot/claude-auth/.claude.json && sudo chown ubuntu:ubuntu …` sequence
  4. Uploads creds via `scpUpload(credentialsJson, "/tmp/.credentials.json")` and emits the new `sudo mkdir -p /danxbot/claude-auth/.claude && sudo chown ubuntu:ubuntu /danxbot/claude-auth/.claude && sudo mv /tmp/.credentials.json /danxbot/claude-auth/.claude/.credentials.json && sudo chown ubuntu:ubuntu /danxbot/claude-auth/.claude/.credentials.json` sequence
  5. Regression-guard: NEVER emits the legacy flat `mv /tmp/.credentials.json /danxbot/claude-auth/.credentials.json` (without the `.claude/` subdir)

  ## Key files

  - `deploy/remote.ts` — `uploadClaudeAuth()` (the system under test)
  - `deploy/workers.test.ts` — reference for the string-shape assertion pattern
  - `deploy/test-helpers.ts` — already has fixtures; extend if needed
