title: "[Danxbot > Agent] Live-container integration test for Playwright MCP server"
description: |-
  ## Context

  Card 183 (commit `a0d98a7`) added the `@thehammer/danxbot-playwright-mcp-server` package under `mcp-servers/playwright/` with 23 unit tests covering the entire request/response contract via mocked `fetch`. The card's plan originally called for an opt-in integration test (`describe.skipIf(!process.env.PLAYWRIGHT_INTEGRATION)`) that exercises the real Playwright container. That was deferred to keep Card 183 scope tight — the unit tests already cover what can break in the server's own code, and the integration test would primarily catch upstream-contract regressions (Playwright changing its `/screenshot` or `/html` response shape) or networking regressions on `danxbot-net`.

  ## Solution

  Add `mcp-servers/playwright/src/__tests__/integration/screenshot-live.test.ts`. Gated by `process.env.PLAYWRIGHT_INTEGRATION === "1"` so the default `npx vitest run` skips it. When enabled, the test:

  1. Reads `PLAYWRIGHT_URL` from env (defaults to `http://localhost:3000` for host-run, `http://playwright:3000` for in-container).
  2. Calls `playwright_screenshot({url: "https://example.com"})` via `callTool()`.
  3. Asserts the returned MCP content block is type `image`, has `mimeType` starting with `image/`, and decodes to valid PNG (or JPEG — check the magic bytes: PNG starts `89 50 4E 47`, JPEG starts `FF D8 FF`).
  4. Calls `playwright_html({url: "https://example.com"})`.
  5. Asserts the content block is type `text` and the text includes `<html` (tag, not text) — Playwright renders the page so the response is well-formed HTML.

  Also add a Makefile target `test-playwright-integration` that runs `PLAYWRIGHT_INTEGRATION=1 npx vitest run mcp-servers/playwright/src/__tests__/integration/`. Document in the Makefile comment that the target requires the Playwright container to be up (`docker compose up -d playwright`).

  ## Why it's low priority

  The unit tests cover every branch of the server's own code. The failure mode this test catches is "Playwright changed its response shape" — which is a stable contract we don't own. If we ever upgrade the Playwright container image, THIS is the test to run before flipping compose over. Filing it so the recipe is ready when we need it.

  ## Key Files

  - `mcp-servers/playwright/src/__tests__/integration/screenshot-live.test.ts` (new).
  - `Makefile` — add `test-playwright-integration` target alongside `test-validate` / `test-system-*`.

  ## Verification

  `PLAYWRIGHT_INTEGRATION=1 docker compose up -d playwright && make test-playwright-integration` — both tests pass byte-level against `example.com`.
