      ## Triage — 2026-04-28

      **State:** Keep

      **Evidence**

      - `src/poller/index.ts` — `syncRepoFiles` (line 782) calls `injectDanxSkills`, `injectDanxRules`, `injectDanxTools`, `injectDanxWorkspaces`. No `injectDanxAgents` and no helper for `.claude/agents/`. Inject helper definitions: lines 534, 551, 564.
      - `src/poller/inject/` contents: `rules/`, `tools/`, `workspaces/` only. No `agents/` source dir.
      - `find src/poller/inject/workspaces -name agents -type d` returns nothing — no workspace ships sub-agent definitions today either.
      - Connected repos under `repos/*/.danxbot/workspace/.claude/agents/` are empty dirs (gpt-manager, platform).
      - Repo-root `.claude/agents/` (developer-owned, danxbot territory excluded) contains the four canonical files: `ideator.md`, `code-reviewer.md`, `test-reviewer.md`, `validator.md`.
      - git log since `a0d98a7` (Card 183, Internal Playwright MCP) shows no follow-up commit shipping sub-agent inject. Card's premise is current.

      **Architecture note (card description partially stale)**

      The card was written before the workspace-dispatch epic (commit `1f0d375`+, Trello `7ha2CSpc`). Today's correct injection path is per-workspace, not a global `inject/agents/` directory:

      - Drop `danx-*.md` files under `src/poller/inject/workspaces/<workspace>/.claude/agents/` (e.g. `trello-worker/.claude/agents/danx-code-reviewer.md`).
      - `mirrorWorkspaceTree` (line 705) already recursively copies arbitrary subtrees including `.claude/agents/*.md` — no new helper needed.
      - The poller-relevant workspace is `trello-worker`. `slack-worker` doesn't dispatch sub-agents today. `system-test` is a smoke fixture and doesn't need them.

      Net implementation: copy the four agent files into `src/poller/inject/workspaces/trello-worker/.claude/agents/danx-*.md`, add a test asserting the inject pipeline materializes them at `<repo>/.danxbot/workspaces/trello-worker/.claude/agents/`, and (separately) decide what to do with the repo-root `.claude/agents/` files (developer-owned per agent-isolation Phase 5 invariant — almost certainly leave them alone; they're for the developer's interactive `claude` only). Updating the card description to match the workspace-dispatch reality is part of pickup.

      **ICE: 280**

      - **Impact (5):** Sub-agent drift is real but only bites when dispatched agents actually invoke sub-agents. Current trello-worker dispatched agents do call `code-reviewer` / `test-reviewer` per `danx-next`; without files in the workspace those Task calls fall back to inline, which is what happens today and has not surfaced as a blocker. Medium.
      - **Confidence (8):** The mechanism (`mirrorWorkspaceTree` + per-workspace `.claude/agents/`) already exists and is exercised. No architectural risk; just files to author and a test to add.
      - **Ease (7):** Four agent files × tools-frontmatter audit + one test. Single-session work.

      **Deps:** None active. Card 183 (Internal Playwright MCP, `a0d98a7`) is shipped. No explicit blockers.

      **Recommendation:** Keep in Action Items. Pickup should rewrite the description to target the per-workspace path (drop the "fourth inject category" framing; it's already there via `mirrorWorkspaceTree`) and scope the migration to `trello-worker` only.

