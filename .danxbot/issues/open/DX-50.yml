title: "[Danxbot > Agent] Sync .claude/agents/ into connected repos via poller inject pipeline"
description: |-
  ## Context

  During Card 183 (Internal Playwright MCP server, commit `a0d98a7`) the plan called for editing every sub-agent file in `src/poller/inject/agents/*.md` to add `mcp__playwright__*` to each sub-agent's `tools:` frontmatter. That directory does not exist — the poller inject pipeline in `src/poller/index.ts#syncRepoFiles` currently syncs three categories into each connected repo's `<repo>/.danxbot/workspace/.claude/` tree: `rules/`, `skills/`, and `tools/`. Sub-agent definitions (e.g. `.claude/agents/ideator.md`, `code-reviewer.md`, `test-reviewer.md`, `validator.md`) live in each connected repo's own `.claude/agents/` dir, developer-maintained per-repo.

  This means that when a sub-agent role needs a new tool (e.g. Playwright, a future vision model, a new MCP server), each connected repo's `.claude/agents/*.md` must be updated independently by hand. Drift is guaranteed over time — one repo gets the update, another doesn't, and the orchestrator ends up dispatching sub-agents that cannot complete the task.

  ## Solution

  Add a fourth inject category: `src/poller/inject/agents/*.md` → `<repo>/.danxbot/workspace/.claude/agents/*.md`. Mirror the existing `injectDanxRules` / `injectDanxSkills` / `injectDanxTools` functions in `src/poller/index.ts`. Authoritative sync with pruning: if a file is removed from `src/poller/inject/agents/`, the corresponding file in every connected repo's workspace is removed on the next poll tick. Filename prefix convention: `danx-*.md` so operator-authored sub-agents in the same dir aren't clobbered — but since the workspace `.claude/agents/` dir is entirely danxbot-owned (it's inside `.danxbot/workspace/`, not the repo root), the prefix is belt-and-suspenders.

  Once the pipeline exists, migrate the four standard danxbot sub-agents (`ideator`, `code-reviewer`, `test-reviewer`, `validator`) from their current per-repo locations into `src/poller/inject/agents/` as `danx-ideator.md`, `danx-code-reviewer.md`, `danx-test-reviewer.md`, `danx-validator.md`. Each file's `tools:` frontmatter lists the exact tool surface the agent needs — at minimum Read/Glob/Grep; orchestrator role additions include Edit/Write/Bash/TodoWrite. Playwright (`mcp__playwright__playwright_screenshot`, `mcp__playwright__playwright_html`) goes into every agent that might verify a rendered page.

  ## Key Files

  - `src/poller/index.ts` — add `injectDanxAgents(target)` mirroring the existing three inject helpers; call it from `syncRepoFiles`.
  - `src/poller/inject/agents/` — new directory with the four canonical sub-agent definitions.
  - `src/poller/index.test.ts` — extend the existing assertion that zero writes land outside `<repo>/.danxbot/workspace/.claude/` so it also asserts the new agents subtree is populated.
  - Each connected repo's existing `.claude/agents/*.md` — deleted after the inject pipeline takes over, OR kept as developer-authored extensions that the inject pipeline won't touch (need to decide).

  ## Verification

  After implementing, poll tick should produce the expected files in each connected repo's `<repo>/.danxbot/workspace/.claude/agents/` dir. Dispatch a test agent whose skill uses Task to spawn a sub-agent with `mcp__playwright__playwright_screenshot` — the sub-agent's tool frontmatter must permit it.

  ## Why this is an Action Item, not a phase of Card 183

  Card 183's scope was the MCP server itself + registry wiring. Adding a new inject pipeline is net-new architecture (new directory convention, new ownership contract with connected repos, new sync semantics to test). Keeping Card 183 tight avoids mixing two concerns in one commit.
