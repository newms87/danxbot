title: "Smoke: End-to-end dashboard UI + Trello poller verification"
description: |-
  ## Blocked on

  Card `Ga8V0lZr` (token tracking) must land before this is worth doing. Without working token tracking, the dashboard renders every dispatch with zeros for input/output/cache/total token counts, which defeats half the point of this smoke test. Do not promote this card to ToDo until Ga8V0lZr is in Done.

  ## Problem

  The reset-data feature shipped (Trello `d8e2aaa`) and the auth fix shipped (Trello `9ZurZCK2`), but nobody has actually OPENED THE DASHBOARD in a browser to confirm a fresh dispatch renders correctly: list row, detail panel, SSE streaming updates, JSONL viewer, status badge transitions, token counts, trigger badges. Similarly, the Trello poller is confirmed healthy (logs show ticks every 60s, Trello API reachable, Review has 22 cards) but no test card has been pushed through to prove the Trello-trigger code path end-to-end.

  This is a smoke-test card, not a dev card. All the code paths exist and passed unit/integration tests; this verifies the human-facing behavior that those tests can't cover (visual correctness of the dashboard, real Trello API round-trip, live SSE updates during a dispatch).

  ## Procedure

  1. Prereq: worker healthy (`docker ps --filter name=danxbot-worker-danxbot` shows "Up (healthy)"), dashboard healthy (`curl http://localhost:5555/health` → 200), `./claude-auth/` credentials current.
  2. Reset the DB: `make reset-data LOCALHOST=1`. Open dashboard at `http://localhost:5566` (Vite dev) and confirm zero dispatches, no stale ghosts.
  3. API dispatch: POST `/api/launch` with a simple task (e.g. `"Respond with OK and call danxbot_complete"`). Observe the list row appear via SSE in real time without a page refresh.
  4. Click the list row. Verify detail panel shows: status progression (queued → running → completed), token totals > 0, summary populated, JSONL timeline rendering each tool call and text block.
  5. Trello dispatch: create a simple Trello card in ToDo via MCP (`mcp__trello__add_card_to_list`, something trivial like "Say hello and call danxbot_complete"). Watch the poller log pick it up within 60s. Confirm the card moves to In Progress, then to Done after completion. Confirm a corresponding `dispatches` row appears with `trigger=trello` and trigger_metadata includes the card ID/name/list.
  6. Compare visual rendering: Trello dispatch in the list has a distinct trigger badge vs. the API dispatch.
  7. Dashboard ws / SSE behavior: leave the dashboard open during a dispatch. Confirm counts update live, status badge transitions in real time, no refresh needed.
  8. Optional stretch: Cancel a running dispatch via the dashboard's cancel button. Confirm the worker receives the signal and the row transitions to `status=cancelled`.

  ## What a successful run looks like

  - Two dispatch rows in the DB (one `trigger=api`, one `trigger=trello`) with populated token fields, session UUIDs, JSONL paths
  - Dashboard list shows both, with trigger badges, token counts, completion timestamps
  - Detail panel opens cleanly for each, shows the JSONL timeline with real tool-use blocks
  - Trello card moved through lifecycle: ToDo → In Progress → Done with retro comment
  - Zero errors in worker logs or browser console

  ## Key files

  Verification only, no code changes expected. If something renders wrong, file a follow-up Action Items card and do NOT try to fix it here.

  - `dashboard/src/App.vue`, `components/DispatchList.vue`, `DispatchDetail.vue`, `SessionTimeline.vue`, `TriggerBadge.vue`, `StatusBadge.vue`, `agents/AgentsPage.vue`
  - `src/dashboard/dispatch-stream.ts`, `stream-routes.ts`, `events.ts` (SSE)
  - `src/poller/index.ts`, `src/dispatch/core.ts` (Trello trigger flow)
