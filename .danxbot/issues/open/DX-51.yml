      ## Triage — 2026-04-28

      **State:** Keep

      **ICE:** 210 (6×7×5)
      - Impact (6): Verifies the dashboard UI + Trello-trigger code path end-to-end before real users hit it; catches visual/SSE/JSONL-timeline regressions that unit and integration suites can't cover.
      - Confidence (7): Procedure is well-specified across 8 steps; the listed blocker (token tracking, Ga8V0lZr) has shipped, so the smoke is now runnable. Some interpretive friction since visual correctness is human-judged.
      - Ease (5): Manual browser-driven run across reset → API dispatch → Trello dispatch → cancel; ~30-60 min wall time; needs healthy infra + claude-auth + Trello MCP write access. Not automatable as written.

      **Evidence:**
      - Git: 0b6653a (token tracking fix Ga8V0lZr, the stated blocker — landed), d8e2aaa (reset-data feature exists), b680fee (auth fix 9ZurZCK2 exists)
      - Code: dashboard/src/App.vue, components/DispatchList.vue, DispatchDetail.vue, SessionTimeline.vue, TriggerBadge.vue, StatusBadge.vue all present; src/dashboard/events.ts SSE path present; src/poller/index.ts + src/dispatch/core.ts Trello-trigger flow present. Zero card comments — no record of anyone having run the smoke.

      **Dependencies:**
      - Depends on: Ga8V0lZr — already in Done (commit 0b6653a). Blocker resolved; this card is now actionable.
      - Blocks: None

      **Decision:** Keep. The blocker called out in the description has shipped, the procedure is concrete and the surfaces it covers (visual dashboard, SSE live updates, Trello poller real-API round-trip, JSONL timeline rendering) are precisely the gaps automated tests can't close. No evidence anyone has executed it. Should be promoted to ToDo and run by a human, then the card moves to Done with a retro of any follow-up Action Items found.

