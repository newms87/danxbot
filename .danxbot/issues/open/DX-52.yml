title: "Fix: gitignore or delete stale .danxbot/card-status.md handoff notes"
description: |-
  ## Context

  `.danxbot/card-status.md` was written by an earlier session as a blocked-work handoff note. Its content was specific to one session's blockers (Docker EACCES, MCP Trello path mount) and is no longer current ‚Äî subsequent commits resolved both issues. The file has been untracked in git for multiple sessions and keeps showing up in every `git status` output, adding noise.

  ## Problem

  - Untracked stale file clutters every session's `git status` and session-start snapshot
  - Its content is misleading ‚Äî claims "Implementation COMPLETE ‚Äî blocked on X" for things that landed hours ago
  - Sessions occasionally trip over it trying to figure out what state the repo is in

  ## Proposed fix

  Add `/.danxbot/card-status.md` (or generalize to `/.danxbot/*.md` if other such handoff files are anticipated) to `.gitignore`. Delete the current file. Ephemeral agent-to-agent handoff already has a proper home (Trello card comments; see `trello.md::Update the next phase card before ending the session`).

  ## Key files

  - `.gitignore` ‚Äî add ignore path
  - `.danxbot/card-status.md` ‚Äî delete

  ## How to verify

  - `git status` after the fix shows no reference to this file
  - Future sessions that write a handoff file at that path also get gitignored automatically
