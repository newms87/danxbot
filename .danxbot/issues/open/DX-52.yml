      ## Triage — 2026-04-28

      **State:** Partial

      **Evidence:**
      - `find . -name card-status.md` returns nothing — the stale file was already deleted in a prior session.
      - `git status` shows no `card-status.md` reference; the noise complaint in the description is no longer reproducible.
      - However, `.gitignore` (root) and `.danxbot/.gitignore` do NOT contain a `card-status.md` or `*.md` entry. Root .gitignore has `.danxbot/CRITICAL_FAILURE` and `.danxbot/workspaces/` but nothing matching `card-status`. `.danxbot/.gitignore` lists only `features.md`, `.env`, `.env.*`, `!.env.example`, `settings.json`, `.settings.lock`.
      - Net: half (a) "delete the current file" is done. Half (b) "future sessions that write a handoff file at that path also get gitignored automatically" is NOT done — a future session recreating `.danxbot/card-status.md` would untrack-clutter `git status` again exactly as before.
      - No git log commits mention `card-status` or `handoff`.

      **ICE:**
      - I=2 — Cosmetic; only fires if a session ever recreates this exact filename (rare, observed once historically).
      - C=9 — Single-line `.gitignore` edit, behavior is well-understood.
      - E=9 — Trivial; ~30 seconds of work.
      - **Total: 162**

      **Deps:** None.

      **Recommended scope when picked up:** Add `card-status.md` (or generalize to `*-status.md` / pattern matching observed handoff filenames) to `.danxbot/.gitignore` only. No file to delete. Verify via `touch .danxbot/card-status.md && git status` showing it ignored.
