title: "[Danxbot] Fix: startJsonlWatcher hydration race condition"
description: In dispatch-stream.ts startJsonlWatcher, two concurrent calls for the same jobId can both pass the early-return guard before either writes to jsonlWatchers. Fix by adding an in-flight sentinel Set before the async hydration begins.
