      ## Update 2026-04-21 — Scope narrowed

      As part of the o0RFYGCc fix, the minimal fire-and-forget helper `notifyTerminalStatus` was extracted into `src/agent/launcher.ts` and 3 of the 6 sites already use it:

      - Inactivity timer `onTimeout` callback
      - Max-runtime `setTimeout` handler
      - `spawnHostMode` onExit handler

      Remaining sites still have their own inline shape because each needs await for a different reason:

      - `job.stop` — awaits putStatus after a 5s grace wait; passes explicit status param
      - `spawnHostMode` spawn-error catch — awaits putStatus then rethrows
      - `cancelJob` — awaits putStatus after 5s grace wait
      - `setupProcessHandlers` docker close/error wrapper — coerces status via `"completed" ? "completed" : "failed"` inside `setupProcessHandlers`; stays inline because that coercion is site-specific

      So the remaining refactor is: extend `notifyTerminalStatus` with an `awaitPut` boolean and a `rethrow?` mechanism to absorb the three await-variants, and leave `setupProcessHandlers` alone. ~30 LOC savings instead of the original ~30 — the F&F half is already done.
