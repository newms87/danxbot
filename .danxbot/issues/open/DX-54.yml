      ## Triage 2026-04-29

      **State:** Keep
      **ICE:** 168 (Impact 4, Confidence 7, Ease 6)
      **Deps:** none (o0RFYGCc already shipped the inline fixes; this is the consolidation follow-up)
      **Epic:** none

      ### Verification

      Inspected `src/agent/launcher.ts` at HEAD (`5d9e229`). Card is still actionable:

      - Partial helper `notifyTerminalStatus` exists at line 340 — covers ONLY the sync fire-and-forget sites (inactivity timer line 613, max-runtime timer line 640, docker close-handler line 832).
      - The await-variants are still inline:
        - `job.stop` (lines ~780–786): awaits `putStatus`, then calls `onComplete`.
        - `spawnHostMode` spawn-error catch (lines ~848–852): awaits `putStatus`, then `onComplete`.
        - `cancelJob` (lines ~1020–1021): awaits `putStatus`, then invokes `_onComplete`.
      - Docstring on `notifyTerminalStatus` (lines 333–339) explicitly references this card by title as the broader unification follow-up.

      Card description's signature sketch (`finalizeTerminalState(job, {cleanup, onComplete, statusUrl, apiToken, awaitPut})`) is the right shape. No semantic changes — pure refactor with regression coverage already in place from o0RFYGCc.

      ### Notes for picker

      - `cleanup()` is a closure inside `spawnAgent` — to share the helper across `cancelJob` (which lives outside `spawnAgent`) and the in-spawn sites, either pass `cleanup` as a parameter (simple) or attach it to `job._cleanup` (already the pattern for `cancelJob`). Probably the latter.
      - Docker close-handler's status coercion (line ~881 `"completed" ? "completed" : "failed"`) stays inline in `setupProcessHandlers` — the helper only handles `cleanup → putStatus → onComplete`, not status derivation. Card description calls this out explicitly.
      - Tests: `src/agent/launcher.test.ts` has full regression coverage for all 6 paths from o0RFYGCc — should stay green with no test changes if helper is a pure consolidation.
