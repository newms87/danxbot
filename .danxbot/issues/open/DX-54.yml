title: "[Danxbot] Extract finalizeTerminalState helper in launcher.ts — 6 sites with drifted shapes"
description: |-
  ## Context

  `src/agent/launcher.ts` has six distinct "agent terminated" sites, each independently responsible for: setting `job.status`/`job.summary`/`job.completedAt`, running `cleanup()`, calling `putStatus(...)` on the external dispatcher, and invoking `options.onComplete`. The fact that each site reimplements the sequence manually is why o0RFYGCc (Bug: Timeout paths skip putStatus) existed — two of the six sites forgot the `putStatus` step, and the omission went unnoticed until a production max-runtime timeout was investigated.

  ## The six sites (line numbers as of post-o0RFYGCc fix)

  - `job.stop` — async, awaits putStatus, status set pre-kill, 5s grace wait
  - `spawnHostMode` onExit — sync, fire-and-forget putStatus, status derived from lastAssistantText inspection
  - `spawnHostMode` spawn-error — async, awaits putStatus, rethrows
  - `setupProcessHandlers` docker close/error wrapper — sync, fire-and-forget, status coerced via `"completed" ? "completed" : "failed"`
  - Inactivity timer `onTimeout` — sync, fire-and-forget (fixed in o0RFYGCc)
  - Max-runtime `setTimeout` — sync, fire-and-forget (fixed in o0RFYGCc)
  - `cancelJob` — async, awaits putStatus, 5s grace wait

  The docker close-handler's `"completed" ? "completed" : "failed"` coercion is an artifact of `setupProcessHandlers` mapping exit codes to statuses — NOT a universal pattern. It should stay inside `setupProcessHandlers` and not be part of any shared helper.

  ## Proposed solution

  Extract a narrow helper that enforces the invariant `cleanup → if (statusUrl && apiToken) putStatus → onComplete`. Signature sketch:

      finalizeTerminalState(job, {
        cleanup, onComplete,
        statusUrl, apiToken,
        awaitPut: boolean,    // job.stop + spawn-error want await; timers want F&F
      })

  Migrate all 6 sites to call the helper. Status-setting stays inline at each site (since the status-derivation logic is site-specific). Cleanup+putStatus+onComplete is the universal sequence.

  ## Benefits

  - Eliminates the forget-putStatus failure mode permanently
  - Standardizes fire-and-forget vs await semantics behind a single boolean
  - Reduces `src/agent/launcher.ts` by ~30 LOC
  - Makes future terminal-state additions impossible to forget the PUT

  ## Key files

  - `src/agent/launcher.ts` — the six sites; new helper co-located
  - `src/agent/launcher.test.ts` — may need updates if call-site shapes change
  - `src/agent/process-utils.ts` — the inactivity timer still sets status inline (no change)

  ## Verify

  `npx vitest run src/agent/launcher.test.ts` stays green; `npx tsc --noEmit` clean; launch agent with status URL on any path → single terminal PUT per dispatch.

  ## Priority

  Low-Medium. No production bug today — the missing-putStatus sites were fixed in o0RFYGCc with explicit inline calls + regression tests (retry, partial-config, heartbeat-stop, host-mode variants). This card eliminates the class of bug permanently.
