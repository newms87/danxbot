      ## Triage 2026-04-29

      **Status:** Outstanding
      **Decision:** Keep (Action Items)
      **Classification:** Keep

      ### Verification

      No "vi.mock factory completeness" rule in `~/.claude/rules/testing.md` — confirmed via grep for `DASHBOARD_PREFIX|importActual|factory` (zero hits).

      The class-of-bug surface has GROWN since the previous triage. Six `vi.mock("../settings-file.js", ...)` factory sites now exist (was five):

      - `src/dashboard/agents-routes.test.ts:13`
      - `src/poller/index.test.ts:150`
      - `src/slack/listener.test.ts:126`
      - `src/worker/dispatch.test.ts:153`
      - `src/worker/slack-endpoints.test.ts:58` (new since 2026-04-21)
      - (`src/index.test.ts:67` referenced in prior triage no longer matches — file refactored)

      Adding any new export to `src/settings-file.ts` still silently produces `undefined` in any of these test contexts that consume the new symbol — exactly the failure mode described in the card.

      ### ICE

      - **Impact:** Medium. Affects `src/settings-file.ts` (a frequently-edited hot module: feature toggles, display mirrors, halt flag adjacency). Each new export risks 5-10 min of "why is my test 500-ing" debugging across up to 6 test files.
      - **Confidence:** High. Reproduced empirically once (Phase 4 of dashboard auth epic). Pattern is mechanical, well-understood, and grep-verifiable.
      - **Effort:** Low for option #1 (add ~5 lines to `~/.claude/rules/testing.md` "Vitest Mock Isolation" section). Medium for option #3 (visit 6 factories, swap to `vi.importActual` spread).

      **ICE composite:** Medium-Low value, Low effort → keep on Action Items, prioritize option #1 next time `~/.claude/rules/testing.md` is touched.

      ### Dependencies

      None blocking. Independent of any in-flight epic.

      ### Recommendation

      Keep in Action Items as-is. Option #1 (rule addition) is the lowest-friction path; pull when next editing testing rules. Option #3 (factory rewrites) only worthwhile if `settings-file.ts` export churn accelerates.
