title: 'Fix: adding a new export to a mocked module silently breaks tests with "undefined" template-literal values'
description: |-
  ## Problem

  During Phase 4 of the Dashboard auth epic, adding a new `DASHBOARD_PREFIX` export to `src/settings-file.ts` silently broke four `PATCH /api/agents/:repo/toggles` tests in `src/dashboard/agents-routes.test.ts`. The tests returned HTTP 500 instead of 200, with no clear link to the missing export.

  Root cause: `vi.mock("../settings-file.js", () => ({ readSettings, writeSettings, FEATURES }))` replaces the entire module with the factory's return value. `DASHBOARD_PREFIX` was not in the factory, so `import { DASHBOARD_PREFIX } from "../settings-file.js"` evaluated to `undefined` at runtime. The route handler's template literal `\`${DASHBOARD_PREFIX}${username}\`` became `"undefinednewms87"`, which then failed the `toHaveBeenCalledWith` assertion. But before that assertion, the handler's 500 mask hid the underlying error by surfacing the post-writeSettings snapshot rendering path as a generic failure.

  Diagnosing took roughly 5-10 minutes (tests run, red, check output, stare at "500 expected 200", remember the just-added import).

  ## Why this wasted time

  - Test output surfaced as "500" not "missing export" — high cognitive distance from the cause
  - Four tests failing in parallel made it look like a handler-wide bug rather than a mock-factory gap
  - No type error at compile time because `DASHBOARD_PREFIX` is a runtime value consumed in a template literal

  ## Proposed fix

  Pick ONE of the following paths (low-effort first):

  1. **Rule in `~/.claude/rules/testing.md` or `.claude/rules/tests.md`:** when adding an export to any module mocked via `vi.mock(..., factory)`, update every mock factory that targets that module. Grep pattern: `vi.mock\\("\\.\\./<module>"` and `vi.mock\\("\\./<module>"`. Enforce in PR checklist.

  2. **Helper for the project:** a small `createAutoMock<Module>(partial: Partial<Module>): Module` helper that fails loudly when the source module exports something the mock doesn't stub — keeps mock factories honest as source modules grow new exports. Low-cost, high-signal.

  3. **Vitest's `vi.importActual` pattern:** in the factory, spread `...actual` before the stubs, so only explicitly-stubbed fields diverge. This is the idiomatic vitest pattern and auto-handles future exports at the cost of loading the real module (which can defeat the purpose of the mock if the module has heavy side effects — `settings-file.ts` has no module-load side effects so this would have worked cleanly for this case).

  ## Where to add the rule

  `~/.claude/rules/testing.md` already has a "Vitest Mock Isolation" section — the natural home for a new "vi.mock factory completeness" sub-rule.

  ## Key files

  - `src/settings-file.ts` (the module whose export set grew)
  - `src/dashboard/agents-routes.test.ts` (the test file whose mock factory needed updating)
  - `~/.claude/rules/testing.md` (where the rule would land)
