title: "[Danxbot] Extract src/dashboard/server.ts route table to declarative routes.ts"
description: |-
  ## Context

  `src/dashboard/server.ts` is ~360 LOC as of Phase 2 of the dashboard-auth epic. The `route()` function is a flat cascade of `if (method === "X" && url.pathname === "Y") { await handleZ(...); return true; }` blocks interleaved with an ad-hoc auth gate. Each new route adds a block in the middle of the function. The auth policy ("open" vs "user-gated" vs "dispatch-token-gated") is scattered across the file rather than declared once per route.

  ## Solution

  Extract a declarative routes table to `src/dashboard/routes.ts`:

      interface DashboardRoute {
        method: "GET" | "POST" | "PATCH" | ...;
        pattern: RegExp | string;
        auth: "none" | "user" | "dispatch" | "either";
        handler: (req, res, match?, deps?) => Promise<void>;
      }

      export const ROUTES: DashboardRoute[] = [
        { method: "GET",  pattern: "/health",         auth: "none",     handler: handleHealth },
        { method: "POST", pattern: "/api/auth/login", auth: "none",     handler: handleLogin },
        { method: "POST", pattern: "/api/launch",    auth: "dispatch", handler: handleLaunchProxy },
        { method: "POST", pattern: /^\\/api\\/stop\\/([^/]+)$/, auth: "dispatch", handler: handleJobStop },
        { method: "PATCH", pattern: /^\\/api\\/agents\\/([^/]+)\\/toggles$/, auth: "either", handler: handlePatchToggle },
        { method: "GET",  pattern: "/api/repos",      auth: "user",     handler: handleListRepos },
        // ... etc
      ];

  `route()` reduces to:

      for (const r of ROUTES) {
        const match = matchRoute(r, method, url);
        if (!match) continue;
        const authed = await enforceAuth(r.auth, req, deps.token);
        if (!authed) { json(res, 401, { error: "Unauthorized" }); return true; }
        await r.handler(req, res, match, deps);
        return true;
      }
      return false;

  ## Benefits

  - One declaration site per route — easier to read, harder to regress
  - Auth policy is co-located with the route, not inferred from if-block placement
  - Static table is greppable — "what routes exist?" is one file-read
  - New routes are one-line additions instead of middle-of-function edits
  - `GET /` and `/assets/*` stay as special cases outside the table (static-asset serving is genuinely different)

  ## Non-goals

  - Not a routing framework (no wildcards, no middleware chains) — this is a table, not a DSL
  - Not a behavior change — every existing test must pass unchanged
  - Does NOT need to introduce vue-router or any SPA router

  ## Key files

  - `src/dashboard/server.ts` — shrinks to ~150 LOC (just startup + the route loop)
  - `src/dashboard/routes.ts` (new) — the table + matching helper
  - `src/dashboard/server.test.ts` — no changes expected; all routes should behave identically

  ## Verify

  `npx vitest run src/dashboard/server.test.ts` stays 65/65 green. `npx tsc --noEmit` clean. Live curl flow from .claude/rules/production-access.md still works.
