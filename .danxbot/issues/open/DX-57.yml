title: Extract stall-recovery controller from runDispatchSlot
description: |-
  ## Context

  `src/worker/dispatch.ts::runDispatchSlot` now owns three responsibilities for both `/api/launch` and `/api/resume`:

  1. Spawn orchestration (initial + respawn under same dispatchId)
  2. Stall detection wiring (TerminalOutputWatcher + StallDetector + onStall callback with respawn logic)
  3. activeJobs registration + TTL-based eviction

  The stall-detection block is ~90 lines with its own `resumeCount` closure, nudge-prompt construction, and teardown wrapping via `job._cleanup`. This was flagged by the code-reviewer during the resume feature review but was deferred as pre-existing structure (not introduced by that feature).

  ## Why this matters

  The closure over `inputs` inside `spawnForDispatch` exists only because stall detection needs the same inputs to respawn. That's the classic "parameter threading" smell — per `code-quality.md`, instance state is preferred. Also, `setupStallDetection` is currently nested inside `runDispatchSlot` — it can't be unit-tested in isolation, only through handleLaunch/handleResume integration-style tests.

  ## Proposed solution

  Move stall detection into `src/worker/stall-recovery.ts` as a `StallRecoveryController` class:

  - Constructor takes `dispatchId`, `inputs: DispatchSlotInputs`, and a `spawnForDispatch` function reference
  - Holds `resumeCount` as instance state (no closure)
  - Exposes `attachTo(job: AgentJob)` which sets up the watchers and onStall callback
  - Handles respawn by calling back into `spawnForDispatch` + re-attaching

  `runDispatchSlot` becomes a slim coordinator that creates the controller, attaches it on initial spawn, and registers the TTL eviction interval.

  ## Key files

  - `src/worker/dispatch.ts` — the current ~200-line `runDispatchSlot` shrinks to ~50 lines
  - `src/worker/stall-recovery.ts` — NEW, owns nudging + respawn
  - `src/worker/stall-recovery.test.ts` — NEW, unit tests for the controller

  ## Acceptance criteria

  - `runDispatchSlot` is ≤ 80 lines
  - `StallRecoveryController` is unit-testable without spinning up HTTP handlers
  - All existing `handleLaunch` stall tests still pass (preserve behavior)
  - Single-fork invariant preserved (still one claude per dispatchId, respawn reuses the same dispatchId)

  ## How to verify

  Existing tests in `src/worker/dispatch.test.ts > handleLaunch — stall detection (host mode)` must pass unchanged. Add new unit tests in `stall-recovery.test.ts` that exercise: (1) stall under max nudges → respawn, (2) stall at max nudges → job.stop("failed"), (3) stall during a respawn → no-op, (4) teardown when job completes before stall fires.
