      <!-- danxbot -->

      ## Phase 1 Handoff

      **Built:** Commit 3841bd4. Schema-only — `Needs Approval` is now a fifth `IssueStatus` enum value, paralleling `Needs Help` everywhere. `ManagedLabels` interface extracted (`src/issue-tracker/interface.ts`); `TrelloConfig` carries `needsApprovalListId` + `needsApprovalLabelId` (`src/types.ts`); `loadTrelloIds` reads `lists.needs_approval` + `labels.needs_approval` as rollout-OPTIONAL with empty-string default; tracker sync layer derives `needsApproval: boolean` from `status === "Needs Approval"`; dashboard COLUMN_ORDER + COLUMN_ACCENTS gain the column.

      **Discoveries:**
      - The Trello board itself does NOT yet have a `Needs Approval` list or label. The schema is fail-loud: if any agent or human flips a YAML to `Needs Approval` and a sync runs against an unprovisioned board, `statusToListId` throws "Trello board has no Needs Approval list configured…". Operator action is required before Phase 4 (the triage agent) can ship classifications into Needs Approval. Provision steps documented in `.claude/rules/trello-config.md` (placeholder rows added).
      - `needsApprovalLabelId` empty path silently skips applying the label rather than throwing — accepted as the rollout contract (label provisioning may lag list provisioning by a tick). Pinned by test in `src/__tests__/issue-tracker/trello.test.ts` "Needs Approval status" suite.
      - Touched ~13 fixture files purely to add `needsApprovalListId` + `needsApprovalLabelId` literals. A `defaultTrelloConfig()` test helper would consolidate them; out of scope for this card but worth doing before the next config field lands.
      - **Concurrent agent activity:** another agent (DX-81) was modifying `src/issue-tracker/interface.ts` during this session — the post-commit system-reminder showed they removed the `phases[]` field from `Issue` (epics now use `children[]` exclusively for their phase cards). My commit landed cleanly because their edits stayed off-disk while my staging happened. Their changes are uncommitted and will conflict with anything that touches the `Issue` interface in Phase 4 / 5.

      **Corrections to epic / sibling phases:** None.

      **Next-agent context:**
      - **`Needs Approval` status pipeline.** Phase 4 (`danx-triage` skill auto mode, DX-78) is where the triage agent emits `Needs Approval` classifications. Before shipping Phase 4, the operator MUST provision the Trello list AND label on the danxbot board, then update `<repo>/.danxbot/config/trello.yml` to add `lists.needs_approval: <id>` and `labels.needs_approval: <id>`. Without provisioning, the triage agent's first Needs Approval emission throws on sync.
      - **`ManagedLabels` interface** (`src/issue-tracker/interface.ts`) is now the single source of truth for the booleans danxbot derives from card state. Adding a new managed label is a one-line edit there + a derivation site (`sync.ts` localLabels/remoteLabels + `Trello.resolveLabelIds`). Phase 4 / 5 don't need to touch this.
      - **Test fixture template.** Every test that builds a `TrelloConfig` literal now needs `needsApprovalListId` + `needsApprovalLabelId`. New tests should mirror the existing fixtures (e.g. `src/__tests__/helpers/fixtures.ts`).
      - **Documentation surface.** `~/.claude/rules/issues.md` carries the canonical "Needs Approval vs Needs Help" section. `.claude/rules/trello-config.md` carries operator-action placeholders.
      - **`status === "Needs Approval"` is non-dispatchable, non-terminal.** YAML stays in `open/` (pinned in `src/__tests__/worker/issue-route.test.ts`); poller never dispatches a card in this status; the worker `forceBlockedToToDo` does NOT special-case it (same treatment as `Needs Help` — if `blocked` is set, status is normalized to ToDo regardless of original parking status).
