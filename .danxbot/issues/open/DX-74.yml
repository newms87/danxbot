      <!-- danxbot -->

      ## Phase 5 Handoff

      **Built:** Commit `38e0fed` — `checkAndSpawnTriage(repo, openCards): Promise<boolean>` in `src/poller/index.ts`, wired into `_poll`'s empty-ToDo branch BEFORE `checkAndSpawnIdeator`. Reuses the caller's already-fetched `openCards` (no extra `tracker.fetchOpenCards` round-trip). Filter: `list_kind === "action_items"` OR `status === "Review"`, minus any whose local YAML carries non-empty `triaged.timestamp`. Spawns via new shared helper `spawnPollerApiAgent(repo, prompt, endpoint)` with `endpoint: "poller/auto-triage"`. Per-tick single-dispatch invariant honored — caller returns immediately when triage spawns.

      **Discoveries:**

      - Code review surfaced two real wins: (a) DRY — `checkAndSpawnIdeator`'s api-trigger metadata block was duplicated; extracted `spawnPollerApiAgent` shared by both. (b) The original error path treated corrupt YAML as "untriaged → spawn" — biased toward over-spawning every empty-ToDo tick. Flipped to fail CLOSED (skip + warn) so a persistently broken file doesn't drive a respawn loop.
      - Test mocks: `mockIsFeatureEnabled`'s default factory had to be widened to also exclude `autoTriage` (matching the real env default of `false`). One existing test (`checkAndSpawnIdeator reads the Review count from tracker.fetchOpenCards`) used `() => true` plus REVIEW_FILLER and now had to pin ideator-only — otherwise REVIEW_FILLER becomes triage candidates and steals the dispatch. Surgical edit, documented in-line.
      - `bulkSyncMissingYamls` calls `findByExternalId` BEFORE the triage gate runs against the same `external_id`; throw-on-call tests must scope the throw to the SECOND invocation per id (sentinel-set pattern in `src/poller/index.test.ts`).

      **Corrections to epic / sibling phases:** None. The epic description remained accurate; phase 5's description carried a now-redundant `tracker` arg in the implementation skeleton (`checkAndSpawnTriage(repo, tracker)`), but the actual signature took `openCards: IssueRef[]` to avoid the second fetch — the deviation is documented in the Phase 5 commit comment.

      **Next-agent context (Phase 5 → Done transition for the operator):**

      - Phase 5 shipped to **Needs Help**, NOT Done. Eight of nine ACs verified by unit tests; the ninth (`End-to-end smoke against danxbot repo passes per Verify section`) needs operator action — the smoke requires (a) toggle `autoTriage` ON via dashboard or `<repo>/.danxbot/settings.json`, (b) ToDo briefly empty, (c) place a fixture card on the Trello Action Items list (agent path is forbidden from `mcp__trello__*` writes), (d) wait one poll tick (~60s) and observe `[danxbot] Auto-triage: 1 untriaged card — spawning triage` in `make logs REPO=danxbot`. Full step-by-step in the Needs Help comment on DX-79.
      - Once the operator runs the smoke and confirms the four observations, set DX-79's smoke AC to `checked: true` and move DX-79 to Done. After DX-79 lands in Done AND the epic-level smoke (epic AC items 1, 2, 3) is observed live, the epic itself is ready to flip to Done.
      - Epic AC #4 (`autoTriage=off, poller behavior unchanged`) was checked off in this Phase 5 handoff — covered by the new `does NOT spawn triage when autoTriage is disabled` test PLUS the existing `does NOT spawn ideator when feature is disabled (env default)` test; the empty-ToDo branch's behavior with both toggles off is now pinned.

      **Reusable helpers + paths:**

      - `spawnPollerApiAgent(repo, prompt, endpoint)` in `src/poller/index.ts` — reuse for any future poller-driven api-trigger spawn (e.g. periodic cleanup, auto-blocker-resolution). DRYs the `{trigger:"api", metadata:{endpoint, callerIp:null, statusUrl:null, initialPrompt:prompt.slice(0,500)}}` block.
      - `TRIAGE_AUTO_PROMPT` in `src/poller/constants.ts` — first line `/danx-triage auto`; constants test pins the auto-mode markers.
      - `actionItemsRef(external_id, title)` in `src/poller/index.test.ts` — local test helper for building `IssueRef` with `list_kind: "action_items"`.
