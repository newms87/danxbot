title: "Auto-triage poller: triage Action Items + Review when ToDo is empty"
description: |-
  ## Context

  Today when the poller finds zero dispatchable cards in ToDo it
  optionally spawns the **ideator** (`checkAndSpawnIdeator` in
  `src/poller/index.ts`) which generates new feature cards into Review.
  There is no equivalent for working DOWN the existing backlog — cards
  parked in Action Items and Review are invisible until a human triages
  them by hand.

  We already have a `danx-triage` skill (see
  `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md`)
  that classifies cards into 6 states (Keep / Partial / Complete /
  Obsolete / Duplicate / Ambiguous) and maps terminal classifications
  to status moves. It was designed for manual `/danx-triage` invocation
  scoped against open YAMLs; the poller does not call it.

  ## Goal

  When the poller's ToDo dispatch list is empty AND the new
  `autoTriage` per-repo toggle is on, spawn an auto-triage agent that
  audits Action Items FIRST (highest priority — operators surface
  follow-ups there during retro), then Review. Each card resolves to
  one of:

  | Outcome | Action |
  |---|---|
  | Already complete (work shipped elsewhere) | `status: Done` |
  | Obsolete / superseded / no longer wanted | `status: Cancelled` |
  | Ready for an agent to pick up — direction is clear | `status: ToDo` |
  | Spec incomplete / human input required | `status: Needs Help` |
  | Direction unclear / disruptive / architectural ambiguity | `status: Needs Approval` (NEW) |

  `Needs Approval` is a NEW status introduced in Phase 1. It is
  distinct from `Needs Help`:
  - `Needs Help` — agent cannot proceed without a human SUPPLYING
    information (missing creds, missing decision input, ambiguous AC).
  - `Needs Approval` — agent could write code but is unsure whether
    THIS is the right thing to build (architectural choice between two
    valid approaches; change touches multiple subsystems with
    cross-cutting risk; ask is plausible but the human should sign off
    on direction before we burn tokens).

  Triage NEVER skips a card. Every Action Item / Review card gets a
  decision on every triage run.

  ## Pipeline

  Five phases — see `phases[]`. Children are linked via `parent_id` /
  `children[]` (Phase 1–5 cards are DX-75 … DX-79).

  Single-dispatch invariant is preserved: if triage spawns this tick,
  the tick returns BEFORE the ideator check. Ideator runs only when
  ToDo is empty AND autoTriage didn't fire (toggle off, or no Action
  Items / Review cards needing triage).

  ## Out of scope

  - Two-way conflict resolution from tracker → YAML on triage decisions
    (still YAML-canonical per DX-67 source-of-truth contract).
  - Auto-triaging open `In Progress` cards (those have a live dispatch).
  - Auto-triaging cards already carrying a non-empty `triaged.timestamp`
    — handled by the existing skill's idempotence rule.
  - Multi-repo cross-card dependency graph beyond what `danx-triage`
    already builds.

  ## Key Files

  - `src/poller/index.ts` — `_poll`, `checkAndSpawnIdeator`, will get
    sibling `checkAndSpawnTriage`
  - `src/issue-tracker/interface.ts` — `IssueStatus` union
  - `src/settings-file.ts` — `Feature` union, override schema
  - `dashboard/src/components/agents/RepoCard.vue` — toggle row
  - `src/poller/inject/workspaces/issue-worker/.claude/skills/danx-triage/SKILL.md` — auto mode + new outcomes
  - `src/poller/constants.ts` — `IDEATOR_PROMPT`, sibling `TRIAGE_AUTO_PROMPT`

  ## Verify

  - All 5 phase cards reach Done.
  - Toggle `autoTriage` on for the danxbot repo, drain ToDo, confirm
    next poller tick spawns triage and triage classifies every Action
    Item + Review card with one of the five outcomes above.
  - Toggle off → poller behavior unchanged from today (ideator still
    runs when Review is short).
