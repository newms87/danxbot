title: "[Dashboard > Issues] Agent Chat > Phase 2: JSONL stream + resume backend"
description: |-
  ## Context

  Phase 2 of the Agent Chat epic (DX-82). Replace Phase 1's fixtures path with real backend wiring driven by Claude Code's native JSONL session logs and the existing `/api/resume` flow.

  Read first:
  - `.claude/rules/agent-dispatch.md` — single-fork principle, `SessionLogWatcher` invariant, "Resume" section, "Multi-block assistant turns" dedupe rule, per-dispatch callback URL contract.
  - `src/agent/session-log-watcher.ts` — JSONL polling, dispatch tag disambiguation, message.id dedupe.
  - `src/dashboard/jsonl-reader.ts` — existing parser used by dispatch detail. Reuse exactly — do NOT add a second parser.
  - `src/worker/dispatch.ts` `handleResume` — already implements `--resume <sessionId>` w/ fresh dispatch tag.

  ## JSONL Integration — How Chat Maps to Existing Pipeline

  Chat is a viewer + resume around the existing dispatch pipeline. NOT a new spawn shape.

  - Each chat turn = one resumed dispatch on the same JSONL file. Initial chat (board mode, no parent) = a fresh `/api/launch`. Every subsequent operator message = a fresh `POST /api/resume {repo, job_id: <prev_dispatch_id>, task: <user_msg>}`. Worker resolves parent's session UUID via `findSessionFileByDispatchId`, spawns claude with `--resume <sessionUUID>` + a new dispatch tag. New turns append to the SAME JSONL file. The dispatch chain (`parent_job_id`) records the conversation history.
  - Frontend live-tail: per-dispatch SSE channel forwards `SessionLogWatcher` entries to the chat timeline as they arrive. `usage` accumulator MUST dedupe by `message.id` (multi-block turns emit the same usage per block; not deduping double-counts tokens — see `agent-dispatch.md`).
  - Stop button = `POST /api/cancel/:dispatchId`.
  - Token meter chip = sum of deduped per-block `usage.input_tokens` / `output_tokens` / `cache_read_input_tokens` / `cache_creation_input_tokens` across all dispatches in the chain.
  - Issue→dispatch lookup: query dispatches table for newest dispatch matching the issue (see schema sub-task below).

  ## Solution

  ### Schema check + issue→dispatch link

  Verify `dispatches` table has an `issue_id` column. If not:
  - Add migration `src/db/migrations/<ts>-dispatches-issue-id.sql` adding `issue_id VARCHAR(16) NULL, INDEX (issue_id, created_at)`.
  - Update `src/dispatch/core.ts` to populate `issue_id` from `DispatchInput` when the trigger is the issue poller. The poller already has the YAML id at dispatch time.
  - Backfill existing rows from prompt text (`[ISS-N]` substring) in a one-shot script `scripts/backfill-dispatch-issue-id.ts`. Idempotent.

  ### Server routes

  All under existing dashboard auth gate. Add to `src/dashboard/server.ts`:

  - `GET /api/chat/sessions?issue_id=ISS-N` → list dispatches matching the issue, ordered by created_at DESC. Response: `[{job_id, parent_job_id, status, summary, started_at, completed_at, tokens_total, turns, tool_calls}]`.
  - `GET /api/chat/sessions/board?repo=<name>` → list board-chat dispatches (filter `workspace = "board-chat"`).
  - `GET /api/chat/sessions/:job_id/timeline` → full deduped block array. Reuse `parseJsonlContent` from `src/dashboard/jsonl-reader.ts`. Returns the full chain (this dispatch + all ancestors via `parent_job_id`) merged into one ordered timeline so resumed chats show their history. Dedupe by `message.id`.
  - `POST /api/chat/sessions` (board-chat new) → wraps `/api/launch` with `workspace: "board-chat"`. Returns `{job_id}`.
  - `POST /api/chat/sessions/:job_id/resume` → wraps `/api/resume`. Body `{task}`. Returns `{job_id, parent_job_id}`.
  - `POST /api/chat/sessions/:job_id/cancel` → wraps `/api/cancel`.
  - `GET /api/chat/sessions/:job_id/stream` → SSE channel forwarding `SessionLogWatcher` events for this dispatch. Re-uses existing watcher emitter; does NOT spawn a second watcher. Auto-closes on dispatch terminal status.

  ### SSE channel infra

  - Extend `src/dashboard/events.ts` with `subscribeChatStream(dispatchId, response)` registering an SSE writer for a specific dispatch. Hook into `SessionLogWatcher`'s entry emitter — the watcher is already registered per dispatch in `spawnAgent`. Add a small `chatStreamHub` map keyed by dispatch_id; per-dispatch entries fan out to subscribers.
  - Multi-block dedupe at the hub level: track `seenMessageIds: Set<string>` per dispatch, drop duplicate blocks before broadcast.

  ### Board-chat workspace

  - New dir `src/poller/inject/workspaces/board-chat/`:
    - `workspace.yml` — basic manifest, allowed MCP servers (`danxbot`, `danx-issue`).
    - `.mcp.json` — `danxbot` (built-in) + `danx-issue`.
    - `CLAUDE.md` — system prompt: "you are danxbot operator chat for repo <name>, the operator wants to ask questions about open issues, retros, dispatches, blockers. Use danx_issue_get + danx_issue_list freely. Don't modify cards without explicit operator instruction."
    - `.claude/skills/` — minimal: chat-friendly `respond` skill (no implementation skills).
  - Inject pipeline (`src/poller/index.ts#injectDanxWorkspaces`) already mirrors `src/poller/inject/workspaces/<name>/` to every connected repo's `.danxbot/workspaces/<name>/` — no code changes required, just drop the new workspace dir.

  ### Frontend wiring

  - Delete `dashboard/src/components/chat/chatFixtures.ts` outright (Phase 1 stub; no compat shim).
  - `dashboard/src/api.ts` — add typed wrappers: `listChatSessions(issueId)`, `getChatTimeline(jobId)`, `postChatMessage(jobId, task)`, `startBoardChat(repo)`, `cancelChatSession(jobId)`, `subscribeChatStream(jobId, onEntry)` (EventSource wrapper).
  - `dashboard/src/composables/useChat.ts` (new) — reactive state per chat session: blocks[], streaming, tokenSums (deduped). On `onSend`, call `postChatMessage`, swap `currentJobId` to returned `job_id`, reopen SSE.
  - `AgentChat.vue` — replace fixtures import with composable. Initial mount queries `listChatSessions(issue.id)` and picks the newest. Empty state + start-new-session unchanged.
  - `BoardSessionPicker.vue` — reads from `listChatSessions(boardRepo)`. New chat button calls `startBoardChat(repo)` then opens the chat shell.
  - `TokenMeter.vue` — consumes deduped sums from composable.
  - Stop button → `cancelChatSession(currentJobId)`.

  ## Acceptance Criteria

  - Migration adds `dispatches.issue_id` column (or no-op if already present); backfill script populates historical rows from prompt text.
  - `src/dispatch/core.ts` sets `issue_id` on new poller-driven dispatches.
  - All 7 chat routes registered + responding (200 happy paths verified by integration test against fake JSONL fixture).
  - Timeline endpoint walks `parent_job_id` chain and merges blocks into one ordered array, deduped by `message.id`.
  - SSE stream forwards live `SessionLogWatcher` entries to subscribed dashboard clients; closes cleanly on terminal status.
  - SSE stream multi-block dedupe verified by test (one assistant turn with text+thinking+tool_use → one entry per block, but `usage` accumulator on the client sees one logical turn).
  - Board-chat workspace dir exists at `src/poller/inject/workspaces/board-chat/` and is mirrored to every connected repo's `.danxbot/workspaces/board-chat/` after a poller tick.
  - Per-issue chat in drawer resumes the most recent dispatch for that issue, sends a real message via `/api/chat/sessions/:id/resume`, streams thinking/tool_use/assistant_text live.
  - Per-board chat opens against the board-chat workspace, picker lists prior board sessions for the repo, new chat starts a fresh dispatch.
  - Stop button calls `/api/chat/sessions/:id/cancel`; streaming cleanly halts within ~5s.
  - Token meter shows live-updated total, input, output, cache read, cache write — values match `dispatches` row sums (queryable via SQL).
  - `chatFixtures.ts` deleted; no imports remain (`grep -rn 'chatFixtures' dashboard/src/` empty).
  - `npx vitest run` clean (backend).
  - `cd dashboard && npx vitest run` clean.
  - `npx tsc --noEmit` clean.
  - `cd dashboard && npx vue-tsc --noEmit` clean.
  - Manual: `make launch-infra` + `make launch-worker REPO=danxbot`, open dashboard, click Chat tab on an issue with a known prior dispatch, send a question, watch live thinking + tool calls render. Hit Stop mid-stream, verify cancel.
  - Manual: open Chat with danxbot from board toolbar, start new chat about the danxbot board, ask "list all open epics," verify danx_issue_list tool call streams.

  ## Out of scope

  - Multi-user concurrent chat on same dispatch — second open is read-only (warn banner). Future work.
  - Chat history search.
  - Long-term retention policy on board-chat dispatches (treat them as regular dispatches; existing TTL applies).

  ## Key Files

  - `src/db/migrations/<ts>-dispatches-issue-id.sql` (new, only if column missing)
  - `scripts/backfill-dispatch-issue-id.ts` (new)
  - `src/dispatch/core.ts` (set issue_id)
  - `src/dashboard/server.ts` (7 routes)
  - `src/dashboard/events.ts` (chatStreamHub)
  - `src/dashboard/jsonl-reader.ts` (reused — verify chain-walk path exists or add)
  - `src/poller/inject/workspaces/board-chat/` (new dir tree)
  - `dashboard/src/api.ts` (typed wrappers)
  - `dashboard/src/composables/useChat.ts` (new)
  - `dashboard/src/components/chat/AgentChat.vue` (real wiring)
  - `dashboard/src/components/chat/BoardSessionPicker.vue` (real wiring)
  - `dashboard/src/components/chat/TokenMeter.vue` (real wiring)
  - `dashboard/src/components/chat/chatFixtures.ts` (delete)
