# Flytebot production infra compose (dashboard + postgres + playwright).
# The deploy CLI SCPs this file to /danxbot/docker-compose.prod.yml with
# ${ECR_IMAGE} and ${DASHBOARD_PORT} substituted.
# Per-repo workers run from /danxbot/repos/<name>/.danxbot/config/compose.yml
# via separate compose projects (`worker-<name>`) on the shared danxbot-net.

services:
  dashboard:
    image: ${ECR_IMAGE}
    restart: always
    stop_grace_period: 30s
    env_file: /danxbot/.env
    ports:
      - "${DASHBOARD_PORT}:${DASHBOARD_PORT}"
    volumes:
      - /danxbot/repos:/danxbot/app/repos
      # DX-262 mirror-bind: dashboard's WorktreeManager `git worktree add`
      # bakes `realpath(cwd)` into worktree metadata. Mounting the same
      # source at its own host abs path makes the host path real INSIDE
      # the container so git canonicalizes to a path that survives
      # worker handoff. Workers do the same via DX-230.
      - /danxbot/repos:/danxbot/repos
      - /danxbot/threads:/danxbot/threads
      - /danxbot/logs:/danxbot/logs
      - /danxbot/claude-auth:/danxbot/claude-auth:ro
      # Per-repo Claude Code session logs — each repo's worker writes JSONL
      # to its OWN /danxbot/repos/<name>/claude-projects/ host dir; the
      # dashboard reads via namespaced RO mounts so jsonl-path-resolver
      # finds JSONL under the matching namespace. Lines below are rendered
      # by `renderProdCompose` from the deploy config's repo list — same
      # layout as `docker-compose.override.yml` in dev.
${CLAUDE_PROJECTS_MOUNTS}
      # DX-697 — per-repo worker-owned runtime volumes. The worker
      # writes CRITICAL_FAILURE + sync-root-state.json here (resolved by
      # `runtimeVolumeRoot()` to `/var/lib/danxbot/<name>/` in docker
      # runtime); the dashboard mounts the same named volume so
      # `agents-list.ts#buildSnapshot` (readFlag) and
      # `sync-root-watcher.ts` chokidar see what the worker stamped.
      # Each line rendered by `renderProdCompose` from the deploy
      # config's repo list; matching `external: true` declarations
      # live in the top-level `volumes:` block below.
${RUNTIME_VOLUME_MOUNTS}
      - /var/run/docker.sock:/var/run/docker.sock
    # DX-262 — per-repo host-path env consumed by `src/target.ts#loadTarget`
    # to populate `RepoConfig.hostPath`. Rendered per-repo by
    # `renderProdCompose` in `deploy/compose-infra.ts`.
    environment:
${DASHBOARD_REPO_HOST_PATH_ENVS}
    networks:
      - danxbot-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${DASHBOARD_PORT}/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  playwright:
    build: ./playwright-screenshot
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      PORT: "3000"
    networks:
      - danxbot-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

  postgres:
    image: postgres:16-alpine
    container_name: danxbot-postgres-db
    restart: always
    env_file: /danxbot/.env
    volumes:
      - /danxbot/postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DANXBOT_DB_USER}
      POSTGRES_PASSWORD: ${DANXBOT_DB_PASSWORD}
      POSTGRES_DB: ${DANXBOT_DB_NAME:-danxbot_chat}
    networks:
      - danxbot-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      retries: 5
      timeout: 3s
      start_period: 10s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

networks:
  danxbot-net:
    name: danxbot-net
    driver: bridge
${RUNTIME_VOLUMES_BLOCK}
