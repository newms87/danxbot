# Danxbot shared infrastructure — MySQL + Dashboard (API) + Dashboard Dev (Vite HMR).
# Per-repo workers live in <repo>/.danxbot/config/compose.yml.
#
# Usage:
#   docker compose up -d              # start API + dashboard-dev (HMR) + mysql
#   make launch-worker REPO=platform  # start a worker
#
# Dev surfaces:
#   http://localhost:5566 → Vite dev server with HMR (edit .vue, see instantly)
#   http://localhost:5555 → API + the baked dashboard/dist/ bundle (prod-style)
#
# Prod uses deploy/templates/docker-compose.prod.yml which has NO dashboard-dev
# service — prod serves the baked bundle directly from the same API container.

services:
  dashboard:
    build: .
    restart: always
    stop_grace_period: 30s
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-5555}:${DASHBOARD_PORT:-5555}"
    volumes:
      # Hot-reload during development
      - ./src:/danxbot/app/src
      - ./package.json:/danxbot/app/package.json
      # Dashboard built assets (mount for dev rebuilds)
      - ./dashboard:/danxbot/app/dashboard
      # Host-mode JSONL compatibility: when CLAUDE_PROJECTS_DIR points at the
      # host's real ~/.claude/projects, the dashboard can resolve host-mode
      # dispatch JSONLs by their stored absolute path (path-resolver strategy 1).
      # Both sides of the mount intentionally use the same variable so that when
      # CLAUDE_PROJECTS_DIR is set, the container path === stored path, making
      # strategy 1 (direct lookup by stored absolute path) work. When the
      # variable is unset, the default RHS alias /danxbot/host-claude-projects is
      # used as a safe placeholder that the path-resolver never looks up.
      # Docker-worker JSONLs are resolved via per-repo mounts in the override
      # (path-resolver strategy 2 — translateWorkerPath).
      - ${CLAUDE_PROJECTS_DIR:-./claude-projects}:${CLAUDE_PROJECTS_DIR:-/danxbot/host-claude-projects}:ro
      # Per-repo RW binds + per-repo RO claude-projects binds live in
      # `docker-compose.override.yml` (gitignored, auto-generated from REPOS
      # by `make launch-infra`). The override mounts:
      #   ./repos/<name>          → /danxbot/app/repos/<name>      (RW, for settings.json)
      #   ./repos/<name>/claude-projects → /danxbot/app/claude-projects/<name>  (RO, for JSONL)
      # See src/cli/dev-compose-override.ts and src/dashboard/jsonl-path-resolver.ts.
      # Prod compose handles these with static per-repo volume entries.
    networks:
      - danxbot-net
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: curl -f http://localhost:${DASHBOARD_PORT:-5555}/health || exit 1
      interval: 30s
      timeout: 5s
      start_period: 30s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Dev-only Vite HMR server. Same image as the API so node_modules are
  # already present — we just override the command. Proxies /api + /health
  # to the `dashboard` service over danxbot-net. Not present in prod compose
  # (prod serves the baked bundle from the API container's dashboard/dist/).
  dashboard-dev:
    build: .
    restart: unless-stopped
    stop_grace_period: 5s
    command: ["npm", "run", "dashboard:dev"]
    working_dir: /danxbot/app
    environment:
      VITE_API_TARGET: http://dashboard:${DASHBOARD_PORT:-5555}
    ports:
      # 5566 is the canonical danxbot dev-dashboard port — chosen so it never
      # collides with Vite's default 5173 (other projects). Override only if
      # 5566 itself is taken. Vite inside the container always binds 5173.
      - "${DASHBOARD_DEV_PORT:-5566}:5173"
    volumes:
      # Source mounts — Vite watches these and HMR propagates edits instantly.
      - ./dashboard:/danxbot/app/dashboard
      - ./src:/danxbot/app/src
      - ./package.json:/danxbot/app/package.json
    networks:
      - danxbot-net
    depends_on:
      dashboard:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

  playwright:
    build: ./playwright-screenshot
    restart: always
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PORT: "3000"
    networks:
      - danxbot-net
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

  mysql:
    image: mysql/mysql-server:8.0
    ports:
      - "${DANXBOT_DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: danxbot
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${DANXBOT_DB_NAME:-danxbot_chat}
      MYSQL_USER: danxbot
      MYSQL_PASSWORD: danxbot
    networks:
      - danxbot-net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-pdanxbot"]
      interval: 5s
      retries: 5
      timeout: 3s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

networks:
  danxbot-net:
    name: danxbot-net
    driver: bridge

volumes:
  mysql-data:
