services:
  flytebot:
    build: .
    container_name: flytebot
    restart: always
    stop_grace_period: 120s
    env_file: .env
    ports:
      - "5555:5555"
    volumes:
      # Hot-reload during development
      - ./src:/flytebot/app/src
      - ./package.json:/flytebot/app/package.json
      # Dashboard built assets (mount for dev rebuilds)
      - ./dashboard:/flytebot/app/dashboard
      # Persistent thread cache
      - flytebot-threads:/flytebot/threads
      # Shared repos directory (cloned at startup, accessible from host + sibling containers)
      - ./repos:/flytebot/repos
      # Repo-specific compose overrides and config (generated by /setup, mounted if present)
      - ./repo-overrides:/flytebot/app/repo-overrides:ro
      # Docker socket (for managing sibling containers)
      - /var/run/docker.sock:/var/run/docker.sock
      # Claude Code auth (directory mounts survive inode changes from file rewrites)
      - ${CLAUDE_AUTH_DIR:-/dev/null}:/flytebot/claude-auth/dot-claude:ro
      - ${CLAUDE_AUTH_HOME:-/dev/null}:/flytebot/claude-auth/home:ro
    depends_on:
      flytebot-mysql:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  flytebot-mysql:
    image: mysql/mysql-server:8.0
    volumes:
      - flytebot-mysql:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: flytebot
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: flytebot_chat
      MYSQL_USER: flytebot
      MYSQL_PASSWORD: flytebot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-pflytebot"]
      interval: 5s
      retries: 5
      timeout: 3s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

volumes:
  flytebot-threads:
  flytebot-mysql:
