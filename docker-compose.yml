services:
  danxbot:
    build: .
    restart: always
    stop_grace_period: 120s
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-5555}:${DASHBOARD_PORT:-5555}"
    volumes:
      # Hot-reload during development
      - ./src:/danxbot/app/src
      - ./package.json:/danxbot/app/package.json
      # Dashboard built assets (mount for dev rebuilds)
      - ./dashboard:/danxbot/app/dashboard
      # Persistent thread cache
      - danxbot-threads:/danxbot/threads
      # Shared repos directory (cloned at startup, accessible from host + sibling containers)
      - ./repos:/danxbot/repos
      # Repo-specific compose overrides and config (generated by /setup, mounted if present)
      - ./repo-overrides:/danxbot/app/repo-overrides:ro
      # Docker socket (for managing sibling containers)
      - /var/run/docker.sock:/var/run/docker.sock
      # Claude Code auth (copied into project by /setup)
      - ./claude-auth:/danxbot/claude-auth:ro
    networks:
      - default
      - ssap_sail
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  mysql:
    image: mysql/mysql-server:8.0
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: danxbot
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: danxbot_chat
      MYSQL_USER: danxbot
      MYSQL_PASSWORD: danxbot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-pdanxbot"]
      interval: 5s
      retries: 5
      timeout: 3s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

networks:
  ssap_sail:
    external: true

volumes:
  danxbot-threads:
  mysql-data:
