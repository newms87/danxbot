services:
  danxbot:
    build: .
    restart: always
    stop_grace_period: 120s
    env_file: .env
    ports:
      - "${DASHBOARD_PORT:-5555}:${DASHBOARD_PORT:-5555}"
    volumes:
      # Hot-reload during development
      - ./src:/danxbot/app/src
      - ./package.json:/danxbot/app/package.json
      # Dashboard built assets (mount for dev rebuilds)
      - ./dashboard:/danxbot/app/dashboard
      # Persistent thread cache
      - danxbot-threads:/danxbot/threads
      # Shared repos directory (symlinks to working copies in local dev, cloned repos in deployed envs)
      - ./repos:/danxbot/repos
      # Repo-specific compose overrides and config (generated by /setup, mounted if present)
      - ./repo-overrides:/danxbot/app/repo-overrides:ro
      # Docker socket (for managing sibling containers)
      - /var/run/docker.sock:/var/run/docker.sock
      # Claude Code auth (copied into project by /setup)
      - ./claude-auth:/danxbot/claude-auth:ro
    networks:
      - default
      - repo_network
    depends_on:
      mysql:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  playwright:
    build: ./playwright-screenshot
    restart: always
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      PORT: "3000"
    networks:
      - default
      - repo_network
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>{if(!r.ok)throw 1}).catch(()=>process.exit(1))"]
      interval: 5s
      timeout: 3s
      start_period: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

  mysql:
    image: mysql/mysql-server:8.0
    ports:
      - "${DANXBOT_DB_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: danxbot
      MYSQL_ROOT_HOST: "%"
      MYSQL_DATABASE: ${DANXBOT_DB_NAME:-danxbot_chat}
      MYSQL_USER: danxbot
      MYSQL_PASSWORD: danxbot
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-pdanxbot"]
      interval: 5s
      retries: 5
      timeout: 3s
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "1"

networks:
  repo_network:
    name: ${DOCKER_NETWORK}
    external: true

volumes:
  danxbot-threads:
  mysql-data:
